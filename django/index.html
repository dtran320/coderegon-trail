<script>
window.TRAIL_DATA = {"framework": "django", "trailName": "The WSGI Wagon Trail", "stops": [{"name": "WSGI Outpost", "subtitle": "The Entry Point", "concept": "WSGI Application", "landmarkType": "town", "code": {"file": "myproject/wsgi.py:1-18", "content": "# myproject/wsgi.py\nimport os\nfrom django.core.wsgi import get_wsgi_application\n\nos.environ.setdefault('DJANGO_SETTINGS_MODULE', 'myproject.settings')\n\napplication = get_wsgi_application()\n\n# What get_wsgi_application() does under the hood:\n# 1. Reads DJANGO_SETTINGS_MODULE from environment\n# 2. Calls django.setup() — imports all apps, runs AppConfig.ready()\n# 3. Returns a WSGIHandler instance\n#\n# The WSGIHandler is a callable:\n#   def __call__(self, environ, start_response):\n#       request = WSGIRequest(environ)\n#       response = self.get_response(request)\n#       return response", "language": "python"}, "narration": "Every Django journey begins at the WSGI Outpost. This tiny file is what your web server — Gunicorn, uWSGI, or the dev server — actually calls. It sets the settings module, then hands back a WSGIHandler. That handler is the gateway into Django. When a request arrives, it wraps the raw WSGI environ dict into a friendly WSGIRequest object. One environment variable controls everything: DJANGO_SETTINGS_MODULE. Get that wrong, and the wagon never leaves town."}, {"name": "Middleware Mountains", "subtitle": "The Request Stack", "concept": "Middleware Pipeline", "landmarkType": "mountain", "code": {"file": "myproject/settings.py:40-62", "content": "# myproject/settings.py\nMIDDLEWARE = [\n    'django.middleware.security.SecurityMiddleware',\n    'django.contrib.sessions.middleware.SessionMiddleware',\n    'django.middleware.common.CommonMiddleware',\n    'django.middleware.csrf.CsrfViewMiddleware',\n    'django.contrib.auth.middleware.AuthenticationMiddleware',\n    'django.contrib.messages.middleware.MessageMiddleware',\n    'django.middleware.clickjacking.XFrameOptionsMiddleware',\n]\n\n# Each middleware is a class with hooks:\n# class SecurityMiddleware:\n#     def __init__(self, get_response):\n#         self.get_response = get_response\n#\n#     def __call__(self, request):\n#         # Pre-view logic (runs top-down)\n#         response = self.get_response(request)\n#         # Post-view logic (runs bottom-up)\n#         return response", "language": "python"}, "narration": "Welcome to Middleware Mountains. This ordered list is the backbone of Django's request processing. Each middleware wraps the next one like Russian nesting dolls. On the way in, they run top to bottom — security first, then sessions, then CSRF protection. On the way out, they run in reverse. Order matters enormously here. Put AuthenticationMiddleware before SessionMiddleware and your users will never be logged in. The middleware stack is Django's immune system."}, {"name": "URLconf Crossroads", "subtitle": "Path Resolution", "concept": "URL Routing", "landmarkType": "camp", "code": {"file": "myproject/urls.py:1-22", "content": "# myproject/urls.py\nfrom django.contrib import admin\nfrom django.urls import path, include\n\nurlpatterns = [\n    path('admin/', admin.site.urls),\n    path('api/', include('api.urls')),\n    path('blog/', include('blog.urls')),\n]\n\n# blog/urls.py\nfrom django.urls import path\nfrom . import views\n\napp_name = 'blog'\n\nurlpatterns = [\n    path('', views.post_list, name='post-list'),\n    path('<int:pk>/', views.post_detail, name='post-detail'),\n    path('<slug:slug>/', views.post_by_slug, name='post-slug'),\n    path('<int:pk>/comment/', views.add_comment, name='add-comment'),\n]", "language": "python"}, "narration": "You've reached the URLconf Crossroads. Django resolves URLs by walking through urlpatterns top to bottom until something matches. The include function is the key — it delegates to app-level URL files, keeping things modular. Angle brackets define path converters: int colon pk captures a number, slug colon slug captures a URL-safe string. The name argument is crucial — it lets you reverse URLs in templates and views without hardcoding paths. If nothing matches, Django raises a 404."}, {"name": "View Vista", "subtitle": "Request Handlers", "concept": "Views and Request Handling", "landmarkType": "forest", "code": {"file": "blog/views.py:1-25", "content": "# blog/views.py\nfrom django.shortcuts import render, get_object_or_404\nfrom django.views.generic import ListView, DetailView\nfrom django.http import Http404\nfrom .models import Post, Comment\n\n# Function-based view — explicit and flexible\ndef post_detail(request, pk):\n    post = get_object_or_404(Post, pk=pk, status='published')\n    comments = post.comments.filter(active=True)\n    return render(request, 'blog/post_detail.html', {\n        'post': post,\n        'comments': comments,\n    })\n\n# Class-based view — DRY for common patterns\nclass PostListView(ListView):\n    model = Post\n    queryset = Post.objects.filter(status='published')\n    template_name = 'blog/post_list.html'\n    context_object_name = 'posts'\n    paginate_by = 10\n    ordering = ['-publish_date']", "language": "python"}, "narration": "Welcome to View Vista, where requests become responses. Django gives you two styles. Function-based views are explicit — you see every step, from fetching the object to picking the template. Class-based views like ListView handle boilerplate automatically — pagination, queryset filtering, and template selection all come free. The get_object_or_404 shortcut is Django magic: it either finds your object or raises a 404 with zero extra code. Most Django developers use both styles depending on complexity."}, {"name": "ORM Oasis", "subtitle": "Data Access Layer", "concept": "ORM QuerySets", "landmarkType": "desert", "code": {"file": "blog/models.py:1-25", "content": "# blog/models.py\nfrom django.db import models\nfrom django.contrib.auth.models import User\nfrom django.utils import timezone\n\nclass Post(models.Model):\n    title = models.CharField(max_length=200)\n    slug = models.SlugField(max_length=200, unique_for_date='publish_date')\n    author = models.ForeignKey(User, on_delete=models.CASCADE,\n                               related_name='blog_posts')\n    body = models.TextField()\n    publish_date = models.DateTimeField(default=timezone.now)\n    status = models.CharField(max_length=10,\n                              choices=[('draft', 'Draft'), ('published', 'Published')],\n                              default='draft')\n\n    class Meta:\n        ordering = ['-publish_date']\n        indexes = [models.Index(fields=['-publish_date'])]\n\n    def __str__(self):\n        return self.title\n\n    # QuerySet usage:\n    # Post.objects.filter(status='published', author__username='alice')\n    # Returns SQL: SELECT * FROM blog_post WHERE status='published'\n    #              AND author_id IN (SELECT id FROM auth_user WHERE username='alice')", "language": "python"}, "narration": "You've reached the ORM Oasis — Django's most powerful feature. Each model class maps to a database table. Fields like CharField and ForeignKey define both the Python API and the database schema. The double-underscore syntax in QuerySets is where it gets interesting — author double-underscore username lets you traverse relationships without writing joins. Django builds the SQL for you. The Meta class controls ordering, indexes, and constraints. And that on_delete parameter on ForeignKey? It's not optional. Django forces you to think about data integrity from day one."}, {"name": "Template Territory", "subtitle": "Rendering HTML", "concept": "Template Engine", "landmarkType": "camp", "code": {"file": "templates/blog/post_detail.html:1-22", "content": "{% extends \"base.html\" %}\n{% load humanize %}\n\n{% block title %}{{ post.title }}{% endblock %}\n\n{% block content %}\n<article>\n    <h1>{{ post.title }}</h1>\n    <p class=\"meta\">\n        By {{ post.author.get_full_name }} |\n        {{ post.publish_date|naturaltime }}\n    </p>\n    {{ post.body|linebreaks }}\n</article>\n\n{% for comment in comments %}\n    <div class=\"comment\">\n        <strong>{{ comment.name }}</strong>\n        <p>{{ comment.body|truncatewords:50 }}</p>\n    </div>\n{% empty %}\n    <p>No comments yet.</p>\n{% endfor %}\n{% endblock %}", "language": "html"}, "narration": "Welcome to Template Territory. That extends tag on line one is everything — it says this template inherits from base dot html. The block tags define regions that child templates can override. Filters after the pipe symbol transform data: naturaltime turns a datetime into 'two hours ago,' linebreaks converts newlines to HTML paragraphs. The for-empty pattern is classic Django — it handles the empty list case right in the loop. Templates are deliberately limited in power. No arbitrary Python allowed. That's a feature, not a bug — it keeps business logic in views where it belongs."}, {"name": "Context Canyon", "subtitle": "Assembling the Data", "concept": "Context Processors", "landmarkType": "river", "code": {"file": "myproject/settings.py:55-75", "content": "# myproject/settings.py\nTEMPLATES = [{\n    'BACKEND': 'django.template.backends.django.DjangoTemplates',\n    'DIRS': [BASE_DIR / 'templates'],\n    'APP_DIRS': True,\n    'OPTIONS': {\n        'context_processors': [\n            'django.template.context_processors.debug',\n            'django.template.context_processors.request',\n            'django.contrib.auth.context_processors.auth',\n            'django.contrib.messages.context_processors.messages',\n            'blog.context_processors.site_settings',\n        ],\n    },\n}]\n\n# blog/context_processors.py\nfrom .models import Category\n\ndef site_settings(request):\n    \"\"\"Inject site-wide data into every template context.\"\"\"\n    return {\n        'categories': Category.objects.filter(active=True),\n        'site_name': 'My Django Blog',\n        'current_year': request.META.get('SERVER_NAME', ''),\n    }", "language": "python"}, "narration": "Now we cross Context Canyon — the bridge between your data and your templates. Context processors run on every single request that uses a template. They inject variables that are available everywhere without passing them explicitly. The auth processor gives you the user object. The messages processor provides flash messages. Your custom processor here adds categories and the site name to every page. Be careful though — a context processor that runs an expensive query will slow down every page load. This is global state, so use it wisely."}, {"name": "Response Frontier", "subtitle": "Sending the Reply", "concept": "HTTP Responses", "landmarkType": "town", "code": {"file": "blog/views.py:30-55", "content": "# blog/views.py\nfrom django.http import (\n    HttpResponse, JsonResponse, StreamingHttpResponse,\n    HttpResponseRedirect,\n)\nfrom django.template.loader import render_to_string\n\ndef post_api(request, pk):\n    \"\"\"JSON API endpoint.\"\"\"\n    post = get_object_or_404(Post, pk=pk, status='published')\n    return JsonResponse({\n        'title': post.title,\n        'body': post.body,\n        'author': post.author.username,\n        'published': post.publish_date.isoformat(),\n    })\n\ndef export_posts(request):\n    \"\"\"Stream large CSV export without loading all into memory.\"\"\"\n    def generate_rows():\n        yield 'title,author,date\\n'\n        for post in Post.objects.filter(status='published').iterator():\n            yield f'{post.title},{post.author.username},{post.publish_date}\\n'\n\n    response = StreamingHttpResponse(generate_rows(), content_type='text/csv')\n    response['Content-Disposition'] = 'attachment; filename=\"posts.csv\"'\n    return response", "language": "python"}, "narration": "You made it to the Response Frontier! Every view must return an HttpResponse — that's Django's one unbreakable rule. JsonResponse handles API endpoints, automatically serializing dicts to JSON and setting the content type. StreamingHttpResponse is the power tool — it yields chunks instead of building the whole response in memory. Perfect for large exports. Notice the iterator call on the QuerySet — it fetches rows one at a time instead of loading thousands into memory. The response travels back up through the middleware stack in reverse, picking up headers and cookies along the way. Your wagon has arrived."}], "events": [{"type": "weather", "trigger": "after_stop", "triggerStop": 1, "title": "Middleware Ordering Storm!", "text": "A violent storm hits your wagon train. Your Django app is throwing 403 Forbidden on every POST request, even from logged-in users. You recently reordered the MIDDLEWARE list to 'clean it up.' What went wrong?", "choices": [{"text": "CsrfViewMiddleware must come after SessionMiddleware because CSRF validation depends on the session", "correct": true, "explanation": "Exactly right. CsrfViewMiddleware reads the CSRF token from the session cookie, which SessionMiddleware sets up. If CSRF runs first, there's no session to read from — so every POST fails validation. Middleware order is a dependency chain, not just a list."}, {"text": "You need to add the csrf_exempt decorator to every view", "correct": false, "explanation": "That would disable CSRF protection entirely, leaving your app vulnerable to cross-site request forgery attacks. The real fix is getting the middleware order right so CSRF works correctly with the session."}, {"text": "You should switch from CSRF tokens to a custom authentication header", "correct": false, "explanation": "CSRF protection and authentication are different concerns. CSRF prevents other sites from submitting forms as your users. Replacing it with a custom header would break standard HTML form submissions and leave you writing security code that Django already provides."}], "concept": "Middleware Pipeline", "difficulty": "medium"}, {"type": "encounter", "trigger": "after_stop", "triggerStop": 2, "title": "A Django Elder Appears", "text": "A wise traveler shows you two templates. The first has <a href='/blog/42/'>. The second has <a href='{% url \"blog:post-detail\" pk=post.pk %}'>. 'One of these will break when you change your URL patterns,' the elder says. Which approach is better and why?", "choices": [{"text": "The url template tag with named routes — it generates URLs dynamically so they never go stale", "correct": true, "explanation": "Spot on. The url tag resolves the named route at render time. If you change the URL pattern from blog slash to articles slash, every link updates automatically. Hardcoded paths silently break and you won't know until a user hits a 404."}, {"text": "The hardcoded path — it's simpler and there's no performance overhead from URL resolution", "correct": false, "explanation": "URL resolution is extremely fast — Django caches the URL patterns. The tiny performance difference is meaningless compared to the maintenance nightmare of finding and updating every hardcoded URL when patterns change."}, {"text": "It doesn't matter — Django automatically redirects old URLs to new ones", "correct": false, "explanation": "Django does not automatically redirect old URLs. You would need to manually add redirect rules. Named URL reversal avoids the problem entirely because links are always generated from the current URL configuration."}], "concept": "URL Routing", "difficulty": "easy"}, {"type": "river", "trigger": "after_stop", "triggerStop": 3, "title": "The View Architecture River", "text": "You've reached a wide river. Your blog app needs a view that lists posts, supports pagination, filters by category, and handles both GET and POST for a search form. The current function-based view is 60 lines long. How do you cross?", "choices": [{"text": "Refactor to a ListView with get_queryset and get_context_data overrides", "correct": true, "explanation": "ListView handles pagination, template selection, and context naming automatically. Override get_queryset to add your category filter, and get_context_data to inject the search form. You go from 60 lines to about 15, and gain built-in edge case handling like invalid page numbers."}, {"text": "Keep the function-based view but split it into smaller helper functions", "correct": false, "explanation": "Splitting into helpers reduces line count but you're still reimplementing pagination, 404 handling for bad page numbers, and template context assembly that ListView provides for free. You're writing code that Django already wrote and tested."}, {"text": "Use a Django REST Framework ViewSet instead", "correct": false, "explanation": "DRF ViewSets are designed for API endpoints returning JSON, not HTML pages with templates. You'd need a serializer, lose template rendering, and add a whole dependency for something Django's generic views handle natively."}], "concept": "Template Engine", "difficulty": "medium"}, {"type": "misfortune", "trigger": "after_stop", "triggerStop": 4, "title": "N+1 Query Plague!", "text": "Disaster! Your blog listing page is making 101 database queries — one for the list of 100 posts, and one more per post to fetch each author's name. Page load times have tripled. The Django Debug Toolbar is screaming. How do you cure this plague?", "choices": [{"text": "Use select_related on the ForeignKey to author — it joins the tables in a single query", "correct": true, "explanation": "select_related performs a SQL JOIN and fetches the related author in the same query as the post. One hundred and one queries become one. Use select_related for ForeignKey and OneToOneField relationships. For ManyToManyField, use prefetch_related instead — it does a separate query but caches the results."}, {"text": "Cache the author names in a dictionary and look them up in Python", "correct": false, "explanation": "You'd still need to fetch all the authors — that's a separate query. And you'd be reimplementing what select_related does automatically at the database level, where JOINs are far more efficient than Python dictionary lookups."}, {"text": "Add an author_name CharField to the Post model to avoid the join entirely", "correct": false, "explanation": "Denormalizing data creates maintenance nightmares. When an author changes their name, you'd need to update every post. This violates database normalization for no good reason when select_related solves it in one line."}], "concept": "ORM QuerySets", "difficulty": "easy"}, {"type": "fortune", "trigger": "after_stop", "triggerStop": 5, "title": "A Cache of Custom Tags", "text": "Your understanding of Django's template system is impressive! You discovered a cache of well-written custom template tags left by a previous traveler. Your templates are cleaner and your health is restored.", "choices": [], "concept": "Template Engine", "difficulty": "easy"}, {"type": "misfortune", "trigger": "after_stop", "triggerStop": 6, "title": "Context Processor Stampede!", "text": "Panic on the trail! Every page on your site takes three seconds to load. You added a context processor that runs Category.objects.all() and fetches recent posts, comments, and user stats. It runs on EVERY request — including your JSON API endpoints that don't even use templates. How do you fix this?", "choices": [{"text": "Use lazy evaluation — wrap expensive queries in SimpleLazyObject so they only execute if the template actually accesses them", "correct": true, "explanation": "SimpleLazyObject defers the database query until the variable is actually used in a template. API views that return JSON never touch the context variables, so the queries never run. You get the convenience of global context without the performance cost on pages that don't need it."}, {"text": "Move all the data fetching into each view's get_context_data method", "correct": false, "explanation": "That works but defeats the purpose of context processors — sharing data across many templates. You'd duplicate the same queries in dozens of views. Lazy evaluation gives you both convenience and performance."}, {"text": "Add caching with a five-minute timeout to the context processor", "correct": false, "explanation": "Caching helps but adds complexity — you need cache invalidation when categories change, and stale data might confuse users. Lazy evaluation is simpler and more correct: if a page doesn't need the data, the query simply never runs."}], "concept": "ORM QuerySets", "difficulty": "hard"}, {"type": "encounter", "trigger": "after_stop", "triggerStop": 1, "title": "A Django Guide Appears", "text": "A friendly guide meets your wagon. 'Django follows the MVT pattern — Model, View, Template. But newcomers from other frameworks get confused. In Django, what does the View do compared to MVC frameworks?'", "choices": [{"text": "The View handles request logic and picks which template to render — it's like the Controller in MVC", "correct": true, "explanation": "Exactly. Django's View is the controller. It receives the request, queries the model, and passes data to the template. Django's Template is the view layer. The naming is different from MVC, but the separation of concerns is the same."}, {"text": "The View is the HTML template that the user sees in the browser", "correct": false, "explanation": "That's the Template in Django. The naming confusion comes from MVC where 'view' means the visual layer. In Django, views are Python functions or classes that handle request logic."}, {"text": "The View is the database model that defines the data structure", "correct": false, "explanation": "That's the Model. The View sits between the Model and the Template — it fetches data from models and passes it to templates for rendering."}], "concept": "Views and Request Handling", "difficulty": "easy"}, {"type": "weather", "trigger": "after_stop", "triggerStop": 2, "title": "Admin Configuration Storm!", "text": "A storm of admin requests hits your site. You registered your Post model with admin.site.register(Post) but the admin list shows only 'Post object (1)' for every entry. Users can't tell which post is which.", "choices": [{"text": "Add a __str__ method to the Post model that returns the title", "correct": true, "explanation": "Django's admin uses __str__ to display objects throughout the interface. Adding def __str__(self): return self.title gives every post a readable name. You can also customize the admin further with list_display, search_fields, and list_filter in a ModelAdmin class."}, {"text": "Override the admin template to show the title field directly", "correct": false, "explanation": "Overriding templates works but is far more complex than needed. The __str__ method is Django's standard way to give objects human-readable names, used everywhere — not just the admin."}, {"text": "Create a custom admin view that queries the title separately", "correct": false, "explanation": "A custom view for something this simple is massive overkill. Django's admin is designed to work with __str__ and ModelAdmin customization. One line in your model fixes this."}], "concept": "ORM QuerySets", "difficulty": "easy"}, {"type": "weather", "trigger": "after_stop", "triggerStop": 4, "title": "Migration Conflict!", "text": "Two developers on your team both created migrations for the same model at the same time. Django is refusing to migrate with an 'Inconsistent migration history' error. Both migrations depend on the same parent.", "choices": [{"text": "Create a merge migration using python manage.py makemigrations --merge", "correct": true, "explanation": "Django can automatically create a merge migration that combines the two branches. The merge migration depends on both conflicting migrations, resolving the diamond dependency. This is the standard workflow for teams with concurrent model changes."}, {"text": "Delete one of the migrations and re-run makemigrations", "correct": false, "explanation": "Deleting a migration that's already been applied to other developers' databases or staging environments will cause drift between the code and the actual schema. The merge command exists precisely to handle this situation safely."}, {"text": "Manually edit one migration to depend on the other", "correct": false, "explanation": "Manually rewriting migration dependencies is fragile and error-prone. If the migrations modify the same fields, you could create an invalid sequence. The --merge flag handles the dependency graph correctly."}], "concept": "ORM QuerySets", "difficulty": "medium"}, {"type": "encounter", "trigger": "after_stop", "triggerStop": 3, "title": "A Signals Expert Appears", "text": "A traveler shows you their code: when a new user registers, a Profile is automatically created using a post_save signal on the User model. 'Signals let models communicate without importing each other,' they explain. What is the main risk of overusing signals?", "choices": [{"text": "Signals create implicit control flow — it's hard to trace what happens when a model saves because listeners aren't visible in the calling code", "correct": true, "explanation": "Signals are powerful but invisible. When you call user.save(), there's no hint in that line of code that a Profile gets created, an email gets sent, or a cache gets invalidated. In large codebases, signal handlers become hidden side effects that make debugging extremely difficult."}, {"text": "Signals are slow because they use the database to send notifications between models", "correct": false, "explanation": "Signals are in-process Python function calls — they don't use the database at all. They're actually very fast. The concern isn't performance, it's maintainability and the hidden coupling they create."}, {"text": "Signals can only be used with built-in Django models, not custom ones", "correct": false, "explanation": "Signals work with any Django model, custom or built-in. You can even create your own custom signals. The concern is about code clarity, not capability limitations."}], "concept": "Middleware Pipeline", "difficulty": "medium"}, {"type": "misfortune", "trigger": "after_stop", "triggerStop": 5, "title": "Form Validation Bypass!", "text": "A security report comes in: users are submitting forms with empty required fields. Your form class has the correct field definitions, but the view is calling form.save() without checking anything first.", "choices": [{"text": "Always check form.is_valid() before accessing cleaned_data or calling save", "correct": true, "explanation": "is_valid() runs all field validators, the clean method, and populates cleaned_data with sanitized values. Without it, you're saving raw, unvalidated input. Django forms are designed with a two-step pattern: validate first with is_valid(), then use the cleaned data."}, {"text": "Add HTML5 required attributes to the form fields so the browser validates", "correct": false, "explanation": "Client-side validation is easily bypassed with browser dev tools or curl. Server-side validation with is_valid() is the real defense. HTML5 attributes are a nice UX addition, but they're not a security boundary."}, {"text": "Use a try-except around form.save() to catch validation errors", "correct": false, "explanation": "By the time save() is called, it's too late — unvalidated data may have already been written. The is_valid() method is the gatekeeper that must run before any data processing."}], "concept": "Views and Request Handling", "difficulty": "easy"}, {"type": "river", "trigger": "after_stop", "triggerStop": 6, "title": "The Complex Query River", "text": "You've reached a treacherous river. Your blog needs to find all posts that are either published by the current user OR published and in the 'news' category. A simple filter chain can't express OR conditions. How do you cross?", "choices": [{"text": "Use Q objects to combine conditions with the OR operator: Post.objects.filter(Q(author=user) | Q(status='published', category='news'))", "correct": true, "explanation": "Q objects let you build complex queries with AND, OR, and NOT operators. The pipe symbol means OR, the ampersand means AND, and the tilde means NOT. Without Q objects, Django's filter chain only supports AND conditions."}, {"text": "Run two separate queries and combine the results in Python with a set union", "correct": false, "explanation": "Two queries means two database round-trips, and combining in Python loses pagination, ordering, and database-level optimizations. Q objects generate a single SQL query with an OR clause — much more efficient."}, {"text": "Use raw SQL since Django's ORM can't handle OR conditions", "correct": false, "explanation": "Django's ORM handles OR conditions perfectly through Q objects. Raw SQL bypasses Django's protections and is harder to maintain. Q objects generate clean, efficient SQL while keeping your code Pythonic."}], "concept": "ORM QuerySets", "difficulty": "hard"}, {"type": "misfortune", "trigger": "after_stop", "triggerStop": 3, "title": "Database Connection Drought!", "text": "Your Django app is crashing under load with 'too many connections' errors. Each request opens a new database connection, and your PostgreSQL server has hit its max_connections limit. The database is refusing new connections.", "choices": [{"text": "Configure CONN_MAX_AGE in DATABASES settings to reuse connections across requests instead of opening a new one each time", "correct": true, "explanation": "By default, Django opens and closes a database connection for every request. Setting CONN_MAX_AGE to a value like 600 (seconds) keeps connections alive and reusable. For high-traffic apps, use a connection pooler like PgBouncer for even better connection management."}, {"text": "Increase max_connections on the PostgreSQL server to allow more simultaneous connections", "correct": false, "explanation": "Raising the limit is a temporary fix. Each connection consumes server memory, and under heavy load you'll hit the new limit too. The real solution is connection reuse so you need fewer connections in the first place."}, {"text": "Switch to SQLite which doesn't have connection limits", "correct": false, "explanation": "SQLite has no connection pooling and uses file-level locking — it can only handle one write at a time. It's great for development but completely unsuitable for production traffic. The fix is connection reuse, not a different database."}], "concept": "Middleware Pipeline", "difficulty": "hard"}, {"triggerStop": 4, "type": "misfortune", "title": "SQL Injection Attack!", "text": "A security scan reveals a critical vulnerability. One of your views constructs a SQL query by concatenating user input directly. An attacker sends a search term containing a DROP TABLE statement.", "choices": [{"text": "Never concatenate user input into SQL — use parameterized queries with raw() to separate code from data", "correct": true, "explanation": "Parameterized queries send the SQL structure and data separately. The database treats parameters as data, never as executable SQL. Django’s ORM does this automatically — raw() with parameters is the safe alternative."}, {"text": "Sanitize the search_term by removing dangerous SQL keywords like DROP, DELETE, and SELECT", "correct": false, "explanation": "Keyword blacklists are endlessly bypassable — attackers use case variations, Unicode tricks, and comment injection. Parameterized queries are bulletproof because they separate code from data."}, {"text": "Wrap the query in a try-except to catch any SQL errors from malicious input", "correct": false, "explanation": "Error handling doesn’t prevent the injection — the malicious SQL may execute successfully before any error occurs. A DROP TABLE runs fine as SQL."}], "concept": "ORM QuerySets", "difficulty": "hard"}, {"triggerStop": 5, "type": "weather", "title": "The Lazy Evaluation Fog", "text": "A mysterious fog causes your view to make the same database query three times. Your view assigns posts = Post.objects.filter(published=True), then checks len(posts), iterates in the template, and port to resolve."]};

window.drawCustomEventOverlay = function(time) {
  if (!currentEventType && !currentEventTitle) return;

  var t = (time || 0) * 0.001; // seconds

  // --- MIDDLEWARE ORDERING STORM: dark sky, lightning, rain ---
  if (currentEventTitle.indexOf('Middleware Ordering Storm') !== -1) {
    // Darken sky
    ctx.fillStyle = 'rgba(0,0,50,0.45)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning flash (periodic)
    var flashPhase = Math.sin(t * 1.7) + Math.sin(t * 3.1);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, 0, W, H);
      // Lightning bolt
      ctx.strokeStyle = '#FFFF55';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 80 + Math.sin(t * 2.3) * 60;
      ctx.moveTo(lx, 10);
      ctx.lineTo(lx - 5, 35);
      ctx.lineTo(lx + 8, 35);
      ctx.lineTo(lx - 3, 65);
      ctx.lineTo(lx + 10, 65);
      ctx.lineTo(lx + 2, 95);
      ctx.stroke();
    }
    // Rain
    ctx.strokeStyle = '#5555FF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 40; i++) {
      var rx = (i * 8.3 + t * 80) % W;
      var ry = (i * 13.7 + t * 120) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 1), Math.floor(ry + 5));
      ctx.stroke();
    }
    return;
  }

  // --- DJANGO ELDER: person standing by campfire ---
  if (currentEventTitle.indexOf('Django Elder') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8); // torso
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3); // head
    ctx.fillRect(px - 1, py - 4, 2, 5); // left leg
    ctx.fillRect(px + 3, py - 4, 2, 5); // right leg
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Campfire
    var fx = 212, fy = 148;
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(fx - 3, fy, 2, 3);
    ctx.fillRect(fx + 3, fy, 2, 3);
    ctx.fillStyle = '#FF5555';
    var flicker = Math.sin(t * 8) * 2;
    ctx.fillRect(fx - 1, fy - 3 + Math.floor(flicker * 0.3), 4, 3);
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(fx, fy - 5 + Math.floor(flicker * 0.5), 2, 2);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(fx - 1, fy - 2, 4, 2);
    // Firelight glow (subtle)
    ctx.fillStyle = 'rgba(255,170,0,0.08)';
    ctx.beginPath();
    ctx.arc(fx + 1, fy - 2, 15, 0, Math.PI * 2);
    ctx.fill();
    return;
  }

  // --- VIEW ARCHITECTURE RIVER: rough rapids with white water ---
  if (currentEventTitle.indexOf('View Architecture') !== -1) {
    // Extra turbulence on the river
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 20; i++) {
      var sx = (i * 17 + t * 40) % W;
      var sy = 157 + Math.sin((i * 3 + t * 5)) * 3;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 4, 2);
    }
    // Floating logs / debris
    ctx.fillStyle = '#AA5500';
    for (var i = 0; i < 3; i++) {
      var logX = (i * 110 + t * 25) % W;
      var logY = 159 + Math.sin(t * 2 + i) * 2;
      ctx.fillRect(Math.floor(logX), Math.floor(logY), 8, 2);
    }
    return;
  }

  // --- N+1 QUERY PLAGUE: red sky, smoke, warning ---
  if (currentEventTitle.indexOf('N+1 Query Plague') !== -1) {
    // Red danger tint
    ctx.fillStyle = 'rgba(170,0,0,0.25)';
    ctx.fillRect(0, 0, W, H);
    // Smoke particles rising
    ctx.fillStyle = '#555555';
    for (var i = 0; i < 15; i++) {
      var sx = 140 + Math.sin(i * 2.7 + t) * 30;
      var sy = 130 - ((t * 20 + i * 15) % 90);
      var size = 2 + (i % 3);
      ctx.globalAlpha = 0.3 + Math.sin(t + i) * 0.15;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), size, size);
    }
    ctx.globalAlpha = 1.0;
    // Fire at base
    ctx.fillStyle = '#FF5555';
    for (var i = 0; i < 8; i++) {
      var fx = 130 + i * 5;
      var fh = 4 + Math.sin(t * 6 + i * 1.5) * 3;
      ctx.fillRect(fx, Math.floor(140 - fh), 3, Math.floor(fh));
    }
    ctx.fillStyle = '#FFFF55';
    for (var i = 0; i < 5; i++) {
      var fx = 135 + i * 6;
      var fh = 2 + Math.sin(t * 8 + i * 2) * 2;
      ctx.fillRect(fx, Math.floor(139 - fh), 2, Math.floor(fh));
    }
    // Pulsing red border
    var pulse = (Math.sin(t * 4) + 1) * 0.15;
    ctx.strokeStyle = 'rgba(255,0,0,' + pulse.toFixed(2) + ')';
    ctx.lineWidth = 3;
    ctx.strokeRect(1, 1, W - 2, H - 2);
    ctx.lineWidth = 1;
    return;
  }

  // --- CACHE OF CUSTOM TAGS (fortune): sunny, flowers, rainbow ---
  if (currentEventTitle.indexOf('Cache of Custom Tags') !== -1) {
    // Bright sun
    ctx.fillStyle = '#FFFF55';
    ctx.beginPath();
    ctx.arc(260, 30, 12, 0, Math.PI * 2);
    ctx.fill();
    // Sun rays
    ctx.strokeStyle = '#FFFF55';
    ctx.lineWidth = 1;
    for (var i = 0; i < 8; i++) {
      var angle = i * Math.PI / 4 + t * 0.3;
      ctx.beginPath();
      ctx.moveTo(260 + Math.cos(angle) * 14, 30 + Math.sin(angle) * 14);
      ctx.lineTo(260 + Math.cos(angle) * 20, 30 + Math.sin(angle) * 20);
      ctx.stroke();
    }
    // Flowers on ground
    var flowerColors = ['#FF5555', '#FFFF55', '#FF55FF', '#55FFFF', '#55FF55'];
    for (var i = 0; i < 12; i++) {
      var fx = (i * 27 + 10) % W;
      var fy = 135 + (i * 7) % 20;
      ctx.fillStyle = '#00AA00';
      ctx.fillRect(fx + 1, fy, 1, 4); // stem
      ctx.fillStyle = flowerColors[i % flowerColors.length];
      ctx.fillRect(fx, fy - 1, 3, 2); // petals
      ctx.fillStyle = '#FFFF55';
      ctx.fillRect(fx + 1, fy - 1, 1, 1); // center
    }
    // Rainbow arc
    var rainbowColors = ['#FF5555', '#FFAA00', '#FFFF55', '#55FF55', '#5555FF', '#0C4B33'];
    for (var rc = 0; rc < rainbowColors.length; rc++) {
      ctx.strokeStyle = rainbowColors[rc];
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(160, 110, 70 + rc * 3, Math.PI * 1.1, Math.PI * 1.9);
      ctx.stroke();
    }
    ctx.lineWidth = 1;
    return;
  }

  // --- CONTEXT PROCESSOR STAMPEDE: heavy fog/dust cloud ---
  if (currentEventTitle.indexOf('Context Processor Stampede') !== -1) {
    // Dense fog layers
    for (var layer = 0; layer < 3; layer++) {
      var alpha = 0.15 + layer * 0.08;
      ctx.fillStyle = 'rgba(170,170,170,' + alpha.toFixed(2) + ')';
      for (var i = 0; i < 10; i++) {
        var fogX = (i * 35 + t * (6 + layer * 4) + layer * 50) % (W + 60) - 30;
        var fogY = 60 + layer * 30 + Math.sin(t * 0.4 + i * 0.9 + layer) * 10;
        var fogR = 18 + layer * 8 + Math.sin(t * 0.3 + i) * 5;
        ctx.beginPath();
        ctx.arc(fogX, fogY, fogR, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    // Fog below obscuring ground details
    ctx.fillStyle = 'rgba(170,170,170,0.25)';
    ctx.fillRect(0, 110, W, 60);
    return;
  }
};
