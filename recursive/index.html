window.drawCustomEventOverlay = function(time) {
  if (!currentEventType && !currentEventTitle) return;
  var t = (time || 0) * 0.001;

  // --- MARKDOWN STORM: YAML fragments raining down ---
  if (currentEventTitle.indexOf('Markdown Storm') !== -1) {
    ctx.fillStyle = 'rgba(0,0,50,0.4)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning
    var flashPhase = Math.sin(t * 1.7) + Math.sin(t * 3.1);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fillRect(0, 0, W, H);
      ctx.strokeStyle = '#FFFF55';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 90 + Math.sin(t * 2.3) * 50;
      ctx.moveTo(lx, 10); ctx.lineTo(lx - 5, 35);
      ctx.lineTo(lx + 8, 35); ctx.lineTo(lx - 3, 65);
      ctx.lineTo(lx + 10, 65); ctx.lineTo(lx + 2, 95);
      ctx.stroke();
    }
    // YAML-like "rain" - small dashes
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 30; i++) {
      var rx = (i * 11 + t * 60) % W;
      var ry = (i * 17 + t * 100) % 110;
      ctx.fillRect(Math.floor(rx), Math.floor(ry), 3, 1);
      ctx.fillRect(Math.floor(rx + 5), Math.floor(ry + 2), 2, 1);
    }
    return;
  }

  // --- RENDERING RIVER: turbulent crossing ---
  if (currentEventTitle.indexOf('Rendering River') !== -1) {
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 25; i++) {
      var sx = (i * 14 + t * 35) % W;
      var sy = 157 + Math.sin((i * 3 + t * 5)) * 3;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 5, 2);
    }
    // Floating DOM/Canvas labels as debris
    ctx.fillStyle = '#AA5500';
    for (var i = 0; i < 4; i++) {
      var logX = (i * 80 + t * 20) % W;
      var logY = 159 + Math.sin(t * 2 + i) * 2;
      ctx.fillRect(Math.floor(logX), Math.floor(logY), 10, 2);
    }
    return;
  }

  // --- TRAIL DATA PIONEER: traveler with campfire ---
  if (currentEventTitle.indexOf('Trail Data Pioneer') !== -1) {
    var px = 200, py = 142;
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3);
    ctx.fillRect(px - 1, py - 4, 2, 5);
    ctx.fillRect(px + 3, py - 4, 2, 5);
    ctx.fillStyle = '#9B59B6';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Campfire
    var fx = 212, fy = 148;
    ctx.fillStyle = '#FF5555';
    var flicker = Math.sin(t * 8) * 2;
    ctx.fillRect(fx - 1, fy - 3 + Math.floor(flicker * 0.3), 4, 3);
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(fx, fy - 5 + Math.floor(flicker * 0.5), 2, 2);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(fx - 1, fy - 2, 4, 2);
    ctx.fillStyle = 'rgba(255,170,0,0.08)';
    ctx.beginPath();
    ctx.arc(fx + 1, fy - 2, 15, 0, Math.PI * 2);
    ctx.fill();
    return;
  }

  // --- SHIKI FAILURE: glitchy screen ---
  if (currentEventTitle.indexOf('Shiki CDN Failure') !== -1) {
    // Glitch lines
    for (var i = 0; i < 8; i++) {
      var gy = (i * 25 + t * 40) % H;
      var gx = Math.sin(t * 3 + i) * 10;
      ctx.fillStyle = 'rgba(255,121,198,' + (0.1 + Math.sin(t * 5 + i) * 0.08).toFixed(2) + ')';
      ctx.fillRect(Math.floor(gx), Math.floor(gy), W, 2);
    }
    // Static noise
    ctx.fillStyle = '#f1fa8c';
    for (var i = 0; i < 20; i++) {
      var nx = Math.floor(Math.random() * W);
      var ny = Math.floor(Math.random() * 100);
      ctx.fillRect(nx, ny, 2, 1);
    }
    return;
  }

  // --- SCORING SANDSTORM: sand and wind ---
  if (currentEventTitle.indexOf('Scoring Sandstorm') !== -1) {
    ctx.fillStyle = 'rgba(194,178,128,0.3)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#c2b280';
    for (var i = 0; i < 40; i++) {
      var sx = (i * 8 + t * 90) % W;
      var sy = (i * 12 + t * 30 + Math.sin(i) * 20) % H;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 2, 1);
    }
    // Wind lines
    ctx.strokeStyle = 'rgba(194,178,128,0.4)';
    ctx.lineWidth = 1;
    for (var i = 0; i < 5; i++) {
      var wy = 30 + i * 20 + Math.sin(t + i) * 5;
      ctx.beginPath();
      ctx.moveTo((t * 60 + i * 40) % W, Math.floor(wy));
      ctx.lineTo((t * 60 + i * 40 + 20) % W, Math.floor(wy - 2));
      ctx.stroke();
    }
    return;
  }

  // --- TTS ENGINEER: person with sound waves ---
  if (currentEventTitle.indexOf('TTS Engineer') !== -1) {
    var px = 200, py = 142;
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3);
    ctx.fillRect(px - 1, py - 4, 2, 5);
    ctx.fillRect(px + 3, py - 4, 2, 5);
    // Headphones
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 2, py - 14, 2, 4);
    ctx.fillRect(px + 4, py - 14, 2, 4);
    ctx.fillRect(px - 1, py - 16, 6, 2);
    // Sound waves
    ctx.strokeStyle = '#55FFFF';
    ctx.lineWidth = 1;
    for (var w = 0; w < 3; w++) {
      var radius = 8 + w * 6 + Math.sin(t * 4) * 2;
      ctx.globalAlpha = 0.5 - w * 0.15;
      ctx.beginPath();
      ctx.arc(px + 10, py - 10, radius, -0.5, 0.5);
      ctx.stroke();
    }
    ctx.globalAlpha = 1.0;
    return;
  }

  // --- THIN HTML VIOLATION: broken wheel ---
  if (currentEventTitle.indexOf('Thin HTML Violation') !== -1) {
    ctx.fillStyle = 'rgba(170,0,0,0.2)';
    ctx.fillRect(0, 0, W, H);
    // Smoke
    ctx.fillStyle = '#555555';
    for (var i = 0; i < 12; i++) {
      var sx = 150 + Math.sin(i * 2.7 + t) * 25;
      var sy = 130 - ((t * 18 + i * 12) % 80);
      var size = 2 + (i % 3);
      ctx.globalAlpha = 0.25 + Math.sin(t + i) * 0.1;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), size, size);
    }
    ctx.globalAlpha = 1.0;
    // Broken wheel pieces
    ctx.fillStyle = '#8B4513';
    var angle = t * 0.5;
    for (var i = 0; i < 4; i++) {
      var wx = 160 + Math.cos(angle + i * 1.57) * 8;
      var wy = 150 + Math.sin(angle + i * 1.57) * 4 + (t > 2 ? (t - 2) * 3 : 0);
      ctx.fillRect(Math.floor(wx), Math.floor(Math.min(wy, 160)), 3, 2);
    }
    return;
  }
};
</script>
<script src="../engine.js"></script>
