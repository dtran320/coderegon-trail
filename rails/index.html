<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Coderegon Trail - Rails Edition</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100vh;
  overflow: hidden;
  background: #000;
  font-family: 'Courier New', monospace;
  color: #AAAAAA;
}
#game-container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}
#canvas-area {
  height: 52vh;
  min-height: 0;
  position: relative;
  background: #000;
}
#game-canvas {
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
  image-rendering: -moz-crisp-edges;
  image-rendering: crisp-edges;
  display: block;
}
#text-panel {
  flex: 1;
  min-height: 0;
  background: #000;
  border-top: 2px solid #555555;
  overflow-y: auto;
  padding: 8px 16px;
  font-size: 14px;
  line-height: 1.4;
  color: #FFFFFF;
}
#text-panel::-webkit-scrollbar { width: 8px; }
#text-panel::-webkit-scrollbar-track { background: #000; }
#text-panel::-webkit-scrollbar-thumb { background: #555555; }
#status-bar {
  height: 60px;
  min-height: 60px;
  background: #000;
  border-top: 2px solid #555555;
  display: flex;
  align-items: center;
  padding: 0 16px;
  font-size: 15px;
  color: #AAAAAA;
  white-space: nowrap;
  overflow: hidden;
}
.blink {
  animation: blink-anim 1s step-end infinite;
}
@keyframes blink-anim {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
  20%, 40%, 60%, 80% { transform: translateX(4px); }
}
.shake { animation: shake 0.5s ease-in-out; }
.code-box {
  background: #272822;
  border: 1px solid #555555;
  padding: 6px 8px;
  margin: 6px 0;
  max-height: 130px;
  overflow-y: auto;
  overflow-x: auto;
  font-size: 12px;
  line-height: 1.3;
  white-space: pre;
  color: #f8f8f2;
}
.code-box::-webkit-scrollbar { width: 6px; height: 6px; }
.code-box::-webkit-scrollbar-track { background: #272822; }
.code-box::-webkit-scrollbar-thumb { background: #555555; }
.choice-item { cursor: pointer; padding: 2px 4px; }
.choice-item:hover { color: #FFFF55; }
.choice-selected { color: #FFFF55; background: #333300; }
.stop-opt { color: #55FFFF; cursor: pointer; padding: 2px 4px; }
.stop-opt:hover { color: #FFFF55; }
.choice-correct { color: #55FF55; }
.choice-wrong { color: #FF5555; }
.choice-dimmed { color: #555555; }
.health-green { color: #00AA00; }
.health-yellow { color: #FFFF55; }
.health-red { color: #FF5555; }
.health-dead { color: #555555; text-decoration: line-through; }
.text-cyan { color: #55FFFF; }
.text-yellow { color: #FFFF55; }
.text-green { color: #55FF55; }
.text-red { color: #FF5555; }
.text-magenta { color: #FF55FF; }
.text-gray { color: #555555; }
.text-white { color: #FFFFFF; }
.text-bright { color: #FFFFFF; font-weight: bold; }
#music-indicator {
  position: absolute;
  top: 4px;
  right: 8px;
  font-size: 11px;
  color: #555555;
  z-index: 10;
  pointer-events: none;
}
</style>
</head>
<body>
<div id="game-container">
  <div id="canvas-area">
    <canvas id="game-canvas" width="320" height="200"></canvas>
    <div id="music-indicator">M: Music</div>
  </div>
  <div id="text-panel"></div>
  <div id="status-bar"></div>
</div>

<script>
// =====================================================================
// TRAIL DATA
// =====================================================================
const TRAIL_DATA={"framework":"rails","trailName":"The Convention Trail","stops":[{"name":"Rack Junction","subtitle":"The Entry Point","concept":"Rack Middleware","landmarkType":"town","code":{"file":"config.ru + config/application.rb","content":"# config.ru\nrequire_relative \"config/environment\"\nrun Rails.application\n\n# config/application.rb\nrequire_relative \"boot\"\nrequire \"rails/all\"\n\nmodule BlogApp\n  class Application < Rails::Application\n    config.load_defaults 7.1\n\n    config.middleware.use Rack::Deflater\n    config.middleware.insert_before 0, Rack::Cors do\n      allow do\n        origins \"*\"\n        resource \"*\", headers: :any, methods: [:get, :post]\n      end\n    end\n  end\nend","language":"ruby"},"narration":"Every Rails journey begins at Rack Junction. That tiny config dot ru file is the actual entry point. It boots the whole framework and hands control to Rails dot application. Under the hood, Rails stacks about twenty middleware layers \u2014 session handling, cookie parsing, CSRF protection, static file serving. You can add your own, like Rack Deflater for compression. Think of Rack as the wagon hitching post. Every request passes through this stack before Rails even sees it."},{"name":"Router Pass","subtitle":"RESTful Resource Routing","concept":"Convention Routing","landmarkType":"mountain","code":{"file":"config/routes.rb","content":"# config/routes.rb\nRails.application.routes.draw do\n  root \"pages#home\"\n\n  resources :articles do\n    resources :comments, only: [:create, :destroy]\n    member do\n      post :publish\n    end\n    collection do\n      get :drafts\n    end\n  end\n\n  namespace :api do\n    namespace :v1 do\n      resources :users, only: [:index, :show]\n      resources :articles, only: [:index, :show, :create]\n    end\n  end\n\n  get \"up\" => \"rails/health#show\", as: :rails_health_check\nend","language":"ruby"},"narration":"Welcome to Router Pass. One line \u2014 resources colon articles \u2014 generates seven RESTful routes automatically. Index, show, new, create, edit, update, destroy. Nested resources give you articles slash one slash comments. The member block adds custom actions on a single record. The collection block adds actions on the whole set. Namespacing under api slash v1 keeps your API versioned and organized. Rails routing is opinionated, and that opinion saves you hundreds of lines of configuration."},{"name":"Controller Canyon","subtitle":"Actions and Strong Params","concept":"ActiveRecord","landmarkType":"camp","code":{"file":"app/controllers/articles_controller.rb","content":"# app/controllers/articles_controller.rb\nclass ArticlesController < ApplicationController\n  before_action :authenticate_user!\n  before_action :set_article, only: [:show, :edit, :update, :destroy]\n\n  def index\n    @articles = Article.published.includes(:author, :comments)\n                       .order(created_at: :desc)\n                       .page(params[:page])\n  end\n\n  def create\n    @article = current_user.articles.build(article_params)\n    if @article.save\n      redirect_to @article, notice: \"Article was successfully created.\"\n    else\n      render :new, status: :unprocessable_entity\n    end\n  end\n\n  private\n\n  def set_article\n    @article = Article.find(params[:id])\n  end\n\n  def article_params\n    params.require(:article).permit(:title, :body, :category_id)\n  end\nend","language":"ruby"},"narration":"Controller Canyon is where your request finally meets application logic. Notice the before_action callbacks at the top \u2014 they run before every action, like middleware for controllers. The set_article callback loads the record by ID so you do not repeat yourself. At the bottom, article_params is the strong parameters pattern. It whitelists exactly which fields the user can submit. Without it, someone could set any column \u2014 admin status, timestamps, anything. Strong params are your security gate."},{"name":"Model Meadows","subtitle":"ActiveRecord Associations and Validations","concept":"ActiveRecord","landmarkType":"forest","code":{"file":"app/models/article.rb","content":"# app/models/article.rb\nclass Article < ApplicationRecord\n  belongs_to :author, class_name: \"User\"\n  has_many :comments, dependent: :destroy\n  has_many :taggings, dependent: :destroy\n  has_many :tags, through: :taggings\n  has_one_attached :cover_image\n\n  validates :title, presence: true, length: { maximum: 200 }\n  validates :body, presence: true\n  validates :slug, uniqueness: true\n\n  scope :published, -> { where(published: true) }\n  scope :recent, -> { order(created_at: :desc).limit(10) }\n\n  before_validation :generate_slug, on: :create\n\n  def reading_time\n    (body.split.size / 200.0).ceil\n  end\n\n  private\n\n  def generate_slug\n    self.slug = title&.parameterize\n  end\nend","language":"ruby"},"narration":"Model Meadows is the heart of any Rails app. ActiveRecord maps your Ruby classes to database tables automatically \u2014 no XML, no config files. Associations like belongs_to and has_many define relationships in plain English. Validations ensure data integrity before anything hits the database. Scopes like published give you reusable query fragments you can chain together. The before_validation callback generates a URL slug from the title. Rails models are where your business rules live."},{"name":"View Valley","subtitle":"ERB Templates and Partials","concept":"ERB Templates","landmarkType":"desert","code":{"file":"app/views/articles/index.html.erb","content":"<%# app/views/articles/index.html.erb %>\n<h1>Articles</h1>\n\n<div class=\"articles-grid\">\n  <%= render partial: \"article_card\",\n             collection: @articles %>\n</div>\n\n<%= paginate @articles %>\n\n<%# app/views/articles/_article_card.html.erb %>\n<article class=\"card\">\n  <% if article_card.cover_image.attached? %>\n    <%= image_tag article_card.cover_image.variant(:thumb),\n                  class: \"card-image\" %>\n  <% end %>\n\n  <h2><%= link_to article_card.title, article_card %></h2>\n  <p class=\"meta\">\n    By <%= article_card.author.name %> |\n    <%= time_ago_in_words(article_card.created_at) %> ago |\n    <%= article_card.reading_time %> min read\n  </p>\n  <p><%= truncate(article_card.body, length: 200) %></p>\n</article>","language":"ruby"},"narration":"View Valley is where data becomes HTML. ERB \u2014 Embedded Ruby \u2014 lets you mix Ruby logic right into your templates. The angle-bracket-percent tags run Ruby code. The equals sign variant outputs the result. The real power here is partials. That underscore article_card file is a reusable component. Passing collection colon at-articles renders the partial once per article automatically. Rails names the local variable from the partial filename. No loops needed in the parent template. Convention saves you from boilerplate."},{"name":"ERB Rendering Post","subtitle":"Layouts and Helpers","concept":"ERB Templates","landmarkType":"camp","code":{"file":"app/views/layouts/application.html.erb","content":"<%# app/views/layouts/application.html.erb %>\n<!DOCTYPE html>\n<html>\n  <head>\n    <title><%= content_for?(:title) ? yield(:title) : \"BlogApp\" %></title>\n    <meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n    <%= csrf_meta_tags %>\n    <%= csp_meta_tag %>\n    <%= stylesheet_link_tag \"application\",\n        \"data-turbo-track\": \"reload\" %>\n    <%= javascript_importmap_tags %>\n  </head>\n  <body>\n    <%= render \"shared/navbar\" %>\n    <% if notice.present? %>\n      <div class=\"flash-notice\"><%= notice %></div>\n    <% end %>\n    <main class=\"container\">\n      <%= yield %>\n    </main>\n    <%= render \"shared/footer\" %>\n  </body>\n</html>","language":"ruby"},"narration":"ERB Rendering Post is where the full page assembles. The layout wraps every view in your app. That yield keyword is the magic slot \u2014 your action\u2019s template gets injected right there. Content_for lets child templates push content up into the layout, like setting a custom page title. Notice csrf_meta_tags \u2014 Rails automatically injects a CSRF token into every page. The csp_meta_tag adds Content Security Policy headers. Security baked in by default. Turbo handles page navigation without full reloads. The layout is the frame. Your views are the paintings inside it."},{"name":"Response River","subtitle":"Status Codes and Formats","concept":"Convention Routing","landmarkType":"river","code":{"file":"app/controllers/api/v1/articles_controller.rb","content":"# app/controllers/api/v1/articles_controller.rb\nmodule Api\n  module V1\n    class ArticlesController < ApplicationController\n      skip_before_action :verify_authenticity_token\n\n      def show\n        @article = Article.find(params[:id])\n        render json: @article, include: [:comments, :tags],\n               status: :ok\n      end\n\n      def create\n        @article = current_user.articles.build(article_params)\n        if @article.save\n          render json: @article, status: :created,\n                 location: api_v1_article_url(@article)\n        else\n          render json: { errors: @article.errors.full_messages },\n                 status: :unprocessable_entity\n        end\n      end\n    end\n  end\nend","language":"ruby"},"narration":"Response River is where your data takes its final shape. Rails can render HTML, JSON, XML, or plain text from the same controller. For API endpoints, render json serializes your model automatically. Notice the status codes \u2014 colon created maps to HTTP 201, colon unprocessable_entity to 422. Rails uses human-readable symbols instead of memorizing numbers. The location header tells API clients where to find the newly created resource. One framework, multiple response formats. That is the power of Rails respond-to conventions."},{"name":"Response Frontier","subtitle":"The Complete Request Cycle","concept":"Full Lifecycle","landmarkType":"town","code":{"file":"The complete Rails request cycle","content":"# The complete Rails request cycle:\n#\n# 1. Request hits config.ru -> Rack middleware stack\n#      Rack::Sendfile -> ActionDispatch::Static -> Rack::Lock\n#      -> ActionDispatch::Cookies -> ActionDispatch::Session\n#      -> ActionDispatch::Flash -> Rack::MethodOverride\n#\n# 2. ActionDispatch::Routing matches URL to controller#action\n#      GET /articles/42 -> ArticlesController#show\n#\n# 3. Controller callbacks run (before_action chain)\n#      authenticate_user! -> set_article -> show\n#\n# 4. Action executes, loads models via ActiveRecord\n#      Article.find(42) -> SQL: SELECT * FROM articles WHERE id = 42\n#\n# 5. View template renders with instance variables\n#      @article -> app/views/articles/show.html.erb\n#\n# 6. Layout wraps the rendered template\n#      application.html.erb yields the view content\n#\n# 7. Response flows back through middleware (reverse order)\n#      Headers set -> cookies written -> body compressed\n#\n# 8. Rack sends HTTP response to the client\n#      Status: 200 OK | Content-Type: text/html | Body: rendered HTML","language":"ruby"},"narration":"You made it to the Response Frontier! Here is the full picture. A request enters through Rack and passes through about twenty middleware layers. The router matches the URL to a controller and action. Before-action callbacks run for authentication and setup. The action loads data through ActiveRecord, which translates Ruby into SQL. Instance variables flow into ERB templates, which render inside the layout. The response then travels back through the middleware stack in reverse \u2014 setting cookies, compressing the body, adding headers. Finally, Rack delivers the HTTP response. Convention guided every step. Your wagon has arrived."}],"events":[{"type":"weather","trigger":"after_stop","triggerStop":1,"title":"Routing Storm!","text":"A storm of incoming requests is overwhelming your app. You notice that every request to slash admin slash dashboard hits your routes file, but there is no matching route. Rails is throwing RoutingError exceptions and flooding your logs.","choices":[{"text":"Add a catch-all route at the bottom of routes.rb to handle unmatched paths gracefully","correct":true,"explanation":"A catch-all route like get star path, to colon errors hash show prevents RoutingError exceptions from crashing your app. Placing it at the bottom ensures it only matches when no other route does. This is how production Rails apps handle four oh four pages gracefully."},{"text":"Add more specific routes for every possible URL someone might visit","correct":false,"explanation":"You cannot anticipate every URL someone might request. Bots and scanners hit random paths constantly. A catch-all route handles the infinite set of unmatched URLs with a single line."},{"text":"Disable routing errors entirely in the Rails configuration","correct":false,"explanation":"Silencing errors hides real problems. If a legitimate route is missing, you would never know. The correct approach is to handle unmatched routes explicitly with a catch-all, not to suppress the error."}],"concept":"Convention Routing","difficulty":"easy"},{"type":"encounter","trigger":"after_stop","triggerStop":2,"title":"A Senior Developer Appears","text":"A fellow traveler examines your controller code and asks: 'Why do you call params dot require colon article dot permit instead of just using params directly? What attack does this prevent?'","choices":[{"text":"Mass assignment \u2014 without permit, a user could set any column like admin or role through the form","correct":true,"explanation":"Exactly. Strong parameters are Rails\u2019 defense against mass assignment attacks. Without them, a malicious user could add hidden form fields to set protected attributes like is_admin to true. The permit method creates an explicit whitelist of allowed fields."},{"text":"SQL injection \u2014 params could contain raw SQL that modifies the database query","correct":false,"explanation":"ActiveRecord already parameterizes all queries to prevent SQL injection. Strong parameters solve a different problem: controlling which model attributes a user can set through form submissions."},{"text":"Cross-site scripting \u2014 params could contain JavaScript that runs in other users' browsers","correct":false,"explanation":"Rails handles XSS through automatic HTML escaping in ERB templates. Strong parameters protect against mass assignment, which is about unauthorized attribute setting, not script injection."}],"concept":"ActiveRecord","difficulty":"medium"},{"type":"river","trigger":"after_stop","triggerStop":3,"title":"The N+1 Query River","text":"You have reached the most dangerous river on the trail. Your articles index page loads fifty articles, and for each one, the template calls article dot author dot name. Your logs show fifty-one SQL queries \u2014 one for the articles and one per author. The page takes eight seconds to load. How do you cross?","choices":[{"text":"Use includes colon author in the controller query to eager-load the association","correct":true,"explanation":"Article dot includes parenthesis colon author loads all authors in a single SQL query upfront. Instead of fifty-one queries, you get two \u2014 one for articles, one for all their authors. This is the standard Rails fix for N plus one queries. The bullet gem can detect these automatically in development."},{"text":"Cache each author record in Redis so the database is only hit once per author","correct":false,"explanation":"Caching hides the problem but does not fix it. The first request still fires fifty-one queries. And cache invalidation adds its own complexity. Eager loading with includes is the correct solution \u2014 it fixes the root cause."},{"text":"Move the author name directly into the articles table to avoid the join entirely","correct":false,"explanation":"Denormalizing data violates database normalization principles. When an author changes their name, you would need to update every article row. Eager loading preserves proper data modeling while eliminating the performance problem."}],"concept":"ActiveRecord","difficulty":"medium"},{"type":"misfortune","trigger":"after_stop","triggerStop":4,"title":"XSS Vulnerability Discovered!","text":"Disaster! A security audit reveals that one of your templates uses raw to render user-submitted HTML comments. An attacker injected a script tag that steals session cookies from every visitor. How should you fix this?","choices":[{"text":"Remove the raw call and let Rails auto-escape all user output by default","correct":true,"explanation":"Rails automatically escapes all ERB output through the html_safe mechanism. The angle-bracket-percent-equals tag escapes by default. Using raw or html_safe on user input bypasses this protection. Removing raw restores Rails\u2019 built-in XSS prevention. If you need formatted content, use a sanitizer like sanitize helper."},{"text":"Add a Content-Security-Policy header to block inline scripts","correct":false,"explanation":"CSP headers add a layer of defense, but they do not fix the root cause. The raw call is still injecting unsanitized HTML. Some older browsers ignore CSP headers entirely. Fix the template first, then add CSP as defense in depth."},{"text":"Validate that comments do not contain angle brackets when they are submitted","correct":false,"explanation":"Input validation is fragile. Attackers can bypass it with URL encoding, Unicode tricks, or polyglot payloads. Rails\u2019 output escaping is the proper defense because it handles all edge cases at render time regardless of how the data was stored."}],"concept":"ERB Templates","difficulty":"hard"},{"type":"fortune","trigger":"after_stop","triggerStop":5,"title":"Convention Over Configuration Bonus","text":"Your deep understanding of Rails conventions is paying off! You discovered that naming your partial underscore article_card automatically sets the local variable article_card. A group of friendly developers join your camp to share more convention tips.","choices":[],"concept":"ERB Templates","difficulty":"easy"},{"type":"encounter","trigger":"after_stop","triggerStop":6,"title":"A Seasoned API Developer Appears","text":"A fellow traveler shows you their API controller. 'I namespace all my API controllers under Api V1 and use skip_before_action to disable CSRF protection for JSON endpoints. But I keep authentication.' What principle does the CSRF skip follow?","choices":[{"text":"API endpoints use token auth instead of cookies, so CSRF protection is unnecessary and would block legitimate requests","correct":true,"explanation":"CSRF attacks exploit browser cookies being sent automatically. API endpoints typically use Bearer tokens in the Authorization header, which browsers never send automatically. Keeping CSRF on API endpoints would reject every non-browser request. Token auth makes CSRF redundant for APIs."},{"text":"Skipping CSRF makes the API faster because Rails does not need to verify tokens on every request","correct":false,"explanation":"CSRF verification is extremely fast \u2014 it is a simple string comparison. Performance is not the reason to skip it. The reason is that CSRF protection is designed for cookie-based browser sessions, which APIs do not use."},{"text":"CSRF is only needed in development to catch bugs, so production APIs can safely disable it","correct":false,"explanation":"CSRF protection is a critical production security feature for browser-based sessions. It is disabled for APIs not because it is unimportant, but because APIs authenticate differently \u2014 with tokens instead of cookies."}],"concept":"Convention Routing","difficulty":"hard"},{"type":"encounter","trigger":"after_stop","triggerStop":1,"title":"A Rails Guide Appears","text":"A fellow traveler shows you a single line in routes.rb: resources :articles. 'This one line generates seven routes,' they say. What does the resources macro give you?","choices":[{"text":"Seven RESTful routes \u2014 index, show, new, create, edit, update, and destroy \u2014 mapped to controller actions automatically","correct":true,"explanation":"The resources macro follows REST conventions to generate a complete CRUD interface. Each route maps to a controller action by convention: GET slash articles maps to index, POST maps to create, and so on. This is Rails convention over configuration at its core."},{"text":"A single route that accepts any HTTP method and dispatches based on the request body","correct":false,"explanation":"Rails routes are explicit about HTTP methods. Each of the seven routes has a specific method \u2014 GET, POST, PATCH, DELETE. This separation follows REST principles and prevents accidental mutations from GET requests."},{"text":"An auto-generated admin interface for the articles table","correct":false,"explanation":"Rails does not generate admin interfaces automatically \u2014 that is Django's approach. The resources macro only generates routes and expects you to write the controller. Gems like ActiveAdmin provide admin panels."}],"concept":"Convention Routing","difficulty":"easy"},{"type":"weather","trigger":"after_stop","triggerStop":2,"title":"Generator Whirlwind!","text":"A whirlwind of files hits your project. A junior developer ran rails generate scaffold Article and it created a model, migration, controller, views, helpers, tests, and stylesheets \u2014 twenty files in one command. They are overwhelmed.","choices":[{"text":"Use more targeted generators like rails generate model or rails generate controller to create only what you need","correct":true,"explanation":"Scaffold generates everything at once, which is great for prototyping but overwhelming in a real project. Targeted generators like rails generate model Article title:string body:text create just the model and migration. You stay in control of what gets added to your codebase."},{"text":"Always use scaffold and delete the files you don't need afterward","correct":false,"explanation":"Generating files just to delete them wastes time and risks leaving behind unwanted code. Targeted generators exist precisely to give you control. Use scaffold for quick prototypes, targeted generators for production code."},{"text":"Avoid generators entirely and create all files manually","correct":false,"explanation":"Manual file creation means you miss Rails conventions \u2014 the correct directory structure, naming patterns, and boilerplate that generators handle. Generators ensure consistency with Rails conventions."}],"concept":"ActiveRecord","difficulty":"easy"},{"type":"misfortune","trigger":"after_stop","triggerStop":3,"title":"Association Confusion!","text":"Your app crashes with 'undefined method comments for Article'. You added has_many :comments to Article but forgot something. Comment records exist in the database with an article_id column, but Rails can't find them.","choices":[{"text":"Add the belongs_to :article declaration to the Comment model \u2014 both sides of the association must be declared","correct":true,"explanation":"Rails associations are bidirectional by convention. has_many on Article declares the 'one' side, but Comment needs belongs_to :article to declare the 'many' side. Without it, Rails doesn't know how to connect Comment back to Article via the article_id foreign key."},{"text":"Run a migration to add a comments_id column to the articles table","correct":false,"explanation":"The foreign key belongs on the 'many' side \u2014 comments has article_id, not the reverse. Adding comments_id to articles would be backwards. The issue isn't the schema, it's the missing belongs_to declaration."},{"text":"Change has_many to has_one since each comment belongs to one article","correct":false,"explanation":"has_one and has_many describe the cardinality from Article's perspective. An article has MANY comments, so has_many is correct. has_one would mean each article can only have a single comment."}],"concept":"ActiveRecord","difficulty":"easy"},{"type":"weather","trigger":"after_stop","triggerStop":4,"title":"The Scope Fog","text":"Dense fog rolls in. Your controller has Article.where(published: true).where('publish_date <= ?', Time.current).order(publish_date: :desc) repeated in six different actions. The code is duplicated everywhere and hard to maintain.","choices":[{"text":"Define a scope on the model: scope :published, -> { where(published: true).where('publish_date <= ?', Time.current) }","correct":true,"explanation":"Scopes encapsulate common query patterns as chainable, reusable methods on the model. Article.published.order(publish_date: :desc) reads clearly and the query logic lives in one place. Scopes are composable \u2014 you can chain them like Article.published.recent.featured."},{"text":"Create a service object that wraps the query in a method","correct":false,"explanation":"A service object for a simple query filter is over-engineering. Scopes are Rails' built-in answer for reusable query fragments. They live on the model where query logic belongs and integrate with ActiveRecord's chainable interface."},{"text":"Store the query results in a constant at boot time so the query only runs once","correct":false,"explanation":"Storing dynamic query results in a constant means the data is frozen at boot time. New articles would never appear until you restart the server. Scopes run fresh queries each time, which is what you want for current data."}],"concept":"ActiveRecord","difficulty":"medium"},{"type":"river","trigger":"after_stop","triggerStop":5,"title":"The Callback River","text":"You've reached a dangerous crossing. Your Article model has before_save, after_save, before_validation, and after_create callbacks that trigger emails, update counters, and sync to an external API. A simple update to fix a typo triggers all of them. How do you cross safely?","choices":[{"text":"Use conditional callbacks with if: or unless: guards, and consider moving side effects to service objects for complex operations","correct":true,"explanation":"Callbacks with guards like after_save :notify_subscribers, if: :published_changed? only fire when relevant. For complex side effects like API syncs, service objects make the flow explicit. The key principle: callbacks should be for data consistency, not business workflows."},{"text":"Remove all callbacks and put everything in the controller","correct":false,"explanation":"Moving all logic to controllers means duplicating it everywhere articles are saved \u2014 admin panel, background jobs, console. Some callbacks like data normalization belong on the model. The issue is indiscriminate callbacks, not callbacks as a concept."},{"text":"Override the save method to control exactly what runs on each save","correct":false,"explanation":"Overriding save is fragile \u2014 you need to remember to call super, and you lose the declarative clarity of named callbacks with conditions. Conditional callbacks and service objects give you the same control with better maintainability."}],"concept":"ERB Templates","difficulty":"hard"},{"type":"misfortune","trigger":"after_stop","triggerStop":5,"title":"Nested Route Overload!","text":"Your routes are nested three levels deep: resources :users do resources :posts do resources :comments. URL helpers are monstrously long: edit_user_post_comment_path. The routes file is unreadable.","choices":[{"text":"Use shallow: true to only nest routes that actually need the parent ID, flattening the rest","correct":true,"explanation":"Shallow nesting means collection routes like index and create stay nested (they need the parent), but member routes like show, edit, update, destroy use just the resource's own ID. comments_path(post) for creating, but edit_comment_path(comment) for editing. Much cleaner URLs and helpers."},{"text":"Remove all nesting and pass parent IDs as query parameters instead","correct":false,"explanation":"Query parameters for parent relationships lose the RESTful URL structure that conveys resource hierarchy. Shallow nesting preserves the relationship where it matters (creation and listing) without the excessive depth."},{"text":"Keep the deep nesting since it accurately represents the data relationships","correct":false,"explanation":"Deep nesting generates unnecessarily long URLs and helpers. A comment doesn't need the user AND post in its edit URL \u2014 the comment ID is sufficient to find it. Shallow nesting reflects the real access patterns, not the full data hierarchy."}],"concept":"Convention Routing","difficulty":"medium"},{"type":"misfortune","trigger":"after_stop","triggerStop":6,"title":"Thread Safety Disaster!","text":"Your production app using Puma has a mysterious bug: users occasionally see each other's data. Your controller sets a class-level instance variable @@current_user to avoid passing the user through method calls. Under concurrent requests, this shared state is causing data leaks.","choices":[{"text":"Never use class variables or class-level instance variables for per-request state \u2014 use Current attributes or pass state through method parameters","correct":true,"explanation":"Class variables are shared across all threads in a process. When two requests run simultaneously, they overwrite each other's @@current_user. Rails provides CurrentAttributes (ActiveSupport::CurrentAttributes) for thread-safe per-request state, or you can simply pass the user as a parameter."},{"text":"Switch from Puma to a single-threaded server like WEBrick to avoid the issue","correct":false,"explanation":"Single-threaded servers solve the symptom by eliminating concurrency, but they cannot handle production traffic. The root cause is shared mutable state. Fix the architecture, don't cripple your infrastructure."},{"text":"Add a mutex lock around the class variable to prevent simultaneous access","correct":false,"explanation":"A mutex would prevent data races but would serialize all requests through a bottleneck \u2014 destroying concurrency benefits entirely. The fix is to not share per-request state across threads at all."}],"concept":"ERB Templates","difficulty":"hard"}],"partyMembers":[{"name":"Rack Middleware","icon":"rack","maxHealth":3},{"name":"Convention Routing","icon":"routing","maxHealth":3},{"name":"ActiveRecord","icon":"model","maxHealth":3},{"name":"ERB Templates","icon":"view","maxHealth":3}],"deathMessages":["Died of N+1 query disease. Should have used dot includes.","Lost in the convention \u2014 named the controller wrong and Rails could not find it.","Buried under an avalanche of unpinned gem versions. Bundle install will not save you now.","Drowned in the migration river. The schema drifted and rake db colon migrate gave up.","Killed by mass assignment. Forgot to permit the params and the attacker became admin.","Here lies your app. It died of unhandled ActiveRecord RecordNotFound in production.","Your callbacks formed an infinite loop. Before_save triggered after_save triggered before_save.","Starved waiting for the asset pipeline. Sprockets compiled for eleven hours and never finished."]};

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const W = 320, H = 200;

// Seeded PRNG for consistent landscape
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xFFFFFFFF;
    return (s >>> 0) / 0xFFFFFFFF;
  };
}

const rng = seededRandom(42);
const cloudPositions = [];
for (let i = 0; i < 5; i++) {
  cloudPositions.push({ x: rng() * 400, y: 10 + rng() * 30, w: 25 + rng() * 30, h: 8 + rng() * 6 });
}
const farMountains = [];
for (let i = 0; i < 6; i++) {
  farMountains.push({ x: i * 70 - 20 + rng() * 30, h: 40 + rng() * 35, w: 50 + rng() * 40 });
}
const nearMountains = [];
for (let i = 0; i < 8; i++) {
  nearMountains.push({ x: i * 55 - 30 + rng() * 20, h: 25 + rng() * 25, w: 30 + rng() * 25, snow: rng() > 0.3 });
}
const treesData = [];
for (let i = 0; i < 25; i++) {
  treesData.push({ x: rng() * 600, h: 12 + rng() * 16 });
}

function getSkyColors() {
  const progress = currentStop / Math.max(TRAIL_DATA.stops.length, 1);
  if (progress < 0.15) {
    return { top: '#5500AA', bottom: '#FF5555' };
  } else if (progress < 0.7) {
    return { top: '#5555FF', bottom: '#55FFFF' };
  } else {
    return { top: '#5500AA', bottom: '#FFAA00' };
  }
}

function drawPixelCloud(x, y, w, h) {
  ctx.fillStyle = '#FFFFFF';
  const ix = Math.floor(x), iy = Math.floor(y), iw = Math.floor(w), ih = Math.floor(h);
  ctx.fillRect(ix, iy, iw, ih);
  ctx.fillRect(ix + Math.floor(iw * 0.15), iy - Math.floor(ih * 0.5), Math.floor(iw * 0.3), Math.floor(ih * 0.6));
  ctx.fillRect(ix + Math.floor(iw * 0.4), iy - Math.floor(ih * 0.7), Math.floor(iw * 0.35), Math.floor(ih * 0.8));
  ctx.fillRect(ix + Math.floor(iw * 0.65), iy - Math.floor(ih * 0.3), Math.floor(iw * 0.2), Math.floor(ih * 0.4));
}

function drawMountain(x, h, w, color, snowCap) {
  const baseY = 110;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(Math.floor(x), baseY);
  ctx.lineTo(Math.floor(x + w / 2), Math.floor(baseY - h));
  ctx.lineTo(Math.floor(x + w), baseY);
  ctx.closePath();
  ctx.fill();
  if (snowCap) {
    ctx.fillStyle = '#FFFFFF';
    const peakX = x + w / 2;
    const peakY = baseY - h;
    ctx.beginPath();
    ctx.moveTo(Math.floor(peakX - w * 0.1), Math.floor(peakY + h * 0.18));
    ctx.lineTo(Math.floor(peakX), Math.floor(peakY));
    ctx.lineTo(Math.floor(peakX + w * 0.1), Math.floor(peakY + h * 0.18));
    ctx.closePath();
    ctx.fill();
  }
}

function drawTree(x, baseY, h) {
  const trunkW = 3, trunkH = Math.floor(h * 0.3);
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(x - 1), Math.floor(baseY - trunkH), trunkW, trunkH);
  for (let i = 0; i < 3; i++) {
    const layerW = (h * 0.4) * (1 - i * 0.15);
    const layerY = baseY - trunkH - (i * h * 0.2);
    ctx.fillStyle = i === 1 ? '#00AA00' : '#005500';
    ctx.beginPath();
    ctx.moveTo(Math.floor(x - layerW / 2), Math.floor(layerY));
    ctx.lineTo(Math.floor(x + 0.5), Math.floor(layerY - h * 0.25));
    ctx.lineTo(Math.floor(x + layerW / 2), Math.floor(layerY));
    ctx.closePath();
    ctx.fill();
  }
}

function drawWagon(wx, wy) {
  // Oxen (two brown lumps)
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(wx - 24), Math.floor(wy - 6), 8, 6);
  ctx.fillRect(Math.floor(wx - 14), Math.floor(wy - 6), 8, 6);
  // Oxen legs
  ctx.fillStyle = '#553300';
  ctx.fillRect(Math.floor(wx - 22), Math.floor(wy), 2, 4);
  ctx.fillRect(Math.floor(wx - 18), Math.floor(wy), 2, 4);
  ctx.fillRect(Math.floor(wx - 12), Math.floor(wy), 2, 4);
  ctx.fillRect(Math.floor(wx - 8), Math.floor(wy), 2, 4);
  // Oxen heads
  ctx.fillStyle = '#885500';
  ctx.fillRect(Math.floor(wx - 26), Math.floor(wy - 7), 3, 3);
  ctx.fillRect(Math.floor(wx - 16), Math.floor(wy - 7), 3, 3);
  // Yoke
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(wx - 4), Math.floor(wy - 4), 6, 2);
  // Wagon body
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(wx + 2), Math.floor(wy - 8), 24, 10);
  // Wagon sides darker
  ctx.fillStyle = '#885500';
  ctx.fillRect(Math.floor(wx + 2), Math.floor(wy - 8), 24, 1);
  ctx.fillRect(Math.floor(wx + 2), Math.floor(wy + 1), 24, 1);
  // Canvas cover (white curved top)
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.moveTo(Math.floor(wx + 3), Math.floor(wy - 8));
  ctx.quadraticCurveTo(Math.floor(wx + 14), Math.floor(wy - 22), Math.floor(wx + 25), Math.floor(wy - 8));
  ctx.closePath();
  ctx.fill();
  // Canvas cover outline
  ctx.strokeStyle = '#AAAAAA';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(Math.floor(wx + 3), Math.floor(wy - 8));
  ctx.quadraticCurveTo(Math.floor(wx + 14), Math.floor(wy - 22), Math.floor(wx + 25), Math.floor(wy - 8));
  ctx.stroke();
  // Canvas ribs
  ctx.strokeStyle = '#AAAAAA';
  for (let ri = 0; ri < 3; ri++) {
    const rx = wx + 8 + ri * 5;
    ctx.beginPath();
    ctx.moveTo(Math.floor(rx), Math.floor(wy - 8));
    ctx.lineTo(Math.floor(rx), Math.floor(wy - 14 - ri % 2 * 2));
    ctx.stroke();
  }
  // Wheels
  const wheelR = 5;
  for (let wi = 0; wi < 2; wi++) {
    const wcx = wx + 7 + wi * 14;
    const wcy = wy + 4;
    // Outer rim
    ctx.fillStyle = '#553300';
    ctx.beginPath();
    ctx.arc(Math.floor(wcx), Math.floor(wcy), wheelR, 0, Math.PI * 2);
    ctx.fill();
    // Inner
    ctx.fillStyle = '#AA5500';
    ctx.beginPath();
    ctx.arc(Math.floor(wcx), Math.floor(wcy), wheelR - 1.5, 0, Math.PI * 2);
    ctx.fill();
    // Spokes
    ctx.strokeStyle = '#553300';
    ctx.lineWidth = 1;
    for (let si = 0; si < 6; si++) {
      const angle = wagonWheelAngle + (si * Math.PI / 3);
      ctx.beginPath();
      ctx.moveTo(Math.floor(wcx), Math.floor(wcy));
      ctx.lineTo(Math.floor(wcx + Math.cos(angle) * (wheelR - 1)), Math.floor(wcy + Math.sin(angle) * (wheelR - 1)));
      ctx.stroke();
    }
    // Hub
    ctx.fillStyle = '#553300';
    ctx.fillRect(Math.floor(wcx - 1), Math.floor(wcy - 1), 2, 2);
  }
  // Red flag (Rails red)
  ctx.fillStyle = '#CC0000';
  ctx.fillRect(Math.floor(wx + 14), Math.floor(wy - 22), 1, -7);
  ctx.fillStyle = '#FF5555';
  ctx.fillRect(Math.floor(wx + 15), Math.floor(wy - 29), 6, 4);
}

function drawLandmark(type, x, baseY) {
  switch (type) {
    case 'town':
      ctx.fillStyle = '#AA5500';
      ctx.fillRect(Math.floor(x), Math.floor(baseY - 18), 14, 18);
      ctx.fillRect(Math.floor(x + 18), Math.floor(baseY - 14), 12, 14);
      // Roofs
      ctx.fillStyle = '#555555';
      ctx.beginPath();
      ctx.moveTo(Math.floor(x - 2), Math.floor(baseY - 18));
      ctx.lineTo(Math.floor(x + 7), Math.floor(baseY - 25));
      ctx.lineTo(Math.floor(x + 16), Math.floor(baseY - 18));
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(Math.floor(x + 16), Math.floor(baseY - 14));
      ctx.lineTo(Math.floor(x + 24), Math.floor(baseY - 20));
      ctx.lineTo(Math.floor(x + 32), Math.floor(baseY - 14));
      ctx.closePath();
      ctx.fill();
      // Windows
      ctx.fillStyle = '#FFFF55';
      ctx.fillRect(Math.floor(x + 3), Math.floor(baseY - 13), 3, 3);
      ctx.fillRect(Math.floor(x + 9), Math.floor(baseY - 13), 3, 3);
      ctx.fillRect(Math.floor(x + 21), Math.floor(baseY - 10), 3, 3);
      // Door
      ctx.fillStyle = '#553300';
      ctx.fillRect(Math.floor(x + 5), Math.floor(baseY - 7), 4, 7);
      break;
    case 'camp':
      // Tent
      ctx.fillStyle = '#AAAAAA';
      ctx.beginPath();
      ctx.moveTo(Math.floor(x - 6), Math.floor(baseY));
      ctx.lineTo(Math.floor(x + 4), Math.floor(baseY - 14));
      ctx.lineTo(Math.floor(x + 14), Math.floor(baseY));
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#555555';
      ctx.beginPath();
      ctx.moveTo(Math.floor(x + 4), Math.floor(baseY));
      ctx.lineTo(Math.floor(x + 4), Math.floor(baseY - 14));
      ctx.lineTo(Math.floor(x + 14), Math.floor(baseY));
      ctx.closePath();
      ctx.fill();
      // Campfire
      ctx.fillStyle = '#FF5555';
      ctx.fillRect(Math.floor(x + 20), Math.floor(baseY - 5), 4, 3);
      ctx.fillStyle = '#FFFF55';
      ctx.fillRect(Math.floor(x + 21), Math.floor(baseY - 8), 2, 3);
      ctx.fillStyle = '#FFAA00';
      ctx.fillRect(Math.floor(x + 18), Math.floor(baseY - 2), 8, 2);
      break;
    case 'mountain':
      drawMountain(x - 20, 60, 50, '#CC0000', true);
      drawMountain(x + 10, 45, 40, '#FF5555', true);
      break;
    case 'river':
      ctx.fillStyle = '#AA5500';
      ctx.fillRect(Math.floor(x), Math.floor(baseY - 20), 3, 20);
      ctx.fillRect(Math.floor(x + 24), Math.floor(baseY - 20), 3, 20);
      ctx.strokeStyle = '#AAAAAA';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(Math.floor(x + 1), Math.floor(baseY - 18));
      ctx.lineTo(Math.floor(x + 25), Math.floor(baseY - 18));
      ctx.stroke();
      // Sign
      ctx.fillStyle = '#AA5500';
      ctx.fillRect(Math.floor(x + 8), Math.floor(baseY - 25), 12, 8);
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(Math.floor(x + 10), Math.floor(baseY - 23), 2, 1);
      ctx.fillRect(Math.floor(x + 13), Math.floor(baseY - 23), 2, 1);
      ctx.fillRect(Math.floor(x + 16), Math.floor(baseY - 23), 2, 1);
      break;
    case 'forest':
      for (let i = 0; i < 6; i++) {
        drawTree(x + i * 7, baseY, 14 + (i % 3) * 3);
      }
      break;
    case 'desert':
      // Sandy ground tint
      ctx.fillStyle = '#DDAA55';
      ctx.fillRect(Math.floor(x - 10), Math.floor(baseY - 2), 50, 4);
      // Cactus 1
      ctx.fillStyle = '#00AA00';
      ctx.fillRect(Math.floor(x + 5), Math.floor(baseY - 18), 4, 18);
      ctx.fillRect(Math.floor(x + 1), Math.floor(baseY - 14), 4, 8);
      ctx.fillRect(Math.floor(x + 9), Math.floor(baseY - 12), 4, 6);
      // Cactus 2 (smaller)
      ctx.fillRect(Math.floor(x + 25), Math.floor(baseY - 12), 3, 12);
      ctx.fillRect(Math.floor(x + 22), Math.floor(baseY - 8), 3, 4);
      // Rocks
      ctx.fillStyle = '#AA8855';
      ctx.fillRect(Math.floor(x + 35), Math.floor(baseY - 3), 6, 3);
      ctx.fillRect(Math.floor(x + 38), Math.floor(baseY - 5), 4, 2);
      ctx.fillRect(Math.floor(x - 5), Math.floor(baseY - 2), 4, 2);
      break;
  }
}

function drawRiver(time) {
  const riverY = 155;
  const riverH = 18;
  ctx.fillStyle = '#0000AA';
  ctx.fillRect(0, riverY, W, riverH);
  ctx.fillStyle = '#00AAAA';
  for (let wx = 0; wx < W; wx += 3) {
    const waveY = riverY + 3 + Math.sin((wx + time * 0.05) * 0.08) * 3;
    ctx.fillRect(wx, Math.floor(waveY), 2, 1);
    const waveY2 = riverY + 10 + Math.sin((wx + time * 0.03 + 50) * 0.1) * 2;
    ctx.fillRect(wx, Math.floor(waveY2), 2, 1);
  }
  // White foam
  ctx.fillStyle = '#55FFFF';
  for (let wx = 0; wx < W; wx += 12) {
    const foamY = riverY + 1 + Math.sin((wx + time * 0.04) * 0.06) * 1;
    ctx.fillRect(wx + 2, Math.floor(foamY), 3, 1);
  }
}

function drawEventOverlay(time) {
  if (!currentEventType && !currentEventTitle) return;

  var t = (time || 0) * 0.001; // seconds

  // --- ROUTING STORM: dark sky, lightning, rain ---
  if (currentEventTitle.indexOf('Routing Storm') !== -1) {
    // Darken sky
    ctx.fillStyle = 'rgba(0,0,50,0.45)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning flash (periodic)
    var flashPhase = Math.sin(t * 1.7) + Math.sin(t * 3.1);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, 0, W, H);
      // Lightning bolt
      ctx.strokeStyle = '#FFFF55';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 80 + Math.sin(t * 2.3) * 60;
      ctx.moveTo(lx, 10);
      ctx.lineTo(lx - 5, 35);
      ctx.lineTo(lx + 8, 35);
      ctx.lineTo(lx - 3, 65);
      ctx.lineTo(lx + 10, 65);
      ctx.lineTo(lx + 2, 95);
      ctx.stroke();
    }
    // Rain
    ctx.strokeStyle = '#5555FF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 40; i++) {
      var rx = (i * 8.3 + t * 80) % W;
      var ry = (i * 13.7 + t * 120) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 1), Math.floor(ry + 5));
      ctx.stroke();
    }
    return;
  }

  // --- SENIOR DEVELOPER: person standing by campfire ---
  if (currentEventTitle.indexOf('Senior Developer') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8); // torso
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3); // head
    ctx.fillRect(px - 1, py - 4, 2, 5); // left leg
    ctx.fillRect(px + 3, py - 4, 2, 5); // right leg
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Campfire
    var fx = 212, fy = 148;
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(fx - 3, fy, 2, 3);
    ctx.fillRect(fx + 3, fy, 2, 3);
    ctx.fillStyle = '#FF5555';
    var flicker = Math.sin(t * 8) * 2;
    ctx.fillRect(fx - 1, fy - 3 + Math.floor(flicker * 0.3), 4, 3);
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(fx, fy - 5 + Math.floor(flicker * 0.5), 2, 2);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(fx - 1, fy - 2, 4, 2);
    // Firelight glow (subtle)
    ctx.fillStyle = 'rgba(255,170,0,0.08)';
    ctx.beginPath();
    ctx.arc(fx + 1, fy - 2, 15, 0, Math.PI * 2);
    ctx.fill();
    return;
  }

  // --- N+1 QUERY RIVER: rough rapids with white water ---
  if (currentEventTitle.indexOf('N+1 Query') !== -1) {
    // Extra turbulence on the river
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 20; i++) {
      var sx = (i * 17 + t * 40) % W;
      var sy = 157 + Math.sin((i * 3 + t * 5)) * 3;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 4, 2);
    }
    // Floating logs / debris
    ctx.fillStyle = '#AA5500';
    for (var i = 0; i < 3; i++) {
      var logX = (i * 110 + t * 25) % W;
      var logY = 159 + Math.sin(t * 2 + i) * 2;
      ctx.fillRect(Math.floor(logX), Math.floor(logY), 8, 2);
    }
    return;
  }

  // --- XSS VULNERABILITY: red sky, smoke, warning ---
  if (currentEventTitle.indexOf('XSS Vulnerability') !== -1) {
    // Red danger tint
    ctx.fillStyle = 'rgba(170,0,0,0.25)';
    ctx.fillRect(0, 0, W, H);
    // Smoke particles rising
    ctx.fillStyle = '#555555';
    for (var i = 0; i < 15; i++) {
      var sx = 140 + Math.sin(i * 2.7 + t) * 30;
      var sy = 130 - ((t * 20 + i * 15) % 90);
      var size = 2 + (i % 3);
      ctx.globalAlpha = 0.3 + Math.sin(t + i) * 0.15;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), size, size);
    }
    ctx.globalAlpha = 1.0;
    // Fire at base
    ctx.fillStyle = '#FF5555';
    for (var i = 0; i < 8; i++) {
      var fx = 130 + i * 5;
      var fh = 4 + Math.sin(t * 6 + i * 1.5) * 3;
      ctx.fillRect(fx, Math.floor(140 - fh), 3, Math.floor(fh));
    }
    ctx.fillStyle = '#FFFF55';
    for (var i = 0; i < 5; i++) {
      var fx = 135 + i * 6;
      var fh = 2 + Math.sin(t * 8 + i * 2) * 2;
      ctx.fillRect(fx, Math.floor(139 - fh), 2, Math.floor(fh));
    }
    // Pulsing red border
    var pulse = (Math.sin(t * 4) + 1) * 0.15;
    ctx.strokeStyle = 'rgba(255,0,0,' + pulse.toFixed(2) + ')';
    ctx.lineWidth = 3;
    ctx.strokeRect(1, 1, W - 2, H - 2);
    ctx.lineWidth = 1;
    return;
  }

  // --- CONVENTION OVER CONFIGURATION BONUS: sunny, flowers, rainbow ---
  if (currentEventTitle.indexOf('Convention Over Configuration') !== -1) {
    // Bright sun
    ctx.fillStyle = '#FFFF55';
    ctx.beginPath();
    ctx.arc(260, 30, 12, 0, Math.PI * 2);
    ctx.fill();
    // Sun rays
    ctx.strokeStyle = '#FFFF55';
    ctx.lineWidth = 1;
    for (var i = 0; i < 8; i++) {
      var angle = i * Math.PI / 4 + t * 0.3;
      ctx.beginPath();
      ctx.moveTo(260 + Math.cos(angle) * 14, 30 + Math.sin(angle) * 14);
      ctx.lineTo(260 + Math.cos(angle) * 20, 30 + Math.sin(angle) * 20);
      ctx.stroke();
    }
    // Flowers on ground
    var flowerColors = ['#FF5555', '#FFFF55', '#FF55FF', '#55FFFF', '#55FF55'];
    for (var i = 0; i < 12; i++) {
      var fx = (i * 27 + 10) % W;
      var fy = 135 + (i * 7) % 20;
      ctx.fillStyle = '#00AA00';
      ctx.fillRect(fx + 1, fy, 1, 4); // stem
      ctx.fillStyle = flowerColors[i % flowerColors.length];
      ctx.fillRect(fx, fy - 1, 3, 2); // petals
      ctx.fillStyle = '#FFFF55';
      ctx.fillRect(fx + 1, fy - 1, 1, 1); // center
    }
    // Rainbow arc
    var rainbowColors = ['#FF5555', '#FFAA00', '#FFFF55', '#55FF55', '#5555FF', '#CC0000'];
    for (var rc = 0; rc < rainbowColors.length; rc++) {
      ctx.strokeStyle = rainbowColors[rc];
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(160, 110, 70 + rc * 3, Math.PI * 1.1, Math.PI * 1.9);
      ctx.stroke();
    }
    ctx.lineWidth = 1;
    return;
  }

  // --- SEASONED API DEVELOPER: person with laptop by campfire ---
  if (currentEventTitle.indexOf('Seasoned API Developer') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8); // torso
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3); // head
    ctx.fillRect(px - 1, py - 4, 2, 5); // left leg
    ctx.fillRect(px + 3, py - 4, 2, 5); // right leg
    // Hat (Rails red)
    ctx.fillStyle = '#CC0000';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Laptop
    ctx.fillStyle = '#AAAAAA';
    ctx.fillRect(px + 7, py - 8, 6, 4);
    ctx.fillStyle = '#55FFFF';
    ctx.fillRect(px + 8, py - 7, 4, 2);
    // Campfire
    var fx = 212, fy = 148;
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(fx - 3, fy, 2, 3);
    ctx.fillRect(fx + 3, fy, 2, 3);
    ctx.fillStyle = '#FF5555';
    var flicker = Math.sin(t * 8) * 2;
    ctx.fillRect(fx - 1, fy - 3 + Math.floor(flicker * 0.3), 4, 3);
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(fx, fy - 5 + Math.floor(flicker * 0.5), 2, 2);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(fx - 1, fy - 2, 4, 2);
    // Firelight glow
    ctx.fillStyle = 'rgba(255,170,0,0.08)';
    ctx.beginPath();
    ctx.arc(fx + 1, fy - 2, 15, 0, Math.PI * 2);
    ctx.fill();
    return;
  }
}

// =====================================================================
// DEATH SCREEN — Apple II green phosphor style
// =====================================================================
function drawDeathScene(time) {
  var t = (time || 0) * 0.001;
  var G = '#33FF33'; // Apple II green
  var GD = '#1a8a1a'; // darker green for details

  // Black background
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);

  // Ground line
  ctx.fillStyle = GD;
  ctx.fillRect(0, 148, W, 1);

  // --- OX (left side) ---
  var ox = 100, oy = 128;
  // Body
  ctx.fillStyle = G;
  ctx.fillRect(ox, oy, 24, 14);
  // Head
  ctx.fillRect(ox - 10, oy - 2, 12, 10);
  // Horns
  ctx.fillRect(ox - 12, oy - 6, 3, 5);
  ctx.fillRect(ox - 4, oy - 6, 3, 5);
  // Snout
  ctx.fillStyle = GD;
  ctx.fillRect(ox - 10, oy + 4, 6, 3);
  // Eye
  ctx.fillStyle = '#000';
  ctx.fillRect(ox - 7, oy, 2, 2);
  // Legs
  ctx.fillStyle = G;
  ctx.fillRect(ox + 2, oy + 14, 4, 8);
  ctx.fillRect(ox + 10, oy + 14, 4, 8);
  ctx.fillRect(ox + 16, oy + 14, 4, 8);
  // Tail
  ctx.fillRect(ox + 24, oy + 2, 6, 2);
  ctx.fillRect(ox + 29, oy, 2, 4);

  // --- HITCH ---
  ctx.fillStyle = G;
  ctx.fillRect(ox + 28, oy + 8, 14, 2);

  // --- WAGON ---
  var wx = 142, wy = 108;
  // Wagon bed
  ctx.fillStyle = G;
  ctx.fillRect(wx, wy + 20, 50, 16);
  // Bed slats (dark lines)
  ctx.fillStyle = GD;
  ctx.fillRect(wx, wy + 24, 50, 1);
  ctx.fillRect(wx, wy + 28, 50, 1);
  ctx.fillRect(wx, wy + 32, 50, 1);
  // Side rails
  ctx.fillStyle = G;
  ctx.fillRect(wx, wy + 18, 2, 18);
  ctx.fillRect(wx + 48, wy + 18, 2, 18);

  // Canvas cover (the bonnet)
  ctx.fillStyle = G;
  // Left arch
  ctx.fillRect(wx + 4, wy + 4, 2, 16);
  // Right arch
  ctx.fillRect(wx + 44, wy + 4, 2, 16);
  // Top cover
  ctx.fillRect(wx + 4, wy + 2, 42, 4);
  // Cover fill
  ctx.fillRect(wx + 6, wy + 6, 38, 12);
  // Cover shading
  ctx.fillStyle = GD;
  ctx.fillRect(wx + 8, wy + 8, 34, 2);
  ctx.fillRect(wx + 8, wy + 12, 34, 2);
  ctx.fillRect(wx + 8, wy + 16, 34, 1);

  // Wheels
  var wheelR = 8;
  var wheels = [wx + 8, wx + 42];
  var wa = t * 0.5; // slow rotation
  ctx.strokeStyle = G;
  ctx.lineWidth = 1.5;
  for (var wi = 0; wi < wheels.length; wi++) {
    var cx = wheels[wi], cy = wy + 38;
    // Rim
    ctx.beginPath();
    ctx.arc(cx, cy, wheelR, 0, Math.PI * 2);
    ctx.stroke();
    // Spokes
    for (var sp = 0; sp < 6; sp++) {
      var angle = wa + sp * Math.PI / 3;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(angle) * wheelR, cy + Math.sin(angle) * wheelR);
      ctx.stroke();
    }
    // Hub
    ctx.fillStyle = G;
    ctx.beginPath();
    ctx.arc(cx, cy, 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.lineWidth = 1;

  // Subtle scanline effect
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  for (var sl = 0; sl < H; sl += 3) {
    ctx.fillRect(0, sl, W, 1);
  }

  // Subtle green glow/vignette
  var grd = ctx.createRadialGradient(W/2, H/2, 40, W/2, H/2, W * 0.7);
  grd.addColorStop(0, 'rgba(0,0,0,0)');
  grd.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
}

function renderCanvas(time) {
  // Death screen: green phosphor Apple II style
  if (gameState === STATES.DEATH) {
    drawDeathScene(time);
    return;
  }

  const skyColors = getSkyColors();

  // Sky gradient (banded for EGA feel)
  const bands = 10;
  const skyBottom = 110;
  for (let i = 0; i < bands; i++) {
    const t = i / (bands - 1);
    const r1 = parseInt(skyColors.top.substr(1, 2), 16);
    const g1 = parseInt(skyColors.top.substr(3, 2), 16);
    const b1 = parseInt(skyColors.top.substr(5, 2), 16);
    const r2 = parseInt(skyColors.bottom.substr(1, 2), 16);
    const g2 = parseInt(skyColors.bottom.substr(3, 2), 16);
    const b2 = parseInt(skyColors.bottom.substr(5, 2), 16);
    const r = Math.floor(r1 + (r2 - r1) * t);
    const g = Math.floor(g1 + (g2 - g1) * t);
    const b = Math.floor(b1 + (b2 - b1) * t);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    const bandH = Math.ceil(skyBottom / bands) + 1;
    ctx.fillRect(0, Math.floor(i * (skyBottom / bands)), W, bandH);
  }

  // Clouds (parallax 0.2x)
  const cloudOffset = scrollX * 0.2;
  for (const c of cloudPositions) {
    let cx = ((c.x - cloudOffset) % (W + 80));
    if (cx < -40) cx += W + 80;
    drawPixelCloud(cx - 20, c.y, c.w, c.h);
  }

  // Far mountains (parallax 0.3x) - DARK RED signature Rails color
  const farOffset = scrollX * 0.3;
  for (const m of farMountains) {
    let mx = ((m.x - farOffset) % (W + 100));
    if (mx < -50) mx += W + 100;
    drawMountain(mx - 25, m.h, m.w, '#CC0000', false);
  }

  // Near mountains (parallax 0.4x) - LIGHT RED with snow caps
  const nearOffset = scrollX * 0.4;
  for (const m of nearMountains) {
    let mx = ((m.x - nearOffset) % (W + 80));
    if (mx < -40) mx += W + 80;
    drawMountain(mx - 20, m.h, m.w, '#FF5555', m.snow);
  }

  // Grass
  ctx.fillStyle = '#00AA00';
  ctx.fillRect(0, 110, W, H - 110);

  // Bright grass highlights
  ctx.fillStyle = '#55FF55';
  const grassOffset = scrollX * 1.0;
  for (let i = 0; i < 50; i++) {
    let gx = ((i * 11 + 5 - grassOffset) % (W + 20));
    if (gx < -5) gx += W + 20;
    const gy = 113 + (i * 7 + i * i * 3) % 55;
    ctx.fillRect(Math.floor(gx), Math.floor(gy), 2, 2);
  }

  // Trees (parallax 0.6x)
  const treeOffset = scrollX * 0.6;
  const treeBaseY = 128;
  for (const t of treesData) {
    let tx = ((t.x - treeOffset) % (W + 60));
    if (tx < -20) tx += W + 60;
    drawTree(tx - 10, treeBaseY, t.h);
  }

  // Landmark for current stop (only at stops/events)
  if (gameState === STATES.STOP || gameState === STATES.EVENT || gameState === STATES.RIVER) {
    const stop = TRAIL_DATA.stops[currentStop];
    if (stop) {
      drawLandmark(stop.landmarkType, 240, 150);
    }
  }

  // Trail/ground strip
  if (!showRiver) {
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(0, 152, W, 15);
    // Trail texture dots
    ctx.fillStyle = '#885500';
    for (let i = 0; i < 35; i++) {
      let dotX = ((i * 10 - scrollX * 1.0) % (W + 10));
      if (dotX < -3) dotX += W + 10;
      ctx.fillRect(Math.floor(dotX), 155 + (i % 4) * 2, 3, 1);
    }
    // Ruts
    ctx.fillStyle = '#775500';
    ctx.fillRect(0, 157, W, 1);
    ctx.fillRect(0, 162, W, 1);
  }

  // River (when active)
  if (showRiver) {
    drawRiver(time || 0);
  }

  // Wagon
  const wagonX = 65;
  const wagonY = showRiver ? 148 : 149;
  drawWagon(wagonX, wagonY);

  // Event-specific visual overlay
  if (gameState === STATES.EVENT || gameState === STATES.RIVER) {
    drawEventOverlay(time);
  }

  // Ground below trail
  ctx.fillStyle = '#885500';
  ctx.fillRect(0, showRiver ? 173 : 167, W, 15);
  ctx.fillStyle = '#553300';
  ctx.fillRect(0, showRiver ? 188 : 182, W, H - 182);
}

// =====================================================================
// MUSIC SYSTEM (Web Audio API Chiptune)
// =====================================================================
const NOTE_FREQ = {
  'C3': 130.81, 'D3': 146.83, 'G2': 98.00, 'A2': 110.00,
  'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'G4': 392.00,
  'A4': 440.00, 'C5': 523.25, 'REST': 0
};

const melody = [
  { note: 'E4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'A4', dur: 1 }, { note: 'G4', dur: 1 },
  { note: 'E4', dur: 1 }, { note: 'D4', dur: 1 }, { note: 'C4', dur: 1 }, { note: 'REST', dur: 1 },
  { note: 'E4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'A4', dur: 1 }, { note: 'C5', dur: 1 },
  { note: 'A4', dur: 2 }, { note: 'G4', dur: 2 },
  { note: 'C4', dur: 1 }, { note: 'D4', dur: 1 }, { note: 'E4', dur: 1 }, { note: 'G4', dur: 1 },
  { note: 'A4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'E4', dur: 1 }, { note: 'D4', dur: 1 },
  { note: 'C4', dur: 1 }, { note: 'E4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'E4', dur: 1 },
  { note: 'D4', dur: 1 }, { note: 'C4', dur: 3 }
];

const bassLine = [
  { note: 'C3', dur: 4 }, { note: 'A2', dur: 4 }, { note: 'C3', dur: 4 }, { note: 'A2', dur: 4 },
  { note: 'C3', dur: 4 }, { note: 'G2', dur: 4 }, { note: 'D3', dur: 4 }, { note: 'C3', dur: 4 }
];

let musicScheduleTimer = null;
let nextMelodyTime = 0;
let nextBassTime = 0;

var masterGain = null;

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 1.0;
    masterGain.connect(audioCtx.destination);
    musicInitialized = true;
  } catch (e) {
    console.warn('Web Audio not available:', e);
  }
}

function playNote(freq, startTime, duration, type, gainVal) {
  if (!audioCtx || freq === 0) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startTime);
  // Envelope: attack then decay
  gain.gain.setValueAtTime(0.001, startTime);
  gain.gain.linearRampToValueAtTime(gainVal, startTime + 0.02);
  gain.gain.setValueAtTime(gainVal, startTime + duration * 0.75);
  gain.gain.linearRampToValueAtTime(0.001, startTime + duration * 0.95);
  osc.connect(gain);
  gain.connect(masterGain || audioCtx.destination);
  osc.start(startTime);
  osc.stop(startTime + duration);
}

function scheduleLoop() {
  if (!musicPlaying || !audioCtx) return;
  const bpm = 110;
  const quarterDur = 60 / bpm;
  const now = audioCtx.currentTime;

  // Schedule melody
  let t = now + 0.05;
  for (const note of melody) {
    const dur = note.dur * quarterDur;
    if (note.note !== 'REST') {
      playNote(NOTE_FREQ[note.note], t, dur, 'square', 0.06);
    }
    t += dur;
  }

  // Schedule bass
  let tb = now + 0.05;
  for (const note of bassLine) {
    const dur = note.dur * quarterDur;
    playNote(NOTE_FREQ[note.note], tb, dur, 'triangle', 0.08);
    tb += dur;
  }

  // Total loop duration in beats: melody has 32 quarter beats = 32 * quarterDur
  const totalBeats = 32;
  const loopDurationMs = totalBeats * quarterDur * 1000;

  musicScheduleTimer = setTimeout(scheduleLoop, loopDurationMs - 200);
}

function startMusic() {
  if (!musicInitialized) initAudio();
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (masterGain) masterGain.gain.setValueAtTime(1.0, audioCtx.currentTime);
  musicPlaying = true;
  scheduleLoop();
  updateMusicIndicator();
}

function stopMusic() {
  musicPlaying = false;
  if (musicScheduleTimer) {
    clearTimeout(musicScheduleTimer);
    musicScheduleTimer = null;
  }
  if (masterGain) masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
  updateMusicIndicator();
}

function toggleMusic() {
  if (!musicInitialized) initAudio();
  if (musicPlaying) {
    stopMusic();
  } else {
    startMusic();
  }
  renderStatusBar();
}

function updateMusicIndicator() {
  const el = document.getElementById('music-indicator');
  if (!el) return;
  el.textContent = musicPlaying ? 'M: Music ON' : 'M: Music OFF';
  el.style.color = musicPlaying ? '#55FF55' : '#555555';
}

// =====================================================================
// SYNTAX HIGHLIGHTING (Ruby - EGA Colors)
// =====================================================================
const RUBY_KEYWORDS = new Set([
  'def', 'end', 'class', 'module', 'do', 'if', 'else', 'elsif', 'unless',
  'until', 'while', 'for', 'begin', 'rescue', 'ensure', 'raise', 'return',
  'yield', 'block_given?', 'self', 'super', 'true', 'false', 'nil',
  'and', 'or', 'not', 'in', 'then', 'require', 'require_relative',
  'include', 'extend', 'attr_accessor', 'attr_reader', 'attr_writer',
  'private', 'protected', 'public', 'lambda', 'proc', 'puts', 'print',
  'new', 'case', 'when', 'break', 'next', 'redo', 'retry'
]);

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function highlightCode(code) {
  return code.split('\n').map(function(line) {
    if (line.trim().startsWith('#')) {
      return '<span style="color:#75715e">' + escHtml(line) + '</span>';
    }
    var result = '';
    var i = 0;
    while (i < line.length) {
      // String literal (double or single quotes)
      if (line[i] === '"' || line[i] === "'") {
        var quote = line[i];
        var end = i + 1;
        while (end < line.length && line[end] !== quote) {
          if (line[end] === '\\') end++;
          end++;
        }
        end = Math.min(end + 1, line.length);
        result += '<span style="color:#e6db74">' + escHtml(line.substring(i, end)) + '</span>';
        i = end;
        continue;
      }
      // ERB tags: <% and %>
      if (line[i] === '<' && i + 1 < line.length && line[i + 1] === '%') {
        var end = line.indexOf('%>', i + 2);
        if (end === -1) end = line.length - 2;
        end += 2;
        end = Math.min(end, line.length);
        result += '<span style="color:#f92672">' + escHtml(line.substring(i, end)) + '</span>';
        i = end;
        continue;
      }
      // Inline comment
      if (line[i] === '#') {
        result += '<span style="color:#75715e">' + escHtml(line.substring(i)) + '</span>';
        break;
      }
      // Symbol (colon followed by word)
      if (line[i] === ':' && i + 1 < line.length && /[a-zA-Z_]/.test(line[i + 1])) {
        var end2 = i + 1;
        while (end2 < line.length && /[\w?!]/.test(line[end2])) end2++;
        result += '<span style="color:#ae81ff">' + escHtml(line.substring(i, end2)) + '</span>';
        i = end2;
        continue;
      }
      // Instance variable (@name)
      if (line[i] === '@' && i + 1 < line.length && /[a-zA-Z_]/.test(line[i + 1])) {
        var end3 = i + 1;
        while (end3 < line.length && /[\w]/.test(line[end3])) end3++;
        result += '<span style="color:#fd971f">' + escHtml(line.substring(i, end3)) + '</span>';
        i = end3;
        continue;
      }
      // Number
      if (/\d/.test(line[i]) && (i === 0 || !/\w/.test(line[i - 1]))) {
        var end4 = i;
        while (end4 < line.length && /[\d._]/.test(line[end4])) end4++;
        result += '<span style="color:#ae81ff">' + escHtml(line.substring(i, end4)) + '</span>';
        i = end4;
        continue;
      }
      // Identifier or keyword
      if (/[a-zA-Z_]/.test(line[i])) {
        var end5 = i;
        while (end5 < line.length && /[\w?!]/.test(line[end5])) end5++;
        var word = line.substring(i, end5);
        if (RUBY_KEYWORDS.has(word)) {
          result += '<span style="color:#f92672">' + escHtml(word) + '</span>';
        } else if (end5 < line.length && line[end5] === '(') {
          result += '<span style="color:#a6e22e">' + escHtml(word) + '</span>';
        } else {
          result += '<span style="color:#f8f8f2">' + escHtml(word) + '</span>';
        }
        i = end5;
        continue;
      }
      // Punctuation / operators
      result += '<span style="color:#f8f8f2">' + escHtml(line[i]) + '</span>';
      i++;
    }
    return result;
  }).join('\n');
}
