<script>
window.TRAIL_DATA = {"framework": "rails", "trailName": "The Convention Trail", "stops": [{"name": "Rack Junction", "subtitle": "The Entry Point", "concept": "Rack Middleware", "landmarkType": "town", "code": {"file": "config.ru + config/application.rb", "content": "# config.ru\nrequire_relative \"config/environment\"\nrun Rails.application\n\n# config/application.rb\nrequire_relative \"boot\"\nrequire \"rails/all\"\n\nmodule BlogApp\n  class Application < Rails::Application\n    config.load_defaults 7.1\n\n    config.middleware.use Rack::Deflater\n    config.middleware.insert_before 0, Rack::Cors do\n      allow do\n        origins \"*\"\n        resource \"*\", headers: :any, methods: [:get, :post]\n      end\n    end\n  end\nend", "language": "ruby"}, "narration": "Every Rails journey begins at Rack Junction. That tiny config dot ru file is the actual entry point. It boots the whole framework and hands control to Rails dot application. Under the hood, Rails stacks about twenty middleware layers — session handling, cookie parsing, CSRF protection, static file serving. You can add your own, like Rack Deflater for compression. Think of Rack as the wagon hitching post. Every request passes through this stack before Rails even sees it."}, {"name": "Router Pass", "subtitle": "RESTful Resource Routing", "concept": "Convention Routing", "landmarkType": "mountain", "code": {"file": "config/routes.rb", "content": "# config/routes.rb\nRails.application.routes.draw do\n  root \"pages#home\"\n\n  resources :articles do\n    resources :comments, only: [:create, :destroy]\n    member do\n      post :publish\n    end\n    collection do\n      get :drafts\n    end\n  end\n\n  namespace :api do\n    namespace :v1 do\n      resources :users, only: [:index, :show]\n      resources :articles, only: [:index, :show, :create]\n    end\n  end\n\n  get \"up\" => \"rails/health#show\", as: :rails_health_check\nend", "language": "ruby"}, "narration": "Welcome to Router Pass. One line — resources colon articles — generates seven RESTful routes automatically. Index, show, new, create, edit, update, destroy. Nested resources give you articles slash one slash comments. The member block adds custom actions on a single record. The collection block adds actions on the whole set. Namespacing under api slash v1 keeps your API versioned and organized. Rails routing is opinionated, and that opinion saves you hundreds of lines of configuration."}, {"name": "Controller Canyon", "subtitle": "Actions and Strong Params", "concept": "ActiveRecord", "landmarkType": "camp", "code": {"file": "app/controllers/articles_controller.rb", "content": "# app/controllers/articles_controller.rb\nclass ArticlesController < ApplicationController\n  before_action :authenticate_user!\n  before_action :set_article, only: [:show, :edit, :update, :destroy]\n\n  def index\n    @articles = Article.published.includes(:author, :comments)\n                       .order(created_at: :desc)\n                       .page(params[:page])\n  end\n\n  def create\n    @article = current_user.articles.build(article_params)\n    if @article.save\n      redirect_to @article, notice: \"Article was successfully created.\"\n    else\n      render :new, status: :unprocessable_entity\n    end\n  end\n\n  private\n\n  def set_article\n    @article = Article.find(params[:id])\n  end\n\n  def article_params\n    params.require(:article).permit(:title, :body, :category_id)\n  end\nend", "language": "ruby"}, "narration": "Controller Canyon is where your request finally meets application logic. Notice the before_action callbacks at the top — they run before every action, like middleware for controllers. The set_article callback loads the record by ID so you do not repeat yourself. At the bottom, article_params is the strong parameters pattern. It whitelists exactly which fields the user can submit. Without it, someone could set any column — admin status, timestamps, anything. Strong params are your security gate."}, {"name": "Model Meadows", "subtitle": "ActiveRecord Associations and Validations", "concept": "ActiveRecord", "landmarkType": "forest", "code": {"file": "app/models/article.rb", "content": "# app/models/article.rb\nclass Article < ApplicationRecord\n  belongs_to :author, class_name: \"User\"\n  has_many :comments, dependent: :destroy\n  has_many :taggings, dependent: :destroy\n  has_many :tags, through: :taggings\n  has_one_attached :cover_image\n\n  validates :title, presence: true, length: { maximum: 200 }\n  validates :body, presence: true\n  validates :slug, uniqueness: true\n\n  scope :published, -> { where(published: true) }\n  scope :recent, -> { order(created_at: :desc).limit(10) }\n\n  before_validation :generate_slug, on: :create\n\n  def reading_time\n    (body.split.size / 200.0).ceil\n  end\n\n  private\n\n  def generate_slug\n    self.slug = title&.parameterize\n  end\nend", "language": "ruby"}, "narration": "Model Meadows is the heart of any Rails app. ActiveRecord maps your Ruby classes to database tables automatically — no XML, no config files. Associations like belongs_to and has_many define relationships in plain English. Validations ensure data integrity before anything hits the database. Scopes like published give you reusable query fragments you can chain together. The before_validation callback generates a URL slug from the title. Rails models are where your business rules live."}, {"name": "View Valley", "subtitle": "ERB Templates and Partials", "concept": "ERB Templates", "landmarkType": "desert", "code": {"file": "app/views/articles/index.html.erb", "content": "<%# app/views/articles/index.html.erb %>\n<h1>Articles</h1>\n\n<div class=\"articles-grid\">\n  <%= render partial: \"article_card\",\n             collection: @articles %>\n</div>\n\n<%= paginate @articles %>\n\n<%# app/views/articles/_article_card.html.erb %>\n<article class=\"card\">\n  <% if article_card.cover_image.attached? %>\n    <%= image_tag article_card.cover_image.variant(:thumb),\n                  class: \"card-image\" %>\n  <% end %>\n\n  <h2><%= link_to article_card.title, article_card %></h2>\n  <p class=\"meta\">\n    By <%= article_card.author.name %> |\n    <%= time_ago_in_words(article_card.created_at) %> ago |\n    <%= article_card.reading_time %> min read\n  </p>\n  <p><%= truncate(article_card.body, length: 200) %></p>\n</article>", "language": "ruby"}, "narration": "View Valley is where data becomes HTML. ERB — Embedded Ruby — lets you mix Ruby logic right into your templates. The angle-bracket-percent tags run Ruby code. The equals sign variant outputs the result. The real power here is partials. That underscore article_card file is a reusable component. Passing collection colon at-articles renders the partial once per article automatically. Rails names the local variable from the partial filename. No loops needed in the parent template. Convention saves you from boilerplate."}, {"name": "ERB Rendering Post", "subtitle": "Layouts and Helpers", "concept": "ERB Templates", "landmarkType": "camp", "code": {"file": "app/views/layouts/application.html.erb", "content": "<%# app/views/layouts/application.html.erb %>\n<!DOCTYPE html>\n<html>\n  <head>\n    <title><%= content_for?(:title) ? yield(:title) : \"BlogApp\" %></title>\n    <meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n    <%= csrf_meta_tags %>\n    <%= csp_meta_tag %>\n    <%= stylesheet_link_tag \"application\",\n        \"data-turbo-track\": \"reload\" %>\n    <%= javascript_importmap_tags %>\n  </head>\n  <body>\n    <%= render \"shared/navbar\" %>\n    <% if notice.present? %>\n      <div class=\"flash-notice\"><%= notice %></div>\n    <% end %>\n    <main class=\"container\">\n      <%= yield %>\n    </main>\n    <%= render \"shared/footer\" %>\n  </body>\n</html>", "language": "ruby"}, "narration": "ERB Rendering Post is where the full page assembles. The layout wraps every view in your app. That yield keyword is the magic slot — your action’s template gets injected right there. Content_for lets child templates push content up into the layout, like setting a custom page title. Notice csrf_meta_tags — Rails automatically injects a CSRF token into every page. The csp_meta_tag adds Content Security Policy headers. Security baked in by default. Turbo handles page navigation without full reloads. The layout is the frame. Your views are the paintings inside it."}, {"name": "Response River", "subtitle": "Status Codes and Formats", "concept": "Convention Routing", "landmarkType": "river", "code": {"file": "app/controllers/api/v1/articles_controller.rb", "content": "# app/controllers/api/v1/articles_controller.rb\nmodule Api\n  module V1\n    class ArticlesController < ApplicationController\n      skip_before_action :verify_authenticity_token\n\n      def show\n        @article = Article.find(params[:id])\n        render json: @article, include: [:comments, :tags],\n               status: :ok\n      end\n\n      def create\n        @article = current_user.articles.build(article_params)\n        if @article.save\n          render json: @article, status: :created,\n                 location: api_v1_article_url(@article)\n        else\n          render json: { errors: @article.errors.full_messages },\n                 status: :unprocessable_entity\n        end\n      end\n    end\n  end\nend", "language": "ruby"}, "narration": "Response River is where your data takes its final shape. Rails can render HTML, JSON, XML, or plain text from the same controller. For API endpoints, render json serializes your model automatically. Notice the status codes — colon created maps to HTTP 201, colon unprocessable_entity to 422. Rails uses human-readable symbols instead of memorizing numbers. The location header tells API clients where to find the newly created resource. One framework, multiple response formats. That is the power of Rails respond-to conventions."}, {"name": "Response Frontier", "subtitle": "The Complete Request Cycle", "concept": "Full Lifecycle", "landmarkType": "town", "code": {"file": "The complete Rails request cycle", "content": "# The complete Rails request cycle:\n#\n# 1. Request hits config.ru -> Rack middleware stack\n#      Rack::Sendfile -> ActionDispatch::Static -> Rack::Lock\n#      -> ActionDispatch::Cookies -> ActionDispatch::Session\n#      -> ActionDispatch::Flash -> Rack::MethodOverride\n#\n# 2. ActionDispatch::Routing matches URL to controller#action\n#      GET /articles/42 -> ArticlesController#show\n#\n# 3. Controller callbacks run (before_action chain)\n#      authenticate_user! -> set_article -> show\n#\n# 4. Action executes, loads models via ActiveRecord\n#      Article.find(42) -> SQL: SELECT * FROM articles WHERE id = 42\n#\n# 5. View template renders with instance variables\n#      @article -> app/views/articles/show.html.erb\n#\n# 6. Layout wraps the rendered template\n#      application.html.erb yields the view content\n#\n# 7. Response flows back through middleware (reverse order)\n#      Headers set -> cookies written -> body compressed\n#\n# 8. Rack sends HTTP response to the client\n#      Status: 200 OK | Content-Type: text/html | Body: rendered HTML", "language": "ruby"}, "narration": "You made it to the Response Frontier! Here is the full picture. A request enters through Rack and passes through about twenty middleware layers. The router matches the URL to a controller and action. Before-action callbacks run for authentication and setup. The action loads data through ActiveRecord, which translates Ruby into SQL. Instance variables flow into ERB templates, which render inside the layout. The response then travels back through the middleware stack in reverse — setting cookies, compressing the body, adding headers. Finally, Rack delivers the HTTP response. Convention guided every step. Your wagon has arrived."}], "events": [{"type": "weather", "trigger": "after_stop", "triggerStop": 1, "title": "Routing Storm!", "text": "A storm of incoming requests is overwhelming your app. You notice that every request to slash admin slash dashboard hits your routes file, but there is no matching route. Rails is throwing RoutingError exceptions and flooding your logs.", "choices": [{"text": "Add a catch-all route at the bottom of routes.rb to handle unmatched paths gracefully", "correct": true, "explanation": "A catch-all route like get star path, to colon errors hash show prevents RoutingError exceptions from crashing your app. Placing it at the bottom ensures it only matches when no other route does. This is how production Rails apps handle four oh four pages gracefully."}, {"text": "Add more specific routes for every possible URL someone might visit", "correct": false, "explanation": "You cannot anticipate every URL someone might request. Bots and scanners hit random paths constantly. A catch-all route handles the infinite set of unmatched URLs with a single line."}, {"text": "Disable routing errors entirely in the Rails configuration", "correct": false, "explanation": "Silencing errors hides real problems. If a legitimate route is missing, you would never know. The correct approach is to handle unmatched routes explicitly with a catch-all, not to suppress the error."}], "concept": "Convention Routing", "difficulty": "easy"}, {"type": "encounter", "trigger": "after_stop", "triggerStop": 2, "title": "A Senior Developer Appears", "text": "A fellow traveler examines your controller code and asks: 'Why do you call params dot require colon article dot permit instead of just using params directly? What attack does this prevent?'", "choices": [{"text": "Mass assignment — without permit, a user could set any column like admin or role through the form", "correct": true, "explanation": "Exactly. Strong parameters are Rails’ defense against mass assignment attacks. Without them, a malicious user could add hidden form fields to set protected attributes like is_admin to true. The permit method creates an explicit whitelist of allowed fields."}, {"text": "SQL injection — params could contain raw SQL that modifies the database query", "correct": false, "explanation": "ActiveRecord already parameterizes all queries to prevent SQL injection. Strong parameters solve a different problem: controlling which model attributes a user can set through form submissions."}, {"text": "Cross-site scripting — params could contain JavaScript that runs in other users' browsers", "correct": false, "explanation": "Rails handles XSS through automatic HTML escaping in ERB templates. Strong parameters protect against mass assignment, which is about unauthorized attribute setting, not script injection."}], "concept": "ActiveRecord", "difficulty": "medium"}, {"type": "river", "trigger": "after_stop", "triggerStop": 3, "title": "The N+1 Query River", "text": "You have reached the most dangerous river on the trail. Your articles index page loads fifty articles, and for each one, the template calls article dot author dot name. Your logs show fifty-one SQL queries — one for the articles and one per author. The page takes eight seconds to load. How do you cross?", "choices": [{"text": "Use includes colon author in the controller query to eager-load the association", "correct": true, "explanation": "Article dot includes parenthesis colon author loads all authors in a single SQL query upfront. Instead of fifty-one queries, you get two — one for articles, one for all their authors. This is the standard Rails fix for N plus one queries. The bullet gem can detect these automatically in development."}, {"text": "Cache each author record in Redis so the database is only hit once per author", "correct": false, "explanation": "Caching hides the problem but does not fix it. The first request still fires fifty-one queries. And cache invalidation adds its own complexity. Eager loading with includes is the correct solution — it fixes the root cause."}, {"text": "Move the author name directly into the articles table to avoid the join entirely", "correct": false, "explanation": "Denormalizing data violates database normalization principles. When an author changes their name, you would need to update every article row. Eager loading preserves proper data modeling while eliminating the performance problem."}], "concept": "ActiveRecord", "difficulty": "medium"}, {"type": "misfortune", "trigger": "after_stop", "triggerStop": 4, "title": "XSS Vulnerability Discovered!", "text": "Disaster! A security audit reveals that one of your templates uses raw to render user-submitted HTML comments. An attacker injected a script tag that steals session cookies from every visitor. How should you fix this?", "choices": [{"text": "Remove the raw call and let Rails auto-escape all user output by default", "correct": true, "explanation": "Rails automatically escapes all ERB output through the html_safe mechanism. The angle-bracket-percent-equals tag escapes by default. Using raw or html_safe on user input bypasses this protection. Removing raw restores Rails’ built-in XSS prevention. If you need formatted content, use a sanitizer like sanitize helper."}, {"text": "Add a Content-Security-Policy header to block inline scripts", "correct": false, "explanation": "CSP headers add a layer of defense, but they do not fix the root cause. The raw call is still injecting unsanitized HTML. Some older browsers ignore CSP headers entirely. Fix the template first, then add CSP as defense in depth."}, {"text": "Validate that comments do not contain angle brackets when they are submitted", "correct": false, "explanation": "Input validation is fragile. Attackers can bypass it with URL encoding, Unicode tricks, or polyglot payloads. Rails’ output escaping is the proper defense because it handles all edge cases at render time regardless of how the data was stored."}], "concept": "ERB Templates", "difficulty": "hard"}, {"type": "fortune", "trigger": "after_stop", "triggerStop": 5, "title": "Convention Over Configuration Bonus", "text": "Your deep understanding of Rails conventions is paying off! You discovered that naming your partial underscore article_card automatically sets the local variable article_card. A group of friendly developers join your camp to share more convention tips.", "choices": [], "concept": "ERB Templates", "difficulty": "easy"}, {"type": "encounter", "trigger": "after_stop", "triggerStop": 6, "title": "A Seasoned API Developer Appears", "text": "A fellow traveler shows you their API controller. 'I namespace all my API controllers under Api V1 and use skip_before_action to disable CSRF protection for JSON endpoints. But I keep authentication.' What principle does the CSRF skip follow?", "choices": [{"text": "API endpoints use token auth instead of cookies, so CSRF protection is unnecessary and would block legitimate requests", "correct": true, "explanation": "CSRF attacks exploit browser cookies being sent automatically. API endpoints typically use Bearer tokens in the Authorization header, which browsers never send automatically. Keeping CSRF on API endpoints would reject every non-browser request. Token auth makes CSRF redundant for APIs."}, {"text": "Skipping CSRF makes the API faster because Rails does not need to verify tokens on every request", "correct": false, "explanation": "CSRF verification is extremely fast — it is a simple string comparison. Performance is not the reason to skip it. The reason is that CSRF protection is designed for cookie-based browser sessions, which APIs do not use."}, {"text": "CSRF is only needed in development to catch bugs, so production APIs can safely disable it", "correct": false, "explanation": "CSRF protection is a critical production security feature for browser-based sessions. It is disabled for APIs not because it is unimportant, but because APIs authenticate differently — with tokens instead of cookies."}], "concept": "Convention Routing", "difficulty": "hard"}, {"type": "encounter", "trigger": "after_stop", "triggerStop": 1, "title": "A Rails Guide Appears", "text": "A fellow traveler shows you a single line in routes.rb: resources :articles. 'This one line generates seven routes,' they say. What does the resources macro give you?", "choices": [{"text": "Seven RESTful routes — index, show, new, create, edit, update, and destroy — mapped to controller actions automatically", "correct": true, "explanation": "The resources macro follows REST conventions to generate a complete CRUD interface. Each route maps to a controller action by convention: GET slash articles maps to index, POST maps to create, and so on. This is Rails convention over configuration at its core."}, {"text": "A single route that accepts any HTTP method and dispatches based on the request body", "correct": false, "explanation": "Rails routes are explicit about HTTP methods. Each of the seven routes has a specific method — GET, POST, PATCH, DELETE. This separation follows REST principles and prevents accidental mutations from GET requests."}, {"text": "An auto-generated admin interface for the articles table", "correct": false, "explanation": "Rails does not generate admin interfaces automatically — that is Django's approach. The resources macro only generates routes and expects you to write the controller. Gems like ActiveAdmin provide admin panels."}], "concept": "Convention Routing", "difficulty": "easy"}, {"type": "weather", "trigger": "after_stop", "triggerStop": 2, "title": "Generator Whirlwind!", "text": "A whirlwind of files hits your project. A junior developer ran rails generate scaffold Article and it created a model, migration, controller, views, helpers, tests, and stylesheets — twenty files in one command. They are overwhelmed.", "choices": [{"text": "Use more targeted generators like rails generate model or rails generate controller to create only what you need", "correct": true, "explanation": "Scaffold generates everything at once, which is great for prototyping but overwhelming in a real project. Targeted generators like rails generate model Article title:string body:text create just the model and migration. You stay in control of what gets added to your codebase."}, {"text": "Always use scaffold and delete the files you don't need afterward", "correct": false, "explanation": "Generating files just to delete them wastes time and risks leaving behind unwanted code. Targeted generators exist precisely to give you control. Use scaffold for quick prototypes, targeted generators for production code."}, {"text": "Avoid generators entirely and create all files manually", "correct": false, "explanation": "Manual file creation means you miss Rails conventions — the correct directory structure, naming patterns, and boilerplate that generators handle. Generators ensure consistency with Rails conventions."}], "concept": "ActiveRecord", "difficulty": "easy"}, {"type": "misfortune", "trigger": "after_stop", "triggerStop": 3, "title": "Association Confusion!", "text": "Your app crashes with 'undefined method comments for Article'. You added has_many :comments to Article but forgot something. Comment records exist in the database with an article_id column, but Rails can't find them.", "choices": [{"text": "Add the belongs_to :article declaration to the Comment model — both sides of the association must be declared", "correct": true, "explanation": "Rails associations are bidirectional by convention. has_many on Article declares the 'one' side, but Comment needs belongs_to :article to declare the 'many' side. Without it, Rails doesn't know how to connect Comment back to Article via the article_id foreign key."}, {"text": "Run a migration to add a comments_id column to the articles table", "correct": false, "explanation": "The foreign key belongs on the 'many' side — comments has article_id, not the reverse. Adding comments_id to articles would be backwards. The issue isn't the schema, it's the missing belongs_to declaration."}, {"text": "Change has_many to has_one since each comment belongs to one article", "correct": false, "explanation": "has_one and has_many describe the cardinality from Article's perspective. An article has MANY comments, so has_many is correct. has_one would mean each article can only have a single comment."}], "concept": "ActiveRecord", "difficulty": "easy"}, {"type": "weather", "trigger": "after_stop", "triggerStop": 4, "title": "The Scope Fog", "text": "Dense fog rolls in. Your controller has Article.where(published: true).where('publish_date <= ?', Time.current).order(publish_date: :desc) repeated in six different actions. The code is duplicated everywhere and hard to maintain.", "choices": [{"text": "Define a scope on the model: scope :published, -> { where(published: true).where('publish_date <= ?', Time.current) }", "correct": true, "explanation": "Scopes encapsulate common query patterns as chainable, reusable methods on the model. Article.published.order(publish_date: :desc) reads clearly and the query logic lives in one place. Scopes are composable — you can chain them like Article.published.recent.featured."}, {"text": "Create a service object that wraps the query in a method", "correct": false, "explanation": "A service object for a simple query filter is over-engineering. Scopes are Rails' built-in answer for reusable query fragments. They live on the model where query logic belongs and integrate with ActiveRecord's chainable interface."}, {"text": "Store the query results in a constant at boot time so the query only runs once", "correct": false, "explanation": "Storing dynamic query results in a constant means the data is frozen at boot time. New articles would never appear until you restart the server. Scopes run fresh queries each time, which is what you want for current data."}], "concept": "ActiveRecord", "difficulty": "medium"}, {"type": "river", "trigger": "after_stop", "triggerStop": 5, "title": "The Callback River", "text": "You've reached a dangerous crossing. Your Article model has before_save, after_save, before_validation, and after_create callbacks that trigger emails, update counters, and sync to an external API. A simple update to fix a typo triggers all of them. How do you cross safely?", "choices": [{"text": "Use conditional callbacks with if: or unless: guards, and consider moving side effects to service objects for complex operations", "correct": true, "explanation": "Callbacks with guards like after_save :notify_subscribers, if: :published_changed? only fire when relevant. For complex side effects like API syncs, service objects make the flow explicit. The key principle: callbacks should be for data consistency, not business workflows."}, {"text": "Remove all callbacks and put everything in the controller", "correct": false, "explanation": "Moving all logic to controllers means duplicating it everywhere articles are saved — admin panel, background jobs, console. Some callbacks like data normalization belong on the model. The issue is indiscriminate callbacks, not callbacks as a concept."}, {"text": "Override the save method to control exactly what runs on each save", "correct": false, "explanation": "Overriding save is fragile — you need to remember to call super, and you lose the declarative clarity of named callbacks with conditions. Conditional callbacks and service objects give you the same control with better maintainability."}], "concept": "ActiveRecord", "difficulty": "hard"}, {"type": "misfortune", "trigger": "after_stop", "triggerStop": 5, "title": "Nested Route Overload!", "text": "Your routes are nested three levels deep: resources :users do resources :posts do resources :comments. URL helpers are monstrously long: edit_user_post_comment_path. The routes file is unreadable.", "choices": [{"text": "Use shallow: true to only nest routes that actually need the parent ID, flattening the rest", "correct": true, "explanation": "Shallow nesting means collection routes like index and create stay nested (they need the parent), but member routes like show, edit, update, destroy use just the resource's own ID. comments_path(post) for creating, but edit_comment_path(comment) for editing. Much cleaner URLs and helpers."}, {"text": "Remove all nesting and pass parent IDs as query parameters instead", "correct": false, "explanation": "Query parameters for parent relationships lose the RESTful URL structure that conveys resource hierarchy. Shallow nesting preserves the relationship where it matters (creation and listing) without the excessive depth."}, {"text": "Keep the deep nesting since it accurately represents the data relationships", "correct": false, "explanation": "Deep nesting generates unnecessarily long URLs and helpers. A comment doesn't need the user AND post in its edit URL — the comment ID is sufficient to find it. Shallow nesting reflects the real access patterns, not the full data hierarchy."}], "concept": "Convention Routing", "difficulty": "medium"}, {"type": "misfortune", "trigger": "after_stop", "triggerStop": 6, "title": "Thread Safety Disaster!", "text": "Your production app using Puma has a mysterious bug: users occasionally see each other's data. Your controller sets a class-level instance variable @@current_user to avoid passing the user through method calls. Under concurrent requests, this shared state is causing data leaks.", "choices": [{"text": "Never use class variables or class-level instance variables for per-request state — use Current attributes or pass state through method parameters", "correct": true, "explanation": "Class variables are shared across all threads in a process. When two requests run simultaneously, they overwrite each other's @@current_user. Rails provides CurrentAttributes (ActiveSupport::CurrentAttributes) for thread-safe per-request state, or you can simply pass the user as a parameter."}, {"text": "Switch from Puma to a single-threaded server like WEBrick to avoid the issue", "correct": false, "explanation": "Single-threaded servers solve the symptom by eliminating concurrency, but they cannot handle production traffic. The root cause is shared mutable state. Fix the architecture, don't cripple your infrastructure."}, {"text": "Add a mutex lock around the class variable to prevent simultaneous access", "correct": false, "explanation": "A mutex would prevent data races but would serialize all requests through a bottleneck — destroying concurrency benefits entirely. The fix is to not share per-request state across threads at all."}], "concept": "Rack Middleware", "difficulty": "hard"}, {"trigger":"after_stop","triggerStop": 3, "type": "weather", "title": "Metaprogramming Whiteout!", "text": "A blizzard of mysterious methods appears. A gem defines methods dynamically using method_missing and define_method. When a bug occurs in one of these ghost methods, the stack trace shows no source file or line number.", "choices": [{"text": "Prefer explicit method definitions and use define_method over method_missing — it creates real methods that appear in stack traces", "correct": true, "explanation": "define_method registers actual methods on the class — they show up in method lookups, respond_to?, and stack traces. method_missing is a last resort. Always define real methods where possible. If you must use method_missing, always pair it with respond_to_missing?."}, {"text": "Disable metaprogramming in production by setting a Rails configuration flag", "correct": false, "explanation": "There’s no Rails flag to disable metaprogramming — it’s a core Ruby feature used throughout Rails itself. ActiveRecord, routing, and associations all use it."}, {"text": "Add rescue blocks around every method_missing call to catch errors", "correct": false, "explanation": "Rescue blocks hide errors rather than preventing them. The problem is that method_missing creates methods invisible to introspection tools. The fix is generating real methods."}], "concept": "ActiveRecord", "difficulty": "hard"}, {"trigger":"after_stop","triggerStop": 4, "type": "misfortune", "title": "Callback Execution Order Bug!", "text": "Your model has both before_save and before_validation callbacks. A before_save callback normalizes the title to lowercase, but validation rejects the original uppercase title before normalization runs.", "choices": [{"text": "Move data normalization to before_validation so it runs before validators check the data", "correct": true, "explanation": "Rails callbacks run in a specific order: before_validation → validate → after_validation → before_save → save. Normalization in before_save is too late — validation already rejected the data. Put cleanup in before_validation."}, {"text": "Skip validation with save(validate: false) so the normalization can run first", "correct": false, "explanation": "Skipping validation removes all data integrity checks. You’d allow invalid data into the database. The fix is running normalization at the right lifecycle point."}, {"text": "Add a custom validator that normalizes the data inside the validation step", "correct": false, "explanation": "Validators should validate, not mutate data. Mixing mutation into validation violates single responsibility. Rails provides before_validation specifically for data cleanup."}], "concept": "ActiveRecord", "difficulty": "hard"}], "partyMembers": [{"name": "Rack Middleware", "icon": "rack", "maxHealth": 3}, {"name": "Convention Routing", "icon": "routing", "maxHealth": 3}, {"name": "ActiveRecord", "icon": "model", "maxHealth": 3}, {"name": "ERB Templates", "icon": "view", "maxHealth": 3}], "deathMessages": ["Died of N+1 query disease. Should have used dot includes.", "Lost in the convention — named the controller wrong and Rails could not find it.", "Buried under an avalanche of unpinned gem versions. Bundle install will not save you now.", "Drowned in the migration river. The schema drifted and rake db colon migrate gave up.", "Killed by mass assignment. Forgot to permit the params and the attacker became admin.", "Here lies your a window.drawCustomEventOverlay = function(time) {
  if (!currentEventType && !currentEventTitle) return;

  var t = (time || 0) * 0.001; // seconds

  // --- ROUTING STORM: dark sky, lightning, rain ---
  if (currentEventTitle.indexOf('Routing Storm') !== -1) {
    // Darken sky
    ctx.fillStyle = 'rgba(0,0,50,0.45)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning flash (periodic)
    var flashPhase = Math.sin(t * 1.7) + Math.sin(t * 3.1);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, 0, W, H);
      // Lightning bolt
      ctx.strokeStyle = '#FFFF55';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 80 + Math.sin(t * 2.3) * 60;
      ctx.moveTo(lx, 10);
      ctx.lineTo(lx - 5, 35);
      ctx.lineTo(lx + 8, 35);
      ctx.lineTo(lx - 3, 65);
      ctx.lineTo(lx + 10, 65);
      ctx.lineTo(lx + 2, 95);
      ctx.stroke();
    }
    // Rain
    ctx.strokeStyle = '#5555FF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 40; i++) {
      var rx = (i * 8.3 + t * 80) % W;
      var ry = (i * 13.7 + t * 120) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 1), Math.floor(ry + 5));
      ctx.stroke();
    }
    return;
  }

  // --- SENIOR DEVELOPER: person standing by campfire ---
  if (currentEventTitle.indexOf('Senior Developer') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8); // torso
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3); // head
    ctx.fillRect(px - 1, py - 4, 2, 5); // left leg
    ctx.fillRect(px + 3, py - 4, 2, 5); // right leg
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Campfire
    var fx = 212, fy = 148;
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(fx - 3, fy, 2, 3);
    ctx.fillRect(fx + 3, fy, 2, 3);
    ctx.fillStyle = '#FF5555';
    var flicker = Math.sin(t * 8) * 2;
    ctx.fillRect(fx - 1, fy - 3 + Math.floor(flicker * 0.3), 4, 3);
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(fx, fy - 5 + Math.floor(flicker * 0.5), 2, 2);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(fx - 1, fy - 2, 4, 2);
    // Firelight glow (subtle)
    ctx.fillStyle = 'rgba(255,170,0,0.08)';
    ctx.beginPath();
    ctx.arc(fx + 1, fy - 2, 15, 0, Math.PI * 2);
    ctx.fill();
    return;
  }

  // --- N+1 QUERY RIVER: rough rapids with white water ---
  if (currentEventTitle.indexOf('N+1 Query') !== -1) {
    // Extra turbulence on the river
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 20; i++) {
      var sx = (i * 17 + t * 40) % W;
      var sy = 157 + Math.sin((i * 3 + t * 5)) * 3;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 4, 2);
    }
    // Floating logs / debris
    ctx.fillStyle = '#AA5500';
    for (var i = 0; i < 3; i++) {
      var logX = (i * 110 + t * 25) % W;
      var logY = 159 + Math.sin(t * 2 + i) * 2;
      ctx.fillRect(Math.floor(logX), Math.floor(logY), 8, 2);
    }
    return;
  }

  // --- XSS VULNERABILITY: red sky, smoke, warning ---
  if (currentEventTitle.indexOf('XSS Vulnerability') !== -1) {
    // Red danger tint
    ctx.fillStyle = 'rgba(170,0,0,0.25)';
    ctx.fillRect(0, 0, W, H);
    // Smoke particles rising
    ctx.fillStyle = '#555555';
    for (var i = 0; i < 15; i++) {
      var sx = 140 + Math.sin(i * 2.7 + t) * 30;
      var sy = 130 - ((t * 20 + i * 15) % 90);
      var size = 2 + (i % 3);
      ctx.globalAlpha = 0.3 + Math.sin(t + i) * 0.15;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), size, size);
    }
    ctx.globalAlpha = 1.0;
    // Fire at base
    ctx.fillStyle = '#FF5555';
    for (var i = 0; i < 8; i++) {
      var fx = 130 + i * 5;
      var fh = 4 + Math.sin(t * 6 + i * 1.5) * 3;
      ctx.fillRect(fx, Math.floor(140 - fh), 3, Math.floor(fh));
    }
    ctx.fillStyle = '#FFFF55';
    for (var i = 0; i < 5; i++) {
      var fx = 135 + i * 6;
      var fh = 2 + Math.sin(t * 8 + i * 2) * 2;
      ctx.fillRect(fx, Math.floor(139 - fh), 2, Math.floor(fh));
    }
    // Pulsing red border
    var pulse = (Math.sin(t * 4) + 1) * 0.15;
    ctx.strokeStyle = 'rgba(255,0,0,' + pulse.toFixed(2) + ')';
    ctx.lineWidth = 3;
    ctx.strokeRect(1, 1, W - 2, H - 2);
    ctx.lineWidth = 1;
    return;
  }

  // --- CONVENTION OVER CONFIGURATION BONUS: sunny, flowers, rainbow ---
  if (currentEventTitle.indexOf('Convention Over Configuration') !== -1) {
    // Bright sun
    ctx.fillStyle = '#FFFF55';
    ctx.beginPath();
    ctx.arc(260, 30, 12, 0, Math.PI * 2);
    ctx.fill();
    // Sun rays
    ctx.strokeStyle = '#FFFF55';
    ctx.lineWidth = 1;
    for (var i = 0; i < 8; i++) {
      var angle = i * Math.PI / 4 + t * 0.3;
      ctx.beginPath();
      ctx.moveTo(260 + Math.cos(angle) * 14, 30 + Math.sin(angle) * 14);
      ctx.lineTo(260 + Math.cos(angle) * 20, 30 + Math.sin(angle) * 20);
      ctx.stroke();
    }
    // Flowers on ground
    var flowerColors = ['#FF5555', '#FFFF55', '#FF55FF', '#55FFFF', '#55FF55'];
    for (var i = 0; i < 12; i++) {
      var fx = (i * 27 + 10) % W;
      var fy = 135 + (i * 7) % 20;
      ctx.fillStyle = '#00AA00';
      ctx.fillRect(fx + 1, fy, 1, 4); // stem
      ctx.fillStyle = flowerColors[i % flowerColors.length];
      ctx.fillRect(fx, fy - 1, 3, 2); // petals
      ctx.fillStyle = '#FFFF55';
      ctx.fillRect(fx + 1, fy - 1, 1, 1); // center
    }
    // Rainbow arc
    var rainbowColors = ['#FF5555', '#FFAA00', '#FFFF55', '#55FF55', '#5555FF', '#CC0000'];
    for (var rc = 0; rc < rainbowColors.length; rc++) {
      ctx.strokeStyle = rainbowColors[rc];
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(160, 110, 70 + rc * 3, Math.PI * 1.1, Math.PI * 1.9);
      ctx.stroke();
    }
    ctx.lineWidth = 1;
    return;
  }

  // --- SEASONED API DEVELOPER: person with laptop by campfire ---
  if (currentEventTitle.indexOf('Seasoned API Developer') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8); // torso
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3); // head
    ctx.fillRect(px - 1, py - 4, 2, 5); // left leg
    ctx.fillRect(px + 3, py - 4, 2, 5); // right leg
    // Hat (Rails red)
    ctx.fillStyle = '#CC0000';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Laptop
    ctx.fillStyle = '#AAAAAA';
    ctx.fillRect(px + 7, py - 8, 6, 4);
    ctx.fillStyle = '#55FFFF';
    ctx.fillRect(px + 8, py - 7, 4, 2);
    // Campfire
    var fx = 212, fy = 148;
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(fx - 3, fy, 2, 3);
    ctx.fillRect(fx + 3, fy, 2, 3);
    ctx.fillStyle = '#FF5555';
    var flicker = Math.sin(t * 8) * 2;
    ctx.fillRect(fx - 1, fy - 3 + Math.floor(flicker * 0.3), 4, 3);
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(fx, fy - 5 + Math.floor(flicker * 0.5), 2, 2);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(fx - 1, fy - 2, 4, 2);
    // Firelight glow
    ctx.fillStyle = 'rgba(255,170,0,0.08)';
    ctx.beginPath();
    ctx.arc(fx + 1, fy - 2, 15, 0, Math.PI * 2);
    ctx.fill();
    return;
  }
};
