window.TRAIL_DATA = {"framework":"openclaw","trailName":"The Gateway Trail",
  "repoUrl": "https://github.com/openclaw/openclaw","stops":[{"name":"Channel Outpost","subtitle":"Message Arrives","concept":"Channel Plugins","landmarkType":"town","code":{"file":"extensions/whatsapp/src/channel.ts","content":"// extensions/whatsapp/src/channel.ts\nimport { createChatChannelPlugin } from 'openclaw/plugin-sdk/core'\nimport { chunkText } from 'openclaw/plugin-sdk/reply-runtime'\nimport { resolveWhatsAppAccount } from './accounts.js'\nimport { createWhatsAppOutboundBase } from './runtime-api.js'\nimport { getWhatsAppRuntime } from './runtime.js'\nimport { WHATSAPP_CHANNEL } from './shared.js'\n\nexport const whatsappPlugin =\n  createChatChannelPlugin({\n    pairing: { idLabel: 'whatsappSenderId' },\n    outbound: {\n      ...createWhatsAppOutboundBase({\n        chunker: chunkText,\n        sendMessageWhatsApp: async (...args) =>\n          await getWhatsAppRuntime()\n            .channel.whatsapp.sendMessageWhatsApp(...args),\n        resolveTarget: ({ to, allowFrom, mode }) =>\n          resolveWhatsAppOutboundTarget({ to, allowFrom, mode }),\n      }),\n    },\n  })","language":"typescript"},"narration":"Every journey starts at a channel outpost. OpenClaw connects to twenty different messaging channels, from WhatsApp to Discord to Matrix. Each uses createChatChannelPlugin from the plugin SDK. Here the WhatsApp channel wires up outbound messaging with text chunking and target resolution, all following the same plugin interface."},{"name":"Normalization Pass","subtitle":"Common Message Format","concept":"Channel Plugins","landmarkType":"camp","code":{"file":"src/plugin-sdk/routing.ts","content":"// src/plugin-sdk/routing.ts (simplified)\nimport type { ChatType } from '../channels/chat-type.js'\n\nexport type RoutePeer = {\n  kind: ChatType   // 'direct' | 'group' | 'channel'\n  id: string\n}\n\n// The normalized inbound message shape:\nexport interface InboundMessage {\n  channel: string\n  accountId: string\n  peer: RoutePeer\n  text: string\n  threadId?: string\n  parentPeer?: RoutePeer  // for thread binding inheritance\n  attachments?: Media[]\n  guildId?: string\n  teamId?: string\n}","language":"typescript"},"narration":"At the Normalization Pass, chaos becomes order. Every messaging platform has its own format. The ChannelPlugin interface forces them all into one shape. The gateway never needs to know whether you messaged from WhatsApp or Telegram."},{"name":"Route Resolution Fork","subtitle":"Finding the Right Agent","concept":"Route Resolution","landmarkType":"mountain","code":{"file":"src/routing/resolve-route.ts","content":"// src/routing/resolve-route.ts (simplified)\nexport function resolveAgentRoute(\n  input: ResolveAgentRouteInput\n): ResolvedAgentRoute {\n  const { cfg, channel, accountId, peer,\n          parentPeer, guildId, teamId, memberRoleIds } = input\n\n  // Tiered binding resolution — first match wins\n  const tiers = [\n    { matchedBy: 'binding.peer',         // 1. Exact peer\n      candidates: collectPeerBindings(peer) },\n    { matchedBy: 'binding.peer.parent',   // 2. Parent peer (threads)\n      candidates: collectPeerBindings(parentPeer) },\n    { matchedBy: 'binding.guild+roles',   // 3. Guild + role\n      candidates: guildRoleBindings(guildId, memberRoleIds) },\n    { matchedBy: 'binding.guild',         // 4. Guild/server\n      candidates: guildBindings(guildId) },\n    { matchedBy: 'binding.team',          // 5. Team\n      candidates: teamBindings(teamId) },\n    { matchedBy: 'binding.account',       // 6. Account\n      candidates: accountBindings },\n    { matchedBy: 'binding.channel',       // 7. Channel wildcard\n      candidates: channelBindings },\n  ]\n\n  for (const tier of tiers) {\n    const matched = tier.candidates.find(matchesScope)\n    if (matched) return choose(matched.agentId, tier.matchedBy)\n  }\n  return choose(resolveDefaultAgentId(cfg), 'default')\n}","language":"typescript"},"narration":"Here the trail forks seven ways. The resolver checks tiers in strict priority: exact peer, then parent peer for threads, guild plus roles, guild alone, team, account, and finally channel wildcard. First match wins. One gateway can serve different agents to different people."},{"name":"Session Persistence Camp","subtitle":"Loading Conversation State","concept":"Session Persistence","landmarkType":"camp","code":{"file":"src/config/sessions/paths.ts","content":"// src/config/sessions/paths.ts (simplified)\nimport path from 'node:path'\nimport { resolveStateDir } from '../paths.js'\nimport { normalizeAgentId } from '../../routing/session-key.js'\n\n// Sessions dir: ~/.openclaw/agents/<agentId>/sessions/\nfunction resolveAgentSessionsDir(agentId?: string) {\n  const root = resolveStateDir()\n  const id = normalizeAgentId(agentId ?? 'default')\n  return path.join(root, 'agents', id, 'sessions')\n}\n\n// Transcripts are append-only JSONL files\nexport function resolveSessionTranscriptPath(\n  sessionId: string,\n  agentId?: string,\n  topicId?: string | number,\n): string {\n  const dir = resolveAgentSessionsDir(agentId)\n  const safeTopic = topicId !== undefined\n    ? `-topic-${encodeURIComponent(String(topicId))}`\n    : ''\n  return path.join(dir, `${sessionId}${safeTopic}.jsonl`)\n}","language":"typescript"},"narration":"Session transcripts are append-only JSONL files on disk. Each agent gets its own directory under ~/.openclaw/agents/<agentId>/sessions/. The store index is sessions.json, but conversation history lives in .jsonl files, one line per turn. Zero database dependencies."},{"name":"Gateway Control Ridge","subtitle":"The WebSocket Command Center","concept":"Gateway Control Plane","landmarkType":"mountain","code":{"file":"src/gateway/server-chat.ts","content":"// src/gateway/server-chat.ts (simplified)\nexport function createChatRunRegistry(gateway: GatewayServer) {\n\n  async function handleChatSend(\n    sessionEntry: SessionEntry,\n    message: InboundMessage,\n  ) {\n    sessionEntry.transcript.push({\n      role: 'user',\n      content: message.text,\n      timestamp: Date.now(),\n    })\n\n    const agentRpc = gateway.acp.getClient(sessionEntry.agentId)\n    const stream = await agentRpc.call('chat.send', {\n      sessionId: sessionEntry.sessionKey,\n      messages: sessionEntry.transcript,\n      tools: sessionEntry.metadata.enabledTools,\n      model: sessionEntry.metadata.model,\n    })\n\n    for await (const chunk of stream) {\n      if (chunk.type === 'text') {\n        gateway.broadcast('chat.stream', { text: chunk.text })\n      } else if (chunk.type === 'tool_use') {\n        const result = await executeTool(chunk.tool, chunk.input)\n        agentRpc.sendToolResult(chunk.id, result)\n      }\n    }\n    await saveSession(sessionEntry)\n  }\n\n  return { handleChatSend }\n}","language":"typescript"},"narration":"The gateway server accepts WebSocket connections from channels, the CLI, and native apps. The streaming loop handles text and tool calls differently. Text streams in real time; tool calls get executed on the gateway and results feed back."},{"name":"Agent RPC Rapids","subtitle":"Talking to the AI","concept":"Gateway Control Plane","landmarkType":"river","code":{"file":"src/acp/client.ts","content":"// src/acp/client.ts (simplified)\nexport function createAcpClient(agentId: string, wsUrl: string) {\n  const ws = new WebSocket(wsUrl)\n\n  async function* call(\n    method: string,\n    params: ChatSendParams,\n  ): AsyncGenerator<AgentChunk> {\n    const requestId = crypto.randomUUID()\n\n    ws.send(JSON.stringify({\n      jsonrpc: '2.0',\n      id: requestId,\n      method,\n      params,\n    }))\n\n    while (true) {\n      const msg = await nextMessage(ws, requestId)\n      if (msg.type === 'done') break\n      yield msg\n    }\n  }\n\n  function sendToolResult(toolCallId: string, result: ToolResult) {\n    ws.send(JSON.stringify({\n      jsonrpc: '2.0',\n      method: 'tool.result',\n      params: { toolCallId, result },\n    }))\n  }\n\n  return { call, sendToolResult }\n}","language":"typescript"},"narration":"Now we cross the RPC Rapids. The gateway and agent communicate over JSON-RPC. The agent decides what to do, but the gateway controls what actually happens on your machine. Security through architecture."},{"name":"Tool Execution Gorge","subtitle":"Running Commands on the Host","concept":"Gateway Control Plane","landmarkType":"forest","code":{"file":"src/agents/bash-tools.exec-runtime.ts","content":"// src/agents/bash-tools.exec-runtime.ts (simplified)\n// The 'exec' tool — default timeout is 1800 seconds (30 min)\nexport const execSchema = Type.Object({\n  command: Type.String({ description: 'Shell command to execute' }),\n  workdir: Type.Optional(Type.String()),\n  timeout: Type.Optional(\n    Type.Number({ description: 'Kill after N seconds (default 1800)' })\n  ),\n  host: Type.Optional(\n    Type.Enum({ sandbox: 'sandbox', gateway: 'gateway', node: 'node' })\n  ),\n  security: Type.Optional(\n    Type.Enum({ deny: 'deny', allowlist: 'allowlist', full: 'full' })\n  ),\n})\n\n// Timeout conversion: user-facing seconds -> internal ms\nconst timeoutMs =\n  typeof opts.timeoutSec === 'number' && opts.timeoutSec > 0\n    ? Math.floor(opts.timeoutSec * 1000)\n    : undefined  // supervisor default: 1800s\n\n// Host env is sanitized — PATH overrides and LD_* are rejected\nvalidateHostEnv(shellRuntimeEnv)","language":"typescript"},"narration":"Deep in Tool Execution Gorge, the exec tool turns agent intentions into real actions. Default timeout is thirty minutes, not two. The tool supports sandbox, gateway, or remote node execution hosts. Security policies gate what runs and env sanitization blocks PATH hijacking."},{"name":"Response Delivery Frontier","subtitle":"Back Through the Channel","concept":"Channel Plugins","landmarkType":"town","code":{"file":"src/gateway/server-channels.ts","content":"// src/gateway/server-channels.ts (simplified)\nexport function createChannelManager(gateway: GatewayServer) {\n\n  async function deliverResponse(\n    sessionEntry: SessionEntry,\n    response: AgentResponse,\n  ) {\n    const { channel, peer, accountId } = sessionEntry.routing\n    const plugin = gateway.channels.get(channel)\n\n    const formatted = formatForChannel(channel, response.text, {\n      maxLength: getChannelLimit(channel),\n    })\n\n    for (const chunk of formatted) {\n      await plugin.send({ accountId, peer, text: chunk })\n    }\n\n    sessionEntry.transcript.push({\n      role: 'assistant',\n      content: response.text,\n      timestamp: Date.now(),\n    })\n    await saveSession(sessionEntry)\n\n    gateway.broadcast('chat.response', { text: response.text })\n  }\n\n  return { deliverResponse }\n}","language":"typescript"},"narration":"You made it! The response travels back through the same channel. Formatted for each platform's limits, chunked automatically, saved to the transcript. Message in, intelligence applied, response out. Your wagon has arrived."}],"events":[{"type":"weather","trigger":"after_stop","triggerStop":1,"title":"Protocol Storm!","text":"A storm of messages hits your gateway \u2014 WhatsApp sends phone numbers, Discord sends snowflake IDs, Slack sends workspace tokens. How do you weather this storm?","choices":[{"text":"Define a common interface that all channel plugins must implement","correct":true,"explanation":"OpenClaw's ChannelPlugin interface forces every platform into the same shape. New channels can be added without touching gateway code."},{"text":"Write a giant switch statement in the gateway for each platform","correct":false,"explanation":"That would make the gateway a tangled mess. Every new channel means modifying core code."},{"text":"Only support one messaging platform to keep things simple","correct":false,"explanation":"Multi-channel support is core to OpenClaw's value. The trick is clean abstraction through the plugin interface."}],"concept":"Channel Plugins","difficulty":"easy"},{"type":"encounter","trigger":"after_stop","triggerStop":2,"title":"A Fellow Operator Appears","text":"A seasoned operator says: 'I run three agents \u2014 personal on WhatsApp, work on Slack, social bot on Discord. One gateway.' How does it know which agent handles which message?","choices":[{"text":"Route bindings in the config map channels, peers, and guilds to agents","correct":true,"explanation":"Config bindings map at multiple levels. Priority: peer, guild, team, account, channel, then default."},{"text":"Each agent runs its own separate gateway on a different port","correct":false,"explanation":"One gateway, multiple agents. Separate gateways would mean separate configs and connections."},{"text":"The user specifies which agent to use in every message","correct":false,"explanation":"Routing is automatic and invisible. The gateway figures it out from the config bindings."}],"concept":"Route Resolution","difficulty":"easy"},{"type":"river","trigger":"after_stop","triggerStop":3,"title":"The Session State River","text":"You've reached the boundary between stateless request handling and persistent memory. Your assistant needs to remember last week's conversation across a restart. How do you cross?","choices":[{"text":"Store session transcripts as append-only JSONL files on disk, loaded on demand per key","correct":true,"explanation":"Each session transcript is a .jsonl file at ~/.openclaw/agents/<agentId>/sessions/. No database needed. The file system IS the persistence layer."},{"text":"Keep all sessions in memory with a Redis cache","correct":false,"explanation":"In-memory state is lost on restart. Redis adds an external dependency. OpenClaw is local-first."},{"text":"Store history in the AI model's context and let it remember","correct":false,"explanation":"Context windows are limited and expensive. The persistence layer is separate from inference."}],"concept":"Session Persistence","difficulty":"medium"},{"type":"misfortune","trigger":"after_stop","triggerStop":5,"title":"Runaway Process!","text":"The AI agent ran a shell command that's an infinite loop consuming 100% CPU. Your gateway is grinding to a halt!","choices":[{"text":"Tool execution needs timeouts and session security policies should gate commands","correct":true,"explanation":"The exec tool has a thirty-minute default timeout (1800 seconds), and security policies control what's allowed. The gateway is the security boundary."},{"text":"The agent should be smarter and never request dangerous commands","correct":false,"explanation":"Never rely on the AI as the security boundary. Defense in depth means the gateway enforces limits."},{"text":"Run all tools in the agent's process so only it crashes","correct":false,"explanation":"Tools run on the gateway because they need local machine access. The separation is a feature."}],"concept":"Gateway Control Plane","difficulty":"medium"},{"type":"river","trigger":"after_stop","triggerStop":5,"title":"The RPC River","text":"The deepest river \u2014 the boundary between gateway and agent runtime. The agent needs a browser screenshot but runs in a different process. How?","choices":[{"text":"JSON-RPC over WebSocket: agent requests, gateway executes locally","correct":true,"explanation":"The agent streams tool_use blocks, the gateway intercepts and executes. The agent could run remotely."},{"text":"The agent directly imports and calls the browser module","correct":false,"explanation":"Separate processes can't call each other's code. The RPC boundary IS the security model."},{"text":"The agent writes commands to a shared file the gateway watches","correct":false,"explanation":"File watching is slow and unreliable. WebSocket RPC gives real-time bidirectional streaming."}],"concept":"Gateway Control Plane","difficulty":"hard"},{"type":"fortune","trigger":"after_stop","triggerStop":6,"title":"Spring of Clean Architecture","text":"Your understanding of the control plane is solid! Friendly contributors join your camp and share plugin templates.","choices":[],"concept":"Channel Plugins","difficulty":"easy"},{"type":"weather","trigger":"after_stop","triggerStop":6,"title":"Message Chunking Fog","text":"Dense fog. Your assistant wrote 3000 words but WhatsApp only allows 4096 characters. The user sees a truncated response. What went wrong?","choices":[{"text":"The formatter should chunk messages based on each channel's limit","correct":true,"explanation":"WhatsApp: 4096, Discord: 2000, Slack: 40000. The delivery layer splits into properly-sized chunks."},{"text":"Tell the AI to always write short responses","correct":false,"explanation":"You can't enforce output length on LLMs. The delivery layer handles formatting."},{"text":"Switch to a channel with no message limits","correct":false,"explanation":"Multi-channel means meeting users where they are. Every channel must work correctly."}],"concept":"Channel Plugins","difficulty":"easy"}],"partyMembers":[{"name":"Gateway Control Plane","icon":"gateway","maxHealth":3},{"name":"Channel Plugins","icon":"channel","maxHealth":3},{"name":"Route Resolution","icon":"route","maxHealth":3},{"name":"Session Persistence","icon":"session","maxHealth":3}],"deathMessages":["You have died of unhandled WebSocket disconnections.","You have died of missing default routes.","You have drowned in the RPC River.","You have died of session bloat.","You have died of a runaway bash command.","You have died of unhandled plugin exceptions.","You have died of API rate limits.","You have died of dependency conflicts.","You have died of expired sessions.","You have died of Discord snowflake avalanche.","You have died of invalid routing config."],"sourceInfo":{"repo":"openclaw/openclaw","commit":"f3ecd9c","tag":"v2026.3.24","snapshotDate":"2026-03-28"}};

window.drawCustomEventOverlay = function(time) {
  if (!currentEventType && !currentEventTitle) return;

  var t = (time || 0) * 0.001; // seconds

  // --- PROTOCOL STORM: dark sky, lightning, rain ---
  if (currentEventTitle.indexOf('Protocol Storm') !== -1) {
    // Darken sky
    ctx.fillStyle = 'rgba(0,0,50,0.45)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning flash (periodic)
    var flashPhase = Math.sin(t * 1.7) + Math.sin(t * 3.1);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, 0, W, H);
      // Lightning bolt
      ctx.strokeStyle = '#FFFF55';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 80 + Math.sin(t * 2.3) * 60;
      ctx.moveTo(lx, 10);
      ctx.lineTo(lx - 5, 35);
      ctx.lineTo(lx + 8, 35);
      ctx.lineTo(lx - 3, 65);
      ctx.lineTo(lx + 10, 65);
      ctx.lineTo(lx + 2, 95);
      ctx.stroke();
    }
    // Rain
    ctx.strokeStyle = '#5555FF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 40; i++) {
      var rx = (i * 8.3 + t * 80) % W;
      var ry = (i * 13.7 + t * 120) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 1), Math.floor(ry + 5));
      ctx.stroke();
    }
    return;
  }

  // --- FELLOW OPERATOR: person standing by campfire ---
  if (currentEventTitle.indexOf('Fellow Operator') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8); // torso
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3); // head
    ctx.fillRect(px - 1, py - 4, 2, 5); // left leg
    ctx.fillRect(px + 3, py - 4, 2, 5); // right leg
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Campfire
    var fx = 212, fy = 148;
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(fx - 3, fy, 2, 3);
    ctx.fillRect(fx + 3, fy, 2, 3);
    ctx.fillStyle = '#FF5555';
    var flicker = Math.sin(t * 8) * 2;
    ctx.fillRect(fx - 1, fy - 3 + Math.floor(flicker * 0.3), 4, 3);
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(fx, fy - 5 + Math.floor(flicker * 0.5), 2, 2);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(fx - 1, fy - 2, 4, 2);
    // Firelight glow (subtle)
    ctx.fillStyle = 'rgba(255,170,0,0.08)';
    ctx.beginPath();
    ctx.arc(fx + 1, fy - 2, 15, 0, Math.PI * 2);
    ctx.fill();
    return;
  }

  // --- SESSION STATE RIVER: rough rapids with white water ---
  if (currentEventTitle.indexOf('Session State') !== -1) {
    // Extra turbulence on the river
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 20; i++) {
      var sx = (i * 17 + t * 40) % W;
      var sy = 157 + Math.sin((i * 3 + t * 5)) * 3;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 4, 2);
    }
    // Floating logs / debris
    ctx.fillStyle = '#AA5500';
    for (var i = 0; i < 3; i++) {
      var logX = (i * 110 + t * 25) % W;
      var logY = 159 + Math.sin(t * 2 + i) * 2;
      ctx.fillRect(Math.floor(logX), Math.floor(logY), 8, 2);
    }
    return;
  }

  // --- RUNAWAY PROCESS: red sky, smoke, warning ---
  if (currentEventTitle.indexOf('Runaway Process') !== -1) {
    // Red danger tint
    ctx.fillStyle = 'rgba(170,0,0,0.25)';
    ctx.fillRect(0, 0, W, H);
    // Smoke particles rising
    ctx.fillStyle = '#555555';
    for (var i = 0; i < 15; i++) {
      var sx = 140 + Math.sin(i * 2.7 + t) * 30;
      var sy = 130 - ((t * 20 + i * 15) % 90);
      var size = 2 + (i % 3);
      ctx.globalAlpha = 0.3 + Math.sin(t + i) * 0.15;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), size, size);
    }
    ctx.globalAlpha = 1.0;
    // Fire at base
    ctx.fillStyle = '#FF5555';
    for (var i = 0; i < 8; i++) {
      var fx = 130 + i * 5;
      var fh = 4 + Math.sin(t * 6 + i * 1.5) * 3;
      ctx.fillRect(fx, Math.floor(140 - fh), 3, Math.floor(fh));
    }
    ctx.fillStyle = '#FFFF55';
    for (var i = 0; i < 5; i++) {
      var fx = 135 + i * 6;
      var fh = 2 + Math.sin(t * 8 + i * 2) * 2;
      ctx.fillRect(fx, Math.floor(139 - fh), 2, Math.floor(fh));
    }
    // Pulsing red border
    var pulse = (Math.sin(t * 4) + 1) * 0.15;
    ctx.strokeStyle = 'rgba(255,0,0,' + pulse.toFixed(2) + ')';
    ctx.lineWidth = 3;
    ctx.strokeRect(1, 1, W - 2, H - 2);
    ctx.lineWidth = 1;
    return;
  }

  // --- RPC RIVER: deep blue, fog/mist over water ---
  if (currentEventTitle.indexOf('RPC River') !== -1) {
    // Fog layers drifting over the river
    ctx.fillStyle = 'rgba(85,85,255,0.12)';
    for (var i = 0; i < 6; i++) {
      var fogX = (i * 60 + t * 12 + Math.sin(i) * 20) % (W + 40) - 20;
      var fogY = 145 + Math.sin(t * 0.5 + i * 1.1) * 5;
      ctx.beginPath();
      ctx.arc(fogX, fogY, 20 + i * 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = 'rgba(170,170,255,0.08)';
    for (var i = 0; i < 8; i++) {
      var fogX = (i * 45 + t * 8) % (W + 30) - 15;
      var fogY = 150 + Math.sin(t * 0.3 + i * 0.8) * 8;
      ctx.beginPath();
      ctx.arc(fogX, fogY, 15 + i * 2, 0, Math.PI * 2);
      ctx.fill();
    }
    // Deeper water tint
    ctx.fillStyle = 'rgba(0,0,85,0.2)';
    ctx.fillRect(0, 155, W, 18);
    return;
  }

  // --- SPRING OF CLEAN ARCHITECTURE: sunny, flowers, rainbow ---
  if (currentEventTitle.indexOf('Spring') !== -1) {
    // Bright sun
    ctx.fillStyle = '#FFFF55';
    ctx.beginPath();
    ctx.arc(260, 30, 12, 0, Math.PI * 2);
    ctx.fill();
    // Sun rays
    ctx.strokeStyle = '#FFFF55';
    ctx.lineWidth = 1;
    for (var i = 0; i < 8; i++) {
      var angle = i * Math.PI / 4 + t * 0.3;
      ctx.beginPath();
      ctx.moveTo(260 + Math.cos(angle) * 14, 30 + Math.sin(angle) * 14);
      ctx.lineTo(260 + Math.cos(angle) * 20, 30 + Math.sin(angle) * 20);
      ctx.stroke();
    }
    // Flowers on ground
    var flowerColors = ['#FF5555', '#FFFF55', '#FF55FF', '#55FFFF', '#55FF55'];
    for (var i = 0; i < 12; i++) {
      var fx = (i * 27 + 10) % W;
      var fy = 135 + (i * 7) % 20;
      ctx.fillStyle = '#00AA00';
      ctx.fillRect(fx + 1, fy, 1, 4); // stem
      ctx.fillStyle = flowerColors[i % flowerColors.length];
      ctx.fillRect(fx, fy - 1, 3, 2); // petals
      ctx.fillStyle = '#FFFF55';
      ctx.fillRect(fx + 1, fy - 1, 1, 1); // center
    }
    // Rainbow arc
    var rainbowColors = ['#FF5555', '#FFAA00', '#FFFF55', '#55FF55', '#5555FF', '#AA00AA'];
    for (var rc = 0; rc < rainbowColors.length; rc++) {
      ctx.strokeStyle = rainbowColors[rc];
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(160, 110, 70 + rc * 3, Math.PI * 1.1, Math.PI * 1.9);
      ctx.stroke();
    }
    ctx.lineWidth = 1;
    return;
  }

  // --- MESSAGE CHUNKING FOG: heavy fog obscuring everything ---
  if (currentEventTitle.indexOf('Chunking Fog') !== -1) {
    // Dense fog layers
    for (var layer = 0; layer < 3; layer++) {
      var alpha = 0.15 + layer * 0.08;
      ctx.fillStyle = 'rgba(170,170,170,' + alpha.toFixed(2) + ')';
      for (var i = 0; i < 10; i++) {
        var fogX = (i * 35 + t * (6 + layer * 4) + layer * 50) % (W + 60) - 30;
        var fogY = 60 + layer * 30 + Math.sin(t * 0.4 + i * 0.9 + layer) * 10;
        var fogR = 18 + layer * 8 + Math.sin(t * 0.3 + i) * 5;
        ctx.beginPath();
        ctx.arc(fogX, fogY, fogR, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    // Fog below obscuring ground details
    ctx.fillStyle = 'rgba(170,170,170,0.25)';
    ctx.fillRect(0, 110, W, 60);
    return;
  }
};
</script>
