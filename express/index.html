<script>
window.TRAIL_DATA = {"framework": "express", "trailName": "The Middleware Prairie", "stops": [{"name": "Server Startup Camp", "subtitle": "The Entry Point", "concept": "Server initialization", "landmarkType": "town", "code": {"file": "app.js", "content": "// app.js:1-25\nconst express = require('express')\nconst morgan = require('morgan')\nconst helmet = require('helmet')\nconst { connectDB } = require('./config/db')\n\nconst app = express()\nconst PORT = process.env.PORT || 3000\n\n// Security headers first — always\napp.use(helmet())\n\n// Request logging\napp.use(morgan('dev'))\n\n// Connect to database, then start listening\nconnectDB().then(() => {\n  app.listen(PORT, () => {\n    console.log(`Server running on port ${PORT}`)\n  })\n})\n\n// Unhandled rejection safety net\nprocess.on('unhandledRejection', (err) => {\n  console.error('Unhandled rejection:', err)\n  process.exit(1)\n})\n\nmodule.exports = app", "language": "javascript"}, "narration": "Every Express journey starts right here — calling express to create your app. This single function call returns the object that everything else attaches to. Notice the order: helmet goes on first for security headers, then morgan for logging. Order matters in Express because middleware runs top to bottom. The server waits for the database before listening. That unhandled rejection handler at the bottom is your safety net for async errors that slip through."}, {"name": "Body Parser Bridge", "subtitle": "Parsing Request Bodies", "concept": "Request body parsing", "landmarkType": "mountain", "code": {"file": "middleware/parsers.js", "content": "// middleware/parsers.js:1-22\nconst express = require('express')\n\nmodule.exports = function configureParsers(app) {\n  // Parse JSON bodies (Content-Type: application/json)\n  app.use(express.json({\n    limit: '10mb',\n    strict: true,\n  }))\n\n  // Parse URL-encoded bodies (HTML form submissions)\n  app.use(express.urlencoded({\n    extended: true,\n    limit: '10mb',\n  }))\n\n  // Custom raw body parser for webhooks that need signature verification\n  app.use('/api/webhooks', express.raw({\n    type: 'application/json',\n    limit: '5mb',\n  }))\n}", "language": "javascript"}, "narration": "Welcome to Body Parser Bridge. Raw HTTP requests arrive as streams of bytes. Express dot json reads that stream, parses the JSON, and puts the result on req dot body. Without this middleware, req dot body is undefined. The limit option prevents someone from sending a giant payload and crashing your server. Notice the webhook route gets a separate raw parser. Stripe and GitHub webhooks need the raw bytes to verify signatures. Parsed JSON would break the hash check."}, {"name": "CORS Crossing", "subtitle": "Cross-Origin Configuration", "concept": "CORS middleware", "landmarkType": "desert", "code": {"file": "middleware/cors.js", "content": "// middleware/cors.js:1-24\nconst cors = require('cors')\n\nconst allowedOrigins = [\n  'https://myapp.com',\n  'https://staging.myapp.com',\n  process.env.NODE_ENV === 'development' && 'http://localhost:5173',\n].filter(Boolean)\n\nconst corsOptions = {\n  origin: function (origin, callback) {\n    // Allow requests with no origin (mobile apps, curl, Postman)\n    if (!origin) return callback(null, true)\n\n    if (allowedOrigins.includes(origin)) {\n      callback(null, true)\n    } else {\n      callback(new Error('Not allowed by CORS'))\n    }\n  },\n  credentials: true,\n  methods: ['GET', 'POST', 'PUT', 'DELETE', 'PATCH'],\n  allowedHeaders: ['Content-Type', 'Authorization'],\n}\n\nmodule.exports = cors(corsOptions)", "language": "javascript"}, "narration": "CORS Crossing is where many developers get stuck. Browsers block cross-origin requests by default. This middleware sends the right headers to allow your frontend to talk to your API. The origin function checks each request against a whitelist. Notice the filter for no-origin requests — tools like curl and mobile apps do not send an origin header. Setting credentials to true lets the browser send cookies cross-origin. Get this wrong and your frontend shows a mysterious CORS error with zero helpful details."}, {"name": "Auth Checkpoint", "subtitle": "Authentication Middleware", "concept": "JWT authentication", "landmarkType": "camp", "code": {"file": "middleware/auth.js", "content": "// middleware/auth.js:1-25\nconst jwt = require('jsonwebtoken')\nconst { findUserById } = require('../services/userService')\n\nasync function authenticate(req, res, next) {\n  const header = req.headers.authorization\n  if (!header || !header.startsWith('Bearer ')) {\n    return res.status(401).json({ error: 'No token provided' })\n  }\n\n  try {\n    const token = header.split(' ')[1]\n    const decoded = jwt.verify(token, process.env.JWT_SECRET)\n\n    const user = await findUserById(decoded.sub)\n    if (!user) {\n      return res.status(401).json({ error: 'User not found' })\n    }\n\n    req.user = user\n    next()\n  } catch (err) {\n    if (err.name === 'TokenExpiredError') {\n      return res.status(401).json({ error: 'Token expired' })\n    }\n    return res.status(401).json({ error: 'Invalid token' })\n  }\n}\n\nmodule.exports = { authenticate }", "language": "javascript"}, "narration": "The Auth Checkpoint guards everything behind it. This middleware extracts the JWT from the Authorization header, verifies the signature, and looks up the user. The key pattern here is attaching the user to the request object. Every middleware and handler downstream can now access req dot user. Notice it calls next only on success. If the token is missing, expired, or invalid, it short-circuits with a four oh one. This is Express at its best — one middleware protects every route that uses it."}, {"name": "Route Matching Mesa", "subtitle": "The Router System", "concept": "Express Router", "landmarkType": "mountain", "code": {"file": "routes/users.js", "content": "// routes/users.js:1-24\nconst { Router } = require('express')\nconst { authenticate } = require('../middleware/auth')\nconst { authorize } = require('../middleware/authorize')\nconst userController = require('../controllers/userController')\n\nconst router = Router()\n\n// Public routes\nrouter.post('/register', userController.register)\nrouter.post('/login', userController.login)\n\n// Protected routes — authenticate applies to everything below\nrouter.use(authenticate)\n\nrouter.get('/me', userController.getProfile)\nrouter.put('/me', userController.updateProfile)\n\n// Admin-only routes — stacked middleware\nrouter.get('/', authorize('admin'), userController.listUsers)\nrouter.delete('/:id', authorize('admin'), userController.deleteUser)\n\n// Param middleware — runs whenever :id is in the route\nrouter.param('id', userController.loadUserById)\n\nmodule.exports = router", "language": "javascript"}, "narration": "Route Matching Mesa is where URLs map to code. Express dot Router creates a mini-application with its own middleware and routes. Notice the pattern: public routes at the top, then router dot use adds authentication as a gate for everything below. Stacked middleware like authorize admin adds a second check for specific routes. The param middleware is clever — it fires automatically whenever a route contains colon id, preloading the user before the handler runs. Mount this router on slash api slash users and the whole tree activates."}, {"name": "Controller Gulch", "subtitle": "Request Handlers", "concept": "Controller patterns", "landmarkType": "forest", "code": {"file": "controllers/userController.js", "content": "// controllers/userController.js:1-25\nconst userService = require('../services/userService')\nconst { AppError } = require('../utils/errors')\n\nexports.getProfile = async (req, res, next) => {\n  try {\n    const user = await userService.getUserWithStats(req.user.id)\n    res.json({ data: user })\n  } catch (err) {\n    next(err)\n  }\n}\n\nexports.updateProfile = async (req, res, next) => {\n  try {\n    const { name, email } = req.body\n\n    if (!name && !email) {\n      throw new AppError('Nothing to update', 400)\n    }\n\n    const updated = await userService.updateUser(req.user.id, { name, email })\n    res.json({ data: updated })\n  } catch (err) {\n    next(err)\n  }\n}", "language": "javascript"}, "narration": "Welcome to Controller Gulch where requests become responses. Controllers are thin — they extract data from the request, call a service, and send the result. Notice the try-catch pattern wrapping every handler. When something goes wrong, next with an error skips all remaining middleware and jumps straight to your error handler. The controller does not contain business logic. It validates input, delegates to the service layer, and formats the output. Keeping controllers thin makes your code testable and reusable."}, {"name": "Service Springs", "subtitle": "Business Logic Layer", "concept": "Service layer and async patterns", "landmarkType": "river", "code": {"file": "services/userService.js", "content": "// services/userService.js:1-25\nconst db = require('../config/db')\nconst bcrypt = require('bcrypt')\nconst { AppError } = require('../utils/errors')\n\nasync function getUserWithStats(userId) {\n  const [user, stats] = await Promise.all([\n    db('users').where({ id: userId }).first(),\n    db('user_stats').where({ user_id: userId }).first(),\n  ])\n\n  if (!user) throw new AppError('User not found', 404)\n\n  return { ...user, stats }\n}\n\nasync function updateUser(userId, updates) {\n  const [updated] = await db('users')\n    .where({ id: userId })\n    .update({\n      ...updates,\n      updated_at: db.fn.now(),\n    })\n    .returning('*')\n\n  if (!updated) throw new AppError('Update failed', 500)\n\n  return updated\n}\n\nmodule.exports = { getUserWithStats, updateUser }", "language": "javascript"}, "narration": "Service Springs is where the real work happens. This layer owns your business logic and database access. Notice Promise dot all fetching the user and their stats in parallel — that is twice as fast as awaiting them sequentially. The service throws typed errors with status codes. It does not know about req or res. That separation is the whole point. You can call these same functions from a controller, a background job, a CLI script, or a test. The service does not care who is asking."}, {"name": "JSON Response Frontier", "subtitle": "Error Handling and Response", "concept": "Error handling and response formatting", "landmarkType": "town", "code": {"file": "middleware/errorHandler.js", "content": "// middleware/errorHandler.js:1-28\nconst { AppError } = require('../utils/errors')\n\nfunction errorHandler(err, req, res, next) {\n  // Log the full error for debugging\n  console.error(`[${req.method}] ${req.path}:`, err.message)\n\n  if (err instanceof AppError) {\n    return res.status(err.statusCode).json({\n      status: 'error',\n      message: err.message,\n    })\n  }\n\n  // Mongoose/Sequelize validation errors\n  if (err.name === 'ValidationError') {\n    return res.status(400).json({\n      status: 'error',\n      message: 'Validation failed',\n      errors: Object.values(err.errors).map(e => e.message),\n    })\n  }\n\n  // Unexpected errors — don't leak internals\n  res.status(500).json({\n    status: 'error',\n    message: process.env.NODE_ENV === 'production'\n      ? 'Internal server error'\n      : err.message,\n  })\n}\n\nmodule.exports = errorHandler", "language": "javascript"}, "narration": "You made it to JSON Response Frontier — the final stop where everything comes together. This error handler has four parameters instead of three. That extra err parameter is how Express knows this is an error handler, not regular middleware. It catches every error passed through next. Known errors like AppError return clean messages with proper status codes. Validation errors get formatted nicely. Unknown errors hide their details in production to avoid leaking internals. This single middleware is your safety net for the entire application. Your wagon has arrived."}], "events": [{"type": "weather", "trigger": "after_stop", "triggerStop": 1, "title": "Payload Storm!", "text": "A massive storm of requests is hitting your API. Someone is sending 500 megabyte JSON payloads, and your server is running out of memory. Requests are piling up and the event loop is frozen.", "choices": [{"text": "Set a size limit on express.json() using the limit option", "correct": true, "explanation": "The limit option on express dot json caps how large a request body can be. Setting it to something reasonable like 10 megabytes rejects oversized payloads before they consume memory. Express returns a 413 Payload Too Large status automatically."}, {"text": "Increase the server's RAM to handle larger payloads", "correct": false, "explanation": "Throwing hardware at the problem does not fix the vulnerability. An attacker can always send a bigger payload. You need to reject oversized requests at the middleware level before they consume resources."}, {"text": "Parse the body manually inside each route handler instead", "correct": false, "explanation": "That duplicates parsing logic across every route and makes it easy to forget the size check. Centralized middleware with a limit applies the protection uniformly to every request."}], "concept": "Middleware Chain", "difficulty": "easy"}, {"type": "encounter", "trigger": "after_stop", "triggerStop": 2, "title": "A Frontend Developer Appears", "text": "A fellow traveler is frustrated. 'My React app on localhost colon 5173 keeps getting CORS errors when calling my Express API on localhost colon 3000. I set Access-Control-Allow-Origin to star but cookies are not being sent.' What is wrong?", "choices": [{"text": "Wildcard origin does not allow credentials — you must specify the exact origin and set credentials to true", "correct": true, "explanation": "The CORS spec forbids combining Access-Control-Allow-Origin star with Access-Control-Allow-Credentials true. You need to explicitly list the origin and enable credentials. This is a security feature preventing any site from sending authenticated requests to your API."}, {"text": "Cookies do not work cross-origin at all — use Authorization headers instead", "correct": false, "explanation": "Cookies absolutely work cross-origin when CORS is configured correctly. You need the exact origin, credentials set to true, and the cookie must have SameSite set to None with Secure. Many auth flows depend on cross-origin cookies."}, {"text": "Add Access-Control-Allow-Credentials as a custom header in the request", "correct": false, "explanation": "Allow-Credentials is a response header set by the server, not a request header set by the client. The browser reads this header from the server's response to decide whether to expose the response to JavaScript."}], "concept": "Middleware Chain", "difficulty": "medium"}, {"type": "river", "trigger": "after_stop", "triggerStop": 3, "title": "The Auth River", "text": "You have reached the deepest river on the trail — the boundary between public and protected routes. Your API has both public endpoints like slash register and protected endpoints like slash me. How do you structure the middleware so authentication only applies where needed?", "choices": [{"text": "Mount auth middleware on the router after public routes, so only routes defined below it are protected", "correct": true, "explanation": "Express processes middleware in registration order. By placing router dot use authenticate after your public routes, those public routes never hit the auth check. Everything registered after the use call requires a valid token. Order is the mechanism."}, {"text": "Add an if statement in the auth middleware to skip certain paths", "correct": false, "explanation": "Hardcoding path exceptions inside the auth middleware creates tight coupling. Every new public route means editing the auth code. Using middleware ordering is cleaner and follows the Express convention."}, {"text": "Apply app dot use authenticate at the top of the file and mark public routes with a skip flag", "correct": false, "explanation": "Express does not have a built-in skip flag for middleware. You would need a custom wrapper, which adds complexity. The idiomatic solution is to control which routes the middleware applies to through registration order or selective route-level attachment."}], "concept": "Route Handlers", "difficulty": "medium"}, {"type": "misfortune", "trigger": "after_stop", "triggerStop": 4, "title": "Unhandled Promise Rejection!", "text": "Disaster! An async route handler throws an error, but Express does not catch it. The request hangs forever, the client times out, and your error handler never fires. The server keeps running but that route is broken.", "choices": [{"text": "Wrap async handlers in try-catch and pass errors to next, or use an async wrapper utility", "correct": true, "explanation": "Express 4 does not automatically catch errors from rejected promises in async handlers. You must either wrap every handler in try-catch with next err, or use a wrapper function like express-async-errors that patches this behavior. Express 5 fixes this natively."}, {"text": "Add process dot on unhandledRejection to catch it globally", "correct": false, "explanation": "That catches the rejection at the process level, but Express has already moved on. The response is still hanging because Express never knew about the error. You need the error to flow through next so the error handler middleware can send a proper response."}, {"text": "Use synchronous code instead of async await to avoid the problem", "correct": false, "explanation": "Almost all real-world Express handlers need database queries, API calls, or file operations — all of which are asynchronous. Avoiding async is not practical. The solution is proper error propagation, not avoiding the feature."}], "concept": "Error Handling", "difficulty": "hard"}, {"type": "fortune", "trigger": "after_stop", "triggerStop": 5, "title": "Spring of Clean Patterns", "text": "Your party has been making excellent decisions! You found a spring of clean architecture patterns — separating controllers from services, keeping routes thin, and handling errors properly. Your health is restored.", "choices": [], "concept": "Route Handlers", "difficulty": "easy"}, {"type": "weather", "trigger": "after_stop", "triggerStop": 6, "title": "The Callback Fog", "text": "Dense fog rolls in. A legacy part of your codebase uses nested callbacks three levels deep — a database query inside a file read inside an API call. The error handling is scattered and the code is nearly unreadable. How do you clear the fog?", "choices": [{"text": "Refactor callbacks into async await with try-catch for linear, readable error handling", "correct": true, "explanation": "Async await flattens nested callbacks into sequential-looking code. Each await pauses execution until the promise resolves. Errors bubble up to a single try-catch block instead of being scattered across callback error parameters. The logic reads top to bottom like synchronous code."}, {"text": "Use Promise dot then chains to replace the callbacks", "correct": false, "explanation": "Promise chains are better than raw callbacks but still create nesting with dot then dot then dot catch. Async await is syntactic sugar over promises that produces cleaner, more readable code. It is the modern standard."}, {"text": "Keep the callbacks but add more comments to explain the flow", "correct": false, "explanation": "Comments do not fix structural problems. The issue is not understanding — it is that callback nesting makes error handling fragile and the control flow hard to follow. Refactoring to async await solves the root cause."}], "concept": "Async Patterns", "difficulty": "easy"}, {"type": "encounter", "trigger": "after_stop", "triggerStop": 1, "title": "A Fellow Developer Appears", "text": "A traveler shows you their Express setup. 'I serve my CSS and images with app.use(express.static(\"public\")).' They ask: 'Where does Express look for static files, and what happens if a static file and a route have the same path?'", "choices": [{"text": "express.static serves files from the 'public' directory, and middleware order determines priority — if static is first, it serves the file before routes run", "correct": true, "explanation": "express.static looks in the specified directory (here, 'public') for a file matching the URL. If the middleware is registered before your routes, a file at public/about.html would be served for /about.html before any route handler runs. Middleware order controls priority."}, {"text": "Express always checks routes first and only falls back to static files if no route matches", "correct": false, "explanation": "Express processes middleware in registration order. If express.static is registered before routes, it checks for files first. There's no built-in priority — order is everything in Express."}, {"text": "Static files must be in a folder called 'static' and are always served at the /static URL prefix", "correct": false, "explanation": "The directory name and URL prefix are fully configurable. You can use any folder name, and optionally mount it at a prefix with app.use('/assets', express.static('public')). Express imposes no naming conventions."}], "concept": "Middleware Chain", "difficulty": "easy"}, {"type": "weather", "trigger": "after_stop", "triggerStop": 2, "title": "Route Parameter Storm!", "text": "A storm of 404 errors hits your API. You have two routes: app.get('/users/:id', getUser) and app.get('/users/search', searchUsers). Every request to /users/search returns a 404 because getUser is trying to find a user with ID 'search'.", "choices": [{"text": "Move the /users/search route BEFORE /users/:id — Express matches routes in registration order and :id matches any string", "correct": true, "explanation": "The :id parameter matches any string, including 'search'. Express checks routes top to bottom and stops at the first match. Putting the specific /users/search route first ensures it matches before the wildcard :id catches it."}, {"text": "Change the parameter to a number type: /users/:id(\\\\d+) to exclude non-numeric values", "correct": false, "explanation": "While /users/:id(\\\\d+) with regex works in Express 4, it only solves this specific case. Route ordering is the fundamental concept — specific routes before parameterized ones. Understanding top-to-bottom matching prevents this entire class of bugs."}, {"text": "Use a query parameter instead: /users?search=term", "correct": false, "explanation": "Query parameters work but change the API design. The root cause is route ordering, not URL design. Understanding that Express matches top-to-bottom is a fundamental concept for any Express developer."}], "concept": "Route Handlers", "difficulty": "easy"}, {"type": "misfortune", "trigger": "after_stop", "triggerStop": 3, "title": "Silent Error Handler!", "text": "Your Express app has an error handler, but errors are never caught by it. Instead, the default Express error page shows in production. Your error middleware looks like: app.use((err, req, res) => { ... }). What's wrong?", "choices": [{"text": "Error-handling middleware must have exactly four parameters: (err, req, res, next) — Express uses the arity to distinguish it from regular middleware", "correct": true, "explanation": "Express identifies error handlers by their function signature having exactly four parameters. With three parameters, Express treats it as regular middleware and never routes errors to it. Even if you don't use next, you must include it in the signature."}, {"text": "The error handler must be registered before all routes, not after", "correct": false, "explanation": "Error handlers must be registered AFTER routes — they catch errors thrown by the middleware and routes above them. If registered first, there are no routes above to catch errors from."}, {"text": "You need to use app.error() instead of app.use() for error handlers", "correct": false, "explanation": "There is no app.error() method in Express. Error handlers are registered with app.use() just like regular middleware — the four-parameter signature is what makes Express treat them as error handlers."}], "concept": "Error Handling", "difficulty": "medium"}, {"type": "encounter", "trigger": "after_stop", "triggerStop": 4, "title": "A Router Expert Appears", "text": "A seasoned traveler shows you their project. Instead of putting all 50 routes in app.js, they use express.Router() to create mini-applications: one for /api/users, one for /api/posts, one for /api/comments. 'Each router has its own middleware,' they explain. What's the key benefit?", "choices": [{"text": "Routers let you organize routes into modules with their own middleware, keeping each file focused on one resource", "correct": true, "explanation": "express.Router() creates a self-contained routing module. Each router can have its own middleware stack — for example, the admin router can require authentication while the public router doesn't. It's the Express way of organizing large applications."}, {"text": "Using Router makes routes faster because Express can skip middleware for unmatched prefixes", "correct": false, "explanation": "Express doesn't have route-prefix optimization built in. Routers are about code organization and middleware scoping, not performance. The request still flows through the middleware stack in order."}, {"text": "Router automatically handles versioning, so /v1/ and /v2/ routes are generated for you", "correct": false, "explanation": "Express Router doesn't auto-generate versioned routes. You'd mount routers at different prefixes manually: app.use('/v1', v1Router). Routers are a structural tool, not a versioning system."}], "concept": "Route Handlers", "difficulty": "medium"}, {"type": "river", "trigger": "after_stop", "triggerStop": 5, "title": "The Event Loop River", "text": "Your Express API has a CPU-intensive route that computes statistics from a large dataset. While that request processes, all other requests hang — even simple health checks time out. The event loop is blocked.", "choices": [{"text": "Offload CPU-intensive work to a worker thread or child process so the event loop stays free for I/O", "correct": true, "explanation": "Node.js is single-threaded for JavaScript execution. CPU-heavy synchronous code blocks the event loop, starving all other requests. Worker threads run code in parallel threads, and child processes spin up separate Node instances. Either keeps the main event loop responsive."}, {"text": "Add more async/await keywords to make the computation non-blocking", "correct": false, "explanation": "async/await only helps with I/O operations (network, disk) that already have asynchronous APIs. CPU-bound computation is synchronous by nature — wrapping it in a promise doesn't move it off the main thread. You need actual parallelism."}, {"text": "Increase the server's timeout to give the computation more time to complete", "correct": false, "explanation": "Longer timeouts don't unblock the event loop. While the computation runs, the event loop can't process ANY other callbacks — including incoming connections, timeouts, and health checks. The issue is blocking, not time limits."}], "concept": "Async Patterns", "difficulty": "hard"}, {"type": "misfortune", "trigger": "after_stop", "triggerStop": 5, "title": "Stream Backpressure Flood!", "text": "Your Express endpoint streams a large file to the client, but slow clients cause memory to spike to gigabytes. You're reading from a fast disk and piping directly to res, but the client connection is slow. The read stream produces data faster than the write stream can consume it.", "choices": [{"text": "Use pipe() or pipeline() instead of manually reading and writing — they handle backpressure automatically by pausing the read stream when the write stream is full", "correct": true, "explanation": "Backpressure is the flow control mechanism in Node streams. pipe() automatically pauses the readable stream when the writable stream's buffer is full, then resumes when it drains. Without it, data accumulates in memory. pipeline() adds error handling on top."}, {"text": "Read the entire file into memory first, then send it all at once to avoid the streaming issue", "correct": false, "explanation": "Loading the entire file into memory is worse — a 2GB file would consume 2GB of RAM per request. Streaming with backpressure is the solution: it limits memory to the buffer size regardless of file size."}, {"text": "Set a maximum response size to reject files that are too large", "correct": false, "explanation": "Size limits don't fix the backpressure problem — even a 100MB file can exhaust memory if clients are slow enough. The issue is the rate mismatch between reading and writing, which pipe/pipeline solves."}], "concept": "Async Patterns", "difficulty": "hard"}, {"type": "encounter", "trigger": "after_stop", "triggerStop": 2, "title": "A Middleware Teacher Appears", "text": "A teacher draws a diagram on the ground. 'In Express, calling next() passes control to the next middleware. But there's also next(err) and next(\"route\"). Each does something different.' What happens when you call next(err) with an error argument?", "choices": [{"text": "It skips all remaining regular middleware and jumps to the next error-handling middleware (the one with four parameters)", "correct": true, "explanation": "Calling next with any argument (except 'route') tells Express to skip all normal middleware and find the next error handler — a middleware with the (err, req, res, next) signature. This is how errors propagate through the Express middleware chain."}, {"text": "It logs the error to the console and continues to the next middleware normally", "correct": false, "explanation": "next(err) doesn't log anything automatically. It changes the flow entirely — Express switches from the normal middleware chain to the error-handling chain. Understanding this flow switch is fundamental to Express error handling."}, {"text": "It sends a 500 error response to the client immediately", "correct": false, "explanation": "next(err) doesn't send any response. It hands the error to the next error-handling middleware, which decides what response to send. You might want different responses for different errors — 400 for validation, 404 for not found, 500 for server errors."}], "concept": "Middleware Chain", "difficulty": "medium"}, {"triggerStop": 3, "type": "misfortune", "title": "Async Context Leak!", "text": "Your Express app tracks request IDs for logging using a module-level variable. Under concurrent load, log entries show the wrong request IDs — one request’s logs are tagged with another request’s ID.", "choices": [{"text": "Module-level variables are shared across all requests — use AsyncLocalStorage for per-request context across async boundaries", "correct": true, "explanation": "Node.js uses a single thread, so module variables are shared. When two async requests interleave, they overwrite each other’s ID. AsyncLocalStorage maintains context that flows through async operations — each request gets its own isolated storage."}, {"text": "Add a mutex to prevent concurrent access to the request ID variable", "correct": false, "explanation": "JavaScript is single-threaded — there are no data races in the traditional sense. The problem is async interleaving. A mutex would serialize all requests, destroying performance."}, {"text": "Generate the request ID in each middleware and pass it as a response header instead", "correct": false, "explanation": "The request ID needs to be available deep in the call stack for logging. Passing it via response headers only makes it available to the HTTP response, not the call chain."}], "concept": "Error Handling", "difficulty": "hard"}, {"triggerStop": 6, "type": "weather", "title": "Memory Leak Storm!", "text": "Your Express server’s memory usage grows steadily over hours until it crashes. Heap snapshots show thousands of accumulated event listener registrations. Every request adds a listener but never removes it.", "choices": [{"text": "Always remove event listeners when no longer needed — use once() for single-use listeners, or call removeListener() in cleanup", "correct": true, "explanation": "Event listeners keep references to their callback closures. Without removal, they accumulate indefinitely. EventEmitter.once() auto-removes after one call. For long-lived listeners, track references and remove them when the context ends."}, {"text": "Increase the maxListeners limit on the EventEmitter to prevent the warning", "correct": false, "explanation": "setMaxListeners() only changes when the warning fires — it doesn’t fix the leak. The warning exists to alert you to exactly this kind of bug. Silencing it makes the leak invisible."}, {"text": "Switch to a different event library that handles cleanup automatically", "correct": false, "explanation": "The problem isn’t the EventEmitter library — it’s the application code failing to clean up. Any event system requires the programmer to manage listener lifecycle."}], "concept": "Async Patterns", "difficulty": "hard"}], "partyMembers": [{"name": "Middleware Chain", "icon": "middleware", "maxHealth": 3}, {"name": "Route Handlers", "icon": "route", "maxHealth": 3}, {"name": "Error Handling", "icon": "error", "maxHealth": 3}, {"name": "Async Patterns", "icon": "async", "maxHealth": 3}], "deathMessages": ["Lost in the middleware — never called next().", "Died of callback hell. No async slash await equipped.", "The unhandled rejection consumed all resources.", "Here lies your API. It died of CORS misconfiguration.", "Buried under an avalanche of unvalidated request bodies.", "Drowned in the Auth River — token verification threw but nobody caught it.", "Your error handler had three parameters. Express thought window.drawCustomEventOverlay = function(time) {
  if (!currentEventType && !currentEventTitle) return;

  var t = (time || 0) * 0.001; // seconds

  // --- PAYLOAD STORM: dark sky, lightning, rain ---
  if (currentEventTitle.indexOf('Payload Storm') !== -1) {
    // Darken sky
    ctx.fillStyle = 'rgba(0,0,50,0.45)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning flash (periodic)
    var flashPhase = Math.sin(t * 1.7) + Math.sin(t * 3.1);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, 0, W, H);
      // Lightning bolt
      ctx.strokeStyle = '#FFFF55';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 80 + Math.sin(t * 2.3) * 60;
      ctx.moveTo(lx, 10);
      ctx.lineTo(lx - 5, 35);
      ctx.lineTo(lx + 8, 35);
      ctx.lineTo(lx - 3, 65);
      ctx.lineTo(lx + 10, 65);
      ctx.lineTo(lx + 2, 95);
      ctx.stroke();
    }
    // Rain
    ctx.strokeStyle = '#5555FF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 40; i++) {
      var rx = (i * 8.3 + t * 80) % W;
      var ry = (i * 13.7 + t * 120) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 1), Math.floor(ry + 5));
      ctx.stroke();
    }
    return;
  }

  // --- FRONTEND DEVELOPER: person standing with laptop ---
  if (currentEventTitle.indexOf('Frontend Developer') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8); // torso
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3); // head
    ctx.fillRect(px - 1, py - 4, 2, 5); // left leg
    ctx.fillRect(px + 3, py - 4, 2, 5); // right leg
    // Hat (React blue beanie)
    ctx.fillStyle = '#55FFFF';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Laptop
    ctx.fillStyle = '#555555';
    ctx.fillRect(px + 8, py - 8, 8, 5);
    ctx.fillStyle = '#55FFFF';
    ctx.fillRect(px + 9, py - 7, 6, 3);
    // Campfire
    var fx = 212, fy = 148;
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(fx - 3, fy, 2, 3);
    ctx.fillRect(fx + 3, fy, 2, 3);
    ctx.fillStyle = '#FF5555';
    var flicker = Math.sin(t * 8) * 2;
    ctx.fillRect(fx - 1, fy - 3 + Math.floor(flicker * 0.3), 4, 3);
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(fx, fy - 5 + Math.floor(flicker * 0.5), 2, 2);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(fx - 1, fy - 2, 4, 2);
    // Firelight glow (subtle)
    ctx.fillStyle = 'rgba(255,170,0,0.08)';
    ctx.beginPath();
    ctx.arc(fx + 1, fy - 2, 15, 0, Math.PI * 2);
    ctx.fill();
    return;
  }

  // --- AUTH RIVER: rough rapids with white water ---
  if (currentEventTitle.indexOf('Auth River') !== -1) {
    // Extra turbulence on the river
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 20; i++) {
      var sx = (i * 17 + t * 40) % W;
      var sy = 157 + Math.sin((i * 3 + t * 5)) * 3;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 4, 2);
    }
    // Floating logs / debris
    ctx.fillStyle = '#AA5500';
    for (var i = 0; i < 3; i++) {
      var logX = (i * 110 + t * 25) % W;
      var logY = 159 + Math.sin(t * 2 + i) * 2;
      ctx.fillRect(Math.floor(logX), Math.floor(logY), 8, 2);
    }
    return;
  }

  // --- UNHANDLED PROMISE REJECTION: red sky, smoke, warning ---
  if (currentEventTitle.indexOf('Unhandled Promise') !== -1) {
    // Red danger tint
    ctx.fillStyle = 'rgba(170,0,0,0.25)';
    ctx.fillRect(0, 0, W, H);
    // Smoke particles rising
    ctx.fillStyle = '#555555';
    for (var i = 0; i < 15; i++) {
      var sx = 140 + Math.sin(i * 2.7 + t) * 30;
      var sy = 130 - ((t * 20 + i * 15) % 90);
      var size = 2 + (i % 3);
      ctx.globalAlpha = 0.3 + Math.sin(t + i) * 0.15;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), size, size);
    }
    ctx.globalAlpha = 1.0;
    // Fire at base
    ctx.fillStyle = '#FF5555';
    for (var i = 0; i < 8; i++) {
      var fx = 130 + i * 5;
      var fh = 4 + Math.sin(t * 6 + i * 1.5) * 3;
      ctx.fillRect(fx, Math.floor(140 - fh), 3, Math.floor(fh));
    }
    ctx.fillStyle = '#FFFF55';
    for (var i = 0; i < 5; i++) {
      var fx = 135 + i * 6;
      var fh = 2 + Math.sin(t * 8 + i * 2) * 2;
      ctx.fillRect(fx, Math.floor(139 - fh), 2, Math.floor(fh));
    }
    // Pulsing red border
    var pulse = (Math.sin(t * 4) + 1) * 0.15;
    ctx.strokeStyle = 'rgba(255,0,0,' + pulse.toFixed(2) + ')';
    ctx.lineWidth = 3;
    ctx.strokeRect(1, 1, W - 2, H - 2);
    ctx.lineWidth = 1;
    return;
  }

  // --- SPRING OF CLEAN PATTERNS: sunny, flowers, rainbow ---
  if (currentEventTitle.indexOf('Spring') !== -1) {
    // Bright sun
    ctx.fillStyle = '#FFFF55';
    ctx.beginPath();
    ctx.arc(260, 30, 12, 0, Math.PI * 2);
    ctx.fill();
    // Sun rays
    ctx.strokeStyle = '#FFFF55';
    ctx.lineWidth = 1;
    for (var i = 0; i < 8; i++) {
      var angle = i * Math.PI / 4 + t * 0.3;
      ctx.beginPath();
      ctx.moveTo(260 + Math.cos(angle) * 14, 30 + Math.sin(angle) * 14);
      ctx.lineTo(260 + Math.cos(angle) * 20, 30 + Math.sin(angle) * 20);
      ctx.stroke();
    }
    // Flowers on ground
    var flowerColors = ['#FF5555', '#FFFF55', '#FF55FF', '#55FFFF', '#55FF55'];
    for (var i = 0; i < 12; i++) {
      var fx = (i * 27 + 10) % W;
      var fy = 135 + (i * 7) % 20;
      ctx.fillStyle = '#00AA00';
      ctx.fillRect(fx + 1, fy, 1, 4); // stem
      ctx.fillStyle = flowerColors[i % flowerColors.length];
      ctx.fillRect(fx, fy - 1, 3, 2); // petals
      ctx.fillStyle = '#FFFF55';
      ctx.fillRect(fx + 1, fy - 1, 1, 1); // center
    }
    // Rainbow arc
    var rainbowColors = ['#FF5555', '#FFAA00', '#FFFF55', '#55FF55', '#5555FF', '#F7DF1E'];
    for (var rc = 0; rc < rainbowColors.length; rc++) {
      ctx.strokeStyle = rainbowColors[rc];
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(160, 110, 70 + rc * 3, Math.PI * 1.1, Math.PI * 1.9);
      ctx.stroke();
    }
    ctx.lineWidth = 1;
    return;
  }

  // --- CALLBACK FOG: heavy fog obscuring everything ---
  if (currentEventTitle.indexOf('Callback Fog') !== -1) {
    // Dense fog layers
    for (var layer = 0; layer < 3; layer++) {
      var alpha = 0.15 + layer * 0.08;
      ctx.fillStyle = 'rgba(170,170,170,' + alpha.toFixed(2) + ')';
      for (var i = 0; i < 10; i++) {
        var fogX = (i * 35 + t * (6 + layer * 4) + layer * 50) % (W + 60) - 30;
        var fogY = 60 + layer * 30 + Math.sin(t * 0.4 + i * 0.9 + layer) * 10;
        var fogR = 18 + layer * 8 + Math.sin(t * 0.3 + i) * 5;
        ctx.beginPath();
        ctx.arc(fogX, fogY, fogR, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    // Fog below obscuring ground details
    ctx.fillStyle = 'rgba(170,170,170,0.25)';
    ctx.fillRect(0, 110, W, 60);
    return;
  }
};
