<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Coderegon Trail - React Edition</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100vh;
  overflow: hidden;
  background: #000;
  font-family: 'Courier New', monospace;
  color: #AAAAAA;
}
#game-container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}
#canvas-area {
  height: 52vh;
  min-height: 0;
  position: relative;
  background: #000;
}
#game-canvas {
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
  image-rendering: -moz-crisp-edges;
  image-rendering: crisp-edges;
  display: block;
}
#text-panel {
  flex: 1;
  min-height: 0;
  background: #000;
  border-top: 2px solid #555555;
  overflow-y: auto;
  padding: 8px 16px;
  font-size: 14px;
  line-height: 1.4;
  color: #FFFFFF;
}
#text-panel::-webkit-scrollbar { width: 8px; }
#text-panel::-webkit-scrollbar-track { background: #000; }
#text-panel::-webkit-scrollbar-thumb { background: #555555; }
#status-bar {
  height: 60px;
  min-height: 60px;
  background: #000;
  border-top: 2px solid #555555;
  display: flex;
  align-items: center;
  padding: 0 16px;
  font-size: 15px;
  color: #AAAAAA;
  white-space: nowrap;
  overflow: hidden;
}
.blink {
  animation: blink-anim 1s step-end infinite;
}
@keyframes blink-anim {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
  20%, 40%, 60%, 80% { transform: translateX(4px); }
}
.shake { animation: shake 0.5s ease-in-out; }
.code-box {
  background: #272822;
  border: 1px solid #555555;
  padding: 6px 8px;
  margin: 6px 0;
  max-height: 130px;
  overflow-y: auto;
  overflow-x: auto;
  font-size: 12px;
  line-height: 1.3;
  white-space: pre;
  color: #f8f8f2;
}
.code-box::-webkit-scrollbar { width: 6px; height: 6px; }
.code-box::-webkit-scrollbar-track { background: #272822; }
.code-box::-webkit-scrollbar-thumb { background: #555555; }
.choice-item { cursor: pointer; padding: 2px 4px; }
.choice-item:hover { color: #FFFF55; }
.choice-selected { color: #FFFF55; background: #333300; }
.stop-opt { color: #55FFFF; cursor: pointer; padding: 2px 4px; }
.stop-opt:hover { color: #FFFF55; }
.choice-correct { color: #55FF55; }
.choice-wrong { color: #FF5555; }
.choice-dimmed { color: #555555; }
.health-green { color: #00AA00; }
.health-yellow { color: #FFFF55; }
.health-red { color: #FF5555; }
.health-dead { color: #555555; text-decoration: line-through; }
.text-cyan { color: #55FFFF; }
.text-yellow { color: #FFFF55; }
.text-green { color: #55FF55; }
.text-red { color: #FF5555; }
.text-magenta { color: #FF55FF; }
.text-gray { color: #555555; }
.text-white { color: #FFFFFF; }
.text-bright { color: #FFFFFF; font-weight: bold; }
#music-indicator {
  position: absolute;
  top: 4px;
  right: 8px;
  font-size: 11px;
  color: #555555;
  z-index: 10;
  pointer-events: none;
}
</style>
</head>
<body>
<div id="game-container">
  <div id="canvas-area">
    <canvas id="game-canvas" width="320" height="200"></canvas>
    <div id="music-indicator">M: Music</div>
  </div>
  <div id="text-panel"></div>
  <div id="status-bar"></div>
</div>

<script>
// =====================================================================

const TRAIL_DATA={"framework":"react-vite","trailName":"The Component Canyon","stops":[{"name":"Index.html Outpost","subtitle":"The Entry Point","concept":"Project initialization","landmarkType":"town","code":{"file":"index.html","content":"// index.html\n<!DOCTYPE html>\n<html lang=\"en\">\n  <head>\n    <meta charset=\"UTF-8\" />\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n    <title>My App</title>\n  </head>\n  <body>\n    <div id=\"root\"></div>\n    <script type=\"module\" src=\"/src/main.tsx\"><\/script>\n  </body>\n</html>\n\n// vite.config.ts\nimport { defineConfig } from 'vite'\nimport react from '@vitejs/plugin-react'\n\nexport default defineConfig({\n  plugins: [react()],\n  server: { port: 3000 },\n})","language":"tsx"},"narration":"Every React journey starts here \u2014 a single HTML file with an empty div. That's it. No server-side templating, no pre-rendered content. Just a hollow root element waiting to be filled. The script tag uses type module, which tells the browser to load modern JavaScript. Vite takes it from there \u2014 it serves your source files directly during development with hot module replacement. In production, it bundles everything into optimized chunks. This empty div is the trailhead."},{"name":"Main.jsx Junction","subtitle":"The Bootstrap","concept":"Application bootstrap","landmarkType":"camp","code":{"file":"src/main.tsx","content":"// src/main.tsx\nimport React from 'react'\nimport ReactDOM from 'react-dom/client'\nimport { BrowserRouter } from 'react-router-dom'\nimport { QueryClient, QueryClientProvider } from '@tanstack/react-query'\nimport { AuthProvider } from './context/AuthContext'\nimport App from './App'\nimport './index.css'\n\nconst queryClient = new QueryClient({\n  defaultOptions: {\n    queries: {\n      staleTime: 5 * 60 * 1000,\n      retry: 1,\n    },\n  },\n})\n\nReactDOM.createRoot(document.getElementById('root')!).render(\n  <React.StrictMode>\n    <QueryClientProvider client={queryClient}>\n      <BrowserRouter>\n        <AuthProvider>\n          <App />\n        </AuthProvider>\n      </BrowserRouter>\n    </QueryClientProvider>\n  </React.StrictMode>\n)","language":"tsx"},"narration":"Main dot tsx is where React takes control of the DOM. createRoot grabs that empty div from index dot html and mounts your entire component tree into it. Notice the nesting order of providers \u2014 it matters. QueryClientProvider wraps BrowserRouter wraps AuthProvider wraps App. Each layer provides context that everything below can access. StrictMode wraps the whole thing to catch bugs during development. This is the one file that bridges plain HTML and the React world."},{"name":"App Component Fort","subtitle":"Top-Level Composition","concept":"Component composition","landmarkType":"forest","code":{"file":"src/App.tsx","content":"// src/App.tsx\nimport { Routes, Route } from 'react-router-dom'\nimport { Suspense, lazy } from 'react'\nimport { Navbar } from './components/Navbar'\nimport { ProtectedRoute } from './components/ProtectedRoute'\nimport { ErrorBoundary } from './components/ErrorBoundary'\n\nconst Home = lazy(() => import('./pages/Home'))\nconst Dashboard = lazy(() => import('./pages/Dashboard'))\nconst Settings = lazy(() => import('./pages/Settings'))\nconst NotFound = lazy(() => import('./pages/NotFound'))\n\nexport default function App() {\n  return (\n    <ErrorBoundary>\n      <Navbar />\n      <main className=\"container mx-auto px-4 py-8\">\n        <Suspense fallback={<div className=\"animate-pulse\">Loading...</div>}>\n          <Routes>\n            <Route path=\"/\" element={<Home />} />\n            <Route path=\"/dashboard/*\" element={\n              <ProtectedRoute><Dashboard /></ProtectedRoute>\n            } />\n            <Route path=\"/settings\" element={\n              <ProtectedRoute><Settings /></ProtectedRoute>\n            } />\n            <Route path=\"*\" element={<NotFound />} />\n          </Routes>\n        </Suspense>\n      </main>\n    </ErrorBoundary>\n  )\n}","language":"tsx"},"narration":"App dot tsx is the fort that holds everything together. Notice the lazy imports at the top \u2014 each page is loaded only when the user navigates to it. That means your initial bundle stays small. The ErrorBoundary at the top catches any rendering crash below it so the whole app doesn't go white. Suspense shows a loading spinner while lazy components download. And ProtectedRoute wraps pages that require authentication. This is composition \u2014 small pieces snapping together like building blocks."},{"name":"Router Rapids","subtitle":"Client-Side Navigation","concept":"Client-side routing","landmarkType":"river","code":{"file":"src/pages/Dashboard.tsx","content":"// src/pages/Dashboard.tsx\nimport { Routes, Route, NavLink, Outlet } from 'react-router-dom'\nimport { Overview } from './dashboard/Overview'\nimport { Analytics } from './dashboard/Analytics'\nimport { Team } from './dashboard/Team'\n\nexport default function Dashboard() {\n  return (\n    <div className=\"flex gap-6\">\n      <nav className=\"w-48 space-y-2\">\n        <NavLink to=\"/dashboard\" end\n          className={({ isActive }) =>\n            isActive ? 'font-bold text-blue-600' : 'text-gray-600'\n          }>\n          Overview\n        </NavLink>\n        <NavLink to=\"/dashboard/analytics\"\n          className={({ isActive }) =>\n            isActive ? 'font-bold text-blue-600' : 'text-gray-600'\n          }>\n          Analytics\n        </NavLink>\n        <NavLink to=\"/dashboard/team\"\n          className={({ isActive }) =>\n            isActive ? 'font-bold text-blue-600' : 'text-gray-600'\n          }>\n          Team\n        </NavLink>\n      </nav>\n      <div className=\"flex-1\">\n        <Routes>\n          <Route index element={<Overview />} />\n          <Route path=\"analytics\" element={<Analytics />} />\n          <Route path=\"team\" element={<Team />} />\n        </Routes>\n      </div>\n    </div>\n  )\n}","language":"tsx"},"narration":"Welcome to Router Rapids \u2014 where navigation happens without page reloads. React Router intercepts every link click, updates the browser URL, and swaps the matching component. No request hits a server. NavLink is special \u2014 it knows whether its route is active and styles itself accordingly. The nested Routes inside Dashboard mean only the right-hand panel changes when you click between Overview, Analytics, and Team. The sidebar stays mounted. This is why single-page apps feel fast \u2014 the browser never tears down the whole page."},{"name":"Page Component Pass","subtitle":"Data Loading and Display","concept":"Data fetching in components","landmarkType":"mountain","code":{"file":"src/pages/dashboard/Analytics.tsx","content":"// src/pages/dashboard/Analytics.tsx\nimport { useQuery } from '@tanstack/react-query'\nimport { useAuth } from '../../hooks/useAuth'\nimport { fetchAnalytics } from '../../api/analytics'\nimport { Chart } from '../../components/Chart'\nimport { Skeleton } from '../../components/Skeleton'\n\nexport function Analytics() {\n  const { user } = useAuth()\n  const { data, isLoading, error } = useQuery({\n    queryKey: ['analytics', user.orgId],\n    queryFn: () => fetchAnalytics(user.orgId),\n    staleTime: 30_000,\n  })\n\n  if (isLoading) return <Skeleton rows={4} />\n  if (error) return (\n    <div className=\"text-red-500\">\n      Failed to load analytics: {error.message}\n    </div>\n  )\n\n  return (\n    <div className=\"space-y-6\">\n      <h2 className=\"text-2xl font-bold\">Analytics</h2>\n      <div className=\"grid grid-cols-2 gap-4\">\n        {data.metrics.map(metric => (\n          <Chart key={metric.id} data={metric} />\n        ))}\n      </div>\n    </div>\n  )\n}","language":"tsx"},"narration":"Page Component Pass is where data meets the screen. React Query manages fetching \u2014 you give it a unique query key and a function that returns a promise. It handles caching, deduplication, and background refetching automatically. Notice the three states: loading shows a skeleton placeholder, error shows a message, and success renders the charts. The staleTime of thirty seconds means switching tabs and coming back won't trigger a refetch unless thirty seconds have passed. The component just declares what data it needs. React Query handles the rest."},{"name":"Hooks Hollow","subtitle":"The Engine Room","concept":"Hooks and custom hooks","landmarkType":"camp","code":{"file":"src/hooks/useAuth.ts","content":"// src/hooks/useAuth.ts\nimport { useContext, useCallback } from 'react'\nimport { AuthContext } from '../context/AuthContext'\nimport { useNavigate } from 'react-router-dom'\n\nexport function useAuth() {\n  const context = useContext(AuthContext)\n  if (!context) {\n    throw new Error('useAuth must be used within an AuthProvider')\n  }\n  return context\n}\n\n// src/hooks/useDebounce.ts\nimport { useState, useEffect } from 'react'\n\nexport function useDebounce<T>(value: T, delay: number): T {\n  const [debouncedValue, setDebouncedValue] = useState(value)\n\n  useEffect(() => {\n    const timer = setTimeout(() => setDebouncedValue(value), delay)\n    return () => clearTimeout(timer)\n  }, [value, delay])\n\n  return debouncedValue\n}","language":"tsx"},"narration":"Welcome to Hooks Hollow \u2014 where reusable logic lives. Custom hooks let you extract behavior from components without changing the component tree. useAuth wraps useContext and adds a safety check \u2014 if someone forgets the AuthProvider, they get a clear error instead of a cryptic undefined. useDebounce is a pattern you will use everywhere \u2014 it delays updating a value until the user stops typing. Notice the useEffect cleanup function that clears the timeout. That cleanup runs before every re-execution and on unmount. Hooks are composable. Build small ones, combine them into bigger ones."},{"name":"State Update Gorge","subtitle":"The Cascade","concept":"State management and re-render triggers","landmarkType":"desert","code":{"file":"src/components/TaskBoard.tsx","content":"// src/components/TaskBoard.tsx\nimport { useState, useCallback, useMemo } from 'react'\nimport { TaskColumn } from './TaskColumn'\n\ninterface Task { id: string; title: string; status: string }\n\nexport function TaskBoard({ initialTasks }: { initialTasks: Task[] }) {\n  const [tasks, setTasks] = useState<Task[]>(initialTasks)\n  const [filter, setFilter] = useState('')\n\n  const filteredTasks = useMemo(\n    () => tasks.filter(t =>\n      t.title.toLowerCase().includes(filter.toLowerCase())\n    ),\n    [tasks, filter]\n  )\n\n  const updateStatus = useCallback((id: string, status: string) => {\n    setTasks(prev => prev.map(t =>\n      t.id === id ? { ...t, status } : t\n    ))\n  }, [])\n\n  const columns = useMemo(() => {\n    const groups = { todo: [], doing: [], done: [] }\n    filteredTasks.forEach(t => groups[t.status]?.push(t))\n    return groups\n  }, [filteredTasks])\n\n  return (\n    <div>\n      <input value={filter} onChange={e => setFilter(e.target.value)}\n        placeholder=\"Filter tasks...\" className=\"border p-2 rounded\" />\n      <div className=\"grid grid-cols-3 gap-4 mt-4\">\n        {Object.entries(columns).map(([status, items]) => (\n          <TaskColumn key={status} status={status} tasks={items}\n            onUpdateStatus={updateStatus} />\n        ))}\n      </div>\n    </div>\n  )\n}","language":"tsx"},"narration":"State Update Gorge is where performance lives or dies. Every call to setTasks or setFilter triggers a re-render of TaskBoard and all its children. useMemo on filteredTasks means that expensive filter operation only re-runs when tasks or filter actually change. useCallback on updateStatus keeps the function reference stable so TaskColumn can skip re-renders via React dot memo. Notice the state updater pattern \u2014 prev arrow map \u2014 which safely reads current state without stale closures. State flows down. Events flow up. Master this gorge and your app stays fast."},{"name":"Re-render Frontier","subtitle":"The Virtual DOM","concept":"Virtual DOM reconciliation","landmarkType":"town","code":{"file":"virtual-dom-reconciliation.tsx","content":"// What React does internally (conceptual):\n\n// 1. State change triggers re-render\nsetTasks(prev => prev.map(t =>\n  t.id === '3' ? { ...t, status: 'done' } : t\n))\n\n// 2. React calls your component function again\n// TaskBoard() -> returns new JSX tree (virtual DOM)\n\n// 3. React diffs the old and new virtual DOM trees\n// Old:  <TaskColumn status=\"doing\" tasks={[task3, task5]} />\n// New:  <TaskColumn status=\"doing\" tasks={[task5]} />\n//       <TaskColumn status=\"done\"  tasks={[task3, task8]} />\n\n// 4. Only the changed columns get new props\n// \"doing\" column: tasks array changed -> re-render\n// \"done\" column:  tasks array changed -> re-render\n// \"todo\" column:  tasks array unchanged -> SKIP (if React.memo)\n\n// 5. Commit phase: React applies minimal DOM mutations\n// - Remove task3's DOM node from \"doing\" column\n// - Insert task3's DOM node into \"done\" column\n// - No other DOM nodes are touched\n\n// 6. Browser paints the updated pixels\n// Total DOM operations: 2 (remove + insert)\n// Without virtual DOM: rebuild entire board = dozens of operations","language":"tsx"},"narration":"You made it to Re-render Frontier! This is where React earns its name. When state changes, React calls your component function again and gets a new virtual DOM tree \u2014 just plain JavaScript objects. Then it diffs the old tree against the new one. It finds the minimum set of actual DOM mutations needed. In this example, moving one task between columns only touches two DOM nodes. Everything else stays put. The key insight is that React dot memo and stable keys let React skip entire subtrees that haven't changed. Your wagon has arrived \u2014 you now understand the full cycle from click to pixel."}],"events":[{"type":"weather","trigger":"after_stop","triggerStop":1,"title":"Provider Storm!","text":"A storm of context providers is battering your app. Your main dot tsx has twelve nested providers wrapping the App component, and every state change in any provider causes the entire tree to re-render.","choices":[{"text":"Split providers so fast-changing state is closer to the components that use it, not at the root","correct":true,"explanation":"Context re-renders every consumer when its value changes. Putting frequently-updating state like mouse position or animation frames at the root forces the entire app to re-render. Move volatile providers down to the subtree that actually needs them."},{"text":"Combine all twelve providers into one mega-provider to reduce nesting","correct":false,"explanation":"Combining providers means a single massive state object. Any change to any piece of state re-renders every consumer of that context. Separate providers let React skip consumers whose specific context hasn't changed."},{"text":"Replace all context providers with prop drilling to avoid the re-render issue","correct":false,"explanation":"Prop drilling through dozens of intermediate components is worse \u2014 those intermediate components also re-render when props change. Context exists to solve this exact problem. The fix is strategic placement, not removal."}],"concept":"Component Tree","difficulty":"medium"},{"type":"encounter","trigger":"after_stop","triggerStop":2,"title":"A Component Architect Appears","text":"A fellow traveler shows you two components. One is a five-hundred-line file with fetch calls, state management, error handling, and rendering all mixed together. The other splits each concern into its own component or hook. 'Which one will survive the trail?' they ask.","choices":[{"text":"The composed version \u2014 small components and custom hooks are easier to test, reuse, and debug","correct":true,"explanation":"Composition is React's superpower. A custom hook handles data fetching. A separate component handles loading states. Another handles error display. Each piece is testable in isolation. When a bug appears, you know exactly which small piece to examine."},{"text":"The monolith \u2014 fewer files means fewer imports and less indirection to follow","correct":false,"explanation":"Fewer files means each file does too much. A five-hundred-line component is hard to test, hard to code-review, and impossible to reuse partially. React is designed for composition. Lean into it."},{"text":"Neither \u2014 use class components with lifecycle methods for better organization","correct":false,"explanation":"Class components don't solve the composition problem. They encourage putting all logic in lifecycle methods, which leads to the same tangling of concerns. Hooks were invented specifically because class components made logic reuse difficult."}],"concept":"Component Tree","difficulty":"easy"},{"type":"river","trigger":"after_stop","triggerStop":3,"title":"The Navigation River","text":"You reach the river crossing where URLs meet components. A user bookmarks your app at slash dashboard slash analytics, closes the browser, and reopens the bookmark a week later. The page shows a blank white screen with a four-oh-four error from the server.","choices":[{"text":"Configure the server or hosting platform to serve index dot html for all routes, letting React Router handle them client-side","correct":true,"explanation":"Single-page apps handle routing in the browser, but the server must cooperate. When the user hits slash dashboard slash analytics directly, the server needs to return index dot html \u2014 not look for a file at that path. Most hosts call this a rewrite rule or SPA fallback. Vite's dev server does this automatically, but production servers need explicit configuration."},{"text":"Create an actual HTML file for every route in the build output","correct":false,"explanation":"That defeats the purpose of a single-page app and client-side routing. You would need to rebuild and redeploy every time a route changes. React Router handles route matching in the browser \u2014 the server just needs to serve the one HTML file."},{"text":"Switch from BrowserRouter to HashRouter so all routes use hash fragments","correct":false,"explanation":"HashRouter works around the problem by putting routes after the hash sign \u2014 slash hash slash dashboard. The server ignores everything after the hash. But hash URLs look ugly, break proper linking, and don't work well with analytics or SEO. Configuring proper server rewrites is the correct fix."}],"concept":"Hooks","difficulty":"medium"},{"type":"misfortune","trigger":"after_stop","triggerStop":4,"title":"Data Waterfall!","text":"Disaster on the trail! Your dashboard page fetches user data in a useEffect. Only after that resolves does the Analytics component mount and start its own fetch. Then the Chart inside Analytics mounts and fetches chart config. Three sequential network requests \u2014 a waterfall that takes four seconds to complete.","choices":[{"text":"Lift data fetching up and fetch in parallel, or use a library like React Query that deduplicates and prefetches","correct":true,"explanation":"Waterfalls happen when child components can't start fetching until parents finish rendering. Lifting fetches to the page level or using React Query's prefetching lets requests fire in parallel. React Query also caches results, so navigating back to a page doesn't re-fetch."},{"text":"Make each component fetch faster by using a CDN for the API","correct":false,"explanation":"A CDN can help latency, but three sequential requests will still waterfall. Even if each request takes one hundred milliseconds, the sequence forces three hundred. Parallel fetching brings that down to one hundred regardless of CDN."},{"text":"Add loading spinners to each component so the user doesn't notice the delay","correct":false,"explanation":"Spinners improve perceived responsiveness but don't fix the underlying performance problem. Three cascading spinners that resolve one at a time actually make the page feel janky. Fix the waterfall first, then add a single well-placed skeleton."}],"concept":"Effect Lifecycle","difficulty":"medium"},{"type":"fortune","trigger":"after_stop","triggerStop":5,"title":"Spring of Reusable Logic","text":"Your custom hooks are clean and composable. A nearby camp shares their hook library with you \u2014 useLocalStorage, useMediaQuery, and useIntersectionObserver. Your party's morale is high!","choices":[],"concept":"Hooks","difficulty":"easy"},{"type":"misfortune","trigger":"after_stop","triggerStop":6,"title":"Infinite Re-render Loop!","text":"Your browser tab just froze! A component is creating a new object in its render body and passing it as a dependency to useEffect. The effect updates state, which triggers a re-render, which creates a new object, which triggers the effect again. The cycle never ends.","choices":[{"text":"Memoize the object with useMemo or move it outside the component so the reference stays stable","correct":true,"explanation":"React compares effect dependencies by reference, not by value. A new object literal created during render is a different reference every time, even if its contents are identical. useMemo keeps the same reference until its own dependencies change. Moving constants outside the component works too since they never change."},{"text":"Add an if-statement inside the effect to check whether the data actually changed","correct":false,"explanation":"The effect already fired \u2014 the damage is done. Even if you bail out early inside the effect, the effect still runs every render because the dependency reference keeps changing. You need to stabilize the reference, not add guards after the fact."},{"text":"Remove the dependency array entirely so the effect only runs once on mount","correct":false,"explanation":"An effect with no dependency array runs after every single render \u2014 that makes the problem worse. An empty array runs only on mount, but then your effect never responds to actual changes. The correct fix is stable references in the dependency array."}],"concept":"State Management","difficulty":"hard"},{"type":"encounter","trigger":"after_stop","triggerStop":1,"title":"A React Mentor Appears","text":"A mentor sits by the campfire. 'New React developers always ask: when should I use props and when should I use state?' They turn to you. 'What is the fundamental difference between props and state?'","choices":[{"text":"Props are passed down from parent components and are read-only; state is managed within a component and can be updated","correct":true,"explanation":"Props flow downward like arguments to a function \u2014 the child receives them but cannot change them. State is internal to a component, managed with useState or useReducer. When state changes, the component re-renders. This distinction is React's core data flow model."},{"text":"Props are for strings and numbers, state is for objects and arrays","correct":false,"explanation":"Both props and state can hold any JavaScript value \u2014 strings, numbers, objects, arrays, functions. The difference is ownership: props come from outside (parent), state lives inside the component."},{"text":"Props are faster because React doesn't need to track changes to them","correct":false,"explanation":"React tracks both props and state for changes to trigger re-renders. A component re-renders when its props change OR its state changes. The difference is who controls the data, not how React handles it."}],"concept":"Component Tree","difficulty":"easy"},{"type":"weather","trigger":"after_stop","triggerStop":2,"title":"Missing Key Prop Storm!","text":"A storm of console warnings fills your browser. You're rendering a list with .map() and every item shows 'Warning: Each child in a list should have a unique key prop.' When you reorder the list, items glitch \u2014 input values jump to wrong items.","choices":[{"text":"Add a unique, stable key prop from your data (like an ID) \u2014 React uses keys to track which items changed, moved, or were removed","correct":true,"explanation":"Keys tell React's reconciliation algorithm which list items are the same between renders. Without keys (or with index as key), React can't tell if items moved \u2014 it just re-renders everything in order, causing input state to leak between items. Use a stable ID from your data."},{"text":"Use the array index as the key since each item has a unique position","correct":false,"explanation":"Index keys break when items are reordered, inserted, or deleted. If item at index 2 moves to index 0, React thinks index 0 is the same component and keeps its old state. This causes the exact input-jumping bug described."},{"text":"Suppress the warning by generating random keys with Math.random() on each render","correct":false,"explanation":"Random keys change every render, telling React that every item is brand new. React destroys and recreates every component in the list on each render \u2014 destroying all internal state and triggering unnecessary DOM operations. Keys must be stable across renders."}],"concept":"Component Tree","difficulty":"easy"},{"type":"encounter","trigger":"after_stop","triggerStop":3,"title":"A Hooks Expert Appears","text":"A traveler examines your code and frowns. 'You have a useState call inside an if-statement. That will break eventually.' What are the rules of hooks, and why can't you call hooks conditionally?","choices":[{"text":"Hooks must be called at the top level of the component, in the same order every render \u2014 React tracks hooks by their call order, not by name","correct":true,"explanation":"React stores hook state in an array, indexed by call order. If a hook is inside a condition, the array shifts when the condition changes \u2014 hook 2 gets hook 3's state. That's why hooks must always be called unconditionally, in the same order, at the top level."},{"text":"Conditional hooks create race conditions because React can't guarantee when the state will be initialized","correct":false,"explanation":"There's no race condition \u2014 React is synchronous during rendering. The real issue is the internal array tracking. React uses call position, not variable names, to match hooks to their state. Changing call order corrupts the mapping."},{"text":"Hooks inside conditions cause memory leaks because React can't clean up state that is no longer used","correct":false,"explanation":"React doesn't have a hook cleanup problem. The issue is deterministic: on each render, React walks through hooks in order. If a hook disappears because a condition is false, every subsequent hook reads the wrong state from the array."}],"concept":"Hooks","difficulty":"medium"},{"type":"river","trigger":"after_stop","triggerStop":4,"title":"The Controlled Form River","text":"Your form has five input fields. Each keystroke triggers a setState, which re-renders the entire form. On slow devices, typing feels laggy. A team member suggests making all inputs uncontrolled with useRef. How do you cross this river?","choices":[{"text":"Keep inputs controlled for validation and dynamic behavior, but optimize with React.memo on child components and consider useTransition for non-urgent updates","correct":true,"explanation":"Controlled inputs give you real-time access to form state for validation, conditional rendering, and submit handling. React.memo prevents child components from re-rendering when only the form state changes. useTransition marks non-urgent updates as low priority. You keep control without sacrificing responsiveness."},{"text":"Switch all inputs to uncontrolled with useRef and read values only on submit","correct":false,"explanation":"Uncontrolled inputs lose real-time validation, dynamic field behavior (like showing/hiding fields based on other inputs), and the ability to programmatically reset or modify values. They're simpler but give up React's reactive data flow."},{"text":"Debounce every onChange handler to reduce the number of re-renders","correct":false,"explanation":"Debouncing onChange creates a jarring UX \u2014 the input value doesn't update until you stop typing, making the input feel broken. This works for search fields but not for regular form inputs where users expect immediate character echoing."}],"concept":"State Management","difficulty":"medium"},{"type":"misfortune","trigger":"after_stop","triggerStop":5,"title":"Memory Leak Disaster!","text":"Your component subscribes to a WebSocket in useEffect. When the user navigates away, the subscription keeps running. The callback tries to update state on an unmounted component, causing warnings and memory leaks.","choices":[{"text":"Return a cleanup function from useEffect that unsubscribes \u2014 React calls it when the component unmounts or before the effect re-runs","correct":true,"explanation":"Every useEffect can return a cleanup function. React calls it when the component unmounts AND before re-running the effect with new dependencies. For subscriptions, timers, and event listeners, the cleanup function is essential. No cleanup means resources accumulate with every mount."},{"text":"Check if the component is still mounted before updating state with an isMounted flag","correct":false,"explanation":"The isMounted pattern is an anti-pattern \u2014 it hides the real problem. The subscription is still running and consuming resources even though you're ignoring its updates. The correct fix is to actually clean up the subscription so it stops completely."},{"text":"Use a global state manager like Redux so the subscription doesn't depend on component lifecycle","correct":false,"explanation":"Moving the subscription to Redux doesn't fix the leak \u2014 someone still needs to manage the subscription lifecycle. And now you've added a global dependency for what should be a local concern. useEffect cleanup is the correct mechanism."}],"concept":"Effect Lifecycle","difficulty":"easy"},{"type":"weather","trigger":"after_stop","triggerStop":6,"title":"The Stale Closure Fog","text":"A fog of confusion descends. Your click handler logs the count, but it always logs the value from when the handler was created, not the current count. You increment count to 5, but the handler still logs 0. The closure captured the initial state.","choices":[{"text":"Use a ref to hold the current value (useRef), or use the functional form of setState that receives the previous state","correct":true,"explanation":"Closures capture variables at creation time. The handler created during render N sees count from render N, even if count changes later. useRef.current always points to the latest value. The functional updater setCount(prev => prev + 1) doesn't need the closure's count \u2014 it receives the fresh value."},{"text":"Move the handler outside the component so it doesn't close over React state","correct":false,"explanation":"A handler outside the component can't access state at all. You need the closure, but you need it to see fresh values. Refs and functional updaters solve this without abandoning component scope."},{"text":"Wrap the handler in useCallback with count in the dependency array","correct":false,"explanation":"useCallback creates a new function when count changes, but the old function (captured in event listeners or timeouts) still has the stale closure. useCallback optimizes re-renders but doesn't fix stale closures in asynchronous code."}],"concept":"State Management","difficulty":"hard"},{"type":"misfortune","trigger":"after_stop","triggerStop":3,"title":"Reconciliation Slowdown!","text":"Your app renders a table with 10,000 rows. Every time a single cell changes, the entire table re-renders and the UI freezes for two seconds. React's diffing algorithm is comparing every row even though only one changed.","choices":[{"text":"Wrap row components in React.memo and use virtualization (like react-window) to only render visible rows","correct":true,"explanation":"React.memo skips re-rendering rows whose props haven't changed. Virtualization takes it further \u2014 only the ~30 visible rows exist in the DOM at all. Combined, you go from diffing 10,000 components to rendering ~30 and diffing their props. The 10,000-row problem becomes a 30-row problem."},{"text":"Use shouldComponentUpdate in a class component to manually control rendering","correct":false,"explanation":"shouldComponentUpdate is the class component equivalent of React.memo. It works, but it means converting to class components. React.memo achieves the same optimization for function components. Either way, without virtualization you're still mounting 10,000 DOM elements."},{"text":"Split the table into multiple smaller components so React can diff them independently","correct":false,"explanation":"Splitting the table into sections doesn't reduce the number of elements React needs to diff \u2014 it just reorganizes them. Without memoization, every section still re-renders. Without virtualization, 10,000 rows still exist in the DOM."}],"concept":"Effect Lifecycle","difficulty":"hard"}],"partyMembers":[{"name":"Component Tree","icon":"component","maxHealth":3},{"name":"Hooks","icon":"hook","maxHealth":3},{"name":"State Management","icon":"state","maxHealth":3},{"name":"Effect Lifecycle","icon":"effect","maxHealth":3}],"deathMessages":["Killed by an infinite useEffect loop. The browser tab is still frozen somewhere.","Died of prop drilling \u2014 state never reached the leaf component.","Re-rendered into oblivion. No memoization equipped.","Drowned in the client-side routing river. The server returned four-oh-four.","Lost in the provider tree. Twelve nested contexts and nobody knows which one changed.","Died of stale closure disease. The event handler captured last Tuesday's state.","Consumed by the data waterfall. Three sequential fetches and the user gave up waiting.","Here lies your bundle. It died of zero code splitting. Four megabytes of JavaScript on first load."]};

// =====================================================================
// CANVAS RENDERING (320x200 internal)
// =====================================================================
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const W = 320, H = 200;

// Seeded PRNG for consistent landscape
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xFFFFFFFF;
    return (s >>> 0) / 0xFFFFFFFF;
  };
}

const rng = seededRandom(42);
const cloudPositions = [];
for (let i = 0; i < 5; i++) {
  cloudPositions.push({ x: rng() * 400, y: 10 + rng() * 30, w: 25 + rng() * 30, h: 8 + rng() * 6 });
}
const farMountains = [];
for (let i = 0; i < 6; i++) {
  farMountains.push({ x: i * 70 - 20 + rng() * 30, h: 40 + rng() * 35, w: 50 + rng() * 40 });
}
const nearMountains = [];
for (let i = 0; i < 8; i++) {
  nearMountains.push({ x: i * 55 - 30 + rng() * 20, h: 25 + rng() * 25, w: 30 + rng() * 25, snow: rng() > 0.3 });
}
const treesData = [];
for (let i = 0; i < 25; i++) {
  treesData.push({ x: rng() * 600, h: 12 + rng() * 16 });
}

function getSkyColors() {
  const progress = currentStop / Math.max(TRAIL_DATA.stops.length, 1);
  if (progress < 0.15) {
    return { top: '#5500AA', bottom: '#FF5555' };
  } else if (progress < 0.7) {
    return { top: '#5555FF', bottom: '#55FFFF' };
  } else {
    return { top: '#5500AA', bottom: '#FFAA00' };
  }
}

function drawPixelCloud(x, y, w, h) {
  ctx.fillStyle = '#FFFFFF';
  const ix = Math.floor(x), iy = Math.floor(y), iw = Math.floor(w), ih = Math.floor(h);
  ctx.fillRect(ix, iy, iw, ih);
  ctx.fillRect(ix + Math.floor(iw * 0.15), iy - Math.floor(ih * 0.5), Math.floor(iw * 0.3), Math.floor(ih * 0.6));
  ctx.fillRect(ix + Math.floor(iw * 0.4), iy - Math.floor(ih * 0.7), Math.floor(iw * 0.35), Math.floor(ih * 0.8));
  ctx.fillRect(ix + Math.floor(iw * 0.65), iy - Math.floor(ih * 0.3), Math.floor(iw * 0.2), Math.floor(ih * 0.4));
}

function drawMountain(x, h, w, color, snowCap) {
  const baseY = 110;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(Math.floor(x), baseY);
  ctx.lineTo(Math.floor(x + w / 2), Math.floor(baseY - h));
  ctx.lineTo(Math.floor(x + w), baseY);
  ctx.closePath();
  ctx.fill();
  if (snowCap) {
    ctx.fillStyle = '#FFFFFF';
    const peakX = x + w / 2;
    const peakY = baseY - h;
    ctx.beginPath();
    ctx.moveTo(Math.floor(peakX - w * 0.1), Math.floor(peakY + h * 0.18));
    ctx.lineTo(Math.floor(peakX), Math.floor(peakY));
    ctx.lineTo(Math.floor(peakX + w * 0.1), Math.floor(peakY + h * 0.18));
    ctx.closePath();
    ctx.fill();
  }
}

function drawTree(x, baseY, h) {
  const trunkW = 3, trunkH = Math.floor(h * 0.3);
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(x - 1), Math.floor(baseY - trunkH), trunkW, trunkH);
  for (let i = 0; i < 3; i++) {
    const layerW = (h * 0.4) * (1 - i * 0.15);
    const layerY = baseY - trunkH - (i * h * 0.2);
    ctx.fillStyle = i === 1 ? '#00AA00' : '#005500';
    ctx.beginPath();
    ctx.moveTo(Math.floor(x - layerW / 2), Math.floor(layerY));
    ctx.lineTo(Math.floor(x + 0.5), Math.floor(layerY - h * 0.25));
    ctx.lineTo(Math.floor(x + layerW / 2), Math.floor(layerY));
    ctx.closePath();
    ctx.fill();
  }
}

function drawWagon(wx, wy) {
  // Oxen (two brown lumps)
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(wx - 24), Math.floor(wy - 6), 8, 6);
  ctx.fillRect(Math.floor(wx - 14), Math.floor(wy - 6), 8, 6);
  // Oxen legs
  ctx.fillStyle = '#553300';
  ctx.fillRect(Math.floor(wx - 22), Math.floor(wy), 2, 4);
  ctx.fillRect(Math.floor(wx - 18), Math.floor(wy), 2, 4);
  ctx.fillRect(Math.floor(wx - 12), Math.floor(wy), 2, 4);
  ctx.fillRect(Math.floor(wx - 8), Math.floor(wy), 2, 4);
  // Oxen heads
  ctx.fillStyle = '#885500';
  ctx.fillRect(Math.floor(wx - 26), Math.floor(wy - 7), 3, 3);
  ctx.fillRect(Math.floor(wx - 16), Math.floor(wy - 7), 3, 3);
  // Yoke
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(wx - 4), Math.floor(wy - 4), 6, 2);
  // Wagon body
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(wx + 2), Math.floor(wy - 8), 24, 10);
  // Wagon sides darker
  ctx.fillStyle = '#885500';
  ctx.fillRect(Math.floor(wx + 2), Math.floor(wy - 8), 24, 1);
  ctx.fillRect(Math.floor(wx + 2), Math.floor(wy + 1), 24, 1);
  // Canvas cover (white curved top)
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.moveTo(Math.floor(wx + 3), Math.floor(wy - 8));
  ctx.quadraticCurveTo(Math.floor(wx + 14), Math.floor(wy - 22), Math.floor(wx + 25), Math.floor(wy - 8));
  ctx.closePath();
  ctx.fill();
  // Canvas cover outline
  ctx.strokeStyle = '#AAAAAA';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(Math.floor(wx + 3), Math.floor(wy - 8));
  ctx.quadraticCurveTo(Math.floor(wx + 14), Math.floor(wy - 22), Math.floor(wx + 25), Math.floor(wy - 8));
  ctx.stroke();
  // Canvas ribs
  ctx.strokeStyle = '#AAAAAA';
  for (let ri = 0; ri < 3; ri++) {
    const rx = wx + 8 + ri * 5;
    ctx.beginPath();
    ctx.moveTo(Math.floor(rx), Math.floor(wy - 8));
    ctx.lineTo(Math.floor(rx), Math.floor(wy - 14 - ri % 2 * 2));
    ctx.stroke();
  }
  // Wheels
  const wheelR = 5;
  for (let wi = 0; wi < 2; wi++) {
    const wcx = wx + 7 + wi * 14;
    const wcy = wy + 4;
    // Outer rim
    ctx.fillStyle = '#553300';
    ctx.beginPath();
    ctx.arc(Math.floor(wcx), Math.floor(wcy), wheelR, 0, Math.PI * 2);
    ctx.fill();
    // Inner
    ctx.fillStyle = '#AA5500';
    ctx.beginPath();
    ctx.arc(Math.floor(wcx), Math.floor(wcy), wheelR - 1.5, 0, Math.PI * 2);
    ctx.fill();
    // Spokes
    ctx.strokeStyle = '#553300';
    ctx.lineWidth = 1;
    for (let si = 0; si < 6; si++) {
      const angle = wagonWheelAngle + (si * Math.PI / 3);
      ctx.beginPath();
      ctx.moveTo(Math.floor(wcx), Math.floor(wcy));
      ctx.lineTo(Math.floor(wcx + Math.cos(angle) * (wheelR - 1)), Math.floor(wcy + Math.sin(angle) * (wheelR - 1)));
      ctx.stroke();
    }
    // Hub
    ctx.fillStyle = '#553300';
    ctx.fillRect(Math.floor(wcx - 1), Math.floor(wcy - 1), 2, 2);
  }
  // Cyan flag (React themed)
  ctx.fillStyle = '#61DAFB';
  ctx.fillRect(Math.floor(wx + 14), Math.floor(wy - 22), 1, -7);
  ctx.fillStyle = '#55FFFF';
  ctx.fillRect(Math.floor(wx + 15), Math.floor(wy - 29), 6, 4);
}

function drawLandmark(type, x, baseY) {
  switch (type) {
    case 'town':
      ctx.fillStyle = '#AA5500';
      ctx.fillRect(Math.floor(x), Math.floor(baseY - 18), 14, 18);
      ctx.fillRect(Math.floor(x + 18), Math.floor(baseY - 14), 12, 14);
      // Roofs
      ctx.fillStyle = '#555555';
      ctx.beginPath();
      ctx.moveTo(Math.floor(x - 2), Math.floor(baseY - 18));
      ctx.lineTo(Math.floor(x + 7), Math.floor(baseY - 25));
      ctx.lineTo(Math.floor(x + 16), Math.floor(baseY - 18));
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(Math.floor(x + 16), Math.floor(baseY - 14));
      ctx.lineTo(Math.floor(x + 24), Math.floor(baseY - 20));
      ctx.lineTo(Math.floor(x + 32), Math.floor(baseY - 14));
      ctx.closePath();
      ctx.fill();
      // Windows
      ctx.fillStyle = '#FFFF55';
      ctx.fillRect(Math.floor(x + 3), Math.floor(baseY - 13), 3, 3);
      ctx.fillRect(Math.floor(x + 9), Math.floor(baseY - 13), 3, 3);
      ctx.fillRect(Math.floor(x + 21), Math.floor(baseY - 10), 3, 3);
      // Door
      ctx.fillStyle = '#553300';
      ctx.fillRect(Math.floor(x + 5), Math.floor(baseY - 7), 4, 7);
      break;
    case 'camp':
      // Tent
      ctx.fillStyle = '#AAAAAA';
      ctx.beginPath();
      ctx.moveTo(Math.floor(x - 6), Math.floor(baseY));
      ctx.lineTo(Math.floor(x + 4), Math.floor(baseY - 14));
      ctx.lineTo(Math.floor(x + 14), Math.floor(baseY));
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#555555';
      ctx.beginPath();
      ctx.moveTo(Math.floor(x + 4), Math.floor(baseY));
      ctx.lineTo(Math.floor(x + 4), Math.floor(baseY - 14));
      ctx.lineTo(Math.floor(x + 14), Math.floor(baseY));
      ctx.closePath();
      ctx.fill();
      // Campfire
      ctx.fillStyle = '#FF5555';
      ctx.fillRect(Math.floor(x + 20), Math.floor(baseY - 5), 4, 3);
      ctx.fillStyle = '#FFFF55';
      ctx.fillRect(Math.floor(x + 21), Math.floor(baseY - 8), 2, 3);
      ctx.fillStyle = '#FFAA00';
      ctx.fillRect(Math.floor(x + 18), Math.floor(baseY - 2), 8, 2);
      break;
    case 'mountain':
      drawMountain(x - 20, 60, 50, '#61DAFB', true);
      drawMountain(x + 10, 45, 40, '#55FFFF', true);
      break;
    case 'river':
      ctx.fillStyle = '#AA5500';
      ctx.fillRect(Math.floor(x), Math.floor(baseY - 20), 3, 20);
      ctx.fillRect(Math.floor(x + 24), Math.floor(baseY - 20), 3, 20);
      ctx.strokeStyle = '#AAAAAA';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(Math.floor(x + 1), Math.floor(baseY - 18));
      ctx.lineTo(Math.floor(x + 25), Math.floor(baseY - 18));
      ctx.stroke();
      // Sign
      ctx.fillStyle = '#AA5500';
      ctx.fillRect(Math.floor(x + 8), Math.floor(baseY - 25), 12, 8);
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(Math.floor(x + 10), Math.floor(baseY - 23), 2, 1);
      ctx.fillRect(Math.floor(x + 13), Math.floor(baseY - 23), 2, 1);
      ctx.fillRect(Math.floor(x + 16), Math.floor(baseY - 23), 2, 1);
      break;
    case 'forest':
      for (let i = 0; i < 6; i++) {
        drawTree(x + i * 7, baseY, 14 + (i % 3) * 3);
      }
      break;
    case 'desert':
      // Canyon/gorge with cacti for State Update Gorge
      ctx.fillStyle = '#AA8800';
      ctx.fillRect(0, baseY - 2, W, 4);
      for (let i = 0; i < 3; i++) {
        var cx = x + i * 16;
        ctx.fillStyle = '#00AA00';
        ctx.fillRect(Math.floor(cx + 2), Math.floor(baseY - 16), 3, 16);
        ctx.fillRect(Math.floor(cx), Math.floor(baseY - 12), 2, 6);
        ctx.fillRect(Math.floor(cx + 5), Math.floor(baseY - 10), 2, 5);
      }
      ctx.fillStyle = '#885500';
      ctx.fillRect(Math.floor(x + 35), Math.floor(baseY - 4), 8, 4);
      ctx.fillRect(Math.floor(x + 38), Math.floor(baseY - 7), 5, 3);
      break;
  }
}

function drawRiver(time) {
  const riverY = 155;
  const riverH = 18;
  ctx.fillStyle = '#0000AA';
  ctx.fillRect(0, riverY, W, riverH);
  ctx.fillStyle = '#00AAAA';
  for (let wx = 0; wx < W; wx += 3) {
    const waveY = riverY + 3 + Math.sin((wx + time * 0.05) * 0.08) * 3;
    ctx.fillRect(wx, Math.floor(waveY), 2, 1);
    const waveY2 = riverY + 10 + Math.sin((wx + time * 0.03 + 50) * 0.1) * 2;
    ctx.fillRect(wx, Math.floor(waveY2), 2, 1);
  }
  // White foam
  ctx.fillStyle = '#55FFFF';
  for (let wx = 0; wx < W; wx += 12) {
    const foamY = riverY + 1 + Math.sin((wx + time * 0.04) * 0.06) * 1;
    ctx.fillRect(wx + 2, Math.floor(foamY), 3, 1);
  }
}
