<script>
window.TRAIL_DATA = {"framework": "ruview", "trailName": "The WiFi Sensing Trail",
  "repoUrl": "https://github.com/ruvnet/RuView", "sourceInfo": {"repo": "ruvnet/RuView", "commit": "3c02f6c", "tag": "v0.5.1-esp32", "snapshotDate": "2026-03-28"}, "stops": [{"name": "Independence, MO", "subtitle": "CSI Capture", "concept": "CSI Pipeline", "landmarkType": "town", "code": {"file": "firmware/esp32-csi-node/main/csi_collector.c", "content": "// firmware/esp32-csi-node/main/csi_collector.c\n#include \"csi_collector.h\"\n#include \"nvs_config.h\"\n#include \"stream_sender.h\"\n#include \"edge_processing.h\"\n#include \"esp_wifi.h\"\n#include \"esp_timer.h\"\n\nextern nvs_config_t g_nvs_config;\nstatic uint32_t s_sequence = 0;\n\n// ADR-018 binary frame serialization\nsize_t csi_serialize_frame(\n    const wifi_csi_info_t *info,\n    uint8_t *buf, size_t buf_len)\n{\n    uint8_t n_antennas = 1;\n    uint16_t iq_len = (uint16_t)info->len;\n    // 56 subcarriers at 20 MHz bandwidth\n    uint16_t n_subcarriers =\n        iq_len / (2 * n_antennas);\n\n    // Derive frequency from channel\n    uint8_t channel = info->rx_ctrl.channel;\n    uint32_t freq_mhz;\n    if (channel >= 1 && channel <= 13)\n        freq_mhz = 2412 + (channel - 1) * 5;\n    else if (channel >= 36 && channel <= 177)\n        freq_mhz = 5000 + channel * 5;\n\n    // Pack header + I/Q payload\n    uint32_t magic = CSI_MAGIC;\n    memcpy(&buf[0], &magic, 4);\n    buf[4] = g_nvs_config.node_id;\n    buf[5] = n_antennas;\n    memcpy(&buf[6], &n_subcarriers, 2);\n    memcpy(&buf[8], &freq_mhz, 4);\n    memcpy(&buf[CSI_HEADER_SIZE],\n        info->buf, iq_len);\n    return CSI_HEADER_SIZE + iq_len;\n}", "language": "c"}, "narration": "Every journey starts at Independence, Missouri. The ESP32-S3 firmware captures Channel State Information from WiFi signals using ESP-IDF callbacks. Unlike regular WiFi that only sees signal strength, CSI reveals amplitude and phase for each of 56 subcarriers at 20 MHz bandwidth. The C firmware serializes raw I/Q data into ADR-018 binary frames for UDP transmission."}, {"name": "Chimney Rock", "subtitle": "Signal Preprocessing", "concept": "CSI Pipeline", "landmarkType": "camp", "code": {"file": "wifi-densepose-signal/src/csi_processor.rs", "content": "// csi_processor.rs + phase_sanitizer.rs\nuse ndarray::Array2;\nuse num_complex::Complex64;\nuse chrono::{DateTime, Utc};\n\n/// CSI data: amplitude + phase per antenna\npub struct CsiData {\n    pub timestamp: DateTime<Utc>,\n    pub amplitude: Array2<f64>,\n    pub phase: Array2<f64>,\n    pub frequency: f64,\n    pub bandwidth: f64,\n    pub num_subcarriers: usize,\n    pub num_antennas: usize,\n    pub snr: f64,\n}\n\n/// Phase unwrapping methods\npub enum UnwrappingMethod {\n    Standard,  // numpy-style\n    Custom,    // row-by-row\n    Itoh,      // 2D unwrapping\n    QualityGuided,\n}\n\n/// Phase sanitizer config\npub struct PhaseSanitizerConfig {\n    pub unwrapping_method: UnwrappingMethod,\n    pub outlier_threshold: f64,\n    pub smoothing_window: usize,\n    pub enable_outlier_removal: bool,\n}", "language": "rust"}, "narration": "At Chimney Rock, we clean the raw radio signals. The CsiProcessor handles amplitude and phase arrays for all 56 subcarriers. The PhaseSanitizer offers four unwrapping methods including Itoh 2D and quality-guided approaches. Outlier removal and smoothing filters eliminate hardware artifacts so the pipeline sees real environmental changes instead of noise."}, {"name": "Fort Laramie", "subtitle": "Subcarrier Selection", "concept": "CSI Pipeline", "landmarkType": "mountain", "code": {"file": "wifi-densepose-signal/src/subcarrier_selection.rs", "content": "// subcarrier_selection.rs\nuse ndarray::Array2;\n\npub struct SubcarrierSelectionConfig {\n    pub top_k: usize,          // default: 20\n    pub min_sensitivity: f64,  // default: 1.5\n}\n\npub struct SubcarrierSelection {\n    pub selected_indices: Vec<usize>,\n    pub sensitivity_scores: Vec<f64>,\n    pub selected_data: Option<Array2<f64>>,\n}\n\n/// Variance-ratio sensitivity scoring.\n/// Sensitivity = var(motion[k])\n///             / (var(static[k]) + epsilon)\npub fn select_sensitive_subcarriers(\n    motion_data: &Array2<f64>,\n    static_data: &Array2<f64>,\n    config: &SubcarrierSelectionConfig,\n) -> Result<SubcarrierSelection, SelectionError> {\n    let n_sc = motion_data.dim().1;\n    let mut scores = Vec::with_capacity(n_sc);\n    for k in 0..n_sc {\n        let motion_var = column_variance(\n            motion_data, k);\n        let static_var = column_variance(\n            static_data, k);\n        scores.push(\n            motion_var / (static_var + 1e-12));\n    }\n    // Rank descending, take top-K\n    let mut ranked: Vec<(usize, f64)> =\n        scores.iter().copied()\n            .enumerate().collect();\n    ranked.sort_by(|a, b|\n        b.1.partial_cmp(&a.1).unwrap());\n    // Filter by min_sensitivity threshold\n    let selected = ranked.iter()\n        .filter(|(_, s)| *s >= config.min_sensitivity)\n        .take(config.top_k)\n        .map(|(idx, _)| *idx).collect();\n    Ok(SubcarrierSelection {\n        selected_indices: selected,\n        sensitivity_scores: scores,\n        selected_data: None,\n    })\n}", "language": "rust"}, "narration": "Fort Laramie is where we read the room, literally. Each of 56 WiFi subcarriers travels a slightly different path through space. The selection algorithm uses variance-ratio sensitivity scoring: it compares motion variance against static variance for each subcarrier and picks the top-K most responsive ones. This improves signal-to-noise ratio by 6 to 10 dB compared to using all subcarriers."}, {"name": "Independence Rock", "subtitle": "Motion Detection", "concept": "Pose Estimation", "landmarkType": "camp", "code": {"file": "wifi-densepose-signal/src/motion.rs", "content": "// motion.rs\nuse crate::features::{\n    AmplitudeFeatures,\n    CorrelationFeatures,\n    CsiFeatures, PhaseFeatures,\n};\n\npub struct MotionScore {\n    pub total: f64,\n    pub variance_component: f64,\n    pub correlation_component: f64,\n    pub phase_component: f64,\n    pub doppler_component: Option<f64>,\n}\n\nimpl MotionScore {\n    pub fn new(\n        variance: f64,\n        correlation: f64,\n        phase: f64,\n        doppler: Option<f64>,\n    ) -> Self {\n        // Weighted fusion of CSI features\n        let total = if let Some(d) = doppler {\n            0.3 * variance\n            + 0.2 * correlation\n            + 0.2 * phase\n            + 0.3 * d\n        } else {\n            0.4 * variance\n            + 0.3 * correlation\n            + 0.3 * phase\n        };\n        Self {\n            total: total.clamp(0.0, 1.0),\n            variance_component: variance,\n            correlation_component: correlation,\n            phase_component: phase,\n            doppler_component: doppler,\n        }\n    }\n\n    pub fn is_motion_detected(\n        &self, threshold: f64\n    ) -> bool {\n        self.total >= threshold\n    }\n}", "language": "rust"}, "narration": "At Independence Rock, we detect human presence. The motion detector fuses four CSI feature components: amplitude variance at 0.3 weight, phase coherence at 0.3, temporal correlation at 0.2, and Doppler shift at 0.2. When Doppler is unavailable, variance gets 0.4 and the others split evenly. No RSSI, no cameras, no wearables, just multi-dimensional CSI analysis."}, {"name": "South Pass", "subtitle": "Pose Estimation", "concept": "Pose Estimation", "landmarkType": "mountain", "code": {"file": "wifi-densepose-nn/src/densepose.rs", "content": "// densepose.rs\nuse crate::tensor::{Tensor, TensorShape};\nuse ndarray::Array4;\n\npub struct DensePoseConfig {\n    pub input_channels: usize,    // 256\n    pub num_body_parts: usize,    // 24\n    pub num_uv_coordinates: usize, // 2\n    pub hidden_channels: Vec<usize>,\n    pub dropout_rate: f32,\n    pub use_fpn: bool,\n    pub output_stride: usize,     // 4\n}\n\npub struct DensePoseOutput {\n    /// (batch, num_parts+1, height, width)\n    pub segmentation: Tensor,\n    /// (batch, 2, height, width)\n    pub uv_coordinates: Tensor,\n    pub confidence: Option<ConfidenceScores>,\n}\n\npub struct DensePoseHead {\n    config: DensePoseConfig,\n    weights: Option<DensePoseWeights>,\n}\n\n/// Pre-trained weights for inference\n/// Supports ONNX, SafeTensors formats\npub struct DensePoseWeights {\n    pub shared_conv: Vec<ConvLayerWeights>,\n    pub segmentation_head: Vec<ConvLayerWeights>,\n    pub uv_head: Vec<ConvLayerWeights>,\n}\n\npub struct ConvLayerWeights {\n    pub weight: Array4<f32>,\n    pub bias: Option<ndarray::Array1<f32>>,\n    pub bn_gamma: Option<ndarray::Array1<f32>>,\n    pub bn_beta: Option<ndarray::Array1<f32>>,\n}", "language": "rust"}, "narration": "South Pass is where the magic happens. The DensePose head takes feature maps and outputs body part segmentation masks plus UV coordinate predictions for 24 body parts. Inference runs natively in Rust using pre-trained weights in ONNX or SafeTensors format. Different body parts create distinct CSI disturbance signatures that the network maps to dense surface coordinates."}, {"name": "Fort Bridger", "subtitle": "Vital Sign Detection", "concept": "Vital Signs", "landmarkType": "river", "code": {"file": "wifi-densepose-vitals/src/breathing.rs", "content": "// breathing.rs + heartrate.rs\npub struct BreathingExtractor {\n    filtered_history: Vec<f64>,\n    sample_rate: f64,\n    n_subcarriers: usize,\n    freq_low: f64,   // 0.1 Hz\n    freq_high: f64,  // 0.5 Hz\n    filter_state: IirState,\n}\n\nimpl BreathingExtractor {\n    /// ESP32 defaults: 56 subcarriers,\n    /// 100 Hz, 30s window\n    pub fn esp32_default() -> Self {\n        Self::new(56, 100.0, 30.0)\n    }\n    pub fn extract(&mut self,\n        residuals: &[f64],\n        weights: &[f64],\n    ) -> Option<VitalEstimate> {\n        // Weighted subcarrier fusion\n        // IIR bandpass filter (0.1-0.5 Hz)\n        // Zero-crossing rate -> frequency\n        let crossings = count_zero_crossings(\n            &self.filtered_history);\n        let duration_s = self.filtered_history\n            .len() as f64 / self.sample_rate;\n        let freq_hz = crossings as f64\n            / (2.0 * duration_s);\n        let bpm = freq_hz * 60.0;\n        Some(VitalEstimate {\n            value_bpm: bpm,\n            confidence: compute_confidence(\n                &self.filtered_history),\n            status: VitalStatus::Valid,\n        })\n    }\n}\n\n// HeartRateExtractor uses autocorrelation\n// Band: 0.8-2.0 Hz (48-120 BPM)\n// Phase-coherence weighted fusion across\n// subcarriers for cardiac signal", "language": "rust"}, "narration": "Fort Bridger is where WiFi becomes a medical instrument. Breathing detection uses zero-crossing analysis on IIR bandpass filtered signals at 0.1 to 0.5 Hz, with weighted subcarrier fusion. Heart rate extraction uses autocorrelation peak detection on phase-coherence data at 0.8 to 2.0 Hz. Both default to 56 subcarriers at 100 Hz sample rate. Contactless vital signs from radio waves alone."}, {"name": "The Dalles", "subtitle": "Fresnel Zone Breathing Model", "concept": "Edge Intelligence", "landmarkType": "forest", "code": {"file": "wifi-densepose-signal/src/fresnel.rs", "content": "// fresnel.rs — Fresnel Zone Breathing Model\nuse std::f64::consts::PI;\npub const SPEED_OF_LIGHT: f64 = 2.998e8;\n\npub struct FresnelGeometry {\n    pub d_tx_body: f64,  // TX to body (m)\n    pub d_body_rx: f64,  // body to RX (m)\n    pub frequency: f64,  // Hz (e.g. 5.8e9)\n}\n\nimpl FresnelGeometry {\n    pub fn wavelength(&self) -> f64 {\n        SPEED_OF_LIGHT / self.frequency\n    }\n    /// F_n = sqrt(n*lambda*d1*d2/(d1+d2))\n    pub fn fresnel_radius(&self, n: u32) -> f64 {\n        let l = self.wavelength();\n        let d1 = self.d_tx_body;\n        let d2 = self.d_body_rx;\n        (n as f64 * l * d1 * d2 / (d1+d2)).sqrt()\n    }\n    /// Phase change from chest displacement\n    /// DeltaPhi = 2*pi * 2*Dd / lambda\n    pub fn phase_change(\n        &self, displacement_m: f64\n    ) -> f64 {\n        2.0*PI * 2.0*displacement_m\n            / self.wavelength()\n    }\n    /// Amplitude varies as |sin(DPhi/2)|\n    /// when crossing Fresnel zone boundaries\n    pub fn expected_amplitude_variation(\n        &self, displacement_m: f64\n    ) -> f64 {\n        let dp = self.phase_change(\n            displacement_m);\n        (dp / 2.0).sin().abs()\n    }\n}\n\n// FresnelBreathingEstimator validates\n// observed amplitude against model\n// predictions for 4-12mm chest displacement\n// References: FarSense (MobiCom 2019),\n//             Wi-Sleep (UbiComp 2021)", "language": "rust"}, "narration": "At The Dalles, we model how breathing becomes visible in WiFi. The Fresnel zone geometry calculates how chest displacement of 4 to 12 millimeters crosses zone boundaries, producing measurable phase and amplitude changes. At 5 GHz the wavelength is 60 millimeters, so breathing displacement is a significant fraction. The estimator validates observed signals against physics-based predictions from FarSense and Wi-Sleep research."}, {"name": "Oregon City", "subtitle": "Edge Intelligence", "concept": "Edge Intelligence", "landmarkType": "town", "code": {"file": "firmware/esp32-csi-node/main/csi_collector.c", "content": "// csi_collector.c — WiFi CSI callback\nstatic void wifi_csi_callback(\n    void *ctx, wifi_csi_info_t *info)\n{\n    // MAC filter: drop non-matching sources\n    if (g_nvs_config.filter_mac_set) {\n        if (memcmp(info->mac,\n            g_nvs_config.filter_mac, 6) != 0)\n            return;\n    }\n\n    // Rate limit: 50 Hz max send rate\n    int64_t now = esp_timer_get_time();\n    if (now - s_last_send_us\n        < CSI_MIN_SEND_INTERVAL_US) {\n        s_rate_skip++;\n        return;\n    }\n    s_last_send_us = now;\n\n    // Serialize ADR-018 binary frame\n    uint8_t frame_buf[CSI_FRAME_MAX];\n    size_t len = csi_serialize_frame(\n        info, frame_buf, sizeof(frame_buf));\n    if (len > 0) {\n        stream_send(frame_buf, len);\n        s_send_ok++;\n    }\n}\n\n// ADR-029: channel-hop table\n// Channels 1/6/11/36/40/44\n// Timer-driven hopping at configurable\n// dwell intervals for multi-band sensing", "language": "c"}, "narration": "You made it to Oregon City! The ESP-IDF firmware ties the whole pipeline together. The CSI callback filters by MAC address, rate-limits at 50 Hz to avoid exhausting packet buffers, and serializes frames for UDP streaming. Channel hopping across bands 1, 6, 11, 36, 40, and 44 enables multi-band sensing. All capture runs on-device with no cloud required. Your wagon has arrived at the frontier of privacy-preserving edge intelligence."}], "events": [{"type": "weather", "trigger": "after_stop", "triggerStop": 1, "title": "Signal Storm!", "text": "A storm of electromagnetic interference hits your ESP32. Consumer WiFi routers everywhere, but your CSI stream is empty. Why can't standard consumer WiFi provide CSI?", "choices": [{"text": "Consumer WiFi only exposes RSSI, not per-subcarrier amplitude and phase data", "correct": true, "explanation": "Standard WiFi chips report a single RSSI value. CSI requires firmware-level access to the baseband processor to extract per-subcarrier amplitude and phase. The ESP32-S3 exposes this through a special API."}, {"text": "WiFi is too slow to capture detailed signal information", "correct": false, "explanation": "WiFi operates at GHz frequencies with plenty of bandwidth. The issue is access, not speed. Consumer firmware simply hides the raw subcarrier data."}, {"text": "It requires 5G cellular signals instead", "correct": false, "explanation": "WiFi CSI works on standard 2.4 and 5 GHz WiFi. No 5G needed. The ESP32-S3 provides special firmware access to the raw channel state."}], "concept": "CSI Pipeline", "difficulty": "easy"}, {"type": "encounter", "trigger": "after_stop", "triggerStop": 2, "title": "A Signal Engineer Appears!", "text": "A seasoned RF engineer approaches your camp. She asks: Why is phase calibration critical for WiFi sensing? Your raw phase data looks like random noise.", "choices": [{"text": "Raw phase data has hardware-induced offsets that mask real environmental changes", "correct": true, "explanation": "Each ESP32 has slightly different oscillator timing, creating phase offsets unrelated to the environment. Without calibration, these hardware artifacts dominate the signal and hide the subtle changes caused by human presence."}, {"text": "Phase calibration makes the WiFi signals louder and easier to detect", "correct": false, "explanation": "Calibration does not amplify signals. It removes systematic errors so the remaining phase changes reflect actual environmental disturbances rather than hardware quirks."}, {"text": "Phase calibration is required by WiFi standards for all devices", "correct": false, "explanation": "WiFi standards do not require CSI phase calibration. This is a sensing-specific preprocessing step needed because we use phase data far beyond what normal WiFi communication requires."}], "concept": "CSI Pipeline", "difficulty": "easy"}, {"type": "river", "trigger": "after_stop", "triggerStop": 4, "title": "The Presence Detection River!", "text": "A wide river blocks your path. Your motion detector triggers, but you see nothing. How does motion detection actually work with just WiFi signals?", "choices": [{"text": "Human movement changes signal multipath patterns, causing measurable variance in CSI", "correct": true, "explanation": "When a person moves through the Fresnel zones between transmitter and receiver, they alter the constructive and destructive interference patterns. This shows up as increased variance in CSI amplitude across subcarriers."}, {"text": "WiFi measures body heat like a thermal camera", "correct": false, "explanation": "WiFi radio waves do not detect heat. They detect changes in the electromagnetic propagation environment caused by physical movement of objects and people."}, {"text": "WiFi sends out radar pulses to detect motion", "correct": false, "explanation": "WiFi CSI sensing is passive. It analyzes the normal WiFi communication signals, not special radar pulses. The existing data packets are the sensing medium."}], "concept": "Pose Estimation", "difficulty": "medium"}, {"type": "weather", "trigger": "after_stop", "triggerStop": 5, "title": "Pose Estimation Storm!", "text": "Dark clouds gather. Your pose estimation model outputs impossible body positions. How can WiFi estimate body pose without any cameras?", "choices": [{"text": "Different body parts create distinct CSI disturbance patterns mapped to UV coordinates", "correct": true, "explanation": "Arms, legs, torso, and head each scatter WiFi signals differently due to their size, shape, and material properties. A trained neural network learns to map these distinct CSI patterns to DensePose UV body surface coordinates."}, {"text": "WiFi bounces off skin like sonar and creates an echo image", "correct": false, "explanation": "WiFi does not work like sonar. It does not create echo images. Instead, it measures how the overall multipath propagation pattern changes when body parts move through the signal field."}, {"text": "WiFi uses infrared light embedded in the signal", "correct": false, "explanation": "WiFi operates at radio frequencies around 2.4 and 5 GHz, far from infrared. There is no light component. The sensing relies purely on radio wave propagation effects."}], "concept": "Pose Estimation", "difficulty": "medium"}, {"type": "misfortune", "trigger": "after_stop", "triggerStop": 6, "title": "Vital Sign Failure!", "text": "Disaster strikes! Your vital sign detector shows zero breathing rate even though a person is clearly present. What makes breathing detection possible at 0.1 to 0.5 Hz?", "choices": [{"text": "Chest expansion during breathing causes periodic changes in signal path length", "correct": true, "explanation": "When a person breathes, their chest expands by 1 to 2 centimeters. This tiny movement changes the WiFi signal path length periodically at the breathing frequency, creating a detectable oscillation in CSI amplitude and phase."}, {"text": "WiFi measures blood oxygen saturation like a pulse oximeter", "correct": false, "explanation": "WiFi cannot measure blood oxygen. It detects the physical movement of breathing, not chemical properties of blood. The signal path length change from chest expansion is what creates the breathing signature."}, {"text": "WiFi detects body temperature changes during breathing", "correct": false, "explanation": "WiFi radio waves are not sensitive to temperature. The detection relies on the mechanical expansion and contraction of the chest, which physically alters the multipath propagation environment."}], "concept": "Vital Signs", "difficulty": "hard"}, {"type": "encounter", "trigger": "after_stop", "triggerStop": 7, "title": "Through-Wall Pioneer!", "text": "A frontier settler asks: I want to monitor my elderly parent in the next room without cameras. Why can WiFi sense through walls but cameras cannot?", "choices": [{"text": "Radio waves at 2.4 and 5 GHz penetrate common building materials while visible light cannot", "correct": true, "explanation": "WiFi radio waves have wavelengths of 6 to 12 centimeters, much larger than the molecular structure of drywall, wood, and glass. They pass through these materials with manageable attenuation. Visible light wavelengths are far too small and get absorbed or reflected."}, {"text": "WiFi signals are more powerful than camera light", "correct": false, "explanation": "Power is not the issue. A flashlight cannot see through a wall no matter how bright. The key is wavelength. Radio waves interact differently with building materials than visible light does."}, {"text": "Cameras need visible light to work but WiFi creates its own light", "correct": false, "explanation": "WiFi does not create light. It uses radio waves, which are a completely different part of the electromagnetic spectrum. The penetration ability comes from the much longer wavelength of radio compared to visible light."}], "concept": "Edge Intelligence", "difficulty": "easy"}], "partyMembers": [{"name": "CSI Pipeline", "icon": "server", "maxHealth": 3}, {"name": "Pose Estimation", "icon": "router", "maxHealth": 3}, {"name": "Vital Signs", "icon": "data", "maxHealth": 3}, {"name": "Edge Intelligence", "icon": "layout", "maxHealth": 3}], "deathMessages": ["Died of phase unwrapping errors. The CSI data was hopelessly corrupted.", "Lost in the multipath — too many reflections, no clear signal.", "Drowned in noise. The bandpass filter could not save you.", "Killed by a false positive. That was a ceiling fan, not a person.", "Your ESP32 ran out of memory during on-device inference.", "Starved waiting for CSI packets. The WiFi router was unplugged.", "Died of Fresnel zone miscalculation. Sensed through the wrong wall.", "Buried under 56 subcarriers of garbage data."]};

window.drawCustomEventOverlay = function(time) {
  if (!currentEventType && !currentEventTitle) return;

  var t = (time || 0) * 0.001; // seconds

  // --- SIGNAL STORM: dark sky, lightning, radio interference ---
  if (currentEventTitle.indexOf('Signal Storm') !== -1) {
    // Darken sky
    ctx.fillStyle = 'rgba(0,0,50,0.45)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning flash (periodic)
    var flashPhase = Math.sin(t * 1.7) + Math.sin(t * 3.1);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, 0, W, H);
      // Lightning bolt
      ctx.strokeStyle = '#FFFF55';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 80 + Math.sin(t * 2.3) * 60;
      ctx.moveTo(lx, 10);
      ctx.lineTo(lx - 5, 35);
      ctx.lineTo(lx + 8, 35);
      ctx.lineTo(lx - 3, 65);
      ctx.lineTo(lx + 10, 65);
      ctx.lineTo(lx + 2, 95);
      ctx.stroke();
    }
    // Radio wave interference lines
    ctx.strokeStyle = '#55FFFF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 6; i++) {
      ctx.beginPath();
      for (var wx = 0; wx < W; wx += 2) {
        var wy = 30 + i * 14 + Math.sin((wx + t * 60) * 0.05 + i) * 5;
        if (wx === 0) ctx.moveTo(wx, wy);
        else ctx.lineTo(wx, wy);
      }
      ctx.stroke();
    }
    // Rain
    ctx.strokeStyle = '#5555FF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 40; i++) {
      var rx = (i * 8.3 + t * 80) % W;
      var ry = (i * 13.7 + t * 120) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 1), Math.floor(ry + 5));
      ctx.stroke();
    }
    return;
  }

  // --- SIGNAL ENGINEER: person with antenna equipment ---
  if (currentEventTitle.indexOf('Signal Engineer') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8); // torso
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3); // head
    ctx.fillRect(px - 1, py - 4, 2, 5); // left leg
    ctx.fillRect(px + 3, py - 4, 2, 5); // right leg
    // Hard hat
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Antenna equipment
    var ax = 215, ay = 140;
    ctx.fillStyle = '#AAAAAA';
    ctx.fillRect(ax, ay - 20, 2, 20); // pole
    ctx.fillStyle = '#55FFFF';
    // Radio waves emanating from antenna
    for (var i = 0; i < 3; i++) {
      var waveR = 6 + i * 5 + Math.sin(t * 3) * 2;
      ctx.strokeStyle = 'rgba(85,255,255,' + (0.4 - i * 0.1).toFixed(2) + ')';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(ax + 1, ay - 20, waveR, -Math.PI * 0.7, Math.PI * 0.7);
      ctx.stroke();
    }
    return;
  }

  // --- PRESENCE DETECTION RIVER: signal waves crossing water ---
  if (currentEventTitle.indexOf('Presence Detection') !== -1) {
    // Extra turbulence on the river
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 20; i++) {
      var sx = (i * 17 + t * 40) % W;
      var sy = 157 + Math.sin((i * 3 + t * 5)) * 3;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 4, 2);
    }
    // WiFi signal ripples in water
    ctx.strokeStyle = 'rgba(85,255,255,0.3)';
    ctx.lineWidth = 1;
    for (var i = 0; i < 4; i++) {
      var rippleR = 8 + i * 6 + Math.sin(t * 2) * 3;
      ctx.beginPath();
      ctx.arc(160, 162, rippleR, 0, Math.PI);
      ctx.stroke();
    }
    return;
  }

  // --- POSE ESTIMATION STORM: purple tint, body outline ---
  if (currentEventTitle.indexOf('Pose Estimation Storm') !== -1) {
    // Purple atmosphere
    ctx.fillStyle = 'rgba(85,0,170,0.2)';
    ctx.fillRect(0, 0, W, H);
    // Wireframe body outline (stick figure with UV mapping feel)
    var bx = 160, by = 100;
    ctx.strokeStyle = '#FF55FF';
    ctx.lineWidth = 2;
    // Head
    ctx.beginPath();
    ctx.arc(bx, by - 25, 6, 0, Math.PI * 2);
    ctx.stroke();
    // Torso
    ctx.beginPath(); ctx.moveTo(bx, by - 19); ctx.lineTo(bx, by); ctx.stroke();
    // Arms (animated)
    var armAngle = Math.sin(t * 2) * 0.4;
    ctx.beginPath(); ctx.moveTo(bx, by - 15); ctx.lineTo(bx - 12, by - 8 + Math.sin(t * 2.5) * 4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx, by - 15); ctx.lineTo(bx + 12, by - 8 - Math.sin(t * 2.5) * 4); ctx.stroke();
    // Legs
    ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx - 8, by + 14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx + 8, by + 14); ctx.stroke();
    // UV coordinate dots
    ctx.fillStyle = '#FFFF55';
    var joints = [[bx, by-25],[bx, by-15],[bx-12, by-8],[bx+12, by-8],[bx, by],[bx-8, by+14],[bx+8, by+14]];
    for (var i = 0; i < joints.length; i++) {
      ctx.fillRect(joints[i][0]-1, joints[i][1]-1 + Math.sin(t*3+i)*1, 3, 3);
    }
    ctx.lineWidth = 1;
    return;
  }

  // --- VITAL SIGN FAILURE: red danger, flatline ---
  if (currentEventTitle.indexOf('Vital Sign') !== -1) {
    // Red danger tint
    ctx.fillStyle = 'rgba(170,0,0,0.25)';
    ctx.fillRect(0, 0, W, H);
    // EKG/breathing line across screen
    ctx.strokeStyle = '#FF5555';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (var wx = 0; wx < W; wx += 2) {
      var baseY = 80;
      var signal;
      var phase = (wx + t * 100) % 120;
      if (phase < 10) {
        signal = Math.sin(phase * 0.6) * 20;
      } else if (phase < 20) {
        signal = -Math.sin((phase - 10) * 0.3) * 10;
      } else {
        signal = Math.random() * 2 - 1; // flatline noise
      }
      if (wx === 0) ctx.moveTo(wx, baseY + signal);
      else ctx.lineTo(wx, baseY + signal);
    }
    ctx.stroke();
    // Pulsing red border
    var pulse = (Math.sin(t * 4) + 1) * 0.15;
    ctx.strokeStyle = 'rgba(255,0,0,' + pulse.toFixed(2) + ')';
    ctx.lineWidth = 3;
    ctx.strokeRect(1, 1, W - 2, H - 2);
    ctx.lineWidth = 1;
    return;
  }

  // --- THROUGH-WALL PIONEER: person visible through wall outline ---
  if (currentEventTitle.indexOf('Through-Wall') !== -1) {
    // Wall
    ctx.fillStyle = 'rgba(85,85,85,0.4)';
    ctx.fillRect(140, 70, 8, 80);
    // Brick lines
    ctx.strokeStyle = 'rgba(170,170,170,0.3)';
    ctx.lineWidth = 1;
    for (var by = 70; by < 150; by += 8) {
      ctx.beginPath(); ctx.moveTo(140, by); ctx.lineTo(148, by); ctx.stroke();
    }
    // Person silhouette behind wall (ghostly)
    var px = 170, py = 115;
    ctx.fillStyle = 'rgba(85,255,255,0.25)';
    ctx.beginPath(); ctx.arc(px, py - 15, 5, 0, Math.PI * 2); ctx.fill(); // head
    ctx.fillRect(px - 3, py - 10, 6, 12); // torso
    ctx.fillRect(px - 5, py + 2, 4, 10); // left leg
    ctx.fillRect(px + 1, py + 2, 4, 10); // right leg
    // WiFi waves penetrating wall
    ctx.strokeStyle = 'rgba(85,255,255,0.3)';
    for (var i = 0; i < 3; i++) {
      var waveR = 15 + i * 10 + Math.sin(t * 2) * 3;
      ctx.beginPath();
      ctx.arc(120, 110, waveR, -0.5, 0.5);
      ctx.stroke();
    }
    return;
  }
};
</script>
