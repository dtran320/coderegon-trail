<script>
window.TRAIL_DATA = {"framework": "ruview", "trailName": "The WiFi Sensing Trail", "sourceInfo": {"repo": "ruvnet/RuView", "commit": "3c02f6c", "tag": "v0.5.1-esp32", "snapshotDate": "2026-03-28"}, "stops": [{"name": "Independence, MO", "subtitle": "CSI Capture", "concept": "CSI Pipeline", "landmarkType": "town", "code": {"file": "firmware/esp32-csi-node/main/csi_collector.c", "content": "// firmware/esp32-csi-node/main/csi_collector.c\n#include \"csi_collector.h\"\n#include \"nvs_config.h\"\n#include \"stream_sender.h\"\n#include \"edge_processing.h\"\n#include \"esp_wifi.h\"\n#include \"esp_timer.h\"\n\nextern nvs_config_t g_nvs_config;\nstatic uint32_t s_sequence = 0;\n\n// ADR-018 binary frame serialization\nsize_t csi_serialize_frame(\n    const wifi_csi_info_t *info,\n    uint8_t *buf, size_t buf_len)\n{\n    uint8_t n_antennas = 1;\n    uint16_t iq_len = (uint16_t)info->len;\n    // 56 subcarriers at 20 MHz bandwidth\n    uint16_t n_subcarriers =\n        iq_len / (2 * n_antennas);\n\n    // Derive frequency from channel\n    uint8_t channel = info->rx_ctrl.channel;\n    uint32_t freq_mhz;\n    if (channel >= 1 && channel <= 13)\n        freq_mhz = 2412 + (channel - 1) * 5;\n    else if (channel >= 36 && channel <= 177)\n        freq_mhz = 5000 + channel * 5;\n\n    // Pack header + I/Q payload\n    uint32_t magic = CSI_MAGIC;\n    memcpy(&buf[0], &magic, 4);\n    buf[4] = g_nvs_config.node_id;\n    buf[5] = n_antennas;\n    memcpy(&buf[6], &n_subcarriers, 2);\n    memcpy(&buf[8], &freq_mhz, 4);\n    memcpy(&buf[CSI_HEADER_SIZE],\n        info->buf, iq_len);\n    return CSI_HEADER_SIZE + iq_len;\n}", "language": "c"}, "narration": "Every journey starts at Independence, Missouri. The ESP32-S3 firmware captures Channel State Information from WiFi signals using ESP-IDF callbacks. Unlike regular WiFi that only sees signal strength, CSI reveals amplitude and phase for each of 56 subcarriers at 20 MHz bandwidth. The C firmware serializes raw I/Q data into ADR-018 binary frames for UDP transmission."}, {"name": "Chimney Rock", "subtitle": "Signal Preprocessing", "concept": "CSI Pipeline", "landmarkType": "camp", "code": {"file": "wifi-densepose-signal/src/csi_processor.rs", "content": "// csi_processor.rs + phase_sanitizer.rs\nuse ndarray::Array2;\nuse num_complex::Complex64;\nuse chrono::{DateTime, Utc};

window.TRAIL_FLAVORS = [
  "The CSI stream flows steady from the ESP32...",

];

window.drawCustomEventOverlay = function(time) {
  if (!currentEventType && !currentEventTitle) return;

  var t = (time || 0) * 0.001; // seconds

  // --- SIGNAL STORM: dark sky, lightning, radio interference ---
  if (currentEventTitle.indexOf('Signal Storm') !== -1) {
    // Darken sky
    ctx.fillStyle = 'rgba(0,0,50,0.45)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning flash (periodic)
    var flashPhase = Math.sin(t * 1.7) + Math.sin(t * 3.1);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, 0, W, H);
      // Lightning bolt
      ctx.strokeStyle = '#FFFF55';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 80 + Math.sin(t * 2.3) * 60;
      ctx.moveTo(lx, 10);
      ctx.lineTo(lx - 5, 35);
      ctx.lineTo(lx + 8, 35);
      ctx.lineTo(lx - 3, 65);
      ctx.lineTo(lx + 10, 65);
      ctx.lineTo(lx + 2, 95);
      ctx.stroke();
    }
    // Radio wave interference lines
    ctx.strokeStyle = '#55FFFF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 6; i++) {
      ctx.beginPath();
      for (var wx = 0; wx < W; wx += 2) {
        var wy = 30 + i * 14 + Math.sin((wx + t * 60) * 0.05 + i) * 5;
        if (wx === 0) ctx.moveTo(wx, wy);
        else ctx.lineTo(wx, wy);
      }
      ctx.stroke();
    }
    // Rain
    ctx.strokeStyle = '#5555FF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 40; i++) {
      var rx = (i * 8.3 + t * 80) % W;
      var ry = (i * 13.7 + t * 120) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 1), Math.floor(ry + 5));
      ctx.stroke();
    }
    return;
  }

  // --- SIGNAL ENGINEER: person with antenna equipment ---
  if (currentEventTitle.indexOf('Signal Engineer') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8); // torso
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3); // head
    ctx.fillRect(px - 1, py - 4, 2, 5); // left leg
    ctx.fillRect(px + 3, py - 4, 2, 5); // right leg
    // Hard hat
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Antenna equipment
    var ax = 215, ay = 140;
    ctx.fillStyle = '#AAAAAA';
    ctx.fillRect(ax, ay - 20, 2, 20); // pole
    ctx.fillStyle = '#55FFFF';
    // Radio waves emanating from antenna
    for (var i = 0; i < 3; i++) {
      var waveR = 6 + i * 5 + Math.sin(t * 3) * 2;
      ctx.strokeStyle = 'rgba(85,255,255,' + (0.4 - i * 0.1).toFixed(2) + ')';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(ax + 1, ay - 20, waveR, -Math.PI * 0.7, Math.PI * 0.7);
      ctx.stroke();
    }
    return;
  }

  // --- PRESENCE DETECTION RIVER: signal waves crossing water ---
  if (currentEventTitle.indexOf('Presence Detection') !== -1) {
    // Extra turbulence on the river
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 20; i++) {
      var sx = (i * 17 + t * 40) % W;
      var sy = 157 + Math.sin((i * 3 + t * 5)) * 3;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 4, 2);
    }
    // WiFi signal ripples in water
    ctx.strokeStyle = 'rgba(85,255,255,0.3)';
    ctx.lineWidth = 1;
    for (var i = 0; i < 4; i++) {
      var rippleR = 8 + i * 6 + Math.sin(t * 2) * 3;
      ctx.beginPath();
      ctx.arc(160, 162, rippleR, 0, Math.PI);
      ctx.stroke();
    }
    return;
  }

  // --- POSE ESTIMATION STORM: purple tint, body outline ---
  if (currentEventTitle.indexOf('Pose Estimation Storm') !== -1) {
    // Purple atmosphere
    ctx.fillStyle = 'rgba(85,0,170,0.2)';
    ctx.fillRect(0, 0, W, H);
    // Wireframe body outline (stick figure with UV mapping feel)
    var bx = 160, by = 100;
    ctx.strokeStyle = '#FF55FF';
    ctx.lineWidth = 2;
    // Head
    ctx.beginPath();
    ctx.arc(bx, by - 25, 6, 0, Math.PI * 2);
    ctx.stroke();
    // Torso
    ctx.beginPath(); ctx.moveTo(bx, by - 19); ctx.lineTo(bx, by); ctx.stroke();
    // Arms (animated)
    var armAngle = Math.sin(t * 2) * 0.4;
    ctx.beginPath(); ctx.moveTo(bx, by - 15); ctx.lineTo(bx - 12, by - 8 + Math.sin(t * 2.5) * 4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx, by - 15); ctx.lineTo(bx + 12, by - 8 - Math.sin(t * 2.5) * 4); ctx.stroke();
    // Legs
    ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx - 8, by + 14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx + 8, by + 14); ctx.stroke();
    // UV coordinate dots
    ctx.fillStyle = '#FFFF55';
    var joints = [[bx, by-25],[bx, by-15],[bx-12, by-8],[bx+12, by-8],[bx, by],[bx-8, by+14],[bx+8, by+14]];
    for (var i = 0; i < joints.length; i++) {
      ctx.fillRect(joints[i][0]-1, joints[i][1]-1 + Math.sin(t*3+i)*1, 3, 3);
    }
    ctx.lineWidth = 1;
    return;
  }

  // --- VITAL SIGN FAILURE: red danger, flatline ---
  if (currentEventTitle.indexOf('Vital Sign') !== -1) {
    // Red danger tint
    ctx.fillStyle = 'rgba(170,0,0,0.25)';
    ctx.fillRect(0, 0, W, H);
    // EKG/breathing line across screen
    ctx.strokeStyle = '#FF5555';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (var wx = 0; wx < W; wx += 2) {
      var baseY = 80;
      var signal;
      var phase = (wx + t * 100) % 120;
      if (phase < 10) {
        signal = Math.sin(phase * 0.6) * 20;
      } else if (phase < 20) {
        signal = -Math.sin((phase - 10) * 0.3) * 10;
      } else {
        signal = Math.random() * 2 - 1; // flatline noise
      }
      if (wx === 0) ctx.moveTo(wx, baseY + signal);
      else ctx.lineTo(wx, baseY + signal);
    }
    ctx.stroke();
    // Pulsing red border
    var pulse = (Math.sin(t * 4) + 1) * 0.15;
    ctx.strokeStyle = 'rgba(255,0,0,' + pulse.toFixed(2) + ')';
    ctx.lineWidth = 3;
    ctx.strokeRect(1, 1, W - 2, H - 2);
    ctx.lineWidth = 1;
    return;
  }

  // --- THROUGH-WALL PIONEER: person visible through wall outline ---
  if (currentEventTitle.indexOf('Through-Wall') !== -1) {
    // Wall
    ctx.fillStyle = 'rgba(85,85,85,0.4)';
    ctx.fillRect(140, 70, 8, 80);
    // Brick lines
    ctx.strokeStyle = 'rgba(170,170,170,0.3)';
    ctx.lineWidth = 1;
    for (var by = 70; by < 150; by += 8) {
      ctx.beginPath(); ctx.moveTo(140, by); ctx.lineTo(148, by); ctx.stroke();
    }
    // Person silhouette behind wall (ghostly)
    var px = 170, py = 115;
    ctx.fillStyle = 'rgba(85,255,255,0.25)';
    ctx.beginPath(); ctx.arc(px, py - 15, 5, 0, Math.PI * 2); ctx.fill(); // head
    ctx.fillRect(px - 3, py - 10, 6, 12); // torso
    ctx.fillRect(px - 5, py + 2, 4, 10); // left leg
    ctx.fillRect(px + 1, py + 2, 4, 10); // right leg
    // WiFi waves penetrating wall
    ctx.strokeStyle = 'rgba(85,255,255,0.3)';
    for (var i = 0; i < 3; i++) {
      var waveR = 15 + i * 10 + Math.sin(t * 2) * 3;
      ctx.beginPath();
      ctx.arc(120, 110, waveR, -0.5, 0.5);
      ctx.stroke();
    }
    return;
  }
};
</script>
