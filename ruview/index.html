<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100vh;
  overflow: hidden;
  background: #000;
  font-family: 'Courier New', monospace;
  color: #AAAAAA;
}
#game-container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}
#canvas-area {
  height: 52vh;
  min-height: 0;
  position: relative;
  background: #000;
}
#game-canvas {
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
  image-rendering: -moz-crisp-edges;
  image-rendering: crisp-edges;
  display: block;
}
#text-panel {
  flex: 1;
  min-height: 0;
  background: #000;
  border-top: 2px solid #555555;
  overflow-y: auto;
  padding: 8px 16px;
  font-size: 14px;
  line-height: 1.4;
  color: #FFFFFF;
}
#text-panel::-webkit-scrollbar { width: 8px; }
#text-panel::-webkit-scrollbar-track { background: #000; }
#text-panel::-webkit-scrollbar-thumb { background: #555555; }
#status-bar {
  height: 60px;
  min-height: 60px;
  background: #000;
  border-top: 2px solid #555555;
  display: flex;
  align-items: center;
  padding: 0 16px;
  font-size: 15px;
  color: #AAAAAA;
  white-space: nowrap;
  overflow: hidden;
}
.blink {
  animation: blink-anim 1s step-end infinite;
}
@keyframes blink-anim {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
  20%, 40%, 60%, 80% { transform: translateX(4px); }
}
.shake { animation: shake 0.5s ease-in-out; }
.code-box {
  background: #000;
  border: 1px solid #555555;
  padding: 6px 8px;
  margin: 6px 0;
  max-height: 130px;
  overflow-y: auto;
  overflow-x: auto;
  font-size: 12px;
  line-height: 1.3;
  white-space: pre;
  color: #55FF55;
}
.code-box::-webkit-scrollbar { width: 6px; height: 6px; }
.code-box::-webkit-scrollbar-track { background: #000; }
.code-box::-webkit-scrollbar-thumb { background: #555555; }
.choice-item { cursor: pointer; padding: 2px 4px; }
.choice-item:hover { color: #FFFF55; }
.choice-selected { color: #FFFF55; background: #333300; }
.stop-opt { color: #55FFFF; cursor: pointer; padding: 2px 4px; }
.stop-opt:hover { color: #FFFF55; }
.choice-correct { color: #55FF55; }
.choice-wrong { color: #FF5555; }
.choice-dimmed { color: #555555; }
.health-green { color: #00AA00; }
.health-yellow { color: #FFFF55; }
.health-red { color: #FF5555; }
.health-dead { color: #555555; text-decoration: line-through; }
.text-cyan { color: #55FFFF; }
.text-yellow { color: #FFFF55; }
.text-green { color: #55FF55; }
.text-red { color: #FF5555; }
.text-magenta { color: #FF55FF; }
.text-gray { color: #555555; }
.text-white { color: #FFFFFF; }
.text-bright { color: #FFFFFF; font-weight: bold; }
#music-indicator {
  position: absolute;
  top: 4px;
  right: 8px;
  font-size: 11px;
  color: #555555;
  z-index: 10;
  pointer-events: none;
}
</style>
</head>

const TRAIL_DATA={"framework": "ruview", "trailName": "The WiFi Sensing Trail", "stops": [{"name": "Independence, MO", "subtitle": "CSI Capture", "concept": "CSI Pipeline", "landmarkType": "town", "code": {"file": "csi-capture/src/main.rs", "content": "// csi-capture/src/main.rs\nuse esp_wifi::csi::{CsiConfig, CsiReceiver};\nuse ruview_core::CsiFrame;\n\nfn main() -> anyhow::Result<()> {\n    let config = CsiConfig {\n        channel: 6,\n        secondary_channel: None,\n        subcarrier_mask: 0xFFFFFFFF_FFFFFFFF,\n        // Capture all 52 OFDM subcarriers\n        htltf_en: true,\n        stbc_htltf2_en: true,\n        ltf_merge_en: true,\n    };\n\n    let mut receiver = CsiReceiver::new(config)?;\n    receiver.set_callback(|raw_csi| {\n        let frame = CsiFrame {\n            timestamp_us: esp_timer::now(),\n            rssi: raw_csi.rssi,\n            // 52 subcarriers x 2 (amplitude + phase)\n            subcarriers: parse_subcarriers(raw_csi.buf),\n            mac_src: raw_csi.mac,\n        };\n        csi_queue.send(frame).ok();\n    });\n\n    receiver.start()?;\n    Ok(())\n}", "language": "rust"}, "narration": "Every journey starts at Independence, Missouri. The ESP32-S3 captures Channel State Information from WiFi signals. Unlike regular WiFi that only sees signal strength, CSI reveals amplitude and phase for each of 52 subcarriers. This raw radio data carries hidden information about everything between transmitter and receiver."}, {"name": "Chimney Rock", "subtitle": "Signal Preprocessing", "concept": "CSI Pipeline", "landmarkType": "camp", "code": {"file": "signal-processing/src/preprocess.rs", "content": "// signal-processing/src/preprocess.rs\nuse ruview_core::{CsiFrame, CleanCsi};\nuse ndarray::Array1;\n\npub fn preprocess(frame: &CsiFrame) -> CleanCsi {\n    // 1. Remove hardware phase offset\n    let phase_raw = frame.phase_array();\n    let phase_cal = unwrap_phase(&phase_raw);\n\n    // 2. Bandpass filter: keep 0.05-50 Hz\n    //    (human motion band)\n    let filtered = bandpass_filter(\n        &frame.amplitude_array(),\n        0.05, 50.0,\n        frame.sample_rate,\n    );\n\n    // 3. Antenna phase correction\n    let corrected = correct_antenna_offset(\n        &phase_cal,\n        &frame.antenna_config,\n    );\n\n    CleanCsi {\n        amplitude: filtered,\n        phase: corrected,\n        timestamp: frame.timestamp_us,\n        subcarrier_count: 52,\n    }\n}", "language": "rust"}, "narration": "At Chimney Rock, we clean the raw radio signals. Phase unwrapping removes hardware-induced jumps. Bandpass filtering isolates the human motion band between 0.05 and 50 Hz. Antenna correction eliminates offsets between multiple receive chains. Without this step, the rest of the pipeline sees noise instead of people."}, {"name": "Fort Laramie", "subtitle": "Subcarrier Analysis", "concept": "CSI Pipeline", "landmarkType": "mountain", "code": {"file": "signal-processing/src/subcarrier.rs", "content": "// signal-processing/src/subcarrier.rs\nuse ndarray::{Array2, Axis};\nuse ruview_core::CleanCsi;\n\npub struct SubcarrierMatrix {\n    // [time_samples x 52_subcarriers]\n    pub amplitude: Array2<f32>,\n    pub phase: Array2<f32>,\n}\n\npub fn decompose(\n    window: &[CleanCsi],\n) -> SubcarrierMatrix {\n    let n = window.len();\n    let mut amp = Array2::zeros((n, 52));\n    let mut pha = Array2::zeros((n, 52));\n\n    for (i, csi) in window.iter().enumerate() {\n        amp.row_mut(i).assign(&csi.amplitude);\n        pha.row_mut(i).assign(&csi.phase);\n    }\n\n    // PCA to extract dominant components\n    let components = pca(&amp, 8);\n    // Each component captures a different\n    // spatial pattern in the room\n\n    SubcarrierMatrix {\n        amplitude: components,\n        phase: pha,\n    }\n}", "language": "rust"}, "narration": "Fort Laramie is where we read the room, literally. Each of 52 WiFi subcarriers travels a slightly different path through space. By arranging them into a time-by-subcarrier matrix and applying PCA, we extract the dominant spatial patterns. Each principal component tells a different story about what is happening in the environment."}, {"name": "Independence Rock", "subtitle": "Motion Detection", "concept": "Pose Estimation", "landmarkType": "camp", "code": {"file": "detection/src/motion.rs", "content": "// detection/src/motion.rs\nuse ruview_core::SubcarrierMatrix;\n\npub struct MotionResult {\n    pub detected: bool,\n    pub confidence: f32,\n    pub motion_energy: f32,\n}\n\npub fn detect_motion(\n    matrix: &SubcarrierMatrix,\n    threshold: f32,\n) -> MotionResult {\n    // RSSI variance over sliding window\n    let rssi_var = matrix.amplitude\n        .mean_axis(Axis(1))\n        .unwrap()\n        .var(0.0);\n\n    // Motion band power (0.5-4 Hz)\n    let motion_power = bandpower(\n        &matrix.amplitude,\n        0.5, 4.0,\n        SAMPLE_RATE,\n    );\n\n    let energy = rssi_var * 0.4\n        + motion_power * 0.6;\n\n    MotionResult {\n        detected: energy > threshold,\n        confidence: (energy / threshold)\n            .min(1.0),\n        motion_energy: energy,\n    }\n}", "language": "rust"}, "narration": "At Independence Rock, we detect human presence. When a person moves, they disturb WiFi multipath patterns, causing measurable variance in signal amplitude. We combine RSSI variance with motion band power between 0.5 and 4 Hz. If the combined energy exceeds our threshold, someone is in the room. No cameras, no wearables, just radio waves."}, {"name": "South Pass", "subtitle": "Pose Estimation", "concept": "Pose Estimation", "landmarkType": "mountain", "code": {"file": "pose/src/densepose.rs", "content": "// pose/src/densepose.rs\nuse ruview_core::{SubcarrierMatrix, DensePose};\nuse tflite::Interpreter;\n\npub struct PoseEstimator {\n    model: Interpreter,\n    uv_map_size: (usize, usize),\n}\n\nimpl PoseEstimator {\n    pub fn estimate(\n        &self,\n        csi: &SubcarrierMatrix,\n    ) -> DensePose {\n        // Reshape CSI to model input:\n        // [1, time_window, 52, 2]\n        // (amplitude + phase channels)\n        let input = csi.to_model_input();\n\n        // Run inference at ~54K FPS\n        self.model.invoke(&input).unwrap();\n\n        // Output: UV body surface map\n        // 24 body parts x (u, v) coordinates\n        let uv_coords = self.model\n            .output::<DensePoseUV>(0);\n        let confidence = self.model\n            .output::<f32>(1);\n\n        DensePose {\n            body_parts: uv_coords,\n            confidence: *confidence,\n            timestamp: csi.timestamp(),\n        }\n    }\n}", "language": "rust"}, "narration": "South Pass is where the magic happens. CSI amplitude and phase patterns are fed into a neural network that outputs DensePose UV body surface maps. Different body parts create distinct disturbance signatures in the WiFi field. The model maps these patterns to 24 body part coordinates at up to 54 thousand frames per second. All from radio waves."}, {"name": "Fort Bridger", "subtitle": "Vital Sign Detection", "concept": "Vital Signs", "landmarkType": "river", "code": {"file": "vitals/src/detect.rs", "content": "// vitals/src/detect.rs\nuse rustfft::{FftPlanner, num_complex::Complex};\n\npub struct VitalSigns {\n    pub breathing_rate: f32,  // breaths/min\n    pub heart_rate: f32,      // beats/min\n    pub confidence: f32,\n}\n\npub fn extract_vitals(\n    csi_stream: &[f32],\n    sample_rate: f32,\n) -> VitalSigns {\n    let mut planner = FftPlanner::new();\n    let fft = planner.plan_fft_forward(\n        csi_stream.len()\n    );\n\n    let mut spectrum: Vec<Complex<f32>> =\n        csi_stream.iter()\n            .map(|&x| Complex::new(x, 0.0))\n            .collect();\n    fft.process(&mut spectrum);\n\n    // Breathing: 0.1 - 0.5 Hz (6-30 bpm)\n    let breath = find_peak(\n        &spectrum, sample_rate,\n        0.1, 0.5,\n    );\n    // Heartbeat: 0.8 - 2.0 Hz (48-120 bpm)\n    let heart = find_peak(\n        &spectrum, sample_rate,\n        0.8, 2.0,\n    );\n\n    VitalSigns {\n        breathing_rate: breath.freq * 60.0,\n        heart_rate: heart.freq * 60.0,\n        confidence: breath.power.min(heart.power),\n    }\n}", "language": "rust"}, "narration": "Fort Bridger is where WiFi becomes a medical instrument. Breathing causes chest expansion that changes signal path length at 0.1 to 0.5 Hz. Heartbeat creates even tinier movements at 0.8 to 2.0 Hz. FFT decomposes the CSI time series into frequency bands, and peak detection finds the dominant rhythm in each. Contactless vital signs from radio waves alone."}, {"name": "The Dalles", "subtitle": "Through-Wall Sensing", "concept": "Edge Intelligence", "landmarkType": "forest", "code": {"file": "sensing/src/fresnel.rs", "content": "// sensing/src/fresnel.rs\nuse ruview_core::Geometry;\n\npub struct FresnelZone {\n    pub radius: f32,     // meters\n    pub depth: f32,      // wall penetration\n    pub sensitivity: f32,\n}\n\npub fn calculate_fresnel(\n    tx_pos: [f32; 3],\n    rx_pos: [f32; 3],\n    freq_ghz: f32,\n    wall_material: WallType,\n) -> FresnelZone {\n    let wavelength = 0.3 / freq_ghz; // meters\n    let distance = euclidean(&tx_pos, &rx_pos);\n\n    // First Fresnel zone radius\n    let radius = (wavelength * distance / 4.0)\n        .sqrt();\n\n    // Wall attenuation model\n    let attenuation = match wall_material {\n        WallType::Drywall => 3.0,  // dB\n        WallType::Concrete => 12.0,\n        WallType::Wood => 5.0,\n        WallType::Glass => 2.0,\n    };\n\n    // Effective sensing depth\n    let max_depth = 5.0\n        - (attenuation / 4.0);\n\n    FresnelZone {\n        radius,\n        depth: max_depth,\n        sensitivity: 1.0\n            / (1.0 + attenuation / 10.0),\n    }\n}", "language": "rust"}, "narration": "At The Dalles, we push through walls. Radio waves at 2.4 and 5 GHz penetrate common building materials that block visible light entirely. Fresnel zone geometry tells us where detection is most sensitive. Multipath modeling accounts for reflections off walls, floors, and ceilings. The result is presence detection up to 5 meters deep through standard drywall."}, {"name": "Oregon City", "subtitle": "Edge Intelligence", "concept": "Edge Intelligence", "landmarkType": "town", "code": {"file": "edge/src/pipeline.rs", "content": "// edge/src/pipeline.rs\nuse ruview_core::*;\nuse esp_hal::timer::PeriodicTimer;\n\npub struct EdgePipeline {\n    csi_rx: CsiReceiver,\n    preprocessor: Preprocessor,\n    motion_det: MotionDetector,\n    pose_est: PoseEstimator,\n    vital_ext: VitalExtractor,\n}\n\nimpl EdgePipeline {\n    pub fn run_on_device(&mut self) {\n        // All processing on ESP32-S3\n        // No cloud, no internet required\n        loop {\n            let frame = self.csi_rx.recv();\n            let clean = self.preprocessor\n                .process(&frame);\n            let matrix = decompose_window(\n                &self.buffer, &clean\n            );\n\n            if self.motion_det\n                .detect(&matrix).detected {\n                let pose = self.pose_est\n                    .estimate(&matrix);\n                let vitals = self.vital_ext\n                    .extract(&matrix);\n\n                // Output locally via MQTT/BLE\n                publish_local(SensorOutput {\n                    pose,\n                    vitals,\n                    timestamp: frame.timestamp_us,\n                });\n            }\n        }\n    }\n}", "language": "rust"}, "narration": "You made it to Oregon City! The entire pipeline runs on the ESP32-S3 microcontroller. CSI capture, preprocessing, motion detection, pose estimation, and vital sign extraction all happen on-device. No cloud uploads, no internet required. Data stays local and private, published only over local MQTT or BLE. Your wagon has arrived at the frontier of privacy-preserving edge intelligence."}], "events": [{"type": "weather", "trigger": "after_stop", "triggerStop": 1, "title": "Signal Storm!", "text": "A storm of electromagnetic interference hits your ESP32. Consumer WiFi routers everywhere, but your CSI stream is empty. Why can't standard consumer WiFi provide CSI?", "choices": [{"text": "Consumer WiFi only exposes RSSI, not per-subcarrier amplitude and phase data", "correct": true, "explanation": "Standard WiFi chips report a single RSSI value. CSI requires firmware-level access to the baseband processor to extract per-subcarrier amplitude and phase. The ESP32-S3 exposes this through a special API."}, {"text": "WiFi is too slow to capture detailed signal information", "correct": false, "explanation": "WiFi operates at GHz frequencies with plenty of bandwidth. The issue is access, not speed. Consumer firmware simply hides the raw subcarrier data."}, {"text": "It requires 5G cellular signals instead", "correct": false, "explanation": "WiFi CSI works on standard 2.4 and 5 GHz WiFi. No 5G needed. The ESP32-S3 provides special firmware access to the raw channel state."}], "concept": "CSI Pipeline", "difficulty": "easy"}, {"type": "encounter", "trigger": "after_stop", "triggerStop": 2, "title": "A Signal Engineer Appears!", "text": "A seasoned RF engineer approaches your camp. She asks: Why is phase calibration critical for WiFi sensing? Your raw phase data looks like random noise.", "choices": [{"text": "Raw phase data has hardware-induced offsets that mask real environmental changes", "correct": true, "explanation": "Each ESP32 has slightly different oscillator timing, creating phase offsets unrelated to the environment. Without calibration, these hardware artifacts dominate the signal and hide the subtle changes caused by human presence."}, {"text": "Phase calibration makes the WiFi signals louder and easier to detect", "correct": false, "explanation": "Calibration does not amplify signals. It removes systematic errors so the remaining phase changes reflect actual environmental disturbances rather than hardware quirks."}, {"text": "Phase calibration is required by WiFi standards for all devices", "correct": false, "explanation": "WiFi standards do not require CSI phase calibration. This is a sensing-specific preprocessing step needed because we use phase data far beyond what normal WiFi communication requires."}], "concept": "CSI Pipeline", "difficulty": "easy"}, {"type": "river", "trigger": "after_stop", "triggerStop": 4, "title": "The Presence Detection River!", "text": "A wide river blocks your path. Your motion detector triggers, but you see nothing. How does motion detection actually work with just WiFi signals?", "choices": [{"text": "Human movement changes signal multipath patterns, causing measurable variance in CSI", "correct": true, "explanation": "When a person moves through the Fresnel zones between transmitter and receiver, they alter the constructive and destructive interference patterns. This shows up as increased variance in CSI amplitude across subcarriers."}, {"text": "WiFi measures body heat like a thermal camera", "correct": false, "explanation": "WiFi radio waves do not detect heat. They detect changes in the electromagnetic propagation environment caused by physical movement of objects and people."}, {"text": "WiFi sends out radar pulses to detect motion", "correct": false, "explanation": "WiFi CSI sensing is passive. It analyzes the normal WiFi communication signals, not special radar pulses. The existing data packets are the sensing medium."}], "concept": "Pose Estimation", "difficulty": "medium"}, {"type": "weather", "trigger": "after_stop", "triggerStop": 5, "title": "Pose Estimation Storm!", "text": "Dark clouds gather. Your pose estimation model outputs impossible body positions. How can WiFi estimate body pose without any cameras?", "choices": [{"text": "Different body parts create distinct CSI disturbance patterns mapped to UV coordinates", "correct": true, "explanation": "Arms, legs, torso, and head each scatter WiFi signals differently due to their size, shape, and material properties. A trained neural network learns to map these distinct CSI patterns to DensePose UV body surface coordinates."}, {"text": "WiFi bounces off skin like sonar and creates an echo image", "correct": false, "explanation": "WiFi does not work like sonar. It does not create echo images. Instead, it measures how the overall multipath propagation pattern changes when body parts move through the signal field."}, {"text": "WiFi uses infrared light embedded in the signal", "correct": false, "explanation": "WiFi operates at radio frequencies around 2.4 and 5 GHz, far from infrared. There is no light component. The sensing relies purely on radio wave propagation effects."}], "concept": "Pose Estimation", "difficulty": "medium"}, {"type": "misfortune", "trigger": "after_stop", "triggerStop": 6, "title": "Vital Sign Failure!", "text": "Disaster strikes! Your vital sign detector shows zero breathing rate even though a person is clearly present. What makes breathing detection possible at 0.1 to 0.5 Hz?", "choices": [{"text": "Chest expansion during breathing causes periodic changes in signal path length", "correct": true, "explanation": "When a person breathes, their chest expands by 1 to 2 centimeters. This tiny movement changes the WiFi signal path length periodically at the breathing frequency, creating a detectable oscillation in CSI amplitude and phase."}, {"text": "WiFi measures blood oxygen saturation like a pulse oximeter", "correct": false, "explanation": "WiFi cannot measure blood oxygen. It detects the physical movement of breathing, not chemical properties of blood. The signal path length change from chest expansion is what creates the breathing signature."}, {"text": "WiFi detects body temperature changes during breathing", "correct": false, "explanation": "WiFi radio waves are not sensitive to temperature. The detection relies on the mechanical expansion and contraction of the chest, which physically alters the multipath propagation environment."}], "concept": "Vital Signs", "difficulty": "hard"}, {"type": "encounter", "trigger": "after_stop", "triggerStop": 7, "title": "Through-Wall Pioneer!", "text": "A frontier settler asks: I want to monitor my elderly parent in the next room without cameras. Why can WiFi sense through walls but cameras cannot?", "choices": [{"text": "Radio waves at 2.4 and 5 GHz penetrate common building materials while visible light cannot", "correct": true, "explanation": "WiFi radio waves have wavelengths of 6 to 12 centimeters, much larger than the molecular structure of drywall, wood, and glass. They pass through these materials with manageable attenuation. Visible light wavelengths are far too small and get absorbed or reflected."}, {"text": "WiFi signals are more powerful than camera light", "correct": false, "explanation": "Power is not the issue. A flashlight cannot see through a wall no matter how bright. The key is wavelength. Radio waves interact differently with building materials than visible light does."}, {"text": "Cameras need visible light to work but WiFi creates its own light", "correct": false, "explanation": "WiFi does not create light. It uses radio waves, which are a completely different part of the electromagnetic spectrum. The penetration ability comes from the much longer wavelength of radio compared to visible light."}], "concept": "Edge Intelligence", "difficulty": "easy"}], "partyMembers": [{"name": "CSI Pipeline", "icon": "server", "maxHealth": 3}, {"name": "Pose Estimation", "icon": "router", "maxHealth": 3}, {"name": "Vital Signs", "icon": "data", "maxHealth": 3}, {"name": "Edge Intelligence", "icon": "layout", "maxHealth": 3}], "deathMessages": ["Died of phase unwrapping errors. The CSI data was hopelessly corrupted.", "Lost in the multipath — too many reflections, no clear signal.", "Drowned in noise. The bandpass filter could not save you.", "Killed by a false positive. That was a ceiling fan, not a person.", "Your ESP32 ran out of memory during on-device inference.", "Starved waiting for CSI packets. The WiFi router was unplugged.", "Died of Fresnel zone miscalculation. Sensed through the wrong wall.", "Buried under 52 subcarriers of garbage data."]};

// Seeded PRNG for consistent landscape
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xFFFFFFFF;
    return (s >>> 0) / 0xFFFFFFFF;
  };
}

  treesData.push({ x: rng() * 600, h: 12 + rng() * 16 });
}

function getSkyColors() {
  const progress = currentStop / Math.max(TRAIL_DATA.stops.length, 1);
  if (progress < 0.15) {
    return { top: '#5500AA', bottom: '#FF5555' };
  } else if (progress < 0.7) {
    return { top: '#5555FF', bottom: '#55FFFF' };
  } else {
    return { top: '#5500AA', bottom: '#FFAA00' };
  }
}

function drawPixelCloud(x, y, w, h) {
  ctx.fillStyle = '#FFFFFF';
  const ix = Math.floor(x), iy = Math.floor(y), iw = Math.floor(w), ih = Math.floor(h);
  ctx.fillRect(ix, iy, iw, ih);
  ctx.fillRect(ix + Math.floor(iw * 0.15), iy - Math.floor(ih * 0.5), Math.floor(iw * 0.3), Math.floor(ih * 0.6));
  ctx.fillRect(ix + Math.floor(iw * 0.4), iy - Math.floor(ih * 0.7), Math.floor(iw * 0.35), Math.floor(ih * 0.8));
  ctx.fillRect(ix + Math.floor(iw * 0.65), iy - Math.floor(ih * 0.3), Math.floor(iw * 0.2), Math.floor(ih * 0.4));
}

function drawMountain(x, h, w, color, snowCap) {
  const baseY = 110;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(Math.floor(x), baseY);
  ctx.lineTo(Math.floor(x + w / 2), Math.floor(baseY - h));
  ctx.lineTo(Math.floor(x + w), baseY);
  ctx.closePath();
  ctx.fill();
  if (snowCap) {
    ctx.fillStyle = '#FFFFFF';
    const peakX = x + w / 2;
    const peakY = baseY - h;
    ctx.beginPath();
    ctx.moveTo(Math.floor(peakX - w * 0.1), Math.floor(peakY + h * 0.18));
    ctx.lineTo(Math.floor(peakX), Math.floor(peakY));
    ctx.lineTo(Math.floor(peakX + w * 0.1), Math.floor(peakY + h * 0.18));
    ctx.closePath();
    ctx.fill();
  }
}

function drawTree(x, baseY, h) {
  const trunkW = 3, trunkH = Math.floor(h * 0.3);
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(x - 1), Math.floor(baseY - trunkH), trunkW, trunkH);
  for (let i = 0; i < 3; i++) {
    const layerW = (h * 0.4) * (1 - i * 0.15);
    const layerY = baseY - trunkH - (i * h * 0.2);
    ctx.fillStyle = i === 1 ? '#00AA00' : '#005500';
    ctx.beginPath();
    ctx.moveTo(Math.floor(x - layerW / 2), Math.floor(layerY));
    ctx.lineTo(Math.floor(x + 0.5), Math.floor(layerY - h * 0.25));
    ctx.lineTo(Math.floor(x + layerW / 2), Math.floor(layerY));
    ctx.closePath();
    ctx.fill();
  }
}

function drawWagon(wx, wy) {
  // Oxen (two brown lumps)
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(wx - 24), Math.floor(wy - 6), 8, 6);
  ctx.fillRect(Math.floor(wx - 14), Math.floor(wy - 6), 8, 6);
  // Oxen legs
  ctx.fillStyle = '#553300';
  ctx.fillRect(Math.floor(wx - 22), Math.floor(wy), 2, 4);
  ctx.fillRect(Math.floor(wx - 18), Math.floor(wy), 2, 4);
  ctx.fillRect(Math.floor(wx - 12), Math.floor(wy), 2, 4);
  ctx.fillRect(Math.floor(wx - 8), Math.floor(wy), 2, 4);
  // Oxen heads
  ctx.fillStyle = '#885500';
  ctx.fillRect(Math.floor(wx - 26), Math.floor(wy - 7), 3, 3);
  ctx.fillRect(Math.floor(wx - 16), Math.floor(wy - 7), 3, 3);
  // Yoke
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(wx - 4), Math.floor(wy - 4), 6, 2);
  // Wagon body
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(wx + 2), Math.floor(wy - 8), 24, 10);
  // Wagon sides darker
  ctx.fillStyle = '#885500';
  ctx.fillRect(Math.floor(wx + 2), Math.floor(wy - 8), 24, 1);
  ctx.fillRect(Math.floor(wx + 2), Math.floor(wy + 1), 24, 1);
  // Canvas cover (white curved top)
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.moveTo(Math.floor(wx + 3), Math.floor(wy - 8));
  ctx.quadraticCurveTo(Math.floor(wx + 14), Math.floor(wy - 22), Math.floor(wx + 25), Math.floor(wy - 8));
  ctx.closePath();
  ctx.fill();
  // Canvas cover outline
  ctx.strokeStyle = '#AAAAAA';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(Math.floor(wx + 3), Math.floor(wy - 8));
  ctx.quadraticCurveTo(Math.floor(wx + 14), Math.floor(wy - 22), Math.floor(wx + 25), Math.floor(wy - 8));
  ctx.stroke();
  // Canvas ribs
  ctx.strokeStyle = '#AAAAAA';
  for (let ri = 0; ri < 3; ri++) {
    const rx = wx + 8 + ri * 5;
    ctx.beginPath();
    ctx.moveTo(Math.floor(rx), Math.floor(wy - 8));
    ctx.lineTo(Math.floor(rx), Math.floor(wy - 14 - ri % 2 * 2));
    ctx.stroke();
  }
  // Wheels
  const wheelR = 5;
  for (let wi = 0; wi < 2; wi++) {
    const wcx = wx + 7 + wi * 14;
    const wcy = wy + 4;
    // Outer rim
    ctx.fillStyle = '#553300';
    ctx.beginPath();
    ctx.arc(Math.floor(wcx), Math.floor(wcy), wheelR, 0, Math.PI * 2);
    ctx.fill();
    // Inner
    ctx.fillStyle = '#AA5500';
    ctx.beginPath();
    ctx.arc(Math.floor(wcx), Math.floor(wcy), wheelR - 1.5, 0, Math.PI * 2);
    ctx.fill();
    // Spokes
    ctx.strokeStyle = '#553300';
    ctx.lineWidth = 1;
    for (let si = 0; si < 6; si++) {
      const angle = wagonWheelAngle + (si * Math.PI / 3);
      ctx.beginPath();
      ctx.moveTo(Math.floor(wcx), Math.floor(wcy));
      ctx.lineTo(Math.floor(wcx + Math.cos(angle) * (wheelR - 1)), Math.floor(wcy + Math.sin(angle) * (wheelR - 1)));
      ctx.stroke();
    }
    // Hub
    ctx.fillStyle = '#553300';
    ctx.fillRect(Math.floor(wcx - 1), Math.floor(wcy - 1), 2, 2);
  }
  // Cyan flag (WiFi theme)
  ctx.fillStyle = '#00AAAA';
  ctx.fillRect(Math.floor(wx + 14), Math.floor(wy - 22), 1, -7);
  ctx.fillStyle = '#55FFFF';
  ctx.fillRect(Math.floor(wx + 15), Math.floor(wy - 29), 6, 4);
}

function drawLandmark(type, x, baseY) {
  switch (type) {
    case 'town':
      ctx.fillStyle = '#AA5500';
      ctx.fillRect(Math.floor(x), Math.floor(baseY - 18), 14, 18);
      ctx.fillRect(Math.floor(x + 18), Math.floor(baseY - 14), 12, 14);
      // Roofs
      ctx.fillStyle = '#555555';
      ctx.beginPath();
      ctx.moveTo(Math.floor(x - 2), Math.floor(baseY - 18));
      ctx.lineTo(Math.floor(x + 7), Math.floor(baseY - 25));
      ctx.lineTo(Math.floor(x + 16), Math.floor(baseY - 18));
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(Math.floor(x + 16), Math.floor(baseY - 14));
      ctx.lineTo(Math.floor(x + 24), Math.floor(baseY - 20));
      ctx.lineTo(Math.floor(x + 32), Math.floor(baseY - 14));
      ctx.closePath();
      ctx.fill();
      // Windows
      ctx.fillStyle = '#FFFF55';
      ctx.fillRect(Math.floor(x + 3), Math.floor(baseY - 13), 3, 3);
      ctx.fillRect(Math.floor(x + 9), Math.floor(baseY - 13), 3, 3);
      ctx.fillRect(Math.floor(x + 21), Math.floor(baseY - 10), 3, 3);
      // Door
      ctx.fillStyle = '#553300';
      ctx.fillRect(Math.floor(x + 5), Math.floor(baseY - 7), 4, 7);
      break;
    case 'camp':
      // Tent
      ctx.fillStyle = '#AAAAAA';
      ctx.beginPath();
      ctx.moveTo(Math.floor(x - 6), Math.floor(baseY));
      ctx.lineTo(Math.floor(x + 4), Math.floor(baseY - 14));
      ctx.lineTo(Math.floor(x + 14), Math.floor(baseY));
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#555555';
      ctx.beginPath();
      ctx.moveTo(Math.floor(x + 4), Math.floor(baseY));
      ctx.lineTo(Math.floor(x + 4), Math.floor(baseY - 14));
      ctx.lineTo(Math.floor(x + 14), Math.floor(baseY));
      ctx.closePath();
      ctx.fill();
      // Campfire
      ctx.fillStyle = '#FF5555';
      ctx.fillRect(Math.floor(x + 20), Math.floor(baseY - 5), 4, 3);
      ctx.fillStyle = '#FFFF55';
      ctx.fillRect(Math.floor(x + 21), Math.floor(baseY - 8), 2, 3);
      ctx.fillStyle = '#FFAA00';
      ctx.fillRect(Math.floor(x + 18), Math.floor(baseY - 2), 8, 2);
      break;
    case 'mountain':
      drawMountain(x - 20, 60, 50, '#AA00AA', true);
      drawMountain(x + 10, 45, 40, '#FF55FF', true);
      break;
    case 'river':
      ctx.fillStyle = '#AA5500';
      ctx.fillRect(Math.floor(x), Math.floor(baseY - 20), 3, 20);
      ctx.fillRect(Math.floor(x + 24), Math.floor(baseY - 20), 3, 20);
      ctx.strokeStyle = '#AAAAAA';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(Math.floor(x + 1), Math.floor(baseY - 18));
      ctx.lineTo(Math.floor(x + 25), Math.floor(baseY - 18));
      ctx.stroke();
      // Sign
      ctx.fillStyle = '#AA5500';
      ctx.fillRect(Math.floor(x + 8), Math.floor(baseY - 25), 12, 8);
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(Math.floor(x + 10), Math.floor(baseY - 23), 2, 1);
      ctx.fillRect(Math.floor(x + 13), Math.floor(baseY - 23), 2, 1);
      ctx.fillRect(Math.floor(x + 16), Math.floor(baseY - 23), 2, 1);
      break;
    case 'forest':
      for (let i = 0; i < 6; i++) {
        drawTree(x + i * 7, baseY, 14 + (i % 3) * 3);
      }
      break;
  }
}

function drawRiver(time) {
  const riverY = 155;
  const riverH = 18;
  ctx.fillStyle = '#0000AA';
  ctx.fillRect(0, riverY, W, riverH);
  ctx.fillStyle = '#00AAAA';
  for (let wx = 0; wx < W; wx += 3) {
    const waveY = riverY + 3 + Math.sin((wx + time * 0.05) * 0.08) * 3;
    ctx.fillRect(wx, Math.floor(waveY), 2, 1);
    const waveY2 = riverY + 10 + Math.sin((wx + time * 0.03 + 50) * 0.1) * 2;
    ctx.fillRect(wx, Math.floor(waveY2), 2, 1);
  }
  // White foam
  ctx.fillStyle = '#55FFFF';
  for (let wx = 0; wx < W; wx += 12) {
    const foamY = riverY + 1 + Math.sin((wx + time * 0.04) * 0.06) * 1;
    ctx.fillRect(wx + 2, Math.floor(foamY), 3, 1);
  }
}

// =====================================================================
// EVENT CANVAS OVERLAYS — unique visuals per quiz event
// =====================================================================
function drawEventOverlay(time) {
  if (!currentEventType && !currentEventTitle) return;

  var t = (time || 0) * 0.001; // seconds

  // --- SIGNAL STORM: dark sky, lightning, radio interference ---
  if (currentEventTitle.indexOf('Signal Storm') !== -1) {
    // Darken sky
    ctx.fillStyle = 'rgba(0,0,50,0.45)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning flash (periodic)
    var flashPhase = Math.sin(t * 1.7) + Math.sin(t * 3.1);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, 0, W, H);
      // Lightning bolt
      ctx.strokeStyle = '#FFFF55';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 80 + Math.sin(t * 2.3) * 60;
      ctx.moveTo(lx, 10);
      ctx.lineTo(lx - 5, 35);
      ctx.lineTo(lx + 8, 35);
      ctx.lineTo(lx - 3, 65);
      ctx.lineTo(lx + 10, 65);
      ctx.lineTo(lx + 2, 95);
      ctx.stroke();
    }
    // Radio wave interference lines
    ctx.strokeStyle = '#55FFFF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 6; i++) {
      ctx.beginPath();
      for (var wx = 0; wx < W; wx += 2) {
        var wy = 30 + i * 14 + Math.sin((wx + t * 60) * 0.05 + i) * 5;
        if (wx === 0) ctx.moveTo(wx, wy);
        else ctx.lineTo(wx, wy);
      }
      ctx.stroke();
    }
    // Rain
    ctx.strokeStyle = '#5555FF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 40; i++) {
      var rx = (i * 8.3 + t * 80) % W;
      var ry = (i * 13.7 + t * 120) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 1), Math.floor(ry + 5));
      ctx.stroke();
    }
    return;
  }

  // --- SIGNAL ENGINEER: person with antenna equipment ---
  if (currentEventTitle.indexOf('Signal Engineer') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8); // torso
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3); // head
    ctx.fillRect(px - 1, py - 4, 2, 5); // left leg
    ctx.fillRect(px + 3, py - 4, 2, 5); // right leg
    // Hard hat
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Antenna equipment
    var ax = 215, ay = 140;
    ctx.fillStyle = '#AAAAAA';
    ctx.fillRect(ax, ay - 20, 2, 20); // pole
    ctx.fillStyle = '#55FFFF';
    // Radio waves emanating from antenna
    for (var i = 0; i < 3; i++) {
      var waveR = 6 + i * 5 + Math.sin(t * 3) * 2;
      ctx.strokeStyle = 'rgba(85,255,255,' + (0.4 - i * 0.1).toFixed(2) + ')';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(ax + 1, ay - 20, waveR, -Math.PI * 0.7, Math.PI * 0.7);
      ctx.stroke();
    }
    return;
  }

  // --- PRESENCE DETECTION RIVER: signal waves crossing water ---
  if (currentEventTitle.indexOf('Presence Detection') !== -1) {
    // Extra turbulence on the river
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 20; i++) {
      var sx = (i * 17 + t * 40) % W;
      var sy = 157 + Math.sin((i * 3 + t * 5)) * 3;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 4, 2);
    }
    // WiFi signal ripples in water
    ctx.strokeStyle = 'rgba(85,255,255,0.3)';
    ctx.lineWidth = 1;
    for (var i = 0; i < 4; i++) {
      var rippleR = 8 + i * 6 + Math.sin(t * 2) * 3;
      ctx.beginPath();
      ctx.arc(160, 162, rippleR, 0, Math.PI);
      ctx.stroke();
    }
    return;
  }

  // --- POSE ESTIMATION STORM: purple tint, body outline ---
  if (currentEventTitle.indexOf('Pose Estimation Storm') !== -1) {
    // Purple atmosphere
    ctx.fillStyle = 'rgba(85,0,170,0.2)';
    ctx.fillRect(0, 0, W, H);
    // Wireframe body outline (stick figure with UV mapping feel)
    var bx = 160, by = 100;
    ctx.strokeStyle = '#FF55FF';
    ctx.lineWidth = 2;
    // Head
    ctx.beginPath();
    ctx.arc(bx, by - 25, 6, 0, Math.PI * 2);
    ctx.stroke();
    // Torso
    ctx.beginPath(); ctx.moveTo(bx, by - 19); ctx.lineTo(bx, by); ctx.stroke();
    // Arms (animated)
    var armAngle = Math.sin(t * 2) * 0.4;
    ctx.beginPath(); ctx.moveTo(bx, by - 15); ctx.lineTo(bx - 12, by - 8 + Math.sin(t * 2.5) * 4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx, by - 15); ctx.lineTo(bx + 12, by - 8 - Math.sin(t * 2.5) * 4); ctx.stroke();
    // Legs
    ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx - 8, by + 14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx + 8, by + 14); ctx.stroke();
    // UV coordinate dots
    ctx.fillStyle = '#FFFF55';
    var joints = [[bx, by-25],[bx, by-15],[bx-12, by-8],[bx+12, by-8],[bx, by],[bx-8, by+14],[bx+8, by+14]];
    for (var i = 0; i < joints.length; i++) {
      ctx.fillRect(joints[i][0]-1, joints[i][1]-1 + Math.sin(t*3+i)*1, 3, 3);
    }
    ctx.lineWidth = 1;
    return;
  }

  // --- VITAL SIGN FAILURE: red danger, flatline ---
  if (currentEventTitle.indexOf('Vital Sign') !== -1) {
    // Red danger tint
    ctx.fillStyle = 'rgba(170,0,0,0.25)';
    ctx.fillRect(0, 0, W, H);
    // EKG/breathing line across screen
    ctx.strokeStyle = '#FF5555';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (var wx = 0; wx < W; wx += 2) {
      var baseY = 80;
      var signal;
      var phase = (wx + t * 100) % 120;
      if (phase < 10) {
        signal = Math.sin(phase * 0.6) * 20;
      } else if (phase < 20) {
        signal = -Math.sin((phase - 10) * 0.3) * 10;
      } else {
        signal = Math.random() * 2 - 1; // flatline noise
      }
      if (wx === 0) ctx.moveTo(wx, baseY + signal);
      else ctx.lineTo(wx, baseY + signal);
    }
    ctx.stroke();
    // Pulsing red border
    var pulse = (Math.sin(t * 4) + 1) * 0.15;
    ctx.strokeStyle = 'rgba(255,0,0,' + pulse.toFixed(2) + ')';
    ctx.lineWidth = 3;
    ctx.strokeRect(1, 1, W - 2, H - 2);
    ctx.lineWidth = 1;
    return;
  }

  // --- THROUGH-WALL PIONEER: person visible through wall outline ---
  if (currentEventTitle.indexOf('Through-Wall') !== -1) {
    // Wall
    ctx.fillStyle = 'rgba(85,85,85,0.4)';
    ctx.fillRect(140, 70, 8, 80);
    // Brick lines
    ctx.strokeStyle = 'rgba(170,170,170,0.3)';
    ctx.lineWidth = 1;
    for (var by = 70; by < 150; by += 8) {
      ctx.beginPath(); ctx.moveTo(140, by); ctx.lineTo(148, by); ctx.stroke();
    }
    // Person silhouette behind wall (ghostly)
    var px = 170, py = 115;
    ctx.fillStyle = 'rgba(85,255,255,0.25)';
    ctx.beginPath(); ctx.arc(px, py - 15, 5, 0, Math.PI * 2); ctx.fill(); // head
    ctx.fillRect(px - 3, py - 10, 6, 12); // torso
    ctx.fillRect(px - 5, py + 2, 4, 10); // left leg
    ctx.fillRect(px + 1, py + 2, 4, 10); // right leg
    // WiFi waves penetrating wall
    ctx.strokeStyle = 'rgba(85,255,255,0.3)';
    for (var i = 0; i < 3; i++) {
      var waveR = 15 + i * 10 + Math.sin(t * 2) * 3;
      ctx.beginPath();
      ctx.arc(120, 110, waveR, -0.5, 0.5);
      ctx.stroke();
    }
    return;
  }
}

// =====================================================================
// DEATH SCREEN — Apple II green phosphor style
// =====================================================================
function drawDeathScene(time) {
  var t = (time || 0) * 0.001;
  var G = '#33FF33'; // Apple II green
  var GD = '#1a8a1a'; // darker green for details

  // Black background
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);

  // Ground line
  ctx.fillStyle = GD;
  ctx.fillRect(0, 148, W, 1);

  // --- OX (left side) ---
  var ox = 100, oy = 128;
  // Body
  ctx.fillStyle = G;
  ctx.fillRect(ox, oy, 24, 14);
  // Head
  ctx.fillRect(ox - 10, oy - 2, 12, 10);
  // Horns
  ctx.fillRect(ox - 12, oy - 6, 3, 5);
  ctx.fillRect(ox - 4, oy - 6, 3, 5);
  // Snout
  ctx.fillStyle = GD;
  ctx.fillRect(ox - 10, oy + 4, 6, 3);
  // Eye
  ctx.fillStyle = '#000';
  ctx.fillRect(ox - 7, oy, 2, 2);
  // Legs
  ctx.fillStyle = G;
  ctx.fillRect(ox + 2, oy + 14, 4, 8);
  ctx.fillRect(ox + 10, oy + 14, 4, 8);
  ctx.fillRect(ox + 16, oy + 14, 4, 8);
  // Tail
  ctx.fillRect(ox + 24, oy + 2, 6, 2);
  ctx.fillRect(ox + 29, oy, 2, 4);

  // --- HITCH ---
  ctx.fillStyle = G;
  ctx.fillRect(ox + 28, oy + 8, 14, 2);

  // --- WAGON ---
  var wx = 142, wy = 108;
  // Wagon bed
  ctx.fillStyle = G;
  ctx.fillRect(wx, wy + 20, 50, 16);
  // Bed slats (dark lines)
  ctx.fillStyle = GD;
  ctx.fillRect(wx, wy + 24, 50, 1);
  ctx.fillRect(wx, wy + 28, 50, 1);
  ctx.fillRect(wx, wy + 32, 50, 1);
  // Side rails
  ctx.fillStyle = G;
  ctx.fillRect(wx, wy + 18, 2, 18);
  ctx.fillRect(wx + 48, wy + 18, 2, 18);

  // Canvas cover (the bonnet)
  ctx.fillStyle = G;
  // Left arch
  ctx.fillRect(wx + 4, wy + 4, 2, 16);
  // Right arch
  ctx.fillRect(wx + 44, wy + 4, 2, 16);
  // Top cover
  ctx.fillRect(wx + 4, wy + 2, 42, 4);
  // Cover fill
  ctx.fillRect(wx + 6, wy + 6, 38, 12);
  // Cover shading
  ctx.fillStyle = GD;
  ctx.fillRect(wx + 8, wy + 8, 34, 2);
  ctx.fillRect(wx + 8, wy + 12, 34, 2);
  ctx.fillRect(wx + 8, wy + 16, 34, 1);

  // Wheels
  var wheelR = 8;
  var wheels = [wx + 8, wx + 42];
  var wa = t * 0.5; // slow rotation
  ctx.strokeStyle = G;
  ctx.lineWidth = 1.5;
  for (var wi = 0; wi < wheels.length; wi++) {
    var cx = wheels[wi], cy = wy + 38;
    // Rim
    ctx.beginPath();
    ctx.arc(cx, cy, wheelR, 0, Math.PI * 2);
    ctx.stroke();
    // Spokes
    for (var sp = 0; sp < 6; sp++) {
      var angle = wa + sp * Math.PI / 3;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(angle) * wheelR, cy + Math.sin(angle) * wheelR);
      ctx.stroke();
    }
    // Hub
    ctx.fillStyle = G;
    ctx.beginPath();
    ctx.arc(cx, cy, 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.lineWidth = 1;

  // Subtle scanline effect
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  for (var sl = 0; sl < H; sl += 3) {
    ctx.fillRect(0, sl, W, 1);
  }

  // Subtle green glow/vignette
  var grd = ctx.createRadialGradient(W/2, H/2, 40, W/2, H/2, W * 0.7);
  grd.addColorStop(0, 'rgba(0,0,0,0)');
  grd.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
}

function renderCanvas(time) {
  // Death screen: green phosphor Apple II style
  if (gameState === STATES.DEATH) {
    drawDeathScene(time);
    return;
  }

  const skyColors = getSkyColors();

  // Sky gradient (banded for EGA feel)
  const bands = 10;
  const skyBottom = 110;
  for (let i = 0; i < bands; i++) {
    const t = i / (bands - 1);
    const r1 = parseInt(skyColors.top.substr(1, 2), 16);
    const g1 = parseInt(skyColors.top.substr(3, 2), 16);
    const b1 = parseInt(skyColors.top.substr(5, 2), 16);
    const r2 = parseInt(skyColors.bottom.substr(1, 2), 16);
    const g2 = parseInt(skyColors.bottom.substr(3, 2), 16);
    const b2 = parseInt(skyColors.bottom.substr(5, 2), 16);
    const r = Math.floor(r1 + (r2 - r1) * t);
    const g = Math.floor(g1 + (g2 - g1) * t);
    const b = Math.floor(b1 + (b2 - b1) * t);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    const bandH = Math.ceil(skyBottom / bands) + 1;
    ctx.fillRect(0, Math.floor(i * (skyBottom / bands)), W, bandH);
  }

  // Clouds (parallax 0.2x)
  const cloudOffset = scrollX * 0.2;
  for (const c of cloudPositions) {
    let cx = ((c.x - cloudOffset) % (W + 80));
    if (cx < -40) cx += W + 80;
    drawPixelCloud(cx - 20, c.y, c.w, c.h);
  }

  // Far mountains (parallax 0.3x) - DARK MAGENTA signature Oregon Trail
  const farOffset = scrollX * 0.3;
  for (const m of farMountains) {
    let mx = ((m.x - farOffset) % (W + 100));
    if (mx < -50) mx += W + 100;
    drawMountain(mx - 25, m.h, m.w, '#AA00AA', false);
  }

  // Near mountains (parallax 0.4x) - LIGHT MAGENTA with snow caps
  const nearOffset = scrollX * 0.4;
  for (const m of nearMountains) {
    let mx = ((m.x - nearOffset) % (W + 80));
    if (mx < -40) mx += W + 80;
    drawMountain(mx - 20, m.h, m.w, '#FF55FF', m.snow);
  }

  // Grass
  ctx.fillStyle = '#00AA00';
  ctx.fillRect(0, 110, W, H - 110);

  // Bright grass highlights
  ctx.fillStyle = '#55FF55';
  const grassOffset = scrollX * 1.0;
  for (let i = 0; i < 50; i++) {
    let gx = ((i * 11 + 5 - grassOffset) % (W + 20));
    if (gx < -5) gx += W + 20;
    const gy = 113 + (i * 7 + i * i * 3) % 55;
    ctx.fillRect(Math.floor(gx), Math.floor(gy), 2, 2);
  }

  // Trees (parallax 0.6x)
  const treeOffset = scrollX * 0.6;
  const treeBaseY = 128;
  for (const t of treesData) {
    let tx = ((t.x - treeOffset) % (W + 60));
    if (tx < -20) tx += W + 60;
    drawTree(tx - 10, treeBaseY, t.h);
  }

  // Landmark for current stop (only at stops/events)
  if (gameState === STATES.STOP || gameState === STATES.EVENT || gameState === STATES.RIVER) {
    const stop = TRAIL_DATA.stops[currentStop];
    if (stop) {
      drawLandmark(stop.landmarkType, 240, 150);
    }
  }

  // Trail/ground strip
  if (!showRiver) {
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(0, 152, W, 15);
    // Trail texture dots
    ctx.fillStyle = '#885500';
    for (let i = 0; i < 35; i++) {
      let dotX = ((i * 10 - scrollX * 1.0) % (W + 10));
      if (dotX < -3) dotX += W + 10;
      ctx.fillRect(Math.floor(dotX), 155 + (i % 4) * 2, 3, 1);
    }
    // Ruts
    ctx.fillStyle = '#775500';
    ctx.fillRect(0, 157, W, 1);
    ctx.fillRect(0, 162, W, 1);
  }

  // River (when active)
  if (showRiver) {
    drawRiver(time || 0);
  }

  // Wagon
  const wagonX = 65;
  const wagonY = showRiver ? 148 : 149;
  drawWagon(wagonX, wagonY);

  // Event-specific visual overlay
  if (gameState === STATES.EVENT || gameState === STATES.RIVER) {
    drawEventOverlay(time);
  }

  // Ground below trail
  ctx.fillStyle = '#885500';
  ctx.fillRect(0, showRiver ? 173 : 167, W, 15);
  ctx.fillStyle = '#553300';
  ctx.fillRect(0, showRiver ? 188 : 182, W, H - 182);
}

// =====================================================================
// MUSIC SYSTEM (Web Audio API Chiptune)
// =====================================================================
const NOTE_FREQ = {
  'C3': 130.81, 'D3': 146.83, 'G2': 98.00, 'A2': 110.00,
  'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'G4': 392.00,
  'A4': 440.00, 'C5': 523.25, 'REST': 0
};

const melody = [
  { note: 'E4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'A4', dur: 1 }, { note: 'G4', dur: 1 },
  { note: 'E4', dur: 1 }, { note: 'D4', dur: 1 }, { note: 'C4', dur: 1 }, { note: 'REST', dur: 1 },
  { note: 'E4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'A4', dur: 1 }, { note: 'C5', dur: 1 },
  { note: 'A4', dur: 2 }, { note: 'G4', dur: 2 },
  { note: 'C4', dur: 1 }, { note: 'D4', dur: 1 }, { note: 'E4', dur: 1 }, { note: 'G4', dur: 1 },
  { note: 'A4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'E4', dur: 1 }, { note: 'D4', dur: 1 },
  { note: 'C4', dur: 1 }, { note: 'E4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'E4', dur: 1 },
  { note: 'D4', dur: 1 }, { note: 'C4', dur: 3 }
];

const bassLine = [
  { note: 'C3', dur: 4 }, { note: 'A2', dur: 4 }, { note: 'C3', dur: 4 }, { note: 'A2', dur: 4 },
  { note: 'C3', dur: 4 }, { note: 'G2', dur: 4 }, { note: 'D3', dur: 4 }, { note: 'C3', dur: 4 }
];

let musicScheduleTimer = null;
let nextMelodyTime = 0;
let nextBassTime = 0;

var masterGain = null;

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 1.0;
    masterGain.connect(audioCtx.destination);
    musicInitialized = true;
  } catch (e) {
    console.warn('Web Audio not available:', e);
  }
}

function playNote(freq, startTime, duration, type, gainVal) {
  if (!audioCtx || freq === 0) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startTime);
  // Envelope: attack then decay
  gain.gain.setValueAtTime(0.001, startTime);
  gain.gain.linearRampToValueAtTime(gainVal, startTime + 0.02);
  gain.gain.setValueAtTime(gainVal, startTime + duration * 0.75);
  gain.gain.linearRampToValueAtTime(0.001, startTime + duration * 0.95);
  osc.connect(gain);
  gain.connect(masterGain || audioCtx.destination);
  osc.start(startTime);
  osc.stop(startTime + duration);
}

function scheduleLoop() {
  if (!musicPlaying || !audioCtx) return;
  const bpm = 110;
  const quarterDur = 60 / bpm;
  const now = audioCtx.currentTime;

  // Schedule melody
  let t = now + 0.05;
  for (const note of melody) {
    const dur = note.dur * quarterDur;
    if (note.note !== 'REST') {
      playNote(NOTE_FREQ[note.note], t, dur, 'square', 0.06);
    }
    t += dur;
  }

  // Schedule bass
  let tb = now + 0.05;
  for (const note of bassLine) {
    const dur = note.dur * quarterDur;
    playNote(NOTE_FREQ[note.note], tb, dur, 'triangle', 0.08);
    tb += dur;
  }

  // Total loop duration in beats: melody has 32 quarter beats = 32 * quarterDur
  const totalBeats = 32;
  const loopDurationMs = totalBeats * quarterDur * 1000;

  musicScheduleTimer = setTimeout(scheduleLoop, loopDurationMs - 200);
}

function startMusic() {
  if (!musicInitialized) initAudio();
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (masterGain) masterGain.gain.setValueAtTime(1.0, audioCtx.currentTime);
  musicPlaying = true;
  scheduleLoop();
  updateMusicIndicator();
}

function stopMusic() {
  musicPlaying = false;
  if (musicScheduleTimer) {
    clearTimeout(musicScheduleTimer);
    musicScheduleTimer = null;
  }
  if (masterGain) masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
  updateMusicIndicator();
}

function toggleMusic() {
  if (!musicInitialized) initAudio();
  if (musicPlaying) {
    stopMusic();
  } else {
    startMusic();
  }
  renderStatusBar();
}

function updateMusicIndicator() {
  const el = document.getElementById('music-indicator');
  if (!el) return;
  el.textContent = musicPlaying ? 'M: Music ON' : 'M: Music OFF';
  el.style.color = musicPlaying ? '#55FF55' : '#555555';
}

// =====================================================================
// SYNTAX HIGHLIGHTING (EGA Colors)
// =====================================================================
const TS_KEYWORDS = new Set([
  'use', 'pub', 'fn', 'let', 'mut', 'const', 'struct', 'impl', 'enum', 'match',
  'return', 'if', 'else', 'for', 'while', 'loop', 'async', 'await', 'move',
  'self', 'Self', 'true', 'false', 'mod', 'crate', 'super', 'where', 'trait',
  'type', 'as', 'in', 'ref', 'static', 'extern', 'unsafe', 'break', 'continue',
  'import', 'export', 'from', 'var', 'function', 'new', 'typeof', 'instanceof',
  'interface', 'class', 'extends', 'implements', 'try', 'catch', 'throw',
  'default', 'switch', 'case', 'null', 'undefined', 'void', 'of'
]);

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function highlightCode(code) {
  return code.split('\n').map(function(line) {
    if (line.trim().startsWith('//')) {
      return '<span style="color:#555555">' + escHtml(line) + '</span>';
    }
    var result = '';
    var i = 0;
    while (i < line.length) {
      // String literal
      if (line[i] === "'" || line[i] === '"' || line[i] === '`') {
        var quote = line[i];
        var end = i + 1;
        while (end < line.length && line[end] !== quote) {
          if (line[end] === '\\') end++;
          end++;
        }
        end = Math.min(end + 1, line.length);
        result += '<span style="color:#FFFF55">' + escHtml(line.substring(i, end)) + '</span>';
        i = end;
        continue;
      }
      // Inline comment
      if (line[i] === '/' && i + 1 < line.length && line[i + 1] === '/') {
        result += '<span style="color:#555555">' + escHtml(line.substring(i)) + '</span>';
        break;
      }
      // Number
      if (/\d/.test(line[i]) && (i === 0 || !/\w/.test(line[i - 1]))) {
        var end2 = i;
        while (end2 < line.length && /[\d._]/.test(line[end2])) end2++;
        result += '<span style="color:#FF55FF">' + escHtml(line.substring(i, end2)) + '</span>';
        i = end2;
        continue;
      }
      // Identifier or keyword
      if (/[a-zA-Z_$]/.test(line[i])) {
        var end3 = i;
        while (end3 < line.length && /[\w$]/.test(line[end3])) end3++;
        var word = line.substring(i, end3);
        if (TS_KEYWORDS.has(word)) {
          result += '<span style="color:#55FFFF">' + escHtml(word) + '</span>';
        } else {
          result += '<span style="color:#55FF55">' + escHtml(word) + '</span>';
        }
        i = end3;
        continue;
      }
      // Punctuation / operators
      result += '<span style="color:#AAAAAA">' + escHtml(line[i]) + '</span>';
      i++;
    }
    return result;
  }).join('\n');
}

  var tip = weakestHp < TRAIL_DATA.partyMembers[0].maxHealth ? '"Study up on ' + weakestName + '!"' : '"Perfect understanding!"';

  setTextPanel(
    '<div style="padding:8px 16px;">' +
    '<div style="color:#FFFF55; text-align:center; font-size:16px;">\u2605 YOU MADE IT TO RESPONSE FRONTIER! \u2605</div>' +
    '<div style="margin-top:10px; color:#AAAAAA;">' +
    '<div>  Framework:    <span style="color:#55FFFF;">RuView (The WiFi Sensing Trail)</span></div>' +
    '<div>  Survivors:    <span style="color:#55FF55;">' + survivors + '/' + partyHealth.length + '</span></div>' +
    '<div>  Quiz Score:   <span style="color:#FFFF55;">' + score + '/' + totalQuestions + ' (' + pctScore + '%)</span></div>' +
    '<div>  Best Streak:  <span style="color:#FF55FF;">' + bestStreak + '</span></div>' +
    '<div>  Hints Used:   <span style="color:#AAAAAA;">' + hintsUsed + '</span></div>' +
    '</div>' +
    '<div style="margin-top:10px; color:#FFFF55;">  Concept Mastery:</div>' +
    '<div>' + masteryHtml + '</div>' +
    '<div style="margin-top:10px; color:#55FF55; text-align:center;">' + tip + '</div>' +
    '<div style="margin-top:14px; text-align:center;" class="blink">Press SPACE BAR to play again</div>' +
    '</div>'
  );
}

// =====================================================================
// STATUS BAR
// =====================================================================
function renderStatusBar() {
  if (gameState === STATES.TITLE) {
    var titleMusic = musicPlaying
      ? 'Music: <span style="color:#55FF55;">On</span> <span style="color:#555555;">(M to toggle off)</span>'
      : 'Music: <span style="color:#FF5555;">Off</span> <span style="color:#555555;">(M to toggle on)</span>';
    statusBar.innerHTML = '<span style="color:#555555;">The Coderegon Trail v1.0</span>  |  ' + titleMusic;
    return;
  }

  var maxH = maxHealthForGame;
  var healthPct = Math.max(0, health / maxH);
  var barLen = 10;
  var filled = Math.round(healthPct * barLen);
  var healthColor = health > maxH * 0.6 ? '#00AA00' : (health > maxH * 0.3 ? '#FFFF55' : '#FF5555');
  var healthBar = '<span style="color:' + healthColor + ';">';
  for (var i = 0; i < filled; i++) healthBar += '\u2588';
  healthBar += '</span><span style="color:#555555;">';
  for (var i2 = 0; i2 < barLen - filled; i2++) healthBar += '\u2591';
  healthBar += '</span>';

  var streakStars = '<span style="color:#FFFF55;">';
  for (var s = 0; s < Math.min(streak, 5); s++) streakStars += '\u2605';
  streakStars += '</span>';

  var musicHint = musicPlaying
    ? 'Music: <span style="color:#55FF55;">On</span> <span style="color:#555555;">(M to toggle off)</span>'
    : 'Music: <span style="color:#FF5555;">Off</span> <span style="color:#555555;">(M to toggle on)</span>';

  statusBar.innerHTML = 'HP: ' + healthBar + ' ' + Math.max(0, health) +
    '  Hints: ' + supplies + '  ' + streakStars +
    '  |  Stop ' + (currentStop + 1) + '/' + TRAIL_DATA.stops.length +
    '  |  ' + musicHint;
}

// =====================================================================
// GAME LOGIC
// =====================================================================
function resetGame() {
  gameState = STATES.TITLE;
  difficulty = 1;
  selectedDifficulty = 1;
  health = 100;
  maxHealthForGame = 100;
  supplies = 5;
  currentStop = 0;
  day = 1;
  score = 0;
  totalQuestions = 0;
  streak = 0;
  bestStreak = 0;
  hintsUsed = 0;
  scrollX = 0;
  showRiver = false;
  wagonWheelAngle = 0;
  travelFlavorIndex = 0;
  deathPending = false;
  partyHealth = TRAIL_DATA.partyMembers.map(function(p) { return p.maxHealth; });
  pendingEvents = [];
  currentEventIndex = 0;
  eventAnswered = false;
  eventHinted = false;
  dimmedChoice = -1;
  selectedEventChoice = 0;
  selectedStopChoice = 0;
  shuffledIndices = [];
  currentEventType = '';
  currentEventTitle = '';
  drainAccumulator = 0;
  techDebtDeath = false;
  if (travelTimer) { clearTimeout(travelTimer); travelTimer = null; }
  if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }
}

function selectDifficulty(idx) {
  selectedDifficulty = Math.max(0, Math.min(PROFESSIONS.length - 1, idx));
  renderSetupScreen();
}

function startGame() {
  difficulty = selectedDifficulty;
  var prof = PROFESSIONS[difficulty];
  health = prof.health;
  maxHealthForGame = prof.health;
  supplies = prof.supplies;
  partyHealth = TRAIL_DATA.partyMembers.map(function(p) { return p.maxHealth; });
  currentStop = 0;
  day = 1;
  score = 0;
  totalQuestions = 0;
  streak = 0;
  bestStreak = 0;
  hintsUsed = 0;
  scrollX = 0;
  deathPending = false;
  enterTravel();
}

function enterTravel() {
  gameState = STATES.TRAVEL;
  showRiver = false;
  currentEventType = '';
  currentEventTitle = '';
  day += Math.floor(Math.random() * 7) + 1;
  travelFlavorIndex = Math.floor(Math.random() * travelFlavors.length);
  renderTravelScreen();
  renderStatusBar();

  if (travelTimer) clearTimeout(travelTimer);
  travelTimer = setTimeout(function() {
    if (gameState === STATES.TRAVEL) advanceFromTravel();
  }, 2500);
}

function advanceFromTravel() {
  if (travelTimer) { clearTimeout(travelTimer); travelTimer = null; }

  // Collect events for the current stop (triggerStop is 1-indexed relative to stop we just visited)
  // Events trigger BEFORE showing the stop
  pendingEvents = TRAIL_DATA.events.filter(function(e) { return e.triggerStop === currentStop; });
  currentEventIndex = 0;

  if (pendingEvents.length > 0) {
    showNextEvent();
  } else {
    enterStop();
  }
}

function showNextEvent() {
  if (currentEventIndex >= pendingEvents.length) {
    // After all events, check if we should die
    if (checkDeath()) return;
    enterStop();
    return;
  }

  var event = pendingEvents[currentEventIndex];
  eventAnswered = false;
  eventHinted = false;
  dimmedChoice = -1;
  selectedEventChoice = 0;
  currentEventType = event.type;
  currentEventTitle = event.title;

  // Shuffle choice order so correct answer isn't always first
  shuffledIndices = [];
  for (var si = 0; si < event.choices.length; si++) shuffledIndices.push(si);
  for (var si = shuffledIndices.length - 1; si > 0; si--) {
    var sj = Math.floor(Math.random() * (si + 1));
    var tmp = shuffledIndices[si]; shuffledIndices[si] = shuffledIndices[sj]; shuffledIndices[sj] = tmp;
  }

  if (event.type === 'river') {
    gameState = STATES.RIVER;
    showRiver = true;
  } else {
    gameState = STATES.EVENT;
    showRiver = false;
  }

  // Fortune events auto-apply health
  if (event.type === 'fortune') {
    health = Math.min(health + 20, maxHealthForGame);
    eventAnswered = true;
  }

  renderEventScreen(event);
  renderStatusBar();
}

function handleEventChoice(displayIdx) {
  if (eventAnswered) return;
  var event = pendingEvents[currentEventIndex];
  if (!event || event.choices.length === 0) return;
  if (displayIdx < 0 || displayIdx >= shuffledIndices.length) return;
  if (eventHinted && dimmedChoice === displayIdx) return;

  var prof = PROFESSIONS[difficulty];
  var forgiving = prof && prof.forgiving;
  var origIdx = shuffledIndices[displayIdx];
  var choice = event.choices[origIdx];
  var isRiver = event.type === 'river';

  if (forgiving && !choice.correct) {
    // Ralph Wiggum mode: dim the wrong answer, let them try again
    var items = document.querySelectorAll('.choice-item');
    if (items[displayIdx]) {
      items[displayIdx].classList.add('choice-dimmed');
      items[displayIdx].style.pointerEvents = 'none';
    }
    // Move selection to next available choice
    for (var ni = 0; ni < shuffledIndices.length; ni++) {
      var nextIdx = (displayIdx + 1 + ni) % shuffledIndices.length;
      if (!(eventHinted && dimmedChoice === nextIdx) && !items[nextIdx].classList.contains('choice-dimmed')) {
        selectedEventChoice = nextIdx;
        updateChoiceHighlight();
        break;
      }
    }
    return;
  }

  eventAnswered = true;

  totalQuestions++;

  if (choice.correct) {
    var bonus = streak >= 3 ? 5 : 0;
    health = Math.min(health + 10 + bonus, maxHealthForGame);
    score++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
  } else {
    var dmg = isRiver ? 20 : 15;
    health -= dmg;
    streak = 0;
    // Damage related party member
    var concept = event.concept;
    var memberIdx = -1;
    for (var mi = 0; mi < TRAIL_DATA.partyMembers.length; mi++) {
      if (TRAIL_DATA.partyMembers[mi].name === concept) { memberIdx = mi; break; }
    }
    if (memberIdx >= 0 && partyHealth[memberIdx] > 0) {
      partyHealth[memberIdx]--;
    }
  }

  showEventResult(event, displayIdx);
  renderStatusBar();
}

function handleEventHint() {
  var prof = PROFESSIONS[difficulty];
  var hintFree = prof && prof.hintFree;
  if (eventAnswered || eventHinted) return;
  if (!hintFree && supplies <= 0) return;
  var event = pendingEvents[currentEventIndex];
  if (!event || event.choices.length === 0) return;

  if (!hintFree) supplies--;
  hintsUsed++;
  eventHinted = true;

  // Find a wrong answer in display order (dimmedChoice is a display index)
  var wrongDisplayIndices = [];
  for (var i = 0; i < shuffledIndices.length; i++) {
    if (!event.choices[shuffledIndices[i]].correct) wrongDisplayIndices.push(i);
  }
  dimmedChoice = wrongDisplayIndices[Math.floor(Math.random() * wrongDisplayIndices.length)];

  renderEventScreen(event);
  renderStatusBar();
}

function updateChoiceHighlight() {
  var items = document.querySelectorAll('.choice-item');
  for (var i = 0; i < items.length; i++) {
    items[i].classList.toggle('choice-selected', i === selectedEventChoice);
  }
}

function updateStopHighlight() {
  var items = document.querySelectorAll('.stop-opt');
  for (var i = 0; i < items.length; i++) {
    items[i].classList.toggle('choice-selected', i === selectedStopChoice);
  }
}

function checkDeath() {
  if (health <= 0) {
    enterDeath();
    return true;
  }
  var allDead = true;
  for (var i = 0; i < partyHealth.length; i++) {
    if (partyHealth[i] > 0) { allDead = false; break; }
  }
  if (allDead) {
    enterDeath();
    return true;
  }
  return false;
}

function advanceFromEvent() {
  currentEventIndex++;
  if (currentEventIndex < pendingEvents.length) {
    if (checkDeath()) return;
    showNextEvent();
  } else {
    if (checkDeath()) return;
    enterStop();
  }
}

function enterStop() {
  gameState = STATES.STOP;
  showRiver = false;
  selectedStopChoice = 0;

  var stop = TRAIL_DATA.stops[currentStop];
  if (stop && stop.landmarkType === 'river') {
    showRiver = true;
  }

  renderStopScreen();
  renderStatusBar();
}

function handleStopChoice(choice) {
  if (choice === 2) {
    var codeBox = textPanel.querySelector('.code-box');
    if (codeBox) {
      codeBox.style.maxHeight = '280px';
      codeBox.scrollIntoView({ behavior: 'smooth' });
    }
    return;
  }

  currentStop++;
  if (currentStop >= TRAIL_DATA.stops.length) {
    enterWin();
  } else {
    enterTravel();
  }
}

function enterDeath() {
  gameState = STATES.DEATH;
  showRiver = false;
  renderDeathScreen();
  renderStatusBar();
}

function enterWin() {
  gameState = STATES.WIN;
  showRiver = false;
  renderWinScreen();
  renderStatusBar();
}

// =====================================================================
// INPUT HANDLING
// =====================================================================
function ensureAudio() {
  if (!musicInitialized) {
    initAudio();
    startMusic();
  }
}

document.addEventListener('keydown', function(e) {
  var key = e.key;

  // Music toggle always works
  if (key === 'm' || key === 'M') {
    if (!musicInitialized) initAudio();
    toggleMusic();
    return;
  }

  // Start audio on first interaction
  if (!musicInitialized) ensureAudio();

  switch (gameState) {
    case STATES.TITLE:
      if (key === ' ' || key === 'Enter') {
        e.preventDefault();
        gameState = STATES.SETUP;
        renderSetupScreen();
        renderStatusBar();
      }
      break;

    case STATES.SETUP:
      if (key === 'ArrowDown' || key === 'ArrowRight') {
        e.preventDefault();
        selectDifficulty((selectedDifficulty + 1) % PROFESSIONS.length);
      } else if (key === 'ArrowUp' || key === 'ArrowLeft') {
        e.preventDefault();
        selectDifficulty((selectedDifficulty - 1 + PROFESSIONS.length) % PROFESSIONS.length);
      } else if (key === '1') selectDifficulty(0);
      else if (key === '2') selectDifficulty(1);
      else if (key === '3') selectDifficulty(2);
      else if (key === '4') selectDifficulty(3);
      else if (key === 'Enter' || key === ' ') {
        e.preventDefault();
        startGame();
      }
      break;

    case STATES.TRAVEL:
      if (key === ' ' || key === 'Enter') {
        e.preventDefault();
        advanceFromTravel();
      }
      break;

    case STATES.STOP:
      if (key === 'ArrowLeft' || key === 'ArrowRight') {
        e.preventDefault();
        selectedStopChoice = (key === 'ArrowLeft') ? 0 : 1;
        updateStopHighlight();
      } else if (key === 'ArrowUp' || key === 'ArrowDown') {
        e.preventDefault();
        selectedStopChoice = selectedStopChoice === 0 ? 1 : 0;
        updateStopHighlight();
      } else if (key === 'Enter' || key === ' ') {
        e.preventDefault();
        handleStopChoice(selectedStopChoice + 1);
      } else if (key === '1') {
        handleStopChoice(1);
      } else if (key === '2') {
        handleStopChoice(2);
      }
      break;

    case STATES.EVENT:
    case STATES.RIVER:
      if (!eventAnswered) {
        var ev = pendingEvents[currentEventIndex];
        if (ev && ev.choices.length > 0) {
          var numChoices = ev.choices.length;
          if (key === 'ArrowDown' || key === 'ArrowRight') {
            e.preventDefault();
            selectedEventChoice = (selectedEventChoice + 1) % numChoices;
            // Skip dimmed choice
            if (eventHinted && dimmedChoice === selectedEventChoice) selectedEventChoice = (selectedEventChoice + 1) % numChoices;
            updateChoiceHighlight();
          } else if (key === 'ArrowUp' || key === 'ArrowLeft') {
            e.preventDefault();
            selectedEventChoice = (selectedEventChoice - 1 + numChoices) % numChoices;
            if (eventHinted && dimmedChoice === selectedEventChoice) selectedEventChoice = (selectedEventChoice - 1 + numChoices) % numChoices;
            updateChoiceHighlight();
          } else if (key === 'Enter' || key === ' ') {
            e.preventDefault();
            if (!(eventHinted && dimmedChoice === selectedEventChoice)) {
              handleEventChoice(selectedEventChoice);
            }
          } else if (key === '1' || key === 'a' || key === 'A') handleEventChoice(0);
          else if (key === '2' || key === 'b' || key === 'B') handleEventChoice(1);
          else if (key === '3' || key === 'c' || key === 'C') handleEventChoice(2);
          else if (key === 'h' || key === 'H') handleEventHint();
        }
        // Fortune: space/enter to continue
        if (ev && ev.type === 'fortune' && (key === ' ' || key === 'Enter')) {
          e.preventDefault();
          advanceFromEvent();
        }
      } else {
        if (key === ' ' || key === 'Enter') {
          e.preventDefault();
          if (checkDeath()) return;
          advanceFromEvent();
        }
      }
      break;

    case STATES.DEATH:
      if (key === ' ' || key === 'Enter') {
        e.preventDefault();
        resetGame();
        renderTitleScreen();
        renderStatusBar();
      }
      break;

    case STATES.WIN:
      if (key === ' ' || key === 'Enter') {
        e.preventDefault();
        resetGame();
        renderTitleScreen();
        renderStatusBar();
      }
      break;
  }
});

// =====================================================================
// ANIMATION LOOP + TECH DEBT DRAIN
// =====================================================================
var lastTime = 0;
var drainAccumulator = 0;
var DRAIN_INTERVAL = 3000; // drain 1 HP every 3 seconds
var techDebtDeath = false;

function gameLoop(timestamp) {
  var dt = timestamp - lastTime;
  lastTime = timestamp;

  // Clamp dt to avoid huge jumps
  if (dt > 100) dt = 16;

  if (gameState === STATES.TRAVEL) {
    scrollX += dt * 0.03;
    wagonWheelAngle += dt * 0.004;
  } else if (gameState === STATES.TITLE) {
    scrollX += dt * 0.01;
  } else {
    // Gentle idle scroll
    scrollX += dt * 0.002;
  }

  // Tech debt drain: HP ticks down during active gameplay (disabled for Ralph Wiggum)
  var isForgiving = PROFESSIONS[difficulty] && PROFESSIONS[difficulty].forgiving;
  var isActive = gameState === STATES.STOP || gameState === STATES.EVENT || gameState === STATES.RIVER;
  if (isActive && !deathPending && !isForgiving) {
    drainAccumulator += dt;
    while (drainAccumulator >= DRAIN_INTERVAL) {
      drainAccumulator -= DRAIN_INTERVAL;
      health--;
      renderStatusBar();
      if (health <= 0) {
        techDebtDeath = true;
        enterDeath();
        break;
      }
    }
  }

  renderCanvas(timestamp);
  animFrame = requestAnimationFrame(gameLoop);
}

// =====================================================================
// INITIALIZATION
// =====================================================================
resetGame();
renderTitleScreen();
renderStatusBar();
updateMusicIndicator();
animFrame = requestAnimationFrame(gameLoop);
</script>
