<script>
window.TRAIL_DATA = {"framework": "laravel", "trailName": "The Artisan Trail", "stops": [{"name": "Bootstrap Base", "subtitle": "The Entry Point", "concept": "Service Container", "landmarkType": "town", "code": {"file": "public/index.php", "content": "// public/index.php\n<?php\n\nuse Illuminate\\Http\\Request;\n\ndefine('LARAVEL_START', microtime(true));\n\n// Register the Composer autoloader\nrequire __DIR__.'/../vendor/autoload.php';\n\n// Bootstrap the application from the container\n$app = require_once __DIR__.'/../bootstrap/app.php';\n\n// Resolve the HTTP kernel from the container\n$kernel = $app->make(\n    Illuminate\\Contracts\\Http\\Kernel::class\n);\n\n// Handle the incoming request through the kernel\n$response = $kernel->handle(\n    $request = Request::capture()\n);\n\n$response->send();\n\n$kernel->terminate($request, $response);", "language": "php"}, "narration": "Every Laravel journey starts right here in public slash index dot php. This tiny file does something powerful. It boots the Composer autoloader, then creates the application instance from the bootstrap file. The kernel is resolved from the service container — not instantiated directly. That distinction matters. The request gets captured, pushed through the kernel, and the response fires back. Four steps: boot, handle, send, terminate."}, {"name": "Service Provider Pass", "subtitle": "Wiring the Container", "concept": "Service Container", "landmarkType": "mountain", "code": {"file": "app/Providers/AppServiceProvider.php", "content": "// app/Providers/AppServiceProvider.php\n<?php\n\nnamespace App\\Providers;\n\nuse App\\Services\\PaymentGateway;\nuse App\\Services\\StripePaymentGateway;\nuse App\\Contracts\\PaymentProcessor;\nuse Illuminate\\Support\\ServiceProvider;\n\nclass AppServiceProvider extends ServiceProvider\n{\n    public function register(): void\n    {\n        // Bind an interface to a concrete implementation\n        $this->app->bind(\n            PaymentProcessor::class,\n            StripePaymentGateway::class\n        );\n\n        // Singleton: resolved once, reused everywhere\n        $this->app->singleton(\n            PaymentGateway::class,\n            fn ($app) => new PaymentGateway(\n                config('services.stripe.secret')\n            )\n        );\n    }\n\n    public function boot(): void\n    {\n        // Runs after ALL providers are registered\n    }\n}", "language": "php"}, "narration": "Welcome to Service Provider Pass — the backbone of Laravel's architecture. Service providers wire the entire application together before any request is handled. The register method binds interfaces to concrete classes. When anything asks for PaymentProcessor, the container gives it StripePaymentGateway. The singleton binding means one instance is shared everywhere. Notice boot runs after all providers register. That two-phase design prevents dependency ordering headaches."}, {"name": "Middleware Mountains", "subtitle": "The Filter Stack", "concept": "Middleware Pipeline", "landmarkType": "mountain", "code": {"file": "app/Http/Middleware/EnsureUserIsSubscribed.php", "content": "// app/Http/Middleware/EnsureUserIsSubscribed.php\n<?php\n\nnamespace App\\Http\\Middleware;\n\nuse Closure;\nuse Illuminate\\Http\\Request;\nuse Symfony\\Component\\HttpFoundation\\Response;\n\nclass EnsureUserIsSubscribed\n{\n    public function handle(\n        Request $request,\n        Closure $next\n    ): Response {\n        if (! $request->user()?->subscribed()) {\n            return redirect('/billing');\n        }\n\n        // Pass request to the next middleware in the stack\n        $response = $next($request);\n\n        // After-middleware: runs on the way back out\n        $response->headers->set(\n            'X-Subscription-Status', 'active'\n        );\n\n        return $response;\n    }\n}", "language": "php"}, "narration": "You have climbed into the Middleware Mountains. Every request passes through a stack of middleware layers — like checkpoints on a mountain trail. This one checks if the user has an active subscription. No subscription? Redirected to billing. Notice the dollar-sign next call. That hands the request to the next middleware. Code after that call runs on the way back out. That is the onion model: request goes in through each layer, response comes back through them in reverse."}, {"name": "Router Ravine", "subtitle": "Mapping URLs to Actions", "concept": "Middleware Pipeline", "landmarkType": "camp", "code": {"file": "routes/web.php", "content": "// routes/web.php\n<?php\n\nuse App\\Http\\Controllers\\PostController;\nuse App\\Http\\Controllers\\CommentController;\nuse Illuminate\\Support\\Facades\\Route;\n\nRoute::get('/', fn () => view('welcome'));\n\n// Resource routes generate 7 RESTful endpoints\nRoute::resource('posts', PostController::class);\n\n// Route groups share middleware and prefixes\nRoute::middleware(['auth', 'verified'])->group(function () {\n\n    Route::prefix('dashboard')->group(function () {\n        Route::get('/', fn () => view('dashboard'))\n            ->name('dashboard');\n\n        Route::get('/analytics', fn () => view('analytics'))\n            ->name('dashboard.analytics');\n    });\n\n    // Nested resource: /posts/{post}/comments\n    Route::resource('posts.comments', CommentController::class)\n        ->shallow();\n});", "language": "php"}, "narration": "Down in Router Ravine, URLs find their destinations. One line — Route resource posts — generates seven RESTful endpoints: index, create, store, show, edit, update, destroy. Route groups let you stack middleware and prefixes without repeating yourself. Everything inside the auth group requires a logged-in user. The nested resource creates URLs like posts slash one slash comments. Laravel's router turns URL design into a declarative, readable spec."}, {"name": "Controller Canyon", "subtitle": "Handling the Request", "concept": "Eloquent ORM", "landmarkType": "desert", "code": {"file": "app/Http/Controllers/PostController.php", "content": "// app/Http/Controllers/PostController.php\n<?php\n\nnamespace App\\Http\\Controllers;\n\nuse App\\Http\\Requests\\StorePostRequest;\nuse App\\Models\\Post;\nuse Illuminate\\Http\\RedirectResponse;\nuse Illuminate\\View\\View;\n\nclass PostController extends Controller\n{\n    public function index(): View\n    {\n        $posts = Post::with('author')\n            ->published()\n            ->latest()\n            ->paginate(15);\n\n        return view('posts.index', compact('posts'));\n    }\n\n    public function store(StorePostRequest $request): RedirectResponse\n    {\n        // Validation already passed — $request->validated()\n        $post = $request->user()->posts()->create(\n            $request->validated()\n        );\n\n        return redirect()\n            ->route('posts.show', $post)\n            ->with('success', 'Post created!');\n    }\n}", "language": "php"}, "narration": "Welcome to Controller Canyon, where requests meet business logic. The index method eager-loads authors with the with call to avoid N plus one queries. That published scope is a custom query scope — you will see it on the model at the next stop. The store method accepts a StorePostRequest instead of a plain Request. That is a Form Request — validation rules live in their own class. If validation fails, Laravel automatically redirects back with errors. The controller never touches validation logic directly."}, {"name": "Eloquent Oasis", "subtitle": "The Data Layer", "concept": "Eloquent ORM", "landmarkType": "river", "code": {"file": "app/Models/Post.php", "content": "// app/Models/Post.php\n<?php\n\nnamespace App\\Models;\n\nuse Illuminate\\Database\\Eloquent\\Model;\nuse Illuminate\\Database\\Eloquent\\Relations\\BelongsTo;\nuse Illuminate\\Database\\Eloquent\\Relations\\HasMany;\nuse Illuminate\\Database\\Eloquent\\Builder;\n\nclass Post extends Model\n{\n    protected $fillable = ['title', 'body', 'published_at'];\n\n    protected $casts = [\n        'published_at' => 'datetime',\n    ];\n\n    public function author(): BelongsTo\n    {\n        return $this->belongsTo(User::class, 'user_id');\n    }\n\n    public function comments(): HasMany\n    {\n        return $this->hasMany(Comment::class);\n    }\n\n    public function scopePublished(Builder $query): void\n    {\n        $query->whereNotNull('published_at')\n              ->where('published_at', '<=', now());\n    }\n}", "language": "php"}, "narration": "You have reached Eloquent Oasis — where data flows like water. Each model maps to a database table by convention: Post maps to posts. The fillable array is your mass assignment guard. Without it, attackers could inject unexpected fields into your database. Casts automatically convert published_at to a Carbon datetime object. Relationships read like English: a post belongs to an author, has many comments. That scopePublished method is the custom scope the controller used. Eloquent chains these into complex queries from simple, readable pieces."}, {"name": "Blade Valley", "subtitle": "Rendering the View", "concept": "Blade Templates", "landmarkType": "forest", "code": {"file": "resources/views/posts/index.blade.php", "content": "{{-- resources/views/posts/index.blade.php --}}\n<x-app-layout>\n    <x-slot name=\"header\">\n        <h2>All Posts</h2>\n    </x-slot>\n\n    <div class=\"max-w-4xl mx-auto py-8\">\n        @forelse($posts as $post)\n            <x-post-card :post=\"$post\">\n                <x-slot name=\"meta\">\n                    By {{ $post->author->name }}\n                    &middot;\n                    {{ $post->published_at->diffForHumans() }}\n                </x-slot>\n            </x-post-card>\n        @empty\n            <p>No posts yet. Be the first to write one!</p>\n        @endforelse\n\n        <div class=\"mt-6\">\n            {{ $posts->links() }}\n        </div>\n    </div>\n</x-app-layout>", "language": "php"}, "narration": "Blade Valley is where data becomes HTML. The x-app-layout tag is a Blade component — a reusable layout with named slots. The header slot injects that h2 into a specific place in the layout. The forelse directive loops through posts but handles empty collections gracefully. The x-post-card component receives the post as a prop, just like a frontend framework. Notice diffForHumans on the timestamp — Carbon makes dates say things like two hours ago. And posts links renders pagination automatically. Blade mixes PHP power with template elegance."}, {"name": "Response Frontier", "subtitle": "Delivering the Result", "concept": "Blade Templates", "landmarkType": "town", "code": {"file": "app/Http/Resources/PostResource.php", "content": "// app/Http/Resources/PostResource.php\n<?php\n\nnamespace App\\Http\\Resources;\n\nuse Illuminate\\Http\\Request;\nuse Illuminate\\Http\\Resources\\Json\\JsonResource;\n\nclass PostResource extends JsonResource\n{\n    public function toArray(Request $request): array\n    {\n        return [\n            'id'           => $this->id,\n            'title'        => $this->title,\n            'excerpt'      => str($this->body)->limit(200),\n            'author'       => [\n                'name'   => $this->author->name,\n                'avatar' => $this->author->avatar_url,\n            ],\n            'published_at' => $this->published_at?->toIso8601String(),\n            'comments_count' => $this->whenCounted('comments'),\n            'links' => [\n                'self' => route('posts.show', $this),\n            ],\n        ];\n    }\n}", "language": "php"}, "narration": "You made it to Response Frontier! Laravel can return views, redirects, or structured JSON — and API Resources handle the JSON path beautifully. This PostResource transforms an Eloquent model into a clean API response. It controls exactly which fields are exposed. The whenCounted method conditionally includes the comment count only if it was loaded. The links section follows REST conventions with a self URL. Whether you build with Blade or JSON resources, Laravel gives you a dedicated layer for shaping the response. Your wagon has arrived at the frontier."}], "events": [{"type": "weather", "trigger": "after_stop", "triggerStop": 1, "title": "Dependency Injection Storm!", "text": "A storm of tightly coupled classes is battering your application. Your controller directly instantiates a StripePaymentGateway with the new keyword. When you try to write tests, you cannot swap in a mock payment provider.", "choices": [{"text": "Type-hint the PaymentProcessor interface in the constructor and let the container inject it", "correct": true, "explanation": "Exactly. By type-hinting an interface, the service container resolves the correct implementation automatically. In tests, you can bind a mock to that interface. The container is the storm shelter — it decouples your classes from their concrete dependencies."}, {"text": "Make StripePaymentGateway a global singleton using a static method", "correct": false, "explanation": "Static singletons are the opposite of dependency injection. They create hidden global state, make testing painful, and tightly couple every caller to the concrete class. The container's singleton binding achieves the same reuse without the coupling."}, {"text": "Pass the API key directly into each controller method as a parameter", "correct": false, "explanation": "That pushes configuration into your controller actions, violating separation of concerns. Service providers exist to wire configuration to classes in one place, not scatter it across your controllers."}], "concept": "Service Container", "difficulty": "easy"}, {"type": "river", "trigger": "after_stop", "triggerStop": 2, "title": "The CSRF River Crossing", "text": "You have reached a dangerous river. Your form submission keeps getting rejected with a 419 Page Expired error. The form posts to a route protected by the web middleware group, but something is missing from your HTML form.", "choices": [{"text": "Add the @csrf Blade directive inside the form to include a hidden CSRF token field", "correct": true, "explanation": "Laravel's VerifyCsrfToken middleware checks every POST request for a valid token. The at-csrf directive renders a hidden input with the session's token. Without it, the middleware rejects the request as a potential cross-site forgery attack. This is a security essential."}, {"text": "Disable the VerifyCsrfToken middleware for that route to stop the errors", "correct": false, "explanation": "That removes a critical security protection. CSRF tokens prevent malicious sites from submitting forms on behalf of your users. Disabling the check opens your application to cross-site request forgery attacks."}, {"text": "Switch the form from POST to GET to avoid the middleware check", "correct": false, "explanation": "GET requests bypass CSRF checks, but they should never mutate data. Putting create or update operations on GET routes violates HTTP semantics and exposes data in URLs, browser history, and server logs."}], "concept": "Middleware Pipeline", "difficulty": "medium"}, {"type": "encounter", "trigger": "after_stop", "triggerStop": 3, "title": "A Route Model Binding Expert Appears", "text": "A fellow traveler shows you their controller method: it accepts a Post type-hint in the parameter, yet they never wrote a query to find the post by ID. 'Laravel does it for me,' they say with a grin. What is this pattern called?", "choices": [{"text": "Route model binding — Laravel automatically resolves Eloquent models from route parameters", "correct": true, "explanation": "When you type-hint an Eloquent model in a controller method and the route has a matching parameter like {post}, Laravel queries the database automatically. If the record is not found, it returns a 404. Zero boilerplate for common lookups."}, {"text": "Lazy loading — the model is loaded only when its properties are accessed", "correct": false, "explanation": "Lazy loading is about deferring relationship queries, not resolving route parameters. Route model binding happens eagerly at the routing layer, before your controller code even runs."}, {"text": "Service location — the controller pulls the model from a service registry", "correct": false, "explanation": "Service location uses the container to resolve services. Route model binding is a routing feature that maps URL segments directly to database records. Different mechanism, different purpose."}], "concept": "Eloquent ORM", "difficulty": "easy"}, {"type": "misfortune", "trigger": "after_stop", "triggerStop": 4, "title": "Mass Assignment Attack!", "text": "Disaster strikes! An attacker sent an extra is_admin field in a POST request, and your User model accepted it because the fillable property was not configured. They just made themselves an administrator.", "choices": [{"text": "Always define $fillable on your models to whitelist which fields can be mass-assigned", "correct": true, "explanation": "The fillable array is your guard against mass assignment. Only fields listed in fillable can be set via create or update with request data. Alternatively, use guarded to blacklist fields. Never leave both empty — that opens every column to external input."}, {"text": "Validate the request data before passing it to the model — validation alone prevents this", "correct": false, "explanation": "Validation checks data format and rules, but it does not prevent extra fields from reaching the model. An attacker can pass validated fields plus additional unexpected ones. Fillable is the model-level defense that validation cannot replace."}, {"text": "Use raw SQL queries instead of Eloquent to avoid the issue entirely", "correct": false, "explanation": "Raw queries bypass Eloquent's protections but also lose all its benefits: relationships, scopes, casts, events. The real fix is a one-line fillable array, not abandoning the ORM."}], "concept": "Eloquent ORM", "difficulty": "medium"}, {"type": "fortune", "trigger": "after_stop", "triggerStop": 5, "title": "Spring of Eager Loading", "text": "Your understanding of Eloquent relationships is impressive! You discovered the with method and eliminated every N plus one query in your application. Your database thanks you with a burst of clean performance.", "choices": [], "concept": "Eloquent ORM", "difficulty": "easy"}, {"type": "weather", "trigger": "after_stop", "triggerStop": 6, "title": "The XSS Fog", "text": "A dense fog of user-generated content rolls into your templates. A user submitted a comment containing a script tag, and it is executing JavaScript in every visitor's browser. Your Blade template renders comment content using unescaped output.", "choices": [{"text": "Use double curly braces {{ }} which auto-escape HTML entities — never use {!! !!} for user input", "correct": true, "explanation": "Blade's double curly braces run output through htmlspecialchars automatically, converting angle brackets and quotes into harmless entities. The exclamation syntax bypasses escaping and should only be used for trusted, pre-sanitized content. Auto-escaping is your first defense against cross-site scripting."}, {"text": "Sanitize the input when the comment is submitted so it is safe to render raw", "correct": false, "explanation": "Input sanitization is good defense in depth, but it should never be your only protection. Escaping at render time is the standard practice because data can enter from many paths. Always escape output, sanitize input as a bonus layer."}, {"text": "Wrap the output in a div with a content security policy attribute", "correct": false, "explanation": "Content Security Policy is a response header, not an HTML attribute on individual elements. While CSP helps, it is not a substitute for proper output escaping. The double curly brace syntax is the correct Blade-level fix."}], "concept": "Blade Templates", "difficulty": "hard"}, {"type": "encounter", "trigger": "after_stop", "triggerStop": 1, "title": "A Blade Template Guide Appears", "text": "A fellow traveler shows you Blade syntax. 'Blade has @if, @foreach, @extends, @section, and @yield. But unlike raw PHP templates, Blade compiles to cached PHP files.' What is the main advantage of Blade over writing raw PHP in views?", "choices": [{"text": "Blade provides clean, readable directives while auto-escaping output by default — it compiles to PHP for zero runtime overhead", "correct": true, "explanation": "Blade templates compile to plain PHP files and are cached. There's no performance penalty. The directives like @if and @foreach are cleaner than PHP tags, and the double-curly-brace syntax auto-escapes to prevent XSS. You get readability and security for free."}, {"text": "Blade is faster than PHP because it uses a custom template engine written in C", "correct": false, "explanation": "Blade compiles to PHP — it IS PHP under the hood. There's no separate engine. The advantage is developer experience (clean syntax, auto-escaping), not runtime performance."}, {"text": "Blade prevents developers from using PHP logic in templates, enforcing strict separation", "correct": false, "explanation": "Blade actually allows raw PHP with @php directive. It doesn't enforce separation — it encourages it through convenient directives. You can still write bad code in Blade, but the clean syntax nudges you toward good practices."}], "concept": "Blade Templates", "difficulty": "easy"}, {"type": "weather", "trigger": "after_stop", "triggerStop": 2, "title": "Database Seeder Storm!", "text": "A storm hits your development environment. You need to test with realistic data, but manually creating records through the UI takes hours. A teammate mentions database seeders and factories. What is the standard Laravel approach to populating test data?", "choices": [{"text": "Use model factories with Faker to define how models should look, then call them from database seeders", "correct": true, "explanation": "Factories define the blueprint for generating model instances: Post::factory()->count(50)->create(). Seeders orchestrate which factories to run. Together, they populate your database with realistic fake data in seconds. Run php artisan db:seed to execute them all."}, {"text": "Write raw SQL INSERT statements in a migration file", "correct": false, "explanation": "Migrations are for schema changes (adding tables, columns), not for test data. Mixing seed data into migrations makes them unrepeatable and pollutes the migration history. Seeders are the dedicated tool for data population."}, {"text": "Export a production database dump and import it into development", "correct": false, "explanation": "Production data often contains sensitive information (passwords, emails, payment details). Using it in development risks data breaches and violates privacy regulations. Factories generate safe, fake data that mimics production patterns without real user data."}], "concept": "Eloquent ORM", "difficulty": "easy"}, {"type": "encounter", "trigger": "after_stop", "triggerStop": 3, "title": "An Eloquent Relationships Expert Appears", "text": "A fellow traveler asks: 'Your User hasMany Posts, and each Post belongsTo a User. But what if you need a many-to-many relationship — like posts having multiple tags and tags belonging to multiple posts?' What does Laravel use for this?", "choices": [{"text": "A belongsToMany relationship with a pivot table — Laravel manages the intermediate table automatically", "correct": true, "explanation": "belongsToMany on both models connects them through a pivot table (post_tag by convention). Laravel handles the JOIN queries, and you can attach/detach/sync related IDs. The pivot table can even have its own columns (like created_at) accessible through the withPivot method."}, {"text": "Create a separate Tag model with a post_id foreign key, like a hasMany relationship", "correct": false, "explanation": "A foreign key on Tag only allows each tag to belong to one post. Many-to-many requires a pivot table with two foreign keys (post_id and tag_id). The belongsToMany relationship is specifically designed for this pattern."}, {"text": "Store tag IDs as a JSON array in the posts table to avoid an extra table", "correct": false, "explanation": "JSON arrays can't be queried efficiently, can't enforce foreign key constraints, and can't be indexed like normal relationships. A pivot table is the standard relational approach, and Eloquent makes it effortless with belongsToMany."}], "concept": "Eloquent ORM", "difficulty": "easy"}, {"type": "river", "trigger": "after_stop", "triggerStop": 4, "title": "The Query Scope River", "text": "Your controller has Post::where('status', 'published')->where('published_at', '<=', now()) repeated in eight different methods. When the business rule changes, you'd need to update all eight places. How do you cross this river?", "choices": [{"text": "Define a query scope on the model: scopePublished — then call Post::published() anywhere", "correct": true, "explanation": "Local scopes encapsulate query constraints into chainable methods. scopePublished($query) returns $query->where('status', 'published')->where('published_at', '<=', now()). Now Post::published()->latest()->get() reads like a sentence. Change the business rule in one place, every caller updates."}, {"text": "Create a helper function that runs the raw SQL query directly", "correct": false, "explanation": "Raw SQL bypasses Eloquent's query builder, loses chainability, and makes the code vulnerable to SQL injection if not parameterized. Scopes work within the query builder and compose naturally with other Eloquent methods."}, {"text": "Store the result of the query in a static property so it only runs once", "correct": false, "explanation": "Static caching freezes the result at the first call. New published posts would never appear until the process restarts. Scopes run fresh queries each time, ensuring current data. Cache at the HTTP layer if needed, not at the query layer."}], "concept": "Eloquent ORM", "difficulty": "medium"}, {"type": "misfortune", "trigger": "after_stop", "triggerStop": 4, "title": "Validation Bypass!", "text": "A security incident: users are creating posts with future dates and extremely long titles that break the layout. Your controller stores the request data directly with $request->all() without any validation.", "choices": [{"text": "Create a Form Request class with rules for each field — Laravel validates automatically before the controller method runs", "correct": true, "explanation": "Form Requests (php artisan make:request StorePostRequest) define validation rules in a rules() method. Type-hint it in the controller, and Laravel validates the request before your code runs. Invalid requests automatically redirect back with errors. The controller stays clean."}, {"text": "Add if-statements in the controller to check each field manually", "correct": false, "explanation": "Manual validation is verbose, error-prone, and gets duplicated across controllers. Form Requests centralize rules, are reusable, and integrate with Laravel's error bag system. They also handle authorization via the authorize() method."}, {"text": "Set column constraints in the database migration to reject invalid data", "correct": false, "explanation": "Database constraints catch errors at the last possible moment with unhelpful SQL error messages. Validation should happen at the request level, giving users clear error messages and preventing invalid data from reaching the database at all."}], "concept": "Blade Templates", "difficulty": "medium"}, {"type": "misfortune", "trigger": "after_stop", "triggerStop": 5, "title": "Service Provider Confusion!", "text": "Your application behaves differently in production than in development. A class that was working perfectly in dev throws 'Target is not instantiable' in production. You discover the service provider's register method calls $this->app->environment() to conditionally bind classes, but in production the environment isn't set yet during registration.", "choices": [{"text": "Move environment-dependent logic from register() to boot() — register should only bind classes, boot runs after all providers are registered", "correct": true, "explanation": "The register method runs before the application is fully bootstrapped. It should only contain $this->app->bind() and $this->app->singleton() calls. Environment checks, event listeners, route loading, and anything that depends on other services belongs in boot(), which runs after all providers are registered."}, {"text": "Set the APP_ENV environment variable earlier in the bootstrap process", "correct": false, "explanation": "Changing bootstrap order is fragile and breaks the provider contract. Laravel's two-phase design (register then boot) exists precisely so providers don't depend on order. Put conditional logic in boot() where the full application is available."}, {"text": "Remove the service provider and use the container's auto-resolution instead", "correct": false, "explanation": "Auto-resolution works for concrete classes but not for interface bindings, singletons, or conditional logic. Service providers are the designated place for wiring the container. The fix is using the right method (boot), not abandoning providers."}], "concept": "Service Container", "difficulty": "hard"}, {"type": "river", "trigger": "after_stop", "triggerStop": 6, "title": "The Queue Job River", "text": "Your app sends a welcome email on user registration. The email takes 3 seconds to send via SMTP, blocking the response. During traffic spikes, users stare at a loading screen while emails queue up in the PHP process. How do you cross?", "choices": [{"text": "Dispatch the email as a queued job — it runs in a background worker process so the HTTP response returns immediately", "correct": true, "explanation": "Laravel's queue system lets you dispatch(new SendWelcomeEmail($user)). The job is serialized and pushed to a queue (Redis, SQS, database). A separate worker process picks it up and sends the email asynchronously. The user gets an instant response. If the email fails, the queue retries it automatically."}, {"text": "Use PHP's register_shutdown_function to send the email after the response is sent", "correct": false, "explanation": "Shutdown functions run in the same PHP process, still blocking the web server worker. The process can't handle new requests until the email finishes. A queue worker is a separate process — it doesn't affect web server capacity."}, {"text": "Send emails via JavaScript on the client side using an SMTP library", "correct": false, "explanation": "Client-side email sending exposes your SMTP credentials to the browser. Anyone could inspect the source and find your email server password. Server-side queued processing is secure and reliable."}], "concept": "Service Container", "difficulty": "hard"}, {"triggerStop": 3, "type": "misfortune", "title": "Facade Confusion!", "text": "A new developer sees Cache::get('key') in the codebase but can’t find a Cache class anywhere in the project. 'Where does this class come from? How can I test code that uses it?' they ask.", "choices": [{"text": "Facades are static-looking proxies to services in the container — Cache:: resolves to the cache manager behind the scenes. Use Cache::shouldReceive() in tests", "correct": true, "explanation": "Facades aren’t truly static. Cache::get() calls app('cache')->get() under the hood. The static syntax is syntactic sugar for container resolution. For testing, Facades provide shouldReceive() which swaps the real service for a mock automatically."}, {"text": "Cache is a PHP built-in class that Laravel extends with additional methods", "correct": false, "explanation": "PHP has no built-in Cache class. Laravel’s Cache Facade is defined in Illuminate\\Support\\Facades\\Cache. It’s an alias that proxies method calls to the cache service in the container."}, {"text": "Facades are anti-patterns that should be replaced with dependency injection everywhere", "correct": false, "explanation": "Facades and DI both resolve from the same container. Facades are syntactic convenience. In controllers, DI via constructor type-hinting is often cleaner. But in helpers and quick scripts, Facades are perfectly appropriate."}], "concept": "Service Container", "difficulty": "hard"}, {"triggerStop": 5, "type": "weather", "title": "The N+1 Whiteout!", "text": "A blizzard of SQL queries hits your app. Your API returns 50 posts with their authors and comments. The controller uses Post::all() and the resource accesses $this->author->name and $this->comments->count(). Laravel fires 101 queries.", "choices": [{"text": "Use withCount('comments') and with('author') to eager-load — or use $preventLazyLoading in development to catch these automatically", "correct": true, "explanation": "Post::with('author')->withCount('comments')->get() loads everything in 2-3 queries. In AppServiceProvider::boot(), calling Model::preventLazyLoading(!app()->isProduction()) catches N+1 bugs before they reach production."}, {"text": "Paginate the results to limit the query count per page", "correct": false, "explanation": "Pagination reduces posts per page but doesn’t fix the N+1 pattern. Even 10 posts with lazy-loaded relations fires 21 queries. Eager loading is the correct fix regardless of pagination."}, {"text": "Cache the entire API response so the queries only run once per cache period", "correct": false, "explanation": "Caching hides the problem on subsequent requests but the first request still fires 101 queries. Fix the query pattern first with eager loading, then add caching as an optimization layer."}], "concept": "Eloquent ORM", "difficulty": "hard"}], "partyMembers": [{"name": "Service Container", "icon": "container", "maxHealth": 3}, {"name": "Middleware Pipeline", "icon": "middleware", "maxHealth": 3}, {"name": "Eloquent ORM", "icon": "eloquent", "maxHealth": 3}, {"name": "Blade Templates", "icon": "blade", "maxHealth": 3}], "deathMessages": ["Lost in the service container — binding not found.", "Died of mass assignment vulnerability. The is_admin field was wide open.", "The Artisan command ran but nobody was listening.", "Drowned crossing the CSRF river. Token expired three days ago.", "Killed by an N plus one query avalanche. Should have eager loaded.", "Died of middleware starvation. The request never reached the controller.", "Your Blade template rendered unescaped user input. Script injection consumed the page.", "Buried under an avalanche of unpinned Composer dependencies."]};

window.drawCustomEventOverlay = function(time) {
  if (!currentEventType && !currentEventTitle) return;

  var t = (time || 0) * 0.001; // seconds

  // --- DEPENDENCY INJECTION STORM: dark sky, lightning, rain ---
  if (currentEventTitle.indexOf('Dependency Injection Storm') !== -1) {
    // Darken sky
    ctx.fillStyle = 'rgba(0,0,50,0.45)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning flash (periodic)
    var flashPhase = Math.sin(t * 1.7) + Math.sin(t * 3.1);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, 0, W, H);
      // Lightning bolt
      ctx.strokeStyle = '#FFFF55';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 80 + Math.sin(t * 2.3) * 60;
      ctx.moveTo(lx, 10);
      ctx.lineTo(lx - 5, 35);
      ctx.lineTo(lx + 8, 35);
      ctx.lineTo(lx - 3, 65);
      ctx.lineTo(lx + 10, 65);
      ctx.lineTo(lx + 2, 95);
      ctx.stroke();
    }
    // Rain
    ctx.strokeStyle = '#5555FF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 40; i++) {
      var rx = (i * 8.3 + t * 80) % W;
      var ry = (i * 13.7 + t * 120) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 1), Math.floor(ry + 5));
      ctx.stroke();
    }
    return;
  }

  // --- CSRF RIVER CROSSING: rough rapids with white water ---
  if (currentEventTitle.indexOf('CSRF River') !== -1) {
    // Extra turbulence on the river
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 20; i++) {
      var sx = (i * 17 + t * 40) % W;
      var sy = 157 + Math.sin((i * 3 + t * 5)) * 3;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 4, 2);
    }
    // Floating logs / debris
    ctx.fillStyle = '#AA5500';
    for (var i = 0; i < 3; i++) {
      var logX = (i * 110 + t * 25) % W;
      var logY = 159 + Math.sin(t * 2 + i) * 2;
      ctx.fillRect(Math.floor(logX), Math.floor(logY), 8, 2);
    }
    return;
  }

  // --- ROUTE MODEL BINDING EXPERT: person standing by campfire ---
  if (currentEventTitle.indexOf('Route Model Binding') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8); // torso
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3); // head
    ctx.fillRect(px - 1, py - 4, 2, 5); // left leg
    ctx.fillRect(px + 3, py - 4, 2, 5); // right leg
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Campfire
    var fx = 212, fy = 148;
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(fx - 3, fy, 2, 3);
    ctx.fillRect(fx + 3, fy, 2, 3);
    ctx.fillStyle = '#FF5555';
    var flicker = Math.sin(t * 8) * 2;
    ctx.fillRect(fx - 1, fy - 3 + Math.floor(flicker * 0.3), 4, 3);
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(fx, fy - 5 + Math.floor(flicker * 0.5), 2, 2);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(fx - 1, fy - 2, 4, 2);
    // Firelight glow (subtle)
    ctx.fillStyle = 'rgba(255,170,0,0.08)';
    ctx.beginPath();
    ctx.arc(fx + 1, fy - 2, 15, 0, Math.PI * 2);
    ctx.fill();
    return;
  }

  // --- MASS ASSIGNMENT ATTACK: red sky, smoke, warning ---
  if (currentEventTitle.indexOf('Mass Assignment') !== -1) {
    // Red danger tint
    ctx.fillStyle = 'rgba(170,0,0,0.25)';
    ctx.fillRect(0, 0, W, H);
    // Smoke particles rising
    ctx.fillStyle = '#555555';
    for (var i = 0; i < 15; i++) {
      var sx = 140 + Math.sin(i * 2.7 + t) * 30;
      var sy = 130 - ((t * 20 + i * 15) % 90);
      var size = 2 + (i % 3);
      ctx.globalAlpha = 0.3 + Math.sin(t + i) * 0.15;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), size, size);
    }
    ctx.globalAlpha = 1.0;
    // Fire at base
    ctx.fillStyle = '#FF5555';
    for (var i = 0; i < 8; i++) {
      var fx = 130 + i * 5;
      var fh = 4 + Math.sin(t * 6 + i * 1.5) * 3;
      ctx.fillRect(fx, Math.floor(140 - fh), 3, Math.floor(fh));
    }
    ctx.fillStyle = '#FFFF55';
    for (var i = 0; i < 5; i++) {
      var fx = 135 + i * 6;
      var fh = 2 + Math.sin(t * 8 + i * 2) * 2;
      ctx.fillRect(fx, Math.floor(139 - fh), 2, Math.floor(fh));
    }
    // Pulsing red border
    var pulse = (Math.sin(t * 4) + 1) * 0.15;
    ctx.strokeStyle = 'rgba(255,0,0,' + pulse.toFixed(2) + ')';
    ctx.lineWidth = 3;
    ctx.strokeRect(1, 1, W - 2, H - 2);
    ctx.lineWidth = 1;
    return;
  }

  // --- SPRING OF EAGER LOADING: sunny, flowers, rainbow ---
  if (currentEventTitle.indexOf('Spring') !== -1) {
    // Bright sun
    ctx.fillStyle = '#FFFF55';
    ctx.beginPath();
    ctx.arc(260, 30, 12, 0, Math.PI * 2);
    ctx.fill();
    // Sun rays
    ctx.strokeStyle = '#FFFF55';
    ctx.lineWidth = 1;
    for (var i = 0; i < 8; i++) {
      var angle = i * Math.PI / 4 + t * 0.3;
      ctx.beginPath();
      ctx.moveTo(260 + Math.cos(angle) * 14, 30 + Math.sin(angle) * 14);
      ctx.lineTo(260 + Math.cos(angle) * 20, 30 + Math.sin(angle) * 20);
      ctx.stroke();
    }
    // Flowers on ground
    var flowerColors = ['#FF5555', '#FFFF55', '#FF55FF', '#55FFFF', '#55FF55'];
    for (var i = 0; i < 12; i++) {
      var fx = (i * 27 + 10) % W;
      var fy = 135 + (i * 7) % 20;
      ctx.fillStyle = '#00AA00';
      ctx.fillRect(fx + 1, fy, 1, 4); // stem
      ctx.fillStyle = flowerColors[i % flowerColors.length];
      ctx.fillRect(fx, fy - 1, 3, 2); // petals
      ctx.fillStyle = '#FFFF55';
      ctx.fillRect(fx + 1, fy - 1, 1, 1); // center
    }
    // Rainbow arc
    var rainbowColors = ['#FF5555', '#FFAA00', '#FFFF55', '#55FF55', '#5555FF', '#FF2D20'];
    for (var rc = 0; rc < rainbowColors.length; rc++) {
      ctx.strokeStyle = rainbowColors[rc];
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(160, 110, 70 + rc * 3, Math.PI * 1.1, Math.PI * 1.9);
      ctx.stroke();
    }
    ctx.lineWidth = 1;
    return;
  }

  // --- THE XSS FOG: heavy fog obscuring everything ---
  if (currentEventTitle.indexOf('XSS Fog') !== -1) {
    // Dense fog layers
    for (var layer = 0; layer < 3; layer++) {
      var alpha = 0.15 + layer * 0.08;
      ctx.fillStyle = 'rgba(170,170,170,' + alpha.toFixed(2) + ')';
      for (var i = 0; i < 10; i++) {
        var fogX = (i * 35 + t * (6 + layer * 4) + layer * 50) % (W + 60) - 30;
        var fogY = 60 + layer * 30 + Math.sin(t * 0.4 + i * 0.9 + layer) * 10;
        var fogR = 18 + layer * 8 + Math.sin(t * 0.3 + i) * 5;
        ctx.beginPath();
        ctx.arc(fogX, fogY, fogR, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    // Fog below obscuring ground details
    ctx.fillStyle = 'rgba(170,170,170,0.25)';
    ctx.fillRect(0, 110, W, 60);
    return;
  }
};
