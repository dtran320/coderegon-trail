<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Coderegon Trail - Laravel Edition</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100vh;
  overflow: hidden;
  background: #000;
  font-family: 'Courier New', monospace;
  color: #AAAAAA;
}
#game-container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}
#canvas-area {
  height: 52vh;
  min-height: 0;
  position: relative;
  background: #000;
}
#game-canvas {
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
  image-rendering: -moz-crisp-edges;
  image-rendering: crisp-edges;
  display: block;
}
#text-panel {
  flex: 1;
  min-height: 0;
  background: #000;
  border-top: 2px solid #555555;
  overflow-y: auto;
  padding: 8px 16px;
  font-size: 14px;
  line-height: 1.4;
  color: #FFFFFF;
}
#text-panel::-webkit-scrollbar { width: 8px; }
#text-panel::-webkit-scrollbar-track { background: #000; }
#text-panel::-webkit-scrollbar-thumb { background: #555555; }
#status-bar {
  height: 60px;
  min-height: 60px;
  background: #000;
  border-top: 2px solid #555555;
  display: flex;
  align-items: center;
  padding: 0 16px;
  font-size: 15px;
  color: #AAAAAA;
  white-space: nowrap;
  overflow: hidden;
}
.blink {
  animation: blink-anim 1s step-end infinite;
}
@keyframes blink-anim {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
  20%, 40%, 60%, 80% { transform: translateX(4px); }
}
.shake { animation: shake 0.5s ease-in-out; }
.code-box {
  background: #272822;
  border: 1px solid #555555;
  padding: 6px 8px;
  margin: 6px 0;
  max-height: 130px;
  overflow-y: auto;
  overflow-x: auto;
  font-size: 12px;
  line-height: 1.3;
  white-space: pre;
  color: #f8f8f2;
}
.code-box::-webkit-scrollbar { width: 6px; height: 6px; }
.code-box::-webkit-scrollbar-track { background: #272822; }
.code-box::-webkit-scrollbar-thumb { background: #555555; }
.choice-item { cursor: pointer; padding: 2px 4px; }
.choice-item:hover { color: #FFFF55; }
.choice-selected { color: #FFFF55; background: #333300; }
.stop-opt { color: #55FFFF; cursor: pointer; padding: 2px 4px; }
.stop-opt:hover { color: #FFFF55; }
.choice-correct { color: #55FF55; }
.choice-wrong { color: #FF5555; }
.choice-dimmed { color: #555555; }
.health-green { color: #00AA00; }
.health-yellow { color: #FFFF55; }
.health-red { color: #FF5555; }
.health-dead { color: #555555; text-decoration: line-through; }
.text-cyan { color: #55FFFF; }
.text-yellow { color: #FFFF55; }
.text-green { color: #55FF55; }
.text-red { color: #FF5555; }
.text-magenta { color: #FF55FF; }
.text-gray { color: #555555; }
.text-white { color: #FFFFFF; }
.text-bright { color: #FFFFFF; font-weight: bold; }
#music-indicator {
  position: absolute;
  top: 4px;
  right: 8px;
  font-size: 11px;
  color: #555555;
  z-index: 10;
  pointer-events: none;
}
</style>
</head>
<body>
<div id="game-container">
  <div id="canvas-area">
    <canvas id="game-canvas" width="320" height="200"></canvas>
    <div id="music-indicator">M: Music</div>
  </div>
  <div id="text-panel"></div>
  <div id="status-bar"></div>
</div>

<script>

const TRAIL_DATA={"framework": "laravel", "trailName": "The Artisan Trail", "stops": [{"name": "Bootstrap Base", "subtitle": "The Entry Point", "concept": "Service Container", "landmarkType": "town", "code": {"file": "public/index.php", "content": "// public/index.php\n<?php\n\nuse Illuminate\\Http\\Request;\n\ndefine('LARAVEL_START', microtime(true));\n\n// Register the Composer autoloader\nrequire __DIR__.'/../vendor/autoload.php';\n\n// Bootstrap the application from the container\n$app = require_once __DIR__.'/../bootstrap/app.php';\n\n// Resolve the HTTP kernel from the container\n$kernel = $app->make(\n    Illuminate\\Contracts\\Http\\Kernel::class\n);\n\n// Handle the incoming request through the kernel\n$response = $kernel->handle(\n    $request = Request::capture()\n);\n\n$response->send();\n\n$kernel->terminate($request, $response);", "language": "php"}, "narration": "Every Laravel journey starts right here in public slash index dot php. This tiny file does something powerful. It boots the Composer autoloader, then creates the application instance from the bootstrap file. The kernel is resolved from the service container — not instantiated directly. That distinction matters. The request gets captured, pushed through the kernel, and the response fires back. Four steps: boot, handle, send, terminate."}, {"name": "Service Provider Pass", "subtitle": "Wiring the Container", "concept": "Service Container", "landmarkType": "mountain", "code": {"file": "app/Providers/AppServiceProvider.php", "content": "// app/Providers/AppServiceProvider.php\n<?php\n\nnamespace App\\Providers;\n\nuse App\\Services\\PaymentGateway;\nuse App\\Services\\StripePaymentGateway;\nuse App\\Contracts\\PaymentProcessor;\nuse Illuminate\\Support\\ServiceProvider;\n\nclass AppServiceProvider extends ServiceProvider\n{\n    public function register(): void\n    {\n        // Bind an interface to a concrete implementation\n        $this->app->bind(\n            PaymentProcessor::class,\n            StripePaymentGateway::class\n        );\n\n        // Singleton: resolved once, reused everywhere\n        $this->app->singleton(\n            PaymentGateway::class,\n            fn ($app) => new PaymentGateway(\n                config('services.stripe.secret')\n            )\n        );\n    }\n\n    public function boot(): void\n    {\n        // Runs after ALL providers are registered\n    }\n}", "language": "php"}, "narration": "Welcome to Service Provider Pass — the backbone of Laravel's architecture. Service providers wire the entire application together before any request is handled. The register method binds interfaces to concrete classes. When anything asks for PaymentProcessor, the container gives it StripePaymentGateway. The singleton binding means one instance is shared everywhere. Notice boot runs after all providers register. That two-phase design prevents dependency ordering headaches."}, {"name": "Middleware Mountains", "subtitle": "The Filter Stack", "concept": "Middleware Pipeline", "landmarkType": "mountain", "code": {"file": "app/Http/Middleware/EnsureUserIsSubscribed.php", "content": "// app/Http/Middleware/EnsureUserIsSubscribed.php\n<?php\n\nnamespace App\\Http\\Middleware;\n\nuse Closure;\nuse Illuminate\\Http\\Request;\nuse Symfony\\Component\\HttpFoundation\\Response;\n\nclass EnsureUserIsSubscribed\n{\n    public function handle(\n        Request $request,\n        Closure $next\n    ): Response {\n        if (! $request->user()?->subscribed()) {\n            return redirect('/billing');\n        }\n\n        // Pass request to the next middleware in the stack\n        $response = $next($request);\n\n        // After-middleware: runs on the way back out\n        $response->headers->set(\n            'X-Subscription-Status', 'active'\n        );\n\n        return $response;\n    }\n}", "language": "php"}, "narration": "You have climbed into the Middleware Mountains. Every request passes through a stack of middleware layers — like checkpoints on a mountain trail. This one checks if the user has an active subscription. No subscription? Redirected to billing. Notice the dollar-sign next call. That hands the request to the next middleware. Code after that call runs on the way back out. That is the onion model: request goes in through each layer, response comes back through them in reverse."}, {"name": "Router Ravine", "subtitle": "Mapping URLs to Actions", "concept": "Middleware Pipeline", "landmarkType": "camp", "code": {"file": "routes/web.php", "content": "// routes/web.php\n<?php\n\nuse App\\Http\\Controllers\\PostController;\nuse App\\Http\\Controllers\\CommentController;\nuse Illuminate\\Support\\Facades\\Route;\n\nRoute::get('/', fn () => view('welcome'));\n\n// Resource routes generate 7 RESTful endpoints\nRoute::resource('posts', PostController::class);\n\n// Route groups share middleware and prefixes\nRoute::middleware(['auth', 'verified'])->group(function () {\n\n    Route::prefix('dashboard')->group(function () {\n        Route::get('/', fn () => view('dashboard'))\n            ->name('dashboard');\n\n        Route::get('/analytics', fn () => view('analytics'))\n            ->name('dashboard.analytics');\n    });\n\n    // Nested resource: /posts/{post}/comments\n    Route::resource('posts.comments', CommentController::class)\n        ->shallow();\n});", "language": "php"}, "narration": "Down in Router Ravine, URLs find their destinations. One line — Route resource posts — generates seven RESTful endpoints: index, create, store, show, edit, update, destroy. Route groups let you stack middleware and prefixes without repeating yourself. Everything inside the auth group requires a logged-in user. The nested resource creates URLs like posts slash one slash comments. Laravel's router turns URL design into a declarative, readable spec."}, {"name": "Controller Canyon", "subtitle": "Handling the Request", "concept": "Eloquent ORM", "landmarkType": "desert", "code": {"file": "app/Http/Controllers/PostController.php", "content": "// app/Http/Controllers/PostController.php\n<?php\n\nnamespace App\\Http\\Controllers;\n\nuse App\\Http\\Requests\\StorePostRequest;\nuse App\\Models\\Post;\nuse Illuminate\\Http\\RedirectResponse;\nuse Illuminate\\View\\View;\n\nclass PostController extends Controller\n{\n    public function index(): View\n    {\n        $posts = Post::with('author')\n            ->published()\n            ->latest()\n            ->paginate(15);\n\n        return view('posts.index', compact('posts'));\n    }\n\n    public function store(StorePostRequest $request): RedirectResponse\n    {\n        // Validation already passed — $request->validated()\n        $post = $request->user()->posts()->create(\n            $request->validated()\n        );\n\n        return redirect()\n            ->route('posts.show', $post)\n            ->with('success', 'Post created!');\n    }\n}", "language": "php"}, "narration": "Welcome to Controller Canyon, where requests meet business logic. The index method eager-loads authors with the with call to avoid N plus one queries. That published scope is a custom query scope — you will see it on the model at the next stop. The store method accepts a StorePostRequest instead of a plain Request. That is a Form Request — validation rules live in their own class. If validation fails, Laravel automatically redirects back with errors. The controller never touches validation logic directly."}, {"name": "Eloquent Oasis", "subtitle": "The Data Layer", "concept": "Eloquent ORM", "landmarkType": "river", "code": {"file": "app/Models/Post.php", "content": "// app/Models/Post.php\n<?php\n\nnamespace App\\Models;\n\nuse Illuminate\\Database\\Eloquent\\Model;\nuse Illuminate\\Database\\Eloquent\\Relations\\BelongsTo;\nuse Illuminate\\Database\\Eloquent\\Relations\\HasMany;\nuse Illuminate\\Database\\Eloquent\\Builder;\n\nclass Post extends Model\n{\n    protected $fillable = ['title', 'body', 'published_at'];\n\n    protected $casts = [\n        'published_at' => 'datetime',\n    ];\n\n    public function author(): BelongsTo\n    {\n        return $this->belongsTo(User::class, 'user_id');\n    }\n\n    public function comments(): HasMany\n    {\n        return $this->hasMany(Comment::class);\n    }\n\n    public function scopePublished(Builder $query): void\n    {\n        $query->whereNotNull('published_at')\n              ->where('published_at', '<=', now());\n    }\n}", "language": "php"}, "narration": "You have reached Eloquent Oasis — where data flows like water. Each model maps to a database table by convention: Post maps to posts. The fillable array is your mass assignment guard. Without it, attackers could inject unexpected fields into your database. Casts automatically convert published_at to a Carbon datetime object. Relationships read like English: a post belongs to an author, has many comments. That scopePublished method is the custom scope the controller used. Eloquent chains these into complex queries from simple, readable pieces."}, {"name": "Blade Valley", "subtitle": "Rendering the View", "concept": "Blade Templates", "landmarkType": "forest", "code": {"file": "resources/views/posts/index.blade.php", "content": "{{-- resources/views/posts/index.blade.php --}}\n<x-app-layout>\n    <x-slot name=\"header\">\n        <h2>All Posts</h2>\n    </x-slot>\n\n    <div class=\"max-w-4xl mx-auto py-8\">\n        @forelse($posts as $post)\n            <x-post-card :post=\"$post\">\n                <x-slot name=\"meta\">\n                    By {{ $post->author->name }}\n                    &middot;\n                    {{ $post->published_at->diffForHumans() }}\n                </x-slot>\n            </x-post-card>\n        @empty\n            <p>No posts yet. Be the first to write one!</p>\n        @endforelse\n\n        <div class=\"mt-6\">\n            {{ $posts->links() }}\n        </div>\n    </div>\n</x-app-layout>", "language": "php"}, "narration": "Blade Valley is where data becomes HTML. The x-app-layout tag is a Blade component — a reusable layout with named slots. The header slot injects that h2 into a specific place in the layout. The forelse directive loops through posts but handles empty collections gracefully. The x-post-card component receives the post as a prop, just like a frontend framework. Notice diffForHumans on the timestamp — Carbon makes dates say things like two hours ago. And posts links renders pagination automatically. Blade mixes PHP power with template elegance."}, {"name": "Response Frontier", "subtitle": "Delivering the Result", "concept": "Blade Templates", "landmarkType": "town", "code": {"file": "app/Http/Resources/PostResource.php", "content": "// app/Http/Resources/PostResource.php\n<?php\n\nnamespace App\\Http\\Resources;\n\nuse Illuminate\\Http\\Request;\nuse Illuminate\\Http\\Resources\\Json\\JsonResource;\n\nclass PostResource extends JsonResource\n{\n    public function toArray(Request $request): array\n    {\n        return [\n            'id'           => $this->id,\n            'title'        => $this->title,\n            'excerpt'      => str($this->body)->limit(200),\n            'author'       => [\n                'name'   => $this->author->name,\n                'avatar' => $this->author->avatar_url,\n            ],\n            'published_at' => $this->published_at?->toIso8601String(),\n            'comments_count' => $this->whenCounted('comments'),\n            'links' => [\n                'self' => route('posts.show', $this),\n            ],\n        ];\n    }\n}", "language": "php"}, "narration": "You made it to Response Frontier! Laravel can return views, redirects, or structured JSON — and API Resources handle the JSON path beautifully. This PostResource transforms an Eloquent model into a clean API response. It controls exactly which fields are exposed. The whenCounted method conditionally includes the comment count only if it was loaded. The links section follows REST conventions with a self URL. Whether you build with Blade or JSON resources, Laravel gives you a dedicated layer for shaping the response. Your wagon has arrived at the frontier."}], "events": [{"type": "weather", "trigger": "after_stop", "triggerStop": 1, "title": "Dependency Injection Storm!", "text": "A storm of tightly coupled classes is battering your application. Your controller directly instantiates a StripePaymentGateway with the new keyword. When you try to write tests, you cannot swap in a mock payment provider.", "choices": [{"text": "Type-hint the PaymentProcessor interface in the constructor and let the container inject it", "correct": true, "explanation": "Exactly. By type-hinting an interface, the service container resolves the correct implementation automatically. In tests, you can bind a mock to that interface. The container is the storm shelter — it decouples your classes from their concrete dependencies."}, {"text": "Make StripePaymentGateway a global singleton using a static method", "correct": false, "explanation": "Static singletons are the opposite of dependency injection. They create hidden global state, make testing painful, and tightly couple every caller to the concrete class. The container's singleton binding achieves the same reuse without the coupling."}, {"text": "Pass the API key directly into each controller method as a parameter", "correct": false, "explanation": "That pushes configuration into your controller actions, violating separation of concerns. Service providers exist to wire configuration to classes in one place, not scatter it across your controllers."}], "concept": "Service Container", "difficulty": "easy"}, {"type": "river", "trigger": "after_stop", "triggerStop": 2, "title": "The CSRF River Crossing", "text": "You have reached a dangerous river. Your form submission keeps getting rejected with a 419 Page Expired error. The form posts to a route protected by the web middleware group, but something is missing from your HTML form.", "choices": [{"text": "Add the @csrf Blade directive inside the form to include a hidden CSRF token field", "correct": true, "explanation": "Laravel's VerifyCsrfToken middleware checks every POST request for a valid token. The at-csrf directive renders a hidden input with the session's token. Without it, the middleware rejects the request as a potential cross-site forgery attack. This is a security essential."}, {"text": "Disable the VerifyCsrfToken middleware for that route to stop the errors", "correct": false, "explanation": "That removes a critical security protection. CSRF tokens prevent malicious sites from submitting forms on behalf of your users. Disabling the check opens your application to cross-site request forgery attacks."}, {"text": "Switch the form from POST to GET to avoid the middleware check", "correct": false, "explanation": "GET requests bypass CSRF checks, but they should never mutate data. Putting create or update operations on GET routes violates HTTP semantics and exposes data in URLs, browser history, and server logs."}], "concept": "Middleware Pipeline", "difficulty": "medium"}, {"type": "encounter", "trigger": "after_stop", "triggerStop": 3, "title": "A Route Model Binding Expert Appears", "text": "A fellow traveler shows you their controller method: it accepts a Post type-hint in the parameter, yet they never wrote a query to find the post by ID. 'Laravel does it for me,' they say with a grin. What is this pattern called?", "choices": [{"text": "Route model binding — Laravel automatically resolves Eloquent models from route parameters", "correct": true, "explanation": "When you type-hint an Eloquent model in a controller method and the route has a matching parameter like {post}, Laravel queries the database automatically. If the record is not found, it returns a 404. Zero boilerplate for common lookups."}, {"text": "Lazy loading — the model is loaded only when its properties are accessed", "correct": false, "explanation": "Lazy loading is about deferring relationship queries, not resolving route parameters. Route model binding happens eagerly at the routing layer, before your controller code even runs."}, {"text": "Service location — the controller pulls the model from a service registry", "correct": false, "explanation": "Service location uses the container to resolve services. Route model binding is a routing feature that maps URL segments directly to database records. Different mechanism, different purpose."}], "concept": "Eloquent ORM", "difficulty": "easy"}, {"type": "misfortune", "trigger": "after_stop", "triggerStop": 4, "title": "Mass Assignment Attack!", "text": "Disaster strikes! An attacker sent an extra is_admin field in a POST request, and your User model accepted it because the fillable property was not configured. They just made themselves an administrator.", "choices": [{"text": "Always define $fillable on your models to whitelist which fields can be mass-assigned", "correct": true, "explanation": "The fillable array is your guard against mass assignment. Only fields listed in fillable can be set via create or update with request data. Alternatively, use guarded to blacklist fields. Never leave both empty — that opens every column to external input."}, {"text": "Validate the request data before passing it to the model — validation alone prevents this", "correct": false, "explanation": "Validation checks data format and rules, but it does not prevent extra fields from reaching the model. An attacker can pass validated fields plus additional unexpected ones. Fillable is the model-level defense that validation cannot replace."}, {"text": "Use raw SQL queries instead of Eloquent to avoid the issue entirely", "correct": false, "explanation": "Raw queries bypass Eloquent's protections but also lose all its benefits: relationships, scopes, casts, events. The real fix is a one-line fillable array, not abandoning the ORM."}], "concept": "Eloquent ORM", "difficulty": "medium"}, {"type": "fortune", "trigger": "after_stop", "triggerStop": 5, "title": "Spring of Eager Loading", "text": "Your understanding of Eloquent relationships is impressive! You discovered the with method and eliminated every N plus one query in your application. Your database thanks you with a burst of clean performance.", "choices": [], "concept": "Eloquent ORM", "difficulty": "easy"}, {"type": "weather", "trigger": "after_stop", "triggerStop": 6, "title": "The XSS Fog", "text": "A dense fog of user-generated content rolls into your templates. A user submitted a comment containing a script tag, and it is executing JavaScript in every visitor's browser. Your Blade template renders comment content using unescaped output.", "choices": [{"text": "Use double curly braces {{ }} which auto-escape HTML entities — never use {!! !!} for user input", "correct": true, "explanation": "Blade's double curly braces run output through htmlspecialchars automatically, converting angle brackets and quotes into harmless entities. The exclamation syntax bypasses escaping and should only be used for trusted, pre-sanitized content. Auto-escaping is your first defense against cross-site scripting."}, {"text": "Sanitize the input when the comment is submitted so it is safe to render raw", "correct": false, "explanation": "Input sanitization is good defense in depth, but it should never be your only protection. Escaping at render time is the standard practice because data can enter from many paths. Always escape output, sanitize input as a bonus layer."}, {"text": "Wrap the output in a div with a content security policy attribute", "correct": false, "explanation": "Content Security Policy is a response header, not an HTML attribute on individual elements. While CSP helps, it is not a substitute for proper output escaping. The double curly brace syntax is the correct Blade-level fix."}], "concept": "Blade Templates", "difficulty": "hard"}, {"type": "encounter", "trigger": "after_stop", "triggerStop": 1, "title": "A Blade Template Guide Appears", "text": "A fellow traveler shows you Blade syntax. 'Blade has @if, @foreach, @extends, @section, and @yield. But unlike raw PHP templates, Blade compiles to cached PHP files.' What is the main advantage of Blade over writing raw PHP in views?", "choices": [{"text": "Blade provides clean, readable directives while auto-escaping output by default — it compiles to PHP for zero runtime overhead", "correct": true, "explanation": "Blade templates compile to plain PHP files and are cached. There's no performance penalty. The directives like @if and @foreach are cleaner than PHP tags, and the double-curly-brace syntax auto-escapes to prevent XSS. You get readability and security for free."}, {"text": "Blade is faster than PHP because it uses a custom template engine written in C", "correct": false, "explanation": "Blade compiles to PHP — it IS PHP under the hood. There's no separate engine. The advantage is developer experience (clean syntax, auto-escaping), not runtime performance."}, {"text": "Blade prevents developers from using PHP logic in templates, enforcing strict separation", "correct": false, "explanation": "Blade actually allows raw PHP with @php directive. It doesn't enforce separation — it encourages it through convenient directives. You can still write bad code in Blade, but the clean syntax nudges you toward good practices."}], "concept": "Blade Templates", "difficulty": "easy"}, {"type": "weather", "trigger": "after_stop", "triggerStop": 2, "title": "Database Seeder Storm!", "text": "A storm hits your development environment. You need to test with realistic data, but manually creating records through the UI takes hours. A teammate mentions database seeders and factories. What is the standard Laravel approach to populating test data?", "choices": [{"text": "Use model factories with Faker to define how models should look, then call them from database seeders", "correct": true, "explanation": "Factories define the blueprint for generating model instances: Post::factory()->count(50)->create(). Seeders orchestrate which factories to run. Together, they populate your database with realistic fake data in seconds. Run php artisan db:seed to execute them all."}, {"text": "Write raw SQL INSERT statements in a migration file", "correct": false, "explanation": "Migrations are for schema changes (adding tables, columns), not for test data. Mixing seed data into migrations makes them unrepeatable and pollutes the migration history. Seeders are the dedicated tool for data population."}, {"text": "Export a production database dump and import it into development", "correct": false, "explanation": "Production data often contains sensitive information (passwords, emails, payment details). Using it in development risks data breaches and violates privacy regulations. Factories generate safe, fake data that mimics production patterns without real user data."}], "concept": "Eloquent ORM", "difficulty": "easy"}, {"type": "encounter", "trigger": "after_stop", "triggerStop": 3, "title": "An Eloquent Relationships Expert Appears", "text": "A fellow traveler asks: 'Your User hasMany Posts, and each Post belongsTo a User. But what if you need a many-to-many relationship — like posts having multiple tags and tags belonging to multiple posts?' What does Laravel use for this?", "choices": [{"text": "A belongsToMany relationship with a pivot table — Laravel manages the intermediate table automatically", "correct": true, "explanation": "belongsToMany on both models connects them through a pivot table (post_tag by convention). Laravel handles the JOIN queries, and you can attach/detach/sync related IDs. The pivot table can even have its own columns (like created_at) accessible through the withPivot method."}, {"text": "Create a separate Tag model with a post_id foreign key, like a hasMany relationship", "correct": false, "explanation": "A foreign key on Tag only allows each tag to belong to one post. Many-to-many requires a pivot table with two foreign keys (post_id and tag_id). The belongsToMany relationship is specifically designed for this pattern."}, {"text": "Store tag IDs as a JSON array in the posts table to avoid an extra table", "correct": false, "explanation": "JSON arrays can't be queried efficiently, can't enforce foreign key constraints, and can't be indexed like normal relationships. A pivot table is the standard relational approach, and Eloquent makes it effortless with belongsToMany."}], "concept": "Eloquent ORM", "difficulty": "easy"}, {"type": "river", "trigger": "after_stop", "triggerStop": 4, "title": "The Query Scope River", "text": "Your controller has Post::where('status', 'published')->where('published_at', '<=', now()) repeated in eight different methods. When the business rule changes, you'd need to update all eight places. How do you cross this river?", "choices": [{"text": "Define a query scope on the model: scopePublished — then call Post::published() anywhere", "correct": true, "explanation": "Local scopes encapsulate query constraints into chainable methods. scopePublished($query) returns $query->where('status', 'published')->where('published_at', '<=', now()). Now Post::published()->latest()->get() reads like a sentence. Change the business rule in one place, every caller updates."}, {"text": "Create a helper function that runs the raw SQL query directly", "correct": false, "explanation": "Raw SQL bypasses Eloquent's query builder, loses chainability, and makes the code vulnerable to SQL injection if not parameterized. Scopes work within the query builder and compose naturally with other Eloquent methods."}, {"text": "Store the result of the query in a static property so it only runs once", "correct": false, "explanation": "Static caching freezes the result at the first call. New published posts would never appear until the process restarts. Scopes run fresh queries each time, ensuring current data. Cache at the HTTP layer if needed, not at the query layer."}], "concept": "Eloquent ORM", "difficulty": "medium"}, {"type": "misfortune", "trigger": "after_stop", "triggerStop": 4, "title": "Validation Bypass!", "text": "A security incident: users are creating posts with future dates and extremely long titles that break the layout. Your controller stores the request data directly with $request->all() without any validation.", "choices": [{"text": "Create a Form Request class with rules for each field — Laravel validates automatically before the controller method runs", "correct": true, "explanation": "Form Requests (php artisan make:request StorePostRequest) define validation rules in a rules() method. Type-hint it in the controller, and Laravel validates the request before your code runs. Invalid requests automatically redirect back with errors. The controller stays clean."}, {"text": "Add if-statements in the controller to check each field manually", "correct": false, "explanation": "Manual validation is verbose, error-prone, and gets duplicated across controllers. Form Requests centralize rules, are reusable, and integrate with Laravel's error bag system. They also handle authorization via the authorize() method."}, {"text": "Set column constraints in the database migration to reject invalid data", "correct": false, "explanation": "Database constraints catch errors at the last possible moment with unhelpful SQL error messages. Validation should happen at the request level, giving users clear error messages and preventing invalid data from reaching the database at all."}], "concept": "Blade Templates", "difficulty": "medium"}, {"type": "misfortune", "trigger": "after_stop", "triggerStop": 5, "title": "Service Provider Confusion!", "text": "Your application behaves differently in production than in development. A class that was working perfectly in dev throws 'Target is not instantiable' in production. You discover the service provider's register method calls $this->app->environment() to conditionally bind classes, but in production the environment isn't set yet during registration.", "choices": [{"text": "Move environment-dependent logic from register() to boot() — register should only bind classes, boot runs after all providers are registered", "correct": true, "explanation": "The register method runs before the application is fully bootstrapped. It should only contain $this->app->bind() and $this->app->singleton() calls. Environment checks, event listeners, route loading, and anything that depends on other services belongs in boot(), which runs after all providers are registered."}, {"text": "Set the APP_ENV environment variable earlier in the bootstrap process", "correct": false, "explanation": "Changing bootstrap order is fragile and breaks the provider contract. Laravel's two-phase design (register then boot) exists precisely so providers don't depend on order. Put conditional logic in boot() where the full application is available."}, {"text": "Remove the service provider and use the container's auto-resolution instead", "correct": false, "explanation": "Auto-resolution works for concrete classes but not for interface bindings, singletons, or conditional logic. Service providers are the designated place for wiring the container. The fix is using the right method (boot), not abandoning providers."}], "concept": "Service Container", "difficulty": "hard"}, {"type": "river", "trigger": "after_stop", "triggerStop": 6, "title": "The Queue Job River", "text": "Your app sends a welcome email on user registration. The email takes 3 seconds to send via SMTP, blocking the response. During traffic spikes, users stare at a loading screen while emails queue up in the PHP process. How do you cross?", "choices": [{"text": "Dispatch the email as a queued job — it runs in a background worker process so the HTTP response returns immediately", "correct": true, "explanation": "Laravel's queue system lets you dispatch(new SendWelcomeEmail($user)). The job is serialized and pushed to a queue (Redis, SQS, d const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const W = 320, H = 200;

// Seeded PRNG for consistent landscape
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xFFFFFFFF;
    return (s >>> 0) / 0xFFFFFFFF;
  };
}

const rng = seededRandom(42);
const cloudPositions = [];
for (let i = 0; i < 5; i++) {
  cloudPositions.push({ x: rng() * 400, y: 10 + rng() * 30, w: 25 + rng() * 30, h: 8 + rng() * 6 });
}
const farMountains = [];
for (let i = 0; i < 6; i++) {
  farMountains.push({ x: i * 70 - 20 + rng() * 30, h: 40 + rng() * 35, w: 50 + rng() * 40 });
}
const nearMountains = [];
for (let i = 0; i < 8; i++) {
  nearMountains.push({ x: i * 55 - 30 + rng() * 20, h: 25 + rng() * 25, w: 30 + rng() * 25, snow: rng() > 0.3 });
}
const treesData = [];

function getSkyColors() {
  const progress = currentStop / Math.max(TRAIL_DATA.stops.length, 1);
  if (progress < 0.15) {
    return { top: '#5500AA', bottom: '#FF5555' };
  } else if (progress < 0.7) {
    return { top: '#5555FF', bottom: '#55FFFF' };
  } else {
    return { top: '#5500AA', bottom: '#FFAA00' };
  }
}

function drawPixelCloud(x, y, w, h) {
  ctx.fillStyle = '#FFFFFF';
  const ix = Math.floor(x), iy = Math.floor(y), iw = Math.floor(w), ih = Math.floor(h);
  ctx.fillRect(ix, iy, iw, ih);
  ctx.fillRect(ix + Math.floor(iw * 0.15), iy - Math.floor(ih * 0.5), Math.floor(iw * 0.3), Math.floor(ih * 0.6));
  ctx.fillRect(ix + Math.floor(iw * 0.4), iy - Math.floor(ih * 0.7), Math.floor(iw * 0.35), Math.floor(ih * 0.8));
  ctx.fillRect(ix + Math.floor(iw * 0.65), iy - Math.floor(ih * 0.3), Math.floor(iw * 0.2), Math.floor(ih * 0.4));
}

function drawMountain(x, h, w, color, snowCap) {
  const baseY = 110;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(Math.floor(x), baseY);
  ctx.lineTo(Math.floor(x + w / 2), Math.floor(baseY - h));
  ctx.lineTo(Math.floor(x + w), baseY);
  ctx.closePath();
  ctx.fill();
  if (snowCap) {
    ctx.fillStyle = '#FFFFFF';
    const peakX = x + w / 2;
    const peakY = baseY - h;
    ctx.beginPath();
    ctx.moveTo(Math.floor(peakX - w * 0.1), Math.floor(peakY + h * 0.18));
    ctx.lineTo(Math.floor(peakX), Math.floor(peakY));
    ctx.lineTo(Math.floor(peakX + w * 0.1), Math.floor(peakY + h * 0.18));
    ctx.closePath();
    ctx.fill();
  }
}

function drawTree(x, baseY, h) {
  const trunkW = 3, trunkH = Math.floor(h * 0.3);
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(x - 1), Math.floor(baseY - trunkH), trunkW, trunkH);
  for (let i = 0; i < 3; i++) {
    const layerW = (h * 0.4) * (1 - i * 0.15);
    const layerY = baseY - trunkH - (i * h * 0.2);
    ctx.fillStyle = i === 1 ? '#00AA00' : '#005500';
    ctx.beginPath();
    ctx.moveTo(Math.floor(x - layerW / 2), Math.floor(layerY));
    ctx.lineTo(Math.floor(x + 0.5), Math.floor(layerY - h * 0.25));
    ctx.lineTo(Math.floor(x + layerW / 2), Math.floor(layerY));
    ctx.closePath();
    ctx.fill();
  }
}

function drawWagon(wx, wy) {
  // Oxen (two brown lumps)
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(wx - 24), Math.floor(wy - 6), 8, 6);
  ctx.fillRect(Math.floor(wx - 14), Math.floor(wy - 6), 8, 6);
  // Oxen legs
  ctx.fillStyle = '#553300';
  ctx.fillRect(Math.floor(wx - 22), Math.floor(wy), 2, 4);
  ctx.fillRect(Math.floor(wx - 18), Math.floor(wy), 2, 4);
  ctx.fillRect(Math.floor(wx - 12), Math.floor(wy), 2, 4);
  ctx.fillRect(Math.floor(wx - 8), Math.floor(wy), 2, 4);
  // Oxen heads
  ctx.fillStyle = '#885500';
  ctx.fillRect(Math.floor(wx - 26), Math.floor(wy - 7), 3, 3);
  ctx.fillRect(Math.floor(wx - 16), Math.floor(wy - 7), 3, 3);
  // Yoke
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(wx - 4), Math.floor(wy - 4), 6, 2);
  // Wagon body
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(wx + 2), Math.floor(wy - 8), 24, 10);
  // Wagon sides darker
  ctx.fillStyle = '#885500';
  ctx.fillRect(Math.floor(wx + 2), Math.floor(wy - 8), 24, 1);
  ctx.fillRect(Math.floor(wx + 2), Math.floor(wy + 1), 24, 1);
  // Canvas cover (white curved top)
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.moveTo(Math.floor(wx + 3), Math.floor(wy - 8));
  ctx.quadraticCurveTo(Math.floor(wx + 14), Math.floor(wy - 22), Math.floor(wx + 25), Math.floor(wy - 8));
  ctx.closePath();
  ctx.fill();
  // Canvas cover outline
  ctx.strokeStyle = '#AAAAAA';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(Math.floor(wx + 3), Math.floor(wy - 8));
  ctx.quadraticCurveTo(Math.floor(wx + 14), Math.floor(wy - 22), Math.floor(wx + 25), Math.floor(wy - 8));
  ctx.stroke();
  // Canvas ribs
  ctx.strokeStyle = '#AAAAAA';
  for (let ri = 0; ri < 3; ri++) {
    const rx = wx + 8 + ri * 5;
    ctx.beginPath();
    ctx.moveTo(Math.floor(rx), Math.floor(wy - 8));
    ctx.lineTo(Math.floor(rx), Math.floor(wy - 14 - ri % 2 * 2));
    ctx.stroke();
  }
  // Wheels
  const wheelR = 5;
  for (let wi = 0; wi < 2; wi++) {
    const wcx = wx + 7 + wi * 14;
    const wcy = wy + 4;
    // Outer rim
    ctx.fillStyle = '#553300';
    ctx.beginPath();
    ctx.arc(Math.floor(wcx), Math.floor(wcy), wheelR, 0, Math.PI * 2);
    ctx.fill();
    // Inner
    ctx.fillStyle = '#AA5500';
    ctx.beginPath();
    ctx.arc(Math.floor(wcx), Math.floor(wcy), wheelR - 1.5, 0, Math.PI * 2);
    ctx.fill();
    // Spokes
    ctx.strokeStyle = '#553300';
    ctx.lineWidth = 1;
    for (let si = 0; si < 6; si++) {
      const angle = wagonWheelAngle + (si * Math.PI / 3);
      ctx.beginPath();
      ctx.moveTo(Math.floor(wcx), Math.floor(wcy));
      ctx.lineTo(Math.floor(wcx + Math.cos(angle) * (wheelR - 1)), Math.floor(wcy + Math.sin(angle) * (wheelR - 1)));
      ctx.stroke();
    }
    // Hub
    ctx.fillStyle = '#553300';
    ctx.fillRect(Math.floor(wcx - 1), Math.floor(wcy - 1), 2, 2);
  }
  // Red-orange flag (Laravel brand color)
  ctx.fillStyle = '#CC2200';
  ctx.fillRect(Math.floor(wx + 14), Math.floor(wy - 22), 1, -7);
  ctx.fillStyle = '#FF2D20';
  ctx.fillRect(Math.floor(wx + 15), Math.floor(wy - 29), 6, 4);
}

function drawLandmark(type, x, baseY) {
  switch (type) {
    case 'town':
      ctx.fillStyle = '#AA5500';
      ctx.fillRect(Math.floor(x), Math.floor(baseY - 18), 14, 18);
      ctx.fillRect(Math.floor(x + 18), Math.floor(baseY - 14), 12, 14);
      // Roofs
      ctx.fillStyle = '#555555';
      ctx.beginPath();
      ctx.moveTo(Math.floor(x - 2), Math.floor(baseY - 18));
      ctx.lineTo(Math.floor(x + 7), Math.floor(baseY - 25));
      ctx.lineTo(Math.floor(x + 16), Math.floor(baseY - 18));
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(Math.floor(x + 16), Math.floor(baseY - 14));
      ctx.lineTo(Math.floor(x + 24), Math.floor(baseY - 20));
      ctx.lineTo(Math.floor(x + 32), Math.floor(baseY - 14));
      ctx.closePath();
      ctx.fill();
      // Windows
      ctx.fillStyle = '#FFFF55';
      ctx.fillRect(Math.floor(x + 3), Math.floor(baseY - 13), 3, 3);
      ctx.fillRect(Math.floor(x + 9), Math.floor(baseY - 13), 3, 3);
      ctx.fillRect(Math.floor(x + 21), Math.floor(baseY - 10), 3, 3);
      // Door
      ctx.fillStyle = '#553300';
      ctx.fillRect(Math.floor(x + 5), Math.floor(baseY - 7), 4, 7);
      break;
    case 'camp':
      // Tent
      ctx.fillStyle = '#AAAAAA';
      ctx.beginPath();
      ctx.moveTo(Math.floor(x - 6), Math.floor(baseY));
      ctx.lineTo(Math.floor(x + 4), Math.floor(baseY - 14));
      ctx.lineTo(Math.floor(x + 14), Math.floor(baseY));
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#555555';
      ctx.beginPath();
      ctx.moveTo(Math.floor(x + 4), Math.floor(baseY));
      ctx.lineTo(Math.floor(x + 4), Math.floor(baseY - 14));
      ctx.lineTo(Math.floor(x + 14), Math.floor(baseY));
      ctx.closePath();
      ctx.fill();
      // Campfire
      ctx.fillStyle = '#FF5555';
      ctx.fillRect(Math.floor(x + 20), Math.floor(baseY - 5), 4, 3);
      ctx.fillStyle = '#FFFF55';
      ctx.fillRect(Math.floor(x + 21), Math.floor(baseY - 8), 2, 3);
      ctx.fillStyle = '#FFAA00';
      ctx.fillRect(Math.floor(x + 18), Math.floor(baseY - 2), 8, 2);
      break;
    case 'mountain':
      drawMountain(x - 20, 60, 50, '#FF2D20', true);
      drawMountain(x + 10, 45, 40, '#FF5555', true);
      break;
    case 'river':
      ctx.fillStyle = '#AA5500';
      ctx.fillRect(Math.floor(x), Math.floor(baseY - 20), 3, 20);
      ctx.fillRect(Math.floor(x + 24), Math.floor(baseY - 20), 3, 20);
      ctx.strokeStyle = '#AAAAAA';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(Math.floor(x + 1), Math.floor(baseY - 18));
      ctx.lineTo(Math.floor(x + 25), Math.floor(baseY - 18));
      ctx.stroke();
      // Sign
      ctx.fillStyle = '#AA5500';
      ctx.fillRect(Math.floor(x + 8), Math.floor(baseY - 25), 12, 8);
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(Math.floor(x + 10), Math.floor(baseY - 23), 2, 1);
      ctx.fillRect(Math.floor(x + 13), Math.floor(baseY - 23), 2, 1);
      ctx.fillRect(Math.floor(x + 16), Math.floor(baseY - 23), 2, 1);
      break;
    case 'forest':
      for (let i = 0; i < 6; i++) {
        drawTree(x + i * 7, baseY, 14 + (i % 3) * 3);
      }
      break;
    case 'desert':
      // Cactus
      ctx.fillStyle = '#00AA00';
      ctx.fillRect(Math.floor(x + 5), Math.floor(baseY - 20), 4, 20);
      ctx.fillRect(Math.floor(x + 1), Math.floor(baseY - 16), 4, 4);
      ctx.fillRect(Math.floor(x + 1), Math.floor(baseY - 16), 1, 8);
      ctx.fillRect(Math.floor(x + 9), Math.floor(baseY - 14), 4, 4);
      ctx.fillRect(Math.floor(x + 12), Math.floor(baseY - 14), 1, 8);
      // Second cactus
      ctx.fillRect(Math.floor(x + 22), Math.floor(baseY - 14), 3, 14);
      ctx.fillRect(Math.floor(x + 19), Math.floor(baseY - 10), 3, 3);
      ctx.fillRect(Math.floor(x + 19), Math.floor(baseY - 10), 1, 6);
      // Sand dune
      ctx.fillStyle = '#FFAA00';
      ctx.beginPath();
      ctx.moveTo(Math.floor(x - 10), Math.floor(baseY));
      ctx.quadraticCurveTo(Math.floor(x + 15), Math.floor(baseY - 6), Math.floor(x + 40), Math.floor(baseY));
      ctx.closePath();
      ctx.fill();
      break;
  }
}

function drawRiver(time) {
  const riverY = 155;
  const riverH = 18;
  ctx.fillStyle = '#0000AA';
  ctx.fillRect(0, riverY, W, riverH);
  ctx.fillStyle = '#00AAAA';
  for (let wx = 0; wx < W; wx += 3) {
    const waveY = riverY + 3 + Math.sin((wx + time * 0.05) * 0.08) * 3;
    ctx.fillRect(wx, Math.floor(waveY), 2, 1);
    const waveY2 = riverY + 10 + Math.sin((wx + time * 0.03 + 50) * 0.1) * 2;
    ctx.fillRect(wx, Math.floor(waveY2), 2, 1);
  }
  // White foam
  ctx.fillStyle = '#55FFFF';
  for (let wx = 0; wx < W; wx += 12) {
    const foamY = riverY + 1 + Math.sin((wx + time * 0.04) * 0.06) * 1;
    ctx.fillRect(wx + 2, Math.floor(foamY), 3, 1);
  }
}

// =====================================================================
// EVENT CANVAS OVERLAYS — unique visuals per quiz event

function drawEventOverlay(time) {
  if (!currentEventType && !currentEventTitle) return;

  var t = (time || 0) * 0.001; // seconds

  // --- DEPENDENCY INJECTION STORM: dark sky, lightning, rain ---
  if (currentEventTitle.indexOf('Dependency Injection Storm') !== -1) {
    // Darken sky
    ctx.fillStyle = 'rgba(0,0,50,0.45)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning flash (periodic)
    var flashPhase = Math.sin(t * 1.7) + Math.sin(t * 3.1);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, 0, W, H);
      // Lightning bolt
      ctx.strokeStyle = '#FFFF55';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 80 + Math.sin(t * 2.3) * 60;
      ctx.moveTo(lx, 10);
      ctx.lineTo(lx - 5, 35);
      ctx.lineTo(lx + 8, 35);
      ctx.lineTo(lx - 3, 65);
      ctx.lineTo(lx + 10, 65);
      ctx.lineTo(lx + 2, 95);
      ctx.stroke();
    }
    // Rain
    ctx.strokeStyle = '#5555FF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 40; i++) {
      var rx = (i * 8.3 + t * 80) % W;
      var ry = (i * 13.7 + t * 120) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 1), Math.floor(ry + 5));
      ctx.stroke();
    }
    return;
  }

  // --- CSRF RIVER CROSSING: rough rapids with white water ---
  if (currentEventTitle.indexOf('CSRF River') !== -1) {
    // Extra turbulence on the river
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 20; i++) {
      var sx = (i * 17 + t * 40) % W;
      var sy = 157 + Math.sin((i * 3 + t * 5)) * 3;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 4, 2);
    }
    // Floating logs / debris
    ctx.fillStyle = '#AA5500';
    for (var i = 0; i < 3; i++) {
      var logX = (i * 110 + t * 25) % W;
      var logY = 159 + Math.sin(t * 2 + i) * 2;
      ctx.fillRect(Math.floor(logX), Math.floor(logY), 8, 2);
    }
    return;
  }

  // --- ROUTE MODEL BINDING EXPERT: person standing by campfire ---
  if (currentEventTitle.indexOf('Route Model Binding') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8); // torso
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3); // head
    ctx.fillRect(px - 1, py - 4, 2, 5); // left leg
    ctx.fillRect(px + 3, py - 4, 2, 5); // right leg
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Campfire
    var fx = 212, fy = 148;
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(fx - 3, fy, 2, 3);
    ctx.fillRect(fx + 3, fy, 2, 3);
    ctx.fillStyle = '#FF5555';
    var flicker = Math.sin(t * 8) * 2;
    ctx.fillRect(fx - 1, fy - 3 + Math.floor(flicker * 0.3), 4, 3);
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(fx, fy - 5 + Math.floor(flicker * 0.5), 2, 2);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(fx - 1, fy - 2, 4, 2);
    // Firelight glow (subtle)

    ctx.beginPath();
    ctx.arc(fx + 1, fy - 2, 15, 0, Math.PI * 2);
    ctx.fill();
    return;
  }

  // --- MASS ASSIGNMENT ATTACK: red sky, smoke, warning ---
  if (currentEventTitle.indexOf('Mass Assignment') !== -1) {
    // Red danger tint

    ctx.fillRect(0, 0, W, H);
    // Smoke particles rising

      var sx = 140 + Math.sin(i * 2.7 + t) * 30;
      var sy = 130 - ((t * 20 + i * 15) % 90);
      var size = 2 + (i % 3);
      ctx.globalAlpha = 0.3 + Math.sin(t + i) * 0.15;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), size, size);
    }
    ctx.globalAlpha = 1.0;
    // Fire at base
    ctx.fillStyle = '#FF5555';
    for (var i = 0; i < 8; i++) {

      var fh = 4 + Math.sin(t * 6 + i * 1.5) * 3;

    ctx.strokeRect(1, 1, W - 2, H - 2);

  // --- SPRING OF EAGER LOADING: sunny, flowers, rainbow ---

    ctx.arc(260, 30, 12, 0, Math.PI * 2);

    for (var i = 0; i < 8; i++) {
      var angle = i * Math.PI / 4 + t * 0.3;

      ctx.lineTo(260 + Math.cos(angle) * 20, 30 + Math.sin(angle) * 20);

      var fy = 135 + (i * 7) % 20;

      ctx.fillRect(fx + 1, fy, 1, 4); // stem

      ctx.fillRect(fx, fy - 1, 3, 2); // petals
      ctx.fillStyle = '#FFFF55';
      ctx.fillRect(fx + 1, fy - 1, 1, 1); // center
    }
    // Rainbow arc
    var rainbowColors = ['#FF5555', '#FFAA00', '#FFFF55', '#55FF55', '#5555FF', '#FF2D20'];
    for (var rc = 0; rc < rainbowColors.length; rc++) {
      ctx.strokeStyle = rainbowColors[rc];
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(160, 110, 70 + rc * 3, Math.PI * 1.1, Math.PI * 1.9);
      ctx.stroke();
    }
    ctx.lineWidth = 1;
    return;
  }

  // --- THE XSS FOG: heavy fog obscuring everything ---
  if (currentEventTitle.indexOf('XSS Fog') !== -1) {
    // Dense fog layers
    for (var layer = 0; layer < 3; layer++) {
      var alpha = 0.15 + layer * 0.08;
      ctx.fillStyle = 'rgba(170,170,170,' + alpha.toFixed(2) + ')';
      for (var i = 0; i < 10; i++) {
        var fogX = (i * 35 + t * (6 + layer * 4) + layer * 50) % (W + 60) - 30;
        var fogY = 60 + layer * 30 + Math.sin(t * 0.4 + i * 0.9 + layer) * 10;
        var fogR = 18 + layer * 8 + Math.sin(t * 0.3 + i) * 5;
        ctx.beginPath();
        ctx.arc(fogX, fogY, fogR, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    // Fog below obscuring ground details
    ctx.fillStyle = 'rgba(170,170,170,0.25)';
    ctx.fillRect(0, 110, W, 60);
    return;
  }
}

// =====================================================================

function drawDeathScene(time) {
  var t = (time || 0) * 0.001;
  var G = '#33FF33'; // Apple II green
  var GD = '#1a8a1a'; // darker green for details

  // Black background
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);

  // Ground line
  ctx.fillStyle = GD;
  ctx.fillRect(0, 148, W, 1);

  // --- OX (left side) ---
  var ox = 100, oy = 128;
  // Body
  ctx.fillStyle = G;
  ctx.fillRect(ox, oy, 24, 14);
  // Head
  ctx.fillRect(ox - 10, oy - 2, 12, 10);
  // Horns
  ctx.fillRect(ox - 12, oy - 6, 3, 5);
  ctx.fillRect(ox - 4, oy - 6, 3, 5);
  // Snout
  ctx.fillStyle = GD;
  ctx.fillRect(ox - 10, oy + 4, 6, 3);
  // Eye
  ctx.fillStyle = '#000';
  ctx.fillRect(ox - 7, oy, 2, 2);
  // Legs
  ctx.fillStyle = G;
  ctx.fillRect(ox + 2, oy + 14, 4, 8);
  ctx.fillRect(ox + 10, oy + 14, 4, 8);
  ctx.fillRect(ox + 16, oy + 14, 4, 8);
  // Tail
  ctx.fillRect(ox + 24, oy + 2, 6, 2);
  ctx.fillRect(ox + 29, oy, 2, 4);

  // --- HITCH ---
  ctx.fillStyle = G;
  ctx.fillRect(ox + 28, oy + 8, 14, 2);

  // --- WAGON ---
  var wx = 142, wy = 108;
  // Wagon bed
  ctx.fillStyle = G;
  ctx.fillRect(wx, wy + 20, 50, 16);
  // Bed slats (dark lines)
  ctx.fillStyle = GD;
  ctx.fillRect(wx, wy + 24, 50, 1);
  ctx.fillRect(wx, wy + 28, 50, 1);
  ctx.fillRect(wx, wy + 32, 50, 1);
  // Side rails
  ctx.fillStyle = G;
  ctx.fillRect(wx, wy + 18, 2, 18);
  ctx.fillRect(wx + 48, wy + 18, 2, 18);

  // Canvas cover (the bonnet)
  ctx.fillStyle = G;
  // Left arch
  ctx.fillRect(wx + 4, wy + 4, 2, 16);
  // Right arch
  ctx.fillRect(wx + 44, wy + 4, 2, 16);
  // Top cover
  ctx.fillRect(wx + 4, wy + 2, 42, 4);
  // Cover fill
  ctx.fillRect(wx + 6, wy + 6, 38, 12);
  // Cover shading
  ctx.fillStyle = GD;
  ctx.fillRect(wx + 8, wy + 8, 34, 2);
  ctx.fillRect(wx + 8, wy + 12, 34, 2);
  ctx.fillRect(wx + 8, wy + 16, 34, 1);

  // Wheels
  var wheelR = 8;
  var wheels = [wx + 8, wx + 42];
  var wa = t * 0.5; // slow rotation
  ctx.strokeStyle = G;
  ctx.lineWidth = 1.5;
  for (var wi = 0; wi < wheels.length; wi++) {
    var cx = wheels[wi], cy = wy + 38;
    // Rim
    ctx.beginPath();
    ctx.arc(cx, cy, wheelR, 0, Math.PI * 2);
    ctx.stroke();
    // Spokes
    for (var sp = 0; sp < 6; sp++) {
      var angle = wa + sp * Math.PI / 3;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(angle) * wheelR, cy + Math.sin(angle) * wheelR);
      ctx.stroke();
    }
    // Hub
    ctx.fillStyle = G;
    ctx.beginPath();
    ctx.arc(cx, cy, 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.lineWidth = 1;

  // Subtle scanline effect
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  for (var sl = 0; sl < H; sl += 3) {
    ctx.fillRect(0, sl, W, 1);
  }

  // Subtle green glow/vignette
  var grd = ctx.createRadialGradient(W/2, H/2, 40, W/2, H/2, W * 0.7);
  grd.addColorStop(0, 'rgba(0,0,0,0)');
  grd.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
}

function renderCanvas(time) {
  // Death screen: green phosphor Apple II style
  if (gameState === STATES.DEATH) {
    drawDeathScene(time);
    return;
  }

  const skyColors = getSkyColors();

  // Sky gradient (banded for EGA feel)
  const bands = 10;
  const skyBottom = 110;
  for (let i = 0; i < bands; i++) {
    const t = i / (bands - 1);
    const r1 = parseInt(skyColors.top.substr(1, 2), 16);
    const g1 = parseInt(skyColors.top.substr(3, 2), 16);
    const b1 = parseInt(skyColors.top.substr(5, 2), 16);
    const r2 = parseInt(skyColors.bottom.substr(1, 2), 16);
    const g2 = parseInt(skyColors.bottom.substr(3, 2), 16);
    const b2 = parseInt(skyColors.bottom.substr(5, 2), 16);
    const r = Math.floor(r1 + (r2 - r1) * t);
    const g = Math.floor(g1 + (g2 - g1) * t);
    const b = Math.floor(b1 + (b2 - b1) * t);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    const bandH = Math.ceil(skyBottom / bands) + 1;
    ctx.fillRect(0, Math.floor(i * (skyBottom / bands)), W, bandH);
  }

  // Clouds (parallax 0.2x)
  const cloudOffset = scrollX * 0.2;
  for (const c of cloudPositions) {
    let cx = ((c.x - cloudOffset) % (W + 80));
    if (cx < -40) cx += W + 80;
    drawPixelCloud(cx - 20, c.y, c.w, c.h);
  }

  // Far mountains (parallax 0.3x) - LARAVEL RED-ORANGE signature
  const farOffset = scrollX * 0.3;
  for (const m of farMountains) {
    let mx = ((m.x - farOffset) % (W + 100));
    if (mx < -50) mx += W + 100;
    drawMountain(mx - 25, m.h, m.w, '#FF2D20', false);
  }

  // Near mountains (parallax 0.4x) - LIGHTER RED-ORANGE with snow caps
  const nearOffset = scrollX * 0.4;
  for (const m of nearMountains) {
    let mx = ((m.x - nearOffset) % (W + 80));
    if (mx < -40) mx += W + 80;
    drawMountain(mx - 20, m.h, m.w, '#FF5555', m.snow);
  }

  // Grass
  ctx.fillStyle = '#00AA00';
  ctx.fillRect(0, 110, W, H - 110);

  // Bright grass highlights
  ctx.fillStyle = '#55FF55';
  const grassOffset = scrollX * 1.0;
  for (let i = 0; i < 50; i++) {
    let gx = ((i * 11 + 5 - grassOffset) % (W + 20));
    if (gx < -5) gx += W + 20;
    const gy = 113 + (i * 7 + i * i * 3) % 55;
    ctx.fillRect(Math.floor(gx), Math.floor(gy), 2, 2);
  }

  // Trees (parallax 0.6x)
  const treeOffset = scrollX * 0.6;
  const treeBaseY = 128;
  for (const t of treesData) {
    let tx = ((t.x - treeOffset) % (W + 60));
    if (tx < -20) tx += W + 60;
    drawTree(tx - 10, treeBaseY, t.h);
  }

  // Landmark for current stop (only at stops/events)
  if (gameState === STATES.STOP || gameState === STATES.EVENT || gameState === STATES.RIVER) {
    const stop = TRAIL_DATA.stops[currentStop];
    if (stop) {
      drawLandmark(stop.landmarkType, 240, 150);
    }
  }

  // Trail/ground strip
  if (!showRiver) {
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(0, 152, W, 15);
    // Trail texture dots
    ctx.fillStyle = '#885500';
    for (let i = 0; i < 35; i++) {
      let dotX = ((i * 10 - scrollX * 1.0) % (W + 10));
      if (dotX < -3) dotX += W + 10;
      ctx.fillRect(Math.floor(dotX), 155 + (i % 4) * 2, 3, 1);
    }
    // Ruts
    ctx.fillStyle = '#775500';
    ctx.fillRect(0, 157, W, 1);
    ctx.fillRect(0, 162, W, 1);
  }

  // River (when active)
  if (showRiver) {
    drawRiver(time || 0);
  }

  // Wagon
  const wagonX = 65;
  const wagonY = showRiver ? 148 : 149;
  drawWagon(wagonX, wagonY);

  // Event-specific visual overlay
  if (gameState === STATES.EVENT || gameState === STATES.RIVER) {
    drawEventOverlay(time);
  }

  // Ground below trail
  ctx.fillStyle = '#885500';
  ctx.fillRect(0, showRiver ? 173 : 167, W, 15);
  ctx.fillStyle = '#553300';
  ctx.fillRect(0, showRiver ? 188 : 182, W, H - 182);
}

// =====================================================================
// MUSIC SYSTEM (Web Audio API Chiptune)
// =====================================================================
const NOTE_FREQ = {
  'C3': 130.81, 'D3': 146.83, 'G2': 98.00, 'A2': 110.00,
  'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'G4': 392.00,
  'A4': 440.00, 'C5': 523.25, 'REST': 0
};

const melody = [
  { note: 'E4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'A4', dur: 1 }, { note: 'G4', dur: 1 },
  { note: 'E4', dur: 1 }, { note: 'D4', dur: 1 }, { note: 'C4', dur: 1 }, { note: 'REST', dur: 1 },
  { note: 'E4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'A4', dur: 1 }, { note: 'C5', dur: 1 },
  { note: 'A4', dur: 2 }, { note: 'G4', dur: 2 },
  { note: 'C4', dur: 1 }, { note: 'D4', dur: 1 }, { note: 'E4', dur: 1 }, { note: 'G4', dur: 1 },
  { note: 'A4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'E4', dur: 1 }, { note: 'D4', dur: 1 },
  { note: 'C4', dur: 1 }, { note: 'E4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'E4', dur: 1 },
  { note: 'D4', dur: 1 }, { note: 'C4', dur: 3 }
];

const bassLine = [
  { note: 'C3', dur: 4 }, { note: 'A2', dur: 4 }, { note: 'C3', dur: 4 }, { note: 'A2', dur: 4 },
  { note: 'C3', dur: 4 }, { note: 'G2', dur: 4 }, { note: 'D3', dur: 4 }, { note: 'C3', dur: 4 }
];

let musicScheduleTimer = null;
let nextMelodyTime = 0;
let nextBassTime = 0;

var masterGain = null;

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 1.0;
    masterGain.connect(audioCtx.destination);
    musicInitialized = true;
  } catch (e) {
    console.warn('Web Audio not available:', e);
  }
}

function playNote(freq, startTime, duration, type, gainVal) {
  if (!audioCtx || freq === 0) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startTime);
  // Envelope: attack then decay
  gain.gain.setValueAtTime(0.001, startTime);
  gain.gain.linearRampToValueAtTime(gainVal, startTime + 0.02);
  gain.gain.setValueAtTime(gainVal, startTime + duration * 0.75);
  gain.gain.linearRampToValueAtTime(0.001, startTime + duration * 0.95);
  osc.connect(gain);
  gain.connect(masterGain || audioCtx.destination);
  osc.start(startTime);
  osc.stop(startTime + duration);
}

function scheduleLoop() {
  if (!musicPlaying || !audioCtx) return;
  const bpm = 110;
  const quarterDur = 60 / bpm;
  const now = audioCtx.currentTime;

  // Schedule melody
  let t = now + 0.05;
  for (const note of melody) {
    const dur = note.dur * quarterDur;
    if (note.note !== 'REST') {
      playNote(NOTE_FREQ[note.note], t, dur, 'square', 0.06);
    }
    t += dur;
  }

  // Schedule bass
  let tb = now + 0.05;
  for (const note of bassLine) {
    const dur = note.dur * quarterDur;
    playNote(NOTE_FREQ[note.note], tb, dur, 'triangle', 0.08);
    tb += dur;
  }

  // Total loop duration in beats: melody has 32 quarter beats = 32 * quarterDur
  const totalBeats = 32;
  const loopDurationMs = totalBeats * quarterDur * 1000;

  musicScheduleTimer = setTimeout(scheduleLoop, loopDurationMs - 200);
}

function startMusic() {
  if (!musicInitialized) initAudio();
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (masterGain) masterGain.gain.setValueAtTime(1.0, audioCtx.currentTime);
  musicPlaying = true;
  scheduleLoop();
  updateMusicIndicator();
}

function stopMusic() {
  musicPlaying = false;
  if (musicScheduleTimer) {
    clearTimeout(musicScheduleTimer);
    musicScheduleTimer = null;
  }
  if (masterGain) masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
  updateMusicIndicator();
}

function toggleMusic() {
  if (!musicInitialized) initAudio();
  if (musicPlaying) {
    stopMusic();
  } else {
    startMusic();
  }
  renderStatusBar();
}

function updateMusicIndicator() {
  const el = document.getElementById('music-indicator');
  if (!el) return;
  el.textContent = musicPlaying ? 'M: Music ON' : 'M: Music OFF';
  el.style.color = musicPlaying ? '#55FF55' : '#555555';
}

// =====================================================================
// SYNTAX HIGHLIGHTING (EGA Colors — PHP)
// =====================================================================
const PHP_KEYWORDS = new Set([
  'use', 'namespace', 'class', 'extends', 'implements', 'interface', 'trait',
  'function', 'fn', 'public', 'private', 'protected', 'static', 'abstract',
  'final', 'const', 'return', 'if', 'else', 'elseif', 'foreach', 'for',
  'while', 'do', 'switch', 'case', 'break', 'continue', 'default', 'match',
  'new', 'throw', 'try', 'catch', 'finally', 'yield', 'true', 'false',
  'null', 'void', 'array', 'string', 'int', 'float', 'bool', 'mixed',
  'self', 'parent', 'readonly', 'enum', 'as'
]);

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function highlightCode(code) {
  return code.split('\n').map(function(line) {
    // Full-line comments (// or # or Blade comments)
    var trimmed = line.trim();
    if (trimmed.startsWith('//') || trimmed.startsWith('#') || trimmed.startsWith('{{--')) {
      return '<span style="color:#75715e">' + escHtml(line) + '</span>';
    }
    var result = '';
    var i = 0;
    while (i < line.length) {
      // PHP variable ($identifier)
      if (line[i] === '$') {
        var end = i + 1;
        while (end < line.length && /[\w]/.test(line[end])) end++;
        result += '<span style="color:#fd971f">' + escHtml(line.substring(i, end)) + '</span>';
        i = end;
        continue;
      }
      // String literal (single or double quotes)
      if (line[i] === "'" || line[i] === '"') {
        var quote = line[i];
        var end = i + 1;
        while (end < line.length && line[end] !== quote) {
          if (line[end] === '\\') end++;
          end++;
        }
        end = Math.min(end + 1, line.length);
        result += '<span style="color:#e6db74">' + escHtml(line.substring(i, end)) + '</span>';
        i = end;
        continue;
      }
      // Inline comment (//)
      if (line[i] === '/' && i + 1 < line.length && line[i + 1] === '/') {
        result += '<span style="color:#75715e">' + escHtml(line.substring(i)) + '</span>';
        break;
      }
      // Hash comment (#)
      if (line[i] === '#') {
        result += '<span style="color:#75715e">' + escHtml(line.substring(i)) + '</span>';
        break;
      }
      // Arrow operator -> and double colon ::
      if (line[i] === '-' && i + 1 < line.length && line[i + 1] === '>') {
        result += '<span style="color:#f8f8f2">-&gt;</span>';
        i += 2;
        continue;
      }
      if (line[i] === ':' && i + 1 < line.length && line[i + 1] === ':') {
        result += '<span style="color:#f8f8f2">::</span>';
        i += 2;
        continue;
      }
      // Blade directives (@word)
      if (line[i] === '@' && i + 1 < line.length && /[a-zA-Z]/.test(line[i + 1])) {
        var end4 = i + 1;
        while (end4 < line.length && /[\w]/.test(line[end4])) end4++;
        result += '<span style="color:#f92672">' + escHtml(line.substring(i, end4)) + '</span>';
        i = end4;
        continue;
      }
      // Number
      if (/\d/.test(line[i]) && (i === 0 || !/\w/.test(line[i - 1]))) {
        var end2 = i;
        while (end2 < line.length && /[\d._]/.test(line[end2])) end2++;
        result += '<span style="color:#ae81ff">' + escHtml(line.substring(i, end2)) + '</span>';
        i = end2;
        continue;
      }
      // Identifier or keyword
      if (/[a-zA-Z_]/.test(line[i])) {
        var end3 = i;
        while (end3 < line.length && /[\w]/.test(line[end3])) end3++;
        var word = line.substring(i, end3);
        if (PHP_KEYWORDS.has(word)) {
          result += '<span style="color:#f92672">' + escHtml(word) + '</span>';
        } else if (end3 < line.length && line[end3] === '(') {
          result += '<span style="color:#a6e22e">' + escHtml(word) + '</span>';
        } else {
          result += '<span style="color:#f8f8f2">' + escHtml(word) + '</span>';
        }
        i = end3;
        continue;
      }
      // Blade template syntax {{ }} and {!! !!}
      if (line[i] === '{' && i + 1 < line.length && line[i + 1] === '{') {
        result += '<span style="color:#66d9ef">' + escHtml('{{') + '</span>';
        i += 2;
        continue;
      }
      if (line[i] === '}' && i + 1 < line.length && line[i + 1] === '}') {
        result += '<span style="color:#66d9ef">' + escHtml('}}') + '</span>';
        i += 2;
        continue;
      }
      // Punctuation / operators
      result += '<span style="color:#f8f8f2">' + escHtml(line[i]) + '</span>';
      i++;
    }
    return result;
  }).join('\n');
}

function resetGame() {
  gameState = STATES.TITLE;
  difficulty = 1;
  selectedDifficulty = 1;
  health = 100;
  maxHealthForGame = 100;
  supplies = 5;
  currentStop = 0;
  day = 1;
  score = 0;
  totalQuestions = 0;
  streak = 0;
  bestStreak = 0;
  hintsUsed = 0;
  scrollX = 0;
  showRiver = false;
  wagonWheelAngle = 0;
  travelFlavorIndex = 0;
  deathPending = false;
  partyHealth = TRAIL_DATA.partyMembers.map(function(p) { return p.maxHealth; });
  pendingEvents = [];
  currentEventIndex = 0;
  eventAnswered = false;
  eventHinted = false;
  dimmedChoice = -1;
  selectedEventChoice = 0;
  selectedStopChoice = 0;
  shuffledIndices = [];
  currentEventType = '';
  currentEventTitle = '';
  drainAccumulator = 0;
  techDebtDeath = false;
  if (travelTimer) { clearTimeout(travelTimer); travelTimer = null; }
  if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }
}

function selectDifficulty(idx) {
  selectedDifficulty = Math.max(0, Math.min(PROFESSIONS.length - 1, idx));
  renderSetupScreen();
}

function startGame() {
  difficulty = selectedDifficulty;
  var prof = PROFESSIONS[difficulty];
  health = prof.health;
  maxHealthForGame = prof.health;
  supplies = prof.supplies;
  partyHealth = TRAIL_DATA.partyMembers.map(function(p) { return p.maxHealth; });
  currentStop = 0;
  day = 1;
  score = 0;
  totalQuestions = 0;
  streak = 0;
  bestStreak = 0;
  hintsUsed = 0;
  scrollX = 0;
  deathPending = false;
  enterTravel();
}

function enterTravel() {
  gameState = STATES.TRAVEL;
  showRiver = false;
  currentEventType = '';
  currentEventTitle = '';
  day += Math.floor(Math.random() * 7) + 1;
  travelFlavorIndex = Math.floor(Math.random() * travelFlavors.length);
  renderTravelScreen();
  renderStatusBar();

  if (travelTimer) clearTimeout(travelTimer);
  travelTimer = setTimeout(function() {
    if (gameState === STATES.TRAVEL) advanceFromTravel();
  }, 2500);
}

function advanceFromTravel() {
  if (travelTimer) { clearTimeout(travelTimer); travelTimer = null; }

  // Collect events for the current stop (triggerStop is 1-indexed relative to stop we just visited)
  // Events trigger BEFORE showing the stop
  var DIFFICULTY_TIERS = [['easy'],['easy','medium'],['medium','hard'],['hard']];
  var allowedTiers = DIFFICULTY_TIERS[difficulty] || ['easy','medium','hard'];
  var allStopEvents = TRAIL_DATA.events.filter(function(e) { return e.triggerStop === currentStop; });
  pendingEvents = allStopEvents.filter(function(e) { return e.type === 'fortune' || !e.difficulty || allowedTiers.indexOf(e.difficulty) !== -1; });
  currentEventIndex = 0;

  if (pendingEvents.length > 0) {
    showNextEvent();
  } else {
    enterStop();
  }
}

function showNextEvent() {
  if (currentEventIndex >= pendingEvents.length) {
    // After all events, check if we should die
    if (checkDeath()) return;
    enterStop();
    return;
  }

  var event = pendingEvents[currentEventIndex];
  eventAnswered = false;
  eventHinted = false;
  dimmedChoice = -1;
  selectedEventChoice = 0;
  currentEventType = event.type;
  currentEventTitle = event.title;

  // Shuffle choice order so correct answer isn't always first
  shuffledIndices = [];
  for (var si = 0; si < event.choices.length; si++) shuffledIndices.push(si);
  for (var si = shuffledIndices.length - 1; si > 0; si--) {
    var sj = Math.floor(Math.random() * (si + 1));
    var tmp = shuffledIndices[si]; shuffledIndices[si] = shuffledIndices[sj]; shuffledIndices[sj] = tmp;
  }

  if (event.type === 'river') {
    gameState = STATES.RIVER;
    showRiver = true;
  } else {
    gameState = STATES.EVENT;
    showRiver = false;
  }

  // Fortune events auto-apply health
  if (event.type === 'fortune') {
    health = Math.min(health + 20, maxHealthForGame);
    eventAnswered = true;
  }

  renderEventScreen(event);
  renderStatusBar();
}

function handleEventChoice(displayIdx) {
  if (eventAnswered) return;
  var event = pendingEvents[currentEventIndex];
  if (!event || event.choices.length === 0) return;
  if (displayIdx < 0 || displayIdx >= shuffledIndices.length) return;
  if (eventHinted && dimmedChoice === displayIdx) return;

  var prof = PROFESSIONS[difficulty];
  var forgiving = prof && prof.forgiving;
  var origIdx = shuffledIndices[displayIdx];
  var choice = event.choices[origIdx];
  var isRiver = event.type === 'river';

  if (forgiving && !choice.correct) {
    // Ralph Wiggum mode: dim the wrong answer, let them try again
    var items = document.querySelectorAll('.choice-item');
    if (items[displayIdx]) {
      items[displayIdx].classList.add('choice-dimmed');
      items[displayIdx].style.pointerEvents = 'none';
    }
    // Move selection to next available choice
    for (var ni = 0; ni < shuffledIndices.length; ni++) {
      var nextIdx = (displayIdx + 1 + ni) % shuffledIndices.length;
      if (!(eventHinted && dimmedChoice === nextIdx) && !items[nextIdx].classList.contains('choice-dimmed')) {
        selectedEventChoice = nextIdx;
        updateChoiceHighlight();
        break;
      }
    }
    return;
  }

  eventAnswered = true;

  totalQuestions++;

  if (choice.correct) {
    var bonus = streak >= 3 ? 5 : 0;
    health = Math.min(health + 10 + bonus, maxHealthForGame);
    score++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
  } else {
    var dmg = isRiver ? 20 : 15;
    health -= dmg;
    streak = 0;
    // Damage related party member
    var concept = event.concept;
    var memberIdx = -1;
    for (var mi = 0; mi < TRAIL_DATA.partyMembers.length; mi++) {
      if (TRAIL_DATA.partyMembers[mi].name === concept) { memberIdx = mi; break; }
    }
    if (memberIdx >= 0 && partyHealth[memberIdx] > 0) {
      partyHealth[memberIdx]--;
    }
  }

  showEventResult(event, displayIdx);
  renderStatusBar();
}

function handleEventHint() {
  var prof = PROFESSIONS[difficulty];
  var hintFree = prof && prof.hintFree;
  if (eventAnswered || eventHinted) return;
  if (!hintFree && supplies <= 0) return;
  var event = pendingEvents[currentEventIndex];
  if (!event || event.choices.length === 0) return;

  if (!hintFree) supplies--;
  hintsUsed++;
  eventHinted = true;

  // Find a wrong answer in display order (dimmedChoice is a display index)
  var wrongDisplayIndices = [];
  for (var i = 0; i < shuffledIndices.length; i++) {
    if (!event.choices[shuffledIndices[i]].correct) wrongDisplayIndices.push(i);
  }
  dimmedChoice = wrongDisplayIndices[Math.floor(Math.random() * wrongDisplayIndices.length)];

  renderEventScreen(event);
  renderStatusBar();
}

function updateChoiceHighlight() {
  var items = document.querySelectorAll('.choice-item');
  for (var i = 0; i < items.length; i++) {
    items[i].classList.toggle('choice-selected', i === selectedEventChoice);
  }
}

function updateStopHighlight() {
  var items = document.querySelectorAll('.stop-opt');
  for (var i = 0; i < items.length; i++) {
    items[i].classList.toggle('choice-selected', i === selectedStopChoice);
  }
}

function checkDeath() {
  if (health <= 0) {
    enterDeath();
    return true;
  }
  var allDead = true;
  for (var i = 0; i < partyHealth.length; i++) {
    if (partyHealth[i] > 0) { allDead = false; break; }
  }
  if (allDead) {
    enterDeath();
    return true;
  }
  return false;
}

function advanceFromEvent() {
  currentEventIndex++;
  if (currentEventIndex < pendingEvents.length) {
    if (checkDeath()) return;
    showNextEvent();
  } else {
    if (checkDeath()) return;
    enterStop();
  }
}

function enterStop() {
  gameState = STATES.STOP;
  showRiver = false;
  selectedStopChoice = 0;

  var stop = TRAIL_DATA.stops[currentStop];
  if (stop && stop.landmarkType === 'river') {
    showRiver = true;
  }

  renderStopScreen();
  renderStatusBar();
}

function handleStopChoice(choice) {
  if (choice === 2) {
    var codeBox = textPanel.querySelector('.code-box');
    if (codeBox) {
      codeBox.style.maxHeight = '280px';
      codeBox.scrollIntoView({ behavior: 'smooth' });
    }
    return;
  }

  currentStop++;
  if (currentStop >= TRAIL_DATA.stops.length) {
    enterWin();
  } else {
    enterTravel();
  }
}

function enterDeath() {
  gameState = STATES.DEATH;
  showRiver = false;
  renderDeathScreen();
  renderStatusBar();
}

function enterWin() {
  gameState = STATES.WIN;
  showRiver = false;
  renderWinScreen();
  renderStatusBar();
}

// =====================================================================
// INPUT HANDLING
// =====================================================================
function ensureAudio() {
  if (!musicInitialized) {
    initAudio();
    startMusic();
  }
}

document.addEventListener('keydown', function(e) {
  var key = e.key;

  // Music toggle always works
  if (key === 'm' || key === 'M') {
    if (!musicInitialized) initAudio();
    toggleMusic();
    return;
  }

  // Start audio on first interaction
  if (!musicInitialized) ensureAudio();

  switch (gameState) {
    case STATES.TITLE:
      if (key === ' ' || key === 'Enter') {
        e.preventDefault();
        gameState = STATES.SETUP;
        renderSetupScreen();
        renderStatusBar();
      }
      break;

    case STATES.SETUP:
      if (key === 'ArrowDown' || key === 'ArrowRight') {
        e.preventDefault();
        selectDifficulty((selectedDifficulty + 1) % PROFESSIONS.length);
      } else if (key === 'ArrowUp' || key === 'ArrowLeft') {
        e.preventDefault();
        selectDifficulty((selectedDifficulty - 1 + PROFESSIONS.length) % PROFESSIONS.length);
      } else if (key === '1') selectDifficulty(0);
      else if (key === '2') selectDifficulty(1);
      else if (key === '3') selectDifficulty(2);
      else if (key === '4') selectDifficulty(3);
      else if (key === 'Enter' || key === ' ') {
        e.preventDefault();
        startGame();
      }
      break;

    case STATES.TRAVEL:
      if (key === ' ' || key === 'Enter') {
        e.preventDefault();
        advanceFromTravel();
      }
      break;

    case STATES.STOP:
      if (key === 'ArrowLeft' || key === 'ArrowRight') {
        e.preventDefault();
        selectedStopChoice = (key === 'ArrowLeft') ? 0 : 1;
        updateStopHighlight();
      } else if (key === 'ArrowUp' || key === 'ArrowDown') {
        e.preventDefault();
        selectedStopChoice = selectedStopChoice === 0 ? 1 : 0;
        updateStopHighlight();
      } else if (key === 'Enter' || key === ' ') {
        e.preventDefault();
        handleStopChoice(selectedStopChoice + 1);
      } else if (key === '1') {
        handleStopChoice(1);
      } else if (key === '2') {
        handleStopChoice(2);
      }
      break;

    case STATES.EVENT:
    case STATES.RIVER:
      if (!eventAnswered) {
        var ev = pendingEvents[currentEventIndex];
        if (ev && ev.choices.length > 0) {
          var numChoices = ev.choices.length;
          if (key === 'ArrowDown' || key === 'ArrowRight') {
            e.preventDefault();
            selectedEventChoice = (selectedEventChoice + 1) % numChoices;
            // Skip dimmed choice
            if (eventHinted && dimmedChoice === selectedEventChoice) selectedEventChoice = (selectedEventChoice + 1) % numChoices;
            updateChoiceHighlight();
          } else if (key === 'ArrowUp' || key === 'ArrowLeft') {
            e.preventDefault();
            selectedEventChoice = (selectedEventChoice - 1 + numChoices) % numChoices;
            if (eventHinted && dimmedChoice === selectedEventChoice) selectedEventChoice = (selectedEventChoice - 1 + numChoices) % numChoices;
            updateChoiceHighlight();
          } else if (key === 'Enter' || key === ' ') {
            e.preventDefault();
            if (!(eventHinted && dimmedChoice === selectedEventChoice)) {
              handleEventChoice(selectedEventChoice);
            }
          } else if (key === '1' || key === 'a' || key === 'A') handleEventChoice(0);
          else if (key === '2' || key === 'b' || key === 'B') handleEventChoice(1);
          else if (key === '3' || key === 'c' || key === 'C') handleEventChoice(2);
          else if (key === 'h' || key === 'H') handleEventHint();
        }
        // Fortune: space/enter to continue
        if (ev && ev.type === 'fortune' && (key === ' ' || key === 'Enter')) {
          e.preventDefault();
          advanceFromEvent();
        }
      } else {
        if (key === ' ' || key === 'Enter') {
          e.preventDefault();
          if (checkDeath()) return;
          advanceFromEvent();
        }
      }
      break;

    case STATES.DEATH:
      if (key === ' ' || key === 'Enter') {
        e.preventDefault();
        resetGame();
        renderTitleScreen();
        renderStatusBar();
      }
      break;

    case STATES.WIN:
      if (key === ' ' || key === 'Enter') {
        e.preventDefault();
        resetGame();
        renderTitleScreen();
        renderStatusBar();
      }
      break;
  }
});

// =====================================================================
// ANIMATION LOOP + TECH DEBT DRAIN
// =====================================================================
var lastTime = 0;
var drainAccumulator = 0;
var DRAIN_INTERVAL = 3000; // drain 1 HP every 3 seconds
var techDebtDeath = false;

function gameLoop(timestamp) {
  var dt = timestamp - lastTime;
  lastTime = timestamp;

  // Clamp dt to avoid huge jumps
  if (dt > 100) dt = 16;

  if (gameState === STATES.TRAVEL) {
    scrollX += dt * 0.03;
    wagonWheelAngle += dt * 0.004;
  } else if (gameState === STATES.TITLE) {
    scrollX += dt * 0.01;
  } else {
    // Gentle idle scroll
    scrollX += dt * 0.002;
  }

  // Tech debt drain: HP ticks down during active gameplay (disabled for Ralph Wiggum)
  var isForgiving = PROFESSIONS[difficulty] && PROFESSIONS[difficulty].forgiving;
  var isActive = gameState === STATES.STOP || gameState === STATES.EVENT || gameState === STATES.RIVER;
  if (isActive && !deathPending && !isForgiving) {
    drainAccumulator += dt;
    while (drainAccumulator >= DRAIN_INTERVAL) {
      drainAccumulator -= DRAIN_INTERVAL;
      health--;
      renderStatusBar();
      if (health <= 0) {
        techDebtDeath = true;
        enterDeath();
        break;
      }
    }
  }

  renderCanvas(timestamp);
  animFrame = requestAnimationFrame(gameLoop);
}

// =====================================================================
// INITIALIZATION
// =====================================================================
resetGame();
renderTitleScreen();
renderStatusBar();
updateMusicIndicator();
animFrame = requestAnimationFrame(gameLoop);
</script>
