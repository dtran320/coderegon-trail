<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Coderegon Trail - QMD Edition</title>
</head>
<body>
<div id="game-container">
  <div id="canvas-area">
    <canvas id="game-canvas" width="320" height="200"></canvas>
    <div id="music-indicator">M: Music</div>
  </div>
  <div id="text-panel"></div>
  <div id="status-bar"></div>
</div>

<script>
window.TRAIL_DATA = {"framework":"qmd","trailName":"The Hybrid Search Trail","sourceInfo":{"repo":"tobi/qmd","commit":"2b8f329","tag":"v2.0.1","snapshotDate":"2026-03-28"},"stops":[{"name":"Independence, MO","subtitle":"Query Input","concept":"Hybrid Search","landmarkType":"town","code":{"file":"src/cli/qmd.ts","content":"// src/cli/qmd.ts — CLI entry point (excerpt)\nimport { parseArgs } from \"util\";\nimport { hybridQuery, vectorSearchQuery, searchFTS,\n  createStore } from \"../store.js\";\n\nfunction parseCLI() {\n  const { values, positionals } = parseArgs({\n    args: process.argv.slice(2),\n    options: {\n      n: { type: \"string\" },\n      collection: { type: \"string\", short: \"c\", multiple: true },\n      explain: { type: \"boolean\" },\n      \"no-rerank\": { type: \"boolean\", default: false },\n      intent: { type: \"string\" },\n    },\n    allowPositionals: true,\n    strict: false,\n  });\n  return { command: positionals[0] || \"\",\n    query: positionals.slice(1).join(\" \"), values };

window.TRAIL_FLAVORS = [
  "The search index is freshly built today...",
  "Embeddings flow smoothly through the vector space...",
  "Your FTS5 tables are well-optimized...",
  "The BM25 scores look clean and accurate...",
  "A gentle breeze carries query results...",
  "The Qwen3 model hums along quietly...",
  "Document chunks persist without corruption...",
  "The hybrid pipeline handles queries with grace...",
  "Your TypeScript types provide comfort on the trail...",
  "The search loop is calm and responsive...",
  "A hawk circles overhead, watching your throughput...",
  "The trail ahead is well-indexed...",
  "Your error handling is robust today...",
  "The SQLite database is fresh and defragmented...",
  "Your dependency tree looks healthy..."
];

window.drawCustomEventOverlay = function(time) {
  if (!currentEventType && !currentEventTitle) return;

  var t = (time || 0) * 0.001; // seconds

  // --- SEARCH STORM: dark sky, lightning, rain ---
  if (currentEventTitle.indexOf('Search Storm') !== -1) {
    // Darken sky
    ctx.fillStyle = 'rgba(0,0,50,0.45)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning flash (periodic)
    var flashPhase = Math.sin(t * 1.7) + Math.sin(t * 3.1);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, 0, W, H);
      // Lightning bolt
      ctx.strokeStyle = '#FFFF55';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 80 + Math.sin(t * 2.3) * 60;
      ctx.moveTo(lx, 10);
      ctx.lineTo(lx - 5, 35);
      ctx.lineTo(lx + 8, 35);
      ctx.lineTo(lx - 3, 65);
      ctx.lineTo(lx + 10, 65);
      ctx.lineTo(lx + 2, 95);
      ctx.stroke();
    }
    // Rain
    ctx.strokeStyle = '#5555FF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 40; i++) {
      var rx = (i * 8.3 + t * 80) % W;
      var ry = (i * 13.7 + t * 120) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 1), Math.floor(ry + 5));
      ctx.stroke();
    }
    return;
  }

  // --- FELLOW TRAVELER: person standing by campfire ---
  if (currentEventTitle.indexOf('Fellow Traveler') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8); // torso
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3); // head
    ctx.fillRect(px - 1, py - 4, 2, 5); // left leg
    ctx.fillRect(px + 3, py - 4, 2, 5); // right leg
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Campfire
    var fx = 212, fy = 148;
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(fx - 3, fy, 2, 3);
    ctx.fillRect(fx + 3, fy, 2, 3);
    ctx.fillStyle = '#FF5555';
    var flicker = Math.sin(t * 8) * 2;
    ctx.fillRect(fx - 1, fy - 3 + Math.floor(flicker * 0.3), 4, 3);
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(fx, fy - 5 + Math.floor(flicker * 0.5), 2, 2);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(fx - 1, fy - 2, 4, 2);
    // Firelight glow (subtle)
    ctx.fillStyle = 'rgba(255,170,0,0.08)';
    ctx.beginPath();
    ctx.arc(fx + 1, fy - 2, 15, 0, Math.PI * 2);
    ctx.fill();
    return;
  }

  // --- SEARCH RIVER CROSSING: rough rapids with white water ---
  if (currentEventTitle.indexOf('Search River') !== -1) {
    // Extra turbulence on the river
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 20; i++) {
      var sx = (i * 17 + t * 40) % W;
      var sy = 157 + Math.sin((i * 3 + t * 5)) * 3;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 4, 2);
    }
    // Floating logs / debris
    ctx.fillStyle = '#AA5500';
    for (var i = 0; i < 3; i++) {
      var logX = (i * 110 + t * 25) % W;
      var logY = 159 + Math.sin(t * 2 + i) * 2;
      ctx.fillRect(Math.floor(logX), Math.floor(logY), 8, 2);
    }
    return;
  }

  // --- FUSION STORM: swirling colored particles converging ---
  if (currentEventTitle.indexOf('Fusion Storm') !== -1) {
    // Darken sky
    ctx.fillStyle = 'rgba(50,0,50,0.35)';
    ctx.fillRect(0, 0, W, 110);
    // Swirling colored particles representing ranked lists
    var colors = ['#55FFFF', '#FF55FF', '#FFFF55', '#55FF55'];
    for (var ci = 0; ci < colors.length; ci++) {
      ctx.fillStyle = colors[ci];
      for (var i = 0; i < 8; i++) {
        var angle = t * (1.5 + ci * 0.3) + i * Math.PI / 4;
        var radius = 30 + Math.sin(t * 0.7 + i) * 15;
        var cx = 160 + Math.cos(angle) * radius;
        var cy = 60 + Math.sin(angle) * radius * 0.6;
        ctx.fillRect(Math.floor(cx), Math.floor(cy), 3, 3);
      }
    }
    // Convergence point glow
    ctx.fillStyle = 'rgba(255,255,85,0.15)';
    ctx.beginPath();
    ctx.arc(160, 60, 12 + Math.sin(t * 3) * 4, 0, Math.PI * 2);
    ctx.fill();
    // Lightning between particles
    if (Math.sin(t * 2.5) > 0.7) {
      ctx.strokeStyle = '#FFFF55';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(140, 45);
      ctx.lineTo(160, 60);
      ctx.lineTo(180, 50);
      ctx.stroke();
    }
    return;
  }

  // --- RERANKER BREAKDOWN: red sky, smoke, warning ---
  if (currentEventTitle.indexOf('Reranker Breakdown') !== -1) {
    // Red danger tint
    ctx.fillStyle = 'rgba(170,0,0,0.25)';
    ctx.fillRect(0, 0, W, H);
    // Smoke particles rising
    ctx.fillStyle = '#555555';
    for (var i = 0; i < 15; i++) {
      var sx = 140 + Math.sin(i * 2.7 + t) * 30;
      var sy = 130 - ((t * 20 + i * 15) % 90);
      var size = 2 + (i % 3);
      ctx.globalAlpha = 0.3 + Math.sin(t + i) * 0.15;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), size, size);
    }
    ctx.globalAlpha = 1.0;
    // Fire at base
    ctx.fillStyle = '#FF5555';
    for (var i = 0; i < 8; i++) {
      var fx = 130 + i * 5;
      var fh = 4 + Math.sin(t * 6 + i * 1.5) * 3;
      ctx.fillRect(fx, Math.floor(140 - fh), 3, Math.floor(fh));
    }
    ctx.fillStyle = '#FFFF55';
    for (var i = 0; i < 5; i++) {
      var fx = 135 + i * 6;
      var fh = 2 + Math.sin(t * 8 + i * 2) * 2;
      ctx.fillRect(fx, Math.floor(139 - fh), 2, Math.floor(fh));
    }
    // Pulsing red border
    var pulse = (Math.sin(t * 4) + 1) * 0.15;
    ctx.strokeStyle = 'rgba(255,0,0,' + pulse.toFixed(2) + ')';
    ctx.lineWidth = 3;
    ctx.strokeRect(1, 1, W - 2, H - 2);
    ctx.lineWidth = 1;
    return;
  }

  // --- POSITION-AWARE PIONEER: person with lantern, stars ---
  if (currentEventTitle.indexOf('Position-Aware Pioneer') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3);
    ctx.fillRect(px - 1, py - 4, 2, 5);
    ctx.fillRect(px + 3, py - 4, 2, 5);
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Lantern
    ctx.fillStyle = '#FFFF55';
    var lanternGlow = 0.5 + Math.sin(t * 4) * 0.3;
    ctx.globalAlpha = lanternGlow;
    ctx.beginPath();
    ctx.arc(px + 8, py - 8, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1.0;
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px + 6, py - 10, 4, 4);
    // Stars twinkling
    ctx.fillStyle = '#FFFFFF';
    for (var i = 0; i < 10; i++) {
      var sx = 20 + i * 30;
      var sy = 10 + (i * 7) % 25;
      var twinkle = Math.sin(t * 3 + i * 1.5) > 0.3 ? 1.0 : 0.3;
      ctx.globalAlpha = twinkle;
      ctx.fillRect(sx, sy, 2, 2);
    }
    ctx.globalAlpha = 1.0;
    return;
  }
};
</script>
<script src="../engine.js"></script>
</body>
</html>
