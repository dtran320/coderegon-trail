<script>
window.TRAIL_DATA = {"framework":"qmd","trailName":"The Hybrid Search Trail","sourceInfo":{"repo":"tobi/qmd","commit":"2b8f329","tag":"v2.0.1","snapshotDate":"2026-03-28"},"stops":[{"name":"Independence, MO","subtitle":"Query Input","concept":"Hybrid Search","landmarkType":"town","code":{"file":"src/cli/qmd.ts","content":"// src/cli/qmd.ts — CLI entry point (excerpt)\nimport { parseArgs } from \"util\";\nimport { hybridQuery, vectorSearchQuery, searchFTS,\n  createStore } from \"../store.js\";\n\nfunction parseCLI() {\n  const { values, positionals } = parseArgs({\n    args: process.argv.slice(2),\n    options: {\n      n: { type: \"string\" },\n      collection: { type: \"string\", short: \"c\", multiple: true },\n      explain: { type: \"boolean\" },\n      \"no-rerank\": { type: \"boolean\", default: false },\n      intent: { type: \"string\" },\n    },\n    allowPositionals: true,\n    strict: false,\n  });\n  return { command: positionals[0] || \"\",\n    query: positionals.slice(1).join(\" \"), values };\n}\n\n// Command dispatch\nswitch (cli.command) {\n  case \"search\":  search(cli.query, cli.opts); break;\n  case \"vsearch\": await vectorSearch(cli.query, cli.opts); break;\n  case \"query\":   await querySearch(cli.query, cli.opts); break;\n}","language":"typescript"},"narration":"Every search journey starts here at Independence. QMD offers three trails: simple keyword search, vector semantic search, or the full hybrid pipeline. The CLI uses Node.js parseArgs to dispatch commands. The query command activates everything: expansion, parallel retrieval, fusion, reranking, and blending."},{"name":"Chimney Rock","subtitle":"Strong Signal Detection","concept":"Smart Chunking","landmarkType":"mountain","code":{"file":"src/store.ts","content":"// src/store.ts — Strong signal detection (excerpt)\nexport const STRONG_SIGNAL_MIN_SCORE = 0.85;\nexport const STRONG_SIGNAL_MIN_GAP = 0.15;\n\n// Inside hybridQuery():\n// Step 1: BM25 probe — strong signal skips expensive\n// LLM expansion\nconst initialFts = store.searchFTS(query, 20, collection);\nconst topScore = initialFts[0]?.score ?? 0;\nconst secondScore = initialFts[1]?.score ?? 0;\nconst hasStrongSignal = !intent\n  && initialFts.length > 0\n  && topScore >= STRONG_SIGNAL_MIN_SCORE\n  && (topScore - secondScore) >= STRONG_SIGNAL_MIN_GAP;\n\nif (hasStrongSignal) hooks?.onStrongSignal?.(topScore);\n\n// Step 2: Expand query (or skip if strong signal)\nconst expanded = hasStrongSignal\n  ? []\n  : await store.expandQuery(query, undefined, intent);","language":"typescript"},"narration":"At Chimney Rock, we check for strong signals before committing to the expensive trail ahead. A quick BM25 probe scores the top result. If it scores at least 0.85 AND the gap to the second result is at least 0.15, we have a strong signal and skip LLM expansion. Two conditions, not just one. Why pay for a guide when the landmark is right in front of you?"},{"name":"Fort Laramie","subtitle":"Query Expansion","concept":"Query Expansion","landmarkType":"camp","code":{"file":"src/llm.ts","content":"// src/llm.ts — Query expansion via fine-tuned model (excerpt)\nconst DEFAULT_GENERATE_MODEL =\n  \"hf:tobil/qmd-query-expansion-1.7B-gguf/\"\n  + \"qmd-query-expansion-1.7B-q4_k_m.gguf\";\n\nasync expandQuery(query: string, options = {})\n  : Promise<Queryable[]> {\n  const grammar = await llama.createGrammar({\n    grammar: `\n      root ::= line+\n      line ::= type \": \" content \"\\\\n\"\n      type ::= \"lex\" | \"vec\" | \"hyde\"\n      content ::= [^\\\\n]+\n    `\n  });\n\n  const prompt = `/no_think Expand this search query: ${query}`;\n  const result = await session.prompt(prompt, {\n    grammar, maxTokens: 600,\n    temperature: 0.7, topK: 20, topP: 0.8,\n  });\n\n  // Parse typed lines: lex:/vec:/hyde:\n  const queryables = result.trim().split(\"\\n\")\n    .map(line => {\n      const type = line.slice(0, line.indexOf(\":\")).trim();\n      const text = line.slice(line.indexOf(\":\") + 1).trim();\n      return { type, text };\n    }).filter(q => q.type === \"lex\"\n      || q.type === \"vec\" || q.type === \"hyde\");\n  return queryables;\n}","language":"typescript"},"narration":"Fort Laramie is where we recruit local guides. A fine-tuned Qwen3 1.7B model called qmd-query-expansion generates typed expansions. Each variant is tagged: lex for keyword search, vec for vector search, or hyde for hypothetical document embeddings. A constrained grammar ensures well-formed output. The cache prevents asking the same question twice."},{"name":"Independence Rock","subtitle":"Parallel Search","concept":"Hybrid Search","landmarkType":"mountain","code":{"file":"src/store.ts","content":"// src/store.ts — hybridQuery() type-routed search (excerpt)\n// Step 3: Route searches by query type\n\n// 3a: Run FTS for all lex expansions (sync/instant)\nfor (const q of expanded) {\n  if (q.type === 'lex') {\n    const ftsResults = store.searchFTS(q.query, 20, collection);\n    if (ftsResults.length > 0) {\n      rankedLists.push(ftsResults.map(r => ({\n        file: r.filepath, score: r.score,\n        displayPath: r.displayPath,\n        title: r.title, body: r.body || \"\",\n      })));\n    }\n  }\n}\n\n// 3b: Batch embed all vector queries in a single call\nconst vecQueries = [{ text: query, queryType: \"original\" }];\nfor (const q of expanded) {\n  if (q.type === 'vec' || q.type === 'hyde')\n    vecQueries.push({ text: q.query, queryType: q.type });\n}\nconst embeddings = await llm.embedBatch(\n  vecQueries.map(q => formatQueryForEmbedding(q.text))\n);","language":"typescript"},"narration":"At Independence Rock, the trail splits into parallel paths. Lex expansions go straight to FTS5 keyword search since it is synchronous and instant. Vec and hyde expansions get batch-embedded in one call, then each runs a sqlite-vec lookup. The original query always runs both paths. Type routing avoids wasted work."},{"name":"South Pass","subtitle":"Reciprocal Rank Fusion","concept":"Position-Aware Blending","landmarkType":"river","code":{"file":"src/store.ts","content":"// src/store.ts — Reciprocal Rank Fusion (excerpt)\nexport function reciprocalRankFusion(\n  resultLists: RankedResult[][],\n  weights: number[] = [],\n  k: number = 60\n): RankedResult[] {\n  const scores = new Map<string, {\n    result: RankedResult; rrfScore: number;\n    topRank: number }>;\n\n  for (let listIdx = 0; listIdx < resultLists.length; listIdx++) {\n    const weight = weights[listIdx] ?? 1.0;\n    for (let rank = 0; rank < list.length; rank++) {\n      const rrfContribution = weight / (k + rank + 1);\n      // Accumulate per-document scores\n      existing.rrfScore += rrfContribution;\n    }\n  }\n\n  // Top-rank bonus\n  for (const entry of scores.values()) {\n    if (entry.topRank === 0) entry.rrfScore += 0.05;\n    else if (entry.topRank <= 2) entry.rrfScore += 0.02;\n  }\n  return Array.from(scores.values())\n    .sort((a, b) => b.rrfScore - a.rrfScore)\n    .map(e => ({ ...e.result, score: e.rrfScore }));\n}","language":"typescript"},"narration":"South Pass is where all the ranked lists converge into one river. Reciprocal Rank Fusion scores each document as weight divided by K plus rank plus 1. The first two lists, original FTS and original vector, get 2x weight because the user's exact words matter most. A top-rank bonus rewards documents that appeared at rank 1 across any list."},{"name":"Fort Bridger","subtitle":"LLM Re-ranking","concept":"Hybrid Search","landmarkType":"forest","code":{"file":"src/llm.ts","content":"// src/llm.ts — Reranking via createRankingContext (excerpt)\nconst DEFAULT_RERANK_MODEL =\n  \"hf:ggml-org/Qwen3-Reranker-0.6B-Q8_0-GGUF/\"\n  + \"qwen3-reranker-0.6b-q8_0.gguf\";\n\nprivate async ensureRerankContexts() {\n  const model = await this.ensureRerankModel();\n  const n = Math.min(\n    await this.computeParallelism(1000), 4);\n  for (let i = 0; i < n; i++) {\n    this.rerankContexts.push(\n      await model.createRankingContext({\n        contextSize: 2048, flashAttention: true,\n      }));\n  }\n}\n\nasync rerank(query, documents, options) {\n  const contexts = await this.ensureRerankContexts();\n  // Split docs across contexts for parallel eval\n  const chunks = splitIntoChunks(texts, contexts.length);\n  const allScores = await Promise.all(\n    chunks.map((chunk, i) =>\n      contexts[i].rankAll(query, chunk))\n  );\n  return texts.map((t, i) =>\n    ({ document: t, score: allScores.flat()[i] }))\n    .sort((a, b) => b.score - a.score);\n}","language":"typescript"},"narration":"Deep in the forest at Fort Bridger, the Qwen3 Reranker 0.6B acts as a wise judge. It uses createRankingContext and rankAll from node-llama-cpp to score each candidate chunk against the query. Up to 4 contexts run in parallel for throughput. The candidate limit is 40, not 30, keeping ranks 31 through 40 visible to catch broad queries."},{"name":"The Dalles","subtitle":"Position-Aware Blending","concept":"Position-Aware Blending","landmarkType":"camp","code":{"file":"src/store.ts","content":"// src/store.ts — Position-aware blending (excerpt)\nexport const RERANK_CANDIDATE_LIMIT = 40;\n\n// Step 7: Blend RRF position score with reranker score\nconst blended = reranked.map(r => {\n  const rrfRank = rrfRankMap.get(r.file) || candidateLimit;\n  let rrfWeight: number;\n  // Top tier: ranks 1-3 — trust retrieval most\n  if (rrfRank <= 3) rrfWeight = 0.75;\n  // Mid tier: ranks 4-10 — balanced\n  else if (rrfRank <= 10) rrfWeight = 0.60;\n  // Tail tier: ranks 11+ — trust reranker more\n  else rrfWeight = 0.40;\n\n  const rrfScore = 1 / rrfRank;\n  const blendedScore =\n    rrfWeight * rrfScore\n    + (1 - rrfWeight) * r.score;\n\n  return {\n    file: r.file,\n    score: blendedScore,\n    tier: rrfRank <= 3 ? 'top'\n      : rrfRank <= 10 ? 'mid' : 'tail'\n  };\n}).sort((a, b) => b.score - a.score);","language":"typescript"},"narration":"At The Dalles, we blend retrieval and reranker scores with position awareness. Top 3 results get 75 percent retrieval weight because BM25 and vector hits at the top are usually precise. Mid-tier ranks 4 through 10 are 60/40. Tail ranks 11 and beyond flip to 40/60, trusting the reranker to separate borderline relevant from irrelevant."},{"name":"Oregon City","subtitle":"Result Formatting","concept":"Smart Chunking","landmarkType":"town","code":{"file":"src/cli/formatter.ts","content":"// src/cli/formatter.ts — Output formatting (excerpt)\nexport type OutputFormat =\n  \"cli\" | \"csv\" | \"md\" | \"xml\" | \"files\" | \"json\";\n\nexport function formatSearchResults(\n  results: SearchResult[],\n  format: OutputFormat,\n  opts: FormatOptions = {}\n): string {\n  switch (format) {\n    case \"json\":\n      return searchResultsToJson(results, opts);\n    case \"csv\":\n      return searchResultsToCsv(results, opts);\n    case \"files\":\n      return searchResultsToFiles(results);\n    case \"md\":\n      return searchResultsToMarkdown(results, opts);\n    case \"xml\":\n      return searchResultsToXml(results, opts);\n    default:\n      return searchResultsToJson(results, opts);\n  }\n}\n\nexport function searchResultsToJson(\n  results: SearchResult[], opts = {}\n): string {\n  return JSON.stringify(results.map(row => ({\n    docid: `#${row.docid}`,\n    score: Math.round(row.score * 100) / 100,\n    file: row.displayPath,\n    title: row.title,\n  })), null, 2);\n}","language":"typescript"},"narration":"You made it to Oregon City! The final stop formats results for humans or machines. Six output formats: CLI with colors, JSON for AI agents, CSV, Markdown, XML, and a simple files list. Each result carries a docid, score, file path, and title. The journey from raw query to ranked results is complete."}],"events":[{"type":"weather","trigger":"after_stop","triggerStop":1,"title":"A Search Storm Is Brewing!","text":"Dark clouds gather over the trail. Lightning illuminates three possible paths through the storm. What happens when you run `qmd query \"deploy\"`?","choices":[{"text":"Full hybrid pipeline with expansion, parallel search, fusion, reranking, and blending","correct":true,"explanation":"The `query` command activates the complete hybrid pipeline: LLM expansion generates typed variants, BM25 and vector search run in parallel, RRF fuses the ranked lists, the reranker judges candidates, and position-aware blending produces the final ranking."},{"text":"Just BM25 keyword search against the FTS5 index","correct":false,"explanation":"That would be the `search` command. The `query` command goes further with expansion, vector search, fusion, reranking, and blending."},{"text":"Just vector semantic search using embeddings","correct":false,"explanation":"That would be the `vsearch` command. The `query` command combines both keyword and semantic search with additional intelligence layers."}],"concept":"Hybrid Search","difficulty":"easy"},{"type":"encounter","trigger":"after_stop","triggerStop":2,"title":"A Fellow Traveler Shares Wisdom!","text":"A seasoned search engineer approaches your wagon. 'I see you check for strong BM25 signals before calling the LLM,' they say. 'Smart move.' Why check for strong BM25 signals before LLM expansion?","choices":[{"text":"Skip expensive LLM calls when an excellent exact match is already found","correct":true,"explanation":"If BM25 already finds a strong match above 0.85 with a gap of 0.15 to the runner-up, there is no need to spend time and compute on LLM query expansion. It is an optimization that avoids unnecessary work."},{"text":"BM25 is always more accurate than any other search method","correct":false,"explanation":"BM25 is great for exact keyword matches but misses conceptually similar documents with different vocabulary. The strong signal check is about efficiency, not superiority."},{"text":"LLMs are unreliable and should be avoided whenever possible","correct":false,"explanation":"LLMs are quite useful for query expansion and reranking. The strong signal check is an optimization, not a judgment on LLM quality."}],"concept":"Smart Chunking","difficulty":"easy"},{"type":"river","trigger":"after_stop","triggerStop":4,"title":"The Search River Crossing!","text":"You have reached a wide river where two search currents merge. On one bank, keywords. On the other, embeddings. How does semantic search differ from keyword search?","choices":[{"text":"Finds conceptually similar documents even when they use completely different words","correct":true,"explanation":"Vector semantic search converts text to embeddings that capture meaning. A search for 'deploy' can find documents about 'release pipeline' or 'shipping code' because the vectors are close in embedding space."},{"text":"It is faster because embeddings are precomputed","correct":false,"explanation":"Speed is not the key difference. Semantic search is about finding meaning-based similarity, not just matching the exact words in the query."},{"text":"It uses regular expressions to find pattern matches","correct":false,"explanation":"Regex is a completely different approach. Semantic search uses neural network embeddings to capture the meaning of text, not pattern matching."}],"concept":"Hybrid Search","difficulty":"medium"},{"type":"weather","trigger":"after_stop","triggerStop":5,"title":"Fusion Storm!","text":"A violent storm of ranked lists crashes together at South Pass. BM25 results, vector results, and expanded query results all compete for position. Why weight the original query 2x in RRF?","choices":[{"text":"The user's exact words should have more influence than LLM-generated expansions","correct":true,"explanation":"The original query directly reflects the user's intent. Expanded variants are helpful for coverage but the user's own words deserve more weight. Double weighting ensures the original query's top hits stay prominent."},{"text":"It is a random implementation choice with no particular reasoning","correct":false,"explanation":"The 2x weight is deliberate. The user typed those exact words for a reason. Expansion variants help find more results but should not override the user's stated intent."},{"text":"Expanded queries are inherently less accurate than the original","correct":false,"explanation":"Expansions are not less accurate — they find different relevant documents. The 2x weight is about respecting user intent, not about accuracy of expansions."}],"concept":"Query Expansion","difficulty":"medium"},{"type":"misfortune","trigger":"after_stop","triggerStop":6,"title":"Reranker Breakdown!","text":"Disaster strikes! The reranker has gone haywire, promoting strange documents to the top of your results. What could go wrong if you ONLY used the reranker for final ranking?","choices":[{"text":"It might demote exact keyword matches the user specifically searched for","correct":true,"explanation":"A cross-encoder reranker optimizes for semantic relevance but can miss the importance of exact keyword matches. If someone searches for a specific function name, the reranker might rank a conceptually similar but different function higher."},{"text":"It would be too slow to return any results at all","correct":false,"explanation":"The reranker is slower than BM25 but still returns results. The real issue is ranking quality for exact matches, not speed."},{"text":"Rerankers cannot process text longer than 100 characters","correct":false,"explanation":"Modern rerankers handle substantial text. The issue is about ranking priorities, not input limitations."}],"concept":"Position-Aware Blending","difficulty":"medium"},{"type":"encounter","trigger":"after_stop","triggerStop":7,"title":"Position-Aware Pioneer!","text":"A pioneer who has traveled this trail before shares their hard-won knowledge. 'Trust retrieval for the top ranks,' they say. Why trust retrieval more for top-ranked results?","choices":[{"text":"Top BM25 and vector hits are usually precise; the reranker adds value for borderline results lower in the list","correct":true,"explanation":"When BM25 or vector search puts something at rank 1, it is almost certainly relevant. The reranker shines at positions 11 and beyond where it can distinguish truly relevant borderline results from noise. That is why ranks 1-3 get 75% retrieval weight."},{"text":"The reranker is always wrong for top-ranked results","correct":false,"explanation":"The reranker is not always wrong — it is just less needed at the top. Retrieval already did a good job finding the best matches. The reranker's value increases as you go further down the list."},{"text":"It is purely a performance optimization to skip reranking top results","correct":false,"explanation":"Position-aware blending does not skip the reranker for top results. It uses different weight ratios: 75/25 at the top, 60/40 in the middle, 40/60 at the tail. Both signals contribute everywhere."}],"concept":"Position-Aware Blending","difficulty":"hard"}],"partyMembers":[{"name":"Hybrid Search","icon":"server","maxHealth":3},{"name":"Smart Chunking","icon":"data","maxHealth":3},{"name":"Query Expansion","icon":"router","maxHealth":3},{"name":"Position-Aware Blending","icon":"layout","maxHealth":3}],"deathMessages":["Died of zero search results. No index configured.","Lost in the embedding space \u2014 no nearest neighbors found.","Drowned in the fusion river. Too many ranked lists to combine.","Starved waiting for the LLM to expand your query. Model download timed out.","Killed by a reranker hallucination. Irrelevant doc promoted to #1.","Your chunking was too aggressive. Semantic meaning was lost.","Died of dysentery... er, dependency conflicts with node-llama-cpp.","Buried under 100,000 unindexed documents."]};

window.drawCustomEventOverlay = function(time) {
  if (!currentEventType && !currentEventTitle) return;

  var t = (time || 0) * 0.001; // seconds

  // --- SEARCH STORM: dark sky, lightning, rain ---
  if (currentEventTitle.indexOf('Search Storm') !== -1) {
    // Darken sky
    ctx.fillStyle = 'rgba(0,0,50,0.45)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning flash (periodic)
    var flashPhase = Math.sin(t * 1.7) + Math.sin(t * 3.1);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, 0, W, H);
      // Lightning bolt
      ctx.strokeStyle = '#FFFF55';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 80 + Math.sin(t * 2.3) * 60;
      ctx.moveTo(lx, 10);
      ctx.lineTo(lx - 5, 35);
      ctx.lineTo(lx + 8, 35);
      ctx.lineTo(lx - 3, 65);
      ctx.lineTo(lx + 10, 65);
      ctx.lineTo(lx + 2, 95);
      ctx.stroke();
    }
    // Rain
    ctx.strokeStyle = '#5555FF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 40; i++) {
      var rx = (i * 8.3 + t * 80) % W;
      var ry = (i * 13.7 + t * 120) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 1), Math.floor(ry + 5));
      ctx.stroke();
    }
    return;
  }

  // --- FELLOW TRAVELER: person standing by campfire ---
  if (currentEventTitle.indexOf('Fellow Traveler') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8); // torso
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3); // head
    ctx.fillRect(px - 1, py - 4, 2, 5); // left leg
    ctx.fillRect(px + 3, py - 4, 2, 5); // right leg
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Campfire
    var fx = 212, fy = 148;
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(fx - 3, fy, 2, 3);
    ctx.fillRect(fx + 3, fy, 2, 3);
    ctx.fillStyle = '#FF5555';
    var flicker = Math.sin(t * 8) * 2;
    ctx.fillRect(fx - 1, fy - 3 + Math.floor(flicker * 0.3), 4, 3);
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(fx, fy - 5 + Math.floor(flicker * 0.5), 2, 2);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(fx - 1, fy - 2, 4, 2);
    // Firelight glow (subtle)
    ctx.fillStyle = 'rgba(255,170,0,0.08)';
    ctx.beginPath();
    ctx.arc(fx + 1, fy - 2, 15, 0, Math.PI * 2);
    ctx.fill();
    return;
  }

  // --- SEARCH RIVER CROSSING: rough rapids with white water ---
  if (currentEventTitle.indexOf('Search River') !== -1) {
    // Extra turbulence on the river
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 20; i++) {
      var sx = (i * 17 + t * 40) % W;
      var sy = 157 + Math.sin((i * 3 + t * 5)) * 3;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 4, 2);
    }
    // Floating logs / debris
    ctx.fillStyle = '#AA5500';
    for (var i = 0; i < 3; i++) {
      var logX = (i * 110 + t * 25) % W;
      var logY = 159 + Math.sin(t * 2 + i) * 2;
      ctx.fillRect(Math.floor(logX), Math.floor(logY), 8, 2);
    }
    return;
  }

  // --- FUSION STORM: swirling colored particles converging ---
  if (currentEventTitle.indexOf('Fusion Storm') !== -1) {
    // Darken sky
    ctx.fillStyle = 'rgba(50,0,50,0.35)';
    ctx.fillRect(0, 0, W, 110);
    // Swirling colored particles representing ranked lists
    var colors = ['#55FFFF', '#FF55FF', '#FFFF55', '#55FF55'];
    for (var ci = 0; ci < colors.length; ci++) {
      ctx.fillStyle = colors[ci];
      for (var i = 0; i < 8; i++) {
        var angle = t * (1.5 + ci * 0.3) + i * Math.PI / 4;
        var radius = 30 + Math.sin(t * 0.7 + i) * 15;
        var cx = 160 + Math.cos(angle) * radius;
        var cy = 60 + Math.sin(angle) * radius * 0.6;
        ctx.fillRect(Math.floor(cx), Math.floor(cy), 3, 3);
      }
    }
    // Convergence point glow
    ctx.fillStyle = 'rgba(255,255,85,0.15)';
    ctx.beginPath();
    ctx.arc(160, 60, 12 + Math.sin(t * 3) * 4, 0, Math.PI * 2);
    ctx.fill();
    // Lightning between particles
    if (Math.sin(t * 2.5) > 0.7) {
      ctx.strokeStyle = '#FFFF55';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(140, 45);
      ctx.lineTo(160, 60);
      ctx.lineTo(180, 50);
      ctx.stroke();
    }
    return;
  }

  // --- RERANKER BREAKDOWN: red sky, smoke, warning ---
  if (currentEventTitle.indexOf('Reranker Breakdown') !== -1) {
    // Red danger tint
    ctx.fillStyle = 'rgba(170,0,0,0.25)';
    ctx.fillRect(0, 0, W, H);
    // Smoke particles rising
    ctx.fillStyle = '#555555';
    for (var i = 0; i < 15; i++) {
      var sx = 140 + Math.sin(i * 2.7 + t) * 30;
      var sy = 130 - ((t * 20 + i * 15) % 90);
      var size = 2 + (i % 3);
      ctx.globalAlpha = 0.3 + Math.sin(t + i) * 0.15;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), size, size);
    }
    ctx.globalAlpha = 1.0;
    // Fire at base
    ctx.fillStyle = '#FF5555';
    for (var i = 0; i < 8; i++) {
      var fx = 130 + i * 5;
      var fh = 4 + Math.sin(t * 6 + i * 1.5) * 3;
      ctx.fillRect(fx, Math.floor(140 - fh), 3, Math.floor(fh));
    }
    ctx.fillStyle = '#FFFF55';
    for (var i = 0; i < 5; i++) {
      var fx = 135 + i * 6;
      var fh = 2 + Math.sin(t * 8 + i * 2) * 2;
      ctx.fillRect(fx, Math.floor(139 - fh), 2, Math.floor(fh));
    }
    // Pulsing red border
    var pulse = (Math.sin(t * 4) + 1) * 0.15;
    ctx.strokeStyle = 'rgba(255,0,0,' + pulse.toFixed(2) + ')';
    ctx.lineWidth = 3;
    ctx.strokeRect(1, 1, W - 2, H - 2);
    ctx.lineWidth = 1;
    return;
  }

  // --- POSITION-AWARE PIONEER: person with lantern, stars ---
  if (currentEventTitle.indexOf('Position-Aware Pioneer') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3);
    ctx.fillRect(px - 1, py - 4, 2, 5);
    ctx.fillRect(px + 3, py - 4, 2, 5);
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Lantern
    ctx.fillStyle = '#FFFF55';
    var lanternGlow = 0.5 + Math.sin(t * 4) * 0.3;
    ctx.globalAlpha = lanternGlow;
    ctx.beginPath();
    ctx.arc(px + 8, py - 8, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1.0;
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px + 6, py - 10, 4, 4);
    // Stars twinkling
    ctx.fillStyle = '#FFFFFF';
    for (var i = 0; i < 10; i++) {
      var sx = 20 + i * 30;
      var sy = 10 + (i * 7) % 25;
      var twinkle = Math.sin(t * 3 + i * 1.5) > 0.3 ? 1.0 : 0.3;
      ctx.globalAlpha = twinkle;
      ctx.fillRect(sx, sy, 2, 2);
    }
    ctx.globalAlpha = 1.0;
    return;
  }
};
</script>
