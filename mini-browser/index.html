        "content": "// src/html/html_tokenizer.cpp\nstd::vector<TOKEN> tokenize(const std::string &html)\n{\n    std::vector<TOKEN> tokens;\n    size_t pos = 0;\n    while (pos < html.size())\n    {\n        if (html[pos] == '<' && pos + 1 < html.size()\n            && html[pos + 1] == '!')\n        {\n            size_t end_pos = html.find('>', pos);\n            if (end_pos != std::string::npos) {\n                pos = end_pos + 1;\n                continue;\n            }\n        }\n        if (html[pos] == '<')\n        {\n            size_t end_pos = html.find('>', pos);\n            if (end_pos != std::string::npos)\n            {\n                if (html[pos + 1] == '/') {\n                    tokens.push_back({TOKEN_TYPE::END_TAG,\n                        html.substr(pos + 2, end_pos - pos - 2), {}});\n                } else {\n                    std::string full_tag =\n                        html.substr(pos + 1, end_pos - pos - 1);\n                    size_t space_pos = full_tag.find(' ');\n                    std::string tag_name;\n                    std::map<std::string, std::string> attrs;\n                    if (space_pos != std::string::npos) {\n                        tag_name = full_tag.substr(0, space_pos);\n                        attrs = parse_attribute(\n                            full_tag.substr(space_pos + 1));\n                    } else {\n                        tag_name = full_tag;\n                    }\n                    tokens.push_back(\n                        {TOKEN_TYPE::START_TAG, tag_name, attrs});\n                }\n                pos = end_pos + 1;\n            } else {\n                throw std::runtime_error(\n                    \"INVALIDE HTML: NO CLOSING TAG\");\n            }\n        } else {\n            size_t end_pos = html.find('<', pos);\n            std::string text =\n                html.substr(pos, end_pos - pos);\n            normalize_whitespace(text);\n            if (!text.empty()) {\n                tokens.push_back({TOKEN_TYPE::TEXT, text});\n            }\n            pos = end_pos;\n        }\n    }\n    return tokens;\n}",

        "content": "// src/html/html_parser.cpp\nstd::shared_ptr<NODE> parse(const std::vector<TOKEN> &tokens)\n{\n    std::set<std::string> void_elements =\n        {\"meta\", \"link\", \"img\", \"br\", \"hr\", \"input\"};\n    std::vector<std::shared_ptr<NODE>> stack;\n    std::shared_ptr<NODE> root = nullptr;\n\n    for (auto &token : tokens)\n    {\n        if (token.type == TOKEN_TYPE::START_TAG)\n        {\n            bool is_void = void_elements.find(token.value)\n                != void_elements.end();\n            std::shared_ptr<NODE> new_node = create_node(token);\n            if (!stack.empty()) {\n                stack.back()->add_child(new_node);\n            } else {\n                root = new_node;\n            }\n            if (!is_void) {\n                stack.push_back(new_node);\n            }\n            continue;\n        }\n        else if (token.type == TOKEN_TYPE::TEXT)\n        {\n            if (!stack.empty()) {\n                stack.back()->add_child(create_node(token));\n            }\n            continue;\n        }\n        else  // END_TAG\n        {\n            if (!stack.empty()) {\n                stack.pop_back();\n            }\n        }\n    }\n    return root;\n}",

        "content": "// src/css/css_parser.cpp\nstd::string extract_stylesheets(std::shared_ptr<NODE> dom)\n{\n    std::string css;\n    std::queue<std::shared_ptr<NODE>> q;\n    q.push(dom);\n    while (!q.empty())\n    {\n        auto node = q.front();\n        q.pop();\n        if (node->get_tag_name() == \"style\")\n        {\n            for (const auto &child : node->get_children()) {\n                if (child->get_type() == NODE_TYPE::TEXT)\n                    css += child->get_text_content();\n            }\n            css += '\\n';\n        }\n        for (const auto &child : node->get_children())\n            q.push(child);\n    }\n    return css;\n}\n\nstd::vector<CSS_RULE> parse_css(const std::string &css)\n{\n    size_t pos = 0;\n    std::vector<CSS_RULE> result;\n    while (pos < css.size())\n    {\n        skip_space(pos, css);\n        // Skip /* */ comments\n        if (pos + 1 < css.size() && css[pos] == '/'\n            && css[pos + 1] == '*') {\n            pos += 2;\n            while (pos + 1 < css.size()) {\n                if (css[pos] == '*' && css[pos + 1] == '/') {\n                    pos += 2; break;\n                }\n                ++pos;\n            }\n            continue;\n        }\n        size_t block_start = css.find('{', pos);\n        size_t block_end = css.find('}', pos);\n        if (block_start != std::string::npos) {\n            std::string selector =\n                css.substr(pos, block_start - pos);\n            trim(selector);\n            auto style = parse_inline_style(\n                css.substr(block_start + 1,\n                    block_end - block_start - 1));\n            CSS_RULE rule(selector);\n            for (const auto &[prop, val] : style)\n                rule.declarations.push_back({prop, val});\n            result.push_back(rule);\n            pos = block_end + 1;\n        } else { break; }\n    }\n    return result;\n}",
        "language": "cpp"

        "content": "// src/css/cssom.cpp\nstd::vector<CSS_RULE> CSSOM::matching_rules(\n    std::shared_ptr<NODE> node)\n{\n    std::vector<CSS_RULE> matched;\n    for (auto &rule : m_rules)\n    {\n        rule.selector.erase(\n            std::remove_if(rule.selector.begin(),\n                rule.selector.end(),\n                [](unsigned char c){ return std::isspace(c); }),\n            rule.selector.end());\n        auto multiple_selectors =\n            split(rule.selector, ',');\n        for (auto selector : multiple_selectors) {\n            if (matches(selector, node))\n                matched.push_back(rule);\n        }\n    }\n    return matched;\n}\n\nbool CSSOM::matches(const std::string &selector,\n    std::shared_ptr<NODE> node)\n{\n    if (selector[0] == '.') {\n        std::string class_value =\n            node->get_attribute(\"class\");\n        std::vector<std::string> classes =\n            split(class_value, ' ');\n        for (const auto &cls : classes) {\n            if (cls == selector.substr(1))\n                return true;\n        }\n        return false;\n    }\n    else if (selector[0] == '#') {\n        return node->get_attribute(\"id\")\n            == selector.substr(1);\n    }\n    else {\n        return node->get_tag_name() == selector;\n    }\n}",

        "content": "// src/css/apply_style.cpp\nvoid apply_style(std::shared_ptr<NODE> node,\n    CSSOM &cssom)\n{\n    static bool setters_initialized = false;\n    if (!setters_initialized) {\n        COMPUTED_STYLE::init_setters();\n        setters_initialized = true;\n    }\n    std::queue<std::pair<std::shared_ptr<NODE>,\n        COMPUTED_STYLE>> q;\n    COMPUTED_STYLE root_style;\n    q.push({node, root_style});\n\n    while (!q.empty()) {\n        auto [current_node, parent_style] = q.front();\n        q.pop();\n        if (current_node != node) {\n            current_node->set_style(\"color\",\n                parent_style.inherit_color());\n            current_node->set_style(\"font-size\",\n                parent_style.inherit_font_size());\n            current_node->set_style(\"font-weight\",\n                parent_style.inherit_font_weight());\n            current_node->set_style(\"font-family\",\n                parent_style.inherit_font_family());\n            current_node->set_style(\"text-align\",\n                parent_style.inherit_text_align());\n        }\n        auto matched = cssom.matching_rules(current_node);\n        for (const auto &rule : matched) {\n            for (const auto &decl : rule.declarations)\n                current_node->set_style(\n                    decl.property, decl.value);\n        }\n        std::string inline_style =\n            current_node->get_attribute(\"style\");\n        for (const auto& [prop, val] :\n             parse_inline_style(inline_style))\n            current_node->set_style(prop, val);\n\n        COMPUTED_STYLE current_style =\n            current_node->get_all_styles();\n        for (auto child : current_node->get_children())\n            q.push({child, current_style});\n    }\n}",

        "content": "// src/css/layout_tree.cpp\nLAYOUT_BOX create_layout_tree(\n    std::shared_ptr<NODE> root,\n    float parent_width,\n    LINE_STATE &line,\n    const QString &base_url,\n    IMAGE_CACHE_MANAGER *image_cache_manager)\n{\n    LAYOUT_BOX box;\n    box.node = root;\n    box.style = root->get_all_styles();\n\n    // Skip display:none elements\n    if (box.style.display == DISPLAY_TYPE::NONE)\n        return box;\n\n    // Dispatch to specialized layout handlers\n    if (root->get_tag_name() == \"img\"\n        && image_cache_manager != nullptr)\n        return layout_image_element(\n            root, base_url, image_cache_manager, line);\n\n    if (root->get_type() == NODE_TYPE::TEXT) {\n        std::string text = root->get_text_content();\n        text.erase(0,\n            text.find_first_not_of(\" \\t\\n\\r\"));\n        text.erase(\n            text.find_last_not_of(\" \\t\\n\\r\") + 1);\n        if (!text.empty())\n            return layout_text_element(\n                root, box.style, line);\n        return box;\n    }\n\n    if (box.style.display == DISPLAY_TYPE::BLOCK)\n        return layout_block_element(root,\n            parent_width, line, base_url,\n            image_cache_manager);\n\n    if (box.style.display == DISPLAY_TYPE::INLINE)\n        return layout_inline_element(root,\n            parent_width, line, base_url,\n            image_cache_manager);\n\n    return box;\n}",

  "Angle brackets pass by like mile markers on the trail...",
  "The DOM tree grows taller with each parsed element...",
  "Shared pointers keep your nodes alive and connected...",
  "CSS rules cascade like waterfalls along the trail...",
  "The style computation engine resolves property conflicts...",
  "QFontMetrics measures each word with pixel precision...",
  "Layout boxes stack and flow across the viewport...",
  "The paint queue is clear and the QPainter is ready...",
  "A gentle breeze carries well-formed HTML your way...",
  "Your party's computed styles look sharp and resolved...",
  "Block elements march in orderly vertical columns...",
  "Inline elements flow like a river of text across the page...",
  "The user agent stylesheet provides sensible defaults..."
];
// END FLAVORS

window.drawCustomEventOverlay = function(time) {
  if (!currentEventType && !currentEventTitle) return;
  var t = (time || 0) * 0.001;

// OVERLAYS
  // --- RENDERING STORM: dark sky, falling angle brackets ---
  if (currentEventTitle.indexOf('Rendering Storm') !== -1) {
    ctx.fillStyle = 'rgba(0,0,50,0.45)';
    ctx.fillRect(0, 0, W, 110);
    var flashPhase = Math.sin(t * 1.7) + Math.sin(t * 3.1);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, 0, W, H);
    }
    ctx.fillStyle = '#7B68EE';
    ctx.font = '10px monospace';
    for (var i = 0; i < 20; i++) {
      var bx = (i * 17 + t * 30) % W;
      var by = (i * 23 + t * 60) % 110;
      ctx.fillText(i % 2 === 0 ? '<' : '>', Math.floor(bx), Math.floor(by));
    }
    return;
  }

  // --- PIPELINE CROSSING: turbulent data stream ---
  if (currentEventTitle.indexOf('Pipeline') !== -1 || currentEventTitle.indexOf('Cascade') !== -1) {
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 20; i++) {
      var sx = (i * 17 + t * 40) % W;
      var sy = 157 + Math.sin((i * 3 + t * 5)) * 3;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 4, 2);
    }
    ctx.fillStyle = '#4682B4';
    ctx.font = '6px monospace';
    for (var i = 0; i < 8; i++) {
      var hx = (i * 42 + t * 25) % W;
      var hy = 159 + Math.sin(t * 2 + i) * 2;
      ctx.fillText('0x' + ((i * 37 + Math.floor(t)) % 256).toString(16), Math.floor(hx), Math.floor(hy));
    }
    return;
  }

  // --- DEVELOPER ENCOUNTER: pixel art developer ---
  if (currentEventTitle.indexOf('Developer') !== -1 || currentEventTitle.indexOf('Mentor') !== -1) {
    var px = 200, py = 142;
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3);
    ctx.fillRect(px - 1, py - 4, 2, 5);
    ctx.fillRect(px + 3, py - 4, 2, 5);
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Laptop
    ctx.fillStyle = '#AAAAAA';
    ctx.fillRect(px + 8, py - 8, 8, 6);
    ctx.fillStyle = '#55AAFF';
    ctx.fillRect(px + 9, py - 7, 6, 4);
    return;
  }

  // --- BUG REPORT: red danger tint ---
  if (currentEventTitle.indexOf('Bug') !== -1 || currentEventTitle.indexOf('Segfault') !== -1 || currentEventTitle.indexOf('Overflow') !== -1) {
    ctx.fillStyle = 'rgba(170,0,0,0.25)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#FF5555';
    ctx.font = '8px monospace';
    for (var i = 0; i < 6; i++) {
      var ex = 40 + Math.sin(t * 2 + i * 1.5) * 100;
      var ey = 30 + (i * 20 + t * 15) % 120;
      ctx.fillText('SEGFAULT', Math.floor(ex), Math.floor(ey));
    }
    var pulse = (Math.sin(t * 4) + 1) * 0.15;
    ctx.strokeStyle = 'rgba(255,0,0,' + pulse.toFixed(2) + ')';
    ctx.lineWidth = 3;
    ctx.strokeRect(1, 1, W - 2, H - 2);
    ctx.lineWidth = 1;
    return;
  }
// END OVERLAYS
};
</script>
