window.TRAIL_DATA = {"framework":"spacetimedb","trailName":"The Spacetime Trail","sourceInfo":{"repo":"clockworklabs/SpacetimeDB","commit":"e33cefb","tag":"","snapshotDate":"2026-03-28"},"stops":[{"name":"Independence, MO","subtitle":"Client Connection","concept":"Reducers","landmarkType":"town","code":{"file":"// spacetimedb-rust-sdk (separate repo)","content":"// spacetimedb-rust-sdk — client connection setup\nuse spacetimedb_sdk::DbConnection;\n\npub async fn connect(\n    host: &str,\n    db_name: &str,\n    token: Option<String>,\n) {\n    let mut builder = DbConnection::builder()\n        .with_uri(format!(\n            \"wss://{}/database/{}\", host, db_name\n        ));\n    // Authenticate with a saved token if available\n    if let Some(tok) = token {\n        builder = builder.with_token(tok);\n    }\n    let conn = builder\n        .on_connect(|_conn, identity, token| {\n            println!(\"Connected as {:?}\", identity);\n            // Save token for reconnection\n            save_token(&token);\n        })\n        .on_disconnect(|_conn, err| {\n            eprintln!(\"Disconnected: {:?}\", err);\n        })\n        .build()\n        .await\n        .expect(\"Failed to connect\");\n}","language":"rust"},"narration":"Every journey begins at Independence. Clients connect directly to the database over WebSocket — no app server in between. The SDK uses with_token for authentication and assigns an Identity on first connect. One connection, zero middleware."},{"name":"Chimney Rock","subtitle":"Request Routing","concept":"Reducers","landmarkType":"camp","code":{"file":"crates/client-api-messages/src/websocket/v2.rs","content":"// crates/client-api-messages/src/websocket/v2.rs\npub enum ClientMessage {\n    Subscribe(Subscribe),\n    Unsubscribe(Unsubscribe),\n    OneOffQuery(OneOffQuery),\n    CallReducer(CallReducer),\n    CallProcedure(CallProcedure),\n}\n\npub struct CallReducer {\n    pub request_id: u32,\n    pub flags: CallReducerFlags,\n    pub reducer: Box<str>,\n    pub args: Bytes, // BSATN-encoded arguments\n}\n\npub struct Subscribe {\n    pub request_id: u32,\n    pub query_set_id: QuerySetId,\n    pub query_strings: Box<[Box<str>]>,\n}\n\npub struct OneOffQuery {\n    pub request_id: u32,\n    pub query_string: Box<str>,\n}","language":"rust"},"narration":"At Chimney Rock, the trail forks five ways. Every client message is a CallReducer, Subscribe, Unsubscribe, OneOffQuery, or CallProcedure. Args are BSATN-encoded binary, not JSON. The v2 protocol dispatches each to its handler with a request_id for correlation."},{"name":"Fort Laramie","subtitle":"Module Invocation","concept":"Module Schema","landmarkType":"mountain","code":{"file":"crates/core/src/host/instance_env.rs","content":"// crates/core/src/host/instance_env.rs\npub struct InstanceEnv {\n    pub replica_ctx: Arc<ReplicaContext>,\n    pub scheduler: Scheduler,\n    pub tx: TxSlot,\n    pub start_time: Timestamp,\n    pub start_instant: Instant,\n    pub func_type: FuncCallType,\n    pub func_name: Option<Identifier>,\n    in_anon_tx: bool,\n}\n\n// Reducer dispatch via module_host.rs:\nasync fn call_reducer_inner(\n    &self,\n    caller_identity: Identity,\n    caller_connection_id: Option<ConnectionId>,\n    client: Option<Arc<ClientConnectionSender>>,\n    request_id: Option<RequestId>,\n    timer: Option<Instant>,\n    reducer_id: ReducerId,\n    reducer_def: &ReducerDef,\n    args: FunctionArgs,\n) -> Result<ReducerCallResult, ReducerCallError>","language":"rust"},"narration":"Fort Laramie houses the module runtime. InstanceEnv holds the replica context, scheduler, and transaction slot. Your WASM module runs in a sandbox with the database available through host functions. call_reducer_inner dispatches to either wasmtime or V8 depending on module type."},{"name":"Independence Rock","subtitle":"Transaction Begin","concept":"In-Memory + WAL","landmarkType":"mountain","code":{"file":"crates/core/src/db/relational_db.rs","content":"// crates/core/src/db/relational_db.rs\npub struct RelationalDB {\n    database_identity: Identity,\n    owner_identity: Identity,\n    inner: Locking,\n    durability: Option<DurabilityWorker>,\n    snapshot_worker: Option<SnapshotWorker>,\n}\n\nimpl RelationalDB {\n    // Mutable transaction — used by reducers\n    pub fn begin_mut_tx(\n        &self,\n        isolation_level: IsolationLevel,\n        workload: Workload,\n    ) -> MutTx { /* ... */ }\n\n    // Read-only transaction — used by queries\n    pub fn begin_tx(&self, workload: Workload) -> Tx\n\n    pub fn commit_tx(\n        &self, tx: MutTx,\n    ) -> Result<Option<(\n        TxOffset, Arc<TxData>, TxMetrics,\n        Option<ReducerName>,\n    )>, DBError> { /* ... */ }\n\n    pub fn rollback_mut_tx(\n        &self, tx: MutTx,\n    ) -> (TxOffset, TxMetrics, Option<ReducerName>)\n}","language":"rust"},"narration":"Independence Rock marks the transaction boundary. Every reducer gets a MutTx via begin_mut_tx with an IsolationLevel and Workload. Reads see committed state; writes buffer locally. Nothing is visible until commit_tx merges changes atomically and writes to the durability layer."},{"name":"South Pass","subtitle":"Reducer Execution","concept":"Reducers","landmarkType":"forest","code":{"file":"modules/sdk-test/src/lib.rs","content":"// modules/sdk-test/src/lib.rs\nuse spacetimedb::{\n    Identity, ReducerContext, Table,\n};

window.drawCustomEventOverlay = function(time) {
  if (!currentEventType && !currentEventTitle) return;

  var t = (time || 0) * 0.001; // seconds

  // --- CONNECTION STORM: dark sky, lightning, rain ---
  if (currentEventTitle.indexOf('Connection Storm') !== -1) {
    // Darken sky
    ctx.fillStyle = 'rgba(0,0,50,0.45)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning flash (periodic)
    var flashPhase = Math.sin(t * 1.7) + Math.sin(t * 3.1);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, 0, W, H);
      // Lightning bolt
      ctx.strokeStyle = '#FFFF55';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 80 + Math.sin(t * 2.3) * 60;
      ctx.moveTo(lx, 10);
      ctx.lineTo(lx - 5, 35);
      ctx.lineTo(lx + 8, 35);
      ctx.lineTo(lx - 3, 65);
      ctx.lineTo(lx + 10, 65);
      ctx.lineTo(lx + 2, 95);
      ctx.stroke();
    }
    // Rain
    ctx.strokeStyle = '#5555FF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 40; i++) {
      var rx = (i * 8.3 + t * 80) % W;
      var ry = (i * 13.7 + t * 120) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 1), Math.floor(ry + 5));
      ctx.stroke();
    }
    return;
  }

  // --- MODULE LOADING RIVER: rough rapids with white water ---
  if (currentEventTitle.indexOf('Module Loading') !== -1) {
    // Extra turbulence on the river
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 20; i++) {
      var sx = (i * 17 + t * 40) % W;
      var sy = 157 + Math.sin((i * 3 + t * 5)) * 3;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 4, 2);
    }
    // Floating logs / debris
    ctx.fillStyle = '#AA5500';
    for (var i = 0; i < 3; i++) {
      var logX = (i * 110 + t * 25) % W;
      var logY = 159 + Math.sin(t * 2 + i) * 2;
      ctx.fillRect(Math.floor(logX), Math.floor(logY), 8, 2);
    }
    return;
  }

  // --- TRANSACTION PIONEER: person standing by campfire ---
  if (currentEventTitle.indexOf('Transaction Pioneer') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8); // torso
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3); // head
    ctx.fillRect(px - 1, py - 4, 2, 5); // left leg
    ctx.fillRect(px + 3, py - 4, 2, 5); // right leg
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Campfire
    var fx = 212, fy = 148;
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(fx - 3, fy, 2, 3);
    ctx.fillRect(fx + 3, fy, 2, 3);
    ctx.fillStyle = '#FF5555';
    var flicker = Math.sin(t * 8) * 2;
    ctx.fillRect(fx - 1, fy - 3 + Math.floor(flicker * 0.3), 4, 3);
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(fx, fy - 5 + Math.floor(flicker * 0.5), 2, 2);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(fx - 1, fy - 2, 4, 2);
    // Firelight glow (subtle)
    ctx.fillStyle = 'rgba(255,170,0,0.08)';
    ctx.beginPath();
    ctx.arc(fx + 1, fy - 2, 15, 0, Math.PI * 2);
    ctx.fill();
    return;
  }

  // --- REDUCER STORM: dark sky, lightning, swirling data particles ---
  if (currentEventTitle.indexOf('Reducer Storm') !== -1) {
    // Darken sky
    ctx.fillStyle = 'rgba(50,0,50,0.45)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning flash
    var flashPhase = Math.sin(t * 2.1) + Math.sin(t * 3.7);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fillRect(0, 0, W, H);
      ctx.strokeStyle = '#FF55FF';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 160 + Math.sin(t * 1.9) * 80;
      ctx.moveTo(lx, 5);
      ctx.lineTo(lx + 6, 30);
      ctx.lineTo(lx - 4, 30);
      ctx.lineTo(lx + 8, 60);
      ctx.lineTo(lx - 2, 60);
      ctx.lineTo(lx + 4, 90);
      ctx.stroke();
    }
    // Swirling data particles
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 15; i++) {
      var px = 160 + Math.cos(t * 1.5 + i * 0.8) * (30 + i * 4);
      var py = 60 + Math.sin(t * 1.5 + i * 0.8) * (20 + i * 2);
      ctx.fillRect(Math.floor(px), Math.floor(py), 2, 2);
    }
    return;
  }

  // --- COMMIT FAILURE: red sky, smoke, warning ---
  if (currentEventTitle.indexOf('Commit Failure') !== -1) {
    // Red danger tint
    ctx.fillStyle = 'rgba(170,0,0,0.25)';
    ctx.fillRect(0, 0, W, H);
    // Smoke particles rising
    ctx.fillStyle = '#555555';
    for (var i = 0; i < 15; i++) {
      var sx = 140 + Math.sin(i * 2.7 + t) * 30;
      var sy = 130 - ((t * 20 + i * 15) % 90);
      var size = 2 + (i % 3);
      ctx.globalAlpha = 0.3 + Math.sin(t + i) * 0.15;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), size, size);
    }
    ctx.globalAlpha = 1.0;
    // Fire at base
    ctx.fillStyle = '#FF5555';
    for (var i = 0; i < 8; i++) {
      var fx = 130 + i * 5;
      var fh = 4 + Math.sin(t * 6 + i * 1.5) * 3;
      ctx.fillRect(fx, Math.floor(140 - fh), 3, Math.floor(fh));
    }
    ctx.fillStyle = '#FFFF55';
    for (var i = 0; i < 5; i++) {
      var fx = 135 + i * 6;
      var fh = 2 + Math.sin(t * 8 + i * 2) * 2;
      ctx.fillRect(fx, Math.floor(139 - fh), 2, Math.floor(fh));
    }
    // Pulsing red border
    var pulse = (Math.sin(t * 4) + 1) * 0.15;
    ctx.strokeStyle = 'rgba(255,0,0,' + pulse.toFixed(2) + ')';
    ctx.lineWidth = 3;
    ctx.strokeRect(1, 1, W - 2, H - 2);
    ctx.lineWidth = 1;
    return;
  }

  // --- SUBSCRIPTION PIONEER: person with glowing data streams ---
  if (currentEventTitle.indexOf('Subscription Pioneer') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3);
    ctx.fillRect(px - 1, py - 4, 2, 5);
    ctx.fillRect(px + 3, py - 4, 2, 5);
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Data streams flowing from person
    ctx.fillStyle = '#55FF55';
    for (var i = 0; i < 8; i++) {
      var dx = px + 10 + i * 6 + Math.sin(t * 3 + i) * 2;
      var dy = py - 10 + Math.sin(t * 2 + i * 1.5) * 4;
      ctx.fillRect(Math.floor(dx), Math.floor(dy), 3, 1);
    }
    // Glowing subscription indicators
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 5; i++) {
      var sx = px - 15 - i * 8;
      var sy = py - 8 + Math.cos(t * 2.5 + i) * 3;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 2, 2);
    }
    return;
  }
};
</script>
