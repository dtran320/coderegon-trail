<script>
window.TRAIL_DATA = {"framework":"spacetimedb","trailName":"The Spacetime Trail",
  "repoUrl": "https://github.com/clockworklabs/SpacetimeDB","sourceInfo":{"repo":"clockworklabs/SpacetimeDB","commit":"e33cefb","tag":"","snapshotDate":"2026-03-28"},"stops":[{"name":"Independence, MO","subtitle":"Client Connection","concept":"Reducers","landmarkType":"town","code":{"file":"// spacetimedb-rust-sdk (separate repo)","content":"// spacetimedb-rust-sdk — client connection setup\nuse spacetimedb_sdk::DbConnection;\n\npub async fn connect(\n    host: &str,\n    db_name: &str,\n    token: Option<String>,\n) {\n    let mut builder = DbConnection::builder()\n        .with_uri(format!(\n            \"wss://{}/database/{}\", host, db_name\n        ));\n    // Authenticate with a saved token if available\n    if let Some(tok) = token {\n        builder = builder.with_token(tok);\n    }\n    let conn = builder\n        .on_connect(|_conn, identity, token| {\n            println!(\"Connected as {:?}\", identity);\n            // Save token for reconnection\n            save_token(&token);\n        })\n        .on_disconnect(|_conn, err| {\n            eprintln!(\"Disconnected: {:?}\", err);\n        })\n        .build()\n        .await\n        .expect(\"Failed to connect\");\n}","language":"rust"},"narration":"Every journey begins at Independence. Clients connect directly to the database over WebSocket — no app server in between. The SDK uses with_token for authentication and assigns an Identity on first connect. One connection, zero middleware."},{"name":"Chimney Rock","subtitle":"Request Routing","concept":"Reducers","landmarkType":"camp","code":{"file":"crates/client-api-messages/src/websocket/v2.rs","content":"// crates/client-api-messages/src/websocket/v2.rs\npub enum ClientMessage {\n    Subscribe(Subscribe),\n    Unsubscribe(Unsubscribe),\n    OneOffQuery(OneOffQuery),\n    CallReducer(CallReducer),\n    CallProcedure(CallProcedure),\n}\n\npub struct CallReducer {\n    pub request_id: u32,\n    pub flags: CallReducerFlags,\n    pub reducer: Box<str>,\n    pub args: Bytes, // BSATN-encoded arguments\n}\n\npub struct Subscribe {\n    pub request_id: u32,\n    pub query_set_id: QuerySetId,\n    pub query_strings: Box<[Box<str>]>,\n}\n\npub struct OneOffQuery {\n    pub request_id: u32,\n    pub query_string: Box<str>,\n}","language":"rust"},"narration":"At Chimney Rock, the trail forks five ways. Every client message is a CallReducer, Subscribe, Unsubscribe, OneOffQuery, or CallProcedure. Args are BSATN-encoded binary, not JSON. The v2 protocol dispatches each to its handler with a request_id for correlation."},{"name":"Fort Laramie","subtitle":"Module Invocation","concept":"Module Schema","landmarkType":"mountain","code":{"file":"crates/core/src/host/instance_env.rs","content":"// crates/core/src/host/instance_env.rs\npub struct InstanceEnv {\n    pub replica_ctx: Arc<ReplicaContext>,\n    pub scheduler: Scheduler,\n    pub tx: TxSlot,\n    pub start_time: Timestamp,\n    pub start_instant: Instant,\n    pub func_type: FuncCallType,\n    pub func_name: Option<Identifier>,\n    in_anon_tx: bool,\n}\n\n// Reducer dispatch via module_host.rs:\nasync fn call_reducer_inner(\n    &self,\n    caller_identity: Identity,\n    caller_connection_id: Option<ConnectionId>,\n    client: Option<Arc<ClientConnectionSender>>,\n    request_id: Option<RequestId>,\n    timer: Option<Instant>,\n    reducer_id: ReducerId,\n    reducer_def: &ReducerDef,\n    args: FunctionArgs,\n) -> Result<ReducerCallResult, ReducerCallError>","language":"rust"},"narration":"Fort Laramie houses the module runtime. InstanceEnv holds the replica context, scheduler, and transaction slot. Your WASM module runs in a sandbox with the database available through host functions. call_reducer_inner dispatches to either wasmtime or V8 depending on module type."},{"name":"Independence Rock","subtitle":"Transaction Begin","concept":"In-Memory + WAL","landmarkType":"mountain","code":{"file":"crates/core/src/db/relational_db.rs","content":"// crates/core/src/db/relational_db.rs\npub struct RelationalDB {\n    database_identity: Identity,\n    owner_identity: Identity,\n    inner: Locking,\n    durability: Option<DurabilityWorker>,\n    snapshot_worker: Option<SnapshotWorker>,\n}\n\nimpl RelationalDB {\n    // Mutable transaction — used by reducers\n    pub fn begin_mut_tx(\n        &self,\n        isolation_level: IsolationLevel,\n        workload: Workload,\n    ) -> MutTx { /* ... */ }\n\n    // Read-only transaction — used by queries\n    pub fn begin_tx(&self, workload: Workload) -> Tx\n\n    pub fn commit_tx(\n        &self, tx: MutTx,\n    ) -> Result<Option<(\n        TxOffset, Arc<TxData>, TxMetrics,\n        Option<ReducerName>,\n    )>, DBError> { /* ... */ }\n\n    pub fn rollback_mut_tx(\n        &self, tx: MutTx,\n    ) -> (TxOffset, TxMetrics, Option<ReducerName>)\n}","language":"rust"},"narration":"Independence Rock marks the transaction boundary. Every reducer gets a MutTx via begin_mut_tx with an IsolationLevel and Workload. Reads see committed state; writes buffer locally. Nothing is visible until commit_tx merges changes atomically and writes to the durability layer."},{"name":"South Pass","subtitle":"Reducer Execution","concept":"Reducers","landmarkType":"forest","code":{"file":"modules/sdk-test/src/lib.rs","content":"// modules/sdk-test/src/lib.rs\nuse spacetimedb::{\n    Identity, ReducerContext, Table,\n};\n\n#[spacetimedb::table(accessor = users, public)]\nstruct Users {\n    #[primary_key]\n    identity: Identity,\n    name: String,\n}\n\n#[spacetimedb::reducer]\nfn insert_user(\n    ctx: &ReducerContext,\n    name: String,\n    identity: Identity,\n) -> anyhow::Result<()> {\n    ctx.db.users().insert(Users {\n        name,\n        identity,\n    });\n    Ok(())\n}\n\n// Tables accessed via ctx.db.{accessor}()\n// Insert, find, update, delete — all type-safe\n// No REST endpoints, no controllers, no ORM","language":"rust"},"narration":"South Pass is where reducers do their work. Tables use spacetimedb::table with an accessor name. Reducers get a ReducerContext and access tables through ctx.db. A single function replaces your entire API layer — define tables with macros, write logic with type-safe queries."},{"name":"Fort Bridger","subtitle":"Validation & Commit","concept":"In-Memory + WAL","landmarkType":"camp","code":{"file":"crates/core/src/db/relational_db.rs","content":"// crates/core/src/db/relational_db.rs — commit path\nimpl RelationalDB {\n    // On success: merge writes atomically\n    pub fn commit_tx(\n        &self, tx: MutTx,\n    ) -> Result<Option<(\n        TxOffset,\n        Arc<TxData>,    // all inserts/deletes\n        TxMetrics,\n        Option<ReducerName>,\n    )>, DBError> {\n        // TxData feeds subscription delta evaluation\n        /* ... */\n    }\n\n    // On failure: discard all buffered writes\n    pub fn rollback_mut_tx(\n        &self, tx: MutTx,\n    ) -> (TxOffset, TxMetrics, Option<ReducerName>) {\n        // Nothing persists — committed state untouched\n        /* ... */\n    }\n}\n// Every reducer is atomic: commit or rollback,\n// never partial updates","language":"rust"},"narration":"Fort Bridger is the commit-or-rollback checkpoint. commit_tx merges all writes atomically and returns TxData for subscription evaluation. rollback_mut_tx discards every buffered write — the committed state stays pristine. No partial updates, ever."},{"name":"The Dalles","subtitle":"Delta Computation","concept":"Incremental Subscriptions","landmarkType":"river","code":{"file":"crates/core/src/subscription/delta.rs","content":"// crates/core/src/subscription/delta.rs\npub fn eval_delta<'a, Tx: Datastore + DeltaStore>(\n    tx: &'a Tx,\n    metrics: &mut ExecutionMetrics,\n    plan: &SubscriptionPlan,\n) -> Result<Option<UpdatesRelValue<'a>>> {\n    // For simple table plans: iterate inserts/deletes\n    // directly — no deduplication needed\n    // For join plans: track row counts with\n    //   HashMap<RelValue, usize>\n    // to handle semijoin duplicate semantics\n    plan.for_each_insert(|row| { /* ... */ });\n    plan.for_each_delete(|row| { /* ... */ });\n\n    Ok(Some(UpdatesRelValue {\n        inserts,\n        deletes,\n    }))\n}\n// Bag semantics preserve correct multiplicity\n// Only touched tables are evaluated per commit","language":"rust"},"narration":"The Dalles rapids are where incremental evaluation happens. eval_delta takes a SubscriptionPlan and computes minimal diffs using bag semantics. Simple queries iterate deltas directly; joins track row counts for correct multiplicity. No polling, no full re-evaluation."},{"name":"Oregon City","subtitle":"Broadcast Updates","concept":"Incremental Subscriptions","landmarkType":"town","code":{"file":"crates/core/src/subscription/module_subscription_manager.rs","content":"// crates/core/src/subscription/module_subscription_manager.rs\npub struct SubscriptionManager {\n    clients: HashMap<ClientId, ClientInfo>,\n    queries: HashMap<QueryHash, QueryState>,\n    tables: IntMap<TableId, HashSet<QueryHash>>,\n    send_worker_queue: BroadcastQueue,\n}\n\nimpl SubscriptionManager {\n    pub fn eval_updates_sequential(\n        &self,\n        (tx, tx_offset): (&DeltaTx, TransactionOffset),\n        bsatn_rlb_pool: &BsatnRowListBuilderPool,\n        module_def_version: RawModuleDefVersion,\n        event: Arc<ModuleEvent>,\n        caller: Option<Arc<ClientConnectionSender>>,\n    ) -> (ExecutionMetrics, Vec<SubscriptionIdV2>)\n\n    // Multi-query optimization: each subscription\n    // evaluated once, results fanned out to clients\n    // via SendWorker over WebSocket\n}","language":"rust"},"narration":"Oregon City — you made it! The SubscriptionManager evaluates each subscription once and fans results to all matched clients via a BroadcastQueue. Multi-query optimization means shared queries are computed once. Client SDKs patch their local cache automatically — no polling, no stale data."}],"events":[{"type":"weather","trigger":"after_stop","triggerStop":1,"title":"Connection Storm!","text":"A storm of connection requests hammers your database. Clients from every platform try to connect simultaneously. But wait — there's no app server to route through. Why do clients connect directly to the database?","choices":[{"text":"Eliminates the middle-tier server, reducing latency and architecture complexity","correct":true,"explanation":"SpacetimeDB removes the app server entirely. Clients talk directly to the database over WebSocket, cutting latency and eliminating an entire tier of infrastructure."},{"text":"Databases are inherently faster than application servers at handling connections","correct":false,"explanation":"It's not that databases are faster — it's that removing the middle tier eliminates an entire network hop and simplifies the architecture."},{"text":"Direct connections provide better security than going through a server","correct":false,"explanation":"Security comes from the module sandbox and identity system, not from the connection topology. The benefit is architectural simplicity."}],"concept":"Reducers","difficulty":"easy"},{"type":"river","trigger":"after_stop","triggerStop":3,"title":"The Module Loading River!","text":"You've reached the river where modules must be loaded into the runtime. The current is strong — one wrong step and your application logic sinks. Why does SpacetimeDB use WebAssembly for module execution?","choices":[{"text":"WASM provides sandboxed, near-native performance with memory safety guarantees","correct":true,"explanation":"WebAssembly gives near-native speed while keeping modules sandboxed. Memory safety is enforced by the runtime — a module cannot corrupt database internals or access host memory."},{"text":"JavaScript is too slow for database operations","correct":false,"explanation":"SpacetimeDB actually supports both WASM and V8 (for TypeScript modules). The choice of WASM is about sandboxing and performance, not about JavaScript being slow."},{"text":"WebAssembly is easier to write than native code","correct":false,"explanation":"WASM is a compilation target, not a language you write directly. You write Rust, C#, or TypeScript, which compiles to WASM. The benefit is isolation and portability."}],"concept":"Module Schema","difficulty":"medium"},{"type":"encounter","trigger":"after_stop","triggerStop":4,"title":"A Transaction Pioneer appears!","text":"A grizzled pioneer approaches your wagon. 'I've been running reducers for years,' they say. 'Every single one is wrapped in a transaction. No exceptions.' Why is every reducer call a single transaction?","choices":[{"text":"Atomic all-or-nothing execution prevents partial state corruption","correct":true,"explanation":"If a reducer inserts three rows then panics on the fourth, all four operations roll back. The database never ends up in a half-updated state. Atomicity is the foundation of correctness."},{"text":"Transactions make reducers run faster by batching writes","correct":false,"explanation":"Transactions aren't about speed — they're about correctness. The overhead of transaction management is worth it to guarantee consistency."},{"text":"It's a requirement of all relational databases to use transactions","correct":false,"explanation":"While relational databases support transactions, not all operations require them. SpacetimeDB makes this choice deliberately — every reducer is atomic to prevent partial state corruption."}],"concept":"In-Memory + WAL","difficulty":"easy"},{"type":"weather","trigger":"after_stop","triggerStop":5,"title":"Reducer Storm!","text":"A violent storm hits the trail! Lightning strikes your module mid-execution. A reducer panics while halfway through updating player scores. What happens to the partially-written data?","choices":[{"text":"All changes are rolled back, and the database state is unchanged","correct":true,"explanation":"The transaction system guarantees atomicity. A panicking reducer triggers a full rollback — every insert, update, and delete from that call is undone. The committed state remains pristine."},{"text":"Partial changes are committed up to the point of the panic","correct":false,"explanation":"That would violate atomicity. SpacetimeDB uses copy-on-write isolation — writes go to a local buffer and only merge on successful commit. A panic means the buffer is discarded."},{"text":"The database crashes and must be recovered from the WAL","correct":false,"explanation":"A reducer panic is not a database crash. The transaction simply rolls back. The database continues serving other requests without interruption."}],"concept":"Reducers","difficulty":"medium"},{"type":"misfortune","trigger":"after_stop","triggerStop":6,"title":"Commit Failure!","text":"Disaster on the trail! Your wagon's storage is running slow. The old way of writing everything to disk on every operation is grinding progress to a halt. Why is SpacetimeDB's in-memory + WAL approach faster than traditional disk-based databases?","choices":[{"text":"Reads are microsecond in-memory lookups; WAL only writes sequentially for durability","correct":true,"explanation":"All data lives in memory for instant reads. The Write-Ahead Log only does sequential disk writes — the fastest possible I/O pattern. No random disk seeks, no B-tree page splits on the read path."},{"text":"The WAL doesn't actually persist data to disk","correct":false,"explanation":"The WAL absolutely persists to disk — that's where durability comes from. On restart, the WAL replays to reconstruct in-memory state. It's durable AND fast."},{"text":"In-memory databases don't need durability guarantees","correct":false,"explanation":"SpacetimeDB provides full durability via the WAL. Data survives crashes and restarts. In-memory is the performance optimization; WAL is the durability guarantee."}],"concept":"In-Memory + WAL","difficulty":"hard"},{"type":"encounter","trigger":"after_stop","triggerStop":7,"title":"Subscription Pioneer!","text":"A fellow traveler rides up alongside your wagon. 'I've been watching my queries update in real time,' they say with amazement. 'But the database isn't polling.' How does incremental evaluation achieve real-time updates?","choices":[{"text":"Only recomputes affected rows from the delta, not the entire query result set","correct":true,"explanation":"After each commit, the engine checks which tables were touched, then evaluates only the changed rows against each subscription's query. If your query wasn't affected, zero work is done."},{"text":"It caches the entire result set and invalidates on any change","correct":false,"explanation":"Full cache invalidation would mean re-evaluating entire queries on every commit. Incremental evaluation is smarter — it only processes the delta (inserted/deleted rows)."},{"text":"It polls the database at a very high frequency","correct":false,"explanation":"There is no polling. The subscription engine is push-based — it evaluates deltas as part of the commit path and immediately pushes results over WebSocket."}],"concept":"Incremental Subscriptions","difficulty":"medium"}],"partyMembers":[{"name":"Reducers","icon":"server","maxHealth":3},{"name":"Module Schema","icon":"data","maxHealth":3},{"name":"Incremental Subscriptions","icon":"router","maxHealth":3},{"name":"In-Memory + WAL","icon":"layout","maxHealth":3}],"deathMessages":["Died of WASM memory overflow. Your reducer allocated without bounds.","Lost in the subscription maze \u2014 too many WHERE clauses to evaluate.","Drowned in the transaction river. Deadlock between two reducers.","Killed by a schema migration. The module version was incompatible.","Your client cache diverged from the server. State was irreconcilable.","Starved waiting for the WAL to flush. Disk I/O blocked recovery.","Died of dysentery... er, serialization errors crossing the WASM boundary.","Buried under 170,000 transactions per second. The benchmarks were too real."]};

window.TRAIL_FLAVORS = [

  "A hawk circles overhead, watching your throughput...",

];

window.drawCustomEventOverlay = function(time) {
  if (!currentEventType && !currentEventTitle) return;

  var t = (time || 0) * 0.001; // seconds

  // --- CONNECTION STORM: dark sky, lightning, rain ---
  if (currentEventTitle.indexOf('Connection Storm') !== -1) {
    // Darken sky
    ctx.fillStyle = 'rgba(0,0,50,0.45)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning flash (periodic)
    var flashPhase = Math.sin(t * 1.7) + Math.sin(t * 3.1);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, 0, W, H);
      // Lightning bolt
      ctx.strokeStyle = '#FFFF55';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 80 + Math.sin(t * 2.3) * 60;
      ctx.moveTo(lx, 10);
      ctx.lineTo(lx - 5, 35);
      ctx.lineTo(lx + 8, 35);
      ctx.lineTo(lx - 3, 65);
      ctx.lineTo(lx + 10, 65);
      ctx.lineTo(lx + 2, 95);
      ctx.stroke();
    }
    // Rain
    ctx.strokeStyle = '#5555FF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 40; i++) {
      var rx = (i * 8.3 + t * 80) % W;
      var ry = (i * 13.7 + t * 120) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 1), Math.floor(ry + 5));
      ctx.stroke();
    }
    return;
  }

  // --- MODULE LOADING RIVER: rough rapids with white water ---
  if (currentEventTitle.indexOf('Module Loading') !== -1) {
    // Extra turbulence on the river
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 20; i++) {
      var sx = (i * 17 + t * 40) % W;
      var sy = 157 + Math.sin((i * 3 + t * 5)) * 3;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 4, 2);
    }
    // Floating logs / debris
    ctx.fillStyle = '#AA5500';
    for (var i = 0; i < 3; i++) {
      var logX = (i * 110 + t * 25) % W;
      var logY = 159 + Math.sin(t * 2 + i) * 2;
      ctx.fillRect(Math.floor(logX), Math.floor(logY), 8, 2);
    }
    return;
  }

  // --- TRANSACTION PIONEER: person standing by campfire ---
  if (currentEventTitle.indexOf('Transaction Pioneer') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8); // torso
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3); // head
    ctx.fillRect(px - 1, py - 4, 2, 5); // left leg
    ctx.fillRect(px + 3, py - 4, 2, 5); // right leg
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Campfire
    var fx = 212, fy = 148;
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(fx - 3, fy, 2, 3);
    ctx.fillRect(fx + 3, fy, 2, 3);
    ctx.fillStyle = '#FF5555';
    var flicker = Math.sin(t * 8) * 2;
    ctx.fillRect(fx - 1, fy - 3 + Math.floor(flicker * 0.3), 4, 3);
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(fx, fy - 5 + Math.floor(flicker * 0.5), 2, 2);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(fx - 1, fy - 2, 4, 2);
    // Firelight glow (subtle)
    ctx.fillStyle = 'rgba(255,170,0,0.08)';
    ctx.beginPath();
    ctx.arc(fx + 1, fy - 2, 15, 0, Math.PI * 2);
    ctx.fill();
    return;
  }

  // --- REDUCER STORM: dark sky, lightning, swirling data particles ---
  if (currentEventTitle.indexOf('Reducer Storm') !== -1) {
    // Darken sky
    ctx.fillStyle = 'rgba(50,0,50,0.45)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning flash
    var flashPhase = Math.sin(t * 2.1) + Math.sin(t * 3.7);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fillRect(0, 0, W, H);
      ctx.strokeStyle = '#FF55FF';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 160 + Math.sin(t * 1.9) * 80;
      ctx.moveTo(lx, 5);
      ctx.lineTo(lx + 6, 30);
      ctx.lineTo(lx - 4, 30);
      ctx.lineTo(lx + 8, 60);
      ctx.lineTo(lx - 2, 60);
      ctx.lineTo(lx + 4, 90);
      ctx.stroke();
    }
    // Swirling data particles
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 15; i++) {
      var px = 160 + Math.cos(t * 1.5 + i * 0.8) * (30 + i * 4);
      var py = 60 + Math.sin(t * 1.5 + i * 0.8) * (20 + i * 2);
      ctx.fillRect(Math.floor(px), Math.floor(py), 2, 2);
    }
    return;
  }

  // --- COMMIT FAILURE: red sky, smoke, warning ---
  if (currentEventTitle.indexOf('Commit Failure') !== -1) {
    // Red danger tint
    ctx.fillStyle = 'rgba(170,0,0,0.25)';
    ctx.fillRect(0, 0, W, H);
    // Smoke particles rising
    ctx.fillStyle = '#555555';
    for (var i = 0; i < 15; i++) {
      var sx = 140 + Math.sin(i * 2.7 + t) * 30;
      var sy = 130 - ((t * 20 + i * 15) % 90);
      var size = 2 + (i % 3);
      ctx.globalAlpha = 0.3 + Math.sin(t + i) * 0.15;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), size, size);
    }
    ctx.globalAlpha = 1.0;
    // Fire at base
    ctx.fillStyle = '#FF5555';
    for (var i = 0; i < 8; i++) {
      var fx = 130 + i * 5;
      var fh = 4 + Math.sin(t * 6 + i * 1.5) * 3;
      ctx.fillRect(fx, Math.floor(140 - fh), 3, Math.floor(fh));
    }
    ctx.fillStyle = '#FFFF55';
    for (var i = 0; i < 5; i++) {
      var fx = 135 + i * 6;
      var fh = 2 + Math.sin(t * 8 + i * 2) * 2;
      ctx.fillRect(fx, Math.floor(139 - fh), 2, Math.floor(fh));
    }
    // Pulsing red border
    var pulse = (Math.sin(t * 4) + 1) * 0.15;
    ctx.strokeStyle = 'rgba(255,0,0,' + pulse.toFixed(2) + ')';
    ctx.lineWidth = 3;
    ctx.strokeRect(1, 1, W - 2, H - 2);
    ctx.lineWidth = 1;
    return;
  }

  // --- SUBSCRIPTION PIONEER: person with glowing data streams ---
  if (currentEventTitle.indexOf('Subscription Pioneer') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3);
    ctx.fillRect(px - 1, py - 4, 2, 5);
    ctx.fillRect(px + 3, py - 4, 2, 5);
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Data streams flowing from person
    ctx.fillStyle = '#55FF55';
    for (var i = 0; i < 8; i++) {
      var dx = px + 10 + i * 6 + Math.sin(t * 3 + i) * 2;
      var dy = py - 10 + Math.sin(t * 2 + i * 1.5) * 4;
      ctx.fillRect(Math.floor(dx), Math.floor(dy), 3, 1);
    }
    // Glowing subscription indicators
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 5; i++) {
      var sx = px - 15 - i * 8;
      var sy = py - 8 + Math.cos(t * 2.5 + i) * 3;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 2, 2);
    }
    return;
  }
};
</script>
