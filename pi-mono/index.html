<script>
window.TRAIL_DATA = {"framework":"pi-mono","trailName":"The Agent Loop Trail",
  "repoUrl": "https://github.com/badlogic/pi-mono","sourceInfo":{"repo":"badlogic/pi-mono","commit":"576e5e1","tag":"v0.63.1","snapshotDate":"2026-03-28"},"stops":[{"name":"Independence, MO","subtitle":"CLI Input","concept":"Unified LLM API","landmarkType":"town","code":{"file":"packages/coding-agent/src/main.ts","content":"// packages/coding-agent/src/main.ts\nimport { Agent } from '@anthropic/agent'\nimport { createTools } from './tools'\nimport { SessionManager } from './core/sessions/session-manager'\nimport { resolveModel } from '@anthropic/ai'\n\nasync function main() {\n  const args = parseArgs(process.argv.slice(2))\n\n  // Three input modes:\n  // 1. Interactive REPL (default)\n  // 2. Piped stdin: echo 'fix the bug' | pi\n  // 3. Inline argument: pi 'explain this'\n  const prompt = args._.length > 0\n    ? args._.join(' ')\n    : !process.stdin.isTTY\n      ? await readStdin()\n      : null  // interactive mode\n\n  const model = await resolveModel(\n    args.model ?? 'claude-sonnet-4-20250514'\n  )\n  const tools = createTools(process.cwd())\n  const session = new SessionManager()\n  const agent = new Agent({ model, tools })\n\n  await agent.prompt(prompt, { session })\n}","language":"typescript"},"narration":"Every journey starts at the command line. Pi accepts input three ways: interactive CLI, piped stdin, or inline arguments. The entry point parses args, resolves a model, creates tools, and hands off to the Agent. One command, many ways to invoke it."},{"name":"Chimney Rock","subtitle":"Session Setup","concept":"Session Persistence","landmarkType":"camp","code":{"file":"packages/coding-agent/src/core/sessions/session-manager.ts","content":"// packages/coding-agent/src/core/sessions/session-manager.ts\nimport { appendFileSync, readFileSync } from 'fs'\nimport { mkdirSync } from 'fs'\n\nconst SESSIONS_DIR = '~/.pi/agent/sessions'\n\nexport class SessionManager {\n  private sessionPath: string\n\n  constructor(sessionId?: string) {\n    this.sessionPath = sessionId\n      ? `${SESSIONS_DIR}/${sessionId}.jsonl`\n      : this.createNewSession()\n  }\n\n  // Append-only JSONL: each line is one event\n  append(entry: SessionEntry): void {\n    const line = JSON.stringify(entry) + '\\n'\n    appendFileSync(this.sessionPath, line)\n  }\n\n  // Load replays the full JSONL log\n  load(): SessionEntry[] {\n    const raw = readFileSync(this.sessionPath, 'utf-8')\n    return raw.trim().split('\\n')\n      .map(line => JSON.parse(line))\n  }\n}","language":"typescript"},"narration":"At Chimney Rock we set up camp and restore our session. Sessions are stored as append-only JSONL files in ~/.pi/agent/sessions/. Each line is one event. Loading a session replays the full log. This format is fast to write and resilient to crashes."},{"name":"Fort Laramie","subtitle":"Model Resolution","concept":"Unified LLM API","landmarkType":"mountain","code":{"file":"packages/ai/src/models.generated.ts","content":"// packages/ai/src/models.generated.ts\n// Auto-generated model registry with 15+ providers\n\nexport const models: ModelDefinition[] = [\n  // Anthropic\n  { id: 'claude-sonnet-4-20250514',\n    provider: 'anthropic', alias: ['sonnet'] },\n  { id: 'claude-opus-4-20250514',\n    provider: 'anthropic', alias: ['opus'] },\n  // OpenAI\n  { id: 'gpt-4o', provider: 'openai' },\n  { id: 'o3-mini', provider: 'openai' },\n  // Google\n  { id: 'gemini-2.5-pro', provider: 'google' },\n  // ... 15+ providers total\n]\n\n// Fuzzy matching: 'sonnet' -> claude-sonnet-4-*\nexport function resolveModel(spec: string) {\n  // Check aliases first, then glob-match id\n  return models.find(m =>\n    m.id === spec ||\n    m.alias?.includes(spec) ||\n    minimatch(m.id, `*${spec}*`)\n  )\n}","language":"typescript"},"narration":"Fort Laramie is where supplies meet demand. The auto-generated model registry knows 15-plus providers and uses fuzzy matching with glob patterns. Write 'sonnet' and it finds claude-sonnet-4. Write 'gpt-4o' and it finds OpenAI. One unified interface, no provider lock-in."},{"name":"Independence Rock","subtitle":"Tool Initialization","concept":"Tool System","landmarkType":"mountain","code":{"file":"packages/agent/src/agent.ts","content":"// packages/agent/src/agent.ts - tool definitions\nimport { Tool } from './types'\n\n// Built-in tools the agent can invoke\nconst builtinTools: Tool[] = [\n  { name: 'read',\n    description: 'Read a file from disk',\n    execute: readFile },\n  { name: 'write',\n    description: 'Write content to a file',\n    execute: writeFile },\n  { name: 'edit',\n    description: 'Apply a targeted edit to a file',\n    execute: editFile },\n  { name: 'bash',\n    description: 'Run a shell command',\n    execute: runBash },\n  { name: 'grep',\n    description: 'Search file contents with regex',\n    execute: grepFiles },\n  { name: 'find',\n    description: 'Find files by name pattern',\n    execute: findFiles },\n  { name: 'ls',\n    description: 'List directory contents',\n    execute: listDir },\n]","language":"typescript"},"narration":"Independence Rock is where tools are forged. Seven built-in tools: read, write, edit, bash, grep, find, and ls. Each has a name, description, and execute function. These are what give the agent its superpowers -- the ability to read, write, search, and run commands."},{"name":"South Pass","subtitle":"LLM Communication","concept":"Agent Loop","landmarkType":"river","code":{"file":"packages/ai/src/stream.ts","content":"// packages/ai/src/stream.ts\nexport async function* streamSimple(\n  model: ResolvedModel,\n  context: Message[],\n  options?: StreamOptions,\n): AsyncGenerator<StreamEvent> {\n  const provider = getProvider(model.provider)\n  const response = await provider.createStream({\n    model: model.id,\n    messages: context,\n    tools: options?.tools,\n    stream: true,\n  })\n\n  // Unified streaming across all providers\n  for await (const chunk of response) {\n    const event = provider.normalizeEvent(chunk)\n    yield event  // text_delta | tool_use | end_turn\n  }\n}","language":"typescript"},"narration":"South Pass is the narrowest crossing between your agent and the LLM. The streamSimple function takes a model, context messages, and optional config. Each provider normalizes its own streaming format into three unified event types: text deltas, tool use blocks, and end turn."},{"name":"Fort Bridger","subtitle":"Tool Execution","concept":"Tool System","landmarkType":"forest","code":{"file":"packages/agent/src/agent.ts","content":"// packages/agent/src/agent.ts - tool execution\nasync executeTool(\n  toolCall: ToolUseBlock\n): Promise<ToolResult> {\n  const tool = this.tools.find(\n    t => t.name === toolCall.name\n  )\n\n  if (!tool) {\n    return {\n      content: `Unknown tool: ${toolCall.name}`,\n      isError: true,\n    }\n  }\n\n  try {\n    const output = await tool.execute(toolCall.input)\n    return {\n      content: truncateOutput(output, 100_000),\n      isError: false,\n    }\n  } catch (err) {\n    // Errors become context for self-correction\n    return {\n      content: err.message,\n      isError: true,\n    }\n  }\n}","language":"typescript"},"narration":"Deep in Fort Bridger, intentions become actions. The agent dispatches each tool call by name, executes it, and captures the result. If a tool fails, the error goes back to the LLM as context so it can self-correct. No crashes, just learning from mistakes."},{"name":"The Dalles","subtitle":"Agent Loop","concept":"Agent Loop","landmarkType":"camp","code":{"file":"packages/agent/src/agent.ts","content":"// packages/agent/src/agent.ts - Agent.prompt()\nasync prompt(\n  input: string,\n  options?: PromptOptions\n): Promise<string> {\n  this.messages.push({ role: 'user', content: input })\n\n  while (true) {\n    const stream = streamSimple(\n      this.model, this.messages\n    )\n\n    let hasToolCalls = false\n\n    for await (const event of stream) {\n      if (event.type === 'text_delta') {\n        process.stdout.write(event.text)\n      } else if (event.type === 'tool_use') {\n        hasToolCalls = true\n        const result = await this.executeTool(event)\n        this.messages.push(\n          { role: 'assistant', tool_use: event },\n          { role: 'tool', content: result }\n        )\n      }\n    }\n\n    // Done when LLM stops requesting tools\n    if (!hasToolCalls) break\n  }\n}","language":"typescript"},"narration":"The Dalles is where the magic happens. Agent.prompt is the core loop: send messages to the LLM, parse tool calls, execute them, push results back, repeat. It stops when the LLM returns text with no tool calls. This loop is what makes agents autonomous."},{"name":"Oregon City","subtitle":"Session Persistence","concept":"Session Persistence","landmarkType":"town","code":{"file":"packages/coding-agent/src/core/sessions/session-manager.ts","content":"// packages/coding-agent/src/core/sessions/session-manager.ts\n\n// Compaction: when context exceeds the limit,\n// summarize but keep full JSONL history intact\nasync compact(\n  messages: Message[],\n  maxTokens: number\n): Promise<Message[]> {\n  const tokenCount = countTokens(messages)\n  if (tokenCount < maxTokens * 0.8) return messages\n\n  // Summarize old messages into a system prompt\n  const summary = await this.summarize(messages)\n  const compacted = [\n    { role: 'system', content: summary },\n    ...messages.slice(-10) // keep recent context\n  ]\n\n  // JSONL log is never truncated -- append\n  // a compaction marker for replay\n  this.append({ type: 'compaction', summary })\n\n  return compacted\n}","language":"typescript"},"narration":"You made it to Oregon City! Sessions are saved as append-only JSONL files in ~/.pi/agent/sessions/. When context grows too large, compaction summarizes old messages but the full JSONL history is never truncated. Your work is never lost. The session manager is the foundation that makes everything else possible."}],"events":[{"type":"weather","trigger":"after_stop","triggerStop":1,"title":"Config Storm!","text":"A storm of configuration options hits your CLI! The user can invoke Pi in multiple ways. How does Pi handle different input modes?","choices":[{"text":"Interactive CLI, piped stdin, and inline arguments -- three input modes","correct":true,"explanation":"Pi detects whether stdin is a TTY, checks for inline args, or falls back to interactive mode. All three paths converge into the same session."},{"text":"Only interactive mode -- you must type in the terminal","correct":false,"explanation":"Pi supports piped input (echo 'fix bug' | pi) and inline args (pi 'explain this') alongside interactive mode."},{"text":"Only file input -- you point it at a file to process","correct":false,"explanation":"Pi reads from stdin, args, or interactive input. File processing happens through the agent's tools, not the CLI entry point."}],"concept":"Session Persistence","difficulty":"easy"},{"type":"river","trigger":"after_stop","triggerStop":3,"title":"The Provider River Crossing!","text":"You face a wide river of LLM providers. Fifteen-plus APIs, each with different endpoints, auth schemes, and response formats. Why abstract them behind one unified API?","choices":[{"text":"Swap providers without changing agent code -- one interface for all","correct":true,"explanation":"The model registry normalizes everything. Switch from Claude to GPT to Gemini by changing one string. Your agent code never changes."},{"text":"All providers already have the same API, so it's just cosmetic","correct":false,"explanation":"Every provider has different endpoints, auth headers, streaming formats, and tool call schemas. The abstraction does real work."},{"text":"It's just for cost savings -- route to the cheapest provider","correct":false,"explanation":"Cost optimization is a benefit, but the core value is portability. Write once, run on any LLM."}],"concept":"Unified LLM API","difficulty":"medium"},{"type":"encounter","trigger":"after_stop","triggerStop":4,"title":"A Tool Maker Appears!","text":"A grizzled tool maker examines your tools and asks: 'Why does every tool need a bound working directory (cwd)?'","choices":[{"text":"File operations and bash commands must resolve relative paths correctly","correct":true,"explanation":"When the agent says 'read src/main.ts', the tool needs to know where src/ is. The cwd binding makes relative paths work without the LLM knowing absolute paths."},{"text":"It's a security restriction to prevent accessing files outside the project","correct":false,"explanation":"The cwd is for path resolution, not sandboxing. Tools can still access files outside the project if given absolute paths."},{"text":"Performance optimization -- tools cache file handles per directory","correct":false,"explanation":"There's no file handle caching. The cwd is purely about making relative paths resolve to the right location."}],"concept":"Tool System","difficulty":"easy"},{"type":"weather","trigger":"after_stop","triggerStop":5,"title":"Streaming Storm!","text":"A storm of data packets buffets your wagon! The LLM is generating a long response. Why stream responses instead of waiting for the full completion?","choices":[{"text":"Users see incremental output and tool calls can start as they're parsed","correct":true,"explanation":"Streaming gives immediate feedback. Users see text as it's generated, and tool calls can be dispatched the moment they're complete rather than after the entire response."},{"text":"It's faster for the LLM -- streaming reduces computation time","correct":false,"explanation":"The LLM generates tokens at the same speed either way. Streaming changes when you see them, not how fast they're produced."},{"text":"Required by all LLM APIs -- there's no non-streaming option","correct":false,"explanation":"Most APIs support both streaming and non-streaming modes. Pi chooses streaming for better UX and earlier tool dispatch."}],"concept":"Agent Loop","difficulty":"medium"},{"type":"misfortune","trigger":"after_stop","triggerStop":6,"title":"Tool Execution Failure!","text":"Disaster! The agent ran a bash command that failed with exit code 1. The build is broken. What happens next?","choices":[{"text":"Error captured and sent back to the LLM as context for self-correction","correct":true,"explanation":"The error message becomes a tool result. The LLM reads it, understands what went wrong, and tries a different approach. Errors are learning opportunities."},{"text":"The agent crashes and the session is lost","correct":false,"explanation":"Pi never crashes on tool errors. The error is captured, wrapped in a ToolResult, and returned to the LLM to reason about."},{"text":"The user must manually intervene and fix the command","correct":false,"explanation":"The agent loop handles tool failures automatically. The LLM sees the error and self-corrects without user intervention."}],"concept":"Tool System","difficulty":"medium"},{"type":"encounter","trigger":"after_stop","triggerStop":7,"title":"Loop Pioneer!","text":"A frontier philosopher asks: 'The agent loop calls the LLM, executes tools, and repeats. But when does it stop?'","choices":[{"text":"When the LLM returns end_turn with no tool calls","correct":true,"explanation":"The loop checks hasToolCalls after each iteration. When the LLM decides it's done and returns only text (no tool_use blocks), the loop breaks."},{"text":"After a fixed number of iterations to prevent infinite loops","correct":false,"explanation":"There's no fixed iteration limit in the core loop. The LLM decides when to stop by not requesting any more tools."},{"text":"When it runs out of context tokens","correct":false,"explanation":"Running out of tokens would be an error, not a graceful stop. The LLM signals completion by returning end_turn without tool calls."}],"concept":"Agent Loop","difficulty":"hard"}],"partyMembers":[{"name":"Unified LLM API","icon":"server","maxHealth":3},{"name":"Agent Loop","icon":"router","maxHealth":3},{"name":"Session Persistence","icon":"data","maxHealth":3},{"name":"Tool System","icon":"layout","maxHealth":3}],"deathMessages":["Died of infinite agent loop. The LLM never stopped calling tools.","Lost in provider configuration \u2014 no API key found for any model.","Drowned in context overflow. No compaction strategy equipped.","Killed by a malformed tool call. JSON parsing failed fatally.","Your session branched into an irreconcilable state.","Starved waiting for the streaming response. Connection timed out.","Died of dysentery... er, dependency conflicts in the monorepo.","Buried under unresolved npm workspace hoisting errors."]};

window.drawCustomEventOverlay = function(time) {
  if (!currentEventType && !currentEventTitle) return;

  var t = (time || 0) * 0.001; // seconds

  // --- CONFIG STORM: dark sky, lightning, rain ---
  if (currentEventTitle.indexOf('Config Storm') !== -1) {
    // Darken sky
    ctx.fillStyle = 'rgba(0,0,50,0.45)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning flash (periodic)
    var flashPhase = Math.sin(t * 1.7) + Math.sin(t * 3.1);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, 0, W, H);
      // Lightning bolt
      ctx.strokeStyle = '#FFFF55';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 80 + Math.sin(t * 2.3) * 60;
      ctx.moveTo(lx, 10);
      ctx.lineTo(lx - 5, 35);
      ctx.lineTo(lx + 8, 35);
      ctx.lineTo(lx - 3, 65);
      ctx.lineTo(lx + 10, 65);
      ctx.lineTo(lx + 2, 95);
      ctx.stroke();
    }
    // Rain
    ctx.strokeStyle = '#5555FF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 40; i++) {
      var rx = (i * 8.3 + t * 80) % W;
      var ry = (i * 13.7 + t * 120) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 1), Math.floor(ry + 5));
      ctx.stroke();
    }
    return;
  }

  // --- PROVIDER RIVER: deep blue, fog/mist over water ---
  if (currentEventTitle.indexOf('Provider River') !== -1) {
    // Fog layers drifting over the river
    ctx.fillStyle = 'rgba(85,85,255,0.12)';
    for (var i = 0; i < 6; i++) {
      var fogX = (i * 60 + t * 12 + Math.sin(i) * 20) % (W + 40) - 20;
      var fogY = 145 + Math.sin(t * 0.5 + i * 1.1) * 5;
      ctx.beginPath();
      ctx.arc(fogX, fogY, 20 + i * 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = 'rgba(170,170,255,0.08)';
    for (var i = 0; i < 8; i++) {
      var fogX = (i * 45 + t * 8) % (W + 30) - 15;
      var fogY = 150 + Math.sin(t * 0.3 + i * 0.8) * 8;
      ctx.beginPath();
      ctx.arc(fogX, fogY, 15 + i * 2, 0, Math.PI * 2);
      ctx.fill();
    }
    // Deeper water tint
    ctx.fillStyle = 'rgba(0,0,85,0.2)';
    ctx.fillRect(0, 155, W, 18);
    return;
  }

  // --- TOOL MAKER: person standing by campfire ---
  if (currentEventTitle.indexOf('Tool Maker') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8); // torso
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3); // head
    ctx.fillRect(px - 1, py - 4, 2, 5); // left leg
    ctx.fillRect(px + 3, py - 4, 2, 5); // right leg
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Anvil (tool maker!)
    ctx.fillStyle = '#AAAAAA';
    ctx.fillRect(212, 144, 10, 4);
    ctx.fillRect(214, 148, 6, 4);
    // Sparks
    ctx.fillStyle = '#FFFF55';
    var sparkPhase = Math.sin(t * 6);
    if (sparkPhase > 0.3) {
      ctx.fillRect(215 + Math.floor(sparkPhase * 3), 141, 2, 2);
      ctx.fillRect(219 - Math.floor(sparkPhase * 2), 140, 1, 1);
    }
    // Firelight glow (subtle)
    ctx.fillStyle = 'rgba(255,170,0,0.08)';
    ctx.beginPath();
    ctx.arc(217, 144, 15, 0, Math.PI * 2);
    ctx.fill();
    return;
  }

  // --- STREAMING STORM: dark sky, data rain, lightning ---
  if (currentEventTitle.indexOf('Streaming Storm') !== -1) {
    // Darken sky
    ctx.fillStyle = 'rgba(0,0,50,0.35)';
    ctx.fillRect(0, 0, W, 110);
    // Data rain (green characters falling)
    ctx.fillStyle = '#55FF55';
    ctx.font = '8px monospace';
    var chars = '01{}[]<>/=;:';
    for (var i = 0; i < 30; i++) {
      var dx = (i * 11.3) % W;
      var dy = (i * 17.7 + t * 60) % 110;
      ctx.globalAlpha = 0.3 + Math.sin(t + i) * 0.2;
      ctx.fillText(chars[i % chars.length], Math.floor(dx), Math.floor(dy));
    }
    ctx.globalAlpha = 1.0;
    // Occasional lightning
    var flashPhase = Math.sin(t * 2.1) + Math.sin(t * 3.7);
    if (flashPhase > 1.7) {
      ctx.fillStyle = 'rgba(85,255,85,0.15)';
      ctx.fillRect(0, 0, W, H);
    }
    return;
  }

  // --- TOOL EXECUTION FAILURE: red sky, smoke, warning ---
  if (currentEventTitle.indexOf('Tool Execution Failure') !== -1) {
    // Red danger tint
    ctx.fillStyle = 'rgba(170,0,0,0.25)';
    ctx.fillRect(0, 0, W, H);
    // Smoke particles rising
    ctx.fillStyle = '#555555';
    for (var i = 0; i < 15; i++) {
      var sx = 140 + Math.sin(i * 2.7 + t) * 30;
      var sy = 130 - ((t * 20 + i * 15) % 90);
      var size = 2 + (i % 3);
      ctx.globalAlpha = 0.3 + Math.sin(t + i) * 0.15;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), size, size);
    }
    ctx.globalAlpha = 1.0;
    // Fire at base
    ctx.fillStyle = '#FF5555';
    for (var i = 0; i < 8; i++) {
      var fx = 130 + i * 5;
      var fh = 4 + Math.sin(t * 6 + i * 1.5) * 3;
      ctx.fillRect(fx, Math.floor(140 - fh), 3, Math.floor(fh));
    }
    ctx.fillStyle = '#FFFF55';
    for (var i = 0; i < 5; i++) {
      var fx = 135 + i * 6;
      var fh = 2 + Math.sin(t * 8 + i * 2) * 2;
      ctx.fillRect(fx, Math.floor(139 - fh), 2, Math.floor(fh));
    }
    // Pulsing red border
    var pulse = (Math.sin(t * 4) + 1) * 0.15;
    ctx.strokeStyle = 'rgba(255,0,0,' + pulse.toFixed(2) + ')';
    ctx.lineWidth = 3;
    ctx.strokeRect(1, 1, W - 2, H - 2);
    ctx.lineWidth = 1;
    return;
  }

  // --- LOOP PIONEER: person with philosophical campfire ---
  if (currentEventTitle.indexOf('Loop Pioneer') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3);
    ctx.fillRect(px - 1, py - 4, 2, 5);
    ctx.fillRect(px + 3, py - 4, 2, 5);
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Campfire
    var fx = 212, fy = 148;
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(fx - 3, fy, 2, 3);
    ctx.fillRect(fx + 3, fy, 2, 3);
    ctx.fillStyle = '#FF5555';
    var flicker = Math.sin(t * 8) * 2;
    ctx.fillRect(fx - 1, fy - 3 + Math.floor(flicker * 0.3), 4, 3);
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(fx, fy - 5 + Math.floor(flicker * 0.5), 2, 2);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(fx - 1, fy - 2, 4, 2);
    // Infinity symbol floating above (loop metaphor)
    ctx.strokeStyle = '#55FFFF';
    ctx.lineWidth = 1;
    var iy = 130 + Math.sin(t * 2) * 3;
    ctx.beginPath();
    ctx.arc(210, iy, 5, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(220, iy, 5, 0, Math.PI * 2);
    ctx.stroke();
    // Firelight glow
    ctx.fillStyle = 'rgba(255,170,0,0.08)';
    ctx.beginPath();
    ctx.arc(fx + 1, fy - 2, 15, 0, Math.PI * 2);
    ctx.fill();
    return;
  }
};
</script>
