<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Coderegon Trail - Korb Edition</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100vh;
  overflow: hidden;
  background: #000;
  font-family: 'Courier New', monospace;
  color: #AAAAAA;
}
#game-container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}
#canvas-area {
  height: 52vh;
  min-height: 0;
  position: relative;
  background: #000;
}
#game-canvas {
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
  image-rendering: -moz-crisp-edges;
  image-rendering: crisp-edges;
  display: block;
}
#text-panel {
  flex: 1;
  min-height: 0;
  background: #000;
  border-top: 2px solid #555555;
  overflow-y: auto;
  padding: 8px 16px;
  font-size: 14px;
  line-height: 1.4;
  color: #FFFFFF;
}
#text-panel::-webkit-scrollbar { width: 8px; }
#text-panel::-webkit-scrollbar-track { background: #000; }
#text-panel::-webkit-scrollbar-thumb { background: #555555; }
#status-bar {
  height: 60px;
  min-height: 60px;
  background: #000;
  border-top: 2px solid #555555;
  display: flex;
  align-items: center;
  padding: 0 16px;
  font-size: 15px;
  color: #AAAAAA;
  white-space: nowrap;
  overflow: hidden;
}
.blink {
  animation: blink-anim 1s step-end infinite;
}
@keyframes blink-anim {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
  20%, 40%, 60%, 80% { transform: translateX(4px); }
}
.shake { animation: shake 0.5s ease-in-out; }
.code-box {
  background: #000;
  border: 1px solid #555555;
  padding: 6px 8px;
  margin: 6px 0;
  max-height: 130px;
  overflow-y: auto;
  overflow-x: auto;
  font-size: 12px;
  line-height: 1.3;
  white-space: pre;
  color: #55FF55;
}
.code-box::-webkit-scrollbar { width: 6px; height: 6px; }
.code-box::-webkit-scrollbar-track { background: #000; }
.code-box::-webkit-scrollbar-thumb { background: #555555; }
.choice-item { cursor: pointer; padding: 2px 4px; }
.choice-item:hover { color: #FFFF55; }
.choice-selected { color: #FFFF55; background: #333300; }
.stop-opt { color: #55FFFF; cursor: pointer; padding: 2px 4px; }
.stop-opt:hover { color: #FFFF55; }
.choice-correct { color: #55FF55; }
.choice-wrong { color: #FF5555; }
.choice-dimmed { color: #555555; }
.health-green { color: #00AA00; }
.health-yellow { color: #FFFF55; }
.health-red { color: #FF5555; }
.health-dead { color: #555555; text-decoration: line-through; }
.text-cyan { color: #55FFFF; }
.text-yellow { color: #FFFF55; }
.text-green { color: #55FF55; }
.text-red { color: #FF5555; }
.text-magenta { color: #FF55FF; }
.text-gray { color: #555555; }
.text-white { color: #FFFFFF; }
.text-bright { color: #FFFFFF; font-weight: bold; }
#music-indicator {
  position: absolute;
  top: 4px;
  right: 8px;
  font-size: 11px;
  color: #555555;
  z-index: 10;
  pointer-events: none;
}
</style>
</head>
<body>
<div id="game-container">
  <div id="canvas-area">
    <canvas id="game-canvas" width="320" height="200"></canvas>
    <div id="music-indicator">M: Music</div>
  </div>
  <div id="text-panel"></div>
  <div id="status-bar"></div>
</div>

<script>
// =====================================================================
// TRAIL DATA
// =====================================================================
const TRAIL_DATA={
  "framework": "korb",
  "trailName": "The Checkout Trail",
  "stops": [
    {
      "name": "Terminal Outpost",
      "subtitle": "CLI Argument Parsing",
      "concept": "CLI Architecture",
      "landmarkType": "town",
      "code": {
        "file": "src/Cli.hs",
        "content": "-- src/Cli.hs (simplified)\ndata Command\n  = Store StoreCommand\n  | Search Text [SearchAttribute] [Slug]\n  | Login\n  | Slots\n  | Favorites FavoritesCommand\n  | Basket BasketCommand\n  | Checkout CheckoutCommand\n  | Order OrderCommand\n  | Suggestion SuggestionCommand\n  | Categories\n  deriving stock (Show, Eq)\n\ncommandParser :: Parser Command\ncommandParser =\n  hsubparser $\n    command \"store\" (info storeParser (progDesc \"Show or set store\"))\n    <> command \"search\" (info searchParser (progDesc \"Search products\"))\n    <> command \"login\" (info loginParser (progDesc \"Authenticate\"))\n    <> command \"basket\" (info basketParser (progDesc \"Manage basket\"))\n    <> command \"checkout\" (info checkoutParser (progDesc \"Checkout\"))\n    <> command \"orders\" (info orderParser (progDesc \"Manage orders\"))",
        "language": "haskell"
      },
      "narration": "Every grocery run starts at the terminal. Korb uses optparse-applicative to define a sum type of all possible commands. Each variant carries its own data. The hsubparser combinator turns subcommands into a clean algebraic data type. No stringly-typed arguments here."
    },
    {
      "name": "Store Selection Pass",
      "subtitle": "Finding Your Market",
      "concept": "Store Configuration",
      "landmarkType": "camp",
      "code": {
        "file": "src/StoreApi.hs + src/Storage.hs",
        "content": "-- src/StoreApi.hs\nsearchForStores :: HttpClient -> ZipCode -> IOE ApiError [PickupMarket]\nsearchForStores HttpClient{get} (ZipCode plz) = do\n  res :: ReweResponse ServiceArea <-\n    get (ApiUrl (\"https://mobile-clients-api.rewe.de/api/service-portfolio/\" <> plz)) [] []\n  pure $ maybe [] (.pickupMarkets) res.data_.servicePortfolio\n\n-- src/Storage.hs\ndata CurrentStore = CurrentStore\n  { wwIdent :: WwIdent, zipCode :: ZipCode }\n\nwriteSettings :: WwIdent -> ZipCode -> IOE FileError CurrentStore\nwriteSettings (WwIdent wwIdent) (ZipCode zipCode) =\n  liftIOE FileError $ do\n    dir <- configDir\n    createDirectoryIfMissing True dir\n    TIO.writeFile (dir </> \"selected_store\") wwIdent\n    TIO.writeFile (dir </> \"selected_zip\") zipCode\n    pure $ CurrentStore (WwIdent wwIdent) (ZipCode zipCode)",
        "language": "haskell"
      },
      "narration": "Before shopping, you pick your local REWE market. The store API takes a zip code and returns pickup locations. Your selection gets persisted as plain text files in the XDG config directory. Simple, no database needed. This config is loaded on every subsequent command."
    },
    {
      "name": "Authentication Ridge",
      "subtitle": "PKCE OAuth Flow",
      "concept": "Authentication",
      "landmarkType": "mountain",
      "code": {
        "file": "src/Auth.hs",
        "content": "-- src/Auth.hs\ngeneratePKCE :: IO (ByteString, ByteString)\ngeneratePKCE = do\n  bytes <- getEntropy 32\n  let verifier = encodeUnpadded bytes\n      challenge = encodeUnpadded (convert (hash verifier :: Digest SHA256))\n  pure (verifier, challenge)\n\nloginFlow :: TokenStore -> HttpClient -> IOE AppError Text\nloginFlow store HttpClient{urlFromEncodedPost} = do\n  (url, verifier) <- liftE generateAuthUrl\n  redirect <- liftIO $ do\n    putStrLn \"1. Open this URL in Chrome:\"\n    TIO.putStr url\n    putStrLn \"2. Log in normally (email, password, 2FA)\"\n    putStrLn \"3. Copy the redirect URL and paste it here:\"\n    TIO.getLine\n  code <- liftE $ except (extractCodeFromRedirect redirect)\n  tknRes :: TokenResponse <-\n    liftE $ urlFromEncodedPost (reweFormEncodedBody code verifier) tokenEndpoint\n  liftE $ store.storeAccess tknRes.access_token\n  liftE $ store.storeRefresh tknRes.refresh_token\n  pure \"Login succeeded, tokens stored\"",
        "language": "haskell"
      },
      "narration": "The steepest climb on the trail. Korb reverse-engineers REWE's mobile app OAuth flow using PKCE. It generates a cryptographic verifier, hashes it with SHA-256 to create a challenge, and builds the authorization URL. The user logs in via browser, copies the redirect, and korb exchanges the auth code for tokens. Real crypto in a grocery CLI."
    },
    {
      "name": "Token Refresh Falls",
      "subtitle": "JWT Validation and Refresh",
      "concept": "Authentication",
      "landmarkType": "river",
      "code": {
        "file": "src/Auth.hs",
        "content": "-- src/Auth.hs\ndecodeJWT :: AccessToken -> Either AuthError Int64\ndecodeJWT (AccessToken tkn) = do\n  jwtPayload <- case splitOn \".\" tkn of\n    (_ : token : _) -> first (AuthError . pack) $\n      decodeUnpadded $ encodeUtf8 token\n    _ -> Left $ AuthError \"Access token in wrong format\"\n  case eitherDecodeStrict jwtPayload of\n    Right (Exp expiry) -> pure expiry\n    Left err -> Left (AuthError $ pack err)\n\ngetValidToken :: TokenStore -> HttpClient -> IOE AppError AccessToken\ngetValidToken store client = do\n  token <- liftE store.readAccess\n  expiry <- liftE $ except $ decodeJWT token\n  now :: Int64 <- round <$> liftIO getPOSIXTime\n  if now < expiry - 30 then pure token else refreshFlow store client",
        "language": "haskell"
      },
      "narration": "Crossing the Token Refresh Falls. Every authenticated request first checks if the JWT is still valid. Korb splits the JWT on dots, base64-decodes the payload, and extracts the expiry timestamp. If the token expires within 30 seconds, it silently refreshes using the stored refresh token. Users never see re-authentication."
    },
    {
      "name": "HTTP Client Gorge",
      "subtitle": "mTLS and curl Wrapper",
      "concept": "HTTP Transport",
      "landmarkType": "forest",
      "code": {
        "file": "src/HttpClient.hs",
        "content": "-- src/HttpClient.hs\ndata HttpClient = HttpClient\n  { get :: forall res. (FromJSON res) =>\n      ApiUrl -> Headers -> QueryParams -> IOE ApiError res\n  , post :: forall res req. (FromJSON res, ToJSON req) =>\n      req -> ApiUrl -> Headers -> QueryParams -> IOE ApiError res\n  , patch :: forall res req. (FromJSON res, ToJSON req) =>\n      req -> ApiUrl -> Headers -> QueryParams -> IOE ApiError res\n  , delete :: forall res. (FromJSON res) =>\n      ApiUrl -> Headers -> QueryParams -> IOE ApiError res\n  }\n\ncertPem :: ByteString\ncertPem = $(embedFile \"certs/mobile-clients-api.rewe.de/private.pem\")\n\nmkHttpClient :: IOE AppError HttpClient\nmkHttpClient = do\n  (certPath, keyPath) <- liftE writeCertsToTemp\n  curlBin <- liftE $ liftIOE FileError $\n    pack . fromMaybe \"curl\" <$> lookupEnv \"KORB_CURL\"\n  pure HttpClient { get = \\url hdrs qps ->\n    curlJson curlBin certPath keyPath GET url hdrs qps Nothing, ... }",
        "language": "haskell"
      },
      "narration": "Deep in HTTP Client Gorge, korb uses a record of polymorphic functions as its HTTP abstraction. The real trick is mTLS. Client certificates are extracted from the REWE mobile app and embedded into the binary at compile time with Template Haskell. They are written to temp files at runtime and passed to curl. No Haskell HTTP library needed."
    },
    {
      "name": "Product Search Prairie",
      "subtitle": "Searching and Browsing",
      "concept": "Product Search",
      "landmarkType": "camp",
      "code": {
        "file": "src/ReweApi.hs",
        "content": "-- src/ReweApi.hs\nsearchRewe :: RewePublicApi -> Text -> [SearchAttribute] -> [Slug]\n  -> IOE ApiError [Product]\nsearchRewe RewePublicApi{search} query attributes categories = do\n  let attributeFilters =\n        (\\a -> \"attribute=\" <> attributeToText a) <$> attributes\n  let categoryFilters =\n        (\\(Slug slug) -> \"categorySlug=\" <> slug) <$> categories\n  let filters = intercalate \"&\" (attributeFilters ++ categoryFilters)\n  searchRes <- search [(\"query\", query), (\"filters\", filters)]\n  pure searchRes.data_.products.products\n\n-- src/ReweApi/Types.hs\ndata Product = Product\n  { articleId :: Text\n  , productId :: ProductId\n  , title :: Text\n  , imageURL :: Text\n  , orderLimit :: Maybe Int\n  , listing :: Listing\n  , attributes :: Maybe ProductAttributes\n  }",
        "language": "haskell"
      },
      "narration": "Out on the Product Search Prairie, you find what you need. Filters for organic, vegan, regional, and vegetarian get converted to query parameters. Category slugs narrow the search further. The Product type captures everything REWE returns. Search is the only public endpoint that does not require authentication."
    },
    {
      "name": "Basket Management Camp",
      "subtitle": "Cart Operations",
      "concept": "Cart Management",
      "landmarkType": "camp",
      "code": {
        "file": "src/ReweApi.hs",
        "content": "-- src/ReweApi.hs\nbasket :: ReweAuthedApi -> IOE ApiError Basket\nbasket ReweAuthedApi{getBaseket} = do\n  reweRes <- getBaseket\n  pure reweRes.data_.basket\n\nbasketsAdd :: ReweAuthedApi -> Item -> IOE ApiError (Maybe LineItem)\nbasketsAdd ReweAuthedApi{getBaseket, addItemToBasket}\n  Item{listingId, quantity} = do\n  reweResponse <- getBaseket\n  let currentBasket = reweResponse.data_.basket\n  reweRes <-\n    addItemToBasket\n      currentBasket.id\n      listingId\n      (fromMaybe (Qty 1) quantity)\n      currentBasket.version\n  let wasDelete = any (\\(Qty q) -> q <= 0) quantity\n  let addedLineItem =\n        find (\\li -> li.product.listing.listingId == listingId)\n          reweRes.data_.basket.lineItems\n  maybe\n    (if wasDelete then pure Nothing\n     else throwE $ ApiError \"Item was not added to basket\")\n    pure $ Just addedLineItem",
        "language": "haskell"
      },
      "narration": "Setting up camp at Basket Management. Adding to the basket requires first fetching the current basket to get its ID and version, a form of optimistic concurrency control. Quantity zero means delete. The function checks if the item actually appeared in the response. Notice how Haskell's Maybe type makes the success and delete paths explicit."
    },
    {
      "name": "Checkout Frontier",
      "subtitle": "Timeslot, Payment, and Order",
      "concept": "Checkout Pipeline",
      "landmarkType": "town",
      "code": {
        "file": "src/ReweApi.hs",
        "content": "-- src/ReweApi.hs\ncheckoutTimeslot :: ReweAuthedApi -> TimeslotId\n  -> IOE ApiError CheckoutResponse\ncheckoutTimeslot api@ReweAuthedApi{\n  patchCheckoutTimeslot, reserveTimeslot = reserve, addPayment\n  } timeslot = do\n  co <- checkout api\n  reservedTimeslot <- (.data_.createTimeslotReservation)\n    <$> reserve timeslot\n  _ <- (.data_) <$> patchCheckoutTimeslot\n    co.basket.id co.checkout.id reservedTimeslot.slotId\n  (.data_) <$> addPayment co.basket.id co.checkout.id\n\norderCheckout :: ReweAuthedApi -> IOE ApiError OrderResponse\norderCheckout api@ReweAuthedApi{postOrder, confirmOrder} = do\n  co <- checkout api\n  when (null co.checkout.timeslot) $\n    throwE (ApiError \"No timeslot for pickup set.\")\n  _ <- confirmOrder co.checkout.id co.basket.id\n  (.data_) <$> postOrder co.checkout.id",
        "language": "haskell"
      },
      "narration": "You made it to Checkout Frontier! The final pipeline is a careful multi-step dance: create checkout from basket, reserve a timeslot, patch the timeslot onto the checkout, set payment to in-market, confirm the order, then place it. Each step is a separate API call. Miss any step and the order fails. Your wagon has arrived at the REWE pickup counter."
    }
  ],
  "events": [
    {
      "type": "weather",
      "trigger": "after_stop",
      "triggerStop": 1,
      "title": "Cloudflare Storm!",
      "text": "A storm of TLS fingerprinting hits your requests! REWE's Cloudflare protection is blocking automated clients. How do you weather this storm?",
      "choices": [
        {
          "text": "Use mTLS client certificates extracted from the mobile app",
          "correct": true,
          "explanation": "Korb embeds the REWE mobile app's client certificates and presents them via curl's --cert and --key flags. This makes requests look like they come from the official app."
        },
        {
          "text": "Set a User-Agent header to pretend to be a browser",
          "correct": false,
          "explanation": "User-Agent spoofing alone won't fool mTLS verification. The server requires a valid client certificate signed by the expected CA."
        },
        {
          "text": "Use a headless browser to make all API calls",
          "correct": false,
          "explanation": "Running a full browser for JSON API calls is massive overkill. The mTLS certificates are the key that unlocks the mobile API."
        }
      ],
      "concept": "HTTP Transport",
      "difficulty": "easy"
    },
    {
      "type": "encounter",
      "trigger": "after_stop",
      "triggerStop": 2,
      "title": "A Haskell Developer Appears",
      "text": "A fellow traveler asks: 'Korb uses ExceptT e IO a everywhere, aliased as IOE. Why not just use IO with exceptions?'",
      "choices": [
        {
          "text": "ExceptT makes errors visible in the type signature so the compiler enforces handling",
          "correct": true,
          "explanation": "IOE ApiError forces callers to handle or propagate the specific error type. The LiftError typeclass then lets you compose different error domains into AppError. The compiler catches unhandled cases."
        },
        {
          "text": "ExceptT is faster than IO exceptions at runtime",
          "correct": false,
          "explanation": "ExceptT is actually slightly slower due to the Either wrapper. The benefit is type safety, not performance."
        },
        {
          "text": "IO exceptions don't work with async code",
          "correct": false,
          "explanation": "IO exceptions work fine with async code. The choice of ExceptT is about making error handling explicit in types, not about async compatibility."
        }
      ],
      "concept": "CLI Architecture",
      "difficulty": "medium"
    },
    {
      "type": "river",
      "trigger": "after_stop",
      "triggerStop": 3,
      "title": "The PKCE River",
      "text": "You've reached the deepest river on the trail. The OAuth flow requires proving you're the same client who started the authorization request. How do you cross?",
      "choices": [
        {
          "text": "Generate a random verifier, hash it as a challenge, send the challenge first, then prove the verifier later",
          "correct": true,
          "explanation": "PKCE generates a random verifier, SHA-256 hashes it into a code_challenge sent with the auth request, then sends the original verifier when exchanging the code. The server hashes the verifier to verify it matches. No client secret needed."
        },
        {
          "text": "Store a client secret in the binary and send it with every request",
          "correct": false,
          "explanation": "Client secrets in distributed binaries are easily extracted. PKCE was invented specifically because native apps can't keep secrets. The challenge-verifier pattern proves identity without shared secrets."
        },
        {
          "text": "Use basic HTTP authentication with username and password",
          "correct": false,
          "explanation": "Sending raw credentials with every request is insecure and doesn't support the redirect-based OAuth flow. PKCE provides cryptographic proof of the authorization initiator."
        }
      ],
      "concept": "Authentication",
      "difficulty": "hard"
    },
    {
      "type": "misfortune",
      "trigger": "after_stop",
      "triggerStop": 4,
      "title": "Expired Token Breakdown!",
      "text": "Disaster! Your access token expired mid-request. The basket API returns 401 Unauthorized. Your shopping list is still full!",
      "choices": [
        {
          "text": "Check the JWT expiry before each request and silently refresh using the refresh token",
          "correct": true,
          "explanation": "getValidToken decodes the JWT payload, checks if now < expiry - 30, and triggers refreshFlow if needed. The 30-second buffer prevents edge-case expiry during the request. Users never see auth errors."
        },
        {
          "text": "Catch the 401 error and ask the user to run korb login again",
          "correct": false,
          "explanation": "Forcing re-login on every token expiry is terrible UX. The whole point of refresh tokens is transparent re-authentication without user interaction."
        },
        {
          "text": "Request a token with a very long expiry so it never expires",
          "correct": false,
          "explanation": "Token lifetime is controlled by the server, not the client. Short-lived access tokens with refresh tokens is the secure pattern. Korb can't change REWE's token policy."
        }
      ],
      "concept": "Authentication",
      "difficulty": "medium"
    },
    {
      "type": "weather",
      "trigger": "after_stop",
      "triggerStop": 5,
      "title": "Type Storm!",
      "text": "A blizzard of API responses is hitting your code. REWE wraps every response in {\"data\": ...} and each endpoint returns different nested structures. How do you stay type-safe?",
      "choices": [
        {
          "text": "Define a generic ReweResponse wrapper with GHC Generics-derived JSON parsing",
          "correct": true,
          "explanation": "ReweResponse maps the 'data' field to 'data_' via fieldLabelModifier in genericParseJSON. Each endpoint gets its own response type inside. The compiler ensures you access only fields that exist."
        },
        {
          "text": "Parse everything as a raw JSON Value and use dynamic lookups",
          "correct": false,
          "explanation": "Dynamic JSON access throws away all type safety. You'd discover missing fields at runtime instead of compile time. Aeson's FromJSON instances catch these errors early."
        },
        {
          "text": "Write manual JSON parsing for each response type",
          "correct": false,
          "explanation": "Manual parsing is error-prone and verbose. GHC Generics derives correct FromJSON instances automatically from the Haskell record structure. Less code, fewer bugs."
        }
      ],
      "concept": "HTTP Transport",
      "difficulty": "medium"
    },
    {
      "type": "encounter",
      "trigger": "after_stop",
      "triggerStop": 6,
      "title": "A Smart Shopper Appears",
      "text": "A clever traveler shows you their workflow: 'I use korb suggestion threshold 5 to find items that push my cart past the free pickup minimum. It checks my last 10 orders and ranks by purchase frequency.' What's the key insight?",
      "choices": [
        {
          "text": "Sort by purchase frequency descending, exclude items already in basket, take N",
          "correct": true,
          "explanation": "The suggestion engine counts how often each product appears across recent orders, filters out items already in the basket, sorts by frequency descending, and takes the requested number. Formally verified with Lean 4 proofs."
        },
        {
          "text": "Recommend the cheapest items to minimize spending while hitting the threshold",
          "correct": false,
          "explanation": "Price optimization misses the point. The suggestions should be items you actually want to buy. Frequency ranking ensures you get items you regularly purchase."
        },
        {
          "text": "Randomly select from past purchases to add variety",
          "correct": false,
          "explanation": "Random selection would suggest items you rarely buy. Frequency ranking surfaces your staples, the items most likely to be useful additions."
        }
      ],
      "concept": "Product Search",
      "difficulty": "easy"
    },
    {
      "type": "misfortune",
      "trigger": "after_stop",
      "triggerStop": 7,
      "title": "Empty Basket Crash!",
      "text": "You try to checkout but the basket is empty! The API will reject an empty checkout and your order flow crashes.",
      "choices": [
        {
          "text": "Check if lineItems is empty before calling the checkout API and throw a descriptive error",
          "correct": true,
          "explanation": "Korb checks 'when (null currentBasket.lineItems)' and throws a clear ApiError before hitting the network. Fail fast with a good message beats a cryptic API error."
        },
        {
          "text": "Let the API return an error and display whatever it says",
          "correct": false,
          "explanation": "API error messages are often cryptic and unhelpful. Client-side validation gives users actionable feedback before wasting a network round trip."
        },
        {
          "text": "Automatically add a suggested item to the basket so it's never empty",
          "correct": false,
          "explanation": "Silently adding items the user didn't request would be surprising and potentially costly. The correct approach is to inform the user and let them decide."
        }
      ],
      "concept": "Cart Management",
      "difficulty": "easy"
    }
  ],
  "partyMembers": [
    {

const STATES = { TITLE: 'TITLE', SETUP: 'SETUP', TRAVEL: 'TRAVEL', STOP: 'STOP', EVENT: 'EVENT', RIVER: 'RIVER', DEATH: 'DEATH', WIN: 'WIN' };
const PROFESSIONS = [
  { name: 'Ralph Wiggum', desc: '"I\'m learnding!"', health: 999, supplies: 999, hintFree: true, forgiving: true },

// Seeded PRNG for consistent landscape
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xFFFFFFFF;
    return (s >>> 0) / 0xFFFFFFFF;
  };
}

function drawPixelCloud(x, y, w, h) {
  ctx.fillStyle = '#FFFFFF';
  const ix = Math.floor(x), iy = Math.floor(y), iw = Math.floor(w), ih = Math.floor(h);
  ctx.fillRect(ix, iy, iw, ih);
  ctx.fillRect(ix + Math.floor(iw * 0.15), iy - Math.floor(ih * 0.5), Math.floor(iw * 0.3), Math.floor(ih * 0.6));
  ctx.fillRect(ix + Math.floor(iw * 0.4), iy - Math.floor(ih * 0.7), Math.floor(iw * 0.35), Math.floor(ih * 0.8));
  ctx.fillRect(ix + Math.floor(iw * 0.65), iy - Math.floor(ih * 0.3), Math.floor(iw * 0.2), Math.floor(ih * 0.4));
}

function drawMountain(x, h, w, color, snowCap) {
  const baseY = 110;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(Math.floor(x), baseY);
  ctx.lineTo(Math.floor(x + w / 2), Math.floor(baseY - h));
  ctx.lineTo(Math.floor(x + w), baseY);
  ctx.closePath();
  ctx.fill();
  if (snowCap) {
    ctx.fillStyle = '#FFFFFF';
    const peakX = x + w / 2;
    const peakY = baseY - h;
    ctx.beginPath();
    ctx.moveTo(Math.floor(peakX - w * 0.1), Math.floor(peakY + h * 0.18));
    ctx.lineTo(Math.floor(peakX), Math.floor(peakY));
    ctx.lineTo(Math.floor(peakX + w * 0.1), Math.floor(peakY + h * 0.18));
    ctx.closePath();
    ctx.fill();
  }
}

function drawTree(x, baseY, h) {
  const trunkW = 3, trunkH = Math.floor(h * 0.3);
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(x - 1), Math.floor(baseY - trunkH), trunkW, trunkH);
  for (let i = 0; i < 3; i++) {
    const layerW = (h * 0.4) * (1 - i * 0.15);
    const layerY = baseY - trunkH - (i * h * 0.2);
    ctx.fillStyle = i === 1 ? '#00AA00' : '#005500';
    ctx.beginPath();
    ctx.moveTo(Math.floor(x - layerW / 2), Math.floor(layerY));
    ctx.lineTo(Math.floor(x + 0.5), Math.floor(layerY - h * 0.25));
    ctx.lineTo(Math.floor(x + layerW / 2), Math.floor(layerY));
    ctx.closePath();
    ctx.fill();
  }
}

function drawWagon(wx, wy) {
  // Oxen (two brown lumps)
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(wx - 24), Math.floor(wy - 6), 8, 6);
  ctx.fillRect(Math.floor(wx - 14), Math.floor(wy - 6), 8, 6);
  // Oxen legs
  ctx.fillStyle = '#553300';
  ctx.fillRect(Math.floor(wx - 22), Math.floor(wy), 2, 4);
  ctx.fillRect(Math.floor(wx - 18), Math.floor(wy), 2, 4);
  ctx.fillRect(Math.floor(wx - 12), Math.floor(wy), 2, 4);
  ctx.fillRect(Math.floor(wx - 8), Math.floor(wy), 2, 4);
  // Oxen heads
  ctx.fillStyle = '#885500';
  ctx.fillRect(Math.floor(wx - 26), Math.floor(wy - 7), 3, 3);
  ctx.fillRect(Math.floor(wx - 16), Math.floor(wy - 7), 3, 3);
  // Yoke
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(wx - 4), Math.floor(wy - 4), 6, 2);
  // Wagon body
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(wx + 2), Math.floor(wy - 8), 24, 10);
  // Wagon sides darker
  ctx.fillStyle = '#885500';
  ctx.fillRect(Math.floor(wx + 2), Math.floor(wy - 8), 24, 1);
  ctx.fillRect(Math.floor(wx + 2), Math.floor(wy + 1), 24, 1);
  // Canvas cover (white curved top)
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.moveTo(Math.floor(wx + 3), Math.floor(wy - 8));
  ctx.quadraticCurveTo(Math.floor(wx + 14), Math.floor(wy - 22), Math.floor(wx + 25), Math.floor(wy - 8));
  ctx.closePath();
  ctx.fill();
  // Canvas cover outline
  ctx.strokeStyle = '#AAAAAA';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(Math.floor(wx + 3), Math.floor(wy - 8));
  ctx.quadraticCurveTo(Math.floor(wx + 14), Math.floor(wy - 22), Math.floor(wx + 25), Math.floor(wy - 8));
  ctx.stroke();
  // Canvas ribs
  ctx.strokeStyle = '#AAAAAA';
  for (let ri = 0; ri < 3; ri++) {
    const rx = wx + 8 + ri * 5;
    ctx.beginPath();
    ctx.moveTo(Math.floor(rx), Math.floor(wy - 8));
    ctx.lineTo(Math.floor(rx), Math.floor(wy - 14 - ri % 2 * 2));
    ctx.stroke();
  }
  // Wheels
  const wheelR = 5;
  for (let wi = 0; wi < 2; wi++) {
    const wcx = wx + 7 + wi * 14;
    const wcy = wy + 4;
    // Outer rim
    ctx.fillStyle = '#553300';
    ctx.beginPath();
    ctx.arc(Math.floor(wcx), Math.floor(wcy), wheelR, 0, Math.PI * 2);
    ctx.fill();
    // Inner
    ctx.fillStyle = '#AA5500';
    ctx.beginPath();
    ctx.arc(Math.floor(wcx), Math.floor(wcy), wheelR - 1.5, 0, Math.PI * 2);
    ctx.fill();
    // Spokes
    ctx.strokeStyle = '#553300';
    ctx.lineWidth = 1;
    for (let si = 0; si < 6; si++) {
      const angle = wagonWheelAngle + (si * Math.PI / 3);
      ctx.beginPath();
      ctx.moveTo(Math.floor(wcx), Math.floor(wcy));
      ctx.lineTo(Math.floor(wcx + Math.cos(angle) * (wheelR - 1)), Math.floor(wcy + Math.sin(angle) * (wheelR - 1)));
      ctx.stroke();
    }
    // Hub
    ctx.fillStyle = '#553300';
    ctx.fillRect(Math.floor(wcx - 1), Math.floor(wcy - 1), 2, 2);
  }
  // Purple flag
  ctx.fillStyle = '#AA00AA';
  ctx.fillRect(Math.floor(wx + 14), Math.floor(wy - 22), 1, -7);
  ctx.fillStyle = '#FF55FF';
  ctx.fillRect(Math.floor(wx + 15), Math.floor(wy - 29), 6, 4);
}

function drawLandmark(type, x, baseY) {
  switch (type) {
    case 'town':
      ctx.fillStyle = '#AA5500';
      ctx.fillRect(Math.floor(x), Math.floor(baseY - 18), 14, 18);
      ctx.fillRect(Math.floor(x + 18), Math.floor(baseY - 14), 12, 14);
      // Roofs
      ctx.fillStyle = '#555555';
      ctx.beginPath();
      ctx.moveTo(Math.floor(x - 2), Math.floor(baseY - 18));
      ctx.lineTo(Math.floor(x + 7), Math.floor(baseY - 25));
      ctx.lineTo(Math.floor(x + 16), Math.floor(baseY - 18));
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(Math.floor(x + 16), Math.floor(baseY - 14));
      ctx.lineTo(Math.floor(x + 24), Math.floor(baseY - 20));
      ctx.lineTo(Math.floor(x + 32), Math.floor(baseY - 14));
      ctx.closePath();
      ctx.fill();
      // Windows
      ctx.fillStyle = '#FFFF55';
      ctx.fillRect(Math.floor(x + 3), Math.floor(baseY - 13), 3, 3);
      ctx.fillRect(Math.floor(x + 9), Math.floor(baseY - 13), 3, 3);
      ctx.fillRect(Math.floor(x + 21), Math.floor(baseY - 10), 3, 3);
      // Door
      ctx.fillStyle = '#553300';
      ctx.fillRect(Math.floor(x + 5), Math.floor(baseY - 7), 4, 7);
      break;
    case 'camp':
      // Tent
      ctx.fillStyle = '#AAAAAA';
      ctx.beginPath();
      ctx.moveTo(Math.floor(x - 6), Math.floor(baseY));
      ctx.lineTo(Math.floor(x + 4), Math.floor(baseY - 14));
      ctx.lineTo(Math.floor(x + 14), Math.floor(baseY));
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#555555';
      ctx.beginPath();
      ctx.moveTo(Math.floor(x + 4), Math.floor(baseY));
      ctx.lineTo(Math.floor(x + 4), Math.floor(baseY - 14));
      ctx.lineTo(Math.floor(x + 14), Math.floor(baseY));
      ctx.closePath();
      ctx.fill();
      // Campfire
      ctx.fillStyle = '#FF5555';
      ctx.fillRect(Math.floor(x + 20), Math.floor(baseY - 5), 4, 3);
      ctx.fillStyle = '#FFFF55';
      ctx.fillRect(Math.floor(x + 21), Math.floor(baseY - 8), 2, 3);
      ctx.fillStyle = '#FFAA00';
      ctx.fillRect(Math.floor(x + 18), Math.floor(baseY - 2), 8, 2);
      break;
    case 'mountain':
      drawMountain(x - 20, 60, 50, '#AA00AA', true);
      drawMountain(x + 10, 45, 40, '#FF55FF', true);
      break;
    case 'river':
      ctx.fillStyle = '#AA5500';
      ctx.fillRect(Math.floor(x), Math.floor(baseY - 20), 3, 20);
      ctx.fillRect(Math.floor(x + 24), Math.floor(baseY - 20), 3, 20);
      ctx.strokeStyle = '#AAAAAA';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(Math.floor(x + 1), Math.floor(baseY - 18));
      ctx.lineTo(Math.floor(x + 25), Math.floor(baseY - 18));
      ctx.stroke();
      // Sign
      ctx.fillStyle = '#AA5500';
      ctx.fillRect(Math.floor(x + 8), Math.floor(baseY - 25), 12, 8);
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(Math.floor(x + 10), Math.floor(baseY - 23), 2, 1);
      ctx.fillRect(Math.floor(x + 13), Math.floor(baseY - 23), 2, 1);
      ctx.fillRect(Math.floor(x + 16), Math.floor(baseY - 23), 2, 1);
      break;
    case 'forest':
      for (let i = 0; i < 6; i++) {
        drawTree(x + i * 7, baseY, 14 + (i % 3) * 3);
      }
      break;
  }
}

function drawRiver(time) {
  const riverY = 155;
  const riverH = 18;
  ctx.fillStyle = '#0000AA';
  ctx.fillRect(0, riverY, W, riverH);
  ctx.fillStyle = '#00AAAA';
  for (let wx = 0; wx < W; wx += 3) {
    const waveY = riverY + 3 + Math.sin((wx + time * 0.05) * 0.08) * 3;
    ctx.fillRect(wx, Math.floor(waveY), 2, 1);
    const waveY2 = riverY + 10 + Math.sin((wx + time * 0.03 + 50) * 0.1) * 2;
    ctx.fillRect(wx, Math.floor(waveY2), 2, 1);
  }
  // White foam
  ctx.fillStyle = '#55FFFF';
  for (let wx = 0; wx < W; wx += 12) {
    const foamY = riverY + 1 + Math.sin((wx + time * 0.04) * 0.06) * 1;
    ctx.fillRect(wx + 2, Math.floor(foamY), 3, 1);
  }
}

  ctx.fillRect(ox - 10, oy + 4, 6, 3);
  // Eye
  ctx.fillStyle = '#000';
  ctx.fillRect(ox - 7, oy, 2, 2);
  // Legs
  ctx.fillStyle = G;
  ctx.fillRect(ox + 2, oy + 14, 4, 8);
  ctx.fillRect(ox + 10, oy + 14, 4, 8);
  ctx.fillRect(ox + 16, oy + 14, 4, 8);
  // Tail
  ctx.fillRect(ox + 24, oy + 2, 6, 2);
  ctx.fillRect(ox + 29, oy, 2, 4);

  // --- HITCH ---
  ctx.fillStyle = G;
  ctx.fillRect(ox + 28, oy + 8, 14, 2);

  // --- WAGON ---
  var wx = 142, wy = 108;
  // Wagon bed
  ctx.fillStyle = G;
  ctx.fillRect(wx, wy + 20, 50, 16);
  // Bed slats (dark lines)
  ctx.fillStyle = GD;
  ctx.fillRect(wx, wy + 24, 50, 1);
  ctx.fillRect(wx, wy + 28, 50, 1);
  ctx.fillRect(wx, wy + 32, 50, 1);
  // Side rails
  ctx.fillStyle = G;
  ctx.fillRect(wx, wy + 18, 2, 18);
  ctx.fillRect(wx + 48, wy + 18, 2, 18);

  // Canvas cover (the bonnet)
  ctx.fillStyle = G;
  // Left arch
  ctx.fillRect(wx + 4, wy + 4, 2, 16);
  // Right arch
  ctx.fillRect(wx + 44, wy + 4, 2, 16);
  // Top cover
  ctx.fillRect(wx + 4, wy + 2, 42, 4);
  // Cover fill
  ctx.fillRect(wx + 6, wy + 6, 38, 12);
  // Cover shading
  ctx.fillStyle = GD;
  ctx.fillRect(wx + 8, wy + 8, 34, 2);
  ctx.fillRect(wx + 8, wy + 12, 34, 2);
  ctx.fillRect(wx + 8, wy + 16, 34, 1);

  // Wheels
  var wheelR = 8;
  var wheels = [wx + 8, wx + 42];
  var wa = t * 0.5; // slow rotation
  ctx.strokeStyle = G;
  ctx.lineWidth = 1.5;
  for (var wi = 0; wi < wheels.length; wi++) {
    var cx = wheels[wi], cy = wy + 38;
    // Rim
    ctx.beginPath();
    ctx.arc(cx, cy, wheelR, 0, Math.PI * 2);
    ctx.stroke();
    // Spokes
    for (var sp = 0; sp < 6; sp++) {
      var angle = wa + sp * Math.PI / 3;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(angle) * wheelR, cy + Math.sin(angle) * wheelR);
      ctx.stroke();
    }
    // Hub
    ctx.fillStyle = G;
    ctx.beginPath();
    ctx.arc(cx, cy, 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.lineWidth = 1;

  // Subtle scanline effect
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  for (var sl = 0; sl < H; sl += 3) {
    ctx.fillRect(0, sl, W, 1);
  }

  // Subtle green glow/vignette
  var grd = ctx.createRadialGradient(W/2, H/2, 40, W/2, H/2, W * 0.7);
  grd.addColorStop(0, 'rgba(0,0,0,0)');
  grd.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
}

function renderCanvas(time) {
  // Death screen: green phosphor Apple II style
  if (gameState === STATES.DEATH) {
    drawDeathScene(time);
    return;
  }

  const skyColors = getSkyColors();

  // Sky gradient (banded for EGA feel)
  const bands = 10;
  const skyBottom = 110;
  for (let i = 0; i < bands; i++) {
    const t = i / (bands - 1);
    const r1 = parseInt(skyColors.top.substr(1, 2), 16);
    const g1 = parseInt(skyColors.top.substr(3, 2), 16);
    const b1 = parseInt(skyColors.top.substr(5, 2), 16);
    const r2 = parseInt(skyColors.bottom.substr(1, 2), 16);
    const g2 = parseInt(skyColors.bottom.substr(3, 2), 16);
    const b2 = parseInt(skyColors.bottom.substr(5, 2), 16);
    const r = Math.floor(r1 + (r2 - r1) * t);
    const g = Math.floor(g1 + (g2 - g1) * t);
    const b = Math.floor(b1 + (b2 - b1) * t);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    const bandH = Math.ceil(skyBottom / bands) + 1;
    ctx.fillRect(0, Math.floor(i * (skyBottom / bands)), W, bandH);
  }

  // Clouds (parallax 0.2x)
  const cloudOffset = scrollX * 0.2;
  for (const c of cloudPositions) {
    let cx = ((c.x - cloudOffset) % (W + 80));
    if (cx < -40) cx += W + 80;
    drawPixelCloud(cx - 20, c.y, c.w, c.h);
  }

  // Far mountains (parallax 0.3x) - DARK MAGENTA signature Oregon Trail
  const farOffset = scrollX * 0.3;
  for (const m of farMountains) {
    let mx = ((m.x - farOffset) % (W + 100));
    if (mx < -50) mx += W + 100;
    drawMountain(mx - 25, m.h, m.w, '#AA00AA', false);
  }

  // Near mountains (parallax 0.4x) - LIGHT MAGENTA with snow caps
  const nearOffset = scrollX * 0.4;
  for (const m of nearMountains) {
    let mx = ((m.x - nearOffset) % (W + 80));
    if (mx < -40) mx += W + 80;
    drawMountain(mx - 20, m.h, m.w, '#FF55FF', m.snow);
  }

  // Grass
  ctx.fillStyle = '#00AA00';
  ctx.fillRect(0, 110, W, H - 110);

  // Bright grass highlights
  ctx.fillStyle = '#55FF55';
  const grassOffset = scrollX * 1.0;
  for (let i = 0; i < 50; i++) {
    let gx = ((i * 11 + 5 - grassOffset) % (W + 20));
    if (gx < -5) gx += W + 20;
    const gy = 113 + (i * 7 + i * i * 3) % 55;
    ctx.fillRect(Math.floor(gx), Math.floor(gy), 2, 2);
  }

  // Trees (parallax 0.6x)
  const treeOffset = scrollX * 0.6;
  const treeBaseY = 128;
  for (const t of treesData) {
    let tx = ((t.x - treeOffset) % (W + 60));
    if (tx < -20) tx += W + 60;
    drawTree(tx - 10, treeBaseY, t.h);
  }

  // Landmark for current stop (only at stops/events)
  if (gameState === STATES.STOP || gameState === STATES.EVENT || gameState === STATES.RIVER) {
    const stop = TRAIL_DATA.stops[currentStop];
    if (stop) {
      drawLandmark(stop.landmarkType, 240, 150);
    }
  }

  // Trail/ground strip
  if (!showRiver) {
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(0, 152, W, 15);
    // Trail texture dots
    ctx.fillStyle = '#885500';
    for (let i = 0; i < 35; i++) {
      let dotX = ((i * 10 - scrollX * 1.0) % (W + 10));
      if (dotX < -3) dotX += W + 10;
      ctx.fillRect(Math.floor(dotX), 155 + (i % 4) * 2, 3, 1);
    }
    // Ruts
    ctx.fillStyle = '#775500';
    ctx.fillRect(0, 157, W, 1);
    ctx.fillRect(0, 162, W, 1);
  }

  // River (when active)
  if (showRiver) {
    drawRiver(time || 0);
  }

  // Wagon
  const wagonX = 65;
  const wagonY = showRiver ? 148 : 149;
  drawWagon(wagonX, wagonY);

  // Event-specific visual overlay
  if (gameState === STATES.EVENT || gameState === STATES.RIVER) {
    drawEventOverlay(time);
  }

  // Ground below trail
  ctx.fillStyle = '#885500';
  ctx.fillRect(0, showRiver ? 173 : 167, W, 15);
  ctx.fillStyle = '#553300';
  ctx.fillRect(0, showRiver ? 188 : 182, W, H - 182);
}

// =====================================================================
// MUSIC SYSTEM (Web Audio API Chiptune)
// =====================================================================
const NOTE_FREQ = {
  'C3': 130.81, 'D3': 146.83, 'G2': 98.00, 'A2': 110.00,
  'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'G4': 392.00,
  'A4': 440.00, 'C5': 523.25, 'REST': 0
};

const melody = [
  { note: 'E4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'A4', dur: 1 }, { note: 'G4', dur: 1 },
  { note: 'E4', dur: 1 }, { note: 'D4', dur: 1 }, { note: 'C4', dur: 1 }, { note: 'REST', dur: 1 },
  { note: 'E4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'A4', dur: 1 }, { note: 'C5', dur: 1 },
  { note: 'A4', dur: 2 }, { note: 'G4', dur: 2 },
  { note: 'C4', dur: 1 }, { note: 'D4', dur: 1 }, { note: 'E4', dur: 1 }, { note: 'G4', dur: 1 },
  { note: 'A4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'E4', dur: 1 }, { note: 'D4', dur: 1 },
  { note: 'C4', dur: 1 }, { note: 'E4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'E4', dur: 1 },
  { note: 'D4', dur: 1 }, { note: 'C4', dur: 3 }
];

const bassLine = [
  { note: 'C3', dur: 4 }, { note: 'A2', dur: 4 }, { note: 'C3', dur: 4 }, { note: 'A2', dur: 4 },
  { note: 'C3', dur: 4 }, { note: 'G2', dur: 4 }, { note: 'D3', dur: 4 }, { note: 'C3', dur: 4 }
];

let musicScheduleTimer = null;
let nextMelodyTime = 0;
let nextBassTime = 0;

var masterGain = null;

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 1.0;
    masterGain.connect(audioCtx.destination);
    musicInitialized = true;
  } catch (e) {
    console.warn('Web Audio not available:', e);
  }
}

function playNote(freq, startTime, duration, type, gainVal) {
  if (!audioCtx || freq === 0) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startTime);
  // Envelope: attack then decay
  gain.gain.setValueAtTime(0.001, startTime);
  gain.gain.linearRampToValueAtTime(gainVal, startTime + 0.02);
  gain.gain.setValueAtTime(gainVal, startTime + duration * 0.75);
  gain.gain.linearRampToValueAtTime(0.001, startTime + duration * 0.95);
  osc.connect(gain);
  gain.connect(masterGain || audioCtx.destination);
  osc.start(startTime);
  osc.stop(startTime + duration);
}

function scheduleLoop() {
  if (!musicPlaying || !audioCtx) return;
  const bpm = 110;
  const quarterDur = 60 / bpm;
  const now = audioCtx.currentTime;

  // Schedule melody
  let t = now + 0.05;
  for (const note of melody) {
    const dur = note.dur * quarterDur;
    if (note.note !== 'REST') {
      playNote(NOTE_FREQ[note.note], t, dur, 'square', 0.06);
    }
    t += dur;
  }

  // Schedule bass
  let tb = now + 0.05;
  for (const note of bassLine) {
    const dur = note.dur * quarterDur;
    playNote(NOTE_FREQ[note.note], tb, dur, 'triangle', 0.08);
    tb += dur;
  }

  // Total loop duration in beats: melody has 32 quarter beats = 32 * quarterDur
  const totalBeats = 32;
  const loopDurationMs = totalBeats * quarterDur * 1000;

  musicScheduleTimer = setTimeout(scheduleLoop, loopDurationMs - 200);
}

function startMusic() {
  if (!musicInitialized) initAudio();
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (masterGain) masterGain.gain.setValueAtTime(1.0, audioCtx.currentTime);
  musicPlaying = true;
  scheduleLoop();
  updateMusicIndicator();
}

function stopMusic() {
  musicPlaying = false;
  if (musicScheduleTimer) {
    clearTimeout(musicScheduleTimer);
    musicScheduleTimer = null;
  }
  if (masterGain) masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
  updateMusicIndicator();
}

function toggleMusic() {
  if (!musicInitialized) initAudio();
  if (musicPlaying) {
    stopMusic();
  } else {
    startMusic();
  }
  renderStatusBar();
}

function updateMusicIndicator() {
  const el = document.getElementById('music-indicator');
  if (!el) return;
  el.textContent = musicPlaying ? 'M: Music ON' : 'M: Music OFF';
  el.style.color = musicPlaying ? '#55FF55' : '#555555';
}

// =====================================================================
// SYNTAX HIGHLIGHTING (EGA Colors)
// =====================================================================
const TS_KEYWORDS = new Set([
  'import', 'export', 'from', 'const', 'let', 'var', 'function', 'async',
  'await', 'return', 'if', 'else', 'for', 'while', 'new', 'typeof', 'instanceof',
  'interface', 'type', 'class', 'extends', 'implements', 'try', 'catch', 'throw',
  'default', 'switch', 'case', 'break', 'continue', 'true', 'false', 'null',
  'undefined', 'void', 'of', 'in'
]);

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function highlightCode(code) {
  return code.split('\n').map(function(line) {
    if (line.trim().startsWith('//')) {
      return '<span style="color:#555555">' + escHtml(line) + '</span>';
    }
    var result = '';
    var i = 0;
    while (i < line.length) {
      // String literal
      if (line[i] === "'" || line[i] === '"' || line[i] === '`') {
        var quote = line[i];
        var end = i + 1;
        while (end < line.length && line[end] !== quote) {
          if (line[end] === '\\') end++;
          end++;
        }
        end = Math.min(end + 1, line.length);
        result += '<span style="color:#FFFF55">' + escHtml(line.substring(i, end)) + '</span>';
        i = end;
        continue;
      }
      // Inline comment
      if (line[i] === '/' && i + 1 < line.length && line[i + 1] === '/') {
        result += '<span style="color:#555555">' + escHtml(line.substring(i)) + '</span>';
        break;
      }
      // Number
      if (/\d/.test(line[i]) && (i === 0 || !/\w/.test(line[i - 1]))) {
        var end2 = i;
        while (end2 < line.length && /[\d._]/.test(line[end2])) end2++;
        result += '<span style="color:#FF55FF">' + escHtml(line.substring(i, end2)) + '</span>';
        i = end2;
        continue;
      }
      // Identifier or keyword
      if (/[a-zA-Z_$]/.test(line[i])) {
        var end3 = i;
        while (end3 < line.length && /[\w$]/.test(line[end3])) end3++;
        var word = line.substring(i, end3);
        if (TS_KEYWORDS.has(word)) {
          result += '<span style="color:#55FFFF">' + escHtml(word) + '</span>';
        } else {
          result += '<span style="color:#55FF55">' + escHtml(word) + '</span>';
        }
        i = end3;
        continue;
      }
      // Punctuation / operators
      result += '<span style="color:#AAAAAA">' + escHtml(line[i]) + '</span>';
      i++;
    }
    return result;
  }).join('\n');
}

    var c = event.choices[oi];
    var cls = c.correct ? 'choice-correct' : (i === displayIdx ? 'choice-wrong' : 'text-gray');
    var marker = c.correct ? '\u2713' : (i === displayIdx ? '\u2717' : ' ');
    choicesHtml += '<div class="' + cls + '" style="margin:4px 0;">' + marker + ' ' + labels[i] + '. ' + escHtml(c.text) + '</div>';
  }

  var choicesEl = document.getElementById('event-choices');
  if (choicesEl) choicesEl.innerHTML = choicesHtml;
  var resultEl = document.getElementById('event-result');
  if (resultEl) resultEl.innerHTML = resultHtml;
}

function renderDeathScreen() {
  var deathMsg;
  if (techDebtDeath) {
    var techDebtMsgs = [
      'You have died of tech debt dysentery.',
      // 'You have died of refactoring dysentery.',
      // 'You have died of unresolved TODOs.',
      // 'You have died of scope creep.',
      // 'You have died of dependency bloat.',
    ];
    deathMsg = techDebtMsgs[Math.floor(Math.random() * techDebtMsgs.length)];
    techDebtDeath = false;
  } else {
    deathMsg = TRAIL_DATA.deathMessages[Math.floor(Math.random() * TRAIL_DATA.deathMessages.length)];
  }

  setTextPanel(
    '<div style="text-align:center; padding-top:16px;">' +
    '<div style="display:inline-block; border:2px solid #33FF33; padding:10px 24px; min-width:280px;">' +
    '<span id="death-text" style="color:#33FF33; font-size:16px;"></span>' +
    '</div>' +
    '<div style="color:#1a8a1a; margin-top:14px; font-size:13px;">Stops: ' + currentStop + '/' + TRAIL_DATA.stops.length + '  Score: ' + score + '/' + totalQuestions + '  Streak: ' + bestStreak + '</div>' +
    '<div style="color:#33FF33; margin-top:14px;" class="blink">Press SPACE BAR to try again</div>' +
    '</div>'
  );

  // Typewriter animation
  typewriterText = deathMsg;
  typewriterIndex = 0;
  if (typewriterTimer) clearInterval(typewriterTimer);
  typewriterTimer = setInterval(function() {
    var el = document.getElementById('death-text');
    if (!el) { clearInterval(typewriterTimer); return; }
    typewriterIndex++;
    el.textContent = typewriterText.substring(0, typewriterIndex);
    if (typewriterIndex >= typewriterText.length) clearInterval(typewriterTimer);
  }, 50);
}

function renderWinScreen() {
  var survivors = partyHealth.filter(function(h) { return h > 0; }).length;
  var pctScore = totalQuestions > 0 ? Math.round((score / totalQuestions) * 100) : 100;

  var conceptNames = ['Gateway Control Plane', 'Channel Plugins', 'Route Resolution', 'Session Persistence'];

  var masteryHtml = '';
  var weakestName = '';
  var weakestHp = 999;
  for (var i = 0; i < conceptNames.length; i++) {
    var hp = partyHealth[i];
    var maxHp = TRAIL_DATA.partyMembers[i].maxHealth;
    var stars, color;
    if (hp <= 0) {
      stars = '<span style="color:#555555">\u2606\u2606\u2606 (died)</span>';
      color = '#555555';
    } else {
      stars = '';
      for (var s = 0; s < hp; s++) stars += '\u2605';
      for (var s2 = 0; s2 < maxHp - hp; s2++) stars += '\u2606';
      color = '#FFFF55';
    }
    if (hp < weakestHp) { weakestHp = hp; weakestName = conceptNames[i]; }
    masteryHtml += '<div style="color:' + color + ';">    ' + conceptNames[i] + '  ' + stars + '</div>';
  }

  var tip = weakestHp < TRAIL_DATA.partyMembers[0].maxHealth ? '"Study up on ' + weakestName + '!"' : '"Perfect understanding!"';

  setTextPanel(
    '<div style="padding:8px 16px;">' +
    '<div style="color:#FFFF55; text-align:center; font-size:16px;">\u2605 YOU MADE IT TO RESPONSE FRONTIER! \u2605</div>' +
    '<div style="margin-top:10px; color:#AAAAAA;">' +
    '<div>  Framework:    <span style="color:#55FFFF;">OpenClaw (The Gateway Trail)</span></div>' +
    '<div>  Survivors:    <span style="color:#55FF55;">' + survivors + '/' + partyHealth.length + '</span></div>' +
    '<div>  Quiz Score:   <span style="color:#FFFF55;">' + score + '/' + totalQuestions + ' (' + pctScore + '%)</span></div>' +
    '<div>  Best Streak:  <span style="color:#FF55FF;">' + bestStreak + '</span></div>' +
    '<div>  Hints Used:   <span style="color:#AAAAAA;">' + hintsUsed + '</span></div>' +
    '</div>' +
    '<div style="margin-top:10px; color:#FFFF55;">  Concept Mastery:</div>' +
    '<div>' + masteryHtml + '</div>' +
    '<div style="margin-top:10px; color:#55FF55; text-align:center;">' + tip + '</div>' +
    '<div style="color:#555555; margin-top:8px; text-align:center; font-size:10px;">Source: ' + TRAIL_DATA.sourceInfo.repo + ' @ ' + TRAIL_DATA.sourceInfo.commit + (TRAIL_DATA.sourceInfo.tag ? ' (' + TRAIL_DATA.sourceInfo.tag + ')' : '') + ' — ' + TRAIL_DATA.sourceInfo.snapshotDate + '</div>' +
    '<div style="margin-top:14px; text-align:center;" class="blink">Press SPACE BAR to play again</div>' +
    '</div>'
  );
}

// =====================================================================
// STATUS BAR
// =====================================================================
function renderStatusBar() {
  if (gameState === STATES.TITLE) {
    var titleMusic = musicPlaying
      ? 'Music: <span style="color:#55FF55;">On</span> <span style="color:#555555;">(M to toggle off)</span>'
      : 'Music: <span style="color:#FF5555;">Off</span> <span style="color:#555555;">(M to toggle on)</span>';
    statusBar.innerHTML = '<span style="color:#555555;">The Coderegon Trail v1.0</span>  |  ' + titleMusic;
    return;
  }

  var maxH = maxHealthForGame;
  var healthPct = Math.max(0, health / maxH);
  var barLen = 10;
  var filled = Math.round(healthPct * barLen);
  var healthColor = health > maxH * 0.6 ? '#00AA00' : (health > maxH * 0.3 ? '#FFFF55' : '#FF5555');
  var healthBar = '<span style="color:' + healthColor + ';">';
  for (var i = 0; i < filled; i++) healthBar += '\u2588';
  healthBar += '</span><span style="color:#555555;">';
  for (var i2 = 0; i2 < barLen - filled; i2++) healthBar += '\u2591';
  healthBar += '</span>';

  var streakStars = '<span style="color:#FFFF55;">';
  for (var s = 0; s < Math.min(streak, 5); s++) streakStars += '\u2605';
  streakStars += '</span>';

  var musicHint = musicPlaying
    ? 'Music: <span style="color:#55FF55;">On</span> <span style="color:#555555;">(M to toggle off)</span>'
    : 'Music: <span style="color:#FF5555;">Off</span> <span style="color:#555555;">(M to toggle on)</span>';

  statusBar.innerHTML = 'HP: ' + healthBar + ' ' + Math.max(0, health) +
    '  Hints: ' + supplies + '  ' + streakStars +
    '  |  Stop ' + (currentStop + 1) + '/' + TRAIL_DATA.stops.length +
    '  |  ' + musicHint;
}

// =====================================================================
// GAME LOGIC
// =====================================================================
function resetGame() {
  gameState = STATES.TITLE;
  difficulty = 1;
  selectedDifficulty = 1;
  health = 100;
  maxHealthForGame = 100;
  supplies = 5;
  currentStop = 0;
  day = 1;
  score = 0;
  totalQuestions = 0;
  streak = 0;
  bestStreak = 0;
  hintsUsed = 0;
  scrollX = 0;
  showRiver = false;
  wagonWheelAngle = 0;
  travelFlavorIndex = 0;
  deathPending = false;
  partyHealth = TRAIL_DATA.partyMembers.map(function(p) { return p.maxHealth; });
  pendingEvents = [];
  currentEventIndex = 0;
  eventAnswered = false;
  eventHinted = false;
  dimmedChoice = -1;
  selectedEventChoice = 0;
  selectedStopChoice = 0;
  shuffledIndices = [];
  currentEventType = '';
  currentEventTitle = '';
  drainAccumulator = 0;
  techDebtDeath = false;
  if (travelTimer) { clearTimeout(travelTimer); travelTimer = null; }
  if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }
}

function selectDifficulty(idx) {
  selectedDifficulty = Math.max(0, Math.min(PROFESSIONS.length - 1, idx));
  renderSetupScreen();
}

function startGame() {
  difficulty = selectedDifficulty;
  var prof = PROFESSIONS[difficulty];
  health = prof.health;
  maxHealthForGame = prof.health;
  supplies = prof.supplies;
  partyHealth = TRAIL_DATA.partyMembers.map(function(p) { return p.maxHealth; });
  currentStop = 0;
  day = 1;
  score = 0;
  totalQuestions = 0;
  streak = 0;
  bestStreak = 0;
  hintsUsed = 0;
  scrollX = 0;
  deathPending = false;
  enterTravel();
}

function enterTravel() {
  gameState = STATES.TRAVEL;
  showRiver = false;
  currentEventType = '';
  currentEventTitle = '';
  day += Math.floor(Math.random() * 7) + 1;
  travelFlavorIndex = Math.floor(Math.random() * travelFlavors.length);
  renderTravelScreen();
  renderStatusBar();

  if (travelTimer) clearTimeout(travelTimer);
  travelTimer = setTimeout(function() {
    if (gameState === STATES.TRAVEL) advanceFromTravel();
  }, 2500);
}

function advanceFromTravel() {
  if (travelTimer) { clearTimeout(travelTimer); travelTimer = null; }

  // Collect events for the current stop (triggerStop is 1-indexed relative to stop we just visited)
  // Events trigger BEFORE showing the stop
  pendingEvents = TRAIL_DATA.events.filter(function(e) { return e.triggerStop === currentStop; });
  currentEventIndex = 0;

  if (pendingEvents.length > 0) {
    showNextEvent();
  } else {
    enterStop();
  }
}

function showNextEvent() {
  if (currentEventIndex >= pendingEvents.length) {
    // After all events, check if we should die
    if (checkDeath()) return;
    enterStop();
    return;
  }

  var event = pendingEvents[currentEventIndex];
  eventAnswered = false;
  eventHinted = false;
  dimmedChoice = -1;
  selectedEventChoice = 0;
  currentEventType = event.type;
  currentEventTitle = event.title;

  // Shuffle choice order so correct answer isn't always first
  shuffledIndices = [];
  for (var si = 0; si < event.choices.length; si++) shuffledIndices.push(si);
  for (var si = shuffledIndices.length - 1; si > 0; si--) {
    var sj = Math.floor(Math.random() * (si + 1));
    var tmp = shuffledIndices[si]; shuffledIndices[si] = shuffledIndices[sj]; shuffledIndices[sj] = tmp;
  }

  if (event.type === 'river') {
    gameState = STATES.RIVER;
    showRiver = true;
  } else {
    gameState = STATES.EVENT;
    showRiver = false;
  }

  // Fortune events auto-apply health
  if (event.type === 'fortune') {
    health = Math.min(health + 20, maxHealthForGame);
    eventAnswered = true;
  }

  renderEventScreen(event);
  renderStatusBar();
}

function handleEventChoice(displayIdx) {
  if (eventAnswered) return;
  var event = pendingEvents[currentEventIndex];
  if (!event || event.choices.length === 0) return;
  if (displayIdx < 0 || displayIdx >= shuffledIndices.length) return;
  if (eventHinted && dimmedChoice === displayIdx) return;

  var prof = PROFESSIONS[difficulty];
  var forgiving = prof && prof.forgiving;
  var origIdx = shuffledIndices[displayIdx];
  var choice = event.choices[origIdx];
  var isRiver = event.type === 'river';

  if (forgiving && !choice.correct) {
    // Ralph Wiggum mode: dim the wrong answer, let them try again
    var items = document.querySelectorAll('.choice-item');
    if (items[displayIdx]) {
      items[displayIdx].classList.add('choice-dimmed');
      items[displayIdx].style.pointerEvents = 'none';
    }
    // Move selection to next available choice
    for (var ni = 0; ni < shuffledIndices.length; ni++) {
      var nextIdx = (displayIdx + 1 + ni) % shuffledIndices.length;
      if (!(eventHinted && dimmedChoice === nextIdx) && !items[nextIdx].classList.contains('choice-dimmed')) {
        selectedEventChoice = nextIdx;
        updateChoiceHighlight();
        break;
      }
    }
    return;
  }

  eventAnswered = true;

  totalQuestions++;

  if (choice.correct) {
    var bonus = streak >= 3 ? 5 : 0;
    health = Math.min(health + 10 + bonus, maxHealthForGame);
    score++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
  } else {
    var dmg = isRiver ? 20 : 15;
    health -= dmg;
    streak = 0;
    // Damage related party member
    var concept = event.concept;
    var memberIdx = -1;
    for (var mi = 0; mi < TRAIL_DATA.partyMembers.length; mi++) {
      if (TRAIL_DATA.partyMembers[mi].name === concept) { memberIdx = mi; break; }
    }
    if (memberIdx >= 0 && partyHealth[memberIdx] > 0) {
      partyHealth[memberIdx]--;
    }
  }

  showEventResult(event, displayIdx);
  renderStatusBar();
}

function handleEventHint() {
  var prof = PROFESSIONS[difficulty];
  var hintFree = prof && prof.hintFree;
  if (eventAnswered || eventHinted) return;
  if (!hintFree && supplies <= 0) return;
  var event = pendingEvents[currentEventIndex];
  if (!event || event.choices.length === 0) return;

  if (!hintFree) supplies--;
  hintsUsed++;
  eventHinted = true;

  // Find a wrong answer in display order (dimmedChoice is a display index)
  var wrongDisplayIndices = [];
  for (var i = 0; i < shuffledIndices.length; i++) {
    if (!event.choices[shuffledIndices[i]].correct) wrongDisplayIndices.push(i);
  }
  dimmedChoice = wrongDisplayIndices[Math.floor(Math.random() * wrongDisplayIndices.length)];

  renderEventScreen(event);
  renderStatusBar();
}

function updateChoiceHighlight() {
  var items = document.querySelectorAll('.choice-item');
  for (var i = 0; i < items.length; i++) {
    items[i].classList.toggle('choice-selected', i === selectedEventChoice);
  }
}

function updateStopHighlight() {
  var items = document.querySelectorAll('.stop-opt');
  for (var i = 0; i < items.length; i++) {
    items[i].classList.toggle('choice-selected', i === selectedStopChoice);
  }
}

function checkDeath() {
  if (health <= 0) {
    enterDeath();
    return true;
  }
  var allDead = true;
  for (var i = 0; i < partyHealth.length; i++) {
    if (partyHealth[i] > 0) { allDead = false; break; }
  }
  if (allDead) {
    enterDeath();
    return true;
  }
  return false;
}

function advanceFromEvent() {
  currentEventIndex++;
  if (currentEventIndex < pendingEvents.length) {
    if (checkDeath()) return;
    showNextEvent();
  } else {
    if (checkDeath()) return;
    enterStop();
  }
}

function enterStop() {
  gameState = STATES.STOP;
  showRiver = false;
  selectedStopChoice = 0;

  var stop = TRAIL_DATA.stops[currentStop];
  if (stop && stop.landmarkType === 'river') {
    showRiver = true;
  }

  renderStopScreen();
  renderStatusBar();
}

function handleStopChoice(choice) {
  if (choice === 2) {
    var codeBox = textPanel.querySelector('.code-box');
    if (codeBox) {
      codeBox.style.maxHeight = '280px';
      codeBox.scrollIntoView({ behavior: 'smooth' });
    }
    return;
  }

  currentStop++;
  if (currentStop >= TRAIL_DATA.stops.length) {
    enterWin();
  } else {
    enterTravel();
  }
}

function enterDeath() {
  gameState = STATES.DEATH;
  showRiver = false;
  renderDeathScreen();
  renderStatusBar();
}

function enterWin() {
  gameState = STATES.WIN;
  showRiver = false;
  renderWinScreen();
  renderStatusBar();
}

// =====================================================================
// INPUT HANDLING
// =====================================================================
function ensureAudio() {
  if (!musicInitialized) {
    initAudio();
    startMusic();
  }
}

document.addEventListener('keydown', function(e) {
  var key = e.key;

  // Music toggle always works
  if (key === 'm' || key === 'M') {
    if (!musicInitialized) initAudio();
    toggleMusic();
    return;
  }

  // Start audio on first interaction
  if (!musicInitialized) ensureAudio();

  switch (gameState) {
    case STATES.TITLE:
      if (key === ' ' || key === 'Enter') {
        e.preventDefault();
        gameState = STATES.SETUP;
        renderSetupScreen();
        renderStatusBar();
      }
      break;

    case STATES.SETUP:
      if (key === 'ArrowDown' || key === 'ArrowRight') {
        e.preventDefault();
        selectDifficulty((selectedDifficulty + 1) % PROFESSIONS.length);
      } else if (key === 'ArrowUp' || key === 'ArrowLeft') {
        e.preventDefault();
        selectDifficulty((selectedDifficulty - 1 + PROFESSIONS.length) % PROFESSIONS.length);
      } else if (key === '1') selectDifficulty(0);
      else if (key === '2') selectDifficulty(1);
      else if (key === '3') selectDifficulty(2);
      else if (key === '4') selectDifficulty(3);
      else if (key === 'Enter' || key === ' ') {
        e.preventDefault();
        startGame();
      }
      break;

    case STATES.TRAVEL:
      if (key === ' ' || key === 'Enter') {
        e.preventDefault();
        advanceFromTravel();
      }
      break;

    case STATES.STOP:
      if (key === 'ArrowLeft' || key === 'ArrowRight') {
        e.preventDefault();
        selectedStopChoice = (key === 'ArrowLeft') ? 0 : 1;
        updateStopHighlight();
      } else if (key === 'ArrowUp' || key === 'ArrowDown') {
        e.preventDefault();
        selectedStopChoice = selectedStopChoice === 0 ? 1 : 0;
        updateStopHighlight();
      } else if (key === 'Enter' || key === ' ') {
        e.preventDefault();
        handleStopChoice(selectedStopChoice + 1);
      } else if (key === '1') {
        handleStopChoice(1);
      } else if (key === '2') {
        handleStopChoice(2);
      }
      break;

    case STATES.EVENT:
    case STATES.RIVER:
      if (!eventAnswered) {
        var ev = pendingEvents[currentEventIndex];
        if (ev && ev.choices.length > 0) {
          var numChoices = ev.choices.length;
          if (key === 'ArrowDown' || key === 'ArrowRight') {
            e.preventDefault();
            selectedEventChoice = (selectedEventChoice + 1) % numChoices;
            // Skip dimmed choice
            if (eventHinted && dimmedChoice === selectedEventChoice) selectedEventChoice = (selectedEventChoice + 1) % numChoices;
            updateChoiceHighlight();
          } else if (key === 'ArrowUp' || key === 'ArrowLeft') {
            e.preventDefault();
            selectedEventChoice = (selectedEventChoice - 1 + numChoices) % numChoices;
            if (eventHinted && dimmedChoice === selectedEventChoice) selectedEventChoice = (selectedEventChoice - 1 + numChoices) % numChoices;
            updateChoiceHighlight();
          } else if (key === 'Enter' || key === ' ') {
            e.preventDefault();
            if (!(eventHinted && dimmedChoice === selectedEventChoice)) {
              handleEventChoice(selectedEventChoice);
            }
          } else if (key === '1' || key === 'a' || key === 'A') handleEventChoice(0);
          else if (key === '2' || key === 'b' || key === 'B') handleEventChoice(1);
          else if (key === '3' || key === 'c' || key === 'C') handleEventChoice(2);
          else if (key === 'h' || key === 'H') handleEventHint();
        }
        // Fortune: space/enter to continue
        if (ev && ev.type === 'fortune' && (key === ' ' || key === 'Enter')) {
          e.preventDefault();
          advanceFromEvent();
        }
      } else {
        if (key === ' ' || key === 'Enter') {
          e.preventDefault();
          if (checkDeath()) return;
          advanceFromEvent();
        }
      }
      break;

    case STATES.DEATH:
      if (key === ' ' || key === 'Enter') {
        e.preventDefault();
        resetGame();
        renderTitleScreen();
        renderStatusBar();
      }
      break;

    case STATES.WIN:
      if (key === ' ' || key === 'Enter') {
        e.preventDefault();
        resetGame();
        renderTitleScreen();
        renderStatusBar();
      }
      break;
  }
});

// =====================================================================
// ANIMATION LOOP + TECH DEBT DRAIN
// =====================================================================
var lastTime = 0;
var drainAccumulator = 0;
var DRAIN_INTERVAL = 3000; // drain 1 HP every 3 seconds
var techDebtDeath = false;

function gameLoop(timestamp) {
  var dt = timestamp - lastTime;
  lastTime = timestamp;

  // Clamp dt to avoid huge jumps
  if (dt > 100) dt = 16;

  if (gameState === STATES.TRAVEL) {
    scrollX += dt * 0.03;
    wagonWheelAngle += dt * 0.004;
  } else if (gameState === STATES.TITLE) {
    scrollX += dt * 0.01;
  } else {
    // Gentle idle scroll
    scrollX += dt * 0.002;
  }

  // Tech debt drain: HP ticks down during active gameplay (disabled for Ralph Wiggum)
  var isForgiving = PROFESSIONS[difficulty] && PROFESSIONS[difficulty].forgiving;
  var isActive = gameState === STATES.STOP || gameState === STATES.EVENT || gameState === STATES.RIVER;
  if (isActive && !deathPending && !isForgiving) {
    drainAccumulator += dt;
    while (drainAccumulator >= DRAIN_INTERVAL) {
      drainAccumulator -= DRAIN_INTERVAL;
      health--;
      renderStatusBar();
      if (health <= 0) {
        techDebtDeath = true;
        enterDeath();
        break;
      }
    }
  }

  renderCanvas(timestamp);
  animFrame = requestAnimationFrame(gameLoop);
}

// =====================================================================
// INITIALIZATION
// =====================================================================
resetGame();
renderTitleScreen();
renderStatusBar();
updateMusicIndicator();
animFrame = requestAnimationFrame(gameLoop);
</script>
