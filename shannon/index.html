*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {

  align-items: center;
  padding: 0 16px;
  font-size: 15px;
  color: #AAAAAA;
  white-space: nowrap;
  overflow: hidden;

.choice-wrong { color: #FF5555; }

.text-yellow { color: #FFFF55; }

#music-indicator {

const TRAIL_DATA={"framework":"shannon","trailName":"The Exploit Trail","sourceInfo":{"repo":"KeygraphHQ/shannon","commit":"bc8fd20","tag":"v1.0.0","snapshotDate":"2026-03-28"},"stops":[{"name":"Independence, MO","subtitle":"Target Acquisition","concept":"Reconnaissance","landmarkType":"town","code":{"file":"apps/cli/src/index.ts","content":"// apps/cli/src/index.ts\n// Shannon CLI \u2014 AI Penetration Testing Framework\n//\n// Unified CLI supporting two modes:\n//   Local mode: Run from cloned repo \u2014 builds locally\n//   NPX mode:   Run via npx \u2014 pulls from Docker Hub\n\nimport { start } from './commands/start.js';\nimport { stop } from './commands/stop.js';\nimport { logs } from './commands/logs.js';\nimport { getMode } from './mode.js';\nimport { displaySplash } from './splash.js';\n\ninterface ParsedStartArgs {\n  url: string;\n  repo: string;\n  config?: string;\n  workspace?: string;\n  output?: string;\n  pipelineTesting: boolean;\n  router: boolean;\n}\n\n// Main Dispatch\nconst args = process.argv.slice(2);\nconst command = args[0];\nswitch (command) {\n  case 'start': {\n    const parsed = parseStartArgs(args.slice(1));\n    await start({ ...parsed, version: getVersion() });\n    break;\n  }\n  case 'stop':\n    stop(args.includes('--clean'));\n    break;\n  // ...logs, workspaces, status, build, etc.\n}","language":"typescript"},"narration":"Every pentest journey starts at Independence. The Shannon CLI accepts a target URL and a source code repo path. White-box testing means you can see the code \u2014 no guessing what the backend does. The CLI launches Docker infrastructure and a Temporal worker to orchestrate the entire pipeline."},{"name":"Chimney Rock","subtitle":"Reconnaissance","concept":"Reconnaissance","landmarkType":"mountain","code":{"file":"apps/worker/prompts/recon.txt","content":"# apps/worker/prompts/recon.txt (excerpt)\n\n<role>\nYou are a world-class Reconnaissance Analyst and\nAttack Surface Mapper. Your mission is to conduct a\nthorough white-box analysis of the target application\nby correlating external scan data, live application\nbehavior, and the full source code.\n</role>\n\n<objective>\nYour goal is to create a comprehensive, structured\nmap of the application's attack surface. You are NOT\nlooking for vulnerabilities yet. You are building the\nfoundational intelligence that all other specialists\nwill rely on.\n</objective>\n\n<cli_tools>\n- Browser Automation (playwright-cli skill): For all\n  browser interactions, invoke the playwright-cli\n  skill. Always pass -s={{PLAYWRIGHT_SESSION}} to\n  every command for session isolation.\n- Task tool: MANDATORY for ALL source code analysis.\n  Delegate all code reading to Task agents.\n- save-deliverable: Saves deliverable files with\n  automatic validation.\n</cli_tools>","language":"text"},"narration":"At Chimney Rock, Shannon scans the horizon. The recon agent is a prompt file \u2014 a detailed instruction set for Claude. It reads the pre-recon scan data, maps the architecture using Task agents for code analysis, and explores the live app with Playwright browser automation. The result is a comprehensive attack surface map."},{"name":"Fort Laramie","subtitle":"Exploration Mapping","concept":"Browser Automation","landmarkType":"camp","code":{"file":"apps/worker/prompts/recon.txt","content":"# apps/worker/prompts/recon.txt \u2014 Exploration Section\n\n<systematic_approach>\n1. Synthesize Initial Data:\n   - Read deliverables/pre_recon_deliverable.md\n   - Create preliminary list of technologies,\n     subdomains, open ports, and key modules\n\n2. Interactive Application Exploration:\n   - Use playwright-cli with -s={{PLAYWRIGHT_SESSION}}\n   - Navigate to target, map user-facing functionality\n   - Document login forms, registration, password reset\n   - Observe network requests for API calls\n\n3. Correlate with Source Code (Parallel Task Agents):\n   - Route Mapper Agent: Find all backend routes\n   - Authorization Checker Agent: Map auth middleware\n   - Input Validator Agent: Analyze input validation\n   - Session Handler Agent: Trace session handling\n\n4. Enumerate and Document:\n   - Synthesize findings from all parallel Task agents\n   - Cross-reference browser + source code findings\n</systematic_approach>","language":"text"},"narration":"Fort Laramie is where Shannon gets hands-on. The recon prompt instructs Claude to use Playwright for real browser automation \u2014 navigating pages, filling forms, testing login flows. Parallel Task agents then correlate browser observations with source code. Every form, every auth flow gets mapped as potential attack surface."},{"name":"Independence Rock","subtitle":"Parallel Vuln Analysis","concept":"Exploitation","landmarkType":"mountain","code":{"file":"apps/worker/src/temporal/workflows.ts","content":"// apps/worker/src/temporal/workflows.ts (excerpt)\n\n// Phases 3-4: Vulnerability + Exploitation\n// 5 pipelined pairs in parallel:\n// Each pair: vuln agent -> queue check -> exploit\n\nconst pipelineConfigs = buildPipelineConfigs();\n// Returns configs for: injection, xss, auth, ssrf, authz\n\nasync function runVulnExploitPipeline(\n  vulnType: VulnType,\n  runVulnAgent: () => Promise<AgentMetrics>,\n  runExploitAgent: () => Promise<AgentMetrics>,\n): Promise<VulnExploitPipelineResult> {\n  // 1. Run vulnerability analysis (or skip if resumed)\n  let vulnMetrics: AgentMetrics | null = null;\n  if (!shouldSkip(vulnAgentName)) {\n    vulnMetrics = await runVulnAgent();\n  }\n  // 2. Check exploitation queue for actionable findings\n  const decision = await a.checkExploitationQueue(\n    activityInput, vulnType\n  );\n  // 3. Conditionally run exploitation agent\n  if (decision.shouldExploit && !shouldSkip(exploitAgentName)) {\n    exploitMetrics = await runExploitAgent();\n  }\n  return { vulnType, vulnMetrics, exploitMetrics };\n}","language":"typescript"},"narration":"Independence Rock is where insights converge. The Temporal workflow runs five vulnerability-exploitation pipelines in parallel \u2014 injection, XSS, auth, SSRF, and authorization. Each pipeline is independent: vuln analysis runs, then a queue check decides whether to launch exploitation. No synchronization barrier between pipelines."},{"name":"South Pass","subtitle":"Injection Testing","concept":"Exploitation","landmarkType":"river","code":{"file":"apps/worker/prompts/exploit-injection.txt","content":"# apps/worker/prompts/exploit-injection.txt (excerpt)\n\n<role>\nYou are a world-class Injection Exploitation\nSpecialist. Your expertise covers SQL Injection and\nOS Command Injection. You are an active penetration\ntester \u2014 not an analyst.\n</role>\n\n<objective>\nSystematically weaponize every potential SQL Injection\nand Command Injection vulnerability in your queue.\nFor each: either confirm exploitability with data\nexfiltration or RCE, or prove it is not exploitable.\n</objective>\n\n<methodology>\nOWASP Exploitation Workflow:\n  Stage 1: Confirmation & Probing\n    Inject error-inducing chars, boolean conditions,\n    time delays to confirm a live vulnerability.\n  Stage 2: Fingerprinting & Enumeration\n    Extract DB version, current user, table names.\n    Identify most sensitive table and its columns.\n  Stage 3: Targeted Exfiltration\n    Craft final payload to extract first 5 rows of\n    high-impact data.\n\nProof Levels:\n  Level 1: Injection point confirmed (error/timing)\n  Level 2: Query structure manipulated (UNION/blind)\n  Level 3: Data extraction proven (EXPLOITED)\n  Level 4: Critical impact demonstrated (CRITICAL)\n</methodology>","language":"text"},"narration":"South Pass \u2014 the narrow gap where payloads squeeze through. The injection exploit prompt instructs Claude to follow OWASP methodology: confirm the vulnerability, fingerprint the database, then extract real data. Four proof levels ensure rigor \u2014 you must reach Level 3 with actual extracted data to mark a finding as exploited."},{"name":"Fort Bridger","subtitle":"Auth Bypass","concept":"Proof-by-Exploit","landmarkType":"forest","code":{"file":"apps/worker/prompts/exploit-auth.txt","content":"# apps/worker/prompts/exploit-auth.txt (excerpt)\n\n<role>\nYou are a world-class Authentication Exploitation\nSpecialist. You take theoretical flaws in identity\nand session management and turn them into undeniable\nproof of impersonation and account takeover.\n</role>\n\n<attack_patterns>\n1. Session Hijacking\n   - Inject stolen cookie via Playwright\n   - Use stolen cookie with cURL\n\n2. Credential-Based Attacks\n   - Credential stuffing with cURL\n   - Brute force via Task Agent scripting\n\n3. Logic Flaws\n   - Password Reset Manipulation\n   - JWT Token Attacks (alg:none):\n     1. Capture a JWT\n     2. Decode header and payload\n     3. Change header alg to \"none\"\n     4. Change payload data (e.g. sub to admin)\n     5. Re-encode without signature and send\n</attack_patterns>\n\nProof of Exploitation Levels:\n  Level 3: Authentication bypass confirmed\n  Level 4: Account takeover demonstrated (CRITICAL)","language":"text"},"narration":"Fort Bridger guards the authentication frontier. The auth exploit prompt covers session hijacking, credential attacks, and JWT manipulation. The alg:none attack sets the algorithm to nothing, bypassing signature checks on misconfigured servers. Claude must reach Level 3 \u2014 actual authentication bypass \u2014 to mark a finding as exploited."},{"name":"The Dalles","subtitle":"Exploit Queue Validation","concept":"Proof-by-Exploit","landmarkType":"river","code":{"file":"apps/worker/src/services/exploitation-checker.ts","content":"// apps/worker/src/services/exploitation-checker.ts\n\n// Pure domain logic for determining whether\n// exploitation should run. Reads queue file,\n// parses JSON, returns decision.\n\nimport { validateQueueSafe } from './queue-validation.js';\nimport { isOk } from '../types/result.js';\n\nexport class ExploitationCheckerService {\n  async checkQueue(\n    vulnType: VulnType,\n    repoPath: string,\n    logger: ActivityLogger,\n  ): Promise<ExploitationDecision> {\n    const result = await validateQueueSafe(\n      vulnType, repoPath\n    );\n    if (isOk(result)) {\n      const decision = result.value;\n      logger.info(\n        `${vulnType}: ${decision.shouldExploit\n          ? `${decision.vulnerabilityCount} vulnerabilities`\n          : 'no vulnerabilities, skipping'}`\n      );\n      return decision;\n    }\n    // Non-retryable error \u2014 skip gracefully\n    return { shouldExploit: false, vulnerabilityCount: 0 };\n  }\n}","language":"typescript"},"narration":"The Dalles is the gateway between analysis and exploitation. The ExploitationCheckerService reads the queue file that each vuln agent produces, validates its JSON structure, and decides whether exploitation should run. If the queue has zero vulnerabilities, exploitation is skipped. This single-pass validation prevents wasted agent runs."},{"name":"Oregon City","subtitle":"Report Assembly","concept":"Browser Automation","landmarkType":"town","code":{"file":"apps/worker/src/services/reporting.ts","content":"// apps/worker/src/services/reporting.ts\n\nimport { fs, path } from 'zx';\n\n// Assemble final report from specialist deliverables\nexport async function assembleFinalReport(\n  sourceDir: string,\n  logger: ActivityLogger,\n): Promise<string> {\n  const deliverableFiles = [\n    { name: 'Injection', path: 'injection_exploitation_evidence.md' },\n    { name: 'XSS', path: 'xss_exploitation_evidence.md' },\n    { name: 'Authentication', path: 'auth_exploitation_evidence.md' },\n    { name: 'SSRF', path: 'ssrf_exploitation_evidence.md' },\n    { name: 'Authorization', path: 'authz_exploitation_evidence.md' },\n  ];\n\n  const sections: string[] = [];\n  for (const file of deliverableFiles) {\n    const filePath = path.join(\n      sourceDir, 'deliverables', file.path\n    );\n    if (await fs.pathExists(filePath)) {\n      sections.push(await fs.readFile(filePath, 'utf8'));\n      logger.info(`Added ${file.name} findings`);\n    }\n  }\n\n  const finalReportPath = path.join(sourceDir,\n    'deliverables',\n    'comprehensive_security_assessment_report.md'\n  );\n  await fs.writeFile(finalReportPath, sections.join('\\n\\n'));\n  return sections.join('\\n\\n');\n}","language":"typescript"},"narration":"You made it to Oregon City! The reporting service concatenates evidence from all five exploitation specialists into one comprehensive report. Then a report agent adds an executive summary and cleans up the output. Every finding has reproducible exploit commands, evidence of impact, and specific remediation steps."}],"events":[{"type":"weather","trigger":"after_stop","triggerStop":1,"title":"Scope Storm!","text":"A storm of targets hits your terminal \u2014 production servers, staging environments, third-party APIs, internal tools. Your scope definition is being tested. Why does Shannon require source code access for white-box testing?","choices":[{"text":"Code analysis guides attack strategy and reveals vulnerabilities invisible to blind testing","correct":true,"explanation":"White-box testing means Shannon reads the source code to find where raw SQL meets user input, where auth is misconfigured, where secrets are hardcoded. Black-box testing can only guess."},{"text":"Shannon can't use a browser without source code","correct":false,"explanation":"Shannon uses Playwright for browser automation regardless of code access. Source code enables targeted testing, not browser control."},{"text":"Source code is easier to read than HTTP responses","correct":false,"explanation":"It's not about ease of reading \u2014 it's about finding vulnerabilities that are invisible from the outside, like unsafe ORM usage or hardcoded secrets."}],"concept":"Reconnaissance","difficulty":"easy"},{"type":"encounter","trigger":"after_stop","triggerStop":2,"title":"A Security Scout Appears!","text":"A grizzled security researcher approaches your camp. 'I see the recon prompt instructs Claude to use Nmap, WhatWeb, and Playwright against the target.' What does the reconnaissance phase discover?","choices":[{"text":"Open ports, services, technology stack, and a comprehensive attack surface map","correct":true,"explanation":"Pre-recon runs Nmap and WhatWeb for port and tech fingerprinting. The recon agent then correlates external scans with source code analysis and live browser exploration to build a complete attack surface map."},{"text":"Passwords stored in the application database","correct":false,"explanation":"Reconnaissance maps the attack surface \u2014 it discovers services, technologies, and entry points. Credential extraction is an exploitation phase activity."},{"text":"Source code vulnerabilities like SQL injection","correct":false,"explanation":"Recon maps the attack surface and entry points. Vulnerability analysis is a separate phase with dedicated specialist agents for each vuln type."}],"concept":"Reconnaissance","difficulty":"easy"},{"type":"river","trigger":"after_stop","triggerStop":4,"title":"The Vulnerability River Crossing!","text":"You've reached the widest river on the trail \u2014 the gap between hypothesis and proof. Your analysis agents have generated dozens of potential vulnerabilities. Why does Shannon run vuln-exploit pipelines in parallel?","choices":[{"text":"Each vulnerability type can be analyzed independently, reducing total wall-clock time","correct":true,"explanation":"Injection analysis doesn't depend on XSS analysis. Auth testing doesn't need SSRF results. The Temporal workflow runs all five pipelines concurrently with configurable concurrency limits."},{"text":"One agent isn't smart enough to find all vulnerability types","correct":false,"explanation":"It's about efficiency, not intelligence. A single agent could analyze all types sequentially \u2014 parallelism is an optimization, not a capability requirement."},{"text":"Parallel execution is always faster than sequential","correct":false,"explanation":"Parallel is only faster when tasks are independent. If one analysis depended on another's output, you'd need sequential execution. Shannon's architecture ensures independence between the five vuln types."}],"concept":"Exploitation","difficulty":"medium"},{"type":"weather","trigger":"after_stop","triggerStop":5,"title":"Injection Storm!","text":"Payloads are flying everywhere \u2014 SQL fragments, XSS vectors, template injections. The storm tests your understanding. How does Shannon's OWASP exploitation methodology improve on blind fuzzing?","choices":[{"text":"It follows a structured workflow: confirm the injection, fingerprint the database, then extract real data as proof","correct":true,"explanation":"Shannon's prompts mandate a four-level proof framework. You must progress from confirmation through fingerprinting to actual data extraction. Level 3 requires concrete evidence \u2014 real database rows \u2014 not just error messages."},{"text":"It makes the payloads longer and more complex","correct":false,"explanation":"The methodology makes testing more structured, not payloads more complex. The OWASP workflow ensures each step builds on confirmed results rather than spraying random inputs."},{"text":"It bypasses Web Application Firewalls automatically","correct":false,"explanation":"WAF bypass is a separate technique that Shannon's prompts address. The OWASP methodology is about structured proof-of-exploitation, not evading security controls."}],"concept":"Exploitation","difficulty":"medium"},{"type":"misfortune","trigger":"after_stop","triggerStop":6,"title":"Auth Bypass Gone Wrong!","text":"Your JWT manipulation backfired \u2014 the server returned a cryptic error and locked your test account. Before trying again, you need to understand the attack. What is the JWT alg:none attack?","choices":[{"text":"Setting the JWT algorithm to \"none\" to bypass signature verification on misconfigured servers","correct":true,"explanation":"The JWT spec technically allows algorithm \"none\" for trusted contexts. Misconfigured servers that don't validate the algorithm field will accept unsigned tokens, letting attackers forge any claims like role:admin."},{"text":"Using no JWT at all and accessing endpoints directly","correct":false,"explanation":"The alg:none attack still sends a JWT \u2014 it just sets the algorithm header to \"none\" so the signature is empty. The token structure is preserved."},{"text":"Encrypting the JWT with a null cipher so nobody can read it","correct":false,"explanation":"JWTs are signed, not encrypted (unless using JWE). The alg:none attack removes the signature, it doesn't add encryption."}],"concept":"Proof-by-Exploit","difficulty":"hard"},{"type":"encounter","trigger":"after_stop","triggerStop":7,"title":"Proof-by-Exploitation Pioneer!","text":"A veteran pentester at The Dalles checkpoint asks: 'Why does Shannon validate the exploitation queue before launching exploit agents?'","choices":[{"text":"It prevents wasted agent runs \u2014 if vuln analysis found nothing exploitable, exploitation is skipped","correct":true,"explanation":"The ExploitationCheckerService reads the queue JSON file, validates its structure, and checks the vulnerability count. Zero vulnerabilities means the exploit agent never launches, saving time and compute."},{"text":"Queue validation makes the exploit payloads more accurate","correct":false,"explanation":"Queue validation is a gate, not a tuner. It decides whether exploitation runs at all \u2014 it doesn't modify how exploits are crafted. The exploit prompts handle payload accuracy."},{"text":"Without validation, the exploit agents would attack random endpoints","correct":false,"explanation":"Exploit agents always read their queue file for targets. The checker service is an efficiency optimization \u2014 it prevents launching an agent that would immediately find an empty queue and exit."}],"concept":"Proof-by-Exploit","difficulty":"medium"}],"partyMembers":[{"name":"Reconnaissance","icon":"server","maxHealth":3},{"name":"Exploitation","icon":"router","maxHealth":3},{"name":"Browser Automation","icon":"data","maxHealth":3},{"name":"Proof-by-Exploit","icon":"layout","maxHealth":3}],"deathMessages":["Died of false positives. Your report was 500 pages of noise.","Lost in the authentication maze \u2014 2FA was too strong.","Drowned in rate limiting. The WAF blocked all your payloads.","Killed by your own SQL injection. The database dropped itself.","Your Playwright session crashed. The browser ate all the RAM.","Starved waiting for Temporal workflow to resume. Durable execution wasn't so durable.","Died of scope creep. You started pentesting the wrong application.","Buried under a mountain of unexploitable CVEs."]};

// Seeded PRNG for consistent landscape
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xFFFFFFFF;
    return (s >>> 0) / 0xFFFFFFFF;
  };
}

function drawPixelCloud(x, y, w, h) {
  ctx.fillStyle = '#FFFFFF';
  const ix = Math.floor(x), iy = Math.floor(y), iw = Math.floor(w), ih = Math.floor(h);
  ctx.fillRect(ix, iy, iw, ih);
  ctx.fillRect(ix + Math.floor(iw * 0.15), iy - Math.floor(ih * 0.5), Math.floor(iw * 0.3), Math.floor(ih * 0.6));
  ctx.fillRect(ix + Math.floor(iw * 0.4), iy - Math.floor(ih * 0.7), Math.floor(iw * 0.35), Math.floor(ih * 0.8));
  ctx.fillRect(ix + Math.floor(iw * 0.65), iy - Math.floor(ih * 0.3), Math.floor(iw * 0.2), Math.floor(ih * 0.4));
}

function drawMountain(x, h, w, color, snowCap) {
  const baseY = 110;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(Math.floor(x), baseY);
  ctx.lineTo(Math.floor(x + w / 2), Math.floor(baseY - h));
  ctx.lineTo(Math.floor(x + w), baseY);
  ctx.closePath();
  ctx.fill();
  if (snowCap) {
    ctx.fillStyle = '#FFFFFF';
    const peakX = x + w / 2;
    const peakY = baseY - h;
    ctx.beginPath();
    ctx.moveTo(Math.floor(peakX - w * 0.1), Math.floor(peakY + h * 0.18));
    ctx.lineTo(Math.floor(peakX), Math.floor(peakY));
    ctx.lineTo(Math.floor(peakX + w * 0.1), Math.floor(peakY + h * 0.18));
    ctx.closePath();
    ctx.fill();
  }
}

function drawTree(x, baseY, h) {
  const trunkW = 3, trunkH = Math.floor(h * 0.3);
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(x - 1), Math.floor(baseY - trunkH), trunkW, trunkH);
  for (let i = 0; i < 3; i++) {
    const layerW = (h * 0.4) * (1 - i * 0.15);
    const layerY = baseY - trunkH - (i * h * 0.2);
    ctx.fillStyle = i === 1 ? '#00AA00' : '#005500';
    ctx.beginPath();
    ctx.moveTo(Math.floor(x - layerW / 2), Math.floor(layerY));
    ctx.lineTo(Math.floor(x + 0.5), Math.floor(layerY - h * 0.25));
    ctx.lineTo(Math.floor(x + layerW / 2), Math.floor(layerY));
    ctx.closePath();
    ctx.fill();
  }
}

function drawWagon(wx, wy) {
  // Oxen (two brown lumps)
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(wx - 24), Math.floor(wy - 6), 8, 6);
  ctx.fillRect(Math.floor(wx - 14), Math.floor(wy - 6), 8, 6);
  // Oxen legs
  ctx.fillStyle = '#553300';
  ctx.fillRect(Math.floor(wx - 22), Math.floor(wy), 2, 4);
  ctx.fillRect(Math.floor(wx - 18), Math.floor(wy), 2, 4);
  ctx.fillRect(Math.floor(wx - 12), Math.floor(wy), 2, 4);
  ctx.fillRect(Math.floor(wx - 8), Math.floor(wy), 2, 4);
  // Oxen heads
  ctx.fillStyle = '#885500';
  ctx.fillRect(Math.floor(wx - 26), Math.floor(wy - 7), 3, 3);
  ctx.fillRect(Math.floor(wx - 16), Math.floor(wy - 7), 3, 3);
  // Yoke
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(wx - 4), Math.floor(wy - 4), 6, 2);
  // Wagon body
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(wx + 2), Math.floor(wy - 8), 24, 10);
  // Wagon sides darker
  ctx.fillStyle = '#885500';
  ctx.fillRect(Math.floor(wx + 2), Math.floor(wy - 8), 24, 1);
  ctx.fillRect(Math.floor(wx + 2), Math.floor(wy + 1), 24, 1);
  // Canvas cover (white curved top)
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.moveTo(Math.floor(wx + 3), Math.floor(wy - 8));
  ctx.quadraticCurveTo(Math.floor(wx + 14), Math.floor(wy - 22), Math.floor(wx + 25), Math.floor(wy - 8));
  ctx.closePath();
  ctx.fill();
  // Canvas cover outline
  ctx.strokeStyle = '#AAAAAA';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(Math.floor(wx + 3), Math.floor(wy - 8));
  ctx.quadraticCurveTo(Math.floor(wx + 14), Math.floor(wy - 22), Math.floor(wx + 25), Math.floor(wy - 8));
  ctx.stroke();
  // Canvas ribs
  ctx.strokeStyle = '#AAAAAA';
  for (let ri = 0; ri < 3; ri++) {
    const rx = wx + 8 + ri * 5;
    ctx.beginPath();
    ctx.moveTo(Math.floor(rx), Math.floor(wy - 8));
    ctx.lineTo(Math.floor(rx), Math.floor(wy - 14 - ri % 2 * 2));
    ctx.stroke();
  }
  // Wheels
  const wheelR = 5;
  for (let wi = 0; wi < 2; wi++) {
    const wcx = wx + 7 + wi * 14;
    const wcy = wy + 4;
    // Outer rim
    ctx.fillStyle = '#553300';
    ctx.beginPath();
    ctx.arc(Math.floor(wcx), Math.floor(wcy), wheelR, 0, Math.PI * 2);
    ctx.fill();
    // Inner
    ctx.fillStyle = '#AA5500';
    ctx.beginPath();
    ctx.arc(Math.floor(wcx), Math.floor(wcy), wheelR - 1.5, 0, Math.PI * 2);
    ctx.fill();
    // Spokes
    ctx.strokeStyle = '#553300';
    ctx.lineWidth = 1;
    for (let si = 0; si < 6; si++) {
      const angle = wagonWheelAngle + (si * Math.PI / 3);
      ctx.beginPath();
      ctx.moveTo(Math.floor(wcx), Math.floor(wcy));
      ctx.lineTo(Math.floor(wcx + Math.cos(angle) * (wheelR - 1)), Math.floor(wcy + Math.sin(angle) * (wheelR - 1)));
      ctx.stroke();
    }
    // Hub
    ctx.fillStyle = '#553300';
    ctx.fillRect(Math.floor(wcx - 1), Math.floor(wcy - 1), 2, 2);
  }
  // Red flag (security/hacker theme)
  ctx.fillStyle = '#FF0000';
  ctx.fillRect(Math.floor(wx + 14), Math.floor(wy - 22), 1, -7);
  ctx.fillStyle = '#FF5555';
  ctx.fillRect(Math.floor(wx + 15), Math.floor(wy - 29), 6, 4);
}

function drawLandmark(type, x, baseY) {
  switch (type) {
    case 'town':
      ctx.fillStyle = '#AA5500';
      ctx.fillRect(Math.floor(x), Math.floor(baseY - 18), 14, 18);
      ctx.fillRect(Math.floor(x + 18), Math.floor(baseY - 14), 12, 14);
      // Roofs
      ctx.fillStyle = '#555555';
      ctx.beginPath();
      ctx.moveTo(Math.floor(x - 2), Math.floor(baseY - 18));
      ctx.lineTo(Math.floor(x + 7), Math.floor(baseY - 25));
      ctx.lineTo(Math.floor(x + 16), Math.floor(baseY - 18));
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(Math.floor(x + 16), Math.floor(baseY - 14));
      ctx.lineTo(Math.floor(x + 24), Math.floor(baseY - 20));
      ctx.lineTo(Math.floor(x + 32), Math.floor(baseY - 14));
      ctx.closePath();
      ctx.fill();
      // Windows
      ctx.fillStyle = '#FFFF55';
      ctx.fillRect(Math.floor(x + 3), Math.floor(baseY - 13), 3, 3);
      ctx.fillRect(Math.floor(x + 9), Math.floor(baseY - 13), 3, 3);
      ctx.fillRect(Math.floor(x + 21), Math.floor(baseY - 10), 3, 3);
      // Door
      ctx.fillStyle = '#553300';
      ctx.fillRect(Math.floor(x + 5), Math.floor(baseY - 7), 4, 7);
      break;
    case 'camp':
      // Tent
      ctx.fillStyle = '#AAAAAA';
      ctx.beginPath();
      ctx.moveTo(Math.floor(x - 6), Math.floor(baseY));
      ctx.lineTo(Math.floor(x + 4), Math.floor(baseY - 14));
      ctx.lineTo(Math.floor(x + 14), Math.floor(baseY));
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#555555';
      ctx.beginPath();
      ctx.moveTo(Math.floor(x + 4), Math.floor(baseY));
      ctx.lineTo(Math.floor(x + 4), Math.floor(baseY - 14));
      ctx.lineTo(Math.floor(x + 14), Math.floor(baseY));
      ctx.closePath();
      ctx.fill();
      // Campfire
      ctx.fillStyle = '#FF5555';
      ctx.fillRect(Math.floor(x + 20), Math.floor(baseY - 5), 4, 3);
      ctx.fillStyle = '#FFFF55';
      ctx.fillRect(Math.floor(x + 21), Math.floor(baseY - 8), 2, 3);
      ctx.fillStyle = '#FFAA00';
      ctx.fillRect(Math.floor(x + 18), Math.floor(baseY - 2), 8, 2);
      break;
    case 'mountain':
      drawMountain(x - 20, 60, 50, '#AA00AA', true);
      drawMountain(x + 10, 45, 40, '#FF55FF', true);
      break;
    case 'river':
      ctx.fillStyle = '#AA5500';
      ctx.fillRect(Math.floor(x), Math.floor(baseY - 20), 3, 20);
      ctx.fillRect(Math.floor(x + 24), Math.floor(baseY - 20), 3, 20);
      ctx.strokeStyle = '#AAAAAA';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(Math.floor(x + 1), Math.floor(baseY - 18));
      ctx.lineTo(Math.floor(x + 25), Math.floor(baseY - 18));
      ctx.stroke();
      // Sign
      ctx.fillStyle = '#AA5500';
      ctx.fillRect(Math.floor(x + 8), Math.floor(baseY - 25), 12, 8);
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(Math.floor(x + 10), Math.floor(baseY - 23), 2, 1);
      ctx.fillRect(Math.floor(x + 13), Math.floor(baseY - 23), 2, 1);
      ctx.fillRect(Math.floor(x + 16), Math.floor(baseY - 23), 2, 1);
      break;
    case 'forest':
      for (let i = 0; i < 6; i++) {
        drawTree(x + i * 7, baseY, 14 + (i % 3) * 3);
      }
      break;
  }
}

function drawRiver(time) {
  const riverY = 155;
  const riverH = 18;
  ctx.fillStyle = '#0000AA';
  ctx.fillRect(0, riverY, W, riverH);
  ctx.fillStyle = '#00AAAA';
  for (let wx = 0; wx < W; wx += 3) {
    const waveY = riverY + 3 + Math.sin((wx + time * 0.05) * 0.08) * 3;
    ctx.fillRect(wx, Math.floor(waveY), 2, 1);
    const waveY2 = riverY + 10 + Math.sin((wx + time * 0.03 + 50) * 0.1) * 2;
    ctx.fillRect(wx, Math.floor(waveY2), 2, 1);
  }
  // White foam
  ctx.fillStyle = '#55FFFF';
  for (let wx = 0; wx < W; wx += 12) {
    const foamY = riverY + 1 + Math.sin((wx + time * 0.04) * 0.06) * 1;
    ctx.fillRect(wx + 2, Math.floor(foamY), 3, 1);
  }
}

// =====================================================================
// EVENT CANVAS OVERLAYS — unique visuals per quiz event
// =====================================================================
function drawEventOverlay(time) {
  if (!currentEventType && !currentEventTitle) return;

  var t = (time || 0) * 0.001; // seconds

  // --- SCOPE STORM: dark sky, lightning, rain ---
  if (currentEventTitle.indexOf('Scope Storm') !== -1) {
    // Darken sky
    ctx.fillStyle = 'rgba(0,0,50,0.45)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning flash (periodic)
    var flashPhase = Math.sin(t * 1.7) + Math.sin(t * 3.1);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, 0, W, H);
      // Lightning bolt
      ctx.strokeStyle = '#FFFF55';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 80 + Math.sin(t * 2.3) * 60;
      ctx.moveTo(lx, 10);
      ctx.lineTo(lx - 5, 35);
      ctx.lineTo(lx + 8, 35);
      ctx.lineTo(lx - 3, 65);
      ctx.lineTo(lx + 10, 65);
      ctx.lineTo(lx + 2, 95);
      ctx.stroke();
    }
    // Rain
    ctx.strokeStyle = '#5555FF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 40; i++) {
      var rx = (i * 8.3 + t * 80) % W;
      var ry = (i * 13.7 + t * 120) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 1), Math.floor(ry + 5));
      ctx.stroke();
    }
    return;
  }

  // --- SECURITY SCOUT: person standing by campfire ---
  if (currentEventTitle.indexOf('Security Scout') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8); // torso
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3); // head
    ctx.fillRect(px - 1, py - 4, 2, 5); // left leg
    ctx.fillRect(px + 3, py - 4, 2, 5); // right leg
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Campfire
    var fx = 212, fy = 148;
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(fx - 3, fy, 2, 3);
    ctx.fillRect(fx + 3, fy, 2, 3);
    ctx.fillStyle = '#FF5555';
    var flicker = Math.sin(t * 8) * 2;
    ctx.fillRect(fx - 1, fy - 3 + Math.floor(flicker * 0.3), 4, 3);
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(fx, fy - 5 + Math.floor(flicker * 0.5), 2, 2);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(fx - 1, fy - 2, 4, 2);
    // Firelight glow (subtle)
    ctx.fillStyle = 'rgba(255,170,0,0.08)';
    ctx.beginPath();
    ctx.arc(fx + 1, fy - 2, 15, 0, Math.PI * 2);
    ctx.fill();
    return;
  }

  // --- VULNERABILITY RIVER: rough rapids with white water ---
  if (currentEventTitle.indexOf('Vulnerability River') !== -1) {
    // Extra turbulence on the river
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 20; i++) {
      var sx = (i * 17 + t * 40) % W;
      var sy = 157 + Math.sin((i * 3 + t * 5)) * 3;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 4, 2);
    }
    // Floating logs / debris
    ctx.fillStyle = '#AA5500';
    for (var i = 0; i < 3; i++) {
      var logX = (i * 110 + t * 25) % W;
      var logY = 159 + Math.sin(t * 2 + i) * 2;
      ctx.fillRect(Math.floor(logX), Math.floor(logY), 8, 2);
    }
    return;
  }

  // --- INJECTION STORM: dark sky, red-tinged rain of payloads ---
  if (currentEventTitle.indexOf('Injection Storm') !== -1) {
    // Darken sky with red tint
    ctx.fillStyle = 'rgba(50,0,0,0.35)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning flash (periodic)
    var flashPhase = Math.sin(t * 2.1) + Math.sin(t * 2.7);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,100,100,0.3)';
      ctx.fillRect(0, 0, W, H);
      ctx.strokeStyle = '#FF5555';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 120 + Math.sin(t * 1.8) * 80;
      ctx.moveTo(lx, 10);
      ctx.lineTo(lx - 8, 40);
      ctx.lineTo(lx + 5, 40);
      ctx.lineTo(lx - 2, 70);
      ctx.stroke();
    }
    // Red-tinted rain (payloads)
    ctx.strokeStyle = '#FF5555';
    ctx.lineWidth = 1;
    for (var i = 0; i < 35; i++) {
      var rx = (i * 9.1 + t * 70) % W;
      var ry = (i * 12.3 + t * 100) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 1), Math.floor(ry + 4));
      ctx.stroke();
    }
    return;
  }

  // --- AUTH BYPASS GONE WRONG: red sky, smoke, warning ---
  if (currentEventTitle.indexOf('Auth Bypass Gone Wrong') !== -1) {
    // Red danger tint
    ctx.fillStyle = 'rgba(170,0,0,0.25)';
    ctx.fillRect(0, 0, W, H);
    // Smoke particles rising
    ctx.fillStyle = '#555555';
    for (var i = 0; i < 15; i++) {
      var sx = 140 + Math.sin(i * 2.7 + t) * 30;
      var sy = 130 - ((t * 20 + i * 15) % 90);
      var size = 2 + (i % 3);
      ctx.globalAlpha = 0.3 + Math.sin(t + i) * 0.15;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), size, size);
    }
    ctx.globalAlpha = 1.0;
    // Fire at base
    ctx.fillStyle = '#FF5555';
    for (var i = 0; i < 8; i++) {
      var fx = 130 + i * 5;
      var fh = 4 + Math.sin(t * 6 + i * 1.5) * 3;
      ctx.fillRect(fx, Math.floor(140 - fh), 3, Math.floor(fh));
    }
    ctx.fillStyle = '#FFFF55';
    for (var i = 0; i < 5; i++) {
      var fx = 135 + i * 6;
      var fh = 2 + Math.sin(t * 8 + i * 2) * 2;
      ctx.fillRect(fx, Math.floor(139 - fh), 2, Math.floor(fh));
    }
    // Pulsing red border
    var pulse = (Math.sin(t * 4) + 1) * 0.15;
    ctx.strokeStyle = 'rgba(255,0,0,' + pulse.toFixed(2) + ')';
    ctx.lineWidth = 3;
    ctx.strokeRect(1, 1, W - 2, H - 2);
    ctx.lineWidth = 1;
    return;
  }

  // --- PROOF-BY-EXPLOITATION PIONEER: person at checkpoint ---
  if (currentEventTitle.indexOf('Proof-by-Exploitation') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3);
    ctx.fillRect(px - 1, py - 4, 2, 5);
    ctx.fillRect(px + 3, py - 4, 2, 5);
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Terminal/laptop nearby
    ctx.fillStyle = '#333333';
    ctx.fillRect(px + 10, py - 8, 10, 7);
    ctx.fillStyle = '#55FF55';
    ctx.fillRect(px + 11, py - 7, 8, 5);
    // Blinking cursor on screen
    if (Math.sin(t * 4) > 0) {
      ctx.fillStyle = '#55FF55';
      ctx.fillRect(px + 13, py - 5, 2, 1);
    }
    return;
  }
}

// =====================================================================
// DEATH SCREEN — Apple II green phosphor style
// =====================================================================
function drawDeathScene(time) {
  var t = (time || 0) * 0.001;
  var G = '#33FF33'; // Apple II green
  var GD = '#1a8a1a'; // darker green for details

  // Black background
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);

  // Ground line
  ctx.fillStyle = GD;
  ctx.fillRect(0, 148, W, 1);

  // --- OX (left side) ---
  var ox = 100, oy = 128;
  // Body
  ctx.fillStyle = G;
  ctx.fillRect(ox, oy, 24, 14);
  // Head
  ctx.fillRect(ox - 10, oy - 2, 12, 10);
  // Horns
  ctx.fillRect(ox - 12, oy - 6, 3, 5);
  ctx.fillRect(ox - 4, oy - 6, 3, 5);
  // Snout
  ctx.fillStyle = GD;
  ctx.fillRect(ox - 10, oy + 4, 6, 3);
  // Eye
  ctx.fillStyle = '#000';
  ctx.fillRect(ox - 7, oy, 2, 2);
  // Legs
  ctx.fillStyle = G;
  ctx.fillRect(ox + 2, oy + 14, 4, 8);
  ctx.fillRect(ox + 10, oy + 14, 4, 8);
  ctx.fillRect(ox + 16, oy + 14, 4, 8);
  // Tail
  ctx.fillRect(ox + 24, oy + 2, 6, 2);
  ctx.fillRect(ox + 29, oy, 2, 4);

  // --- HITCH ---
  ctx.fillStyle = G;
  ctx.fillRect(ox + 28, oy + 8, 14, 2);

  // --- WAGON ---
  var wx = 142, wy = 108;
  // Wagon bed
  ctx.fillStyle = G;
  ctx.fillRect(wx, wy + 20, 50, 16);
  // Bed slats (dark lines)
  ctx.fillStyle = GD;
  ctx.fillRect(wx, wy + 24, 50, 1);
  ctx.fillRect(wx, wy + 28, 50, 1);
  ctx.fillRect(wx, wy + 32, 50, 1);
  // Side rails
  ctx.fillStyle = G;
  ctx.fillRect(wx, wy + 18, 2, 18);
  ctx.fillRect(wx + 48, wy + 18, 2, 18);

  // Canvas cover (the bonnet)
  ctx.fillStyle = G;
  // Left arch
  ctx.fillRect(wx + 4, wy + 4, 2, 16);
  // Right arch
  ctx.fillRect(wx + 44, wy + 4, 2, 16);
  // Top cover
  ctx.fillRect(wx + 4, wy + 2, 42, 4);
  // Cover fill
  ctx.fillRect(wx + 6, wy + 6, 38, 12);
  // Cover shading
  ctx.fillStyle = GD;
  ctx.fillRect(wx + 8, wy + 8, 34, 2);
  ctx.fillRect(wx + 8, wy + 12, 34, 2);
  ctx.fillRect(wx + 8, wy + 16, 34, 1);

  // Wheels
  var wheelR = 8;
  var wheels = [wx + 8, wx + 42];
  var wa = t * 0.5; // slow rotation
  ctx.strokeStyle = G;
  ctx.lineWidth = 1.5;
  for (var wi = 0; wi < wheels.length; wi++) {
    var cx = wheels[wi], cy = wy + 38;
    // Rim
    ctx.beginPath();
    ctx.arc(cx, cy, wheelR, 0, Math.PI * 2);
    ctx.stroke();
    // Spokes
    for (var sp = 0; sp < 6; sp++) {
      var angle = wa + sp * Math.PI / 3;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(angle) * wheelR, cy + Math.sin(angle) * wheelR);
      ctx.stroke();
    }
    // Hub
    ctx.fillStyle = G;
    ctx.beginPath();
    ctx.arc(cx, cy, 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.lineWidth = 1;

  // Subtle scanline effect
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  for (var sl = 0; sl < H; sl += 3) {
    ctx.fillRect(0, sl, W, 1);
  }

  // Subtle green glow/vignette
  var grd = ctx.createRadialGradient(W/2, H/2, 40, W/2, H/2, W * 0.7);
  grd.addColorStop(0, 'rgba(0,0,0,0)');
  grd.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
}

function renderCanvas(time) {
  // Death screen: green phosphor Apple II style
  if (gameState === STATES.DEATH) {
    drawDeathScene(time);
    return;
  }

  const skyColors = getSkyColors();

  // Sky gradient (banded for EGA feel)
  const bands = 10;
  const skyBottom = 110;
  for (let i = 0; i < bands; i++) {
    const t = i / (bands - 1);
    const r1 = parseInt(skyColors.top.substr(1, 2), 16);
    const g1 = parseInt(skyColors.top.substr(3, 2), 16);
    const b1 = parseInt(skyColors.top.substr(5, 2), 16);
    const r2 = parseInt(skyColors.bottom.substr(1, 2), 16);
    const g2 = parseInt(skyColors.bottom.substr(3, 2), 16);
    const b2 = parseInt(skyColors.bottom.substr(5, 2), 16);
    const r = Math.floor(r1 + (r2 - r1) * t);
    const g = Math.floor(g1 + (g2 - g1) * t);
    const b = Math.floor(b1 + (b2 - b1) * t);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    const bandH = Math.ceil(skyBottom / bands) + 1;
    ctx.fillRect(0, Math.floor(i * (skyBottom / bands)), W, bandH);
  }

  // Clouds (parallax 0.2x)
  const cloudOffset = scrollX * 0.2;
  for (const c of cloudPositions) {
    let cx = ((c.x - cloudOffset) % (W + 80));
    if (cx < -40) cx += W + 80;
    drawPixelCloud(cx - 20, c.y, c.w, c.h);
  }

  // Far mountains (parallax 0.3x) - DARK MAGENTA signature Oregon Trail
  const farOffset = scrollX * 0.3;
  for (const m of farMountains) {
    let mx = ((m.x - farOffset) % (W + 100));
    if (mx < -50) mx += W + 100;
    drawMountain(mx - 25, m.h, m.w, '#AA00AA', false);
  }

  // Near mountains (parallax 0.4x) - LIGHT MAGENTA with snow caps
  const nearOffset = scrollX * 0.4;
  for (const m of nearMountains) {
    let mx = ((m.x - nearOffset) % (W + 80));
    if (mx < -40) mx += W + 80;
    drawMountain(mx - 20, m.h, m.w, '#FF55FF', m.snow);
  }

  // Grass
  ctx.fillStyle = '#00AA00';
  ctx.fillRect(0, 110, W, H - 110);

  // Bright grass highlights
  ctx.fillStyle = '#55FF55';
  const grassOffset = scrollX * 1.0;
  for (let i = 0; i < 50; i++) {
    let gx = ((i * 11 + 5 - grassOffset) % (W + 20));
    if (gx < -5) gx += W + 20;
    const gy = 113 + (i * 7 + i * i * 3) % 55;
    ctx.fillRect(Math.floor(gx), Math.floor(gy), 2, 2);
  }

  // Trees (parallax 0.6x)
  const treeOffset = scrollX * 0.6;
  const treeBaseY = 128;
  for (const t of treesData) {
    let tx = ((t.x - treeOffset) % (W + 60));
    if (tx < -20) tx += W + 60;
    drawTree(tx - 10, treeBaseY, t.h);
  }

  // Landmark for current stop (only at stops/events)
  if (gameState === STATES.STOP || gameState === STATES.EVENT || gameState === STATES.RIVER) {
    const stop = TRAIL_DATA.stops[currentStop];
    if (stop) {
      drawLandmark(stop.landmarkType, 240, 150);
    }
  }

  // Trail/ground strip
  if (!showRiver) {
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(0, 152, W, 15);
    // Trail texture dots
    ctx.fillStyle = '#885500';
    for (let i = 0; i < 35; i++) {
      let dotX = ((i * 10 - scrollX * 1.0) % (W + 10));
      if (dotX < -3) dotX += W + 10;
      ctx.fillRect(Math.floor(dotX), 155 + (i % 4) * 2, 3, 1);
    }
    // Ruts
    ctx.fillStyle = '#775500';
    ctx.fillRect(0, 157, W, 1);
    ctx.fillRect(0, 162, W, 1);
  }

  // River (when active)
  if (showRiver) {
    drawRiver(time || 0);
  }

  // Wagon
  const wagonX = 65;
  const wagonY = showRiver ? 148 : 149;
  drawWagon(wagonX, wagonY);

  // Event-specific visual overlay
  if (gameState === STATES.EVENT || gameState === STATES.RIVER) {
    drawEventOverlay(time);
  }

  // Ground below trail
  ctx.fillStyle = '#885500';
  ctx.fillRect(0, showRiver ? 173 : 167, W, 15);
  ctx.fillStyle = '#553300';
  ctx.fillRect(0, showRiver ? 188 : 182, W, H - 182);
}

// =====================================================================
// MUSIC SYSTEM (Web Audio API Chiptune)
// =====================================================================
const NOTE_FREQ = {
  'C3': 130.81, 'D3': 146.83, 'G2': 98.00, 'A2': 110.00,
  'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'G4': 392.00,
  'A4': 440.00, 'C5': 523.25, 'REST': 0
};

const melody = [
  { note: 'E4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'A4', dur: 1 }, { note: 'G4', dur: 1 },
  { note: 'E4', dur: 1 }, { note: 'D4', dur: 1 }, { note: 'C4', dur: 1 }, { note: 'REST', dur: 1 },
  { note: 'E4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'A4', dur: 1 }, { note: 'C5', dur: 1 },
  { note: 'A4', dur: 2 }, { note: 'G4', dur: 2 },
  { note: 'C4', dur: 1 }, { note: 'D4', dur: 1 }, { note: 'E4', dur: 1 }, { note: 'G4', dur: 1 },
  { note: 'A4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'E4', dur: 1 }, { note: 'D4', dur: 1 },
  { note: 'C4', dur: 1 }, { note: 'E4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'E4', dur: 1 },
  { note: 'D4', dur: 1 }, { note: 'C4', dur: 3 }
];

const bassLine = [
  { note: 'C3', dur: 4 }, { note: 'A2', dur: 4 }, { note: 'C3', dur: 4 }, { note: 'A2', dur: 4 },
  { note: 'C3', dur: 4 }, { note: 'G2', dur: 4 }, { note: 'D3', dur: 4 }, { note: 'C3', dur: 4 }
];

let musicScheduleTimer = null;
let nextMelodyTime = 0;
let nextBassTime = 0;

var masterGain = null;

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 1.0;
    masterGain.connect(audioCtx.destination);
    musicInitialized = true;
  } catch (e) {
    console.warn('Web Audio not available:', e);
  }
}

function playNote(freq, startTime, duration, type, gainVal) {
  if (!audioCtx || freq === 0) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startTime);
  // Envelope: attack then decay
  gain.gain.setValueAtTime(0.001, startTime);
  gain.gain.linearRampToValueAtTime(gainVal, startTime + 0.02);
  gain.gain.setValueAtTime(gainVal, startTime + duration * 0.75);
  gain.gain.linearRampToValueAtTime(0.001, startTime + duration * 0.95);
  osc.connect(gain);
  gain.connect(masterGain || audioCtx.destination);
  osc.start(startTime);
  osc.stop(startTime + duration);
}

function scheduleLoop() {
  if (!musicPlaying || !audioCtx) return;
  const bpm = 110;
  const quarterDur = 60 / bpm;
  const now = audioCtx.currentTime;

  // Schedule melody
  let t = now + 0.05;
  for (const note of melody) {
    const dur = note.dur * quarterDur;
    if (note.note !== 'REST') {
      playNote(NOTE_FREQ[note.note], t, dur, 'square', 0.06);
    }
    t += dur;
  }

  // Schedule bass
  let tb = now + 0.05;
  for (const note of bassLine) {
    const dur = note.dur * quarterDur;
    playNote(NOTE_FREQ[note.note], tb, dur, 'triangle', 0.08);
    tb += dur;
  }

  // Total loop duration in beats: melody has 32 quarter beats = 32 * quarterDur
  const totalBeats = 32;
  const loopDurationMs = totalBeats * quarterDur * 1000;

  musicScheduleTimer = setTimeout(scheduleLoop, loopDurationMs - 200);
}

function startMusic() {
  if (!musicInitialized) initAudio();
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (masterGain) masterGain.gain.setValueAtTime(1.0, audioCtx.currentTime);
  musicPlaying = true;
  scheduleLoop();
  updateMusicIndicator();
}

function stopMusic() {
  musicPlaying = false;
  if (musicScheduleTimer) {
    clearTimeout(musicScheduleTimer);
    musicScheduleTimer = null;
  }
  if (masterGain) masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
  updateMusicIndicator();
}

function toggleMusic() {
  if (!musicInitialized) initAudio();
  if (musicPlaying) {
    stopMusic();
  } else {
    startMusic();
  }
  renderStatusBar();
}

function updateMusicIndicator() {
  const el = document.getElementById('music-indicator');
  if (!el) return;
  el.textContent = musicPlaying ? 'M: Music ON' : 'M: Music OFF';
  el.style.color = musicPlaying ? '#55FF55' : '#555555';
}

// =====================================================================
// SYNTAX HIGHLIGHTING (EGA Colors)
// =====================================================================
const TS_KEYWORDS = new Set([
  'import', 'export', 'from', 'const', 'let', 'var', 'function', 'async',
  'await', 'return', 'if', 'else', 'for', 'while', 'new', 'typeof', 'instanceof',
  'interface', 'type', 'class', 'extends', 'implements', 'try', 'catch', 'throw',
  'default', 'switch', 'case', 'break', 'continue', 'true', 'false', 'null',
  'undefined', 'void', 'of', 'in'
]);

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function highlightCode(code) {
  return code.split('\n').map(function(line) {
    if (line.trim().startsWith('//')) {
      return '<span style="color:#555555">' + escHtml(line) + '</span>';
    }
    var result = '';
    var i = 0;
    while (i < line.length) {
      // String literal
      if (line[i] === "'" || line[i] === '"' || line[i] === '`') {
        var quote = line[i];
        var end = i + 1;
        while (end < line.length && line[end] !== quote) {
          if (line[end] === '\\') end++;
          end++;
        }
        end = Math.min(end + 1, line.length);
        result += '<span style="color:#FFFF55">' + escHtml(line.substring(i, end)) + '</span>';
        i = end;
        continue;
      }
      // Inline comment
      if (line[i] === '/' && i + 1 < line.length && line[i + 1] === '/') {
        result += '<span style="color:#555555">' + escHtml(line.substring(i)) + '</span>';
        break;
      }
      // Number
      if (/\d/.test(line[i]) && (i === 0 || !/\w/.test(line[i - 1]))) {
        var end2 = i;
        while (end2 < line.length && /[\d._]/.test(line[end2])) end2++;
        result += '<span style="color:#FF55FF">' + escHtml(line.substring(i, end2)) + '</span>';
        i = end2;
        continue;
      }
      // Identifier or keyword
      if (/[a-zA-Z_$]/.test(line[i])) {
        var end3 = i;
        while (end3 < line.length && /[\w$]/.test(line[end3])) end3++;
        var word = line.substring(i, end3);
        if (TS_KEYWORDS.has(word)) {
          result += '<span style="color:#55FFFF">' + escHtml(word) + '</span>';
        } else {
          result += '<span style="color:#55FF55">' + escHtml(word) + '</span>';
        }
        i = end3;
        continue;
      }
      // Punctuation / operators
      result += '<span style="color:#AAAAAA">' + escHtml(line[i]) + '</span>';
      i++;
    }
    return result;
  }).join('\n');
}

    '<div>' + masteryHtml + '</div>' +
    '<div style="margin-top:10px; color:#55FF55; text-align:center;">' + tip + '</div>' +
    (TRAIL_DATA.sourceInfo ? '<div style="color:#555555; margin-top:6px; text-align:center; font-size:10px;">Source: ' + TRAIL_DATA.sourceInfo.repo + ' @ ' + TRAIL_DATA.sourceInfo.commit + (TRAIL_DATA.sourceInfo.tag ? ' (' + TRAIL_DATA.sourceInfo.tag + ')' : '') + '</div>' : '') +
    '<div style="margin-top:14px; text-align:center;" class="blink">Press SPACE BAR to play again</div>' +
    '</div>'
  );
}

// =====================================================================
// STATUS BAR
// =====================================================================
function renderStatusBar() {
  if (gameState === STATES.TITLE) {
    var titleMusic = musicPlaying
      ? 'Music: <span style="color:#55FF55;">On</span> <span style="color:#555555;">(M to toggle off)</span>'
      : 'Music: <span style="color:#FF5555;">Off</span> <span style="color:#555555;">(M to toggle on)</span>';
    statusBar.innerHTML = '<span style="color:#555555;">The Coderegon Trail v1.0</span>  |  ' + titleMusic;
    return;
  }

  var maxH = maxHealthForGame;
  var healthPct = Math.max(0, health / maxH);
  var barLen = 10;
  var filled = Math.round(healthPct * barLen);
  var healthColor = health > maxH * 0.6 ? '#00AA00' : (health > maxH * 0.3 ? '#FFFF55' : '#FF5555');
  var healthBar = '<span style="color:' + healthColor + ';">';
  for (var i = 0; i < filled; i++) healthBar += '\u2588';
  healthBar += '</span><span style="color:#555555;">';
  for (var i2 = 0; i2 < barLen - filled; i2++) healthBar += '\u2591';
  healthBar += '</span>';

  var streakStars = '<span style="color:#FFFF55;">';
  for (var s = 0; s < Math.min(streak, 5); s++) streakStars += '\u2605';
  streakStars += '</span>';

  var musicHint = musicPlaying
    ? 'Music: <span style="color:#55FF55;">On</span> <span style="color:#555555;">(M to toggle off)</span>'
    : 'Music: <span style="color:#FF5555;">Off</span> <span style="color:#555555;">(M to toggle on)</span>';

  statusBar.innerHTML = 'HP: ' + healthBar + ' ' + Math.max(0, health) +
    '  Hints: ' + supplies + '  ' + streakStars +
    '  |  Stop ' + (currentStop + 1) + '/' + TRAIL_DATA.stops.length +
    '  |  ' + musicHint;
}

// =====================================================================
// GAME LOGIC
// =====================================================================
function resetGame() {
  gameState = STATES.TITLE;
  difficulty = 1;
  selectedDifficulty = 1;
  health = 100;
  maxHealthForGame = 100;
  supplies = 5;
  currentStop = 0;
  day = 1;
  score = 0;
  totalQuestions = 0;
  streak = 0;
  bestStreak = 0;
  hintsUsed = 0;
  scrollX = 0;
  showRiver = false;
  wagonWheelAngle = 0;
  travelFlavorIndex = 0;
  deathPending = false;
  partyHealth = TRAIL_DATA.partyMembers.map(function(p) { return p.maxHealth; });
  pendingEvents = [];
  currentEventIndex = 0;
  eventAnswered = false;
  eventHinted = false;
  dimmedChoice = -1;
  selectedEventChoice = 0;
  selectedStopChoice = 0;
  shuffledIndices = [];
  currentEventType = '';
  currentEventTitle = '';
  drainAccumulator = 0;
  techDebtDeath = false;
  if (travelTimer) { clearTimeout(travelTimer); travelTimer = null; }
  if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }
}

function selectDifficulty(idx) {
  selectedDifficulty = Math.max(0, Math.min(PROFESSIONS.length - 1, idx));
  renderSetupScreen();
}

function startGame() {
  difficulty = selectedDifficulty;
  var prof = PROFESSIONS[difficulty];
  health = prof.health;
  maxHealthForGame = prof.health;
  supplies = prof.supplies;
  partyHealth = TRAIL_DATA.partyMembers.map(function(p) { return p.maxHealth; });
  currentStop = 0;
  day = 1;
  score = 0;
  totalQuestions = 0;
  streak = 0;
  bestStreak = 0;
  hintsUsed = 0;
  scrollX = 0;
  deathPending = false;
  enterTravel();
}

function enterTravel() {
  gameState = STATES.TRAVEL;
  showRiver = false;
  currentEventType = '';
  currentEventTitle = '';
  day += Math.floor(Math.random() * 7) + 1;
  travelFlavorIndex = Math.floor(Math.random() * travelFlavors.length);
  renderTravelScreen();
  renderStatusBar();

  if (travelTimer) clearTimeout(travelTimer);
  travelTimer = setTimeout(function() {
    if (gameState === STATES.TRAVEL) advanceFromTravel();
  }, 2500);
}

function advanceFromTravel() {
  if (travelTimer) { clearTimeout(travelTimer); travelTimer = null; }

  // Collect events for the current stop (triggerStop is 1-indexed relative to stop we just visited)
  // Events trigger BEFORE showing the stop
  pendingEvents = TRAIL_DATA.events.filter(function(e) { return e.triggerStop === currentStop; });
  currentEventIndex = 0;

  if (pendingEvents.length > 0) {
    showNextEvent();
  } else {
    enterStop();
  }
}

function showNextEvent() {
  if (currentEventIndex >= pendingEvents.length) {
    // After all events, check if we should die
    if (checkDeath()) return;
    enterStop();
    return;
  }

  var event = pendingEvents[currentEventIndex];
  eventAnswered = false;
  eventHinted = false;
  dimmedChoice = -1;
  selectedEventChoice = 0;
  currentEventType = event.type;
  currentEventTitle = event.title;

  // Shuffle choice order so correct answer isn't always first
  shuffledIndices = [];
  for (var si = 0; si < event.choices.length; si++) shuffledIndices.push(si);
  for (var si = shuffledIndices.length - 1; si > 0; si--) {
    var sj = Math.floor(Math.random() * (si + 1));
    var tmp = shuffledIndices[si]; shuffledIndices[si] = shuffledIndices[sj]; shuffledIndices[sj] = tmp;
  }

  if (event.type === 'river') {
    gameState = STATES.RIVER;
    showRiver = true;
  } else {
    gameState = STATES.EVENT;
    showRiver = false;
  }

  // Fortune events auto-apply health
  if (event.type === 'fortune') {
    health = Math.min(health + 20, maxHealthForGame);
    eventAnswered = true;
  }

  renderEventScreen(event);
  renderStatusBar();
}

function handleEventChoice(displayIdx) {
  if (eventAnswered) return;
  var event = pendingEvents[currentEventIndex];
  if (!event || event.choices.length === 0) return;
  if (displayIdx < 0 || displayIdx >= shuffledIndices.length) return;
  if (eventHinted && dimmedChoice === displayIdx) return;

  var prof = PROFESSIONS[difficulty];
  var forgiving = prof && prof.forgiving;
  var origIdx = shuffledIndices[displayIdx];
  var choice = event.choices[origIdx];
  var isRiver = event.type === 'river';

  if (forgiving && !choice.correct) {
    // Ralph Wiggum mode: dim the wrong answer, let them try again
    var items = document.querySelectorAll('.choice-item');
    if (items[displayIdx]) {
      items[displayIdx].classList.add('choice-dimmed');
      items[displayIdx].style.pointerEvents = 'none';
    }
    // Move selection to next available choice
    for (var ni = 0; ni < shuffledIndices.length; ni++) {
      var nextIdx = (displayIdx + 1 + ni) % shuffledIndices.length;
      if (!(eventHinted && dimmedChoice === nextIdx) && !items[nextIdx].classList.contains('choice-dimmed')) {
        selectedEventChoice = nextIdx;
        updateChoiceHighlight();
        break;
      }
    }
    return;
  }

  eventAnswered = true;

  totalQuestions++;

  if (choice.correct) {
    var bonus = streak >= 3 ? 5 : 0;
    health = Math.min(health + 10 + bonus, maxHealthForGame);
    score++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
  } else {
    var dmg = isRiver ? 20 : 15;
    health -= dmg;
    streak = 0;
    // Damage related party member
    var concept = event.concept;
    var memberIdx = -1;
    for (var mi = 0; mi < TRAIL_DATA.partyMembers.length; mi++) {
      if (TRAIL_DATA.partyMembers[mi].name === concept) { memberIdx = mi; break; }
    }
    if (memberIdx >= 0 && partyHealth[memberIdx] > 0) {
      partyHealth[memberIdx]--;
    }
  }

  showEventResult(event, displayIdx);
  renderStatusBar();
}

function handleEventHint() {
  var prof = PROFESSIONS[difficulty];
  var hintFree = prof && prof.hintFree;
  if (eventAnswered || eventHinted) return;
  if (!hintFree && supplies <= 0) return;
  var event = pendingEvents[currentEventIndex];
  if (!event || event.choices.length === 0) return;

  if (!hintFree) supplies--;
  hintsUsed++;
  eventHinted = true;

  // Find a wrong answer in display order (dimmedChoice is a display index)
  var wrongDisplayIndices = [];
  for (var i = 0; i < shuffledIndices.length; i++) {
    if (!event.choices[shuffledIndices[i]].correct) wrongDisplayIndices.push(i);
  }
  dimmedChoice = wrongDisplayIndices[Math.floor(Math.random() * wrongDisplayIndices.length)];

  renderEventScreen(event);
  renderStatusBar();
}

function updateChoiceHighlight() {
  var items = document.querySelectorAll('.choice-item');
  for (var i = 0; i < items.length; i++) {
    items[i].classList.toggle('choice-selected', i === selectedEventChoice);
  }
}

function updateStopHighlight() {
  var items = document.querySelectorAll('.stop-opt');
  for (var i = 0; i < items.length; i++) {
    items[i].classList.toggle('choice-selected', i === selectedStopChoice);
  }
}

function checkDeath() {
  if (health <= 0) {
    enterDeath();
    return true;
  }
  var allDead = true;
  for (var i = 0; i < partyHealth.length; i++) {
    if (partyHealth[i] > 0) { allDead = false; break; }
  }
  if (allDead) {
    enterDeath();
    return true;
  }
  return false;
}

function advanceFromEvent() {
  currentEventIndex++;
  if (currentEventIndex < pendingEvents.length) {
    if (checkDeath()) return;
    showNextEvent();
  } else {
    if (checkDeath()) return;
    enterStop();
  }
}

function enterStop() {
  gameState = STATES.STOP;
  showRiver = false;
  selectedStopChoice = 0;

  var stop = TRAIL_DATA.stops[currentStop];
  if (stop && stop.landmarkType === 'river') {
    showRiver = true;
  }

  renderStopScreen();
  renderStatusBar();
}

function handleStopChoice(choice) {
  if (choice === 2) {
    var codeBox = textPanel.querySelector('.code-box');
    if (codeBox) {
      codeBox.style.maxHeight = '280px';
      codeBox.scrollIntoView({ behavior: 'smooth' });
    }
    return;
  }

  currentStop++;
  if (currentStop >= TRAIL_DATA.stops.length) {
    enterWin();
  } else {
    enterTravel();
  }
}

function enterDeath() {
  gameState = STATES.DEATH;
  showRiver = false;
  renderDeathScreen();
  renderStatusBar();
}

function enterWin() {
  gameState = STATES.WIN;
  showRiver = false;
  renderWinScreen();
  renderStatusBar();
}

// =====================================================================
// INPUT HANDLING
// =====================================================================
function ensureAudio() {
  if (!musicInitialized) {
    initAudio();
    startMusic();
  }
}

document.addEventListener('keydown', function(e) {
  var key = e.key;

  // Music toggle always works
  if (key === 'm' || key === 'M') {
    if (!musicInitialized) initAudio();
    toggleMusic();
    return;
  }

  // Start audio on first interaction
  if (!musicInitialized) ensureAudio();

  switch (gameState) {
    case STATES.TITLE:
      if (key === ' ' || key === 'Enter') {
        e.preventDefault();
        gameState = STATES.SETUP;
        renderSetupScreen();
        renderStatusBar();
      }
      break;

    case STATES.SETUP:
      if (key === 'ArrowDown' || key === 'ArrowRight') {
        e.preventDefault();
        selectDifficulty((selectedDifficulty + 1) % PROFESSIONS.length);
      } else if (key === 'ArrowUp' || key === 'ArrowLeft') {
        e.preventDefault();
        selectDifficulty((selectedDifficulty - 1 + PROFESSIONS.length) % PROFESSIONS.length);
      } else if (key === '1') selectDifficulty(0);
      else if (key === '2') selectDifficulty(1);
      else if (key === '3') selectDifficulty(2);
      else if (key === '4') selectDifficulty(3);
      else if (key === 'Enter' || key === ' ') {
        e.preventDefault();
        startGame();
      }
      break;

    case STATES.TRAVEL:
      if (key === ' ' || key === 'Enter') {
        e.preventDefault();
        advanceFromTravel();
      }
      break;

    case STATES.STOP:
      if (key === 'ArrowLeft' || key === 'ArrowRight') {
        e.preventDefault();
        selectedStopChoice = (key === 'ArrowLeft') ? 0 : 1;
        updateStopHighlight();
      } else if (key === 'ArrowUp' || key === 'ArrowDown') {
        e.preventDefault();
        selectedStopChoice = selectedStopChoice === 0 ? 1 : 0;
        updateStopHighlight();
      } else if (key === 'Enter' || key === ' ') {
        e.preventDefault();
        handleStopChoice(selectedStopChoice + 1);
      } else if (key === '1') {
        handleStopChoice(1);
      } else if (key === '2') {
        handleStopChoice(2);
      }
      break;

    case STATES.EVENT:
    case STATES.RIVER:
      if (!eventAnswered) {
        var ev = pendingEvents[currentEventIndex];
        if (ev && ev.choices.length > 0) {
          var numChoices = ev.choices.length;
          if (key === 'ArrowDown' || key === 'ArrowRight') {
            e.preventDefault();
            selectedEventChoice = (selectedEventChoice + 1) % numChoices;
            // Skip dimmed choice
            if (eventHinted && dimmedChoice === selectedEventChoice) selectedEventChoice = (selectedEventChoice + 1) % numChoices;
            updateChoiceHighlight();
          } else if (key === 'ArrowUp' || key === 'ArrowLeft') {
            e.preventDefault();
            selectedEventChoice = (selectedEventChoice - 1 + numChoices) % numChoices;
            if (eventHinted && dimmedChoice === selectedEventChoice) selectedEventChoice = (selectedEventChoice - 1 + numChoices) % numChoices;
            updateChoiceHighlight();
          } else if (key === 'Enter' || key === ' ') {
            e.preventDefault();
            if (!(eventHinted && dimmedChoice === selectedEventChoice)) {
              handleEventChoice(selectedEventChoice);
            }
          } else if (key === '1' || key === 'a' || key === 'A') handleEventChoice(0);
          else if (key === '2' || key === 'b' || key === 'B') handleEventChoice(1);
          else if (key === '3' || key === 'c' || key === 'C') handleEventChoice(2);
          else if (key === 'h' || key === 'H') handleEventHint();
        }
        // Fortune: space/enter to continue
        if (ev && ev.type === 'fortune' && (key === ' ' || key === 'Enter')) {
          e.preventDefault();
          advanceFromEvent();
        }
      } else {
        if (key === ' ' || key === 'Enter') {
          e.preventDefault();
          if (checkDeath()) return;
          advanceFromEvent();
        }
      }
      break;

    case STATES.DEATH:
      if (key === ' ' || key === 'Enter') {
        e.preventDefault();
        resetGame();
        renderTitleScreen();
        renderStatusBar();
      }
      break;

    case STATES.WIN:
      if (key === ' ' || key === 'Enter') {
        e.preventDefault();
        resetGame();
        renderTitleScreen();
        renderStatusBar();
      }
      break;
  }
});

// =====================================================================
// ANIMATION LOOP + TECH DEBT DRAIN
// =====================================================================
var lastTime = 0;
var drainAccumulator = 0;
var DRAIN_INTERVAL = 3000; // drain 1 HP every 3 seconds
var techDebtDeath = false;

function gameLoop(timestamp) {
  var dt = timestamp - lastTime;
  lastTime = timestamp;

  // Clamp dt to avoid huge jumps
  if (dt > 100) dt = 16;

  if (gameState === STATES.TRAVEL) {
    scrollX += dt * 0.03;
    wagonWheelAngle += dt * 0.004;
  } else if (gameState === STATES.TITLE) {
    scrollX += dt * 0.01;
  } else {
    // Gentle idle scroll
    scrollX += dt * 0.002;
  }

  // Tech debt drain: HP ticks down during active gameplay (disabled for Ralph Wiggum)
  var isForgiving = PROFESSIONS[difficulty] && PROFESSIONS[difficulty].forgiving;
  var isActive = gameState === STATES.STOP || gameState === STATES.EVENT || gameState === STATES.RIVER;
  if (isActive && !deathPending && !isForgiving) {
    drainAccumulator += dt;
    while (drainAccumulator >= DRAIN_INTERVAL) {
      drainAccumulator -= DRAIN_INTERVAL;
      health--;
      renderStatusBar();
      if (health <= 0) {
        techDebtDeath = true;
        enterDeath();
        break;
      }
    }
  }

  renderCanvas(timestamp);
  animFrame = requestAnimationFrame(gameLoop);
}

// =====================================================================
// INITIALIZATION
// =====================================================================
resetGame();
renderTitleScreen();
renderStatusBar();
updateMusicIndicator();
animFrame = requestAnimationFrame(gameLoop);
</script>
</body>
