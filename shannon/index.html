<script>
window.TRAIL_DATA = {"framework":"shannon","trailName":"The Exploit Trail",
  "repoUrl": "https://github.com/KeygraphHQ/shannon","sourceInfo":{"repo":"KeygraphHQ/shannon","commit":"bc8fd20","tag":"v1.0.0","snapshotDate":"2026-03-28"},"stops":[{"name":"Independence, MO","subtitle":"Target Acquisition","concept":"Reconnaissance","landmarkType":"town","code":{"file":"apps/cli/src/index.ts","content":"// apps/cli/src/index.ts\n// Shannon CLI \u2014 AI Penetration Testing Framework\n//\n// Unified CLI supporting two modes:\n//   Local mode: Run from cloned repo \u2014 builds locally\n//   NPX mode:   Run via npx \u2014 pulls from Docker Hub\n\nimport { start } from './commands/start.js';\nimport { stop } from './commands/stop.js';\nimport { logs } from './commands/logs.js';\nimport { getMode } from './mode.js';\nimport { displaySplash } from './splash.js';\n\ninterface ParsedStartArgs {\n  url: string;\n  repo: string;\n  config?: string;\n  workspace?: string;\n  output?: string;\n  pipelineTesting: boolean;\n  router: boolean;\n}\n\n// Main Dispatch\nconst args = process.argv.slice(2);\nconst command = args[0];\nswitch (command) {\n  case 'start': {\n    const parsed = parseStartArgs(args.slice(1));\n    await start({ ...parsed, version: getVersion() });\n    break;\n  }\n  case 'stop':\n    stop(args.includes('--clean'));\n    break;\n  // ...logs, workspaces, status, build, etc.\n}","language":"typescript"},"narration":"Every pentest journey starts at Independence. The Shannon CLI accepts a target URL and a source code repo path. White-box testing means you can see the code \u2014 no guessing what the backend does. The CLI launches Docker infrastructure and a Temporal worker to orchestrate the entire pipeline."},{"name":"Chimney Rock","subtitle":"Reconnaissance","concept":"Reconnaissance","landmarkType":"mountain","code":{"file":"apps/worker/prompts/recon.txt","content":"# apps/worker/prompts/recon.txt (excerpt)\n\n<role>\nYou are a world-class Reconnaissance Analyst and\nAttack Surface Mapper. Your mission is to conduct a\nthorough white-box analysis of the target application\nby correlating external scan data, live application\nbehavior, and the full source code.\n</role>\n\n<objective>\nYour goal is to create a comprehensive, structured\nmap of the application's attack surface. You are NOT\nlooking for vulnerabilities yet. You are building the\nfoundational intelligence that all other specialists\nwill rely on.\n</objective>\n\n<cli_tools>\n- Browser Automation (playwright-cli skill): For all\n  browser interactions, invoke the playwright-cli\n  skill. Always pass -s={{PLAYWRIGHT_SESSION}} to\n  every command for session isolation.\n- Task tool: MANDATORY for ALL source code analysis.\n  Delegate all code reading to Task agents.\n- save-deliverable: Saves deliverable files with\n  automatic validation.\n</cli_tools>","language":"text"},"narration":"At Chimney Rock, Shannon scans the horizon. The recon agent is a prompt file \u2014 a detailed instruction set for Claude. It reads the pre-recon scan data, maps the architecture using Task agents for code analysis, and explores the live app with Playwright browser automation. The result is a comprehensive attack surface map."},{"name":"Fort Laramie","subtitle":"Exploration Mapping","concept":"Browser Automation","landmarkType":"camp","code":{"file":"apps/worker/prompts/recon.txt","content":"# apps/worker/prompts/recon.txt \u2014 Exploration Section\n\n<systematic_approach>\n1. Synthesize Initial Data:\n   - Read deliverables/pre_recon_deliverable.md\n   - Create preliminary list of technologies,\n     subdomains, open ports, and key modules\n\n2. Interactive Application Exploration:\n   - Use playwright-cli with -s={{PLAYWRIGHT_SESSION}}\n   - Navigate to target, map user-facing functionality\n   - Document login forms, registration, password reset\n   - Observe network requests for API calls\n\n3. Correlate with Source Code (Parallel Task Agents):\n   - Route Mapper Agent: Find all backend routes\n   - Authorization Checker Agent: Map auth middleware\n   - Input Validator Agent: Analyze input validation\n   - Session Handler Agent: Trace session handling\n\n4. Enumerate and Document:\n   - Synthesize findings from all parallel Task agents\n   - Cross-reference browser + source code findings\n</systematic_approach>","language":"text"},"narration":"Fort Laramie is where Shannon gets hands-on. The recon prompt instructs Claude to use Playwright for real browser automation \u2014 navigating pages, filling forms, testing login flows. Parallel Task agents then correlate browser observations with source code. Every form, every auth flow gets mapped as potential attack surface."},{"name":"Independence Rock","subtitle":"Parallel Vuln Analysis","concept":"Exploitation","landmarkType":"mountain","code":{"file":"apps/worker/src/temporal/workflows.ts","content":"// apps/worker/src/temporal/workflows.ts (excerpt)\n\n// Phases 3-4: Vulnerability + Exploitation\n// 5 pipelined pairs in parallel:\n// Each pair: vuln agent -> queue check -> exploit\n\nconst pipelineConfigs = buildPipelineConfigs();\n// Returns configs for: injection, xss, auth, ssrf, authz\n\nasync function runVulnExploitPipeline(\n  vulnType: VulnType,\n  runVulnAgent: () => Promise<AgentMetrics>,\n  runExploitAgent: () => Promise<AgentMetrics>,\n): Promise<VulnExploitPipelineResult> {\n  // 1. Run vulnerability analysis (or skip if resumed)\n  let vulnMetrics: AgentMetrics | null = null;\n  if (!shouldSkip(vulnAgentName)) {\n    vulnMetrics = await runVulnAgent();\n  }\n  // 2. Check exploitation queue for actionable findings\n  const decision = await a.checkExploitationQueue(\n    activityInput, vulnType\n  );\n  // 3. Conditionally run exploitation agent\n  if (decision.shouldExploit && !shouldSkip(exploitAgentName)) {\n    exploitMetrics = await runExploitAgent();\n  }\n  return { vulnType, vulnMetrics, exploitMetrics };\n}","language":"typescript"},"narration":"Independence Rock is where insights converge. The Temporal workflow runs five vulnerability-exploitation pipelines in parallel \u2014 injection, XSS, auth, SSRF, and authorization. Each pipeline is independent: vuln analysis runs, then a queue check decides whether to launch exploitation. No synchronization barrier between pipelines."},{"name":"South Pass","subtitle":"Injection Testing","concept":"Exploitation","landmarkType":"river","code":{"file":"apps/worker/prompts/exploit-injection.txt","content":"# apps/worker/prompts/exploit-injection.txt (excerpt)\n\n<role>\nYou are a world-class Injection Exploitation\nSpecialist. Your expertise covers SQL Injection and\nOS Command Injection. You are an active penetration\ntester \u2014 not an analyst.\n</role>\n\n<objective>\nSystematically weaponize every potential SQL Injection\nand Command Injection vulnerability in your queue.\nFor each: either confirm exploitability with data\nexfiltration or RCE, or prove it is not exploitable.\n</objective>\n\n<methodology>\nOWASP Exploitation Workflow:\n  Stage 1: Confirmation & Probing\n    Inject error-inducing chars, boolean conditions,\n    time delays to confirm a live vulnerability.\n  Stage 2: Fingerprinting & Enumeration\n    Extract DB version, current user, table names.\n    Identify most sensitive table and its columns.\n  Stage 3: Targeted Exfiltration\n    Craft final payload to extract first 5 rows of\n    high-impact data.\n\nProof Levels:\n  Level 1: Injection point confirmed (error/timing)\n  Level 2: Query structure manipulated (UNION/blind)\n  Level 3: Data extraction proven (EXPLOITED)\n  Level 4: Critical impact demonstrated (CRITICAL)\n</methodology>","language":"text"},"narration":"South Pass \u2014 the narrow gap where payloads squeeze through. The injection exploit prompt instructs Claude to follow OWASP methodology: confirm the vulnerability, fingerprint the database, then extract real data. Four proof levels ensure rigor \u2014 you must reach Level 3 with actual extracted data to mark a finding as exploited."},{"name":"Fort Bridger","subtitle":"Auth Bypass","concept":"Proof-by-Exploit","landmarkType":"forest","code":{"file":"apps/worker/prompts/exploit-auth.txt","content":"# apps/worker/prompts/exploit-auth.txt (excerpt)\n\n<role>\nYou are a world-class Authentication Exploitation\nSpecialist. You take theoretical flaws in identity\nand session management and turn them into undeniable\nproof of impersonation and account takeover.\n</role>\n\n<attack_patterns>\n1. Session Hijacking\n   - Inject stolen cookie via Playwright\n   - Use stolen cookie with cURL\n\n2. Credential-Based Attacks\n   - Credential stuffing with cURL\n   - Brute force via Task Agent scripting\n\n3. Logic Flaws\n   - Password Reset Manipulation\n   - JWT Token Attacks (alg:none):\n     1. Capture a JWT\n     2. Decode header and payload\n     3. Change header alg to \"none\"\n     4. Change payload data (e.g. sub to admin)\n     5. Re-encode without signature and send\n</attack_patterns>\n\nProof of Exploitation Levels:\n  Level 3: Authentication bypass confirmed\n  Level 4: Account takeover demonstrated (CRITICAL)","language":"text"},"narration":"Fort Bridger guards the authentication frontier. The auth exploit prompt covers session hijacking, credential attacks, and JWT manipulation. The alg:none attack sets the algorithm to nothing, bypassing signature checks on misconfigured servers. Claude must reach Level 3 \u2014 actual authentication bypass \u2014 to mark a finding as exploited."},{"name":"The Dalles","subtitle":"Exploit Queue Validation","concept":"Proof-by-Exploit","landmarkType":"river","code":{"file":"apps/worker/src/services/exploitation-checker.ts","content":"// apps/worker/src/services/exploitation-checker.ts\n\n// Pure domain logic for determining whether\n// exploitation should run. Reads queue file,\n// parses JSON, returns decision.\n\nimport { validateQueueSafe } from './queue-validation.js';\nimport { isOk } from '../types/result.js';\n\nexport class ExploitationCheckerService {\n  async checkQueue(\n    vulnType: VulnType,\n    repoPath: string,\n    logger: ActivityLogger,\n  ): Promise<ExploitationDecision> {\n    const result = await validateQueueSafe(\n      vulnType, repoPath\n    );\n    if (isOk(result)) {\n      const decision = result.value;\n      logger.info(\n        `${vulnType}: ${decision.shouldExploit\n          ? `${decision.vulnerabilityCount} vulnerabilities`\n          : 'no vulnerabilities, skipping'}`\n      );\n      return decision;\n    }\n    // Non-retryable error \u2014 skip gracefully\n    return { shouldExploit: false, vulnerabilityCount: 0 };\n  }\n}","language":"typescript"},"narration":"The Dalles is the gateway between analysis and exploitation. The ExploitationCheckerService reads the queue file that each vuln agent produces, validates its JSON structure, and decides whether exploitation should run. If the queue has zero vulnerabilities, exploitation is skipped. This single-pass validation prevents wasted agent runs."},{"name":"Oregon City","subtitle":"Report Assembly","concept":"Browser Automation","landmarkType":"town","code":{"file":"apps/worker/src/services/reporting.ts","content":"// apps/worker/src/services/reporting.ts\n\nimport { fs, path } from 'zx';\n\n// Assemble final report from specialist deliverables\nexport async function assembleFinalReport(\n  sourceDir: string,\n  logger: ActivityLogger,\n): Promise<string> {\n  const deliverableFiles = [\n    { name: 'Injection', path: 'injection_exploitation_evidence.md' },\n    { name: 'XSS', path: 'xss_exploitation_evidence.md' },\n    { name: 'Authentication', path: 'auth_exploitation_evidence.md' },\n    { name: 'SSRF', path: 'ssrf_exploitation_evidence.md' },\n    { name: 'Authorization', path: 'authz_exploitation_evidence.md' },\n  ];\n\n  const sections: string[] = [];\n  for (const file of deliverableFiles) {\n    const filePath = path.join(\n      sourceDir, 'deliverables', file.path\n    );\n    if (await fs.pathExists(filePath)) {\n      sections.push(await fs.readFile(filePath, 'utf8'));\n      logger.info(`Added ${file.name} findings`);\n    }\n  }\n\n  const finalReportPath = path.join(sourceDir,\n    'deliverables',\n    'comprehensive_security_assessment_report.md'\n  );\n  await fs.writeFile(finalReportPath, sections.join('\\n\\n'));\n  return sections.join('\\n\\n');\n}","language":"typescript"},"narration":"You made it to Oregon City! The reporting service concatenates evidence from all five exploitation specialists into one comprehensive report. Then a report agent adds an executive summary and cleans up the output. Every finding has reproducible exploit commands, evidence of impact, and specific remediation steps."}],"events":[{"type":"weather","trigger":"after_stop","triggerStop":1,"title":"Scope Storm!","text":"A storm of targets hits your terminal \u2014 production servers, staging environments, third-party APIs, internal tools. Your scope definition is being tested. Why does Shannon require source code access for white-box testing?","choices":[{"text":"Code analysis guides attack strategy and reveals vulnerabilities invisible to blind testing","correct":true,"explanation":"White-box testing means Shannon reads the source code to find where raw SQL meets user input, where auth is misconfigured, where secrets are hardcoded. Black-box testing can only guess."},{"text":"Shannon can't use a browser without source code","correct":false,"explanation":"Shannon uses Playwright for browser automation regardless of code access. Source code enables targeted testing, not browser control."},{"text":"Source code is easier to read than HTTP responses","correct":false,"explanation":"It's not about ease of reading \u2014 it's about finding vulnerabilities that are invisible from the outside, like unsafe ORM usage or hardcoded secrets."}],"concept":"Reconnaissance","difficulty":"easy"},{"type":"encounter","trigger":"after_stop","triggerStop":2,"title":"A Security Scout Appears!","text":"A grizzled security researcher approaches your camp. 'I see the recon prompt instructs Claude to use Nmap, WhatWeb, and Playwright against the target.' What does the reconnaissance phase discover?","choices":[{"text":"Open ports, services, technology stack, and a comprehensive attack surface map","correct":true,"explanation":"Pre-recon runs Nmap and WhatWeb for port and tech fingerprinting. The recon agent then correlates external scans with source code analysis and live browser exploration to build a complete attack surface map."},{"text":"Passwords stored in the application database","correct":false,"explanation":"Reconnaissance maps the attack surface \u2014 it discovers services, technologies, and entry points. Credential extraction is an exploitation phase activity."},{"text":"Source code vulnerabilities like SQL injection","correct":false,"explanation":"Recon maps the attack surface and entry points. Vulnerability analysis is a separate phase with dedicated specialist agents for each vuln type."}],"concept":"Browser Automation","difficulty":"easy"},{"type":"river","trigger":"after_stop","triggerStop":4,"title":"The Vulnerability River Crossing!","text":"You've reached the widest river on the trail \u2014 the gap between hypothesis and proof. Your analysis agents have generated dozens of potential vulnerabilities. Why does Shannon run vuln-exploit pipelines in parallel?","choices":[{"text":"Each vulnerability type can be analyzed independently, reducing total wall-clock time","correct":true,"explanation":"Injection analysis doesn't depend on XSS analysis. Auth testing doesn't need SSRF results. The Temporal workflow runs all five pipelines concurrently with configurable concurrency limits."},{"text":"One agent isn't smart enough to find all vulnerability types","correct":false,"explanation":"It's about efficiency, not intelligence. A single agent could analyze all types sequentially \u2014 parallelism is an optimization, not a capability requirement."},{"text":"Parallel execution is always faster than sequential","correct":false,"explanation":"Parallel is only faster when tasks are independent. If one analysis depended on another's output, you'd need sequential execution. Shannon's architecture ensures independence between the five vuln types."}],"concept":"Exploitation","difficulty":"medium"},{"type":"weather","trigger":"after_stop","triggerStop":5,"title":"Injection Storm!","text":"Payloads are flying everywhere \u2014 SQL fragments, XSS vectors, template injections. The storm tests your understanding. How does Shannon's OWASP exploitation methodology improve on blind fuzzing?","choices":[{"text":"It follows a structured workflow: confirm the injection, fingerprint the database, then extract real data as proof","correct":true,"explanation":"Shannon's prompts mandate a four-level proof framework. You must progress from confirmation through fingerprinting to actual data extraction. Level 3 requires concrete evidence \u2014 real database rows \u2014 not just error messages."},{"text":"It makes the payloads longer and more complex","correct":false,"explanation":"The methodology makes testing more structured, not payloads more complex. The OWASP workflow ensures each step builds on confirmed results rather than spraying random inputs."},{"text":"It bypasses Web Application Firewalls automatically","correct":false,"explanation":"WAF bypass is a separate technique that Shannon's prompts address. The OWASP methodology is about structured proof-of-exploitation, not evading security controls."}],"concept":"Exploitation","difficulty":"medium"},{"type":"misfortune","trigger":"after_stop","triggerStop":6,"title":"Auth Bypass Gone Wrong!","text":"Your JWT manipulation backfired \u2014 the server returned a cryptic error and locked your test account. Before trying again, you need to understand the attack. What is the JWT alg:none attack?","choices":[{"text":"Setting the JWT algorithm to \"none\" to bypass signature verification on misconfigured servers","correct":true,"explanation":"The JWT spec technically allows algorithm \"none\" for trusted contexts. Misconfigured servers that don't validate the algorithm field will accept unsigned tokens, letting attackers forge any claims like role:admin."},{"text":"Using no JWT at all and accessing endpoints directly","correct":false,"explanation":"The alg:none attack still sends a JWT \u2014 it just sets the algorithm header to \"none\" so the signature is empty. The token structure is preserved."},{"text":"Encrypting the JWT with a null cipher so nobody can read it","correct":false,"explanation":"JWTs are signed, not encrypted (unless using JWE). The alg:none attack removes the signature, it doesn't add encryption."}],"concept":"Proof-by-Exploit","difficulty":"hard"},{"type":"encounter","trigger":"after_stop","triggerStop":7,"title":"Proof-by-Exploitation Pioneer!","text":"A veteran pentester at The Dalles checkpoint asks: 'Why does Shannon validate the exploitation queue before launching exploit agents?'","choices":[{"text":"It prevents wasted agent runs \u2014 if vuln analysis found nothing exploitable, exploitation is skipped","correct":true,"explanation":"The ExploitationCheckerService reads the queue JSON file, validates its structure, and checks the vulnerability count. Zero vulnerabilities means the exploit agent never launches, saving time and compute."},{"text":"Queue validation makes the exploit payloads more accurate","correct":false,"explanation":"Queue validation is a gate, not a tuner. It decides whether exploitation runs at all \u2014 it doesn't modify how exploits are crafted. The exploit prompts handle payload accuracy."},{"text":"Without validation, the exploit agents would attack random endpoints","correct":false,"explanation":"Exploit agents always read their queue file for targets. The checker service is an efficiency optimization \u2014 it prevents launching an agent that would immediately find an empty queue and exit."}],"concept":"Proof-by-Exploit","difficulty":"medium"}],"partyMembers":[{"name":"Reconnaissance","icon":"server","maxHealth":3},{"name":"Exploitation","icon":"router","maxHealth":3},{"name":"Browser Automation","icon":"data","maxHealth":3},{"name":"Proof-by-Exploit","icon":"layout","maxHealth":3}],"deathMessages":["Died of false positives. Your report was 500 pages of noise.","Lost in the authentication maze \u2014 2FA was too strong.","Drowned in rate limiting. The WAF blocked all your payloads.","Killed by your own SQL injection. The database dropped itself.","Your Playwright session crashed. The browser ate all the RAM.","Starved waiting for Temporal workflow to resume. Durable execution wasn't so durable.","Died of scope creep. You started pentesting the wrong application.","Buried under a mountain of unexploitable CVEs."]};

window.drawCustomEventOverlay = function(time) {
  if (!currentEventType && !currentEventTitle) return;

  var t = (time || 0) * 0.001; // seconds

  // --- SCOPE STORM: dark sky, lightning, rain ---
  if (currentEventTitle.indexOf('Scope Storm') !== -1) {
    // Darken sky
    ctx.fillStyle = 'rgba(0,0,50,0.45)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning flash (periodic)
    var flashPhase = Math.sin(t * 1.7) + Math.sin(t * 3.1);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, 0, W, H);
      // Lightning bolt
      ctx.strokeStyle = '#FFFF55';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 80 + Math.sin(t * 2.3) * 60;
      ctx.moveTo(lx, 10);
      ctx.lineTo(lx - 5, 35);
      ctx.lineTo(lx + 8, 35);
      ctx.lineTo(lx - 3, 65);
      ctx.lineTo(lx + 10, 65);
      ctx.lineTo(lx + 2, 95);
      ctx.stroke();
    }
    // Rain
    ctx.strokeStyle = '#5555FF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 40; i++) {
      var rx = (i * 8.3 + t * 80) % W;
      var ry = (i * 13.7 + t * 120) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 1), Math.floor(ry + 5));
      ctx.stroke();
    }
    return;
  }

  // --- SECURITY SCOUT: person standing by campfire ---
  if (currentEventTitle.indexOf('Security Scout') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8); // torso
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3); // head
    ctx.fillRect(px - 1, py - 4, 2, 5); // left leg
    ctx.fillRect(px + 3, py - 4, 2, 5); // right leg
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Campfire
    var fx = 212, fy = 148;
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(fx - 3, fy, 2, 3);
    ctx.fillRect(fx + 3, fy, 2, 3);
    ctx.fillStyle = '#FF5555';
    var flicker = Math.sin(t * 8) * 2;
    ctx.fillRect(fx - 1, fy - 3 + Math.floor(flicker * 0.3), 4, 3);
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(fx, fy - 5 + Math.floor(flicker * 0.5), 2, 2);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(fx - 1, fy - 2, 4, 2);
    // Firelight glow (subtle)
    ctx.fillStyle = 'rgba(255,170,0,0.08)';
    ctx.beginPath();
    ctx.arc(fx + 1, fy - 2, 15, 0, Math.PI * 2);
    ctx.fill();
    return;
  }

  // --- VULNERABILITY RIVER: rough rapids with white water ---
  if (currentEventTitle.indexOf('Vulnerability River') !== -1) {
    // Extra turbulence on the river
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 20; i++) {
      var sx = (i * 17 + t * 40) % W;
      var sy = 157 + Math.sin((i * 3 + t * 5)) * 3;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 4, 2);
    }
    // Floating logs / debris
    ctx.fillStyle = '#AA5500';
    for (var i = 0; i < 3; i++) {
      var logX = (i * 110 + t * 25) % W;
      var logY = 159 + Math.sin(t * 2 + i) * 2;
      ctx.fillRect(Math.floor(logX), Math.floor(logY), 8, 2);
    }
    return;
  }

  // --- INJECTION STORM: dark sky, red-tinged rain of payloads ---
  if (currentEventTitle.indexOf('Injection Storm') !== -1) {
    // Darken sky with red tint
    ctx.fillStyle = 'rgba(50,0,0,0.35)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning flash (periodic)
    var flashPhase = Math.sin(t * 2.1) + Math.sin(t * 2.7);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,100,100,0.3)';
      ctx.fillRect(0, 0, W, H);
      ctx.strokeStyle = '#FF5555';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 120 + Math.sin(t * 1.8) * 80;
      ctx.moveTo(lx, 10);
      ctx.lineTo(lx - 8, 40);
      ctx.lineTo(lx + 5, 40);
      ctx.lineTo(lx - 2, 70);
      ctx.stroke();
    }
    // Red-tinted rain (payloads)
    ctx.strokeStyle = '#FF5555';
    ctx.lineWidth = 1;
    for (var i = 0; i < 35; i++) {
      var rx = (i * 9.1 + t * 70) % W;
      var ry = (i * 12.3 + t * 100) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 1), Math.floor(ry + 4));
      ctx.stroke();
    }
    return;
  }

  // --- AUTH BYPASS GONE WRONG: red sky, smoke, warning ---
  if (currentEventTitle.indexOf('Auth Bypass Gone Wrong') !== -1) {
    // Red danger tint
    ctx.fillStyle = 'rgba(170,0,0,0.25)';
    ctx.fillRect(0, 0, W, H);
    // Smoke particles rising
    ctx.fillStyle = '#555555';
    for (var i = 0; i < 15; i++) {
      var sx = 140 + Math.sin(i * 2.7 + t) * 30;
      var sy = 130 - ((t * 20 + i * 15) % 90);
      var size = 2 + (i % 3);
      ctx.globalAlpha = 0.3 + Math.sin(t + i) * 0.15;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), size, size);
    }
    ctx.globalAlpha = 1.0;
    // Fire at base
    ctx.fillStyle = '#FF5555';
    for (var i = 0; i < 8; i++) {
      var fx = 130 + i * 5;
      var fh = 4 + Math.sin(t * 6 + i * 1.5) * 3;
      ctx.fillRect(fx, Math.floor(140 - fh), 3, Math.floor(fh));
    }
    ctx.fillStyle = '#FFFF55';
    for (var i = 0; i < 5; i++) {
      var fx = 135 + i * 6;
      var fh = 2 + Math.sin(t * 8 + i * 2) * 2;
      ctx.fillRect(fx, Math.floor(139 - fh), 2, Math.floor(fh));
    }
    // Pulsing red border
    var pulse = (Math.sin(t * 4) + 1) * 0.15;
    ctx.strokeStyle = 'rgba(255,0,0,' + pulse.toFixed(2) + ')';
    ctx.lineWidth = 3;
    ctx.strokeRect(1, 1, W - 2, H - 2);
    ctx.lineWidth = 1;
    return;
  }

  // --- PROOF-BY-EXPLOITATION PIONEER: person at checkpoint ---
  if (currentEventTitle.indexOf('Proof-by-Exploitation') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3);
    ctx.fillRect(px - 1, py - 4, 2, 5);
    ctx.fillRect(px + 3, py - 4, 2, 5);
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Terminal/laptop nearby
    ctx.fillStyle = '#333333';
    ctx.fillRect(px + 10, py - 8, 10, 7);
    ctx.fillStyle = '#55FF55';
    ctx.fillRect(px + 11, py - 7, 8, 5);
    // Blinking cursor on screen
    if (Math.sin(t * 4) > 0) {
      ctx.fillStyle = '#55FF55';
      ctx.fillRect(px + 13, py - 5, 2, 1);
    }
    return;
  }
};
</script>
