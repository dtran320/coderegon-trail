<script>
window.TRAIL_DATA = {"framework":"shannon","trailName":"The Exploit Trail","sourceInfo":{"repo":"KeygraphHQ/shannon","commit":"bc8fd20","tag":"v1.0.0","snapshotDate":"2026-03-28"},"stops":[{"name":"Independence, MO","subtitle":"Target Acquisition","concept":"Reconnaissance","landmarkType":"town","code":{"file":"apps/cli/src/index.ts","content":"// apps/cli/src/index.ts\n// Shannon CLI \u2014 AI Penetration Testing Framework\n//\n// Unified CLI supporting two modes:\n//   Local mode: Run from cloned repo \u2014 builds locally\n//   NPX mode:   Run via npx \u2014 pulls from Docker Hub\n\nimport { start } from './commands/start.js';\nimport { stop } from './commands/stop.js';\nimport { logs } from './commands/logs.js';\nimport { getMode } from './mode.js';\nimport { displaySplash } from './splash.js';\n\ninterface ParsedStartArgs {\n  url: string;\n  repo: string;\n  config?: string;\n  workspace?: string;\n  output?: string;\n  pipelineTesting: boolean;\n  router: boolean;\n}\n\n// Main Dispatch\nconst args = process.argv.slice(2);\nconst command = args[0];\nswitch (command) {\n  case 'start': {\n    const parsed = parseStartArgs(args.slice(1));\n    await start({ ...parsed, version: getVersion() });\n    break;\n  }\n  case 'stop':\n    stop(args.includes('--clean'));\n    break;\n  // ...logs, workspaces, status, build, etc.\n}","language":"typescript"},"narration":"Every pentest journey starts at Independence. The Shannon CLI accepts a target URL and a source code repo path. White-box testing means you can see the code \u2014 no guessing what the backend does. The CLI launches Docker infrastructure and a Temporal worker to orchestrate the entire pipeline."},{"name":"Chimney Rock","subtitle":"Reconnaissance","concept":"Reconnaissance","landmarkType":"mountain","code":{"file":"apps/worker/prompts/recon.txt","content":"# apps/worker/prompts/recon.txt (excerpt)\n\n<role>\nYou are a world-class Reconnaissance Analyst and\nAttack Surface Mapper. Your mission is to conduct a\nthorough white-box analysis of the target application\nby correlating external scan data, live application\nbehavior, and the full source code.\n</role>\n\n<objective>\nYour goal is to create a comprehensive, structured\nmap of the application's attack surface. You are NOT\nlooking for vulnerabilities yet. You are building the\nfoundational intelligence that all other specialists\nwill rely on.\n</objective>\n\n<cli_tools>\n- Browser Automation (playwright-cli skill): For all\n  browser interactions, invoke the playwright-cli\n  skill. Always pass -s={{PLAYWRIGHT_SESSION}} to\n  every command for session isolation.\n- Task tool: MANDATORY for ALL source code analysis.\n  Delegate all code reading to Task agents.\n- save-deliverable: Saves deliverable files with\n  automatic validation.\n</cli_tools>","language":"text"},"narration":"At Chimney Rock, Shannon scans the horizon. The recon agent is a prompt file \u2014 a detailed instruction set for Claude. It reads the pre-recon scan data, maps the architecture using Task agents for code analysis, and explores the live app with Playwright browser automation. The result is a comprehensive attack surface map."},{"name":"Fort Laramie","subtitle":"Exploration Mapping","concept":"Browser Automation","landmarkType":"camp","code":{"file":"apps/worker/prompts/recon.txt","content":"# apps/worker/prompts/recon.txt \u2014 Exploration Section\n\n<systematic_approach>\n1. Synthesize Initial Data:\n   - Read deliverables/pre_recon_deliverable.md\n   - Create preliminary list of technologies,\n     subdomains, open ports, and key modules\n\n2. Interactive Application Exploration:\n   - Use playwright-cli with -s={{PLAYWRIGHT_SESSION}}\n   - Navigate to target, map user-facing functionality\n   - Document login forms, registration, password reset\n   - Observe network requests for API calls\n\n3. Correlate with Source Code (Parallel Task Agents):\n   - Route Mapper Agent: Find all backend routes\n   - Authorization Checker Agent: Map auth middleware\n   - Input Validator Agent: Analyze input validation\n   - Session Handler Agent: Trace session handling\n\n4. Enumerate and Document:\n   - Synthesize findings from all parallel Task agents\n   - Cross-reference browser + source code findings\n</systematic_approach>","language":"text"},"narration":"Fort Laramie is where Shannon gets hands-on. The recon prompt instructs Claude to use Playwright for real browser automation \u2014 navigating pages, filling forms, testing login flows. Parallel Task agents then correlate browser observations with source code. Every form, every auth flow gets mapped as potential attack surface."},{"name":"Independence Rock","subtitle":"Parallel Vuln Analysis","concept":"Exploitation","landmarkType":"mountain","code":{"file":"apps/worker/src/temporal/workflows.ts","content":"// apps/worker/src/temporal/workflows.ts (excerpt)\n\n// Phases 3-4: Vulnerability + Exploitation\n// 5 pipelined pairs in parallel:\n// Each pair: vuln agent -> queue check -> exploit\n\nconst pipelineConfigs = buildPipelineConfigs();\n// Returns configs for: injection, xss, auth, ssrf, authz\n\nasync function runVulnExploitPipeline(\n  vulnType: VulnType,\n  runVulnAgent: () => Promise<AgentMetrics>,\n  runExploitAgent: () => Promise<AgentMetrics>,\n): Promise<VulnExploitPipelineResult> {\n  // 1. Run vulnerability analysis (or skip if resumed)\n  let vulnMetrics: AgentMetrics | null = null;\n  if (!shouldSkip(vulnAgentName)) {\n    vulnMetrics = await runVulnAgent();\n  }\n  // 2. Check exploitation queue for actionable findings\n  const decision = await a.checkExploitationQueue(\n    activityInput, vulnType\n  );\n  // 3. Conditionally run exploitation agent\n  if (decision.shouldExploit && !shouldSkip(exploitAgentName)) {\n    exploitMetrics = await runExploitAgent();\n  }\n  return { vulnType, vulnMetrics, exploitMetrics };

window.TRAIL_FLAVORS = [

window.drawCustomEventOverlay = function(time) {
  if (!currentEventType && !currentEventTitle) return;

  var t = (time || 0) * 0.001; // seconds

  // --- SCOPE STORM: dark sky, lightning, rain ---
  if (currentEventTitle.indexOf('Scope Storm') !== -1) {
    // Darken sky
    ctx.fillStyle = 'rgba(0,0,50,0.45)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning flash (periodic)
    var flashPhase = Math.sin(t * 1.7) + Math.sin(t * 3.1);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, 0, W, H);
      // Lightning bolt
      ctx.strokeStyle = '#FFFF55';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 80 + Math.sin(t * 2.3) * 60;
      ctx.moveTo(lx, 10);
      ctx.lineTo(lx - 5, 35);
      ctx.lineTo(lx + 8, 35);
      ctx.lineTo(lx - 3, 65);
      ctx.lineTo(lx + 10, 65);
      ctx.lineTo(lx + 2, 95);
      ctx.stroke();
    }
    // Rain
    ctx.strokeStyle = '#5555FF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 40; i++) {
      var rx = (i * 8.3 + t * 80) % W;
      var ry = (i * 13.7 + t * 120) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 1), Math.floor(ry + 5));
      ctx.stroke();
    }
    return;
  }

  // --- SECURITY SCOUT: person standing by campfire ---
  if (currentEventTitle.indexOf('Security Scout') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8); // torso
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3); // head
    ctx.fillRect(px - 1, py - 4, 2, 5); // left leg
    ctx.fillRect(px + 3, py - 4, 2, 5); // right leg
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Campfire
    var fx = 212, fy = 148;
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(fx - 3, fy, 2, 3);
    ctx.fillRect(fx + 3, fy, 2, 3);
    ctx.fillStyle = '#FF5555';
    var flicker = Math.sin(t * 8) * 2;
    ctx.fillRect(fx - 1, fy - 3 + Math.floor(flicker * 0.3), 4, 3);
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(fx, fy - 5 + Math.floor(flicker * 0.5), 2, 2);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(fx - 1, fy - 2, 4, 2);
    // Firelight glow (subtle)
    ctx.fillStyle = 'rgba(255,170,0,0.08)';
    ctx.beginPath();
    ctx.arc(fx + 1, fy - 2, 15, 0, Math.PI * 2);
    ctx.fill();
    return;
  }

  // --- VULNERABILITY RIVER: rough rapids with white water ---
  if (currentEventTitle.indexOf('Vulnerability River') !== -1) {
    // Extra turbulence on the river
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 20; i++) {
      var sx = (i * 17 + t * 40) % W;
      var sy = 157 + Math.sin((i * 3 + t * 5)) * 3;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 4, 2);
    }
    // Floating logs / debris
    ctx.fillStyle = '#AA5500';
    for (var i = 0; i < 3; i++) {
      var logX = (i * 110 + t * 25) % W;
      var logY = 159 + Math.sin(t * 2 + i) * 2;
      ctx.fillRect(Math.floor(logX), Math.floor(logY), 8, 2);
    }
    return;
  }

  // --- INJECTION STORM: dark sky, red-tinged rain of payloads ---
  if (currentEventTitle.indexOf('Injection Storm') !== -1) {
    // Darken sky with red tint
    ctx.fillStyle = 'rgba(50,0,0,0.35)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning flash (periodic)
    var flashPhase = Math.sin(t * 2.1) + Math.sin(t * 2.7);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,100,100,0.3)';
      ctx.fillRect(0, 0, W, H);
      ctx.strokeStyle = '#FF5555';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 120 + Math.sin(t * 1.8) * 80;
      ctx.moveTo(lx, 10);
      ctx.lineTo(lx - 8, 40);
      ctx.lineTo(lx + 5, 40);
      ctx.lineTo(lx - 2, 70);
      ctx.stroke();
    }
    // Red-tinted rain (payloads)
    ctx.strokeStyle = '#FF5555';
    ctx.lineWidth = 1;
    for (var i = 0; i < 35; i++) {
      var rx = (i * 9.1 + t * 70) % W;
      var ry = (i * 12.3 + t * 100) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 1), Math.floor(ry + 4));
      ctx.stroke();
    }
    return;
  }

  // --- AUTH BYPASS GONE WRONG: red sky, smoke, warning ---
  if (currentEventTitle.indexOf('Auth Bypass Gone Wrong') !== -1) {
    // Red danger tint
    ctx.fillStyle = 'rgba(170,0,0,0.25)';
    ctx.fillRect(0, 0, W, H);
    // Smoke particles rising
    ctx.fillStyle = '#555555';
    for (var i = 0; i < 15; i++) {
      var sx = 140 + Math.sin(i * 2.7 + t) * 30;
      var sy = 130 - ((t * 20 + i * 15) % 90);
      var size = 2 + (i % 3);
      ctx.globalAlpha = 0.3 + Math.sin(t + i) * 0.15;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), size, size);
    }
    ctx.globalAlpha = 1.0;
    // Fire at base
    ctx.fillStyle = '#FF5555';
    for (var i = 0; i < 8; i++) {
      var fx = 130 + i * 5;
      var fh = 4 + Math.sin(t * 6 + i * 1.5) * 3;
      ctx.fillRect(fx, Math.floor(140 - fh), 3, Math.floor(fh));
    }
    ctx.fillStyle = '#FFFF55';
    for (var i = 0; i < 5; i++) {
      var fx = 135 + i * 6;
      var fh = 2 + Math.sin(t * 8 + i * 2) * 2;
      ctx.fillRect(fx, Math.floor(139 - fh), 2, Math.floor(fh));
    }
    // Pulsing red border
    var pulse = (Math.sin(t * 4) + 1) * 0.15;
    ctx.strokeStyle = 'rgba(255,0,0,' + pulse.toFixed(2) + ')';
    ctx.lineWidth = 3;
    ctx.strokeRect(1, 1, W - 2, H - 2);
    ctx.lineWidth = 1;
    return;
  }

  // --- PROOF-BY-EXPLOITATION PIONEER: person at checkpoint ---
  if (currentEventTitle.indexOf('Proof-by-Exploitation') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3);
    ctx.fillRect(px - 1, py - 4, 2, 5);
    ctx.fillRect(px + 3, py - 4, 2, 5);
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Terminal/laptop nearby
    ctx.fillStyle = '#333333';
    ctx.fillRect(px + 10, py - 8, 10, 7);
    ctx.fillStyle = '#55FF55';
    ctx.fillRect(px + 11, py - 7, 8, 5);
    // Blinking cursor on screen
    if (Math.sin(t * 4) > 0) {
      ctx.fillStyle = '#55FF55';
      ctx.fillRect(px + 13, py - 5, 2, 1);
    }
    return;
  }
};
</script>
