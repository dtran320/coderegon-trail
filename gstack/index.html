<script>
window.TRAIL_DATA = {"framework":"gstack","trailName":"The Software Factory Trail","stops":[{"name":"Independence, MO","subtitle":"SKILL.md Discovery","concept":"Sprint Discipline","landmarkType":"town","code":{"file":"SKILL.md","content":"---\nname: gstack\npreamble-tier: 1\nversion: 1.1.0\ndescription: |\n  Fast headless browser for QA testing\n  and site dogfooding. Navigate pages,\n  interact with elements, verify state,\n  diff before/after, take screenshots.\nallowed-tools:\n  - Bash\n  - Read\n  - AskUserQuestion\n---\n\n## Preamble (run first)\n\nmkdir -p ~/.gstack/sessions\ntouch ~/.gstack/sessions/\"$PPID\"\n_SESSIONS=$(find ~/.gstack/sessions \\\n  -mmin -120 -type f | wc -l)\n_PROACTIVE=$(gstack-config get proactive)\necho \"PROACTIVE: $_PROACTIVE\"\necho \"REPO_MODE: $REPO_MODE\"","language":"yaml"},"narration":"Every gstack sprint begins here, at the master SKILL.md. When you invoke any slash command, gstack runs a preamble that tracks sessions, checks for updates, and detects your repo mode. The YAML frontmatter declares what tools the skill can use. No tool access means no tool access. The agent is constrained before it even starts thinking."},{"name":"Chimney Rock","subtitle":"/office-hours","concept":"Sprint Discipline","landmarkType":"mountain","code":{"file":"office-hours/SKILL.md","content":"# /office-hours\n# YC Office Hours: two modes\n\n## Startup Mode: Six Forcing Questions\n1. DEMAND: Who wants this so badly\n   they'd use a half-broken v1?\n2. STATUS QUO: What do they do today\n   without your thing?\n3. SPECIFICITY: What is the narrowest\n   possible description of your user?\n4. WEDGE: What is the smallest thing\n   you could build that is useful?\n5. OBSERVATION: What have you seen\n   that others have not?\n6. FUTURE-FIT: Why is NOW the right\n   time to build this?\n\n## Builder Mode:\nDesign thinking brainstorm for side\nprojects, hackathons, and open source.\nSaves a design doc to the repo.\n\n## Gate: No coding starts until the\n## design doc is written and saved.","language":"markdown"},"narration":"Chimney Rock is where gstack forces you to think before you code. Office hours asks six questions borrowed from YC partner sessions. Who wants this? What do they do today? What is the narrowest wedge? These questions kill bad ideas fast and sharpen good ones. No design doc, no coding."},{"name":"Fort Laramie","subtitle":"/plan-ceo-review","concept":"Agent Roles","landmarkType":"camp","code":{"file":"plan-ceo-review/SKILL.md","content":"# /plan-ceo-review\n# CEO/founder-mode plan review\n\n## Four Scope Modes:\n\n1. SCOPE EXPANSION\n   Dream big. Find the 10-star product.\n   Challenge every premise.\n\n2. SELECTIVE EXPANSION\n   Hold scope + cherry-pick expansions\n   that create outsized value.\n\n3. HOLD SCOPE\n   Maximum rigor. Lock the plan.\n   No new features, only quality.\n\n4. SCOPE REDUCTION\n   Strip to absolute essentials.\n   What is the MVP of the MVP?\n\n## The CEO agent asks:\n- Is this ambitious enough?\n- What would make this a 10?\n- Are we solving the right problem?\n- What would a competitor do here?\n\n## Output: Annotated plan with\n## scope decision and rationale.","language":"markdown"},"narration":"At Fort Laramie, the CEO agent reviews your plan. It has four modes from dream big to strip down. Scope Expansion asks what the ten-star version looks like. Scope Reduction asks what the MVP of the MVP is. The CEO agent challenges your premises before a single line of code is written. Strategy before tactics."},{"name":"Independence Rock","subtitle":"/plan-eng-review","concept":"Agent Roles","landmarkType":"mountain","code":{"file":"plan-eng-review/SKILL.md","content":"# /plan-eng-review\n# Eng manager-mode plan review\n\n## Lock in the execution plan:\n- Architecture with ASCII diagrams\n- Data flow between components\n- Edge cases and error paths\n- Test coverage matrix\n- Performance considerations\n\n## Review walks through issues\n## interactively with recommendations:\n\nIssue 1: No error handling for\n  network timeouts in the API layer.\n  RECOMMENDATION: Add retry with\n  exponential backoff, 3 attempts max.\n  Completeness: 8/10 vs 4/10.\n\nIssue 2: Missing index on user_id\n  in the orders table.\n  RECOMMENDATION: Add composite\n  index (user_id, created_at).\n\n## Output: Architecture locked.\n## ASCII diagrams committed to plan.","language":"markdown"},"narration":"Independence Rock is where the engineering manager locks down architecture. ASCII diagrams, data flow maps, test matrices, edge case lists. Every issue gets an opinionated recommendation with a completeness score. The eng review catches missing indexes, unhandled timeouts, and architecture gaps before they become production incidents."},{"name":"South Pass","subtitle":"/autoplan","concept":"Sprint Discipline","landmarkType":"river","code":{"file":"autoplan/SKILL.md","content":"# /autoplan\n# Auto-review pipeline\n\n## One command. Fully reviewed plan.\n\n## Pipeline stages:\n1. Read the full CEO review skill\n2. Run CEO review with auto-decisions\n3. Read the full design review skill\n4. Run design review with auto-decisions\n5. Read the full eng review skill\n6. Run eng review with auto-decisions\n\n## 6 Decision Principles:\n- Pick the more complete option\n- Prefer explicit over implicit\n- Prefer tested over untested\n- When close, pick the bolder option\n- When uncertain, ask the user\n- Log taste decisions for final gate\n\n## Surfaces taste decisions at a final\n## approval gate. Close approaches,\n## borderline scope, codex disagreements\n## all get surfaced for human judgment.","language":"markdown"},"narration":"South Pass is the automated pipeline. One command, three reviews, fully autonomous. Autoplan chains CEO review, design review, and eng review in sequence, making decisions automatically using six principles. But it does not hide hard calls. Taste decisions, borderline scope, and close approaches get surfaced at a final gate for human judgment."},{"name":"Fort Bridger","subtitle":"/review + /cso","concept":"Safety Guardrails","landmarkType":"camp","code":{"file":"review/SKILL.md + cso/SKILL.md","content":"# /review - Pre-landing PR review\n# Analyzes diff against base branch:\n- SQL safety (injection, migrations)\n- LLM trust boundary violations\n- Conditional side effects\n- Structural issues in the diff\n\n# /cso - Chief Security Officer\n# Infrastructure-first security audit:\n\n## Phase 1: Secrets archaeology\n  git log --all -p | scan for keys\n\n## Phase 2: Dependency supply chain\n  Check for typosquat packages\n\n## Phase 3: CI/CD pipeline security\n  Review workflow permissions\n\n## Phase 4: OWASP Top 10 scan\n  A01:2021 Broken Access Control\n  A02:2021 Cryptographic Failures\n  A03:2021 Injection\n\n## Phase 5: STRIDE threat modeling\n  Spoofing, Tampering, Repudiation,\n  Info Disclosure, DoS, Elevation","language":"markdown"},"narration":"Fort Bridger runs two agents in tandem. The review agent scans your diff for SQL injection, LLM trust boundary violations, and conditional side effects. The CSO agent goes deeper with secrets archaeology, dependency supply chain analysis, and OWASP Top 10 plus STRIDE threat modeling. Security is not a checklist. It is an adversarial mindset."},{"name":"The Dalles","subtitle":"/qa + /browse","concept":"Real Browser QA","landmarkType":"forest","code":{"file":"browse/SKILL.md","content":"# /qa + /browse\n# Real Chromium browser QA testing\n\n## Browse: persistent headless Chromium\n# First call: ~3s startup\n# Every call after: ~100ms\n\n$B goto https://app.example.com/login\n$B snapshot -i    # interactive elements\n$B fill @e3 \"$TEST_EMAIL\"\n$B fill @e4 \"$TEST_PASSWORD\"\n$B click @e5      # submit\n$B snapshot -D    # diff: what changed?\n$B is visible \".dashboard\"\n$B console        # any JS errors?\n\n## QA: three tiers\n# Quick:      critical + high only\n# Standard:   + medium severity\n# Exhaustive: + cosmetic issues\n\n## Produces:\n# - Before/after health scores\n# - Fix evidence (screenshots)\n# - Ship-readiness summary","language":"bash"},"narration":"The Dalles is where your code meets real browsers. No mocking, no simulation. gstack spins up persistent headless Chromium that stays running between commands. Snapshot captures every interactive element with refs you can click, fill, and assert. The QA agent tests at three severity tiers and produces before and after health scores with screenshot evidence."},{"name":"Oregon City","subtitle":"/ship + /land-and-deploy","concept":"Sprint Discipline","landmarkType":"town","code":{"file":"ship/SKILL.md + land-and-deploy/SKILL.md","content":"# /ship workflow:\n1. Detect + merge base branch\n2. Run full test suite\n3. Review diff (auto-review agent)\n4. Bump VERSION file\n5. Update CHANGELOG.md\n6. Commit, push, create PR\n\n# /land-and-deploy workflow:\n1. Merge the PR (squash or merge)\n2. Wait for CI checks to pass\n3. Wait for deploy to complete\n4. Run canary health checks:\n   $B goto https://prod.app.com\n   $B text    # does it load?\n   $B console # JS errors?\n   $B network # failed requests?\n5. Verify production health\n6. Report: DONE or DONE_WITH_CONCERNS\n\n# The sprint cycle completes.\n# Think -> Plan -> Build -> Review\n# -> Test -> Ship -> Reflect.","language":"bash"},"narration":"You made it to Oregon City! The ship skill runs tests, reviews your diff, bumps the version, writes the changelog, and creates the PR. Land-and-deploy takes over from there: merge, wait for CI, wait for deploy, then verify production health with real browser checks. The full sprint cycle is complete. Think, plan, build, review, test, ship, reflect."}],"events":[{"type":"weather","trigger":"after_stop","triggerStop":1,"title":"Preamble Storm!","text":"A storm of concurrent Claude Code sessions hits your machine. Three different projects, three different skill configurations. How does gstack ensure every session gets the right behavior without conflicts?","choices":[{"text":"The preamble tracks sessions in ~/.gstack/sessions/ and each skill declares its own allowed-tools in YAML frontmatter, constraining the agent per-skill","correct":true,"explanation":"Session tracking via touch files in ~/.gstack/sessions/ lets gstack count concurrent sessions. YAML frontmatter declares allowed-tools per skill. The agent cannot use tools not listed in the frontmatter. Isolation is enforced at the skill level, not the session level."},{"text":"Each session runs in a Docker container with its own filesystem","correct":false,"explanation":"gstack does not use containers. Session isolation comes from the skill system itself. Each skill's YAML frontmatter constrains which tools the agent can use. The preamble runs at skill load time, not in a container."},{"text":"Only one Claude Code session can run gstack at a time to prevent conflicts","correct":false,"explanation":"gstack supports multiple concurrent sessions. The preamble counts active sessions and adjusts behavior. When 3+ sessions are running, skills enter ELI16 mode to re-ground the user who is juggling windows."}],"concept":"Sprint Discipline","difficulty":"easy"},{"type":"encounter","trigger":"after_stop","triggerStop":2,"title":"A YC Partner Appears!","text":"A weathered YC partner approaches your wagon: 'Most startups fail because they build something nobody wants. What is the most important forcing question in /office-hours and why?'","choices":[{"text":"'Who wants this so badly they would use a half-broken v1?' because it tests real demand before any code is written","correct":true,"explanation":"This is the demand reality question. If nobody would use a broken version, the demand is not strong enough. It separates nice-to-have from must-have before you write a line of code. Real demand survives bad UX. Fake demand does not."},{"text":"'Why is NOW the right time?' because timing determines market success","correct":false,"explanation":"Timing matters, but it is secondary. You can have perfect timing for a product nobody wants. The demand question comes first because building the wrong thing is the most common startup failure mode, not bad timing."},{"text":"'What is the smallest thing you could build?' because shipping fast is everything","correct":false,"explanation":"The narrowest wedge question is important, but it assumes you have validated demand first. Building the smallest possible thing nobody wants is still a waste. Demand first, then scope."}],"concept":"Sprint Discipline","difficulty":"easy"},{"type":"river","trigger":"after_stop","triggerStop":3,"title":"The Scope Crossing!","text":"You reach a wide river. The CEO review offers four scope modes. Your team wants to add three more features, but the plan is already ambitious. When should you choose SELECTIVE EXPANSION over SCOPE EXPANSION?","choices":[{"text":"When the core plan is sound but one or two specific additions would create outsized value without derailing the timeline","correct":true,"explanation":"Selective Expansion holds the existing scope and cherry-picks expansions that punch above their weight. It is the disciplined middle ground. Full Scope Expansion risks derailing a good plan. Selective Expansion adds value surgically."},{"text":"When the budget is limited and you need to cut features","correct":false,"explanation":"Budget constraints call for HOLD SCOPE or SCOPE REDUCTION, not Selective Expansion. Selective Expansion is about strategic additions, not cuts. If you are cutting, you are in the wrong mode."},{"text":"When you want to explore multiple directions before committing to one","correct":false,"explanation":"Exploring multiple directions is brainstorming, not scope review. Selective Expansion assumes you have a committed plan and are evaluating whether specific additions are worth it. Exploration happens in /office-hours, not /plan-ceo-review."}],"concept":"Agent Roles","difficulty":"medium"},{"type":"weather","trigger":"after_stop","triggerStop":4,"title":"Architecture Blizzard!","text":"A blizzard hits as the eng review reveals your plan has no ASCII architecture diagram. The team is building components that do not connect. Why does gstack require ASCII diagrams in the engineering review?","choices":[{"text":"ASCII diagrams force you to map data flow between components before coding, exposing gaps that prose descriptions hide","correct":true,"explanation":"Prose hides ambiguity. When you draw boxes and arrows, missing connections become obvious. An ASCII diagram in the plan file is version-controlled, diffable, and readable without special tools. It forces the architect to be precise about what talks to what."},{"text":"ASCII art looks retro and cool in terminal output","correct":false,"explanation":"Aesthetics are not the point. The eng review requires diagrams because they expose architectural gaps that words hide. A missing arrow between two boxes is a missing data flow. That is a bug in the plan, caught before implementation."},{"text":"Fancy diagram tools like Mermaid or Excalidraw are too complex for most developers","correct":false,"explanation":"Tool complexity is not the reason. ASCII diagrams are required because they are plain text, version-controlled, and diffable in git. But the real reason is they force precision. Drawing a system reveals gaps that describing it does not."}],"concept":"Agent Roles","difficulty":"medium"},{"type":"misfortune","trigger":"after_stop","triggerStop":5,"title":"Decision Deadlock!","text":"Disaster! The autoplan pipeline surfaces a taste decision where the CEO review says expand scope but the eng review says hold scope. The completeness scores are 8/10 vs 7/10. What does autoplan do?","choices":[{"text":"Surfaces it at the final approval gate for human judgment, because close calls with competing expert opinions require human taste","correct":true,"explanation":"Autoplan's six decision principles handle clear cases automatically. But when two expert agents disagree on a close call, it logs it as a taste decision and surfaces it at the final gate. Taste decisions are where human judgment beats automated rules. The system knows its own limits."},{"text":"Always picks the CEO review because strategy outranks engineering","correct":false,"explanation":"Autoplan does not have a fixed hierarchy between agents. The decision principles say: pick the more complete option, prefer explicit over implicit, and when close, surface it for human judgment. An 8 vs 7 is close enough to require human input."},{"text":"Averages the completeness scores and picks whichever is above 7.5","correct":false,"explanation":"Averaging scores destroys the signal. An 8 from the CEO and a 7 from engineering represent different concerns, not different measurements of the same thing. Autoplan surfaces the disagreement rather than hiding it behind arithmetic."}],"concept":"Sprint Discipline","difficulty":"hard"},{"type":"encounter","trigger":"after_stop","triggerStop":6,"title":"Security Auditor!","text":"A security auditor blocks your wagon: 'Your CI pipeline has write permissions to the production database. How did this happen?' What does the /cso skill check FIRST before even looking at your code?","choices":[{"text":"Infrastructure: secrets in git history, CI/CD pipeline permissions, dependency supply chain, and environment variable exposure","correct":true,"explanation":"The CSO skill is infrastructure-first by design. Most real breaches come from exposed env vars in CI logs, stale API keys in git history, and forgotten staging servers with prod DB access. The CSO checks infrastructure before code because that is where the real attack surface lives."},{"text":"The application code for SQL injection and XSS vulnerabilities","correct":false,"explanation":"Code-level vulnerabilities like SQL injection are important but come later in the CSO audit. The CSO starts with infrastructure because that is where the highest-impact, most-overlooked vulnerabilities live. A perfect codebase with leaked secrets in git history is still compromised."},{"text":"The README and documentation for security best practices","correct":false,"explanation":"Documentation review is not part of the CSO audit. The CSO thinks like an attacker: where are the unlocked doors? That means scanning git history for secrets, checking CI permissions, and auditing the dependency supply chain before ever reading application code."}],"concept":"Safety Guardrails","difficulty":"hard"},{"type":"fortune","trigger":"after_stop","triggerStop":7,"title":"Browser QA Breakthrough!","text":"The /browse agent discovers that a deploy verification can be done in 3 commands: goto, text, console. Your production health check now runs in under a second. The trail ahead looks clear!","choices":[],"concept":"Real Browser QA","difficulty":"easy"}],"partyMembers":[{"name":"Sprint Discipline","icon":"server","maxHealth":3},{"name":"Agent Roles","icon":"router","maxHealth":3},{"name":"Real Browser QA","icon":"data","maxHealth":3},{"name":"Safety Guardrails","icon":"layout","maxHealth":3}],"deathMessages":["Died of shipping without /review. Production was never the same.","Lost to scope creep. Should have used /freeze.","Drowned in unreviewed PRs. The /autoplan pipeline was never run.","Killed by a secret in git history. The /cso audit was skipped.","Your QA used mocks instead of real browsers. The bug shipped to prod.","Starved waiting for manual testing. Should have used /browse.","Died of rationalization. 'This is too simple to need a plan' were the last words.","Buried under 47 open PRs. The /ship workflow was never adopted."],"sourceInfo":{"repo":"garrytan/gstack","commit":"78bc1d1","tag":"","snapshotDate":"2026-03-28"}};

window.TRAIL_FLAVORS = [
  "The preamble fires. Skills loaded. Sprint begins...",

];

window.drawCustomEventOverlay = function(time) {
  if (!currentEventType && !currentEventTitle) return;

  var t = (time || 0) * 0.001; // seconds

  // --- HOOK STORM: dark sky, lightning, rain ---
  if (currentEventTitle.indexOf('Preamble Storm') !== -1) {
    // Darken sky
    ctx.fillStyle = 'rgba(0,0,50,0.45)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning flash (periodic)
    var flashPhase = Math.sin(t * 1.7) + Math.sin(t * 3.1);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, 0, W, H);
      // Lightning bolt
      ctx.strokeStyle = '#FFFF55';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 80 + Math.sin(t * 2.3) * 60;
      ctx.moveTo(lx, 10);
      ctx.lineTo(lx - 5, 35);
      ctx.lineTo(lx + 8, 35);
      ctx.lineTo(lx - 3, 65);
      ctx.lineTo(lx + 10, 65);
      ctx.lineTo(lx + 2, 95);
      ctx.stroke();
    }
    // Rain
    ctx.strokeStyle = '#5555FF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 40; i++) {
      var rx = (i * 8.3 + t * 80) % W;
      var ry = (i * 13.7 + t * 120) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 1), Math.floor(ry + 5));
      ctx.stroke();
    }
    return;
  }

  // --- DESIGN GATE CROSSING: rough rapids with white water ---
  if (currentEventTitle.indexOf('Scope Crossing') !== -1) {
    // Extra turbulence on the river
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 20; i++) {
      var sx = (i * 17 + t * 40) % W;
      var sy = 157 + Math.sin((i * 3 + t * 5)) * 3;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 4, 2);
    }
    // Floating logs / debris
    ctx.fillStyle = '#AA5500';
    for (var i = 0; i < 3; i++) {
      var logX = (i * 110 + t * 25) % W;
      var logY = 159 + Math.sin(t * 2 + i) * 2;
      ctx.fillRect(Math.floor(logX), Math.floor(logY), 8, 2);
    }
    return;
  }

  // --- PLANNING PIONEER: person standing by campfire ---
  if (currentEventTitle.indexOf('YC Partner') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8); // torso
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3); // head
    ctx.fillRect(px - 1, py - 4, 2, 5); // left leg
    ctx.fillRect(px + 3, py - 4, 2, 5); // right leg
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Campfire
    var fx = 212, fy = 148;
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(fx - 3, fy, 2, 3);
    ctx.fillRect(fx + 3, fy, 2, 3);
    ctx.fillStyle = '#FF5555';
    var flicker = Math.sin(t * 8) * 2;
    ctx.fillRect(fx - 1, fy - 3 + Math.floor(flicker * 0.3), 4, 3);
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(fx, fy - 5 + Math.floor(flicker * 0.5), 2, 2);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(fx - 1, fy - 2, 4, 2);
    // Firelight glow (subtle)
    ctx.fillStyle = 'rgba(255,170,0,0.08)';
    ctx.beginPath();
    ctx.arc(fx + 1, fy - 2, 15, 0, Math.PI * 2);
    ctx.fill();
    return;
  }

  // --- SUBAGENT STORM: dark clouds, multiple lightning, wind ---
  if (currentEventTitle.indexOf('Architecture Blizzard') !== -1) {
    // Darken sky more
    ctx.fillStyle = 'rgba(0,0,50,0.55)';
    ctx.fillRect(0, 0, W, 110);
    // Multiple lightning bolts
    for (var bolt = 0; bolt < 3; bolt++) {
      var flashPhase = Math.sin(t * (1.7 + bolt * 0.9)) + Math.sin(t * (3.1 + bolt * 1.3));
      if (flashPhase > 1.5) {
        ctx.strokeStyle = '#FFFF55';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        var lx = 50 + bolt * 90 + Math.sin(t * 2.3 + bolt) * 30;
        ctx.moveTo(lx, 5);
        ctx.lineTo(lx - 4, 25);
        ctx.lineTo(lx + 6, 30);
        ctx.lineTo(lx - 2, 55);
        ctx.lineTo(lx + 8, 58);
        ctx.lineTo(lx + 1, 85);
        ctx.stroke();
      }
    }
    // Heavy rain
    ctx.strokeStyle = '#5555FF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 60; i++) {
      var rx = (i * 5.7 + t * 100) % W;
      var ry = (i * 11.3 + t * 150) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 2), Math.floor(ry + 6));
      ctx.stroke();
    }
    return;
  }

  // --- TDD FAILURE: red sky, smoke, warning ---
  if (currentEventTitle.indexOf('Decision Deadlock') !== -1) {
    // Red danger tint
    ctx.fillStyle = 'rgba(170,0,0,0.25)';
    ctx.fillRect(0, 0, W, H);
    // Smoke particles rising
    ctx.fillStyle = '#555555';
    for (var i = 0; i < 15; i++) {
      var sx = 140 + Math.sin(i * 2.7 + t) * 30;
      var sy = 130 - ((t * 20 + i * 15) % 90);
      var size = 2 + (i % 3);
      ctx.globalAlpha = 0.3 + Math.sin(t + i) * 0.15;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), size, size);
    }
    ctx.globalAlpha = 1.0;
    // Fire at base
    ctx.fillStyle = '#FF5555';
    for (var i = 0; i < 8; i++) {
      var fx = 130 + i * 5;
      var fh = 4 + Math.sin(t * 6 + i * 1.5) * 3;
      ctx.fillRect(fx, Math.floor(140 - fh), 3, Math.floor(fh));
    }
    ctx.fillStyle = '#FFFF55';
    for (var i = 0; i < 5; i++) {
      var fx = 135 + i * 6;
      var fh = 2 + Math.sin(t * 8 + i * 2) * 2;
      ctx.fillRect(fx, Math.floor(139 - fh), 2, Math.floor(fh));
    }
    // Pulsing red border
    var pulse = (Math.sin(t * 4) + 1) * 0.15;
    ctx.strokeStyle = 'rgba(255,0,0,' + pulse.toFixed(2) + ')';
    ctx.lineWidth = 3;
    ctx.strokeRect(1, 1, W - 2, H - 2);
    ctx.lineWidth = 1;
    return;
  }

  // --- REVIEW GATE PIONEER: person standing by gate structure ---
  if (currentEventTitle.indexOf('Security Auditor') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3);
    ctx.fillRect(px - 1, py - 4, 2, 5);
    ctx.fillRect(px + 3, py - 4, 2, 5);
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Gate structure
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(210, py - 20, 3, 22);
    ctx.fillRect(225, py - 20, 3, 22);
    ctx.fillRect(210, py - 22, 18, 3);
    // Gate sign
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(214, py - 18, 10, 6);
    ctx.fillStyle = '#000';
    ctx.fillRect(216, py - 16, 2, 2);
    ctx.fillRect(220, py - 16, 2, 2);
    return;
  }
};
</script>
