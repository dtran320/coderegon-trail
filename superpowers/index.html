<script>
window.TRAIL_DATA = {"framework":"superpowers","trailName":"The Superpowers Trail","sourceInfo":{"repo":"obra/superpowers","commit":"eafe962","tag":"v5.0.6","snapshotDate":"2026-03-28"},"stops":[{"name":"Independence, MO","subtitle":"Session Hook","concept":"Skills as Workflows","landmarkType":"town","code":{"file":"hooks/session-start","content":"#!/usr/bin/env bash\n# SessionStart hook for superpowers plugin\nset -euo pipefail\n\nSCRIPT_DIR=\"$(cd \"$(dirname \"$0\")\" && pwd)\"\nPLUGIN_ROOT=\"$(cd \"${SCRIPT_DIR}/..\" && pwd)\"\n\n# Read ONLY the meta-skill: using-superpowers\nusing_superpowers_content=$(cat \\\n  \"${PLUGIN_ROOT}/skills/using-superpowers/SKILL.md\")\n\n# Escape for JSON embedding\nescape_for_json() {\n    local s=\"$1\"\n    s=\"${s//\\\\/\\\\\\\\}\"\n    s=\"${s//\\\"/\\\\\\\"}\"\n    s=\"${s//$'\\n'/\\\\n}\"\n    printf '%s' \"$s\"\n}\n\nusing_superpowers_escaped=$(escape_for_json \\\n  \"$using_superpowers_content\")\nsession_context=\"<EXTREMELY_IMPORTANT>\\n\\\nYou have superpowers.\\n\\n\\\n**Below is your 'using-superpowers' skill.**\\n\\\n**For all other skills, use the Skill tool:**\\n\\n\\\n${using_superpowers_escaped}\\n\\\n</EXTREMELY_IMPORTANT>\"\n\n# Output as hookSpecificOutput.additionalContext\nprintf '{\\n  \"hookSpecificOutput\": {\\n\\\n    \"hookEventName\": \"SessionStart\",\\n\\\n    \"additionalContext\": \"%s\"\\n\\\n  }\\n}\\n' \"$session_context\"","language":"bash"},"narration":"Every journey starts at the session hook. It loads only ONE skill: using-superpowers, the meta-skill that teaches the agent how to find other skills on demand via the Skill tool. This is the one percent rule. Inject just enough to bootstrap, fetch the rest when needed."},{"name":"Chimney Rock","subtitle":"Brainstorming","concept":"Hard-Gate Enforcement","landmarkType":"mountain","code":{"file":"skills/brainstorming/SKILL.md","content":"# Brainstorming Ideas Into Designs\n\nHelp turn ideas into fully formed designs\nthrough natural collaborative dialogue.\n\n<HARD-GATE>\nDo NOT invoke any implementation skill,\nwrite any code, scaffold any project, or\ntake any implementation action until you\nhave presented a design and the user has\napproved it. This applies to EVERY project\nregardless of perceived simplicity.\n</HARD-GATE>\n\n## Anti-Pattern: \"This Is Too Simple\"\n\nEvery project goes through this process.\nA todo list, a single-function utility,\na config change - all of them.\n\n## Checklist\n1. Explore project context\n2. Offer visual companion (if visual)\n3. Ask clarifying questions - one at a time\n4. Propose 2-3 approaches with trade-offs\n5. Present design, get user approval\n6. Write design doc and commit\n7. Spec self-review\n8. User reviews written spec\n9. Transition to writing-plans skill","language":"markdown"},"narration":"Here at Chimney Rock stands the hardest gate on the trail: brainstorming. The HARD-GATE tag literally blocks all code until a design is approved. Even simple projects go through this. The checklist ends by invoking writing-plans, never any implementation skill directly."},{"name":"Fort Laramie","subtitle":"Workspace Isolation","concept":"Subagent-Driven Dev","landmarkType":"camp","code":{"file":"skills/using-git-worktrees/SKILL.md","content":"# Using Git Worktrees\n\n## Overview\nGit worktrees create isolated workspaces\nsharing the same repository, allowing work\non multiple branches simultaneously.\n\n## Directory Selection Process\n### 1. Check Existing Directories\nls -d .worktrees 2>/dev/null\nls -d worktrees 2>/dev/null\n\n### 2. Check CLAUDE.md\ngrep -i \"worktree.*director\" CLAUDE.md\n\n### 3. Ask User (if no directory found)\n\n## Safety Verification\n# MUST verify directory is ignored:\ngit check-ignore -q .worktrees 2>/dev/null\n# If NOT ignored: add to .gitignore, commit\n\n## Creation Steps\ngit worktree add \"$path\" -b \"$BRANCH_NAME\"\ncd \"$path\"\n# Auto-detect and run project setup\n# Verify clean test baseline\n# Report location and test status","language":"markdown"},"narration":"Fort Laramie is where you set up camp safely. The using-git-worktrees skill creates isolated workspaces. It checks for existing directories, verifies .gitignore coverage, runs project setup, and confirms a clean test baseline before any work starts. Safety first."},{"name":"Independence Rock","subtitle":"Implementation Planning","concept":"Hard-Gate Enforcement","landmarkType":"mountain","code":{"file":"skills/writing-plans/SKILL.md","content":"# Writing Plans\n\n## Overview\nWrite comprehensive implementation plans\nassuming the engineer has zero context.\nDocument everything: which files to touch,\ncode, testing, docs, how to verify.\nGive them bite-sized tasks. DRY. YAGNI. TDD.\n\n## Bite-Sized Task Granularity\nEach step is one action (2-5 minutes):\n- \"Write the failing test\" - step\n- \"Run it to make sure it fails\" - step\n- \"Implement minimal code to pass\" - step\n- \"Run tests, make sure they pass\" - step\n- \"Commit\" - step\n\n## No Placeholders\nEvery step must contain actual content.\nThese are plan failures - never write them:\n- \"TBD\", \"TODO\", \"implement later\"\n- \"Add appropriate error handling\"\n- \"Write tests for the above\"\n- \"Similar to Task N\"\n\n## Self-Review\nAfter writing: spec coverage check,\nplaceholder scan, type consistency check.","language":"markdown"},"narration":"At Independence Rock, you carve your plan into stone. Each task is a two-to-five minute bite. No placeholders, no handwaving, no 'similar to Task N'. Every step has real code and exact file paths. The plan is self-reviewed for coverage, placeholders, and type consistency."},{"name":"South Pass","subtitle":"Subagent-Driven Development","concept":"Subagent-Driven Dev","landmarkType":"river","code":{"file":"skills/subagent-driven-development/SKILL.md","content":"# Subagent-Driven Development\n\nExecute plan by dispatching fresh subagent\nper task, with two-stage review after each:\nspec compliance first, then code quality.\n\n## Why subagents:\nYou delegate tasks to specialized agents\nwith isolated context. By precisely crafting\ntheir instructions, you ensure they stay\nfocused. They never inherit your session's\ncontext or history.\n\n## Handling Implementer Status\n- DONE: proceed to spec review\n- DONE_WITH_CONCERNS: read concerns first\n- NEEDS_CONTEXT: provide and re-dispatch\n- BLOCKED: assess, escalate if needed\n\n## Two-Stage Review\n1. Spec compliance: does code match plan?\n2. Code quality: is code correct and clean?\n\n## Red Flags - Never:\n- Skip reviews (spec OR quality)\n- Start quality review before spec passes\n- Dispatch parallel implementers (conflicts)\n- Let implementer self-review replace review","language":"markdown"},"narration":"South Pass is where the real work happens. Each task gets its own fresh subagent with isolated context. The implementer reports a status. Two-stage review is mandatory: spec compliance first, code quality second. You never skip reviews and never start quality review before spec passes."},{"name":"Fort Bridger","subtitle":"Test-Driven Development","concept":"TDD Discipline","landmarkType":"camp","code":{"file":"skills/test-driven-development/SKILL.md","content":"# Test-Driven Development (TDD)\n\nWrite the test first. Watch it fail.\nWrite minimal code to pass.\n\n## The Iron Law\nNO PRODUCTION CODE WITHOUT A FAILING TEST\n\nWrite code before the test? Delete it.\nStart over. No exceptions:\n- Don't keep it as \"reference\"\n- Don't \"adapt\" it while writing tests\n- Don't look at it\n- Delete means delete\n\n## Red-Green-Refactor\nRED: Write failing test, verify it fails\nGREEN: Write minimal code, verify it passes\nREFACTOR: Clean up, keep tests green\n\n## Common Rationalizations\n\"Too simple to test\" - Simple code breaks.\n\"I'll test after\" - Tests passing immediately\n  prove nothing.\n\"Keep as reference\" - You'll adapt it.\n  That's testing after. Delete means delete.\n\"TDD will slow me down\" - TDD is faster\n  than debugging.","language":"markdown"},"narration":"Fort Bridger enforces the TDD discipline. The Iron Law: no production code without a failing test first. Write code before the test? Delete it. Not save as reference, not adapt it. Delete. The skill lists every rationalization developers use and shuts them all down."},{"name":"The Dalles","subtitle":"Code Review Gate","concept":"Hard-Gate Enforcement","landmarkType":"forest","code":{"file":"skills/requesting-code-review/SKILL.md","content":"# Requesting Code Review\n\nDispatch code-reviewer subagent to catch\nissues before they cascade. The reviewer\ngets precisely crafted context, never your\nsession's history.\n\n## When to Request Review\nMandatory:\n- After each task in subagent-driven dev\n- After completing major feature\n- Before merge to main\n\nOptional but valuable:\n- When stuck (fresh perspective)\n- Before refactoring (baseline check)\n\n## How to Request\n1. Get git SHAs (BASE_SHA and HEAD_SHA)\n2. Dispatch code-reviewer subagent with:\n   - WHAT_WAS_IMPLEMENTED\n   - PLAN_OR_REQUIREMENTS\n   - BASE_SHA / HEAD_SHA\n   - DESCRIPTION\n3. Act on feedback:\n   - Fix Critical issues immediately\n   - Fix Important issues before proceeding\n   - Note Minor issues for later\n   - Push back if wrong (with reasoning)","language":"markdown"},"narration":"The Dalles is the review gate before the promised land. Reviews are mandatory after every task and before every merge. The reviewer gets precisely crafted context, not your session history. Critical issues block, important issues must be fixed, and you can push back with reasoning."},{"name":"Oregon City","subtitle":"Branch Completion","concept":"Skills as Workflows","landmarkType":"town","code":{"file":"skills/finishing-a-development-branch/SKILL.md","content":"# Finishing a Development Branch\n\n## The Process\n\n### Step 1: Verify Tests\nRun project's test suite.\nIf tests fail: stop. Do not proceed.\n\n### Step 2: Determine Base Branch\ngit merge-base HEAD main\n\n### Step 3: Present Options\n1. Merge back to base-branch locally\n2. Push and create a Pull Request\n3. Keep the branch as-is\n4. Discard this work\n\n### Step 4: Execute Choice\nOption 1: Merge, verify tests, delete branch\nOption 2: Push, gh pr create\nOption 3: Report location, keep worktree\nOption 4: Confirm with typed 'discard',\n  then git branch -D\n\n### Step 5: Cleanup Worktree\nFor Options 1, 2, 4:\n  git worktree remove <path>\nFor Option 3: keep worktree","language":"markdown"},"narration":"You made it to Oregon City! Verify tests pass, then choose: merge locally, create a PR, keep the branch, or discard. Each option has a clear procedure. Discard requires typed confirmation. The cycle completes. From brainstorming through implementation to merge, every step was enforced."}],"events":[{"type":"weather","trigger":"after_stop","triggerStop":1,"title":"Hook Storm!","text":"A storm of new coding sessions hits your machine \u2014 VS Code, Cursor, terminal agents, all spinning up at once. How do you ensure every single one follows the methodology?","choices":[{"text":"Inject only the meta-skill at session start; it teaches the agent to use the Skill tool to fetch other skills on demand","correct":true,"explanation":"The session hook loads only using-superpowers, the meta-skill. It teaches the agent that skills exist and how to invoke them via the Skill tool. Other skills are fetched on demand, not all loaded upfront. This is the one percent rule: inject just enough to bootstrap."},{"text":"Load all skills into context at session start so nothing gets missed","correct":false,"explanation":"Loading all skills would bloat the context window. The real hook loads only the meta-skill. Other skills are fetched on demand via the Skill tool when the agent recognizes a relevant task."},{"text":"Let users manually type commands to activate each skill","correct":false,"explanation":"Manual activation means steps get skipped under time pressure. The hook automatically injects the meta-skill so the agent always knows skills exist and must use them."}],"concept":"Skills as Workflows","difficulty":"easy"},{"type":"river","trigger":"after_stop","triggerStop":2,"title":"The Design Gate Crossing!","text":"You've reached the deepest crossing on the trail. Your agent is eager to start coding, but there's a gate blocking the path. What is a 'hard gate' in Superpowers?","choices":[{"text":"A mandatory checkpoint that blocks all code writing until the prerequisite (like design approval) is met","correct":true,"explanation":"Hard gates are non-negotiable. The brainstorming skill literally cannot be bypassed. No approved spec means no planning, no coding, no nothing. The gate enforces discipline at the system level."},{"text":"A firewall that prevents unauthorized network access","correct":false,"explanation":"Hard gates are about workflow enforcement, not network security. They block premature coding, not network traffic."},{"text":"A git branch protection rule on the main branch","correct":false,"explanation":"Branch protection is a git feature. Hard gates are a Superpowers concept that enforces workflow order. They operate at the skill level, not the git level."}],"concept":"Hard-Gate Enforcement","difficulty":"medium"},{"type":"encounter","trigger":"after_stop","triggerStop":4,"title":"A Planning Pioneer appears!","text":"A grizzled pioneer approaches your wagon: 'I've seen agents write beautiful code for the wrong feature. Twice this week.' Why should implementation plans include exact file paths and complete code?","choices":[{"text":"Eliminates ambiguity; subagents with zero context can execute without guessing","correct":true,"explanation":"Fresh subagents have no memory of previous discussions. Exact file paths and complete code mean zero interpretation needed. The plan IS the specification. No guessing, no drift."},{"text":"It's faster to copy-paste complete code than to think about it","correct":false,"explanation":"Speed isn't the point. Clarity is. A vague plan forces the subagent to make assumptions, and assumptions cause the wrong feature to get built."},{"text":"Plans should be kept vague so the implementer has creative freedom","correct":false,"explanation":"Creative freedom in implementation leads to spec drift. The design phase is where creativity happens. Implementation should be mechanical execution of a clear plan."}],"concept":"Hard-Gate Enforcement","difficulty":"medium"},{"type":"weather","trigger":"after_stop","triggerStop":5,"title":"Subagent Storm!","text":"Dark clouds gather as subagents spin up across your codebase. Task 3 is building on assumptions from Task 1, and the code is starting to drift from the spec. Why use a fresh subagent per task?","choices":[{"text":"Prevents context pollution; each agent has fresh perspective and the two-stage review catches issues","correct":true,"explanation":"Context pollution is real. An agent that just finished Task 1 carries biases and assumptions into Task 2. Fresh agents read the plan literally. Two-stage review catches any drift that slips through."},{"text":"One agent doing everything is too slow to finish on time","correct":false,"explanation":"Performance isn't the primary reason. A single agent is actually faster for sequential tasks. The benefit is isolation and accountability, not speed."},{"text":"Subagents are cheaper because they use smaller context windows","correct":false,"explanation":"Cost isn't the driver. Fresh context prevents the agent from making assumptions based on prior tasks. Each task gets undivided, unbiased attention."}],"concept":"Subagent-Driven Dev","difficulty":"hard"},{"type":"misfortune","trigger":"after_stop","triggerStop":6,"title":"TDD Failure!","text":"Disaster on the trail! A subagent got excited and wrote the implementation before writing any tests. The code looks correct, but you can't verify the test actually tests the right thing. What happens next?","choices":[{"text":"Delete the implementation and start over; the skill enforces test-first so you can verify the test tests the right thing","correct":true,"explanation":"If you didn't watch the test fail, you don't know it catches the bug. The test might pass for the wrong reason. Delete the code, write the test, watch it fail, THEN implement. No exceptions."},{"text":"The code is reviewed anyway so it's fine to keep it","correct":false,"explanation":"Review can catch code quality issues but can't verify that tests are meaningful. A passing test written after the code might test nothing useful. The RED step exists for a reason."},{"text":"Write the tests after the implementation since the behavior is already defined","correct":false,"explanation":"Tests written after implementation tend to test what the code does, not what it should do. They pass by definition and catch nothing. The failing test DEFINES the requirement."}],"concept":"TDD Discipline","difficulty":"hard"},{"type":"encounter","trigger":"after_stop","triggerStop":7,"title":"Review Gate Pioneer!","text":"A fellow traveler at the code review gate asks: 'Why do you run TWO separate reviews instead of one thorough review? Seems like extra work.' What's your answer?","choices":[{"text":"Separates 'did it match the spec' from 'is the code good' \u2014 different failure modes caught differently","correct":true,"explanation":"Spec compliance asks 'did we build the right thing?' Code quality asks 'did we build it right?' These are orthogonal concerns. A single reviewer tends to focus on one and miss the other."},{"text":"Two reviews are always better than one because more eyes find more bugs","correct":false,"explanation":"More reviews aren't automatically better. The key insight is that spec compliance and code quality are DIFFERENT skills. Two unfocused reviews are worse than two focused ones."},{"text":"One reviewer can't understand both the spec and the code at the same time","correct":false,"explanation":"A single reviewer CAN understand both. The issue is attention focus. When checking spec compliance, you look at WHAT was built. When checking quality, you look at HOW it was built. Mixing them dilutes both."}],"concept":"Hard-Gate Enforcement","difficulty":"medium"}],"partyMembers":[{"name":"Hard-Gate Enforcement","icon":"server","maxHealth":3},{"name":"Subagent-Driven Dev","icon":"router","maxHealth":3},{"name":"TDD Discipline","icon":"data","maxHealth":3},{"name":"Skills as Workflows","icon":"layout","maxHealth":3}],"deathMessages":["Died of skipping the brainstorming phase. The code solved the wrong problem.","Lost in an infinite subagent loop. Nobody reviewed the reviewer.","Drowned in merge conflicts. The worktree diverged too far from main.","Killed by writing code before the test. TDD was not optional.","Your plan was too vague. The subagent implemented the wrong feature.","Starved waiting for design approval. The spec was never good enough.","Died of rationalization. 'This is too simple to need a plan' were the last words.","Buried under 14 unfinished skills. Process without progress."]};

];

window.drawCustomEventOverlay = function(time) {
  if (!currentEventType && !currentEventTitle) return;

  var t = (time || 0) * 0.001; // seconds

  // --- HOOK STORM: dark sky, lightning, rain ---
  if (currentEventTitle.indexOf('Hook Storm') !== -1) {
    // Darken sky
    ctx.fillStyle = 'rgba(0,0,50,0.45)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning flash (periodic)
    var flashPhase = Math.sin(t * 1.7) + Math.sin(t * 3.1);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, 0, W, H);
      // Lightning bolt
      ctx.strokeStyle = '#FFFF55';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 80 + Math.sin(t * 2.3) * 60;
      ctx.moveTo(lx, 10);
      ctx.lineTo(lx - 5, 35);
      ctx.lineTo(lx + 8, 35);
      ctx.lineTo(lx - 3, 65);
      ctx.lineTo(lx + 10, 65);
      ctx.lineTo(lx + 2, 95);
      ctx.stroke();
    }
    // Rain
    ctx.strokeStyle = '#5555FF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 40; i++) {
      var rx = (i * 8.3 + t * 80) % W;
      var ry = (i * 13.7 + t * 120) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 1), Math.floor(ry + 5));
      ctx.stroke();
    }
    return;
  }

  // --- DESIGN GATE CROSSING: rough rapids with white water ---
  if (currentEventTitle.indexOf('Design Gate') !== -1) {
    // Extra turbulence on the river
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 20; i++) {
      var sx = (i * 17 + t * 40) % W;
      var sy = 157 + Math.sin((i * 3 + t * 5)) * 3;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 4, 2);
    }
    // Floating logs / debris
    ctx.fillStyle = '#AA5500';
    for (var i = 0; i < 3; i++) {
      var logX = (i * 110 + t * 25) % W;
      var logY = 159 + Math.sin(t * 2 + i) * 2;
      ctx.fillRect(Math.floor(logX), Math.floor(logY), 8, 2);
    }
    return;
  }

  // --- PLANNING PIONEER: person standing by campfire ---
  if (currentEventTitle.indexOf('Planning Pioneer') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8); // torso
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3); // head
    ctx.fillRect(px - 1, py - 4, 2, 5); // left leg
    ctx.fillRect(px + 3, py - 4, 2, 5); // right leg
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Campfire
    var fx = 212, fy = 148;
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(fx - 3, fy, 2, 3);
    ctx.fillRect(fx + 3, fy, 2, 3);
    ctx.fillStyle = '#FF5555';
    var flicker = Math.sin(t * 8) * 2;
    ctx.fillRect(fx - 1, fy - 3 + Math.floor(flicker * 0.3), 4, 3);
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(fx, fy - 5 + Math.floor(flicker * 0.5), 2, 2);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(fx - 1, fy - 2, 4, 2);
    // Firelight glow (subtle)
    ctx.fillStyle = 'rgba(255,170,0,0.08)';
    ctx.beginPath();
    ctx.arc(fx + 1, fy - 2, 15, 0, Math.PI * 2);
    ctx.fill();
    return;
  }

  // --- SUBAGENT STORM: dark clouds, multiple lightning, wind ---
  if (currentEventTitle.indexOf('Subagent Storm') !== -1) {
    // Darken sky more
    ctx.fillStyle = 'rgba(0,0,50,0.55)';
    ctx.fillRect(0, 0, W, 110);
    // Multiple lightning bolts
    for (var bolt = 0; bolt < 3; bolt++) {
      var flashPhase = Math.sin(t * (1.7 + bolt * 0.9)) + Math.sin(t * (3.1 + bolt * 1.3));
      if (flashPhase > 1.5) {
        ctx.strokeStyle = '#FFFF55';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        var lx = 50 + bolt * 90 + Math.sin(t * 2.3 + bolt) * 30;
        ctx.moveTo(lx, 5);
        ctx.lineTo(lx - 4, 25);
        ctx.lineTo(lx + 6, 30);
        ctx.lineTo(lx - 2, 55);
        ctx.lineTo(lx + 8, 58);
        ctx.lineTo(lx + 1, 85);
        ctx.stroke();
      }
    }
    // Heavy rain
    ctx.strokeStyle = '#5555FF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 60; i++) {
      var rx = (i * 5.7 + t * 100) % W;
      var ry = (i * 11.3 + t * 150) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 2), Math.floor(ry + 6));
      ctx.stroke();
    }
    return;
  }

  // --- TDD FAILURE: red sky, smoke, warning ---
  if (currentEventTitle.indexOf('TDD Failure') !== -1) {
    // Red danger tint
    ctx.fillStyle = 'rgba(170,0,0,0.25)';
    ctx.fillRect(0, 0, W, H);
    // Smoke particles rising
    ctx.fillStyle = '#555555';
    for (var i = 0; i < 15; i++) {
      var sx = 140 + Math.sin(i * 2.7 + t) * 30;
      var sy = 130 - ((t * 20 + i * 15) % 90);
      var size = 2 + (i % 3);
      ctx.globalAlpha = 0.3 + Math.sin(t + i) * 0.15;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), size, size);
    }
    ctx.globalAlpha = 1.0;
    // Fire at base
    ctx.fillStyle = '#FF5555';
    for (var i = 0; i < 8; i++) {
      var fx = 130 + i * 5;
      var fh = 4 + Math.sin(t * 6 + i * 1.5) * 3;
      ctx.fillRect(fx, Math.floor(140 - fh), 3, Math.floor(fh));
    }
    ctx.fillStyle = '#FFFF55';
    for (var i = 0; i < 5; i++) {
      var fx = 135 + i * 6;
      var fh = 2 + Math.sin(t * 8 + i * 2) * 2;
      ctx.fillRect(fx, Math.floor(139 - fh), 2, Math.floor(fh));
    }
    // Pulsing red border
    var pulse = (Math.sin(t * 4) + 1) * 0.15;
    ctx.strokeStyle = 'rgba(255,0,0,' + pulse.toFixed(2) + ')';
    ctx.lineWidth = 3;
    ctx.strokeRect(1, 1, W - 2, H - 2);
    ctx.lineWidth = 1;
    return;
  }

  // --- REVIEW GATE PIONEER: person standing by gate structure ---
  if (currentEventTitle.indexOf('Review Gate Pioneer') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3);
    ctx.fillRect(px - 1, py - 4, 2, 5);
    ctx.fillRect(px + 3, py - 4, 2, 5);
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Gate structure
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(210, py - 20, 3, 22);
    ctx.fillRect(225, py - 20, 3, 22);
    ctx.fillRect(210, py - 22, 18, 3);
    // Gate sign
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(214, py - 18, 10, 6);
    ctx.fillStyle = '#000';
    ctx.fillRect(216, py - 16, 2, 2);
    ctx.fillRect(220, py - 16, 2, 2);
    return;
  }
};
</script>
