<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100vh;
  overflow: hidden;
  background: #000;
  font-family: 'Courier New', monospace;
  color: #AAAAAA;
}
#game-container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}
#canvas-area {
  height: 52vh;
  min-height: 0;
  position: relative;
  background: #000;
}
#game-canvas {
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
  image-rendering: -moz-crisp-edges;
  image-rendering: crisp-edges;
  display: block;
}
#text-panel {
  flex: 1;
  min-height: 0;
  background: #000;
  border-top: 2px solid #555555;
  overflow-y: auto;
  padding: 8px 16px;
  font-size: 14px;
  line-height: 1.4;
  color: #FFFFFF;
}
#text-panel::-webkit-scrollbar { width: 8px; }
#text-panel::-webkit-scrollbar-track { background: #000; }
#text-panel::-webkit-scrollbar-thumb { background: #555555; }
#status-bar {
  height: 60px;
  min-height: 60px;
  background: #000;
  border-top: 2px solid #555555;
  display: flex;
  align-items: center;
  padding: 0 16px;
  font-size: 15px;
  color: #AAAAAA;
  white-space: nowrap;
  overflow: hidden;
}
.blink {
  animation: blink-anim 1s step-end infinite;
}
@keyframes blink-anim {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
  20%, 40%, 60%, 80% { transform: translateX(4px); }
}
.shake { animation: shake 0.5s ease-in-out; }
.code-box {
  background: #000;
  border: 1px solid #555555;
  padding: 6px 8px;
  margin: 6px 0;
  max-height: 130px;
  overflow-y: auto;
  overflow-x: auto;
  font-size: 12px;
  line-height: 1.3;
  white-space: pre;
  color: #55FF55;
}
.code-box::-webkit-scrollbar { width: 6px; height: 6px; }
.code-box::-webkit-scrollbar-track { background: #000; }
.code-box::-webkit-scrollbar-thumb { background: #555555; }
.choice-item { cursor: pointer; padding: 2px 4px; }
.choice-item:hover { color: #FFFF55; }
.choice-selected { color: #FFFF55; background: #333300; }
.stop-opt { color: #55FFFF; cursor: pointer; padding: 2px 4px; }
.stop-opt:hover { color: #FFFF55; }
.choice-correct { color: #55FF55; }
.choice-wrong { color: #FF5555; }
.choice-dimmed { color: #555555; }
.health-green { color: #00AA00; }
.health-yellow { color: #FFFF55; }
.health-red { color: #FF5555; }
.health-dead { color: #555555; text-decoration: line-through; }
.text-cyan { color: #55FFFF; }
.text-yellow { color: #FFFF55; }
.text-green { color: #55FF55; }
.text-red { color: #FF5555; }
.text-magenta { color: #FF55FF; }
.text-gray { color: #555555; }
.text-white { color: #FFFFFF; }
.text-bright { color: #FFFFFF; font-weight: bold; }
#music-indicator {
  position: absolute;
  top: 4px;
  right: 8px;
  font-size: 11px;
  color: #555555;
  z-index: 10;
  pointer-events: none;
}
</style>
</head>

const TRAIL_DATA={"framework":"superpowers","trailName":"The Superpowers Trail","sourceInfo":{"repo":"obra/superpowers","commit":"eafe962","tag":"v5.0.6","snapshotDate":"2026-03-28"},"stops":[{"name":"Independence, MO","subtitle":"Session Hook","concept":"Skills as Workflows","landmarkType":"town","code":{"file":"hooks/session-start","content":"#!/usr/bin/env bash\n# SessionStart hook for superpowers plugin\nset -euo pipefail\n\nSCRIPT_DIR=\"$(cd \"$(dirname \"$0\")\" && pwd)\"\nPLUGIN_ROOT=\"$(cd \"${SCRIPT_DIR}/..\" && pwd)\"\n\n# Read ONLY the meta-skill: using-superpowers\nusing_superpowers_content=$(cat \\\n  \"${PLUGIN_ROOT}/skills/using-superpowers/SKILL.md\")\n\n# Escape for JSON embedding\nescape_for_json() {\n    local s=\"$1\"\n    s=\"${s//\\\\/\\\\\\\\}\"\n    s=\"${s//\\\"/\\\\\\\"}\"\n    s=\"${s//$'\\n'/\\\\n}\"\n    printf '%s' \"$s\"\n}\n\nusing_superpowers_escaped=$(escape_for_json \\\n  \"$using_superpowers_content\")\nsession_context=\"<EXTREMELY_IMPORTANT>\\n\\\nYou have superpowers.\\n\\n\\\n**Below is your 'using-superpowers' skill.**\\n\\\n**For all other skills, use the Skill tool:**\\n\\n\\\n${using_superpowers_escaped}\\n\\\n</EXTREMELY_IMPORTANT>\"\n\n# Output as hookSpecificOutput.additionalContext\nprintf '{\\n  \"hookSpecificOutput\": {\\n\\\n    \"hookEventName\": \"SessionStart\",\\n\\\n    \"additionalContext\": \"%s\"\\n\\\n  }\\n}\\n' \"$session_context\"","language":"bash"},"narration":"Every journey starts at the session hook. It loads only ONE skill: using-superpowers, the meta-skill that teaches the agent how to find other skills on demand via the Skill tool. This is the one percent rule. Inject just enough to bootstrap, fetch the rest when needed."},{"name":"Chimney Rock","subtitle":"Brainstorming","concept":"Hard-Gate Enforcement","landmarkType":"mountain","code":{"file":"skills/brainstorming/SKILL.md","content":"# Brainstorming Ideas Into Designs\n\nHelp turn ideas into fully formed designs\nthrough natural collaborative dialogue.\n\n<HARD-GATE>\nDo NOT invoke any implementation skill,\nwrite any code, scaffold any project, or\ntake any implementation action until you\nhave presented a design and the user has\napproved it. This applies to EVERY project\nregardless of perceived simplicity.\n</HARD-GATE>\n\n## Anti-Pattern: \"This Is Too Simple\"\n\nEvery project goes through this process.\nA todo list, a single-function utility,\na config change - all of them.\n\n## Checklist\n1. Explore project context\n2. Offer visual companion (if visual)\n3. Ask clarifying questions - one at a time\n4. Propose 2-3 approaches with trade-offs\n5. Present design, get user approval\n6. Write design doc and commit\n7. Spec self-review\n8. User reviews written spec\n9. Transition to writing-plans skill","language":"markdown"},"narration":"Here at Chimney Rock stands the hardest gate on the trail: brainstorming. The HARD-GATE tag literally blocks all code until a design is approved. Even simple projects go through this. The checklist ends by invoking writing-plans, never any implementation skill directly."},{"name":"Fort Laramie","subtitle":"Workspace Isolation","concept":"Subagent-Driven Dev","landmarkType":"camp","code":{"file":"skills/using-git-worktrees/SKILL.md","content":"# Using Git Worktrees\n\n## Overview\nGit worktrees create isolated workspaces\nsharing the same repository, allowing work\non multiple branches simultaneously.\n\n## Directory Selection Process\n### 1. Check Existing Directories\nls -d .worktrees 2>/dev/null\nls -d worktrees 2>/dev/null\n\n### 2. Check CLAUDE.md\ngrep -i \"worktree.*director\" CLAUDE.md\n\n### 3. Ask User (if no directory found)\n\n## Safety Verification\n# MUST verify directory is ignored:\ngit check-ignore -q .worktrees 2>/dev/null\n# If NOT ignored: add to .gitignore, commit\n\n## Creation Steps\ngit worktree add \"$path\" -b \"$BRANCH_NAME\"\ncd \"$path\"\n# Auto-detect and run project setup\n# Verify clean test baseline\n# Report location and test status","language":"markdown"},"narration":"Fort Laramie is where you set up camp safely. The using-git-worktrees skill creates isolated workspaces. It checks for existing directories, verifies .gitignore coverage, runs project setup, and confirms a clean test baseline before any work starts. Safety first."},{"name":"Independence Rock","subtitle":"Implementation Planning","concept":"Hard-Gate Enforcement","landmarkType":"mountain","code":{"file":"skills/writing-plans/SKILL.md","content":"# Writing Plans\n\n## Overview\nWrite comprehensive implementation plans\nassuming the engineer has zero context.\nDocument everything: which files to touch,\ncode, testing, docs, how to verify.\nGive them bite-sized tasks. DRY. YAGNI. TDD.\n\n## Bite-Sized Task Granularity\nEach step is one action (2-5 minutes):\n- \"Write the failing test\" - step\n- \"Run it to make sure it fails\" - step\n- \"Implement minimal code to pass\" - step\n- \"Run tests, make sure they pass\" - step\n- \"Commit\" - step\n\n## No Placeholders\nEvery step must contain actual content.\nThese are plan failures - never write them:\n- \"TBD\", \"TODO\", \"implement later\"\n- \"Add appropriate error handling\"\n- \"Write tests for the above\"\n- \"Similar to Task N\"\n\n## Self-Review\nAfter writing: spec coverage check,\nplaceholder scan, type consistency check.","language":"markdown"},"narration":"At Independence Rock, you carve your plan into stone. Each task is a two-to-five minute bite. No placeholders, no handwaving, no 'similar to Task N'. Every step has real code and exact file paths. The plan is self-reviewed for coverage, placeholders, and type consistency."},{"name":"South Pass","subtitle":"Subagent-Driven Development","concept":"Subagent-Driven Dev","landmarkType":"river","code":{"file":"skills/subagent-driven-development/SKILL.md","content":"# Subagent-Driven Development\n\nExecute plan by dispatching fresh subagent\nper task, with two-stage review after each:\nspec compliance first, then code quality.\n\n## Why subagents:\nYou delegate tasks to specialized agents\nwith isolated context. By precisely crafting\ntheir instructions, you ensure they stay\nfocused. They never inherit your session's\ncontext or history.\n\n## Handling Implementer Status\n- DONE: proceed to spec review\n- DONE_WITH_CONCERNS: read concerns first\n- NEEDS_CONTEXT: provide and re-dispatch\n- BLOCKED: assess, escalate if needed\n\n## Two-Stage Review\n1. Spec compliance: does code match plan?\n2. Code quality: is code correct and clean?\n\n## Red Flags - Never:\n- Skip reviews (spec OR quality)\n- Start quality review before spec passes\n- Dispatch parallel implementers (conflicts)\n- Let implementer self-review replace review","language":"markdown"},"narration":"South Pass is where the real work happens. Each task gets its own fresh subagent with isolated context. The implementer reports a status. Two-stage review is mandatory: spec compliance first, code quality second. You never skip reviews and never start quality review before spec passes."},{"name":"Fort Bridger","subtitle":"Test-Driven Development","concept":"TDD Discipline","landmarkType":"camp","code":{"file":"skills/test-driven-development/SKILL.md","content":"# Test-Driven Development (TDD)\n\nWrite the test first. Watch it fail.\nWrite minimal code to pass.\n\n## The Iron Law\nNO PRODUCTION CODE WITHOUT A FAILING TEST\n\nWrite code before the test? Delete it.\nStart over. No exceptions:\n- Don't keep it as \"reference\"\n- Don't \"adapt\" it while writing tests\n- Don't look at it\n- Delete means delete\n\n## Red-Green-Refactor\nRED: Write failing test, verify it fails\nGREEN: Write minimal code, verify it passes\nREFACTOR: Clean up, keep tests green\n\n## Common Rationalizations\n\"Too simple to test\" - Simple code breaks.\n\"I'll test after\" - Tests passing immediately\n  prove nothing.\n\"Keep as reference\" - You'll adapt it.\n  That's testing after. Delete means delete.\n\"TDD will slow me down\" - TDD is faster\n  than debugging.","language":"markdown"},"narration":"Fort Bridger enforces the TDD discipline. The Iron Law: no production code without a failing test first. Write code before the test? Delete it. Not save as reference, not adapt it. Delete. The skill lists every rationalization developers use and shuts them all down."},{"name":"The Dalles","subtitle":"Code Review Gate","concept":"Hard-Gate Enforcement","landmarkType":"forest","code":{"file":"skills/requesting-code-review/SKILL.md","content":"# Requesting Code Review\n\nDispatch code-reviewer subagent to catch\nissues before they cascade. The reviewer\ngets precisely crafted context, never your\nsession's history.\n\n## When to Request Review\nMandatory:\n- After each task in subagent-driven dev\n- After completing major feature\n- Before merge to main\n\nOptional but valuable:\n- When stuck (fresh perspective)\n- Before refactoring (baseline check)\n\n## How to Request\n1. Get git SHAs (BASE_SHA and HEAD_SHA)\n2. Dispatch code-reviewer subagent with:\n   - WHAT_WAS_IMPLEMENTED\n   - PLAN_OR_REQUIREMENTS\n   - BASE_SHA / HEAD_SHA\n   - DESCRIPTION\n3. Act on feedback:\n   - Fix Critical issues immediately\n   - Fix Important issues before proceeding\n   - Note Minor issues for later\n   - Push back if wrong (with reasoning)","language":"markdown"},"narration":"The Dalles is the review gate before the promised land. Reviews are mandatory after every task and before every merge. The reviewer gets precisely crafted context, not your session history. Critical issues block, important issues must be fixed, and you can push back with reasoning."},{"name":"Oregon City","subtitle":"Branch Completion","concept":"Skills as Workflows","landmarkType":"town","code":{"file":"skills/finishing-a-development-branch/SKILL.md","content":"# Finishing a Development Branch\n\n## The Process\n\n### Step 1: Verify Tests\nRun project's test suite.\nIf tests fail: stop. Do not proceed.\n\n### Step 2: Determine Base Branch\ngit merge-base HEAD main\n\n### Step 3: Present Options\n1. Merge back to base-branch locally\n2. Push and create a Pull Request\n3. Keep the branch as-is\n4. Discard this work\n\n### Step 4: Execute Choice\nOption 1: Merge, verify tests, delete branch\nOption 2: Push, gh pr create\nOption 3: Report location, keep worktree\nOption 4: Confirm with typed 'discard',\n  then git branch -D\n\n### Step 5: Cleanup Worktree\nFor Options 1, 2, 4:\n  git worktree remove <path>\nFor Option 3: keep worktree","language":"markdown"},"narration":"You made it to Oregon City! Verify tests pass, then choose: merge locally, create a PR, keep the branch, or discard. Each option has a clear procedure. Discard requires typed confirmation. The cycle completes. From brainstorming through implementation to merge, every step was enforced."}],"events":[{"type":"weather","trigger":"after_stop","triggerStop":1,"title":"Hook Storm!","text":"A storm of new coding sessions hits your machine \u2014 VS Code, Cursor, terminal agents, all spinning up at once. How do you ensure every single one follows the methodology?","choices":[{"text":"Inject only the meta-skill at session start; it teaches the agent to use the Skill tool to fetch other skills on demand","correct":true,"explanation":"The session hook loads only using-superpowers, the meta-skill. It teaches the agent that skills exist and how to invoke them via the Skill tool. Other skills are fetched on demand, not all loaded upfront. This is the one percent rule: inject just enough to bootstrap."},{"text":"Load all skills into context at session start so nothing gets missed","correct":false,"explanation":"Loading all skills would bloat the context window. The real hook loads only the meta-skill. Other skills are fetched on demand via the Skill tool when the agent recognizes a relevant task."},{"text":"Let users manually type commands to activate each skill","correct":false,"explanation":"Manual activation means steps get skipped under time pressure. The hook automatically injects the meta-skill so the agent always knows skills exist and must use them."}],"concept":"Skills as Workflows","difficulty":"easy"},{"type":"river","trigger":"after_stop","triggerStop":2,"title":"The Design Gate Crossing!","text":"You've reached the deepest crossing on the trail. Your agent is eager to start coding, but there's a gate blocking the path. What is a 'hard gate' in Superpowers?","choices":[{"text":"A mandatory checkpoint that blocks all code writing until the prerequisite (like design approval) is met","correct":true,"explanation":"Hard gates are non-negotiable. The brainstorming skill literally cannot be bypassed. No approved spec means no planning, no coding, no nothing. The gate enforces discipline at the system level."},{"text":"A firewall that prevents unauthorized network access","correct":false,"explanation":"Hard gates are about workflow enforcement, not network security. They block premature coding, not network traffic."},{"text":"A git branch protection rule on the main branch","correct":false,"explanation":"Branch protection is a git feature. Hard gates are a Superpowers concept that enforces workflow order. They operate at the skill level, not the git level."}],"concept":"Hard-Gate Enforcement","difficulty":"medium"},{"type":"encounter","trigger":"after_stop","triggerStop":4,"title":"A Planning Pioneer appears!","text":"A grizzled pioneer approaches your wagon: 'I've seen agents write beautiful code for the wrong feature. Twice this week.' Why should implementation plans include exact file paths and complete code?","choices":[{"text":"Eliminates ambiguity; subagents with zero context can execute without guessing","correct":true,"explanation":"Fresh subagents have no memory of previous discussions. Exact file paths and complete code mean zero interpretation needed. The plan IS the specification. No guessing, no drift."},{"text":"It's faster to copy-paste complete code than to think about it","correct":false,"explanation":"Speed isn't the point. Clarity is. A vague plan forces the subagent to make assumptions, and assumptions cause the wrong feature to get built."},{"text":"Plans should be kept vague so the implementer has creative freedom","correct":false,"explanation":"Creative freedom in implementation leads to spec drift. The design phase is where creativity happens. Implementation should be mechanical execution of a clear plan."}],"concept":"Hard-Gate Enforcement","difficulty":"medium"},{"type":"weather","trigger":"after_stop","triggerStop":5,"title":"Subagent Storm!","text":"Dark clouds gather as subagents spin up across your codebase. Task 3 is building on assumptions from Task 1, and the code is starting to drift from the spec. Why use a fresh subagent per task?","choices":[{"text":"Prevents context pollution; each agent has fresh perspective and the two-stage review catches issues","correct":true,"explanation":"Context pollution is real. An agent that just finished Task 1 carries biases and assumptions into Task 2. Fresh agents read the plan literally. Two-stage review catches any drift that slips through."},{"text":"One agent doing everything is too slow to finish on time","correct":false,"explanation":"Performance isn't the primary reason. A single agent is actually faster for sequential tasks. The benefit is isolation and accountability, not speed."},{"text":"Subagents are cheaper because they use smaller context windows","correct":false,"explanation":"Cost isn't the driver. Fresh context prevents the agent from making assumptions based on prior tasks. Each task gets undivided, unbiased attention."}],"concept":"Subagent-Driven Dev","difficulty":"hard"},{"type":"misfortune","trigger":"after_stop","triggerStop":6,"title":"TDD Failure!","text":"Disaster on the trail! A subagent got excited and wrote the implementation before writing any tests. The code looks correct, but you can't verify the test actually tests the right thing. What happens next?","choices":[{"text":"Delete the implementation and start over; the skill enforces test-first so you can verify the test tests the right thing","correct":true,"explanation":"If you didn't watch the test fail, you don't know it catches the bug. The test might pass for the wrong reason. Delete the code, write the test, watch it fail, THEN implement. No exceptions."},{"text":"The code is reviewed anyway so it's fine to keep it","correct":false,"explanation":"Review can catch code quality issues but can't verify that tests are meaningful. A passing test written after the code might test nothing useful. The RED step exists for a reason."},{"text":"Write the tests after the implementation since the behavior is already defined","correct":false,"explanation":"Tests written after implementation tend to test what the code does, not what it should do. They pass by definition and catch nothing. The failing test DEFINES the requirement."}],"concept":"TDD Discipline","difficulty":"hard"},{"type":"encounter","trigger":"after_stop","triggerStop":7,"title":"Review Gate Pioneer!","text":"A fellow traveler at the code review gate asks: 'Why do you run TWO separate reviews instead of one thorough review? Seems like extra work.' What's your answer?","choices":[{"text":"Separates 'did it match the spec' from 'is the code good' \u2014 different failure modes caught differently","correct":true,"explanation":"Spec compliance asks 'did we build the right thing?' Code quality asks 'did we build it right?' These are orthogonal concerns. A single reviewer tends to focus on one and miss the other."},{"text":"Two reviews are always better than one because more eyes find more bugs","correct":false,"explanation":"More reviews aren't automatically better. The key insight is that spec compliance and code quality are DIFFERENT skills. Two unfocused reviews are worse than two focused ones."},{"text":"One reviewer can't understand both the spec and the code at the same time","correct":false,"explanation":"A single reviewer CAN understand both. The issue is attention focus. When checking spec compliance, you look at WHAT was built. When checking quality, you look at HOW it was built. Mixing them dilutes both."}],"concept":"Hard-Gate Enforcement","difficulty":"medium"}],"partyMembers":[{"name":"Hard-Gate Enforcement","icon":"server","maxHealth":3},{"name":"Subagent-Driven Dev","icon":"router","maxHealth":3},{"name":"TDD Discipline","icon":"data","maxHealth":3},{"name":"Skills as Workflows","icon":"layout","maxHealth":3}],"deathMessages":["Died of skipping the brainstorming phase. The code solved the wrong problem.","Lost in an infinite subagent loop. Nobody reviewed the reviewer.","Drowned in merge conflicts. The worktree diverged too far from main.","Killed by writing code before the test. TDD was not optional.","Your plan was too vague. The subagent implemented the wrong feature.","Starved waiting for design approval. The spec was never good enough.","Died of rationalization. 'This is too simple to need a plan' were the last words.","Buried under 14 unfinished skills. Process without progress."]};

// Seeded PRNG for consistent landscape
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xFFFFFFFF;
    return (s >>> 0) / 0xFFFFFFFF;
  };
}

function getSkyColors() {
  const progress = currentStop / Math.max(TRAIL_DATA.stops.length, 1);
  if (progress < 0.15) {
    return { top: '#5500AA', bottom: '#FF5555' };
  } else if (progress < 0.7) {
    return { top: '#5555FF', bottom: '#55FFFF' };
  } else {

  }
}

function drawPixelCloud(x, y, w, h) {
  ctx.fillStyle = '#FFFFFF';
  const ix = Math.floor(x), iy = Math.floor(y), iw = Math.floor(w), ih = Math.floor(h);
  ctx.fillRect(ix, iy, iw, ih);
  ctx.fillRect(ix + Math.floor(iw * 0.15), iy - Math.floor(ih * 0.5), Math.floor(iw * 0.3), Math.floor(ih * 0.6));
  ctx.fillRect(ix + Math.floor(iw * 0.4), iy - Math.floor(ih * 0.7), Math.floor(iw * 0.35), Math.floor(ih * 0.8));
  ctx.fillRect(ix + Math.floor(iw * 0.65), iy - Math.floor(ih * 0.3), Math.floor(iw * 0.2), Math.floor(ih * 0.4));
}

function drawMountain(x, h, w, color, snowCap) {
  const baseY = 110;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(Math.floor(x), baseY);
  ctx.lineTo(Math.floor(x + w / 2), Math.floor(baseY - h));
  ctx.lineTo(Math.floor(x + w), baseY);
  ctx.closePath();
  ctx.fill();
  if (snowCap) {
    ctx.fillStyle = '#FFFFFF';
    const peakX = x + w / 2;
    const peakY = baseY - h;
    ctx.beginPath();
    ctx.moveTo(Math.floor(peakX - w * 0.1), Math.floor(peakY + h * 0.18));
    ctx.lineTo(Math.floor(peakX), Math.floor(peakY));
    ctx.lineTo(Math.floor(peakX + w * 0.1), Math.floor(peakY + h * 0.18));
    ctx.closePath();
    ctx.fill();
  }
}

function drawTree(x, baseY, h) {
  const trunkW = 3, trunkH = Math.floor(h * 0.3);
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(x - 1), Math.floor(baseY - trunkH), trunkW, trunkH);
  for (let i = 0; i < 3; i++) {
    const layerW = (h * 0.4) * (1 - i * 0.15);
    const layerY = baseY - trunkH - (i * h * 0.2);
    ctx.fillStyle = i === 1 ? '#00AA00' : '#005500';
    ctx.beginPath();
    ctx.moveTo(Math.floor(x - layerW / 2), Math.floor(layerY));
    ctx.lineTo(Math.floor(x + 0.5), Math.floor(layerY - h * 0.25));
    ctx.lineTo(Math.floor(x + layerW / 2), Math.floor(layerY));
    ctx.closePath();
    ctx.fill();
  }
}

function drawWagon(wx, wy) {
  // Oxen (two brown lumps)
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(wx - 24), Math.floor(wy - 6), 8, 6);
  ctx.fillRect(Math.floor(wx - 14), Math.floor(wy - 6), 8, 6);
  // Oxen legs
  ctx.fillStyle = '#553300';
  ctx.fillRect(Math.floor(wx - 22), Math.floor(wy), 2, 4);
  ctx.fillRect(Math.floor(wx - 18), Math.floor(wy), 2, 4);
  ctx.fillRect(Math.floor(wx - 12), Math.floor(wy), 2, 4);
  ctx.fillRect(Math.floor(wx - 8), Math.floor(wy), 2, 4);
  // Oxen heads
  ctx.fillStyle = '#885500';
  ctx.fillRect(Math.floor(wx - 26), Math.floor(wy - 7), 3, 3);
  ctx.fillRect(Math.floor(wx - 16), Math.floor(wy - 7), 3, 3);
  // Yoke
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(wx - 4), Math.floor(wy - 4), 6, 2);
  // Wagon body
  ctx.fillStyle = '#AA5500';
  ctx.fillRect(Math.floor(wx + 2), Math.floor(wy - 8), 24, 10);
  // Wagon sides darker
  ctx.fillStyle = '#885500';
  ctx.fillRect(Math.floor(wx + 2), Math.floor(wy - 8), 24, 1);
  ctx.fillRect(Math.floor(wx + 2), Math.floor(wy + 1), 24, 1);
  // Canvas cover (white curved top)
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.moveTo(Math.floor(wx + 3), Math.floor(wy - 8));
  ctx.quadraticCurveTo(Math.floor(wx + 14), Math.floor(wy - 22), Math.floor(wx + 25), Math.floor(wy - 8));
  ctx.closePath();
  ctx.fill();
  // Canvas cover outline
  ctx.strokeStyle = '#AAAAAA';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(Math.floor(wx + 3), Math.floor(wy - 8));
  ctx.quadraticCurveTo(Math.floor(wx + 14), Math.floor(wy - 22), Math.floor(wx + 25), Math.floor(wy - 8));
  ctx.stroke();
  // Canvas ribs
  ctx.strokeStyle = '#AAAAAA';
  for (let ri = 0; ri < 3; ri++) {
    const rx = wx + 8 + ri * 5;
    ctx.beginPath();
    ctx.moveTo(Math.floor(rx), Math.floor(wy - 8));
    ctx.lineTo(Math.floor(rx), Math.floor(wy - 14 - ri % 2 * 2));
    ctx.stroke();
  }
  // Wheels
  const wheelR = 5;
  for (let wi = 0; wi < 2; wi++) {
    const wcx = wx + 7 + wi * 14;
    const wcy = wy + 4;
    // Outer rim
    ctx.fillStyle = '#553300';
    ctx.beginPath();
    ctx.arc(Math.floor(wcx), Math.floor(wcy), wheelR, 0, Math.PI * 2);
    ctx.fill();
    // Inner
    ctx.fillStyle = '#AA5500';
    ctx.beginPath();
    ctx.arc(Math.floor(wcx), Math.floor(wcy), wheelR - 1.5, 0, Math.PI * 2);
    ctx.fill();
    // Spokes
    ctx.strokeStyle = '#553300';
    ctx.lineWidth = 1;
    for (let si = 0; si < 6; si++) {
      const angle = wagonWheelAngle + (si * Math.PI / 3);
      ctx.beginPath();
      ctx.moveTo(Math.floor(wcx), Math.floor(wcy));
      ctx.lineTo(Math.floor(wcx + Math.cos(angle) * (wheelR - 1)), Math.floor(wcy + Math.sin(angle) * (wheelR - 1)));
      ctx.stroke();
    }
    // Hub
    ctx.fillStyle = '#553300';
    ctx.fillRect(Math.floor(wcx - 1), Math.floor(wcy - 1), 2, 2);
  }
  // Purple flag
  ctx.fillStyle = '#AA00AA';
  ctx.fillRect(Math.floor(wx + 14), Math.floor(wy - 22), 1, -7);
  ctx.fillStyle = '#FF55FF';
  ctx.fillRect(Math.floor(wx + 15), Math.floor(wy - 29), 6, 4);
}

function drawLandmark(type, x, baseY) {
  switch (type) {
    case 'town':
      ctx.fillStyle = '#AA5500';
      ctx.fillRect(Math.floor(x), Math.floor(baseY - 18), 14, 18);
      ctx.fillRect(Math.floor(x + 18), Math.floor(baseY - 14), 12, 14);
      // Roofs
      ctx.fillStyle = '#555555';
      ctx.beginPath();
      ctx.moveTo(Math.floor(x - 2), Math.floor(baseY - 18));
      ctx.lineTo(Math.floor(x + 7), Math.floor(baseY - 25));
      ctx.lineTo(Math.floor(x + 16), Math.floor(baseY - 18));
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(Math.floor(x + 16), Math.floor(baseY - 14));
      ctx.lineTo(Math.floor(x + 24), Math.floor(baseY - 20));
      ctx.lineTo(Math.floor(x + 32), Math.floor(baseY - 14));
      ctx.closePath();
      ctx.fill();
      // Windows
      ctx.fillStyle = '#FFFF55';
      ctx.fillRect(Math.floor(x + 3), Math.floor(baseY - 13), 3, 3);
      ctx.fillRect(Math.floor(x + 9), Math.floor(baseY - 13), 3, 3);
      ctx.fillRect(Math.floor(x + 21), Math.floor(baseY - 10), 3, 3);
      // Door
      ctx.fillStyle = '#553300';
      ctx.fillRect(Math.floor(x + 5), Math.floor(baseY - 7), 4, 7);
      break;
    case 'camp':
      // Tent
      ctx.fillStyle = '#AAAAAA';
      ctx.beginPath();
      ctx.moveTo(Math.floor(x - 6), Math.floor(baseY));
      ctx.lineTo(Math.floor(x + 4), Math.floor(baseY - 14));
      ctx.lineTo(Math.floor(x + 14), Math.floor(baseY));
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#555555';
      ctx.beginPath();
      ctx.moveTo(Math.floor(x + 4), Math.floor(baseY));
      ctx.lineTo(Math.floor(x + 4), Math.floor(baseY - 14));
      ctx.lineTo(Math.floor(x + 14), Math.floor(baseY));
      ctx.closePath();
      ctx.fill();
      // Campfire
      ctx.fillStyle = '#FF5555';
      ctx.fillRect(Math.floor(x + 20), Math.floor(baseY - 5), 4, 3);
      ctx.fillStyle = '#FFFF55';
      ctx.fillRect(Math.floor(x + 21), Math.floor(baseY - 8), 2, 3);
      ctx.fillStyle = '#FFAA00';
      ctx.fillRect(Math.floor(x + 18), Math.floor(baseY - 2), 8, 2);
      break;
    case 'mountain':
      drawMountain(x - 20, 60, 50, '#AA00AA', true);
      drawMountain(x + 10, 45, 40, '#FF55FF', true);
      break;
    case 'river':
      ctx.fillStyle = '#AA5500';
      ctx.fillRect(Math.floor(x), Math.floor(baseY - 20), 3, 20);
      ctx.fillRect(Math.floor(x + 24), Math.floor(baseY - 20), 3, 20);
      ctx.strokeStyle = '#AAAAAA';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(Math.floor(x + 1), Math.floor(baseY - 18));
      ctx.lineTo(Math.floor(x + 25), Math.floor(baseY - 18));
      ctx.stroke();
      // Sign
      ctx.fillStyle = '#AA5500';
      ctx.fillRect(Math.floor(x + 8), Math.floor(baseY - 25), 12, 8);
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(Math.floor(x + 10), Math.floor(baseY - 23), 2, 1);
      ctx.fillRect(Math.floor(x + 13), Math.floor(baseY - 23), 2, 1);
      ctx.fillRect(Math.floor(x + 16), Math.floor(baseY - 23), 2, 1);
      break;
    case 'forest':
      for (let i = 0; i < 6; i++) {
        drawTree(x + i * 7, baseY, 14 + (i % 3) * 3);
      }
      break;
  }
}

function drawRiver(time) {
  const riverY = 155;
  const riverH = 18;
  ctx.fillStyle = '#0000AA';
  ctx.fillRect(0, riverY, W, riverH);
  ctx.fillStyle = '#00AAAA';
  for (let wx = 0; wx < W; wx += 3) {
    const waveY = riverY + 3 + Math.sin((wx + time * 0.05) * 0.08) * 3;
    ctx.fillRect(wx, Math.floor(waveY), 2, 1);
    const waveY2 = riverY + 10 + Math.sin((wx + time * 0.03 + 50) * 0.1) * 2;
    ctx.fillRect(wx, Math.floor(waveY2), 2, 1);
  }
  // White foam
  ctx.fillStyle = '#55FFFF';
  for (let wx = 0; wx < W; wx += 12) {
    const foamY = riverY + 1 + Math.sin((wx + time * 0.04) * 0.06) * 1;
    ctx.fillRect(wx + 2, Math.floor(foamY), 3, 1);
  }
}

// =====================================================================
// EVENT CANVAS OVERLAYS — unique visuals per quiz event
// =====================================================================
function drawEventOverlay(time) {
  if (!currentEventType && !currentEventTitle) return;

  var t = (time || 0) * 0.001; // seconds

  // --- HOOK STORM: dark sky, lightning, rain ---
  if (currentEventTitle.indexOf('Hook Storm') !== -1) {
    // Darken sky
    ctx.fillStyle = 'rgba(0,0,50,0.45)';
    ctx.fillRect(0, 0, W, 110);
    // Lightning flash (periodic)
    var flashPhase = Math.sin(t * 1.7) + Math.sin(t * 3.1);
    if (flashPhase > 1.6) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, 0, W, H);
      // Lightning bolt
      ctx.strokeStyle = '#FFFF55';
      ctx.lineWidth = 2;
      ctx.beginPath();
      var lx = 80 + Math.sin(t * 2.3) * 60;
      ctx.moveTo(lx, 10);
      ctx.lineTo(lx - 5, 35);
      ctx.lineTo(lx + 8, 35);
      ctx.lineTo(lx - 3, 65);
      ctx.lineTo(lx + 10, 65);
      ctx.lineTo(lx + 2, 95);
      ctx.stroke();
    }
    // Rain
    ctx.strokeStyle = '#5555FF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 40; i++) {
      var rx = (i * 8.3 + t * 80) % W;
      var ry = (i * 13.7 + t * 120) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 1), Math.floor(ry + 5));
      ctx.stroke();
    }
    return;
  }

  // --- DESIGN GATE CROSSING: rough rapids with white water ---
  if (currentEventTitle.indexOf('Design Gate') !== -1) {
    // Extra turbulence on the river
    ctx.fillStyle = '#55FFFF';
    for (var i = 0; i < 20; i++) {
      var sx = (i * 17 + t * 40) % W;
      var sy = 157 + Math.sin((i * 3 + t * 5)) * 3;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 4, 2);
    }
    // Floating logs / debris
    ctx.fillStyle = '#AA5500';
    for (var i = 0; i < 3; i++) {
      var logX = (i * 110 + t * 25) % W;
      var logY = 159 + Math.sin(t * 2 + i) * 2;
      ctx.fillRect(Math.floor(logX), Math.floor(logY), 8, 2);
    }
    return;
  }

  // --- PLANNING PIONEER: person standing by campfire ---
  if (currentEventTitle.indexOf('Planning Pioneer') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8); // torso
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3); // head
    ctx.fillRect(px - 1, py - 4, 2, 5); // left leg
    ctx.fillRect(px + 3, py - 4, 2, 5); // right leg
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Campfire
    var fx = 212, fy = 148;
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(fx - 3, fy, 2, 3);
    ctx.fillRect(fx + 3, fy, 2, 3);
    ctx.fillStyle = '#FF5555';
    var flicker = Math.sin(t * 8) * 2;
    ctx.fillRect(fx - 1, fy - 3 + Math.floor(flicker * 0.3), 4, 3);
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(fx, fy - 5 + Math.floor(flicker * 0.5), 2, 2);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(fx - 1, fy - 2, 4, 2);
    // Firelight glow (subtle)
    ctx.fillStyle = 'rgba(255,170,0,0.08)';
    ctx.beginPath();
    ctx.arc(fx + 1, fy - 2, 15, 0, Math.PI * 2);
    ctx.fill();
    return;
  }

  // --- SUBAGENT STORM: dark clouds, multiple lightning, wind ---
  if (currentEventTitle.indexOf('Subagent Storm') !== -1) {
    // Darken sky more
    ctx.fillStyle = 'rgba(0,0,50,0.55)';
    ctx.fillRect(0, 0, W, 110);
    // Multiple lightning bolts
    for (var bolt = 0; bolt < 3; bolt++) {
      var flashPhase = Math.sin(t * (1.7 + bolt * 0.9)) + Math.sin(t * (3.1 + bolt * 1.3));
      if (flashPhase > 1.5) {
        ctx.strokeStyle = '#FFFF55';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        var lx = 50 + bolt * 90 + Math.sin(t * 2.3 + bolt) * 30;
        ctx.moveTo(lx, 5);
        ctx.lineTo(lx - 4, 25);
        ctx.lineTo(lx + 6, 30);
        ctx.lineTo(lx - 2, 55);
        ctx.lineTo(lx + 8, 58);
        ctx.lineTo(lx + 1, 85);
        ctx.stroke();
      }
    }
    // Heavy rain
    ctx.strokeStyle = '#5555FF';
    ctx.lineWidth = 1;
    for (var i = 0; i < 60; i++) {
      var rx = (i * 5.7 + t * 100) % W;
      var ry = (i * 11.3 + t * 150) % 110;
      ctx.beginPath();
      ctx.moveTo(Math.floor(rx), Math.floor(ry));
      ctx.lineTo(Math.floor(rx - 2), Math.floor(ry + 6));
      ctx.stroke();
    }
    return;
  }

  // --- TDD FAILURE: red sky, smoke, warning ---
  if (currentEventTitle.indexOf('TDD Failure') !== -1) {
    // Red danger tint
    ctx.fillStyle = 'rgba(170,0,0,0.25)';
    ctx.fillRect(0, 0, W, H);
    // Smoke particles rising
    ctx.fillStyle = '#555555';
    for (var i = 0; i < 15; i++) {
      var sx = 140 + Math.sin(i * 2.7 + t) * 30;
      var sy = 130 - ((t * 20 + i * 15) % 90);
      var size = 2 + (i % 3);
      ctx.globalAlpha = 0.3 + Math.sin(t + i) * 0.15;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), size, size);
    }
    ctx.globalAlpha = 1.0;
    // Fire at base
    ctx.fillStyle = '#FF5555';
    for (var i = 0; i < 8; i++) {
      var fx = 130 + i * 5;
      var fh = 4 + Math.sin(t * 6 + i * 1.5) * 3;
      ctx.fillRect(fx, Math.floor(140 - fh), 3, Math.floor(fh));
    }
    ctx.fillStyle = '#FFFF55';
    for (var i = 0; i < 5; i++) {
      var fx = 135 + i * 6;
      var fh = 2 + Math.sin(t * 8 + i * 2) * 2;
      ctx.fillRect(fx, Math.floor(139 - fh), 2, Math.floor(fh));
    }
    // Pulsing red border
    var pulse = (Math.sin(t * 4) + 1) * 0.15;
    ctx.strokeStyle = 'rgba(255,0,0,' + pulse.toFixed(2) + ')';
    ctx.lineWidth = 3;
    ctx.strokeRect(1, 1, W - 2, H - 2);
    ctx.lineWidth = 1;
    return;
  }

  // --- REVIEW GATE PIONEER: person standing by gate structure ---
  if (currentEventTitle.indexOf('Review Gate Pioneer') !== -1) {
    var px = 200, py = 142;
    // Person body
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(px, py - 12, 4, 8);
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(px, py - 15, 4, 3);
    ctx.fillRect(px - 1, py - 4, 2, 5);
    ctx.fillRect(px + 3, py - 4, 2, 5);
    // Hat
    ctx.fillStyle = '#555555';
    ctx.fillRect(px - 1, py - 17, 6, 2);
    ctx.fillRect(px, py - 19, 4, 2);
    // Gate structure
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(210, py - 20, 3, 22);
    ctx.fillRect(225, py - 20, 3, 22);
    ctx.fillRect(210, py - 22, 18, 3);
    // Gate sign
    ctx.fillStyle = '#FFFF55';
    ctx.fillRect(214, py - 18, 10, 6);
    ctx.fillStyle = '#000';
    ctx.fillRect(216, py - 16, 2, 2);
    ctx.fillRect(220, py - 16, 2, 2);
    return;
  }
}

// =====================================================================
// DEATH SCREEN — Apple II green phosphor style
// =====================================================================
function drawDeathScene(time) {
  var t = (time || 0) * 0.001;
  var G = '#33FF33'; // Apple II green
  var GD = '#1a8a1a'; // darker green for details

  // Black background
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);

  // Ground line
  ctx.fillStyle = GD;
  ctx.fillRect(0, 148, W, 1);

  // --- OX (left side) ---
  var ox = 100, oy = 128;
  // Body
  ctx.fillStyle = G;
  ctx.fillRect(ox, oy, 24, 14);
  // Head
  ctx.fillRect(ox - 10, oy - 2, 12, 10);
  // Horns
  ctx.fillRect(ox - 12, oy - 6, 3, 5);
  ctx.fillRect(ox - 4, oy - 6, 3, 5);
  // Snout
  ctx.fillStyle = GD;
  ctx.fillRect(ox - 10, oy + 4, 6, 3);
  // Eye
  ctx.fillStyle = '#000';
  ctx.fillRect(ox - 7, oy, 2, 2);
  // Legs
  ctx.fillStyle = G;
  ctx.fillRect(ox + 2, oy + 14, 4, 8);
  ctx.fillRect(ox + 10, oy + 14, 4, 8);
  ctx.fillRect(ox + 16, oy + 14, 4, 8);
  // Tail
  ctx.fillRect(ox + 24, oy + 2, 6, 2);
  ctx.fillRect(ox + 29, oy, 2, 4);

  // --- HITCH ---
  ctx.fillStyle = G;
  ctx.fillRect(ox + 28, oy + 8, 14, 2);

  // --- WAGON ---
  var wx = 142, wy = 108;
  // Wagon bed
  ctx.fillStyle = G;
  ctx.fillRect(wx, wy + 20, 50, 16);
  // Bed slats (dark lines)
  ctx.fillStyle = GD;
  ctx.fillRect(wx, wy + 24, 50, 1);
  ctx.fillRect(wx, wy + 28, 50, 1);
  ctx.fillRect(wx, wy + 32, 50, 1);
  // Side rails
  ctx.fillStyle = G;
  ctx.fillRect(wx, wy + 18, 2, 18);
  ctx.fillRect(wx + 48, wy + 18, 2, 18);

  // Canvas cover (the bonnet)
  ctx.fillStyle = G;
  // Left arch
  ctx.fillRect(wx + 4, wy + 4, 2, 16);
  // Right arch
  ctx.fillRect(wx + 44, wy + 4, 2, 16);
  // Top cover
  ctx.fillRect(wx + 4, wy + 2, 42, 4);
  // Cover fill
  ctx.fillRect(wx + 6, wy + 6, 38, 12);
  // Cover shading
  ctx.fillStyle = GD;
  ctx.fillRect(wx + 8, wy + 8, 34, 2);
  ctx.fillRect(wx + 8, wy + 12, 34, 2);
  ctx.fillRect(wx + 8, wy + 16, 34, 1);

  // Wheels
  var wheelR = 8;
  var wheels = [wx + 8, wx + 42];
  var wa = t * 0.5; // slow rotation
  ctx.strokeStyle = G;
  ctx.lineWidth = 1.5;
  for (var wi = 0; wi < wheels.length; wi++) {
    var cx = wheels[wi], cy = wy + 38;
    // Rim
    ctx.beginPath();
    ctx.arc(cx, cy, wheelR, 0, Math.PI * 2);
    ctx.stroke();
    // Spokes
    for (var sp = 0; sp < 6; sp++) {
      var angle = wa + sp * Math.PI / 3;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(angle) * wheelR, cy + Math.sin(angle) * wheelR);
      ctx.stroke();
    }
    // Hub
    ctx.fillStyle = G;
    ctx.beginPath();
    ctx.arc(cx, cy, 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.lineWidth = 1;

  // Subtle scanline effect
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  for (var sl = 0; sl < H; sl += 3) {
    ctx.fillRect(0, sl, W, 1);
  }

  // Subtle green glow/vignette
  var grd = ctx.createRadialGradient(W/2, H/2, 40, W/2, H/2, W * 0.7);
  grd.addColorStop(0, 'rgba(0,0,0,0)');
  grd.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
}

function renderCanvas(time) {
  // Death screen: green phosphor Apple II style
  if (gameState === STATES.DEATH) {
    drawDeathScene(time);
    return;
  }

  const skyColors = getSkyColors();

  // Sky gradient (banded for EGA feel)
  const bands = 10;
  const skyBottom = 110;
  for (let i = 0; i < bands; i++) {
    const t = i / (bands - 1);
    const r1 = parseInt(skyColors.top.substr(1, 2), 16);
    const g1 = parseInt(skyColors.top.substr(3, 2), 16);
    const b1 = parseInt(skyColors.top.substr(5, 2), 16);
    const r2 = parseInt(skyColors.bottom.substr(1, 2), 16);
    const g2 = parseInt(skyColors.bottom.substr(3, 2), 16);
    const b2 = parseInt(skyColors.bottom.substr(5, 2), 16);
    const r = Math.floor(r1 + (r2 - r1) * t);
    const g = Math.floor(g1 + (g2 - g1) * t);
    const b = Math.floor(b1 + (b2 - b1) * t);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    const bandH = Math.ceil(skyBottom / bands) + 1;
    ctx.fillRect(0, Math.floor(i * (skyBottom / bands)), W, bandH);
  }

  // Clouds (parallax 0.2x)
  const cloudOffset = scrollX * 0.2;
  for (const c of cloudPositions) {
    let cx = ((c.x - cloudOffset) % (W + 80));
    if (cx < -40) cx += W + 80;
    drawPixelCloud(cx - 20, c.y, c.w, c.h);
  }

  // Far mountains (parallax 0.3x) - DARK MAGENTA signature Oregon Trail
  const farOffset = scrollX * 0.3;
  for (const m of farMountains) {
    let mx = ((m.x - farOffset) % (W + 100));
    if (mx < -50) mx += W + 100;
    drawMountain(mx - 25, m.h, m.w, '#AA00AA', false);
  }

  // Near mountains (parallax 0.4x) - LIGHT MAGENTA with snow caps
  const nearOffset = scrollX * 0.4;
  for (const m of nearMountains) {
    let mx = ((m.x - nearOffset) % (W + 80));
    if (mx < -40) mx += W + 80;
    drawMountain(mx - 20, m.h, m.w, '#FF55FF', m.snow);
  }

  // Grass
  ctx.fillStyle = '#00AA00';
  ctx.fillRect(0, 110, W, H - 110);

  // Bright grass highlights
  ctx.fillStyle = '#55FF55';
  const grassOffset = scrollX * 1.0;
  for (let i = 0; i < 50; i++) {
    let gx = ((i * 11 + 5 - grassOffset) % (W + 20));
    if (gx < -5) gx += W + 20;
    const gy = 113 + (i * 7 + i * i * 3) % 55;
    ctx.fillRect(Math.floor(gx), Math.floor(gy), 2, 2);
  }

  // Trees (parallax 0.6x)
  const treeOffset = scrollX * 0.6;
  const treeBaseY = 128;
  for (const t of treesData) {
    let tx = ((t.x - treeOffset) % (W + 60));
    if (tx < -20) tx += W + 60;
    drawTree(tx - 10, treeBaseY, t.h);
  }

  // Landmark for current stop (only at stops/events)
  if (gameState === STATES.STOP || gameState === STATES.EVENT || gameState === STATES.RIVER) {
    const stop = TRAIL_DATA.stops[currentStop];
    if (stop) {
      drawLandmark(stop.landmarkType, 240, 150);
    }
  }

  // Trail/ground strip
  if (!showRiver) {
    ctx.fillStyle = '#AA5500';
    ctx.fillRect(0, 152, W, 15);
    // Trail texture dots
    ctx.fillStyle = '#885500';
    for (let i = 0; i < 35; i++) {
      let dotX = ((i * 10 - scrollX * 1.0) % (W + 10));
      if (dotX < -3) dotX += W + 10;
      ctx.fillRect(Math.floor(dotX), 155 + (i % 4) * 2, 3, 1);
    }
    // Ruts
    ctx.fillStyle = '#775500';
    ctx.fillRect(0, 157, W, 1);
    ctx.fillRect(0, 162, W, 1);
  }

  // River (when active)
  if (showRiver) {
    drawRiver(time || 0);
  }

  // Wagon
  const wagonX = 65;
  const wagonY = showRiver ? 148 : 149;
  drawWagon(wagonX, wagonY);

  // Event-specific visual overlay
  if (gameState === STATES.EVENT || gameState === STATES.RIVER) {
    drawEventOverlay(time);
  }

  // Ground below trail
  ctx.fillStyle = '#885500';
  ctx.fillRect(0, showRiver ? 173 : 167, W, 15);
  ctx.fillStyle = '#553300';
  ctx.fillRect(0, showRiver ? 188 : 182, W, H - 182);
}

// =====================================================================
// MUSIC SYSTEM (Web Audio API Chiptune)
// =====================================================================
const NOTE_FREQ = {
  'C3': 130.81, 'D3': 146.83, 'G2': 98.00, 'A2': 110.00,
  'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'G4': 392.00,
  'A4': 440.00, 'C5': 523.25, 'REST': 0
};

const melody = [
  { note: 'E4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'A4', dur: 1 }, { note: 'G4', dur: 1 },
  { note: 'E4', dur: 1 }, { note: 'D4', dur: 1 }, { note: 'C4', dur: 1 }, { note: 'REST', dur: 1 },
  { note: 'E4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'A4', dur: 1 }, { note: 'C5', dur: 1 },
  { note: 'A4', dur: 2 }, { note: 'G4', dur: 2 },
  { note: 'C4', dur: 1 }, { note: 'D4', dur: 1 }, { note: 'E4', dur: 1 }, { note: 'G4', dur: 1 },
  { note: 'A4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'E4', dur: 1 }, { note: 'D4', dur: 1 },
  { note: 'C4', dur: 1 }, { note: 'E4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'E4', dur: 1 },
  { note: 'D4', dur: 1 }, { note: 'C4', dur: 3 }
];

const bassLine = [
  { note: 'C3', dur: 4 }, { note: 'A2', dur: 4 }, { note: 'C3', dur: 4 }, { note: 'A2', dur: 4 },
  { note: 'C3', dur: 4 }, { note: 'G2', dur: 4 }, { note: 'D3', dur: 4 }, { note: 'C3', dur: 4 }
];

let musicScheduleTimer = null;
let nextMelodyTime = 0;
let nextBassTime = 0;

var masterGain = null;

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 1.0;
    masterGain.connect(audioCtx.destination);
    musicInitialized = true;
  } catch (e) {
    console.warn('Web Audio not available:', e);
  }
}

function playNote(freq, startTime, duration, type, gainVal) {
  if (!audioCtx || freq === 0) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startTime);
  // Envelope: attack then decay
  gain.gain.setValueAtTime(0.001, startTime);
  gain.gain.linearRampToValueAtTime(gainVal, startTime + 0.02);
  gain.gain.setValueAtTime(gainVal, startTime + duration * 0.75);
  gain.gain.linearRampToValueAtTime(0.001, startTime + duration * 0.95);
  osc.connect(gain);
  gain.connect(masterGain || audioCtx.destination);
  osc.start(startTime);
  osc.stop(startTime + duration);
}

function scheduleLoop() {
  if (!musicPlaying || !audioCtx) return;
  const bpm = 110;
  const quarterDur = 60 / bpm;
  const now = audioCtx.currentTime;

  // Schedule melody
  let t = now + 0.05;
  for (const note of melody) {
    const dur = note.dur * quarterDur;
    if (note.note !== 'REST') {
      playNote(NOTE_FREQ[note.note], t, dur, 'square', 0.06);
    }
    t += dur;
  }

  // Schedule bass
  let tb = now + 0.05;
  for (const note of bassLine) {
    const dur = note.dur * quarterDur;
    playNote(NOTE_FREQ[note.note], tb, dur, 'triangle', 0.08);
    tb += dur;
  }

  // Total loop duration in beats: melody has 32 quarter beats = 32 * quarterDur
  const totalBeats = 32;
  const loopDurationMs = totalBeats * quarterDur * 1000;

  musicScheduleTimer = setTimeout(scheduleLoop, loopDurationMs - 200);
}

function startMusic() {
  if (!musicInitialized) initAudio();
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (masterGain) masterGain.gain.setValueAtTime(1.0, audioCtx.currentTime);
  musicPlaying = true;
  scheduleLoop();
  updateMusicIndicator();
}

function stopMusic() {
  musicPlaying = false;
  if (musicScheduleTimer) {
    clearTimeout(musicScheduleTimer);
    musicScheduleTimer = null;
  }
  if (masterGain) masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
  updateMusicIndicator();
}

function toggleMusic() {
  if (!musicInitialized) initAudio();
  if (musicPlaying) {
    stopMusic();
  } else {
    startMusic();
  }
  renderStatusBar();
}

function updateMusicIndicator() {
  const el = document.getElementById('music-indicator');
  if (!el) return;
  el.textContent = musicPlaying ? 'M: Music ON' : 'M: Music OFF';
  el.style.color = musicPlaying ? '#55FF55' : '#555555';
}

// =====================================================================
// SYNTAX HIGHLIGHTING (EGA Colors)
// =====================================================================
const TS_KEYWORDS = new Set([
  'import', 'export', 'from', 'const', 'let', 'var', 'function', 'async',
  'await', 'return', 'if', 'else', 'for', 'while', 'new', 'typeof', 'instanceof',
  'interface', 'type', 'class', 'extends', 'implements', 'try', 'catch', 'throw',
  'default', 'switch', 'case', 'break', 'continue', 'true', 'false', 'null',
  'undefined', 'void', 'of', 'in', 'do', 'then', 'fi', 'done', 'echo', 'cat',
  'cd', 'pwd', 'set', 'git', 'IF', 'BLOCK', 'RETURN'
]);

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function highlightCode(code) {
  return code.split('\n').map(function(line) {
    if (line.trim().startsWith('//') || line.trim().startsWith('#')) {
      return '<span style="color:#555555">' + escHtml(line) + '</span>';
    }
    var result = '';
    var i = 0;
    while (i < line.length) {
      // String literal
      if (line[i] === "'" || line[i] === '"' || line[i] === '`') {
        var quote = line[i];
        var end = i + 1;
        while (end < line.length && line[end] !== quote) {
          if (line[end] === '\\') end++;
          end++;
        }
        end = Math.min(end + 1, line.length);
        result += '<span style="color:#FFFF55">' + escHtml(line.substring(i, end)) + '</span>';
        i = end;
        continue;
      }
      // Inline comment
      if (line[i] === '/' && i + 1 < line.length && line[i + 1] === '/') {
        result += '<span style="color:#555555">' + escHtml(line.substring(i)) + '</span>';
        break;
      }
      if (line[i] === '#') {
        result += '<span style="color:#555555">' + escHtml(line.substring(i)) + '</span>';
        break;
      }
      // Number
      if (/\d/.test(line[i]) && (i === 0 || !/\w/.test(line[i - 1]))) {
        var end2 = i;
        while (end2 < line.length && /[\d._]/.test(line[end2])) end2++;
        result += '<span style="color:#FF55FF">' + escHtml(line.substring(i, end2)) + '</span>';
        i = end2;
        continue;
      }
      // Identifier or keyword
      if (/[a-zA-Z_$]/.test(line[i])) {
        var end3 = i;
        while (end3 < line.length && /[\w$]/.test(line[end3])) end3++;
        var word = line.substring(i, end3);
        if (TS_KEYWORDS.has(word)) {
          result += '<span style="color:#55FFFF">' + escHtml(word) + '</span>';
        } else {
          result += '<span style="color:#55FF55">' + escHtml(word) + '</span>';
        }
        i = end3;
        continue;
      }
      // Punctuation / operators
      result += '<span style="color:#AAAAAA">' + escHtml(line[i]) + '</span>';
      i++;
    }
    return result;
  }).join('\n');
}

    var titleMusic = musicPlaying
      ? 'Music: <span style="color:#55FF55;">On</span> <span style="color:#555555;">(M to toggle off)</span>'
      : 'Music: <span style="color:#FF5555;">Off</span> <span style="color:#555555;">(M to toggle on)</span>';
    statusBar.innerHTML = '<span style="color:#555555;">The Coderegon Trail v1.0</span>  |  ' + titleMusic;
    return;
  }

  var maxH = maxHealthForGame;
  var healthPct = Math.max(0, health / maxH);
  var barLen = 10;
  var filled = Math.round(healthPct * barLen);
  var healthColor = health > maxH * 0.6 ? '#00AA00' : (health > maxH * 0.3 ? '#FFFF55' : '#FF5555');
  var healthBar = '<span style="color:' + healthColor + ';">';
  for (var i = 0; i < filled; i++) healthBar += '\u2588';
  healthBar += '</span><span style="color:#555555;">';
  for (var i2 = 0; i2 < barLen - filled; i2++) healthBar += '\u2591';
  healthBar += '</span>';

  var streakStars = '<span style="color:#FFFF55;">';
  for (var s = 0; s < Math.min(streak, 5); s++) streakStars += '\u2605';
  streakStars += '</span>';

  var musicHint = musicPlaying
    ? 'Music: <span style="color:#55FF55;">On</span> <span style="color:#555555;">(M to toggle off)</span>'
    : 'Music: <span style="color:#FF5555;">Off</span> <span style="color:#555555;">(M to toggle on)</span>';

  statusBar.innerHTML = 'HP: ' + healthBar + ' ' + Math.max(0, health) +
    '  Hints: ' + supplies + '  ' + streakStars +
    '  |  Stop ' + (currentStop + 1) + '/' + TRAIL_DATA.stops.length +
    '  |  ' + musicHint;
}

// =====================================================================
// GAME LOGIC
// =====================================================================
function resetGame() {
  gameState = STATES.TITLE;
  difficulty = 1;
  selectedDifficulty = 1;
  health = 100;
  maxHealthForGame = 100;
  supplies = 5;
  currentStop = 0;
  day = 1;
  score = 0;
  totalQuestions = 0;
  streak = 0;
  bestStreak = 0;
  hintsUsed = 0;
  scrollX = 0;
  showRiver = false;
  wagonWheelAngle = 0;
  travelFlavorIndex = 0;
  deathPending = false;
  partyHealth = TRAIL_DATA.partyMembers.map(function(p) { return p.maxHealth; });
  pendingEvents = [];
  currentEventIndex = 0;
  eventAnswered = false;
  eventHinted = false;
  dimmedChoice = -1;
  selectedEventChoice = 0;
  selectedStopChoice = 0;
  shuffledIndices = [];
  currentEventType = '';
  currentEventTitle = '';
  drainAccumulator = 0;
  techDebtDeath = false;
  if (travelTimer) { clearTimeout(travelTimer); travelTimer = null; }
  if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }
}

function selectDifficulty(idx) {
  selectedDifficulty = Math.max(0, Math.min(PROFESSIONS.length - 1, idx));
  renderSetupScreen();
}

function startGame() {
  difficulty = selectedDifficulty;
  var prof = PROFESSIONS[difficulty];
  health = prof.health;
  maxHealthForGame = prof.health;
  supplies = prof.supplies;
  partyHealth = TRAIL_DATA.partyMembers.map(function(p) { return p.maxHealth; });
  currentStop = 0;
  day = 1;
  score = 0;
  totalQuestions = 0;
  streak = 0;
  bestStreak = 0;
  hintsUsed = 0;
  scrollX = 0;
  deathPending = false;
  enterTravel();
}

function enterTravel() {
  gameState = STATES.TRAVEL;
  showRiver = false;
  currentEventType = '';
  currentEventTitle = '';
  day += Math.floor(Math.random() * 7) + 1;
  travelFlavorIndex = Math.floor(Math.random() * travelFlavors.length);
  renderTravelScreen();
  renderStatusBar();

  if (travelTimer) clearTimeout(travelTimer);
  travelTimer = setTimeout(function() {
    if (gameState === STATES.TRAVEL) advanceFromTravel();
  }, 2500);
}

function advanceFromTravel() {
  if (travelTimer) { clearTimeout(travelTimer); travelTimer = null; }

  // Collect events for the current stop (triggerStop is 1-indexed relative to stop we just visited)
  // Events trigger BEFORE showing the stop
  pendingEvents = TRAIL_DATA.events.filter(function(e) { return e.triggerStop === currentStop; });
  currentEventIndex = 0;

  if (pendingEvents.length > 0) {
    showNextEvent();
  } else {
    enterStop();
  }
}

function showNextEvent() {
  if (currentEventIndex >= pendingEvents.length) {
    // After all events, check if we should die
    if (checkDeath()) return;
    enterStop();
    return;
  }

  var event = pendingEvents[currentEventIndex];
  eventAnswered = false;
  eventHinted = false;
  dimmedChoice = -1;
  selectedEventChoice = 0;
  currentEventType = event.type;
  currentEventTitle = event.title;

  // Shuffle choice order so correct answer isn't always first
  shuffledIndices = [];
  for (var si = 0; si < event.choices.length; si++) shuffledIndices.push(si);
  for (var si = shuffledIndices.length - 1; si > 0; si--) {
    var sj = Math.floor(Math.random() * (si + 1));
    var tmp = shuffledIndices[si]; shuffledIndices[si] = shuffledIndices[sj]; shuffledIndices[sj] = tmp;
  }

  if (event.type === 'river') {
    gameState = STATES.RIVER;
    showRiver = true;
  } else {
    gameState = STATES.EVENT;
    showRiver = false;
  }

  // Fortune events auto-apply health
  if (event.type === 'fortune') {
    health = Math.min(health + 20, maxHealthForGame);
    eventAnswered = true;
  }

  renderEventScreen(event);
  renderStatusBar();
}

function handleEventChoice(displayIdx) {
  if (eventAnswered) return;
  var event = pendingEvents[currentEventIndex];
  if (!event || event.choices.length === 0) return;
  if (displayIdx < 0 || displayIdx >= shuffledIndices.length) return;
  if (eventHinted && dimmedChoice === displayIdx) return;

  var prof = PROFESSIONS[difficulty];
  var forgiving = prof && prof.forgiving;
  var origIdx = shuffledIndices[displayIdx];
  var choice = event.choices[origIdx];
  var isRiver = event.type === 'river';

  if (forgiving && !choice.correct) {
    // Ralph Wiggum mode: dim the wrong answer, let them try again
    var items = document.querySelectorAll('.choice-item');
    if (items[displayIdx]) {
      items[displayIdx].classList.add('choice-dimmed');
      items[displayIdx].style.pointerEvents = 'none';
    }
    // Move selection to next available choice
    for (var ni = 0; ni < shuffledIndices.length; ni++) {
      var nextIdx = (displayIdx + 1 + ni) % shuffledIndices.length;
      if (!(eventHinted && dimmedChoice === nextIdx) && !items[nextIdx].classList.contains('choice-dimmed')) {
        selectedEventChoice = nextIdx;
        updateChoiceHighlight();
        break;
      }
    }
    return;
  }

  eventAnswered = true;

  totalQuestions++;

  if (choice.correct) {
    var bonus = streak >= 3 ? 5 : 0;
    health = Math.min(health + 10 + bonus, maxHealthForGame);
    score++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
  } else {
    var dmg = isRiver ? 20 : 15;
    health -= dmg;
    streak = 0;
    // Damage related party member
    var concept = event.concept;
    var memberIdx = -1;
    for (var mi = 0; mi < TRAIL_DATA.partyMembers.length; mi++) {
      if (TRAIL_DATA.partyMembers[mi].name === concept) { memberIdx = mi; break; }
    }
    if (memberIdx >= 0 && partyHealth[memberIdx] > 0) {
      partyHealth[memberIdx]--;
    }
  }

  showEventResult(event, displayIdx);
  renderStatusBar();
}

function handleEventHint() {
  var prof = PROFESSIONS[difficulty];
  var hintFree = prof && prof.hintFree;
  if (eventAnswered || eventHinted) return;
  if (!hintFree && supplies <= 0) return;
  var event = pendingEvents[currentEventIndex];
  if (!event || event.choices.length === 0) return;

  if (!hintFree) supplies--;
  hintsUsed++;
  eventHinted = true;

  // Find a wrong answer in display order (dimmedChoice is a display index)
  var wrongDisplayIndices = [];
  for (var i = 0; i < shuffledIndices.length; i++) {
    if (!event.choices[shuffledIndices[i]].correct) wrongDisplayIndices.push(i);
  }
  dimmedChoice = wrongDisplayIndices[Math.floor(Math.random() * wrongDisplayIndices.length)];

  renderEventScreen(event);
  renderStatusBar();
}

function updateChoiceHighlight() {
  var items = document.querySelectorAll('.choice-item');
  for (var i = 0; i < items.length; i++) {
    items[i].classList.toggle('choice-selected', i === selectedEventChoice);
  }
}

function updateStopHighlight() {
  var items = document.querySelectorAll('.stop-opt');
  for (var i = 0; i < items.length; i++) {
    items[i].classList.toggle('choice-selected', i === selectedStopChoice);
  }
}

function checkDeath() {
  if (health <= 0) {
    enterDeath();
    return true;
  }
  var allDead = true;
  for (var i = 0; i < partyHealth.length; i++) {
    if (partyHealth[i] > 0) { allDead = false; break; }
  }
  if (allDead) {
    enterDeath();
    return true;
  }
  return false;
}

function advanceFromEvent() {
  currentEventIndex++;
  if (currentEventIndex < pendingEvents.length) {
    if (checkDeath()) return;
    showNextEvent();
  } else {
    if (checkDeath()) return;
    enterStop();
  }
}

function enterStop() {
  gameState = STATES.STOP;
  showRiver = false;
  selectedStopChoice = 0;

  var stop = TRAIL_DATA.stops[currentStop];
  if (stop && stop.landmarkType === 'river') {
    showRiver = true;
  }

  renderStopScreen();
  renderStatusBar();
}

function handleStopChoice(choice) {
  if (choice === 2) {
    var codeBox = textPanel.querySelector('.code-box');
    if (codeBox) {
      codeBox.style.maxHeight = '280px';
      codeBox.scrollIntoView({ behavior: 'smooth' });
    }
    return;
  }

  currentStop++;
  if (currentStop >= TRAIL_DATA.stops.length) {
    enterWin();
  } else {
    enterTravel();
  }
}

function enterDeath() {
  gameState = STATES.DEATH;
  showRiver = false;
  renderDeathScreen();
  renderStatusBar();
}

function enterWin() {
  gameState = STATES.WIN;
  showRiver = false;
  renderWinScreen();
  renderStatusBar();
}

// =====================================================================
// INPUT HANDLING
// =====================================================================
function ensureAudio() {
  if (!musicInitialized) {
    initAudio();
    startMusic();
  }
}

document.addEventListener('keydown', function(e) {
  var key = e.key;

  // Music toggle always works
  if (key === 'm' || key === 'M') {
    if (!musicInitialized) initAudio();
    toggleMusic();
    return;
  }

  // Start audio on first interaction
  if (!musicInitialized) ensureAudio();

  switch (gameState) {
    case STATES.TITLE:
      if (key === ' ' || key === 'Enter') {
        e.preventDefault();
        gameState = STATES.SETUP;
        renderSetupScreen();
        renderStatusBar();
      }
      break;

    case STATES.SETUP:
      if (key === 'ArrowDown' || key === 'ArrowRight') {
        e.preventDefault();
        selectDifficulty((selectedDifficulty + 1) % PROFESSIONS.length);
      } else if (key === 'ArrowUp' || key === 'ArrowLeft') {
        e.preventDefault();
        selectDifficulty((selectedDifficulty - 1 + PROFESSIONS.length) % PROFESSIONS.length);
      } else if (key === '1') selectDifficulty(0);
      else if (key === '2') selectDifficulty(1);
      else if (key === '3') selectDifficulty(2);
      else if (key === '4') selectDifficulty(3);
      else if (key === 'Enter' || key === ' ') {
        e.preventDefault();
        startGame();
      }
      break;

    case STATES.TRAVEL:
      if (key === ' ' || key === 'Enter') {
        e.preventDefault();
        advanceFromTravel();
      }
      break;

    case STATES.STOP:
      if (key === 'ArrowLeft' || key === 'ArrowRight') {
        e.preventDefault();
        selectedStopChoice = (key === 'ArrowLeft') ? 0 : 1;
        updateStopHighlight();
      } else if (key === 'ArrowUp' || key === 'ArrowDown') {
        e.preventDefault();
        selectedStopChoice = selectedStopChoice === 0 ? 1 : 0;
        updateStopHighlight();
      } else if (key === 'Enter' || key === ' ') {
        e.preventDefault();
        handleStopChoice(selectedStopChoice + 1);
      } else if (key === '1') {
        handleStopChoice(1);
      } else if (key === '2') {
        handleStopChoice(2);
      }
      break;

    case STATES.EVENT:
    case STATES.RIVER:
      if (!eventAnswered) {
        var ev = pendingEvents[currentEventIndex];
        if (ev && ev.choices.length > 0) {
          var numChoices = ev.choices.length;
          if (key === 'ArrowDown' || key === 'ArrowRight') {
            e.preventDefault();
            selectedEventChoice = (selectedEventChoice + 1) % numChoices;
            // Skip dimmed choice
            if (eventHinted && dimmedChoice === selectedEventChoice) selectedEventChoice = (selectedEventChoice + 1) % numChoices;
            updateChoiceHighlight();
          } else if (key === 'ArrowUp' || key === 'ArrowLeft') {
            e.preventDefault();
            selectedEventChoice = (selectedEventChoice - 1 + numChoices) % numChoices;
            if (eventHinted && dimmedChoice === selectedEventChoice) selectedEventChoice = (selectedEventChoice - 1 + numChoices) % numChoices;
            updateChoiceHighlight();
          } else if (key === 'Enter' || key === ' ') {
            e.preventDefault();
            if (!(eventHinted && dimmedChoice === selectedEventChoice)) {
              handleEventChoice(selectedEventChoice);
            }
          } else if (key === '1' || key === 'a' || key === 'A') handleEventChoice(0);
          else if (key === '2' || key === 'b' || key === 'B') handleEventChoice(1);
          else if (key === '3' || key === 'c' || key === 'C') handleEventChoice(2);
          else if (key === 'h' || key === 'H') handleEventHint();
        }
        // Fortune: space/enter to continue
        if (ev && ev.type === 'fortune' && (key === ' ' || key === 'Enter')) {
          e.preventDefault();
          advanceFromEvent();
        }
      } else {
        if (key === ' ' || key === 'Enter') {
          e.preventDefault();
          if (checkDeath()) return;
          advanceFromEvent();
        }
      }
      break;

    case STATES.DEATH:
      if (key === ' ' || key === 'Enter') {
        e.preventDefault();
        resetGame();
        renderTitleScreen();
        renderStatusBar();
      }
      break;

    case STATES.WIN:
      if (key === ' ' || key === 'Enter') {
        e.preventDefault();
        resetGame();
        renderTitleScreen();
        renderStatusBar();
      }
      break;
  }
});

// =====================================================================
// ANIMATION LOOP + TECH DEBT DRAIN
// =====================================================================
var lastTime = 0;
var drainAccumulator = 0;
var DRAIN_INTERVAL = 3000; // drain 1 HP every 3 seconds
var techDebtDeath = false;

function gameLoop(timestamp) {
  var dt = timestamp - lastTime;
  lastTime = timestamp;

  // Clamp dt to avoid huge jumps
  if (dt > 100) dt = 16;

  if (gameState === STATES.TRAVEL) {
    scrollX += dt * 0.03;
    wagonWheelAngle += dt * 0.004;
  } else if (gameState === STATES.TITLE) {
    scrollX += dt * 0.01;
  } else {
    // Gentle idle scroll
    scrollX += dt * 0.002;
  }

  // Tech debt drain: HP ticks down during active gameplay (disabled for Ralph Wiggum)
  var isForgiving = PROFESSIONS[difficulty] && PROFESSIONS[difficulty].forgiving;
  var isActive = gameState === STATES.STOP || gameState === STATES.EVENT || gameState === STATES.RIVER;
  if (isActive && !deathPending && !isForgiving) {
    drainAccumulator += dt;
    while (drainAccumulator >= DRAIN_INTERVAL) {
      drainAccumulator -= DRAIN_INTERVAL;
      health--;
      renderStatusBar();
      if (health <= 0) {
        techDebtDeath = true;
        enterDeath();
        break;
      }
    }
  }

  renderCanvas(timestamp);
  animFrame = requestAnimationFrame(gameLoop);
}

// =====================================================================
// INITIALIZATION
// =====================================================================
resetGame();
renderTitleScreen();
renderStatusBar();
updateMusicIndicator();
animFrame = requestAnimationFrame(gameLoop);
</script>
